		// ******************************** Corpi di ricerca ********************************
		#autoLOC_RBodies_discovery_Kcalbeloh = Abbiamo trovato un punto nello spazio dove persino la luce sembra svanire. Questa è una scoperta da cui neanche le battute di Jeb possono sfuggire! Speriamo che non prenda gusto ai razzi!
		#autoLOC_RBodies_discovery_Sunorc = È apparso un piccolo puntino di luce nel nostro telescopio, un riflesso pensavamo? No, no è una stella!
		#autoLOC_RBodies_discovery_AralcA = Questa stella era così luminosa che ha quasi accecato Jeb! Non crediamo di non averla notata fino ad ora!
		#autoLOC_RBodies_discovery_AralcB = Questa stella è minuscola rispetto a Kerbol... Ma sembra muoversi in danza con un'altra.
		#autoLOC_RBodies_discovery_Maelg = Bob l'aveva quasi scartata come un graffio sulla lente finché non abbiamo guardato più da vicino. Sembra più un grande gigante gassoso, ma è calda... Davvero calda!
		#autoLOC_RBodies_discovery_WH3141A = Abbiamo scoperto quello che sembra essere... un'anomalia? La luce non si comporta correttamente intorno ad essa, dobbiamo indagare!
		#autoLOC_RBodies_discovery_WH3141B = È strano, è una sorta di anomalia... Non riusciamo a capire bene cos'è questo oggetto, forse serve una missione? È troppo lontano però, non abbiamo potuto portare abbastanza spuntini per il viaggio.
		#autoLOC_RBodies_discovery_Onrefni = Questo pianeta sembra un puzzle, con il bagliore caldo e fuso della lava tra i pezzi.
		#autoLOC_RBodies_discovery_Rouqea = A prima vista i nostri migliori scienziati pensavano che qualcuno avesse versato una goccia d'acqua sull'immagine... Si è rivelato essere un mondo acquatico!
		#autoLOC_RBodies_discovery_Iomena = Questo mondo craterizzato sembra avere un'atmosfera, molto sottile come il nostro vicino Duna.
		#autoLOC_RBodies_discovery_Uleg = Gelato?! No... Sembra sia solo ghiaccio, beh è stato emozionante finché è durato.
		#autoLOC_RBodies_discovery_Mehtna = Strano, questo sembra più caldo da un lato che dall'altro. Forse potremmo fare una bella abbronzatura lì.
		#autoLOC_RBodies_discovery_Meiuqer = Wow... Questa cosa è piccola, è un miracolo che l'abbiamo vista da così lontano.
		#autoLOC_RBodies_discovery_Sedah = Una nuova specie di gelato?! È piuttosto grande... Oh, lasciamo perdere è tipo Jool ma rosa. Strano.
		#autoLOC_RBodies_discovery_Suluco = All'inizio pensavamo che questa roccia fosse sterile, ma guardando più a lungo abbiamo notato che era anche congelata. Bob ha detto che vuole andarci in vacanza, pensiamo sia pazzo.
		#autoLOC_RBodies_discovery_Tot =  Questa cosa è piccola... Come un asteroide! Mi chiedo se possiamo rimorchiarla fino a Kerbin per fare compagnia a Minmus?
		#autoLOC_RBodies_discovery_Sera = Questo è tipo Duna! Molto rosso, più grande però. A Jeb piace perché gli ricorda un'auto da corsa, ha persino una striscia!
		#autoLOC_RBodies_discovery_Dipuc = La Mun?! Come ci è arrivata? Oh aspetta... Non è la Mun, falso allarme.
		#autoLOC_RBodies_discovery_Simetra = Whoa che roccia grande! Oh aspetta no è solo colorata come una roccia... Sembra molto gassosa, chissà che odore ha?
		#autoLOC_RBodies_discovery_Noira = Questa luna orbita... All'indietro? Strano. Chissà se ha a che fare con il grosso bozzo che ha?
		#autoLOC_RBodies_discovery_Simeht = Gelato?! Lasciamo perdere è troppo grande per essere gelato, molto simile a Minmus nel colore ma molto più grande.
		#autoLOC_RBodies_discovery_Noi =  Questa cosa può a malapena essere considerata una luna, più un asteroide... Mi chiedo se ci attaccheremmo alla superficie o galleggeremmo via?
		#autoLOC_RBodies_discovery_Norihc = Si potrebbe descrivere questa grande roccia solo come... vaporosa... e fredda.
		#autoLOC_RBodies_discovery_Noyreg = SPUNTINI?! ABBIAMO TROVATO IL JACKPOT!!!! Oh aspetta... È tossico dici? Quindi niente spuntini?
		#autoLOC_RBodies_discovery_Anneheg = Whoa che roccia calda! Brilla persino!
		#autoLOC_RBodies_discovery_Arorua = Questo pianeta... sembra scintillare e brillare con schemi incredibili. Ci servono più foto.
		#autoLOC_RBodies_discovery_Ahtpan = Hmm, sembra giallo come Kerbol. Non sembra altrettanto caldo però, Bob dice che dovremmo provare ad accenderlo e vedere cosa succede.
		#autoLOC_RBodies_discovery_Anehta = Stupefacente! Questo ha enormi fasce sia intorno che dentro! Chissà come appare da terra?
		#autoLOC_RBodies_discovery_Enots = Questo è strano... È piccolo come un asteroide, ma la sua forma è come una sorta di opera d'arte eccentrica.
		#autoLOC_RBodies_discovery_Efil = Sembra quasi Kerbin! Sarebbe decisamente il posto dove stare! Se potessimo arrivarci.
		#autoLOC_RBodies_discovery_Eulb = Questo è grande come la Mun... Ma è blu come Minmus? Gelato in arrivo!
		#autoLOC_RBodies_discovery_Elad = Whoa, questo è come la Mun ma quasi grande come Kerbin! A Jeb è sempre piaciuta una bella sfida!

		// ******************************** Definizioni scientifiche ********************************
		// Kcalbeloh
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceLow1 = Avvicinarsi a Kcalbeloh in orbita bassa sembra essere risucchiati in un pozzo senza fondo, con l'intensa attrazione gravitazionale che rende difficile mantenere l'orientamento e il controllo del veicolo spaziale.
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceLow2 = Lander 1, preparati a sganciarti, al mio segnale.
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceHigh = Le intense forze gravitazionali hanno fatto impazzire i nostri strumenti, e abbiamo dovuto ritirarci rapidamente a una distanza più sicura.

		#LOC_KS_SciDef_temperatureScan_Kcalbeloh_InSpaceLow = Le letture della temperatura in prossimità di Kcalbeloh sono estremamente alte, indicando intense radiazioni dal suo disco di accrescimento.

		#LOC_KS_SciDef_evaReport_Kcalbeloh_SrfLanded = Mio dio, è pieno di Kraken.
		#LOC_KS_SciDef_evaReport_Kcalbeloh_InSpaceLow = Il membro dell'equipaggio ha riferito di sentirsi senza peso e stupito durante l'EVA vicino a Kcalbeloh. L'intensa attrazione gravitazionale era palpabile anche da una distanza di sicurezza.
		#LOC_KS_SciDef_evaReport_Kcalbeloh_InSpaceHigh = Il rapporto dell'equipaggio durante un'EVA vicino a Kcalbeloh rivela una vista mozzafiato del disco di accrescimento giallo del buco nero supermassiccio.

		#LOC_KS_SciDef_mysteryGoo_Kcalbeloh_InSpaceLow = Un esperimento con Mystery Goo non è possibile qui, poiché le intense forze gravitazionali probabilmente disturbano qualsiasi tentativo di condurre un esperimento in prossimità.

		#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceLow = I risultati della scansione gravitazionale indicano una significativa distorsione gravitazionale, che potrebbe potenzialmente aiutare future manovre di fionda gravitazionale attorno a questo massiccio corpo celeste.
		//#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceHigh = La scansione gravitazionale di Kcalbeloh da lontano indica la presenza di grandi concentrazioni di massa in prossimità del buco nero.
		#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceHigh = Una scansione gravitazionale di Kcalbeloh da lontano rivela piccole irregolarità nei dati. Questi sono molto probabilmente pianeti, o "blanet", in orbita attorno al buco nero. Alcuni di questi dovrebbero essere piuttosto vicini!

		#LOC_KS_SciDef_magnetometer_Kcalbeloh_InSpaceLow = L'intensa radiazione delle particelle nel disco di accrescimento ha cortocircuitato lo strumento prima che potessimo effettuare una lettura.

		// Onrefni
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded1 = È davvero inquietante pensare che la luce che illumina la vista di questo... sfortunato piccolo pianeta non provenga da una stella, ma da materiale e gas accelerati così velocemente dall'enorme pozzo gravitazionale di Kcalbeloh da brillare al calor bianco.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded2 = Il pianeta stesso sembra gemere sotto la pressione di essere così vicino al mostruoso Kcalbeloh, spostandosi e crepandosi costantemente sotto la vostra nave come una crosta di torta economica.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded3 = Questo posto è strutturalmente solido quanto un Veicolo Spaziale Senza Titolo (prima dell'aggiunta di più traverse).
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfLanded1 = I parametri di missione non prevedevano che l'unità di misura della temperatura fosse esposta a condizioni così estreme. Tuttavia, fa comunque il suo lavoro e ti informa gentilmente che è… *mite.*
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfLanded2 = Non dovrebbe fare così caldo senza una stella nelle vicinanze. La massa fa cose spaventose, di solito a spese di Onrefni.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded1 = Paragoni l'esperienza di camminare su Onrefni a camminare su grandi fiocchi di cereali per la colazione, mentre "senti" lo scricchiolio della superficie risuonare nella gamba ad ogni passo saltellante.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded2 = I tuoi piedi sono... sostanzialmente più caldi della testa, come ti informa gentilmente il sistema operativo della tuta EVA attualmente in panico.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded3 = Trovi difficile muoverti su questa superficie irregolare e allungata, poiché lo strato superiore di roccia si sfalda ad ogni salto pesante creato dai tuoi tentativi goffi di movimento nel 32% della gravità di Kerbin.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfLanded1 = Il Goo sembra rabbrividire negli angoli più remoti della sua capsula alla realizzazione di essere su un pianeta così vicino a Kcalbeloh.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfLanded2 = Il Goo sembra separarsi in strati diversi, come se imitasse la geologia interna del pianeta nano frantumato su cui riposa.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded1 = I campioni che raccogli con cura appaiono fortemente appiattiti e deformati rispetto ai campioni extraplanetari "convenzionali" visti nelle missioni precedenti.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded2 = Le rocce che raccogli sono calde anche attraverso i guanti della tuta, e provi una fitta di simpatia per questi oggetti, ammettiamolo, inanimati ma torturati.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded3 = Noti una fine polvere di particelle sui campioni che raccogli che sembra ricoprire tutto su Onrefni, e supponi che questa polvere sia creata e depositata dal disco di accrescimento vicino di Kcalbeloh e dalla lenta ma attiva frammentazione del pianeta nano stesso simultaneamente.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfLanded1 = I campioni metallici si liquefanno rapidamente sotto la luce aliena di Kcalbeloh, e i campioni volatili come il ghiaccio iniziano a sublimare rapidamente dopo essere stati esposti al vuoto ostile intorno a Onrefni.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfLanded2 = La polvere pervasiva e carica elettricamente che ricopre la superficie di Onrefni inizia rapidamente a rivestire l'interno della sonda materiali. Con tuo grande fastidio, la polvere volatile fa cortocircuitare l'elettronica della sonda, mettendo fuori servizio il tuo costoso nuovo esperimento scientifico pochi attimi dopo aver raccolto dati utili.
		#LOC_KS_SciDef_seismicScan_Onrefni_SrfLanded = Lo strumento sismico è completamente sommerso da dati provenienti sia dalle forze di marea estreme che dagli impatti quasi costanti del materiale nel disco di accrescimento vicino, il che caratterizza in gran parte la natura caotica di Onrefni.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfLanded1 = Le letture di gravità fluttuano leggermente a seconda del punto su Onrefni in cui vengono effettuate, probabilmente a causa del terreno instabile e della geologia interna devastata di questo piccolo mondo.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfLanded2 = La gravità su Onrefni, sebbene certamente instabile, di solito si stabilizza intorno a un livello paragonabile ma leggermente superiore alla gravità superficiale di Duna. Questo fatto conferma la teoria suggerita dalle letture scientifiche precedenti secondo cui questo piccolo mondo possiede un nucleo di ferro pesante, poiché un corpo così piccolo di solito non possiede una gravità così elevata.

		#LOC_KS_SciDef_crewReport_Onrefni_SrfSplashed1 = Non è questo che intendevamo per esplorazione approfondita. L'implicazione era che saresti tornato a casa - Ok. Ora è troppo tardi.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfSplashed2 = Ti ricordi di non essere pagato abbastanza per questo mentre guardi il tuo veicolo trasformarsi in fonduta metallica.
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfSplashed1 = Questo è un crimine contro i termometri, e lo sai. Purtroppo è troppo tardi per rimediare alle tue azioni, poiché il termometro si è fuso e non è più tra noi.
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfSplashed2 = Perché preoccuparsi? Conoscevi la risposta. T R O P P O   C A L D O .
		#LOC_KS_SciDef_evaReport_Onrefni_SrfSplashed1 = Sai, era inevitabile che qualcuno più denso di Kcalbeloh come te passasse attraverso il rigoroso processo di selezione dei kerbonauti del KSP solo per camminare nella lava su un pianeta nano alieno. Goditi i tuoi ultimi secondi di esistenza, o… coraggioso!
		#LOC_KS_SciDef_evaReport_Onrefni_SrfSplashed2 = Grazie per il tuo significativo contributo alla scienza e per il tuo sacrificio solo per scoprire che, ascolta bene: LA LAVA È CALDA!
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfSplashed1 = Il Goo meritava di meglio, ma almeno è perito nell'esercizio delle sue funzioni per Kerbalkind.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfSplashed2 = Il Goo sopravvive al calore incredibile più a lungo di quanto si potrebbe anticipare, ma anche lui soccombe rapidamente alla furia di Onrefni.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfSplashed1 = Si è fuso. Assoluta sorpresa.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfSplashed2 = Il KSC ti consiglia di non essere così imprudente con l'attrezzatura costosa in futuro semplicemente per verificare se la lava era, in effetti, calda.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfSplashed = Il sensore di gravità emette una serie di dati senza senso mentre inizia a fondersi sotto il calore punitivo degli inferni di Onrefni.

		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceLow1 = Hai una leggera esitazione all'idea di atterrare sul mondo frantumato sotto di te.
		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceLow2 = Non vuoi DAVVERO atterrare lì. La superficie sembra circa tanto accogliente quanto un orso Kolar rabbioso.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceLow1 = Il termometro non sospetta ancora l'ira che giace sotto.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceLow2 = Non sei nemmeno sulla superficie e le tue unità di misura della temperatura stanno già protestando, cartelli e tutto.
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceLow1 = Non ti piace galleggiare proprio sopra letterali fiumi di lava. La sensazione è simile a stare proprio accanto a uno scaldabagno, anche attraverso la tuta.
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceLow2 = Tra il calore del pianeta lacerato e il calore di Kcalbeloh sul lato opposto, ti senti come un pasto scaldato al microonde durante l'EVA, e i tuoi sistemi di raffreddamento chiedono rapidamente un aumento.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceLow1 = Se non sapessi meglio, diresti che il Goo inanimato sembrava attivamente ritrarsi dal piccolo mondo frantumato sotto.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceLow2 = Il Goo rimbalza erraticamente sul suo contenitore, sembrando cercare un mezzo di fuga.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceLow1 = La suite elettronica nella sonda materiali reagisce in modo peculiare all'ambiente estremo unico intorno a questo piccolo mondo.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceLow2 = Osservi l'attrezzatura di test magnetico illuminarsi come un albero di Natale nella sonda materiali ogni volta che il buco nero è nel campo della strumentazione. 
		#LOC_KS_SciDef_gravityScan_Onrefni_InSpaceLow = Il sensore fatica a quantificare il gioco del tiro alla fune planetario che si svolge intorno ad esso dal buco nero e Onrefni.
		#LOC_KS_SciDef_magnetometer_Onrefni_InSpaceLow = Il braccio rende rapidamente credibile la teoria che Onrefni possieda un nucleo metallico pesante e proporzionalmente immenso, poiché capta la firma magnetica relativamente forte (per le sue dimensioni) del pianeta nano.

		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceHigh1 = Non sapevi che una roccia spaziale potesse sembrare malefica… fino ad oggi.
		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceHigh2 = Come ha fatto questa piccola palla coraggiosa a formarsi così vicino al Grande Lassù?
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceHigh1 = Le enormi letture di calore del buco nero soffocano ancora i dati di temperatura stimati della roccia incrinata sotto di te a questa distanza.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceHigh2 = Dovrai avvicinarti a Onrefni per allontanarti dalla vasta firma termica del buco nero curioso e ottenere dati significativi oltre “probabilmente C A L D O (e luminoso)”.
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceHigh1 = Fai del tuo meglio per l'impressione di “granello insignificante”. Ehi, ottimo lavoro!
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceHigh2 = Cerchi di decidere se Onrefni è davvero piccolo, o se Kcalbeloh è solo davvero, davvero grande. Forse entrambi? Sono necessari ulteriori studi.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceHigh1 = Il Goo sembra inerte, come paralizzato dalla dimensione del buco nero vicino rispetto al relativamente minuscolo Onrefni.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceHigh2 = Il Goo si estende ai lati opposti del suo contenitore, come se emulasse le forze di marea che hanno frantumato il piccolo mondo sotto.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceHigh1 = Prima di imbarcarti in questa missione, non pensavi che i campioni di materiale potessero mostrare paura, essendo oggetti inanimati. Avevi torto. Quei campioni sembrano assolutamente terrorizzati alla presenza dell'orrore cosmico che è Kcalbeloh, mentre si dirigono verso la roccia tormentata sotto a velocità inimmaginabile.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceHigh2 = Alcuni dei campioni sensibili al magnetismo sembrano gravitare leggermente tra il buco nero e il pianeta nano lontano sotto, il che indica che Onrefni possiede un grande nucleo di ferro, non dissimile da Moho.
		#LOC_KS_SciDef_gravityScan_Onrefni_InSpaceHigh = A questa distanza, qualsiasi lettura di gravità sostanziale dal piccolo pianeta che sarebbe stata altrimenti ovvia è soffocata dalla firma soffocante di Kcalbeloh.
		#LOC_KS_SciDef_magnetometer_Onrefni_InSpaceHigh = Anche a questa distanza, una firma magnetica sorprendentemente ampia irradia da Onrefni. La forma del campo magnetico è perturbata dal campo schiacciante di Kcalbeloh, ma c'è QUALCOSA lì. Dovrai avvicinarti per verificare queste letture.

		// Rouqea
		//Rapporti equipaggio
		//A terra
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Lowlands = Sentire scricchiolii occasionali dallo scafo del tuo veicolo è inquietante, ma a questa profondità negli oceani di Rouqea non c'è molto da vedere dal finestrino.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Midlands = Le luci dalla cabina equipaggio illuminano appena abbastanza per vedere il fondale sabbioso dell'oceano dove il tuo veicolo si è posato dopo essere affondato così in profondità.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Highlands = Contro il nero schiacciante delle profondità oceaniche, puoi vedere affioramenti rocciosi e - se i tuoi occhi dicono il vero - montagne sottomarine. Forse sono queste a provocare le onde mostruose in superficie.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Cracks = La tua nave, ora posata alle profondità più basse dell'oceano, geme sotto il peso dell'intero oceano che preme su di essa. È più profondo di quanto immaginassi che l'oceano andasse...
		//In acqua
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Lowlands = Mentre guardi dalla cabina equipaggio, vedi che l'acqua salata di Rouqea copre il portello di visualizzazione, oscurando parzialmente l'orizzonte. È strano, l'orizzonte non sembra così piatto come dovrebbe essere su un pianeta oceanico...
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Midlands = Dalla tua cabina equipaggio, le acque sembrano calme intorno a te. Chiudi gli occhi e ti rilassi, ascoltando il suono delle onde che si infrangono sullo scafo del tuo veicolo. 
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Highlands = Il modulo equipaggio offre una vista fantastica sugli oceani calmi di Rouqea, alzandoti dal sedile puoi vedere fino alle montagne all'orizzonte. Aspetta...
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Cracks = Galleggiando sopra le parti più profonde dell'oceano planetario di Rouqea, noti quanto le onde diventano agitate e in lontananza, quanto alte si infrangono! Alcune raggiungono quasi le nuvole!
		//Volo a bassa quota
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Lowlands = Dal tuo modulo equipaggio puoi vedere le nuvole intorno e sopra di te, e il mare calmo sotto. È difficile non essere un po' turbati da quanto sei vicino a Kcalbeloh.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Midlands = La tua cabina di pilotaggio offre una vista meravigliosa sull'oceano, che si estende tutto intorno a te. In lontananza, cogli uno scorcio di un'onda alta centinaia di metri che si allontana sull'orizzonte.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Highlands = Ruotando il veicolo, il portello di visualizzazione cattura uno spettacolo meraviglioso; le nuvole si aprono per lasciare spazio a un'onda di magnitudine titanica. Con queste onde, pensi quasi di volare troppo basso...
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Cracks = Intorno alle zone di Rouqea note per essere le più profonde, vedi colonne di bolle salire dalle profondità dell'oceano planetario, per essere spazzate via da onde delle dimensioni di montagne.
		//Volo ad alta quota
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Lowlands = È difficile non apprezzare lo spettacolo che vedi ora - il disco di accrescimento di Kcalbeloh che illumina i mari e i cieli azzurri di Rouqea.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Midlands = Il tuo veicolo vola con grazia nell'aria sopra le nuvole, permettendoti di cogliere ogni scintillio delle onde lontane sotto.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Highlands = Anche così in alto, è difficile non notare il terreno montuoso sotto di te. È difficile ignorare la neve che ricopre i picchi - quella montagna si è appena mossa?
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Cracks = Rouqea lontano sotto di te, è inquietante sapere che il buco nero che incombe sopra è così vicino.
		//In orbita bassa
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Lowlands = Guardi le increspature circondare il massiccio mondo acquatico sotto di te. Il tuo briefing dice che sono onde delle dimensioni di montagne, ma non può essere vero, vero?
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Midlands = È difficile comprendere quanta acqua c'è su un pianeta oceanico, eppure sotto di te c'è Rouqea, che incombe nel tuo portello come una gemma di zaffiro puro.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Highlands = Rouqea riempie la tua finestra tanto quanto Kcalbeloh - un brindisi sia alla scala del buco nero che alla tua vicinanza al gigantesco mondo oceanico.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Cracks = Nelle parti più calme dell'oceano, puoi quasi vedere un riflesso di Kcalbeloh! Un riflesso distorto e spezzato, ma pur sempre un riflesso.
		//In orbita alta
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Lowlands = Sembra che qualcuno abbia allagato Kerbin. Aspetta, quello non è Kerbin?
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Midlands = Sembra che il tempo potrebbe scorrere più lentamente intorno al buco nero. O per niente! Ispezionando l'orologio sul muro, diventa chiaro che Jeb potrebbe aver rimosso le batterie a un certo punto.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Highlands = Hai improvvisamente l'impulso di costruire, ruotare e poi tentare di agganciarti a una stazione spaziale.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Cracks = È pacifico così in alto sopra l'atmosfera. Senti che una musica d'organo pulsante e forte cambierebbe quell'atmosfera pacifica.
		//Scansioni temperatura
		//A terra
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Lowlands = La temperatura è sbalorditiva! Forse le forze di marea del buco nero stanno provocando una sorta di effetto vulcanico nel nucleo del pianeta.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Midlands = Pur essendo circondato dall'acqua, guardi lo schermo mostrare temperature sempre più alte. Qualcosa sta riscaldando i sensori! R&D si divertirà un mondo con questo.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Highlands = Le temperature raggiungono picchi selvaggi in momenti imprevedibili. Forse c'è uno sbocco vulcanico sottomarino nelle vicinanze?
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Cracks = La temperatura scende improvvisamente da un valore molto alto a uno molto basso. Quasi gelata! Cosa potrebbe causare una tale variazione?
		//In acqua
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Lowlands = La temperatura dell'acqua è perfetta per nuotare! Le onde? Non tanto.
