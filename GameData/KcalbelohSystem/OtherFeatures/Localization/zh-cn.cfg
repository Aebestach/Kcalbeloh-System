		#LOC_KS_SciDef_dmNAlbedoScan_Meiuqer_SrfLanded = 你知道吗，当我报名负责太空任务时，我以为能看到很多爆炸。而不是整天盯着无聊的遥测数据。

		#LOC_KS_SciDef_dmlaserblastscan_Meiuqer_SrfLanded = 我在你的石头里，激光你的岩石。

		#LOC_KS_SciDef_dmSolarParticles_Meiuqer_InSpace = 有那么一瞬，你发誓太阳粒子采集器在打呼噜。

		#LOC_KS_SciDef_dmSoilMoisture_Meiuqer_InSpaceLow = 没有微波读数，除了航天中心微波炉的读数——负责监控的实习生正在热辣面。

		#LOC_KS_SciDef_dmRadiometerScan_Meiuqer_InSpaceHigh = Meiuqer因深色地表具有很低的反照率，来自Maelg的极端暗淡光线使情况更糟。

		#LOC_KS_SciDef_dmseismicHammer_Meiuqer_SrfLanded = 作为低密度"碎石堆"小行星，Meiuqer结构非常松散——撞击产生的部分碎片无疑已达逃逸速度。这也意味着你什么有用的数据都没拿到。

		// Sunorc
		#LOC_KS_SciDef_dmMagScan_Sunorc_InSpaceLow = 吊臂似乎在维持结构完整性方面遇到麻烦，因为正在被转化成液态。

		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceLow = 仪器分析Sunorc地表发出的无线电波时检测到大量黑子。
