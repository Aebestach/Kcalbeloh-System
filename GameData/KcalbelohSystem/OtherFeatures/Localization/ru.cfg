		// ******************************** Описания планет ********************************
		#LOC_KS_Anehta_description = Anehta — газовый гигант с впечатляющей системой колец. Планета характеризуется постоянным облачным покровом, разделённым на светлые зоны и тёмные пояса. Из-за противонаправленной циркуляции зон и поясов на планете бушуют сильные штормы и турбулентность.
		#LOC_KS_Ahtpan_description = Ahtpan — каменистая пустынная планета с океанами из нафты. Хотя строительство нефтехимического завода на поверхности может показаться хорошей идеей, KSC рекомендует всем кербонавтам не снимать шлемы при исследовании планеты — её атмосфера источает сильный запах нафталина!
		#LOC_KS_Anneheg_description = Anneheg — планета тёмного, угольного вида, близко обращающаяся вокруг Aralc-A. Близость к звезде привела к тому, что большая часть поверхности расплавилась, образовав реки и океаны лавы, а также частые штормы из испарённого металла. Anneheg считается одной из самых адских планет из когда-либо обнаруженных.
		#LOC_KS_AralcA_description = Aralc-A — первая звезда двойной системы Kcalbeloh и самая яркая и массивная звезда системы. Высокая температура и голубовато-белый цвет указывают на то, что это звезда главной последовательности A-типа.
		#LOC_KS_AralcB_description = Aralc-B, вторая звезда двойной системы — небольшая маломассивная звезда M-типа главной последовательности, также известная как красный карлик.
		#LOC_KS_AralcSystem_description = Это барицентр двойной звёздной системы.
		#LOC_KS_Arorua_description = Arorua — крупная каменистая планета, приливно заблокированная Aralc-B. Из-за мощных звёздных ветров от Aralc-B полярное сияние наблюдается на всей обращённой к звезде полусфере. Одновременно атмосфера постепенно сдувается звёздным ветром красного карлика.
		#LOC_KS_Dipuc_description = Dipuc — единственный спутник Sera; его поверхность испещрена крупными кратерами, что указывает на поглощение множества метеоритных ударов, которые иначе пришлись бы по Sera. Спутник геологически активен: на поверхности множество действующих вулканов и массивных гор, видимых даже с орбиты Sera.
		#LOC_KS_Efil_description = Efil издали напоминает сапфир у подножия Anehta. Очаровательная атмосфера и прекрасные пляжи делают его идеальным местом для отдыха. Возможно, KSC построит там курорт. Остаётся вопрос: кто сможет позволить себе билет на эту далёкую планету?
		#LOC_KS_Elad_description = Elad — крупнейший спутник Anehta и первый из обнаруженных. Считается, что в прошлом у Elad была атмосфера и даже жидкая вода на поверхности, но причина потери этих характеристик остаётся загадкой.
		#LOC_KS_Enots_description = Enots — небольшой астероидный спутник, встроенный в кольцевую систему Anehta; считается наименьшим известным спутником Anehta.
		#LOC_KS_Eulb_description = Eulb — … голубая луна.
		#LOC_KS_Iomena_description = Iomena — каменистая планета с крупными кратерами и океанами. Исследования показали, что вероятность жизни крайне мала из-за высокой концентрации аммиака в атмосфере и океанах. Тем не менее учёные не отказались от возможности обнаружить жизнь в таких экстремальных условиях.
		#LOC_KS_Kcalbeloh_description = Kcalbeloh — сверхмассивная чёрная дыра, центр системы Kcalbeloh. У неё нет джета и перегретого голубого аккреционного диска, что указывает на то, что она, вероятно, не поглощала звезду миллионы лет.
		#LOC_KS_Maelg_description = Maelg — наименее массивная и самая холодная звезда в системе Kcalbeloh, излучающая значительно меньше света, чем другие. Классифицируется как коричневый карлик L-типа.
		#LOC_KS_Mehtna_description = Mehtna — холодная планета, приливно заблокированная Maelg. Большая часть поверхности покрыта толстыми ледяными шапками, кроме области у подзвёздной точки, прозванной «Тёплым полюсом». Из-за низкого атмосферного давления вода кипит при температуре ниже комнатной, поэтому вода существует в основном в виде льда или пара.
		#LOC_KS_Meiuqer_description = Meiuqer — небольшая планета с исключительно эксцентричной орбитой. Температура поверхности сильно колеблется в зависимости от расстояния до Maelg.
		#LOC_KS_Noi_description = Noi — троянский астероид, либрирующий вокруг точки Лагранжа L4 между Sunorc и системой Simetra-Simeht, расположенной на 60° впереди барицентра двойных планет по орбите.
		#LOC_KS_Noira_description = Noira — спутник, обращающийся ближе всего к барицентру двойной планетной системы Simetra-Simeht; единственный в системе Kcalbeloh с ретроградной орбитой. На поверхности гигантский кратер, указывающий на значительное столкновение с крупным небесным телом в прошлом.
		#LOC_KS_Norihc_description = Norihc — холодный спутник, обращающийся вокруг барицентра двойных газовых гигантов. Несмотря на ледяную поверхность, он геологически активен и имеет множество глубоких трещин в толстых ледяных шапках.
		#LOC_KS_Noyreg_description = Noyreg — каменистый спутник с крайне плотной атмосферой, скрывающей поверхность под толстыми облаками. Атмосфера имеет завораживающий зелёный оттенок, но посадка считается крайне опасной из-за высокой концентрации коррозийных и токсичных компонентов в воздухе.
		#LOC_KS_Onrefni_description = Onrefni — карликовая планета, обращающаяся в непосредственной близости от Kcalbeloh и испытывающая сильные приливные силы, разорвавшие её поверхность.
		#LOC_KS_Rouqea_description = Rouqea — удивительный океанический мир, полностью покрытый водой. В отличие от Laythe, её океан уникален: огромные глубины при экстремальном давлении могут создавать мантию из экзотического льда. Таинственные глубины продолжают привлекать исследователей.
		#LOC_KS_Sedah_description = Sedah — горячий газовый гигант, обращающийся очень близко к Sunorc. Высокие температуры атмосферы придают ему лёгкое свечение. Несмотря на размер, сопоставимый с Jool, масса составляет лишь около седьмой части от Jool, что даёт менее плотную, более «пушистую» атмосферу.
		#LOC_KS_Sera_description = Sera — бесплодная каменистая планета с выразительной системой колец и несколькими крупными озёрами. К сожалению, озёра токсичны, и признаков жизни на Sera не обнаружено.
		#LOC_KS_Simeht_description = Simeht — меньшая планета в системе двойных газовых гигантов, также классифицируется как ледяной гигант. В отличие от Simetra, её облачные пояса и штормы трудно наблюдать в видимом свете.
		#LOC_KS_SimeSystem_description = Это барицентр системы двойных газовых гигантов.
		#LOC_KS_Simetra_description = Simetra — крупнейший ледяной гигант в системе Simetra-Simeht. Голубой вид обусловлен следами метана во внешних областях; другие регионы, как полагают, окрашены в зелёный и жёлтый неизвестными соединениями.
		#LOC_KS_Suluco_description = Suluco — планета, похожая на Kerbin, приливно заблокированная Sunorc: одна сторона всегда обращена к звезде, другая — в вечной тьме. Это разделённый мир с резким контрастом полусфер: бесконечный день с одной стороны и вечная ночь с другой. Граница — узкое кольцо вечных сумерек, единственный регион, потенциально пригодный для жизни.
		#LOC_KS_Sunorc_description = Sunorc — звезда главной последовательности K-типа, также известная как оранжевый карлик. Меньше и холоднее Kerbol, что делает её особо интересной в поиске внеземной жизни. У Sunorc больший срок жизни и меньше УФ-излучения, что повышает вероятность обитаемых планет в системе.
		#LOC_KS_Tot_description = Астероидный спутник, обращающийся вокруг Suluco.
		#LOC_KS_Uleg_description = Uleg — холодная планета с орбитой, уводящей её далеко от Kcalbeloh. Поверхность в основном покрыта льдом. Сильно наклонённая и эксцентричная орбита указывает на то, что она, вероятно, была захвачена Kcalbeloh.


