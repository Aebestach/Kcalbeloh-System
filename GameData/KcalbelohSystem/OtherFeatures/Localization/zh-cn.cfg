		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGeneric = Elad的荒地与Efil茂密的丘陵和晶莹海洋形成鲜明对比，是宇宙中生命脆弱性的严峻提醒。
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraters = 与附近Eulb等天体相比，这些撞击坑的稀疏性质很大程度上支持Elad相当近期有厚大气的说法。
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterLarge = Elad各处散布着几个这样的大撞击坑，似乎都是相当年轻的特征。
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterGiant = 这个巨大撞击坑大到可能是导致Elad失去大气的原因，但无法确定。
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCanyon = 这条峡谷如此陡峭深邃，一定是曾经的海沟。
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowValleys = Elad布满深峡谷和裂谷，构成其过去活跃板块构造的清晰证据。
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCliff = 哇。那可真是悬崖。强烈的板块构造一定是造成如此巨大山脊的原因。
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceHigh = 研发部门说这些奇怪地表特征只能通过Elad近期失去厚大气可能还有海洋来解释。看起来如此荒凉……真的可能吗？

