		#LOC_KS_SciDef_evaReport_Noyreg_FlyingLow = 在Noyreg的低层大气中飞行，我对遮蔽了这个卫星表面的旋转云层感到惊叹。空气变得更加令人窒息，充满了具有腐蚀性和有毒化合物的威胁。
