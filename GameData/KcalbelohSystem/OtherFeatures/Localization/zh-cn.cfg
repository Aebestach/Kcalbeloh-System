		#LOC_KS_SciDef_mobileMaterialsLab_Efil_SrfLanded = 在Efil宜人的景观中，我的团队展开了对这颗卫星地质组成的复杂研究。精密仪器细致地分析着各种岩石和矿物，揭示了它形成的秘密，展示了塑造这颗太空宝石的元素力量之间的复杂相互作用。我们的发现将加深对Efil独特地质学的理解，并为我们对行星演化的整体理解做出贡献。
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_SrfSplashed = 在Efil湛蓝的怀抱中，我们的材料研究出现了意想不到的转折，当我们冒险进入其晶莹海洋的深处。通过分析水下样本，我们发现了异国矿物之间的相互作用，揭示了这颗卫星隐藏的宝藏。水域环境与地质构成之间的复杂关系在我们眼前展开，点燃了我们的科学好奇心，扩展了对这个神秘世界的理解。
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_FlyingLow = 在降落到Efil迷人的低层大气时，我们的材料研究揭示了其岩石地形的复杂组成。通过精确的分析和仪器测量，我们检查了存在的独特矿物和元素，勾勒出了这颗卫星地质图景的生动画卷。
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_FlyingHigh = 在Efil的高层大气中，我们的材料研究进入了未知的领域。大气化合物和复杂的矿物形成之间的相互作用暗示了这个迷人世界与其引人入胜的环境之间深刻的相互关系。

		#LOC_KS_SciDef_barometerScan_Efil_Srf = 当我们的脚稳固地踏上Efil充满活力的地表时，我们展开了气压计，精确测量大气压力。读数反映了这颗行星动态的特性，气压的波动暗示着塑造其微妙平衡的看不见的力量。
		#LOC_KS_SciDef_barometerScan_Efil_FlyingLow = 在探索Efil低层大气时，我们的气压计记录了大气压力的微妙波动。数据捕捉到大气气流的动态相互作用，暗示了塑造这个充满活力世界的复杂机制。
		#LOC_KS_SciDef_barometerScan_Efil_FlyingHigh = 在Efil高层大气，气压计记录了随高度逐渐减小的大气压力，向宇宙的真空过渡。

		#LOC_KS_SciDef_seismicScan_Efil_SrfLanded = 当我们踏上Efil令人叹为观止的地表时，我们的地震扫描仪器开始与行星的地质展开复杂的交互。震动和回波穿越地层，揭示了地表下隐藏的秘密，绘制出地下和Efil古老内核的错综复杂的网络。每一次地震脉冲都回响着行星的历史，描绘出它丰富多彩的地质图景，揭示了一个与其地表景观一样充满活力和神秘的世界。

		#LOC_KS_SciDef_gravityScan_Efil_SrfLanded = 当我们站在Efil令人陶醉的地表上，我们开始进行重力扫描，揭示行星隐藏的奥秘。当我们的仪器精确测量微小的重力力量波动时，我们获得了地表下质量分布，行星板块间的错综复杂的相互作用。
		#LOC_KS_SciDef_gravityScan_Efil_InSpaceLow = 在广阔的太空中，我们的航天器在Efil上方展开重力扫描，捕捉到引力作用下的天体舞蹈。在失重状态中，我们观察到Efil引力场的轻轻牵引和拉力，绘制出塑造宇宙结构的错综复杂图案。
		#LOC_KS_SciDef_gravityScan_Efil_InSpaceHigh = 在浩瀚无垠的太空中，我们的航天器冒险飞越令人陶醉的Efil世界，捕捉到引力力量的天体之舞。从这个高远的视角，我们目睹了Efil与宇宙伴侣之间的错综复杂相互作用，追踪了时空结构中的曲线和涟漪。

		#LOC_KS_SciDef_magnetometer_Efil_InSpace = 在广袤的太空中，我们的磁力计探测着环绕着Efil的磁场。我们探测到行星磁场微妙的波动和起伏磁力计扫描揭示了Efil磁场与塑造其存在的天体力量之间错综复杂的舞蹈。

		#LOC_KS_SciDef_atmosphereAnalysis_Efil_Srf = 在 Efil 的表面，我们的大气分析显示出丰富的氧气含量。 空气中弥漫着淡淡的植物香气，让人联想到为这个迷人的世界增光添彩的茂密森林。此外，我们还检测到悬浮在大气中的细小气溶胶的存在，为装点地平线的令人惊叹的视觉景观增添了一抹迷人的色彩。
