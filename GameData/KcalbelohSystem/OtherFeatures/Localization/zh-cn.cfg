		// Sedah
		#LOC_KS_SciDef_crewReport_Sedah_FlyingLow = 当你的飞船降入这个炽热而蓬松的气态巨型行星的深处，你开始质疑自己的存在。
		#LOC_KS_SciDef_crewReport_Sedah_InSpaceLow = 行星的大气层似乎动荡不安，不断运动着。行星表面的强烈热量和压力形成了旋涡状的气体带，看起来不断变化、翻腾。机组成员还注意到，在靠近行星时，行星微弱的发光更加明显，营造出一种诡异而超凡脱俗的效果。尽管行星的条件恶劣，机组成员对这颗巨大气态行星的美丽和壮丽感到敬畏。
		#LOC_KS_SciDef_crewReport_Sedah_InSpaceHigh = 机组成员报告称，由于行星大气层的高温，Sedah在太空中显示为一个明亮的发光球体。从远处看，它的大小类似于Jool。相对较低的大气密度使它呈现出"蓬松"的外观。机组成员指出，研究Sedah的大气组成将有助于更好地了解炽热气态巨型行星的特性。

		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingLow1 = 当飞船穿越Sedah的低层大气时，温度读数显示出显著的升高。在这个高度，强烈的热量和压力使飞船的仪器难以正常工作，机组成员必须采取特殊预防措施，以避免损坏设备。
		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingLow2 = 极端的压力使温度计在达到最大值之前就被压碎了。
		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingHigh = 温度读数显示相比外层空间环境，温度显著升高。行星大气层散发的热量使飞船周围产生明亮的光芒。

		#LOC_KS_SciDef_evaReport_SedahFlyingLow = 你思考着为什么你觉得在一个气态巨星的深处进行出舱活动是个好主意。
		#LOC_KS_SciDef_evaReport_Sedah_InSpaceLow = 当小绿人走出飞船时，他们立刻被气态巨星的旋涡云层所震撼。大气层浓厚而朦胧，颜色变幻不定，随着移动而变化。尽管离行星表面很远，Kerbal仍能感受到行星散发的炽热，当他们漂浮在虚空中时，不禁感到自己的渺小，同时对巨大的气态巨星的尺寸和力量感到敬畏。
		#LOC_KS_SciDef_evaReport_Sedah_InSpaceHigh = Sedah在远处庞大而巨大，具有微弱而飘渺的光芒。恒星的明亮光芒在小绿人的宇航服上投下了长长的阴影，而Kerbal在空无一物中漂浮时感到失重。从这样的视角观察Sedah的壮丽景象是一种超现实而令人敬畏的体验。

		#LOC_KS_SciDef_mysteryGoo_Sedah_FlyingLow = 黏液在Sedah的较低大气层中被高温彻底烤焦了。

