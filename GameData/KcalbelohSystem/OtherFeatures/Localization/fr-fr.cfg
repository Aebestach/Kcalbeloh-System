		// ******************************** Descriptions des planètes ********************************
		#LOC_KS_Anehta_description = Anehta est une planète géante gazeuse dotée d'un magnifique système d'anneaux. Elle se caractérise par une couverture nuageuse perpétuelle, divisée en zones plus claires et en bandes plus sombres. En raison des schémas de circulation conflictuels de ces zones et bandes, la planète est sujette à des tempêtes violentes et à une forte turbulence.
		#LOC_KS_Ahtpan_description = Ahtpan est une planète rocheuse désertique dont les océans sont principalement composés de naphte. Bien qu'il puisse sembler judicieux d'y construire une usine pétrochimique, le Kerbal Space Center (KSC) conseille à tous les kerbonautes de garder leur casque lors de l'exploration. L'atmosphère de la planète dégage en effet une forte odeur de naphtaline !
		#LOC_KS_Anneheg_description = Anneheg est une planète à l'apparence sombre et charbonneuse qui orbite très près d'Aralc-A. En raison de sa proximité avec l'étoile, la chaleur et la lumière intenses ont fait fondre une grande partie de sa surface, formant des rivières et océans de lave, ainsi que des tempêtes de métal vaporisé fréquentes. Avec ses conditions inhospitalières, Anneheg est considérée comme l'une des planètes les plus infernales jamais découvertes.
		#LOC_KS_AralcA_description = Aralc-A est la première étoile du système binaire dans le système Kcalbeloh et est considérée comme l'étoile la plus brillante et la plus massive du système. Sa température élevée et sa couleur bleu-blanc suggèrent qu'il s'agit d'une étoile de type A de la séquence principale.
		#LOC_KS_AralcB_description = Aralc-B, la seconde étoile du système binaire, est une petite étoile de faible masse classée comme étoile de type M de la séquence principale, également connue sous le nom de naine rouge.
		#LOC_KS_AralcSystem_description = Ceci est le barycentre du système d'étoiles binaires.
		#LOC_KS_Arorua_description = Arorua est une grande planète rocheuse en rotation synchrone avec Aralc-B. En raison des vents solaires intenses émanant d'Aralc-B, des aurores peuvent être observées depuis tout l'hémisphère faisant face à Aralc-B. Parallèlement, son atmosphère est progressivement soufflée par le vent solaire de la naine rouge.
		#LOC_KS_Dipuc_description = Dipuc est la seule lune de Sera et sa surface est marquée par de grands cratères, indiquant qu'elle a absorbé de nombreux impacts météoritiques sévères qui auraient autrement frappé Sera. La lune est également géologiquement active, avec un nombre important de volcans actifs et de montagnes massives visibles même depuis Sera.
		#LOC_KS_Efil_description = Efil apparaît comme un saphir niché près d'Anehta lorsqu'on la regarde de loin. Son atmosphère charmante et ses belles plages en font une destination de vacances idéale. Peut-être que le Kerbal Space Center (KSC) y construira une station balnéaire à l'avenir. Reste à savoir qui pourrait s'offrir le billet pour visiter cette planète lointaine.
		#LOC_KS_Elad_description = Elad est la plus grande lune d'Anehta et fut la première des lunes d'Anehta à être découverte. On pense qu'Elad avait une atmosphère dans le passé et qu'elle abritait même de l'eau liquide à sa surface, mais il reste un mystère pourquoi la lune a perdu ces caractéristiques au fil du temps.
		#LOC_KS_Enots_description = Enots est une petite lune astéroïde intégrée dans le système d'anneaux d'Anehta, et elle est considérée comme la plus petite lune connue d'Anehta.
		#LOC_KS_Eulb_description = Eulb est… une lune bleue.
		#LOC_KS_Iomena_description = Iomena est une planète rocheuse avec de grands cratères et des océans. Les recherches scientifiques indiquent que la probabilité de vie sur cette planète est extrêmement faible en raison des fortes concentrations d'ammoniac présentes dans l'atmosphère et les océans. Néanmoins, les scientifiques n'ont pas abandonné la possibilité de découvrir la vie dans de tels environnements extrêmes.
		#LOC_KS_Kcalbeloh_description = Kcalbeloh est un trou noir supermassif et le centre du système Kcalbeloh. Il n'a pas de jet ni de disque d'accrétion bleu surchauffé, indiquant qu'il n'a probablement pas dévoré d'étoile depuis des millions d'années.
		#LOC_KS_Maelg_description = Maelg est l'étoile la moins massive et la plus froide du système Kcalbeloh, et par conséquent elle émet significativement moins de lumière que les autres étoiles. Elle est classée comme naine brune de type L.
		#LOC_KS_Mehtna_description = Mehtna est une planète glaciale en rotation synchrone avec Maelg. La majorité de sa surface est couverte d'épaisses calottes glaciaires, sauf la région près du point sub-stellaire, surnommée le « Pôle Chaud ». En raison de la faible pression atmosphérique, l'eau bout bien en dessous de la température ambiante, existant principalement sous forme de glace ou de vapeur d'eau.
		#LOC_KS_Meiuqer_description = Meiuqer est une petite planète à l'orbite exceptionnellement excentrique. Sa température de surface varie considérablement selon sa distance par rapport à Maelg.
		#LOC_KS_Noi_description = Noi est un astéroïde troyen qui libère autour du point de Lagrange L4 entre Sunorc et le système Simetra-Simeht, situé à 60° avant le barycentre des planètes binaires sur leur orbite.
		#LOC_KS_Noira_description = Noira est la lune orbitant le plus près du barycentre du système de planètes binaires Simetra-Simeht, et elle est unique dans le système Kcalbeloh pour avoir une orbite rétrograde. Sa surface présente un cratère géant, suggérant un impact important d'un corps céleste relativement grand dans le passé.
		#LOC_KS_Norihc_description = Norihc est une lune glaciale qui orbite autour du barycentre des géantes gazeuses binaires. Malgré son extérieur glacé, elle est géologiquement active et présente de nombreuses fissures profondes sur ses épaisses calottes glaciaires.
		#LOC_KS_Noyreg_description = Noyreg est une lune rocheuse à l'atmosphère extrêmement dense, qui obscurcit sa surface sous d'épaisses couches nuageuses. Son atmosphère a une teinte verte envoûtante, mais l'atterrissage sur cette lune est considéré comme extrêmement périlleux en raison des fortes concentrations de composants corrosifs et toxiques dans l'air.
		#LOC_KS_Onrefni_description = Onrefni, une planète naine, orbite en extrême proximité de Kcalbeloh, subissant de fortes forces de marée qui ont déchiré sa surface.
		#LOC_KS_Rouqea_description = Rouqea est un fascinant monde océanique entièrement recouvert d'eau. Contrairement à Laythe, son océan est unique et distinct, avec des profondeurs immenses pouvant produire un manteau de glace exotique en raison de la pression extrême. Ses profondeurs mystérieuses et attrayantes continuent de captiver l'attention des chercheurs et scientifiques.
		#LOC_KS_Sedah_description = Sedah est une géante gazeuse chaude qui orbite très près de Sunorc. Ses températures atmosphériques élevées lui donnent une légère lueur. Bien que similaire en taille à Jool, elle ne fait qu'environ un septième de la masse de Jool, résultant en une atmosphère moins dense et plus « floconneuse ».
		#LOC_KS_Sera_description = Sera est une planète rocheuse stérile avec un magnifique système d'anneaux et plusieurs grands lacs. Malheureusement, les lacs sont toxiques et il n'y a aucune preuve connue de vie sur Sera.
		#LOC_KS_Simeht_description = Simeht, la plus petite planète du système de géantes gazeuses binaires, est également classée comme géante de glace. Cependant, contrairement à Simetra, ses bandes nuageuses et tempêtes sont difficiles à observer en lumière visible.
		#LOC_KS_SimeSystem_description = Ceci est le barycentre du système de géantes gazeuses binaires.
		#LOC_KS_Simetra_description = Simetra est la plus grande géante de glace du système de géantes gazeuses binaires Simetra-Simeht. Son apparence bleue est attribuée aux traces de méthane trouvées dans ses régions les plus externes, tandis que d'autres régions semblent colorées en vert et jaune par des composés inconnus.
		#LOC_KS_Suluco_description = Suluco est une planète de type Kerbin en rotation synchrone avec Sunorc, ce qui signifie qu'un côté de la planète fait toujours face à l'étoile tandis que l'autre est dans une obscurité perpétuelle. C'est un monde bifurqué, avec un contraste marqué entre les deux hémisphères. Un côté connaît un jour sans fin tandis que l'autre est plongé dans une nuit éternelle. La frontière entre les deux moitiés est un anneau étroit de crépuscule éternel, seule région pouvant potentiellement abriter la vie.
		#LOC_KS_Sunorc_description = Sunorc est une étoile de type K de la séquence principale, également connue sous le nom de naine orange. Elle est plus petite et plus froide que Kerbol, ce qui la rend particulièrement intéressante dans la recherche de vie extraterrestre. Sunorc a une durée de vie plus longue et émet moins de rayonnement UV, augmentant la probabilité de planètes habitables dans son système.
		#LOC_KS_Tot_description = Une lune astéroïde orbitant autour de Suluco.
		#LOC_KS_Uleg_description = Uleg est une planète glaciale dont l'orbite l'éloigne de Kcalbeloh. Sa surface est principalement recouverte de glace. Son orbite fortement inclinée et excentrique suggère qu'elle a probablement été capturée par Kcalbeloh.


