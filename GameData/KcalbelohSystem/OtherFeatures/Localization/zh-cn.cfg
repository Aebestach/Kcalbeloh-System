		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedNeedleleafForests = 小绿人尺寸的无脊椎动物融入雪中，外骨骼与周围一样苍白。一个在取样钻伸出时朝飞船跳出来，但在碰到之前停下了，似乎感觉到刚性外表没什么温度，决定会是糟糕的午餐。
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTundra = Efil的苔原荒芜，但远非无生命。可以看到一些巨大的迁徙食草动物，尽管是无脊椎动物仍覆盖着厚毛。凭借长而灵活的腿，它们可以站直达到近三倍高度，触及除最高树以外的所有。
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedColdDesert = 北极沙漠只有极少数大型动物，但地下土壤充满活动。令人惊讶的微小毛茸茸生物，昆虫大小，在雪中匆忙穿行，挖隧道找耐寒植物的营养根收获。
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedMountains = 可惜在这个海拔没什么可看的。Efil最高峰的地表几乎无生命，然而，仍能看到巨大的长喙生物带着巨大翅膀在悬崖上栖息。在行星之夜，当Efil穿过Anehta的阴影时，这些动物飞向天空捕捉海洋生物，一路带回这里喂养饥饿的幼崽。

		// Eulb
		#LOC_KS_SciDef_dmMagScan_Eulb_SrfLanded = Eulb的磁场相当弱，但从地表用仪器不难检测。此外，附近有几个更小更强的局域磁场。

		#LOC_KS_SciDef_rpwsScan_Eulb_InSpace = Eulb的弱磁场在其环绕巨行星运行时对Anehta的磁场产生迷人的畸变。

		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowGeneric = 那么，为什么是蓝色的？我们讨论了吗？有人在研究吗？找——找人研究。
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersSmall = 这让我"蓝色即视感"……懂吗？
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersBig = Eulb最大的撞击坑有时难以与月海区分。它们几乎像是被风化过，但能做到这一点的只有微陨石撞击。Eulb到底有多老？
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowDoubleCrater = 哦，有个有趣的特征。这似乎是两个嵌套的撞击坑——一个较大，一个较小。最内层的坑似乎是两者中较年轻的。
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceHigh = 蓝月亮……好吧。Jeb，是时候穿上小鸡装了。

		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceLow = 对Eulb地表的光谱扫描显示卫星地表几乎处处强烈的红外吸收。这指向蓝色刚玉，俗称蓝宝石，作为其醒目蓝色的罪魁祸首。
		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceHigh = 极其稀薄的大气附着在Eulb地表。太薄无法用气压计检测。

		#LOC_KS_SciDef_dmSIGINT_Eulb_InSpaceLow = 多次无线电监视经过在Eulb上没有发现什么有趣的。

		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLanded = 扫描显示Eulb上没有显著量的地下氢。
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPoles = 此处的低水平氢可能由散布的水冰沉积解释。
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPolarCrater = 此处检测到相当强的氢信号，可能因为极地撞击坑大部分区域处于永久阴影中。

		#LOC_KS_SciDef_dmlaserblastscan_Eulb_SrfLanded = 对Eulb地表的化学分析显示硅酸盐相对贫乏，铝和氧极其丰富。这指向蓝色刚玉作为其蓝色着色的原因，俗称蓝宝石的物质。

		#LOC_KS_SciDef_dmSolarParticles_Eulb_InSpace = Eulb的弱磁场几乎无法偏转恒星风，但Anehta反正替它做了很多工作。

		#LOC_KS_SciDef_dmSoilMoisture_Eulb_InSpaceLow = 检测到弱微波信号，但仅当天线指向极地时。

		#LOC_KS_SciDef_dmRadiometerScan_Eulb_InSpaceHigh = Eulb反照率相当高。其明亮地表在除红色和红外外的所有记录波长反射大量光。

		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLanded = 地震扫描被粉状蓝色月壤吸收得相当好。在更坚实的位置如大撞击坑可能获得更好结果。
		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLandedCratersBig = 对Eulb内部的分析揭示致密成分，可能像地表一样富含氧化铝如刚玉。

		// Elad
		#LOC_KS_SciDef_dmMagScan_Elad_SrfLanded = 磁力线朝奇怪方向延伸，似乎指向偏离自转轴约40度的一对磁极。
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceLow = Elad有强大的磁场，强度可与Kerbin相比。
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceHigh = 在此距离Anehta的磁干扰稍有减弱，Elad似乎正在产生相当大的自身磁场。

