		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Lowlands = Лоулендс, как и следовало ожидать, находится на небольшой высоте, по крайней мере, по сравнению с окружающей местностью, с пологими склонами и похожими на дюны холмами, охватывающими всю Лоулендс. Местный состав поверхности напоминает тот, что встречается в Мидлендсе и Хайленде, хотя он выглядит как рыхлая, похожая на реголит смесь более мелких частиц, чем в любом биоме. Мне действительно интересно, откуда они берут измерения средней высоты поверхности «на уровне моря», учитывая, что не существует глобальных океанов, которые можно было бы использовать в качестве основы?
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Midlands = Кажется, Мидлендсу свойственна скалистая и ухабистая местность. Относительная высота над уровнем моря здесь значительно выше средней высоты Низменности. Местный состав кажется идентичным низменностям и высокогорьям - предположительно силикатный материал с оксидами, металлами, лантанидами и редкими промежуточными актинидами. Размеры частиц здесь выше, и более крупные камни иногда слипаются с соседними камнями.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Highlands = Хайлендс, как и ожидалось, находится на большой высоте по сравнению с остальной частью поверхности Купидона-*кхм*-Dipuc и имеет сходный состав с Мидлендсом и Лоулендом. Местный рельеф неровный и крутой, несколько выше, чем в Мидлендсе. Я настоятельно советую сохранять осторожность при исследовании крутых склонов и дюноподобных сооружений. Размеры частиц, нет, КАМНИ здесь особенно значительны и создают помеху для более мелких передвижных транспортных средств.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Mountains = Значительные возвышения относительно уровня моря определяют как горные хребты, так и Кордильеры, независимо от атмосферы мира или ее отсутствия, как в данном случае. Внутренние оттенки поверхности напоминают цвета Низин, Мидлендса и Хайленда, хотя текстура и внешний вид отличаются от условностей вышеупомянутых трех биомов. Здесь поверхностные породы, по-видимому, претерпели частичный метаморфоз. Кроме того, концентрации актинидов и лантаноидов, обильные в ядрах дифференцированных небесных тел, повышены по сравнению с окружающими биомами. Неметаморфизованные породы здесь представляют значительную опасность для малых и средних вездеходов, хотя более крупные могут сулить хорошие перспективы.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Poles = Полярные регионы Dipuc демонстрируют такой же уровень вызывающего скуку рельефа, как и большая часть поверхности в других местах - аналогичный оттенок, аналогичный состав, аналогичная температура и так далее. Уровни температуры вызывают некоторую интригу, учитывая большее распространение радиации Sunorc в более высоких широтах, хотя полетная и внекорабельная деятельность должна столкнуться здесь с минимальными экологическими препятствиями, как и везде, за исключением вулканических жерл.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterSouth = Плоские области Южного гигантского кратера расположены ниже, чем большая часть окружающей его местности. Поверхностные породы указывают на предыдущую метаморфозную активность, вероятно, в результате удара, в результате которого первоначально образовался Южный гигантский кратер. Оттенки скал в этом месте кажутся немного темнее, чем окружающая местность, возможно, это тоже из-за удара? Учитывая активные вулканические жерла Dipuc, можно предположить, что дно кратера состоит из комбинации метаморфических и магматических пород, хотя нынешний вид поверхности противоречит таким предположениям.
