		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Day = 在Suluco的昼半球进行的物质研究取得了有趣的发现。分析的表面材料显示出广泛的风化和侵蚀迹象，很可能是由于持续的阳光照射和太阳风所致。行星这一侧的高温导致了独特的矿物组成和结构的形成，表明存在新奇的地质过程。
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Twilight = Suluco的暮光带展示了复杂的有机化合物和独特的地质和化学过程。表面材料表明存在奇异的外星生命，并提供了对该行星生物学和天体生物学的洞察。动态的风和永恒的黄昏塑造了这个地区的地质和化学，为Suluco的生物学、天体生物学和地质历史提供了宝贵的见解。
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Night = Suluco的夜半球，即行星的永恒黑暗一侧，由于极端的环境条件（包括冰冻温度和缺乏阳光），对物质研究提出了独特的挑战。对表面材料的初步分析显示存在冰冻水和挥发性化合物，为了解该行星的地质和化学组成提供了宝贵的见解。
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfSplashed = 在Suluco的海洋中进行物质研究取得了有趣的结果。对从海洋中收集的水样进行的分析显示出独特的化学特性，包括稀有矿物和在行星其他部分没有发现的有机化合物的高浓度。暮光带的持续强风被认为在海洋的组成中起着作用，影响物质的分布并塑造行星的奇特的外星生命形式。

		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Day = 在Suluco的昼半球进行的气压扫描确认了在昼半球地表附近存在一个低压区，其中空气受到阳光的加热，密度降低并上升。这些上升的空气在上层大气朝着夜半球移动。
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Twilight = 在Suluco的暮光带进行的气压扫描揭示了一个独特的大气压力模式，受到昼半球和夜半球之间的明显温差的影响。扫描结果表明，暮光带的地表附近经历着持续的强风，朝着昼半球方向吹去，很可能是由于邻近的昼半球和夜半球之间的温度梯度所驱动的。暮光带的狭窄环形区域形成了一个气压动态变化以及充满湍流的大气区域。
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Night = 气压测量显示出夜半球地表附近的大气压力较高，因为在高层大气来自昼半球的空气在到达夜半球时冷却并下降，密度增大，从而形成一个高压区。下降的空气然后沿着地表返回到昼半球，形成了完整的大气循环。
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingLow = 在Suluco的低层大气中进行的气压扫描揭示了复杂的压力分布模式。在昼半球，空气受到恒星的加热，成为低压区，因为加热导致空气升起和密度降低。相反，夜半球在低层大气中呈现出高压区，因为冷却导致密度增加并下降。
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingHigh = 在Suluco的高层大气中进行的气压扫描，考虑到全球的大气条件，为我们提供了有关复杂的压力分布模式的宝贵见解，这些模式受到行星的潮汐锁定的性质以及昼半球与夜半球之间的温差的影响。

