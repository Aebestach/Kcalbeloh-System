		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_VolcanoVent = 你处于非常、非常危险的境地。高温足以穿透你的宇航服，火山口仍在活动，建议你悬浮在火山口上方而非踏入其中，以免化作一缕青烟。除此之外，火山口壁内以火成岩为主，下壁在高温下略显熔融且已变质。这是否与 Sera 有关，还是 Dipuc 的火山活动独立于母星的任何机制？\n\n\n若不想重蹈 Acapello 1 机组的覆辙，请立即离开此地。

		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Lowlands = Dipuc 的低地从这里看……相对平坦，平原上散落着波纹状的「沙丘」和偶尔出现的活火山。假设你正处于卫星的日照面，地表色调酷似生面团。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Midlands = 与低地类似，中地的色调像新鲜生面团，不过因地表更为崎岖而显得更凹凸不平。\n\n若 Dipuc 的色调像生面团、Minmus 像薄荷冰淇淋，有没有像意面或披萨的世界？\n\n\n\n不，Io 不算——当前推测仅限游戏内的天体。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Highlands = 高地因海拔较高而显得更起伏，看上去离飞船更近——除非飞船处于危险的低轨，那样的话在碰撞风险面前，距离感已无关紧要。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Mountains = 山脉与飞船的距离……令人目眩又心生畏惧。几条山脊的线条宛如波涛。若不是缺乏大气且山脉呈奶棕色，或许会误以为是常年环绕 Rouqea 的滔天巨浪。\n\n以 Dipuc 的重力参数，在山区着陆并仅凭 EVA 推进剂返回低轨飞船是有可能的，就像在 Minmus 上一样。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Poles = 极地没有任何种类的冰——水冰、干冰、甲烷、氨等一概没有，鉴于 Dipuc 是与 Minmus 大小和质量相当的真空世界，也不该指望会有。极地本身与低纬度的其余地表高度相似，只是这里没有火山活动。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterSouth = 啊，南部巨型撞击坑！一片广阔……平坦的……盆地。作为这颗地貌丰富的卫星的标志性撞击坑，这很符合直觉。按理说这里应有中央峰，但光学和重力扫描未发现任何暗示哪怕是侵蚀后中央峰的异常。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterEast = 东部巨型撞击坑，一道令人失望的平坦裂隙，据称地表景致壮观，宛如身处干旱的大峡谷……或是一圈高耸泥石流环伺，随时准备用裹满岩石的泥流将你吞没。视觉扫描除了与周围高海拔及山地略有色差外，几无特别发现。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterWest = 西部巨型撞击坑上空最初没什么可记。包围撞击坑的高地和中地地表色调略深，缺少中央峰，地表视野不错，或许像站在宽阔峡谷底部仰望崖壁，此外便无太多特别之处。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_DoubleCrater = 双撞击坑盆地主要由两个撞击坑组成：一个较老较大，一个较新较小——小坑的坑缘侵入大坑便是证据。眼尖的小绿人或许能看出两坑中心区与周围低中海拔地带的细微色差。鉴于凝固火成岩往往呈深色，中心区可能是先前广泛岩浆活动的痕迹，或可解释此处及 Dipuc 其他大型撞击坑为何缺少中央峰。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Volcano = 在 Dipuc 这样小巧的世界上出现火山活动听来有些奇怪。此处的火山从外观推测为层状火山结构——火山锥由多次喷发形成的多种火成岩和火山喷发物叠加而成，以 Dipuc 的时间尺度算相当近期。由于地形陡峭倾斜，在此着陆似乎不可行。
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_VolcanoVent = 火山口内膛呈现白炽熔融状，看来仍在活动。热读数显示温度无变化。你暂时是安全的。要确保你继续作为任务中活着的、会呼吸的、能干活的一员，只需做到：<color=#FF6A00>不要在活跃火山口上方继续下降。</color>若你的飞船有驾驶舱，还请确保舱内大气不是纯氧——易燃物在纯氧环境下若超过其最高工作温度，很可能自燃。

