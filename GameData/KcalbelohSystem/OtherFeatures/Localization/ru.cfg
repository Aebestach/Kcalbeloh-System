		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowMountainsAll = Пики Иомены выделяются тем, что большинство из них покрыты каким-то ярким веществом. Хотя, возможно, это не водяной лед...
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowCanyonsAll = Эти каньоны действительно выглядят весьма драматично. Но достаточно ли плотна атмосфера, чтобы пролететь сквозь них? Нам нужно это выяснить, прямо сейчас!
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowCraters = Холодные берега затопленных кратеров Иомены, должно быть, захватывают дух. Даже из космоса в них есть какая-то одинокая красота.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowOceans = Что бы это ни было, скорее всего, это не вода. Условия должны быть подходящими для жидкого аммиака на поверхности, поэтому, если мы приземлимся там, ПОЖАЛУЙСТА, помните, что не пейте его.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceHigh = Издалека тускло-серые черты Иомены показывают явные признаки прошлого и настоящего потока жидкости на поверхности; хотя это далеко от Kcalbeloh, скорее всего, здесь слишком холодно для жидкой воды.

		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowGeneric = Судя по мультиспектральному анализу, серо-голубая поверхность Иомены представляет собой довольно стандартную смесь различных силикатных минералов и аммиака.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowWater = Согласно показаниям ИК-излучения, эта жидкость имеет подходящую температуру для аммиака.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowMountainsAll = ИК-сигнатура указывает на то, что яркое вещество, покрывающее горы Иомены, вероятно, представляет собой аммиачный лед.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceHigh = Тонкая атмосфера Иомены содержит в основном аммиак, хотя показания предполагают наличие следов метана и углекислого газа. Эти следы могут быть биосигнатурой, что требует дальнейшего изучения!

		#LOC_KS_SciDef_dmSIGINT_Iomena_InSpaceLow = Единственная радиоактивность здесь, помимо «холарного ветра» Kcalbeloh, возникает в результате взаимодействия между ним и тонкой атмосферой Иомены.

		#LOC_KS_SciDef_dmNAlbedoScan_Iomena_SrfLanded = Поверхность Иомены повсеместно насыщена водородом; однако подавляющее большинство из них вряд ли будет водой. Более вероятно, что это аммиак и, возможно, какие-то органические соединения.

		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedGeneric = Сканирование шлейфа, образовавшегося в результате испарения поверхности, указывает на наличие нескольких богатых железом силикатов, сильно насыщенных аммиаком.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedOceans = Согласно нашему анализу, эта влажная почва пропитана жидким аммиаком. Есть также некоторые простые углеводороды, внедренные в почву.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfSplashed = Взрыв жидкости подтверждает почти полное отсутствие воды; вместо этого обнаруживаются только аммиак и углеводороды с короткой цепью.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedMountainsAll = Ярко-белое вещество, покрывающее эту горную вершину, похоже, представляет собой аммиачный лед.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedCanyonsAll = Здесь обнаружены богатые железом породы, возможно, упавшие со стен каньона.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedLowlands = В низменных регионах Иомены, вероятно, с течением времени собираются самые плотные и богатые железом породы. Это помогло бы объяснить очень высокое содержание железа в здешней земле.

		#LOC_KS_SciDef_dmSolarParticles_Iomena_InSpaceLow = Следы аммиака застревают в коллекторах, но кроме этого здесь больше ничего нет. Даже «холарный ветер» исчез.
		#LOC_KS_SciDef_dmSolarParticles_Iomena_InSpaceHigh = «Холарный ветер» из Kcalbeloh уже немного слабее на этом расстоянии, поскольку даже при своих огромных размерах он не излучает столько энергии, сколько большинство звезд.

		#LOC_KS_SciDef_dmSoilMoisture_Iomena_InSpaceLow = Низкое микроволновое излучение помогает подтвердить гипотезу о том, что на поверхности Иомены преобладает аммиак, а не вода.

		#LOC_KS_SciDef_dmRadiometerScan_Iomena_InSpaceHigh = В основном серая поверхность Иомены имеет общее низкое альбедо, а ее атмосфера поглощает большинство видимых длин волн, что указывает на наличие большого количества газообразного аммиака.

		#LOC_KS_SciDef_dmseismicHammer_Iomena_SrfLandedRocky = Камень здесь хорошо резонирует, давая сенсорам четкое представление о внутренней структуре Иомены. Есть несколько больших подземных пещер, которые, вероятно, размыты потоками жидкого аммиака, а большая часть земной коры имеет каменистый состав. Водяного льда на удивление мало.
		#LOC_KS_SciDef_dmseismicHammer_Iomena_SrfLandedWet = Влажная (с жидким аммиаком) мягкая почва здесь не особенно хорошо передает сейсмические волны. Итак... Что, вы взяли этот молоток и сразу же начали искать самую мягкую почву, какую только смогли найти? Просто пойдите куда-нибудь еще, Iomena довольно непростая.

		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedOceansShallow = Жидкость определенно представляет собой аммиак, но в ней также имеется значительная концентрация некоторых сложных органических молекул. У них может быть несколько потенциальных причин, но одно из них действительно имеет биологическую природу. Нам следует пойти глубже!
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedOceansDeep = Камера показывает гидротермальное отверстие... или... как бы вы его ни называли, в аммиаке. В любом случае, он выбрасывает черный дым, что указывает на некоторый уровень нынешней вулканической активности на Иомене. Настоящее открытие произошло в образце аммиака: новые углеводороды продолжают образовываться, а под микроскопом обнаруживаются крошечные организмы, метаболизирующие содержимое дымового шлейфа!
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedCraterLakesShallow = Сложные органические молекулы плавают в аммиачном озере и позволяют предположить потенциальное существование жизни на Иомене, несмотря на холод и токсичную окружающую среду. Если здесь что-то и живет, то, скорее всего, в нашем доме будет слишком жарко.
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedCraterLakesDeep = Самая глубокая часть этого озера демонстрирует продолжающееся образование углеводородов в самом глубоком и теплом регионе планеты. Соединения серы и фосфора также дрейфуют через воду, что указывает на ограниченную вулканическую активность в других местах. Более пристальный взгляд под микроскопом подтверждает наши подозрения: микроорганизмы действительно используют летучие вещества и превращают их в углеводороды!

		#LOC_KS_SciDef_dmbiodrillscan_Iomena_SrfLandedRocky = Порода здесь содержит следы органики, но других признаков биологической активности нет.
		#LOC_KS_SciDef_dmbiodrillscan_Iomena_SrfLandedWet = В этом образце керна обнаружена значительная концентрация органических молекул и летучих элементов, в первую очередь серы и фосфора.

		// Uleg
		#LOC_KS_SciDef_dmMagScan_Uleg_SrfLanded = Даже на поверхности магнитное поле Ulegа исчезающе слабое.
		#LOC_KS_SciDef_dmMagScan_Uleg_InSpaceHigh = На этой высоте магнитное поле не обнаружено. Вполне вероятно, что у Ulegа нет железо-никелевого ядра, поскольку его крайняя орбита должна вызывать значительные приливные силы.

		#LOC_KS_SciDef_rpwsScan_Uleg_InSpace = Радиоплазменная среда резко меняется в зависимости от положения Ulegа на его орбите. Рядом с Апобело очень тихо. Но в перибело можно почувствовать «холарный ветер» из Ккальбело; хотя бы едва-едва.

		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowGeneric = Рябая поверхность Ulegа немного напоминает мороженое из печенья и сливок. Когда публика увидит эти фотографии, у них потекут слюнки.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowCrater = Вот это чертовски кратер. Однако он настолько размыт, что потребовалось некоторое время, чтобы действительно идентифицировать его как таковой.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowRiftValleys = Этот массивный каньон простирается по поверхности Ulegа, образуя гигантскую цепь, идущую до самого северного полюса. Это могло бы стать феноменальной трассой для воздушных гонок, если бы не чрезвычайно разреженная атмосфера. Будь ты проклята, судьба! Ну... Возможно, для НАСТОЯЩИХ смельчаков это еще сработает. Также есть возможность наземных гонок!
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowBasins = Широкий открытый бассейн кажется очень равнинным. Это может быть хорошим местом для строительства базы, если вам это понравится. Но, учитывая абсурдную орбиту Ulegа, возможно, для этого есть места получше.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowMountains = Крошечные горы усеивают поверхность Ulegа, словно крошки шоколадного печенья в огромном океане ванильного мороженого. Черт возьми, теперь ты снова голоден!
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceHigh = Это тусклое одеяло, кажется, мерцает в темноте, словно шарик неотразимого десерта. Он практически умоляет тебя подойти ближе...

		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceLow = Анализ поверхности показывает, что поверхность Ulegа в основном состоит из водяного льда.
		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceLowMountains = Данные изображений темных гор Ulegа показывают, что поверхность все еще представляет собой водяной лед. Вероятно, его более темный цвет обусловлен другой кристаллической структурой.
		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceHigh = Согласно анализу широкого спектра, тонкая атмосфера Ulegа, по-видимому, состоит в основном из азота, а также со значительными количествами метана и углекислого газа.

		#LOC_KS_SciDef_dmSIGINT_Uleg_InSpaceLow = Разреженная, спокойная атмосфера Ulegа и удаленность от Калбело создают довольно неинтересную радиосреду.

		#LOC_KS_SciDef_dmNAlbedoScan_Uleg_SrfLanded = Четкий сигнал нейтронов низкой энергии подтверждает, что большая часть поверхности Ulegа состоит из водяного льда. Морозный!

		#LOC_KS_SciDef_dmlaserblastscan_Uleg_SrfLandedGeneric = Химический анализ ледяной поверхности Ulegа показывает, что большая часть бланета покрыта тонким слоем твердого, хрупкого водяного льда, под которым находится гораздо более твердый и темный лед. В этом поверхностном покрытии также присутствуют следы метанового льда и углекислого льда. Возможно, его занес сюда холодный ветер.
		#LOC_KS_SciDef_dmlaserblastscan_Uleg_SrfLandedMountainsCliffs = Эта область Ulegа имеет более темную окраску, чем остальные, но анализ показывает, что химический состав по-прежнему представляет собой в основном водяной лед, вероятно, имеющий другую кристаллическую структуру, чем тонкий слой, покрывающий остальную часть поверхности.

		#LOC_KS_SciDef_dmSolarParticles_Uleg_InSpace = Вдали от Kcalbeloh «холарный ветер» очень редкий, и он становится еще более редким, когда Uleg находится высоко на его орбите. Это означает, что коллектору нечего обрабатывать, кроме следов частиц азота, вероятно, из атмосферы Ulegа.

		#LOC_KS_SciDef_dmSoilMoisture_Uleg_InSpaceLow = Судя по микроволновому излучению, Uleg в основном состоит из воды, которое очень сильное независимо от того, под каким регионом Uleg в данный момент находится.

		#LOC_KS_SciDef_dmRadiometerScan_Uleg_InSpaceHigh = Поверхность Ulegа имеет довольно высокое альбедо в видимом и ИК-спектрах, однако, похоже, она сильно поглощает ультрафиолетовый свет. Это указывает на большое количество водяного льда на поверхности.

		#LOC_KS_SciDef_dmseismicHammer_Uleg_SrfLanded = Хрупкая ледяная поверхность легко трескается от удара молота, но волны по-прежнему распространяются довольно хорошо. Показания указывают на активный криовулканизм на всей территории Ulegа.

		#LOC_KS_SciDef_dmbiodrillscan_Uleg_SrfLanded = Образец керна полон льда, метана и небольшого количества углекислого газа, но не более того. Маловероятно, что метан имеет биологическое происхождение.

		// Maelg
		#LOC_KS_SciDef_rpwsScan_Maelg_InSpaceLow = Несмотря на то, что Maelg сплавляет дейтерий и литий, похоже, он не покидает объект — или, по крайней мере, в значительных количествах.
		#LOC_KS_SciDef_rpwsScan_Maelg_InSpaceHigh = Будучи коричневым карликом, Maelg на самом деле не создает солнечного ветра. Тем не менее, магнитная активность дает некоторые интересные показания.

		#LOC_KS_SciDef_scopeScan_Maelg_InSpaceLow = Несмотря на то, что Maelg не является звездой (технически), с такого расстояния он довольно яркий. К счастью, в телескопе были фильтры. Он делает снимки бушующих оранжевых штормов Maelgа в высоком разрешении; как какая-то безумная версия Jool, сделанная из огня!
		#LOC_KS_SciDef_scopeScan_Maelg_InSpaceHigh = Телескоп легко может сфокусироваться на Maelgе без каких-либо повреждений благодаря своей очень низкой светимости, что позволяет ему делать очень подробные снимки субзвездного объекта.

		#LOC_KS_SciDef_dmImagingPlatform_Maelg_InSpace = Спектральный анализ Maelgа подтверждает более раннюю классификацию объекта L-типа и показывает явные доказательства того, что дейтерий и литий превращаются в гелий-3 и гелий-4 соответственно.

		#LOC_KS_SciDef_dmSIGINT_Maelg_InSpaceLow = Из Maelgа постоянно исходит настоящий взрыв радиоизлучения, поскольку его недра бурлит и бурно течет.

		#LOC_KS_SciDef_dmSolarParticles_Maelg_InSpaceLow = В коллекторах отложено несколько изотопов гелия, но их далеко не так много, как можно было бы получить от настоящей звезды.
		#LOC_KS_SciDef_dmSolarParticles_Maelg_InSpaceHigh = Будучи коричневым карликом L-типа, Maelg в результате синтеза дейтерия и лития не производит заметного солнечного ветра, и коллекторы остаются пустыми.

		#LOC_KS_SciDef_dmSoilMoisture_Maelg_InSpaceLow = Обнаружено мощное микроволновое излучение, но невозможно, чтобы оно возникло из-за водных отложений, поскольку Maelg - КОРИЧНЕВЫЙ КАРЛИК. На случай, если вы забыли. Не планета и не звезда.

		#LOC_KS_SciDef_dmRadiometerScan_Maelg_InSpaceHigh = Maelg излучает сравнительно мало света в видимом спектре, но гораздо более заметен в ИК-диапазоне. В любом случае, на таком расстоянии это нетрудно увидеть.

		// Mehtna
		#LOC_KS_SciDef_dmMagScan_Mehtna_SrfLanded = Магнитное поле Mehtna остается слабым, хотя его легко обнаружить с поверхности.

		#LOC_KS_SciDef_rpwsScan_Mehtna_InSpace = Поскольку атмосфера Mehtna довольно спокойная, планете не хватает сильного магнитного поля, а Maelg не испускает значительного солнечного ветра, здесь практически нет никакой активности, которую можно было бы обнаружить.

		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowDay = В темно-коричневых «ирисах» Mehtna присутствует несколько интересных особенностей, образующих уникальные узоры.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowIce = Красивые замысловатые трещины проходят по поверхности Mehtna в освещенных местах, создавая завораживающие фотографии.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowNight = Хм... Да, это конечно темно, ладно.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowGrandCrater = Поверхность Мехтны практически лишена кратеров, что делает это огромное место весьма поразительным!
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceHigh = «Теплый столб» Mehtna делает его действительно похожим на глазное яблоко, всегда смотрящее прямо на Maelgа. На самом деле это немного жутковато.

		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowDayGrandCrater = Мультиспектральные снимки более темной поверхности Mehtna указывают на то, что она в основном состоит из стандартных силикатов.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowIce = Белое вещество, по-видимому, представляет собой водяной лед, как и было предсказано нашим предыдущим анализом температуры и атмосферы планеты. Жидкости нет, потому что низкое давление заставляет воду сублимировать непосредственно в газ.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowNight = ИК-сканы показывают пустынную поверхность «полюса холода» Mehtna, покрытую кратерами и практически лишенную трещин, видимых на видимой стороне.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceHigh = Спектральный анализ показывает, что атмосфера Mehtna состоит в основном из углекислого газа и водяного пара — последний, вероятно, образуется в результате сублимации льда на дневной стороне.

		#LOC_KS_SciDef_dmSIGINT_Mehtna_InSpaceLow = Хм... К сожалению, от Mehtna не исходит ничего, кроме радиомолчания.

		#LOC_KS_SciDef_dmNAlbedoScan_Mehtna_SrfLandedRock = Более темные районы Mehtna, что, возможно, довольно неожиданно, в основном лишены водных отложений. Вероятно, это связано с тем, что при таких температурах и давлениях вода сублимируется непосредственно в газ, а не превращается в жидкость.
		#LOC_KS_SciDef_dmNAlbedoScan_Mehtna_SrfLandedIce = Замерзшая поверхность здесь производит сильный низкоэнергетический нейтронный сигнал, подтверждающий, что это водяной лед.

		#LOC_KS_SciDef_dmlaserblastscan_Mehtna_SrfLandedRock = Лазерный анализ говорит о большем количестве силикатов. Ура! Это совсем не скучно! Нисколько...
		#LOC_KS_SciDef_dmlaserblastscan_Mehtna_SrfLandedIce = Все в свойствах Mehtna, от ее температуры до атмосферы, говорит о том, что это может быть только водяной лед. Позвольте вам догадаться, что показывает химический анализ.

		#LOC_KS_SciDef_dmSolarParticles_Mehtna_InSpace = Пространство возле Mehtna очень пусто, как и было на орбите Maelgа. Но вблизи планеты есть следы углекислого газа.

		#LOC_KS_SciDef_dmSoilMoisture_Mehtna_InSpaceLow = Микроволновые излучения делают очевидным, что большая часть Мехтны покрыта водяным льдом, хотя даже над более сухими областями, обращенными к солнцу (обращёнными к карликам?), сохраняется постоянный фон. Это можно было бы четко объяснить водяным паром в атмосфере.

		#LOC_KS_SciDef_dmRadiometerScan_Mehtna_InSpaceHigh = Большое темное пятно Mehtna и подпись, поглощающая УФ-излучение, подтверждают, что она покрыта водяным льдом, а спектры ее атмосферы предполагают, что большая часть ее состава состоит из углекислого газа и водяного пара.

		#LOC_KS_SciDef_dmseismicHammer_Mehtna_SrfLanded = Подповерхностные отражения показывают мало свидетельств геологической активности на Метне.

		#LOC_KS_SciDef_dmbiodrillscan_Mehtna_SrfLanded = Образец керна, к сожалению, остается инертным.

		// Meiuqer
		#LOC_KS_SciDef_dmMagScan_Meiuqer_SrfLanded = Вы проверяете магнитометр из принципа. Ничего, даже локализованных магнитных полей, создаваемых отложениями металлов.

		#LOC_KS_SciDef_rpwsScan_Meiuqer_InSpace = В этом конкретном маленьком уголке космоса прибору RPWS практически нечего обнаружить. Почти никакой радиоактивности, никакой солнечной плазмы, ничего. Но вы все равно это проверьте. На всякий случай.

		#LOC_KS_SciDef_scopeScan_Meiuqer_InSpaceLow = О, это на самом деле довольно милый маленький камень. Закрученный и коричневый, он напоминает дырку от пончика, покрытую коричневым сахаром.
		#LOC_KS_SciDef_scopeScan_Meiuqer_InSpaceHigh = Мммм.... Космические картошки...

		#LOC_KS_SciDef_dmImagingPlatform_Meiuqer_InSpace = Это камень! Я знаю, что это камень! Тебе не кажется, что я узнаю камень, когда вижу камень? Я провожу много времени, рассматривая фотографии камней!

		#LOC_KS_SciDef_dmSIGINT_Meiuqer_InSpaceLow = Камни не излучают радиосигналы, дурак.

		#LOC_KS_SciDef_dmNAlbedoScan_Meiuqer_SrfLanded = Знаете, когда я подписывался на наблюдение за космическими полетами, я ожидал, что увижу много взрывов. Не смотрите весь день на скучную телеметрию.

		#LOC_KS_SciDef_dmlaserblastscan_Meiuqer_SrfLanded = Я на твоем рокке, Лазрин на твоем камне.

		#LOC_KS_SciDef_dmSolarParticles_Meiuqer_InSpace = На мгновение можно было поклясться, что коллектор солнечных частиц храпит.

		#LOC_KS_SciDef_dmSoilMoisture_Meiuqer_InSpaceLow = Никаких показаний микроволновой печи, кроме показаний микроволновой печи в космическом центре — стажер, контролирующий передачу, разогревает острую лапшу.

		#LOC_KS_SciDef_dmRadiometerScan_Meiuqer_InSpaceHigh = У Meiuqerа очень низкое альбедо из-за его темной поверхности, и этот факт усугубляется чрезвычайной тусклостью света, исходящего от Maelgа.

		#LOC_KS_SciDef_dmseismicHammer_Meiuqer_SrfLanded = Будучи астероидом с «кучей обломков» низкой плотности, Meiuqer удерживается вместе очень слабо, и некоторые обломки от удара, несомненно, достигли скорости убегания. Это также означает, что у вас нет полезных данных.

		// Sunorc
		#LOC_KS_SciDef_dmMagScan_Sunorc_InSpaceLow = Судя по всему, у бума возникли проблемы с сохранением структурной целостности, поскольку в настоящее время он превращается в жидкость.

		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceLow = Прибор обнаруживает многочисленные солнечные пятна, анализируя радиоволны, излучаемые с поверхности Sunorc.
		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceHigh = Эта звезда К-типа излучает мощные солнечные ветры, как это обычно делают большинство звезд. Взаимодействие с магнитосферой Sedah примечательно, поскольку радиоволны, излучаемые планетой, слабее, чем ожидалось для объекта такого размера.

		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceLow = Ну, это была пустая трата денег. Возможно, вы только что испортили орбитальный телескоп.
		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceHigh = Ты маньяк! Вы пытаетесь уничтожить телескоп? Это устройство предназначено для съемки планет!

		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceLow = Вы лишились гарантии.
		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceHigh = Ну, это была плохая идея. Чувствительные инструменты автоматически отключаются в момент обучения на Sunorc и, возможно, были повреждены.

		#LOC_KS_SciDef_dmSIGINT_Sunorc_InSpaceLow = Как и большинство звезд, Солнцерк излучает радиоволны в широком спектре. Всплески радиоактивности, по-видимому, коррелируют с образованием и движением солнечных пятен.

		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceLow = Подавляющая плотность солнечного ветра вынуждает устройство отключиться, предотвращая сбор полезных данных. Надеюсь, он не поврежден.
		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceHigh = Солнечный ветер Sunorc типичен для звезды, хотя он немного слабее, чем у звезды G-типа, такой как Kerbol.

		#LOC_KS_SciDef_dmSoilMoisture_Sunorc_InSpaceLow = Возможно, было бы лучше не размещать чувствительное оборудование для обнаружения микроволнового излучения на низкой звездной орбите. Возможно. Возможно.

		#LOC_KS_SciDef_dmRadiometerScan_Sunorc_InSpaceHigh = Солнце излучает много света в большинстве зарегистрированных длин волн, однако, как звезда K-типа (или оранжевый карлик), оно излучает значительно меньше синего и ультрафиолетового света, чем звезда G-типа (или желтый карлик), такая как Kerbol. Из-за более низкой температуры эти типы звезд могут жить на миллиарды лет дольше, чем желтые карлики.

		// Sedah
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceLow = Солнечный ветер сильно сотрясает пухлую атмосферу Sedah, производя странные сигналы изнутри планеты. Это предполагает, что по планете проходит электрический ток, который производит много внутреннего тепла и помогает объяснить ее огромный размер. Однако он не должен быть таким мощным, как ожидалось, поскольку этот ток создает только магнитное поле, которое, хотя и мощное, но немного слабое по сравнению с Joolом.
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceHigh = Заряженная плазма взрывает Седу, в результате чего образуется захватывающий повторяющийся узор радиоволн, который должен дать сотрудникам лаборатории множество данных для изучения.

		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceLow = На фотографиях крупным планом видны кружащиеся турбулентные облака и огромные ураганы, некоторые из которых достаточно велики, чтобы поглотить целые планеты!
		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceHigh = Планета светится благодаря теплу своей атмосферы, из-за чего даже темная сторона тускло светится.

		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceLow = Состав атмосферы позволяет предположить, что обычно планета имела более кремовый оттенок, но из-за сильной жары она светится тускло-красным.
		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceHigh = Sedah очень сильно излучает тепло, из-за чего излучает гораздо больше ИК-излучения, чем обычно излучает газовая планета.

		#LOC_KS_SciDef_dmSIGINT_Sedah_InSpaceLow = Радиоизлучение Sedah чрезвычайно разнообразно и чрезвычайно мощно, вероятно, из-за сложного взаимодействия между солнечным ветром и его собственными внутренними процессами.

		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceLow = На ночной стороне наблюдаются следы частиц водорода и гелия, движущихся по орбите через огромную экзосферу Sedah. На дневной стороне коллектор обдувается заряженными частицами солнечного ветра.
		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceHigh = Здесь не наблюдается ничего особенного, кроме солнечного ветра, хотя есть небольшие следы обычного водорода и гелия, которые становятся более распространенными при вращении вокруг Sedah.

		#LOC_KS_SciDef_dmSoilMoisture_Sedah_InSpaceLow = Сильные микроволновые излучения, обнаруженные на орбите Sedah, без сомнения, производятся внутренними механизмами планеты.

		#LOC_KS_SciDef_dmRadiometerScan_Sedah_InSpaceHigh = Интенсивные тепловые показания зафиксированы при сканировании Sedah, даже на ночной стороне. Это явно вызвано смехотворно высокой температурой планеты-гиганта.

		// Suluco
		#LOC_KS_SciDef_dmMagScan_Suluco_SrfLanded = Судя по всему, Suluco имеет слабое магнитное поле с поверхности, а это означает, что он не обеспечивает такой защиты от солнечного ветра, как было бы идеально. Однако жизнь в сумеречной полосе все равно сохраняется, поскольку пребывание на солнце там и так ограничено.
		#LOC_KS_SciDef_dmMagScan_Suluco_InSpaceHigh = На таком расстоянии магнитное поле Suluco очень слабое. Кажется, что он не простирается очень далеко над поверхностью.

		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceHigh = Относительно слабая магнитосфера Suluco не отклоняет большую часть солнечного ветра Sunorc, но, похоже, делает достаточно, чтобы защитить жизнь на поверхности.
		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceLow = Анализ плазменных волн указывает на наличие диффузного кольца заряженных частиц вокруг экватора Suluco; признаки слабого пояса Ван Кермана.

		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceHigh = Хотя Suluco называют планетой-глазом, на самом деле он не очень похож на глаз. Однако резкий контраст между так называемым «горячим полюсом» и сумеречной полосой поразителен.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDay = Дневная сторона Suluco почти ослепительно яркая и выглядит сухой, как кость. Бесконечные моря катящихся песчаных дюн характеризуют этот регион.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDayPole = Субзвездная точка ослепляет; он отражает много света и выглядит настолько горячим, что на нем, наверное, можно приготовить яйца. Кажется, даже облака испарились.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowNight = Ничего не вижу.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowTwilight = В узких регионах Suluco с умеренным климатом есть холмистые зеленые холмы и открытые океаны. На нескольких фотографиях вы заметили, что облака вращаются вокруг дневного и ночного полюсов, а не вокруг оси вращения планеты.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowWater = Океаны Suluco, как и вся жизнь, ограничены узкой полосой вдоль терминатора дня и ночи. Океанские течения в этих регионах не похожи ни на что, что кербалы когда-либо видели раньше.

		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceHigh = Всестороннее сканирование атмосферы Suluco в УФ- и ИК-спектрах показало, что она, как и ожидалось, в основном состоит из азота и кислорода.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDay = Дневная сторона Suluco излучает свет прямо на Санорк, отражая много света как в УФ, так и в ИК-спектрах.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDayPole = Субзвездная точка отражает большую часть солнечного света, вызывая заметный всплеск ИК-показаний.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowNight = Инфракрасное изображение позволяет более четко рассмотреть ночную сторону Suluco. Топография, как ни странно, во многом похожа на дневную сторону – в ней преобладают холмы и горы. Интересно, однако, что ночная сторона Suluco также покрыта кратерами.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowTwilight = Обнаруженные в ходе анализа следы газов демонстрируют явные признаки продолжающейся биологической активности в сумеречной полосе, хотя со временем они стихают, чем дальше вы смотрите в дневную или ночную сторону.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowWater = Тепловизионное изображение показывает подводную топографию океанов Suluco. Учитывая необычную географию, здесь будет чему поучиться.

		//Non-Homeswitch Suluco Only
		#LOC_KS_SciDef_dmSIGINT_Suluco_InSpaceLow = Солнечный ветер производит довольно интересную радиоволновую активность, но на самом деле в этом нет ничего необычного.

		//Suluco Homeswitch Only
		#LOC_KS_SciDef_dmSIGINT_SulucoHome_InSpaceLow = Радиосканирование улавливает разбросанные сигналы от различных наземных колоний и структур. Некоторые небольшие аванпосты расположены даже в дневном и ночном полушариях. Кербалы здесь не так давно, но за это время мы уже начали чувствовать себя в Suluco как дома. Если вы настроите его правильно, вы даже сможете приобрести новейшую игру в хедбол!

		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDay = Следов подповерхностного водорода здесь практически нет. Лишь крошечные следы существуют в местах постоянной тени.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDayPole = В подзвездной точке поверхность не сухая, как кость — по крайней мере, там есть НЕМНОГО воды. Единственный водород здесь, по-видимому, состоит из следов постоянного солнечного ветра.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDesert = В этом регионе есть немного водорода, что указывает на то, что вода скрыта немного ниже поверхности. Здесь сухо, но можно выжить.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedNight = Согласно водородному сканированию... или, э-э, визуальному сканированию, твердый водяной лед покрывает каждую поверхность на ночной стороне. Холодный снег дует и течет, как песок, в лишенных света пустошах.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedTwilight = Очень высокие концентрации водорода обнаружены в почве сумеречной полосы, в основном, конечно, в воде. Здесь находится большая часть жидкой воды планеты.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedWater = Чрезвычайно влажная поверхность здесь, естественно, содержит много водорода и поглощает большую часть нейтронов. Вы надеетесь, что не загрязняете океан или что-то в этом роде.

		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedTwilight = В выбросах обнаруживаются соединения углерода из листвы, а также некоторых типов горных пород.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDesert = Эта выжженная пустыня до сих пор демонстрирует явные признаки жизни: при испарении верхнего слоя скалы обнаруживаются крошечные туннели, вырытые инопланетными насекомыми, и корни выносливой травы.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDay = Отбеленная солнцем поверхность не содержит заметного органического компонента; это все просто песок и камни.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNight = Во тьме ночной стороны обнаруживаются лишь водяной лед и следы различных минералов. Даже горы покрыты толстыми постоянными ледниками, твердыми, как скала.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNightCraters = Этот ударный кратер содержит значительно больше минеральных соединений и металлов на поверхности, чем окружающие вечные ледники, почти наверняка происходящие от ударного элемента, образовавшего кратер.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfSplashedWater = Испарение жидкости подтверждает, что это действительно вода, но, конечно, вам не нужен этот специальный инструмент, чтобы это определить.

		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceLow = Помимо несколько ослабленного солнечного ветра, в пластины также внедряются частицы азота и кислорода из атмосферы Suluco.
		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceHigh = Слабое магнитное поле Suluco мало что делает для предотвращения воздействия солнечного ветра на пластины; окружающая среда здесь мало чем отличается от межпланетного пространства.

		#LOC_KS_SciDef_dmSoilMoisture_Suluco_InSpaceLow = Микроволновое излучение L-диапазона довольно постоянно на большей части поверхности Suluco, однако по мере того, как антенна проходит над дневным полушарием, показания постепенно падают практически до нуля над субзвездной точкой.

		#LOC_KS_SciDef_dmRadiometerScan_Suluco_InSpaceHigh = Альбедо резко меняется в зависимости от того, видит ли датчик больше дневного полушария или сумеречного диапазона; гораздо больше, чем большинство небесных тел.

		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedTwilight = Мягкая почва поглощает часть волн, но все же дает представление о том, как меняется геология на дневной и ночной сторонах Suluco.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedDay = Песчаная дневная сторона Suluco прекрасно поглощает сейсмические волны, поэтому многому здесь научиться не получится. Может быть, вам больше повезет в горах?
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedNight = Снег здесь плотно утрамбован, поэтому почерпнуть из данных что-либо полезное невозможно. Горные ледники могут дать больше информации.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsDayTwilight = Твердая поверхность хорошо проводит сейсмические волны, что дает вам широкие возможности для изучения внутренней части Suluco. Похоже, что Suluco все еще довольно геологически активен, хотя вулканическая активность очень редка.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsNight = Похожий на скалу ледник четко отражается на коре Suluco, демонстрируя наличие массивных подземных пещер, которые могут содержать жидкую воду, и потенциально изолированных экосистем!
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedWater = Рыхлая почва является плохим отражателем сейсмических волн, поэтому вы не получите много полезных данных.

		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterShallow = Мелкие сумеречные воды Suluco представляют собой целый зверинец микроскопической и макроскопической жизни; но нет ничего более интересного, чем «школы» колониальных растений. Они плавают огромными матами на поверхности океана, с массивными парусами, которые улавливают и ветер, и солнце.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterDeep = Глубоко под поверхностью по морскому дну перемещается множество разноцветных животных. Во многом они похожи на жизнь на Kerbinе, но сильно отличаются от других. Во-первых, без смены дня и ночи не существует и суточной вертикальной миграции.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanShallow = Холодные условия в океанах на темной стороне Suluco напоминают арктический океан, но поскольку он находится так близко к более теплым водам, температура меняется гораздо быстрее, и некоторые животные перемещаются между ними за считанные часы.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanDeep = Глубоководная жизнь на всей территории Suluco примерно одинакова. Будучи изолированным от солнца, независимо от местоположения, жизнь здесь трудно отличить от жизни в более теплых долготах.

		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTwilight = Образец керна изобилует жизнью; неудивительно, учитывая зеленый цвет земли здесь. Маленькие организмы прокладывают туннели в грязи и устраивают крошечные норы, где они в безопасности выращивают своих детенышей.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDesert = Несмотря на более суровые условия, жизнь здесь процветает так же, как и в пустынях Kerbin. Песок горячий, но он также дает ловким животным хорошую отсрочку от палящего солнца и представляет собой возможность в виде неиспользованных ресурсов, если кто-то окажется достаточно смелым, чтобы выдержать жару.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTundra = Сумеречные тундры Suluco всегда светятся жутким светом; вполне уместно, учитывая, что им холодно, как в могиле. Тем не менее, жизнь здесь сохраняется. В то время как на дневной стороне насекомые могут прятаться, спасаясь от солнца, здесь они зарываются, чтобы удерживать тепло и оставаться в тепле. Здесь гнездится множество животных, поскольку суровые условия также обеспечивают безопасность от хищников.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDay = Хотя вы и не ожидаете ничего найти, вы можете быть удивлены, увидев, что даже здесь выживают крошечные животные, а также выносливые микроорганизмы. Животные очень маленькие, и им приходится проводить почти всю свою жизнь под землей, чтобы избежать солнечного света, но они приспособились переносить жару в затененных местах. Поскольку солнце никогда не движется, эти затененные пятна постоянны.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNight = Ночная сторона Suluco пустынна и беспощадна, но если жизнь могла выжить на полюсах Kerbin, то она сможет выжить и здесь. В отличие от крошечных животных дневной стороны, эти животные обычно огромны, чтобы генерировать как можно больше тепла тела, которое они хранят в толстых слоях жира. Известно, что некоторые избранные виды мигрируют на короткие участки ночной стороны, чтобы избежать хищников.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDayPole = Несмотря на сохранение жизни на Suluco, скудное присутствие на дневной стороне постепенно угасает, пока вы не достигнете подзвездной точки — места настолько жаркого, настолько пустынного и негостеприимного, что ничто, кроме экстремофильных микроорганизмов, здесь не может выжить. И все же, несмотря ни на что, здесь живет НЕЧТО. Разве это не дико?
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNightPole = Ночной полюс — самая холодная часть Suluco. Нигде на Kerbin не так холодно. И все же... Один вид сохраняется. Титанические звери парят огромными стаями, перемещаясь от одного конца сумеречной полосы к другому, пересекая ночную сторону. Они преодолевают это расстояние за считанные дни, выживая благодаря толстой изоляции и скользя в плотном ледяном воздухе.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedWater = Некоторые морские организмы, кажется, отложили здесь яйца на берегу; обычное явление на пляжах Suluco. Крупные беспозвоночные откладывают здесь яйца, закапывая их в песок, чтобы защитить от водных хищников.

		// Tot
		#LOC_KS_SciDef_dmMagScan_Tot_SrfLanded = Никакой магнитной активности, кроме Suluco, по-прежнему нет.

		#LOC_KS_SciDef_rpwsScan_Tot_InSpace = Солнечный ветер от Sunorc здесь силен, он по-настоящему стихает только тогда, когда вы проходите через магнитосферу Suluco или тень Tot.

		#LOC_KS_SciDef_scopeScan_Tot_InSpaceLow = Телескоп очень детально фиксирует множество крошечных камней и кратеров на поверхности Tot, но кажется, что он слишком силен для этой работы.
		#LOC_KS_SciDef_scopeScan_Tot_InSpaceHigh = Если быть полностью честным по отношению к Тоту, это довольно милая картошка.

		#LOC_KS_SciDef_dmImagingPlatform_Tot_InSpace = Согласно мультиспектральному анализу, Тот представляет собой преимущественно каменный астероид. Хорошо, мы закончили?

		#LOC_KS_SciDef_dmSIGINT_Tot_InSpaceLow = Извините, ничего интересного здесь не происходит.

		#LOC_KS_SciDef_dmNAlbedoScan_Tot_SrfLanded = На сканах поверхности здесь не обнаружено ничего примечательного.

		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLanded = Астероид выглядит преимущественно каменистым, но на самом деле металла здесь немного больше, чем ожидалось. Дальнейшие исследования, особенно в нижних регионах, могут оказаться полезными.
		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLandedLowlands = В низменных регионах Tot концентрация металла гораздо выше, чем ожидалось. Похоже, композиция Tot представляет собой смесь рока и металла. Это могло бы объяснить его необычно высокую плотность.
		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLandedCraters = Ударные кратеры на Tot обнажают более глубокие части астероида, которые в основном состоят из металла. Если внутри все так, возможно, именно поэтому его гравитация более чем вдвое превышает гравитацию Джилли, несмотря на то, что он составляет чуть менее трети его размера.

		#LOC_KS_SciDef_dmSolarParticles_Tot_InSpace = Содержание солнечного ветра здесь ничем не отличается от того, что было на орбите Suluco.

		#LOC_KS_SciDef_dmSoilMoisture_Tot_InSpaceLow = Результаты эксперимента... к сожалению, слишком скучны, чтобы их описывать.

		#LOC_KS_SciDef_dmRadiometerScan_Tot_InSpaceHigh = Большая часть поверхности Tot темная и поглощает как видимый, так и инфракрасный свет, однако самые нижние области немного более отражающие. Любопытный...

		#LOC_KS_SciDef_dmseismicHammer_Tot_SrfLanded = Осторожный! Ты сломаешь его! Нет, не молот, дурачок, а астероид!
		#LOC_KS_SciDef_dmseismicHammer_Tot_SrfLandedLowlandsCraters = Удар резонирует сильнее, чем ожидалось, давая четкое представление обо всем внутреннем пространстве Tot. Похоже, что когда-то астероида было два — металлический астероид и каменный ударник. Это самое простое объяснение очень разнообразного состава, который варьируется от рыхлого, плохо резонирующего камня до твердых, богатых железом и никелем участков, которые становятся все более распространенными по мере погружения. Наверное, поэтому Тот такой тупой.

		// Sera
		#LOC_KS_SciDef_dmMagScan_Sera_SrfLanded = Линии магнитного поля тянутся во все стороны на поверхности Серы, указывая на явное присутствие поблизости множества мощных локальных магнитных полей.
		#LOC_KS_SciDef_dmMagScan_Sera_InSpaceHigh = Сильные магнитные показания, даже на такой высоте, указывают на то, что Серу окружает мощная магнитосфера. Возможно, приливные силы Dipuc помогли сохранить активность ядра Серы, но действительно ли оно достаточно близко для этого?

		#LOC_KS_SciDef_rpwsScan_Sera_InSpaceLow = Кольцо заряженных частиц, кажется, окружает Серу на низкой орбите; безошибочно опасный пояс Ван Кермана.
		#LOC_KS_SciDef_rpwsScan_Sera_InSpaceHigh = Когда вы проходите через магнитосферу Серы, и без того слабый солнечный ветер значительно ослабевает. Другие показания показывают, что магнитное поле Серы довольно сильное.

		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowLakes = Эти озера кажутся персиково-коричневыми, как и атмосфера. С первого взгляда невозможно определить, вода это или нет, просто взглянув.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowIslands = Маленькие острова выглядывают из огромных озер — или это внутренние моря? Остаётся задаться вопросом, как выглядит вид с этих чужих берегов.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowRiftValley = Похоже, это своего рода рифтовая долина, тип долины, образовавшейся в результате разрыва литосферы в результате тектоники растяжения. Это довольно явное свидетельство активной тектоники на Сере, по крайней мере, несколько сотен миллионов лет назад.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowGeneric = Холмы и равнины персикового цвета Серы выглядят очень аппетитно. Он начал слишком сильно напоминать вам фрукт.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowMountains = Колоссальные горные хребты занимают большую часть поверхности Серы. При более пристальном рассмотрении можно увидеть полосатые, похожие на вены впадины, простирающиеся между вершинами, которые образуют красивые узоры, не слишком отличающиеся от фрактала.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceHigh = С высоты над Серой его кольца видны во всех деталях. Цвет и яркость колец позволяют предположить, что они имеют каменистый состав — возможно, с небольшим количеством льда — и, вероятно, когда-то были маленькой луной, которая была разорвана на части. Со временем и с помощью некоторых симуляций мы, возможно, сможем выяснить, как могла выглядеть эта луна.

		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceLow = Спектральное сканирование показывает, что поверхность Серы содержит большое количество тяжелых металлов, в частности железа, алюминия и титана. Это помогает объяснить его розовато-коричневый цвет.
		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceLowLakes = Спектр поглощения этой жидкости ясно дает понять, что это вода, а не какая-то другая жидкость.
		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceHigh = Спектроскопический анализ колец Серы указывает на кремнистый состав, а не на металлический, как у его родительской планеты. Одно из возможных объяснений этого несоответствия состоит в том, что какое бы тело ни образовало эти кольца, оно было захваченным астероидом.

		#LOC_KS_SciDef_dmSIGINT_Sera_InSpaceLow = Сложные, но типичные радиопаттерны генерируются взаимодействием солнечного ветра Sunorc и атмосферы Серы.

		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedLakes = Нейтроны высоких энергий дают четкий ответ, указывающий на то, что, учитывая температуру и давление, жидкостью должна быть вода.
		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedLowlandsIslands = Почва здесь влажная, поэтому генерирует постоянный сигнал, указывающий на наличие подземных вод.
		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedRock = Порода здесь довольно сухая, и прибор обнаруживает лишь следы водорода под поверхностью.

		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedLowlands = Более розовые низменные участки Серы, кажется, состоят из богатой железом породы с большой долей алюминия и титана, которые разбавляют цвет и придают ему розовато-коричневый вид.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedMidlandsHighlands = Более темные и возвышенные районы Серы бедны алюминием и титаном по сравнению с низинами, что объясняет их цвет.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedMountains = Горы Серы, по-видимому, очень богаты природным магнитом, очень магнитной разновидностью железной руды.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedPeaks = Анализ показывает, что это вещество представляет собой водяной лед, что имеет смысл, учитывая высоту.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedPoles = На полюсах Серы, похоже, нет ледяных шапок, но анализ показывает, что здесь действительно существует легкий слой водяного льда.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedLakesIslands = Влажная почва здесь по-прежнему богата металлами, как и большая часть поверхности, однако здесь также имеется высокая концентрация воды.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfSplashed = Сканирование жидкости подтверждает, что это вода, как и ожидалось. Однако здесь высока концентрация тяжелых металлов и других токсинов; что делает присутствие жизни крайне маловероятным.

		#LOC_KS_SciDef_dmSolarParticles_Sera_InSpaceLow = В коллекторах накапливается большое количество заряженных частиц и следы углекислого газа, азота и даже некоторых тяжелых металлов. Это довольно четкое свидетельство существования пояса Ван Кермана, но остальные частицы, должно быть, происходят из атмосферы Серы.
		#LOC_KS_SciDef_dmSolarParticles_Sera_InSpaceHigh = Солнечный ветер на таком расстоянии стал довольно слабым, но собрать большое количество солнечных частиц с помощью концентратора ионов и пластин по-прежнему легко.

		#LOC_KS_SciDef_dmSoilMoisture_Sera_InSpaceLow = Сильные микроволновые излучения над озерами являются довольно четким свидетельством относительного изобилия воды на Сере.

		#LOC_KS_SciDef_dmRadiometerScan_Sera_InSpaceHigh = Поверхность и озера Серы, по-видимому, поглощают много ультрафиолетового и даже коротковолнового инфракрасного света, что позволяет предположить, что поверхность богата металлами и атмосфера насыщена углекислым газом.

		#LOC_KS_SciDef_dmseismicHammer_Sera_Rocky = Сейсмические волны, возникшие в результате удара, выявили очень тектонически активную планету. Плиты продолжают постепенно перемещаться по поверхности, и под действием небольших приливных сил со стороны ее кольцевой системы и Dipuc может образоваться сложная серия мелких деталей.
		#LOC_KS_SciDef_dmseismicHammer_Sera_Wet = Влажная земля не очень способствует сейсмическим отражениям, и вы не получите много полезных данных. Более высокая и скалистая точка обзора может быть лучшим выбором.

		#LOC_KS_SciDef_dmbathymetryscan_Sera_SrfSplashedShallow = Химический анализ рисует не очень приятную картину. Хотя жидкость представляет собой воду, она насыщена токсичными тяжелыми металлами, которые делают поддержание жизни очень маловероятным.
		#LOC_KS_SciDef_dmbathymetryscan_Sera_SrfSplashedDeep = Глубоко под поверхностью воды озера Серы не становятся менее токсичными. Существование здесь жизни крайне маловероятно.

		#LOC_KS_SciDef_dmbiodrillscan_Sera_SrfLanded = Образец керна полностью наполнен высокотоксичными тяжелыми металлами и в нем нет ничего, что можно было бы интерпретировать как биосигнатуру. Ну что ж.

		// Dipuc
		#LOC_KS_SciDef_dmMagScan_Dipuc_SrfLanded = Линии магнитного поля, кажется, следуют за объектами, которые не видны на его поверхности. Это может быть связано с тем, что расплавленная намагниченная порода течет глубоко внизу.
		#LOC_KS_SciDef_bothMagScan_Dipuc_InSpaceLow = У Dipuc довольно сильное магнитное поле, хотя оно и не такое мощное, как можно было бы ожидать. Это может означать, что его вулканическая активность вызвана сочетанием все еще расплавленного ядра и приливных сил Серы.
		#LOC_KS_SciDef_bothMagScan_Dipuc_InSpaceHigh = На этой высоте со стороны Dipuc обнаружены слабые магнитные показания. Если подойти ближе, будет легче проверить его точную силу.

		#LOC_KS_SciDef_rpwsScan_Dipuc_InSpaceLow = В космосе вблизи Dipuc солнечный ветер заметно отклоняется под действием его значительного магнитного поля.
		#LOC_KS_SciDef_rpwsScan_Dipuc_InSpaceHigh = Высоко над вулканической луной заряженные частицы встречаются так же часто, как и на орбите Серы.

		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowGeneric = Изрытая катастрофами и кратерами поверхность Dipuc, должно быть, представляет собой великолепные виды на земле. Нечасто увидишь такую ​​интересную безвоздушную луну. Да ведь он по крайней мере так же уникален, как и Сера!
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowCraterSouthCraterEast = Ударные выбросы исходят из этого кратера, как солнечные лучи. И ВАУ, эти строки выходят далеко! Что бы ни создало этот кратер, оно имело много энергии.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowCraterWest = Этот крупный кратер немного менее эффектен, чем два крупнейших, и об этом свидетельствует отсутствие ударных выбросов.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowDoubleCrater = С геологической точки зрения это вовсе не такое уж маловероятное образование. Но все равно приятно видеть, как края этих двух кратеров перекрываются друг с другом.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowVolcano = Все вулканы Dipuc постоянно активны, и незначительные извержения происходят довольно регулярно. Телескоп улавливает шлейф газа и пыли в форме зонтика, когда он вылетает из Dipuc и, вероятно, выходит на орбиту Серы.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowMountains = Эти ярко выраженные горные хребты в телескоп видны как день, и он захватывает поразительные изображения теней, которые они отбрасывают на поверхность внизу.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceHigh = Эта луна немного напоминает хорошо вымешанный комок теста. Судя по вулканической активности, он, похоже, хорошо запекается.

		#LOC_KS_SciDef_dmImagingPlatform_Dipuc_InSpaceLow = УФ-сканирование показывает исключительно тонкую, богатую серой атмосферу, висящую низко над поверхностью Луны, вероятно, активно создаваемую ее вулканами.
		#LOC_KS_SciDef_dmImagingPlatform_Dipuc_InSpaceHigh = Тепловизионное изображение показывает, что температура в Dipuc сильно различается, что тесно связано с вулканической активностью.

		#LOC_KS_SciDef_dmSIGINT_Dipuc_InSpaceLow = Удивительно, но Dipuc, похоже, излучает слабые радиоволны. Для определения причины, вероятно, потребуются долгосрочные исследования.

		#LOC_KS_SciDef_dmNAlbedoScan_Dipuc_SrfLanded = Судя по нейтронному сканированию, поверхность Dipuc довольно бедна водородом.
		#LOC_KS_SciDef_dmNAlbedoScan_Dipuc_SrfLandedPoles = Здесь указаны следы водорода, вероятно, происходящие из небольшого количества подземного водяного льда.

		#LOC_KS_SciDef_dmlaserblastscan_Dipuc_SrfLanded = Поверхность здесь состоит из силикатной породы, богатой тяжелыми металлами, что предполагает сходный состав с Серой и общее происхождение. Естественно, он встречается в виде вулканической породы.

		#LOC_KS_SciDef_dmSolarParticles_Dipuc_InSpaceLow = Коллектор солнечных частиц собирает следы серы и различных тяжелых металлов, вероятно, выброшенных в космос бесчисленными извержениями и выброшенных на орбиту гравитацией Серы.
		#LOC_KS_SciDef_dmSolarParticles_Dipuc_InSpaceHigh = Высоко над Dipucом солнечный ветер — это все, что может собрать коллектор.

		#LOC_KS_SciDef_dmSoilMoisture_Dipuc_InSpaceLow = Слабое микроволновое излучение обнаружено только на полюсах, но больше нигде. Dipuc, как и ожидалось, довольно сухой.

		#LOC_KS_SciDef_dmRadiometerScan_Dipuc_InSpaceHigh = Довольно темная вулканическая поверхность Dipuc имеет удивительно высокое альбедо в невидимых спектрах, за исключением ИК-длин волн.

		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLanded = Dipuc имеет сложную внутреннюю структуру. Первоначальные снимки, по-видимому, позволяют предположить, что Dipuc сформирован как все еще расплавленным ядром, так и приливными силами Серы.
		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLandedVolcano = Здесь невозможно четко понять внутреннюю структуру Dipuc из-за постоянного грохота. Тем не менее, это по-прежнему предоставляет интересные данные сами по себе.
		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLandedVolcanoVent = Итак, теперь. Не погружайтесь в лаву.

		// Noi
		#LOC_KS_SciDef_dmMagScan_Noi_SrfLanded = Хм. Нет, магнитного поля по-прежнему нет.
		#LOC_KS_SciDef_bothMagScan_Noi_InSpace = Уголь не излучает магнитного поля, невежда!

		#LOC_KS_SciDef_rpwsScan_Noi_InSpace = Солнечный ветер от Sunorc на таком расстоянии чрезвычайно редок, и Noi, похоже, не оказывает на него никакого влияния, кроме разделения потока, как крошечный камень в тихом потоке.

		#LOC_KS_SciDef_scopeScan_Noi_InSpaceLow = Куда делись звезды?! О, это просто Noi. Ложная тревога...
		#LOC_KS_SciDef_scopeScan_Noi_InSpaceHigh = Хорошо, я сдаюсь. На что я должен смотреть?

		#LOC_KS_SciDef_dmImagingPlatform_Noi_InSpaceLow = Богатые углеродом породы и еще несколько каменистых силикатных материалов обнаружены при детальном сканировании поверхности Ноя.
		#LOC_KS_SciDef_dmImagingPlatform_Noi_InSpaceHigh = Тепловизионное изображение показывает, насколько на самом деле холодно в Noi. Судя по сканированию, он углеродистый, но на таком расстоянии от Sunorc он вполне мог быть ледяным.

		#LOC_KS_SciDef_dmSIGINT_Noi_InSpaceLow = До-додо-до-дооооооооооо... Э, ничего. Никакой радиоактивности здесь нет.

		#LOC_KS_SciDef_dmNAlbedoScan_Noi_SrfLanded = В такой спокойной обстановке, практически лишенной окружающих нейтронов, можно получить высокоточные показания. Несмотря на свою удаленность от Sunorc, в Noi очень мало льда.

		#LOC_KS_SciDef_dmlaserblastscan_Noi_SrfLanded = Сканирование поверхности указывает на чрезвычайно богатую углеродом поверхность, усеянную другими минералами, в основном силикатами.

		#LOC_KS_SciDef_dmSolarParticles_Noi_InSpace = В окрестностях Ноя по сравнению с межпланетным пространством ничего особо не изменилось.

		#LOC_KS_SciDef_dmSoilMoisture_Noi_InSpaceLow = Лишь очень слабое микроволновое излучение указывает на то, что Noi на удивление сух для астероида, находящегося так далеко от Солнца. Возможно, он сформировался дальше и был выброшен во внешнюю систему и в конечном итоге оказался здесь.

		#LOC_KS_SciDef_dmRadiometerScan_Noi_InSpaceHigh = Теперь это один темный астероид. Noi сильно поглощает свет практически во всех спектрах, даже обладая большим УФ-поглощением для астероида C-типа. В результате получается объект, который едва виден, тем более что он находится так далеко от своей звезды.

		#LOC_KS_SciDef_dmseismicHammer_Noi_SrfLanded = Астероид с низкой плотностью довольно хорошо поглощает сейсмические волны, что затрудняет сбор данных. Но в любом случае нетрудно догадаться, как выглядит интерьер.

		// SimeSystem
		#LOC_KS_SciDef_rpwsScan_SimeSystem_InSpaceHigh = В эту часть космоса поступает очень мало солнечного ветра, поэтому почти вся радиоактивность здесь генерируется двумя массивными магнитными полями, взаимодействующими друг с другом и атмосферами других лун.

		#LOC_KS_SciDef_scopeScan_SimeSystem_InSpaceHigh = Замысловатый танец, который исполняют два тела, просто захватывает дух, и замедленная съемка фотографий доказывает это. Они как партнеры в каком-то гигантском, потрясающем небесном танго.

		#LOC_KS_SciDef_dmImagingPlatform_SimeSystem_InSpaceHigh = Спектральный анализ обоих тел показывает наличие большого количества метана в обеих атмосферах. Объяснения зеленых и синих полос Симетры до сих пор неясны...

		#LOC_KS_SciDef_dmSolarParticles_SimeSystem_InSpaceHigh = Частиц солнечного ветра здесь довольно мало, и коллектор улавливает лишь следы азота, углекислого газа и диоксида хлора.

		#LOC_KS_SciDef_dmRadiometerScan_SimeSystem_InSpaceHigh = В совокупности оба тела имеют довольно высокое суммарное альбедо. Simeht, в частности, довольно яркий.

		// Simetra/Simeht Shared
		#LOC_KS_SciDef_rpwsScan_SimeBoth_InSpaceHigh = Между двумя планетами существует невероятно сложная электростатическая среда, поскольку их магнитосферы и атмосферы взаимодействуют.
		#LOC_KS_SciDef_dmSIGINT_SimBoth_InSpaceLow = Магнитные поля обеих планет-гигантов в результате их взаимодействия производят мощные радиоволны, что приводит к какофонии радиошума.
		#LOC_KS_SciDef_dmSolarParticles_SimeBoth_InSpace = Коллекционеры собирают следы водорода, гелия и метана, пока Simetra и Simeht танцуют между собой.

		// Simetra
		#LOC_KS_SciDef_rpwsScan_Simetra_InSpaceLow = Мощные радиоволны исходят из атмосферы Симетры, хотя чуть менее массивный Simeht занимает второе место.

		#LOC_KS_SciDef_scopeScan_Simetra_InSpace = Красочные полосы Симетры заставляют задуматься, какие соединения придают экваториальной долготе такие яркие зеленые и желтые оттенки.

		#LOC_KS_SciDef_dmImagingPlatform_Simetra_InSpace = Верхние слои атмосферы состоят в основном из метана, а нижние слои состоят в основном из водорода, гелия и метана со следами серы и диоксида хлора. Этот диоксид хлора может объяснить зеленые полосы в сочетании с метаном.

		#LOC_KS_SciDef_dmSoilMoisture_Simetra_InSpaceLow = Микроволновые излучения Симетры указывают на то, что внутри находится водяной лед.

		#LOC_KS_SciDef_dmRadiometerScan_Simetra_InSpaceHigh = В ИК-спектре Simetra излучает немного больше, чем Simeht, что указывает на более высокие температуры и более энергичный процесс внутреннего нагрева.

		// Simeht
		#LOC_KS_SciDef_rpwsScan_Simeht_InSpaceLow = Чуть менее массивная атмосфера Simehtа, по-видимому, генерирует излучение радиоволн, которое настолько же слабее.

		#LOC_KS_SciDef_scopeScan_Simeht_InSpace = Simeht выглядит почти безликим на изображениях удаленного телескопа, однако при внимательном рассмотрении можно увидеть его более светлые экваториальные полосы, слабые закрученные гиперкании на границах и даже тонкие различия между более полярными полосами.

		#LOC_KS_SciDef_dmImagingPlatform_Simeht_InSpace = Водородно-гелиевая атмосфера Simehtа также содержит много метана, что объясняет ее светло-голубой цвет.

		#LOC_KS_SciDef_dmSoilMoisture_Simeht_InSpaceLow = Мощное микроволновое излучение сигнализирует о наличии большого количества водяного льда глубоко в Simehtе.

		#LOC_KS_SciDef_dmRadiometerScan_Simeht_InSpaceHigh = Simeht отражает много света в видимом спектре, что придает ему высокое альбедо.

		// Noira
		#LOC_KS_SciDef_dmMagScan_Noira_SrfLanded = На поверхности можно обнаружить небольшие локализованные магнитные поля, но у Луны, похоже, нет собственного более крупного магнитного поля. Либо это незаметно по сравнению с планетами-близнецами, и данные необходимо будет изучать с большей точностью.
		#LOC_KS_SciDef_bothMagScan_Noira_InSpace = Магнитные поля Симетры и Simehtа подавляют датчики, и ничего, исходящее от Noiры, невозможно обнаружить.

		#LOC_KS_SciDef_rpwsScan_Noira_InSpace = Обнаружена только активность радиоплазмы, генерируемая Симетрой и Simehtом. Все, что делает Noira, — это часть потока.

		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowGeneric = Усеянная кратерами поверхность Noiры — долгожданное зрелище в системе, полной странностей.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowGrandCrater = «Способность уничтожить планету ничтожна по сравнению с силой Krakenа».
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowCraters = Кратеры равномерно распределены по всей поверхности Луны, что указывает на то, что она не заблокирована приливами. Вероятно, это потому, что Simetra и Simeht просто слишком много передвигаются.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowRiftValleys = Совершенно очевидно, что приливные силы, должно быть, растягивают бедную Noiру до предела, создавая огромные рифтовые долины.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowBasins = Эти широкие темные бассейны напоминают о более простых временах, когда космическая программа все еще пыталась обустроить Mun.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceHigh = Маленький серый шарик напоминает Mun как по цвету, так и по кратерам на его поверхности. На одном конце Луны можно увидеть пропорционально огромный кратер, который можно сравнить с некой боевой станцией, разрушающей планеты.

		#LOC_KS_SciDef_dmImagingPlatform_Noira_InSpaceLow = Реголит на Noiре имеет состав, аналогичный Munу, с высоким содержанием силикатов и алюминия.
		#LOC_KS_SciDef_dmImagingPlatform_Noira_InSpaceHigh = Анализ Noiры с высокой орбиты показывает хаотичную поверхность, испещренную кратерами и покрытую впадинами.

		#LOC_KS_SciDef_dmSIGINT_Noira_InSpaceLow = Радионаблюдение за Ноирой не выявило ничего интересного, только сигналы, отраженные от планет-близнецов.

		#LOC_KS_SciDef_dmNAlbedoScan_Noira_SrfLanded = Подповерхностный водород обнаружен по всей Noiре; вероятное свидетельство месторождений воды.

		#LOC_KS_SciDef_dmlaserblastscan_Noira_SrfLanded = Сканирование поверхности делает чтение знакомым; богатая силикатами поверхность с большим количеством алюминия. Менее знакома заметная концентрация водяного льда.

		#LOC_KS_SciDef_dmSolarParticles_Noira_InSpace = Частицы-следы вблизи Noiры кажутся почти такими же, как и в других местах системы Simetra-Simeht.

		#LOC_KS_SciDef_dmSoilMoisture_Noira_InSpaceLow = Данные показывают, что под поверхностью маленькой луны скрыто большое количество водяного льда, а это потенциально может означать, что в Noiре есть подземные водные океаны!

		#LOC_KS_SciDef_dmRadiometerScan_Noira_InSpaceHigh = Общее альбедо Noiры очень похоже на альбедо Mun, но ее большое расстояние от Sunorc означает, что ее абсолютное излучение очень низкое.

		#LOC_KS_SciDef_dmseismicHammer_Noira_SrfLanded = Сейсмические отражения ясно показывают наличие больших подземных пещер, возможно, заполненных жидкой водой!

		// Norihc
		#LOC_KS_SciDef_dmMagScan_Norihc_SrfLanded = С поверхности Norihc можно измерить слабое магнитное поле, но оно не представляет собой ничего особенного.
		#LOC_KS_SciDef_bothMagScan_Norihc_InSpaceLow = Геологическая деятельность Norihc, похоже, не создает сильного магнитного поля. Поскольку геологическая активность, вероятно, вызвана в основном приливными силами, у Norihc, вероятно, отсутствует ядро ​​из расплавленного металла, что и объясняет это.
		#LOC_KS_SciDef_bothMagScan_Norihc_InSpaceHigh = Единственные магнитные поля, обнаруженные на данный момент, принадлежат Симетре и Simehtу.

		#LOC_KS_SciDef_rpwsScan_Norihc_InSpace = Слабые разрушения возникают, когда магнитосферы Симетры и Simehtа искажаются Norihcом.

		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowGeneric = Растрескавшаяся поверхность Norihc чем-то напоминает Илу с его глубокими траншеями и темными низменностями.
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowCratersAll = Norihc отмечен большими и маленькими кратерами, что ставит под сомнение древность его поверхности. Если его растягивают две планеты, почему кажется, что его поверхность не менялась так долго?
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowCracks = Эти трещины уходят глубоко в толстые глобальные ледяные шапки Norihc. Вероятно, из них получились бы веселые гоночные трассы!
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceHigh = Бедный Norihc, похоже, пострадал от приливных сил со своих родительских планет.

		#LOC_KS_SciDef_dmImagingPlatform_Norihc_InSpaceLow = Спектроскопия поверхности подтверждает, что она в основном состоит из водяного льда, а в низинах частично покрыта инеем толиновых соединений.
		#LOC_KS_SciDef_dmImagingPlatform_Norihc_InSpaceHigh = Атмосфера Norihc в основном состоит из азота со следами угарного газа и других газов.

		#LOC_KS_SciDef_dmSIGINT_Norihc_InSpaceLow = Радиоактивность на орбите Norihc тихая, если не считать шума, создаваемого Симетрой и Simehtом.

		#LOC_KS_SciDef_dmNAlbedoScan_Norihc_SrfLanded = Сигналы о наличии водорода в этом регионе, по-видимому, подтверждают наличие толстых водяных ледяных шапок, а также возможность существования океана с жидкой водой далеко внизу.

		#LOC_KS_SciDef_dmlaserblastscan_Norihc_SrfLanded = Луч вызывает выброс пара и пробивает дыру в поверхности, подтверждая, что это водяной лед.
		#LOC_KS_SciDef_dmlaserblastscan_Norihc_SrfLandedLowlands = Помимо пара, сканирование также указывает на существование здесь на поверхности соединений толина.

		#LOC_KS_SciDef_dmSolarParticles_Norihc_InSpace = Следы азота можно найти на орбите Norihc, но в остальном космос еще пустее, чем обычно.

		#LOC_KS_SciDef_dmSoilMoisture_Norihc_InSpaceLow = Вода довольно распространена по всему Norihcу, даже в низинах, где уровень воды самый слабый. Если под поверхностью есть жидкие океаны, этот прибор не сможет их различить.

		#LOC_KS_SciDef_dmRadiometerScan_Norihc_InSpaceHigh = Тонкая атмосфера Norihc поглощает мало, позволяя яркой поверхности отражать много света в большинстве длин волн, кроме УФ.

		#LOC_KS_SciDef_dmseismicHammer_Norihc_SrfLanded = Сейсмические данные показывают явные признаки наличия жидкого океана под поверхностью Norihc. Учитывая присутствие органических соединений, жизнь вполне возможна.

		#LOC_KS_SciDef_dmbiodrillscan_Norihc_SrfLanded = Этот образец керна в основном представляет собой просто лед с некоторыми соединениями толина, которые, похоже, оказались внутри после образования. Если на Norihcе есть подземный океан, бур не сможет его достичь.

		// Noyreg
		#LOC_KS_SciDef_dmMagScan_Noyreg_SrfLanded = Магнитное поле Noyreg, похоже, не сильно изменилось на поверхности.
		#LOC_KS_SciDef_bothMagScan_Noyreg_InSpaceLow = Для такого большого объекта с такой гравитацией магнитное поле Noyreg довольно слабое. Это может быть связано с сочетанием преимущественно охлажденного ядра, богатого железом, и отсутствия магнитных минералов на поверхности.
		#LOC_KS_SciDef_bothMagScan_Noyreg_InSpaceHigh = Слабое магнитное поле обнаружено высоко над Noyregом; и это слабее, чем ожидалось. Дальнейшие исследования могут пролить свет на эту тайну.

		#LOC_KS_SciDef_rpwsScan_Noyreg_InSpace = Солнечное излучение высвобождает заряженные частицы из плотной атмосферы Noyreg, создавая плазменные волны, когда они взаимодействуют с танцующими магнитными полями близнецов-гигантов.

		#LOC_KS_SciDef_scopeScan_Noyreg_InSpaceLow = Смотреть здесь не на что, поскольку поверхность покрыта плотными облаками. Видна лишь небольшая часть поверхности, но все, что можно различить, — это высокие горы, проглядывающие сквозь самые нижние облака.
		#LOC_KS_SciDef_scopeScan_Noyreg_InSpaceHigh = Какой очаровательный цвет! Конечно, это не возродит извечные дебаты о цвете Jool…

		#LOC_KS_SciDef_dmImagingPlatform_Noyreg_InSpaceLow = Глядя сквозь плотный облачный покров, можно увидеть признаки поверхности, невероятно богатой углеродом. Вполне возможно, что Noyreg состоит в основном из углерода, но это действительно делает его исключительно редкой находкой!
		#LOC_KS_SciDef_dmImagingPlatform_Noyreg_InSpaceHigh = Спектроскопический анализ показывает, что атмосфера состоит в основном из углекислого газа, а остальное — из азота, диоксида хлора и газовых примесей. Из этого первоначального анализа источник его зеленого цвета не ясен. Это может быть диоксид хлора или беспрецедентный эффект рассеяния. Необходимо дальнейшее исследование.

		#LOC_KS_SciDef_dmSIGINT_Noyreg_InSpaceLow = Плотная атмосфера Noyreg создает ритмичные радиосигналы, поскольку она получает энергию от магнитосфер Симетры и Simehtа.

		#LOC_KS_SciDef_dmNAlbedoScan_Noyreg_SrfLanded = Поверхность Noyreg, похоже, богата водородом. Но при таких температурах и давлениях это, скорее всего, длинноцепочечные углеводороды, а не вода.

		#LOC_KS_SciDef_dmlaserblastscan_Noyreg_SrfLanded = Произведенная вспышка идентифицирует вещество как чрезвычайно богатое углеродом; большая часть состава на самом деле представляет собой углерод. Это весьма необычно и, по-видимому, позволяет предположить, что Noyreg — это очень редкий тип объектов — карбония, или углеродный мир.
		#LOC_KS_SciDef_dmlaserblastscan_Noyreg_SrfLandedIceCaps = Лазерный анализ подтверждает наличие здесь замороженных нескольких длинноцепочечных углеводородов и никаких признаков водяного льда.

		#LOC_KS_SciDef_dmSolarParticles_Noyreg_InSpace = Пространство возле Noyreg содержит следы углекислого газа, вероятно, происходящего из плотной атмосферы Луны.

		#LOC_KS_SciDef_dmSoilMoisture_Noyreg_InSpaceLow = В Noyregе обнаружено небольшое микроволновое излучение, что, по-видимому, означает, что в нем практически нет воды.

		#LOC_KS_SciDef_dmRadiometerScan_Noyreg_InSpaceHigh = Плотная атмосфера Noyreg поглощает много ультрафиолетового и инфракрасного света, а также большую часть видимого спектра. Возможно, поэтому он выглядит зеленым.

		#LOC_KS_SciDef_dmseismicHammer_Noyreg_SrfLanded = Внутренний состав Noyreg показывает, что большая его часть имеет плотность, аналогичную алмазу, и, если показания верны, у него есть только небольшое, в основном мертвое металлическое ядро. Это подтверждает то, что Noyreg по большей части сделан из углерода.

		#LOC_KS_SciDef_dmbiodrillscan_Noyreg_SrfLanded = Керн полностью заполнен углеродом! То есть… просто много-много углерода и углеводородных соединений, ни одно из которых, похоже, не образовалось в результате биологической активности.

		// Aralc-A
		#LOC_KS_SciDef_rpwsScan_AralcA_InSpaceLow = Инструмент не плавится и начинает сублимировать.
		#LOC_KS_SciDef_rpwsScan_AralcA_InSpaceHigh = Солнечный ветер, исходящий от Aralc-A, чрезвычайно силен даже на таком расстоянии.

		#LOC_KS_SciDef_scopeScan_AralcA_InSpace = МОИ ГЛАЗА!!!

		#LOC_KS_SciDef_dmImagingPlatform_AralcA_InSpace = Платформа визуализации категорически отказывается раскрывать свои деликатные инструменты. Для такого рода работы вам понадобится более специализированный инструмент.

		#LOC_KS_SciDef_dmSIGINT_AralcA_InSpaceLow = Aralc-A излучает огромное количество радиации в большинстве спектров, особенно тех, которые этот прибор не может обнаружить. Но мы же знаем, что такое голубые звезды, верно? Нам ведь не нужно было тащить эту тяжелую штуку сюда, не так ли?

		#LOC_KS_SciDef_dmSolarParticles_AralcA_InSpaceLow = Ну, одно можно сказать наверняка. Гарантия теперь точно недействительна.
		#LOC_KS_SciDef_dmSolarParticles_AralcA_InSpaceHigh = Солнечный ветер Aralc-A гораздо мощнее, чем даже тот, для которого на самом деле был создан этот инструмент, но он прекрасно там держится.

		#LOC_KS_SciDef_dmSoilMoisture_AralcA_InSpaceLow = Усики стали гораздо больше напоминать воду, чем у этой звезды.

		#LOC_KS_SciDef_dmRadiometerScan_AralcA_InSpaceHigh = Аральк-А излучает гораздо больше ультрафиолетового света, чем большинство меньших и холодных звезд. Все, что живет в этой звездной системе, должно быть хорошо защищено, и у него не будет слишком много времени на эволюцию. Но, как говорится... "Efil" находит выход.

		// Anneheg
		#LOC_KS_SciDef_dmMagScan_Anneheg_SrfLanded = Огромное количество радиации сделало бедную стрелу нефункциональной, хотя, по крайней мере, она остается... - в основном - прямой.

		#LOC_KS_SciDef_rpwsScan_Anneheg_InSpace = Я хочу, чтобы вы догадались, сколько солнечной плазмы проходит здесь. Затем возьмите это предположение и умножьте его на сто. Вот ваш ответ.

		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceLow = Вращающиеся стеклянные очертания Anneheg демонстрируют, насколько сильно повреждена поверхность планеты. Маловероятно, что он образовался на таком расстоянии от Aralc-A, иначе он был бы уничтожен много веков назад.
		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceLowLava = Океаны лавы Anneheg растекаются по планете, словно открытые раны. Aralc-A взрывает этот мир на части.
		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceHigh = Anneheg трудно различить в море ослепляющего света, особенно с учетом того, насколько темна его магматическая поверхность.

		#LOC_KS_SciDef_dmImagingPlatform_Anneheg_InSpaceLow = Сканирование поверхности Anneheg указывает на наличие вулканического стекла с чрезвычайно высоким содержанием металлов; вполне вероятно, что эта планета представляет собой всего лишь тонкую корку, покрывающую ядро ​​некогда гораздо большей планеты.
		#LOC_KS_SciDef_dmImagingPlatform_Anneheg_InSpaceHigh = Несмотря на чрезвычайно низкое альбедо планеты, абсолютное излучение Anneheg все еще велико из-за настоящего луча смерти, падающего на ее поверхность.

		#LOC_KS_SciDef_dmSIGINT_Anneheg_InSpaceLow = Здесь можно обнаружить только интенсивную радиоактивность Aralc-A.

		#LOC_KS_SciDef_dmNAlbedoScan_Anneheg_SrfLanded = Показания содержания водорода на поверхности, несомненно, являются лишь результатом абсурдного солнечного ветра, выбрасывающего его на поверхность.

		#LOC_KS_SciDef_dmlaserblastscan_Anneheg_SrfLanded = Поверхность Anneheg настолько термостойка, что лазер с ней даже ничего не делает. Ну это провал.

		#LOC_KS_SciDef_dmSolarParticles_Anneheg_InSpaceLow = Anneheg, похоже, теряет массу, судя по камню и металлу, которые собирает коллекционер; особенно при пересечении сумеречной черты.
		#LOC_KS_SciDef_dmSolarParticles_Anneheg_InSpaceHigh = На этой высоте собирается только экстремальный солнечный ветер Aralc-A.

		#LOC_KS_SciDef_dmSoilMoisture_Anneheg_InSpaceLow = Усики едва ли могут функционировать так близко к Aralc-A, но они все равно не обнаруживают ничего, исходящего от планеты.

		#LOC_KS_SciDef_dmRadiometerScan_Anneheg_InSpaceHigh = Абсолютное излучение Anneheg очень велико, несмотря на чрезвычайно темную поверхность из-за его близости к Aralc-A.

		#LOC_KS_SciDef_dmseismicHammer_Anneheg_SrfLanded = Удар подтверждает, что состав Anneheg очень металлический; не менее 80% объекта состоит из металла.

		#LOC_KS_SciDef_dmbathymetryscan_Anneheg_SrfSplashedShallow = Хм. Вот это странно. Мы, кажется, еще не растаяли.
		#LOC_KS_SciDef_dmbathymetryscan_Anneheg_SrfSplashedDeep = Зелье огнестойкости поможет нам видеть здесь гораздо яснее.

		// Aralc-B
		#LOC_KS_SciDef_rpwsScan_AralcB_InSpaceLow = С обеих звезд дует сильный солнечный ветер, заставляя антенны довольно много обрабатывать.
		#LOC_KS_SciDef_rpwsScan_AralcB_InSpaceHigh = На самом деле вы находитесь не так уж далеко от Aralc-B, поэтому солнечная плазма здесь уже достаточно плотная, даже если не принимать во внимание вклад Aralc-A.

		#LOC_KS_SciDef_scopeScan_AralcB_InSpace = Возможно, это красный карлик, но это все равно звезда. Направлять на него чувствительный планетарный телескоп — плохое решение.

		#LOC_KS_SciDef_dmImagingPlatform_AralcB_InSpace = Платформа визуализации отключается при обнаружении света Aralc-B. Даже красный карлик слишком ярок, чтобы его можно было изучать.

		#LOC_KS_SciDef_dmSIGINT_AralcB_InSpaceLow = Радиоволны, излучаемые обеими звездами, очень интенсивны, и начинаешь сомневаться в структурной целостности массивной тарелки.

		#LOC_KS_SciDef_dmSolarParticles_AralcB_InSpaceLow = Чувствительные пластины начали быстро разрушаться под воздействием сильной жары.
		#LOC_KS_SciDef_dmSolarParticles_AralcB_InSpaceHigh = На этом расстоянии солнечный ветер, исходящий от Aralc-B, примерно равен ветру от Aralc-A.

		#LOC_KS_SciDef_dmSoilMoisture_AralcB_InSpaceLow = Устройство не переносит высокую температуру, а современные полимеры, составляющие его химический состав, начали разрушаться. Другими словами, космическая водная находка сломалась.

		#LOC_KS_SciDef_dmRadiometerScan_AralcB_InSpaceHigh = Будучи красным карликом, Aralc-B излучает много инфракрасного света и довольно тусклый в видимом и УФ-спектрах.

		// Arorua
		#LOC_KS_SciDef_dmMagScan_Arorua_SrfLanded = С поверхности кажется, что Arorua обладает довольно сильным собственным магнитным полем, которое могло бы немного сдерживать прилив заряженных частиц и продлевать жизнь ее атмосферы.

		#LOC_KS_SciDef_rpwsScan_Arorua_InSpace = Заряженные частицы наводняют пространство вокруг Arorua, что является простым и очевидным объяснением абляции его атмосферы.

		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowGeneric = Поверхность Arorua в основном холмистая и темная, но при ярком солнечном свете она блестит, как стекло. Может быть, часть этого — стекло!
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowSubstellarPoint = Точка, обращенная к Аральку-Б, по большей части безлика, но знание того, что это точка, где сконцентрирован весь солнечный свет, заставляет задуматься, насколько жарко там должно быть.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowMountainsAll = Горы Aralc просвечивают сквозь нижние слои атмосферы, выделяясь на фоне темных низменностей.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowCliffsAll = Эти скалы довольно острые. Они могут стать хорошим местом для осмотра достопримечательностей.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceHigh = Внизу ярко сияют полярные сияния Arorua, и вы задаетесь вопросом, почему оно не покрыто более непрозрачными облаками. Возможно, так и было в какой-то момент, но яркий солнечный свет сдул и их.

		#LOC_KS_SciDef_dmImagingPlatform_Arorua_InSpaceLow = ИК-сканирование поверхности Arorua дает сложную карту того, как планета нагревается ее двумя солнцами.
		#LOC_KS_SciDef_dmImagingPlatform_Arorua_InSpaceHigh = Спектральный анализ атмосферы Arorua показывает, что она в основном состоит из углекислого газа и не более того.

		#LOC_KS_SciDef_dmSIGINT_Arorua_InSpaceLow = По мере того как атмосфера Arorua исчезает, возникает поток интенсивной радиоактивности.

		#LOC_KS_SciDef_dmNAlbedoScan_Arorua_SrfLanded = Уровень фоновых нейтронов довольно высок благодаря Aralc-B. И это несмотря на плотную атмосферу, что затрудняет получение точных показаний.

		#LOC_KS_SciDef_dmlaserblastscan_Arorua_SrfLanded = Лазерное сканирование выявило довольно типичный состав поверхности каменистой планеты: большую часть поверхности составляют кремнистые минералы.

		#LOC_KS_SciDef_dmSolarParticles_Arorua_InSpaceLow = На низкой орбите Arorua улавливается относительно высокая концентрация молекул углекислого газа, вероятно, из ее абляционной атмосферы.
		#LOC_KS_SciDef_dmSolarParticles_Arorua_InSpaceHigh = Солнечный ветер заполняет пространство возле Arorua, угрожая сдуть и космический корабль!

		#LOC_KS_SciDef_dmSoilMoisture_Arorua_InSpaceLow = Единственные обнаруживаемые микроволновые показания исходят от Aralc-B и Aralc-A.

		#LOC_KS_SciDef_dmRadiometerScan_Arorua_InSpaceHigh = Несмотря на плотную углекислотную атмосферу Arorua, абсолютная освещенность довольно высока из-за близости к двум звездам. Огромные мерцающие полярные сияния, вероятно, также помогают.

		#LOC_KS_SciDef_dmseismicHammer_Arorua_SrfLanded = Сложный анализ удара молотком показывает, что Arorua имеет довольно типичный состав для земного мира со каменистой корой и частично расплавленным металлическим ядром.

		#LOC_KS_SciDef_dmbiodrillscan_Arorua_SrfLanded = Это может быть маловероятным, надуманным или даже безумным, но вы все равно берете безжизненный образец керна, просто чтобы быть абсолютно уверенным.
		#LOC_KS_SciDef_dmbiodrillscan_Arorua_SrfLandedSubstellarPoint = Слушай, никогда не знаешь, ладно? ВЫ НИКОГДА НЕ ЗНАЕТЕ.

		// Ahtpan
		#LOC_KS_SciDef_dmMagScan_Ahtpan_SrfLanded = После всестороннего анализа вы предполагаете, что, хотя магнитное поле Ahtpanа относительно слабое, оно достаточно сильное, чтобы сдерживать солнечные ветры.

		#LOC_KS_SciDef_rpwsScan_Ahtpan_InSpaceLow = Магнитное поле, исходящее от Ahtpanа, здесь существенно сильнее, и его достаточно, чтобы превратить образную бурю заряженных частиц в управляемый шторм.
		#LOC_KS_SciDef_rpwsScan_Ahtpan_InSpaceHigh = Паттерны радиоволн указывают на явное искажение магнитной среды здесь; Вероятно, это результат работы поля вокруг Ahtpanа.

		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowGeneric = Ahtpan выглядит как пустынный мир прямо из научно-фантастического фильма. Но ни один писатель-фантаст до сих пор не был настолько вдохновлен, чтобы мечтать об океанах нефти! Кажется, правда более странная, чем вымысел, и, возможно, более удивительная. Меньше космических боев, правда...
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowMountains = Горы Ahtpanа выделяются более красными оттенками, создавая приятный контраст с остальной бежевой поверхностью.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowNaphthaOceansCoast = Эти фотографии наверняка обеспечат нам большое финансирование от нефтяной промышленности.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowIslands = Все можно купить и продать по праву ОООИИИЛЛЛЛ!
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowCraters = У Ahtpanа довольно плотная атмосфера, поэтому немногим ударникам удается пройти через них, это должны быть большие объекты. Размер этих кратеров является тому подтверждением.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceHigh = Перспектива того, что целая планета будет покрыта океанами черного золота, была слишком заманчивой, чтобы от нее отказаться. Итак, вы наводите телескоп на Ahtpan и начинаете фотографировать.

		#LOC_KS_SciDef_dmImagingPlatform_Ahtpan_InSpaceLow = Спектральный анализ безошибочен — это океаны нафты. Целые моря драгоценного «взрыва» ждут эксплуатации – для ISRU или ради прибыли!
		#LOC_KS_SciDef_dmImagingPlatform_Ahtpan_InSpaceHigh = Атмосфера Ahtpanа состоит в основном из углекислого газа, но во многих регионах также присутствуют очень большие концентрации паров углеводородов.

		#LOC_KS_SciDef_dmSIGINT_Ahtpan_InSpaceLow = Радионаблюдение во время сканирования Ahtpanа не выявило ничего, кроме помех. Это прекрасно: отсутствие инопланетных операций по добыче нефти означает, что вся планета принадлежит нам! В порядке очереди, а, инопланетянин?

		#LOC_KS_SciDef_dmNAlbedoScan_Ahtpan_SrfLanded = Даже на суше датчик улавливает много отложений водорода. Даже земля богата этими вещами!
		#LOC_KS_SciDef_dmNAlbedoScan_Ahtpan_SrfSplashed = Очень сильная водородная сигнатура подтверждает наши самые смелые надежды на то, что поверхность Ahtpanа покрыта океанами нафты.

		#LOC_KS_SciDef_dmlaserblastscan_Ahtpan_SrfLanded = Химический анализ песчаной поверхности показывает, что ее состав в основном кремнистый, с большим количеством углеводородов.
		#LOC_KS_SciDef_dmlaserblastscan_Ahtpan_SrfSplashed = Вещество бурно реагирует на лазер и горит! Да, это масло, это нормально.

		#LOC_KS_SciDef_dmSolarParticles_Ahtpan_InSpaceLow = Солнечный ветер здесь немного более редок, и прибор улавливает следы углекислого газа и углеводородов.
		#LOC_KS_SciDef_dmSolarParticles_Ahtpan_InSpaceHigh = Aralc-A довольно сильно обдувает Ahtpan, но солнечный ветер здесь немного менее интенсивен, чем в межпланетном пространстве, что предполагает существование умеренно сильного магнитного поля.

		#LOC_KS_SciDef_dmSoilMoisture_Ahtpan_InSpaceLow = Микроволновое излучение Ahtpanа очень слабое, что указывает на то, что вещество на его поверхности не является водой.

		#LOC_KS_SciDef_dmRadiometerScan_Ahtpan_InSpaceHigh = Атмосфера Ahtpanа поглощает много ультрафиолетовых и коротковолновых ИК-частот, что указывает на то, что большая их часть, вероятно, представляет собой углекислый газ. Поверхность имеет довольно высокое альбедо, что помогает несколько компенсировать парниковый эффект.

		#LOC_KS_SciDef_dmseismicHammer_Ahtpan_SrfLanded = Сейсмические волны показывают, что недра Ahtpanа все еще активны, а его ядро, скорее всего, все еще расплавлено.

		#LOC_KS_SciDef_dmbathymetryscan_Ahtpan_SrfSplashedShallow = Камера ничего не видит в густой нефти, но химический анализ подтверждает, что это разновидность нафты.
		#LOC_KS_SciDef_dmbathymetryscan_Ahtpan_SrfSplashedDeep = Я ничего не вижу, капитан!

		#LOC_KS_SciDef_dmbiodrillscan_Ahtpan_SrfLanded = В керне обнаружено много нафты, но не более того. Признаков продолжающейся биологической активности нет.

		// Anehta
		#LOC_KS_SciDef_bothMagScan_Anehta_InSpaceLow = Показания магнитометра подтверждают наличие нескольких радиационных поясов Ван Кермана на низкой орбите Anehta.
		#LOC_KS_SciDef_bothMagScan_Anehta_InSpaceHigh = Магнитное поле Anehta довольно типично для газового гиганта, хотя из-за своей огромной массы оно является одним из самых мощных планетарных магнитных полей, когда-либо наблюдавшихся.

		#LOC_KS_SciDef_rpwsScan_Anehta_InSpaceLow = Мощные и частые радиоволновые излучения «Свиста молний» обнаружены на Анехте, что свидетельствует о хаотичной атмосфере с высокой геомагнитной активностью.
		#LOC_KS_SciDef_rpwsScan_Anehta_InSpaceHigh = Мощное магнитное поле Anehta захватывает и ускоряет заряженные частицы двух звезд. Этот процесс вызывает повторяющиеся радиоволновые импульсы, соответствующие периоду его вращения.

		#LOC_KS_SciDef_scopeScan_Anehta_InSpaceLow = Голубое небо внизу создает довольно красивую картину, и вы запечатлеваете огромные башни водяного пара в поразительных деталях. Вы уверены, что Kerbin целиком мог бы поместиться внутри некоторых из этих штормов.
		#LOC_KS_SciDef_scopeScan_Anehta_InSpaceHigh = Сине-белые кольца Anehta по цвету очень близки к газовому гиганту, но как такое может быть? Это не может быть лед; Anehta находится в пределах линии инея своих звезд. Возможно, кольца сделаны из того же материала, что и Юлб?

		#LOC_KS_SciDef_dmImagingPlatform_Anehta_InSpaceLow = Комплексное сканирование верхних облаков Anehta показывает, что их состав состоит в основном из водорода, гелия и водяного пара.
		#LOC_KS_SciDef_dmImagingPlatform_Anehta_InSpaceHigh = Сканирование Anehta показывает, что это газовый гигант класса II согласно системе классификации Сударскерб. Его яркие сине-белые верхние слои облаков отражают много видимого света, а сильное поглощение ультрафиолета указывает на то, что они состоят из водяного пара.

		#LOC_KS_SciDef_dmSIGINT_Anehta_InSpaceLow = Anehta испускает симфонию радиосигналов, когда ее нижняя атмосфера кружится и штормит, а солнечный ветер, прошедший через ее магнитосферу, бесполезно обрушивается на ее глубокие слои атмосферы.

		#LOC_KS_SciDef_dmSolarParticles_Anehta_InSpaceLow = Коллекторы, защищенные от солнечного ветра Анехтой, собирают в основном молекулы водорода, гелия и воды.
		#LOC_KS_SciDef_dmSolarParticles_Anehta_InSpaceHigh = Солнечный ветер возле Anehta по силе аналогичен Kerbin, но он быстро утихает по мере того, как корабль проходит глубже в мощную магнитосферу гиганта.

		#LOC_KS_SciDef_dmSoilMoisture_Anehta_InSpaceLow = Принимается сильный микроволновый сигнал; признак того, что атмосфера Anehta содержит большое количество водяного пара.

		#LOC_KS_SciDef_dmRadiometerScan_Anehta_InSpaceHigh = Anehta имеет довольно высокое альбедо благодаря приятной бело-голубой окраске. Сильные тепловыделения, даже на темной стороне, указывают на сильный внутренний нагрев.

		// Enots
		#LOC_KS_SciDef_dmMagScan_Enots_SrfLanded = Enots, похоже, не генерирует магнитное поле. Какой шок...
		#LOC_KS_SciDef_bothMagScan_Enots_InSpace = Единственная магнитосфера, которую может обнаружить прибор, исходит от Anehta.

		#LOC_KS_SciDef_rpwsScan_Enots_InSpace = Enots вызывает лишь незначительные искажения в магнитосфере Anehta, поскольку пресловутый камень в реке разделяет ее течение.

		#LOC_KS_SciDef_scopeScan_Enots_InSpaceLow = Крошечный спутник выглядит так, будто кто-то взял большой кусок сланца и запустил его на орбиту.
		#LOC_KS_SciDef_scopeScan_Enots_InSpaceHigh = Подождите минутку! Кто-то серьёзно назвал это «Stones»? Что это за название?

		#LOC_KS_SciDef_dmImagingPlatform_Enots_InSpace = Мультиспектральный анализ показывает, что Enots состоит преимущественно из тёмных силикатных минералов.

		#LOC_KS_SciDef_dmSIGINT_Enots_InSpaceLow = Единственные радиосигналы здесь исходят от Anehta.

		#LOC_KS_SciDef_dmNAlbedoScan_Enots_SrfLanded = Слабые сигналы водорода можно объяснить клочками экзосферы Anehta, которые были уловлены этой маленькой луной.

		#LOC_KS_SciDef_dmlaserblastscan_Enots_SrfLanded = Лазер срезает небольшой гребень, обнажая состав, состоящий в основном из силикатной породы, в частности, халцедона. Есть следы оксидов алюминия, которые могут быть корундом, что объясняет легкий синий оттенок, который имеют экваториальные области.

		#LOC_KS_SciDef_dmSolarParticles_Enots_InSpace = Коллекционеры собрали очень много частиц из колец Anehta, обнаружив состав, состоящий в основном из силикатных минералов и оксидов алюминия, которые могут быть синим корундом.

		#LOC_KS_SciDef_dmSoilMoisture_Enots_InSpaceLow = Енот, судя по всему, не генерирует никаких микроволновых излучений, что исключает наличие водяного льда на его поверхности или под ней.

		#LOC_KS_SciDef_dmRadiometerScan_Enots_InSpaceHigh = Enots имеет очень низкое альбедо, но спектральный анализ не указывает на наличие углерода. Это предполагает другое происхождение его черного цвета.

		#LOC_KS_SciDef_dmseismicHammer_Enots_SrfLanded = Сейсмические волны хорошо отражаются от маленькой луны, что указывает на то, что она довольно плотная и хорошо удерживается структурными силами.

		// Efil
		#LOC_KS_SciDef_dmMagScan_Efil_SrfLanded = Магнитометр зафиксировал сильное магнитное поле Efilа с поверхности, показав, как линии поля точно совпадают с осью вращения Луны, как два танцора в идеальной синхронизации друг с другом.

		#LOC_KS_SciDef_rpwsScan_Efil_InSpace = Ионосфера Efilа взаимодействует с мощным магнитным полем Anehta, рисуя красочную картину взаимоотношений между атмосферами и магнитосферами этих двух миров: Анехтой-защитницей и Efilом, всегда дерзким ребенком, стремящимся доказать, что он... может... отклонять солнечный ветер, эээ, сам по себе? Слушай, у меня заканчивается материал.

		#LOC_KS_SciDef_scopeScan_Efil_InSpaceHigh = Подобно идеальному голубому мрамору, Efil сияет в телескоп сине-зелеными оттенками. Картина не может по-настоящему передать красоту Efilа, но может сохранить хотя бы ее часть.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowWater = Океаны Efilа сияют в свете двух солнц, освещенных ярко-голубым цветом, как иллюстрация прямо с обложки классического научно-фантастического романа.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowRainforests = Густые тропические леса инопланетных деревьев с сине-зелеными листьями покрывают большую часть поверхности планеты, напоминая образы романтизированного древнего Kerbin, где колоссальные звери все еще бродили по миру - и все же, хотя этой версии Kerbin давно нет, Efil парит здесь, явно осязаемый.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowGrassland = Зеленые холмы охватывают Efil в низинных районах, усеянные цветочными клумбами и обрамленные тропическими лесами, как будто нарисованные мастером-художником.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowTropicalDesert = Тропические пустыни Efilа, возможно, менее гостеприимны, чем большая часть планеты, но они не менее красивы. Песчаные дюны катятся, как и травянистые холмы в других местах, по которым, несомненно, бродят стада закаленных, обитающих в пустыне животных, о чем свидетельствуют длинные следы, оставленные на песке.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowNeedleleafForests = Арктические леса Efilа столь же пышны и полны жизни, как и более теплый климат, они покрыты обширными пространствами дикой природы и покрыты снегом.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowTundraColdDesert = Холодные, бесплодные регионы Efilа — одни из немногих мест, лишенных той красоты, которая окружает остальную часть планеты. Вместо этого они бесплодны и по большей части безжизненны; одни из немногих оставшихся участков запустения на многолюдном мире Efil.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowMountainsSnowMountains = Вершины Efilа выглядывают из облаков, словно желая получше рассмотреть великолепный пейзаж, который их окружает. Несомненно, там мало кто живет, но в этом есть некий мир, не так ли? Стоя на такой вершине, наверняка ощущаешь только спокойствие.

		#LOC_KS_SciDef_dmImagingPlatform_Efil_InSpaceHigh = Широкая цветовая гамма Efilа простирается далеко до невидимых спектров, заполняя настоящее полотно данных для изучения нашими учеными. Несомненно то, что, как и на Kerbinе, его атмосфера содержит в основном азот и кислород; явные признаки жизни в сочетании с изображениями Efilа, написанными в видимом свете.

		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmImagingPlatform_Efil_InSpaceLow = Очень разнообразная геология и биология Efilа образуют сложную картину, рассказывающую богатую историю луны, окутанной жизнью. Efilу есть что предложить: от высоких гор до холмистых равнин, от густых джунглей до глубоких океанских впадин. Туристам понравится это место! Я помещу это в туристический буклет.
		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmSIGINT_Efil_InSpaceLow = Радиоактивность атмосферы Efilа говорит о его взаимодействии с магнитосферой Anehta, но эту песню никто не поет. То есть нет никаких доказательств разумной жизни.

		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmImagingPlatform_EfilHome_InSpaceLow = Очень разнообразная геология и биология Efilа образуют сложную картину, рассказывающую богатую историю луны, окутанной жизнью. Efilу есть что предложить: от высоких гор до холмистых равнин, от густых джунглей до глубоких океанских впадин.
		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmSIGINT_EfilHome_InSpaceLow = Атмосфера Efilа поет песню магнетизма и… подожди, подожди, хватит фиолетовой прозаической чепухи. Я слышу, как приближается последняя игра в хедбол, я хочу слушать!

		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedRainforestsGrassland = Влажная, плодородная почва Efilа богата атомами водорода молекул воды, вдыхая жизнь в его огромные леса и обширные луга.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedTropicalDesert = Хотя песок здесь сухой, следы воды продолжают обеспечивать обитателей пустыни столь необходимым освежением.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedArcticBiomes = Замороженная льдом и снегом, арктическая почва охотно обеспечивает пресной водой тех, кто желает ее взять.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedMountains = Горы Efilа сравнительно засушливы и в основном лишены жизни, поскольку такая большая высота делает даже Efil неспособным обеспечить своих жителей.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedSnowMountains = Снежные вершины открывают великолепные виды, но создают плохую почву для жизни, на которой невозможно закрепиться. Несмотря на обилие воды, пить нечего.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedBeach = Мокрый песок здесь прилипал бы к пальцам ног, если бы вы лично наслаждались им. Содержание водорода говорит вам о том, что уже очевидно в кадре камеры; этот пляж регулярно омывает живительная кристально чистая вода.

		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfSplashedWater = Взрыв волнистых волн подтверждает, что это действительно драгоценная, освежающая жидкая вода, хотя и с неприятной соленостью.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedRainforestsGrassland = Сканирование поверхности показывает обилие водорода не только в воде, но и в органических соединениях; свидетельство растущей экосистемы Efil.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedTropicalDesert = Лазер проникает глубоко в сухой песок, обнаруживая очень мало водорода. Для такого засушливого региона это имеет смысл.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedMountains = На больших высотах гор Efilа не хватает как воды, так и жизни.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedArcticBiomes = Даже самые холодные регионы Efilа кишат жизнью; тонкий слой снега на поверхности скрывает внизу бурную деятельность.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedSnowMountains = Хотя на этих снежных вершинах можно найти много водяного льда, больше ничего найти нельзя, поскольку эти районы слишком отдалены, чтобы там можно было выжить.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedBeach = Кажется расточительным подтверждать и без того очевидное с помощью этого дорогого прибора... Возможно, вы просто не верите, что на какой-либо луне может быть такое чистое и чистое море?

		#LOC_KS_SciDef_dmSolarParticles_Efil_InSpaceLow = Просматривая самый внешний слой атмосферы Efilа, прибор помимо солнечного ветра собирает молекулы воды – явный признак того, что Efil является таким же тропическим убежищем, каким кажется.
		#LOC_KS_SciDef_dmSolarParticles_Efil_InSpaceHigh = В пластинах откладываются более тяжелые элементы, что свидетельствует о том, что у Efilа есть что-то вроде пояса Ван Кермана - как будто он хочет заключить в тюрьму жизнь, которая на нем живет. Возможно, Efil не такой любезный хозяин, как считалось ранее?

		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmSoilMoisture_Efil_InSpaceLow = Микроволновые излучения еще более наглядно показывают, что поверхность Efilа практически пропитана водой. Хотя это, казалось бы, бессмысленное предприятие, никогда нельзя забывать о холодном ложном рае, которым оказался Лэйт, поэтому разумно проверить.
		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmSoilMoisture_EfilHome_InSpaceLow = Микроволновые излучения еще более наглядно показывают, что поверхность Efilа практически пропитана водой. Это уже было известно, однако это служит, по крайней мере, полезной калибровкой инструмента - и напоминает нам, каким ложным раем оказался Лэйт в прошлые века.

		#LOC_KS_SciDef_dmRadiometerScan_Efil_InSpaceHigh = Яркая поверхность Efil окрашена в великолепный голубой оттенок благодаря плотной атмосфере, которая поглощает большую часть ультрафиолетового и ближнего ИК-излучения.

		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedSandy = Порошкообразная поверхность под ней отлично поглощает сейсмические волны, сопротивляясь вашим попыткам раскрыть ее тайны.
		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedSoily = Почва внизу приглушает большинство проходящих волн, но намекает на пещеры, простирающиеся глубоко под поверхностью.
		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedRocky = Сейсмические волны здесь хорошо распространяются, показывая вам более четкое представление о внутренней части Efilа, хотя, несмотря на все пещеры и слои, в этом нет ничего удивительного.

		#LOC_KS_SciDef_dmbathymetryscan_Efil_SrfSplashedWaterShallow = В теплых тропических водах Efilа плавает сокровищница биолюминесцентной фауны, которая во всех деталях раскрывается в кристально чистой воде.
		#LOC_KS_SciDef_dmbathymetryscan_Efil_SrfSplashedWaterDeep = Темные глубины Efilа совсем не темны, поскольку светящаяся морская жизнь усеивает пейзаж до самого горизонта, выглядя как звезды, плывущие через чужой океан.

		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedBeach = В приливной зоне небольшое животное, похожее на млекопитающего, поселилось внутри панциря — очаровательная инверсия знакомой концепции Kerbin и яркий пример конвергентной эволюции. В качестве убежища он использует выброшенные панцири других морских существ, но может двигаться на удивление быстро, если вынужден покинуть его.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedRainforests = Слизистое существо с четырьмя конечностями раскачивается с ветки на ветку деревьев в густом пологе, выглядя почти как какой-то позвоночный кракен. Или, по крайней мере, так бы и было, если бы не яркий синий цвет. Существо с особым интересом наблюдает за вашим кораблем, пока вы берете образец почвы, и спускается с дерева, чтобы безобидно ткнуть его, прежде чем быстро отступить.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedGrassland = Стада коренастых зверей с шестью ногами и морщинистой кожей бродят по открытым равнинам, их численность настолько велика, что немногие хищники могут бросить им вызов. К счастью, это стадо не мешает процессу отбора проб, но в будущем, возможно, будет разумно более регулярно сканировать территорию с помощью камер корабля.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTropicalDesert = Маленькие пушистые животные зарываются в песок, образуя колоссальные колонии, создавая обширную подземную сеть туннелей. Среди туннелей растет своего рода биолюминесцентный грибоподобный организм, который они научились выращивать и употреблять в пищу. Над землей огромные стада длинноногих высоких травоядных пасутся с самых высоких деревьев и молча общаются полосами, которые могут вспыхивать ярким светом.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedNeedleleafForests = Беспозвоночные размером с кербала сливаются со снегом, их экзоскелеты такие же бледно-белые, как и окружающая среда. Один из них выпрыгивает на корабль, когда бур выдвигается, но останавливается, прежде чем он коснется его, по-видимому, ощущая небольшое тепло от его жесткой оболочки и решая, что обед из него будет плохим.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTundra = Тундра Efilа бесплодна, но далеко не безжизненна. Здесь можно увидеть огромных мигрирующих травоядных животных, покрытых густой шерстью, несмотря на свою беспозвоночную природу. Благодаря своим длинным гибким ногам они могут стоять прямо, почти утрояя свой рост, и достигать любых деревьев, кроме самых высоких.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedColdDesert = В арктических пустынях обитает очень мало крупных животных, но почва внизу изобилует активностью. Удивительно крошечные пушистые существа размером с насекомых снуют по снегу, роют туннели и находят выносливые растения с питательными корнями для сбора урожая.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedMountains = К сожалению, на такой высоте смотреть особо нечего. Почва на самых высоких вершинах Efilа по большей части безжизненная, однако на скалах все еще можно увидеть огромных существ с копьеклювами и огромными крыльями. Во время планетарной ночи, когда Efil проходит сквозь тень Anehta, эти животные поднимаются в небо, чтобы ловить морских существ и приносить их сюда, чтобы накормить своих голодных детенышей.

		// Eulb
		#LOC_KS_SciDef_dmMagScan_Eulb_SrfLanded = Магнитное поле Эйлба довольно слабое, но его нетрудно обнаружить прибором с поверхности. Кроме того, поблизости есть несколько более мелких и более сильных локализованных полей.

		#LOC_KS_SciDef_rpwsScan_Eulb_InSpace = Слабое магнитное поле Юлба создает удивительные искажения в магнитном поле Anehta, когда она вращается вокруг планеты-гиганта.

		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowGeneric = Итак, почему он синий? Обратились ли мы к этому? Кто-нибудь над этим работает? Попросите кого-нибудь поработать над этим.
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersSmall = Это вызывает у меня "дежа синее"... Понял?
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersBig = Крупнейшие кратеры Юлба иногда трудно отличить от морей. Кажется, что они почти выветрились, но единственной силой, которая могла бы это сделать, были удары микрометеоритов. Сколько лет Эулбу?
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowDoubleCrater = О, теперь есть интересная особенность. Похоже, это два расположенных друг над другом ударных кратера: один побольше, другой поменьше. Самый внутренний кратер кажется младшим из двух.
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceHigh = Голубая луна... Упс. Jeb, пора снять куриный костюм.

		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceLow = Спектроскопическое сканирование поверхности Юлба показывает сильное ИК-поглощение почти повсюду на поверхности Луны. Это подразумевает, что синий корунд, широко известный как сапфир, является виновником его яркого синего цвета.
		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceHigh = На поверхности Юлба царит чрезвычайно разреженная атмосфера. Он слишком тонкий, чтобы его можно было обнаружить с помощью барометра.

		#LOC_KS_SciDef_dmSIGINT_Eulb_InSpaceLow = Многократные радионаблюдения не выявили на Юлбе ничего интересного.

		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLanded = Сканирование не выявило значительных количеств подземного водорода на Юлбе.
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPoles = Низкое содержание водорода здесь можно объяснить рассеянными отложениями водяного льда.
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPolarCrater = Здесь обнаружен довольно сильный сигнал водорода, вероятно, потому, что большая часть площади полярного кратера находится в постоянной тени.

		#LOC_KS_SciDef_dmlaserblastscan_Eulb_SrfLanded = Химический анализ поверхности Юлба показывает, что она сравнительно бедна силикатами и чрезвычайно богата алюминием и кислородом. Это указывает на синий корунд как на причину его синей окраски, материал, широко известный как сапфир.

		#LOC_KS_SciDef_dmSolarParticles_Eulb_InSpace = Слабое магнитное поле Юлба мало что делает для отклонения солнечного ветра, но Anehta все равно делает для него большую работу.

		#LOC_KS_SciDef_dmSoilMoisture_Eulb_InSpaceLow = Слабый микроволновый сигнал обнаруживается, но только тогда, когда усики направлены на полюса.

		#LOC_KS_SciDef_dmRadiometerScan_Eulb_InSpaceHigh = У Эйлба довольно высокое альбедо. Его яркая поверхность отражает много света на всех зарегистрированных длинах волн, кроме красного и инфракрасного.

		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLanded = Сейсмические снимки довольно хорошо поглощаются порошкообразным синим реголитом. Вы можете получить лучшие результаты в более прочном месте, например, в большом кратере.
		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLandedCratersBig = Анализ внутренней части Юлба показывает плотный состав, вероятно, столь же богатый оксидами алюминия, как и корунд, как и поверхность.

		// Elad
		#LOC_KS_SciDef_dmMagScan_Elad_SrfLanded = Линии магнитного поля проходят в странных направлениях, по-видимому, указывая на пару магнитных полюсов, наклоненных примерно на 40 градусов от оси вращения.
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceLow = Elad обладает мощным магнитным полем, сравнимым по силе с Kerbinом.
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceHigh = Магнитное вмешательство Anehta на этом расстоянии несколько тише, а Elad, похоже, генерирует значительное собственное магнитное поле.

		#LOC_KS_SciDef_rpwsScan_Elad_InSpace = Elad сильно искажает магнитное поле Anehta своим собственным мощным полем, и эта пара вместе оказывается весьма эффективной в отклонении солнечного ветра.

		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGeneric = Пустоши Eladа резко контрастируют с пышными холмами и кристально чистыми морями Efilа и являются мрачным напоминанием о хрупкости жизни во вселенной.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraters = Редкая природа этих кратеров по сравнению с другими объектами, такими как близлежащий Юлб, придает большой вес предположению о том, что у Eladа совсем недавно была плотная атмосфера.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterLarge = На Eladе разбросано несколько крупных кратеров, подобных этому, и все они кажутся довольно молодыми.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterGiant = Этот огромный кратер достаточно велик, чтобы быть причиной потери атмосферы Eladа, но в этом невозможно быть уверенным.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCanyon = Этот каньон настолько крутой и глубокий, что когда-то он, должно быть, был океанической впадиной.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowValleys = Elad покрыт глубокими каньонами и рифтовыми долинами, которые являются явным свидетельством активной тектоники плит в прошлом.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCliff = Ого. Вот ЭТО скала. Интенсивная тектоника плит, должно быть, ответственна за такой огромный хребет.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceHigh = RnD утверждает, что эти странные особенности поверхности можно объяснить только тем, что Elad недавно потерял плотную атмосферу и, возможно, океаны. Это выглядит таким пустынным... Неужели это правда?

		#LOC_KS_SciDef_dmImagingPlatform_Elad_InSpaceLow = Спектральный анализ показывает, что поверхность имеет состав, аналогичный Kerbin; богат силикатами и металлами.
		#LOC_KS_SciDef_dmImagingPlatform_Elad_InSpaceHigh = Тепловые выбросы обнаруживают признаки внутреннего нагрева на Eladе, что указывает на текущую геологическую активность.

		#LOC_KS_SciDef_dmSIGINT_Elad_InSpaceLow = Если что-то или кто-то когда-то и жил на Eladе, то сейчас они молчат по радио.

		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLanded = Здесь есть слабый сигнал водорода, но трудно определить, слабый ли он из-за расстояния или малых концентраций.
		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLandedLowlands = Обнаружены высокие уровни водорода, но сигнал слабый после прохождения через большое количество камней. Это может указывать на наличие жидких океанов глубоко под землей!

		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedMidlandsHighlands = Пустынная поверхность Eladа, по-видимому, химически состоит в основном из силикатов, кислорода и алюминия. Как и Kerbin, большая часть его поверхности состоит из гранита.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedLowlands = Земля здесь содержит большую концентрацию соли, что позволяет предположить, что когда-то она была дном моря или океана с жидкой водой.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCanyon = Плотная поверхность этого каньона чрезвычайно соленая, что придает вес гипотезе о том, что когда-то это была глубоководная впадина.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCliff = Эта массивная скала, по-видимому, содержит несколько типов кварца.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedValleys = «Долины» Eladа представляют собой густонаселенную соленую местность, а это означает, что многие из них, если не все, когда-то были глубоководными траншеями. Возможно, Elad когда-то был океанским миром, как и Лэйт.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCratersCraterLarge = Высокие концентрации посторонних металлов и соединений углерода, редко встречающиеся на Eladе, позволяют понять состав ударного элемента, образовавшего этот кратер.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCraterGiant = Этот массивный кратер богат тяжелыми металлами и другими соединениями, которые обычно не встречаются на поверхности Eladа, что свидетельствует о том, что ударник был очень плотным и, вероятно, очень тяжелым.

		#LOC_KS_SciDef_dmSolarParticles_Elad_InSpaceLow = Датчики на низкой орбите Eladа обнаруживают небольшие следы азота — возможно, последние остатки его некогда плотной атмосферы.
		#LOC_KS_SciDef_dmSolarParticles_Elad_InSpaceHigh = Elad делает потрясающую работу по отклонению солнечного ветра даже на такой высоте, но ряд заряженных частиц собирается таким образом, что предполагает существование радиационного пояса Ван Кермана.

		#LOC_KS_SciDef_dmSoilMoisture_Elad_InSpaceLow = На орбите над самыми низкими областями Eladа обнаруживается постоянно сильный микроволновый сигнал, что убедительно указывает на существование подземных океанов жидкой воды. Если в Eladе когда-то была жизнь, вполне возможно, что она все еще живет там внизу!

		#LOC_KS_SciDef_dmRadiometerScan_Elad_InSpaceHigh = Яркая поверхность Eladа в целом имеет довольно высокое альбедо, чему способствует загадочное отсутствие атмосферы на Луне.

		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLanded = Сейсмические отражения из глубин Eladа подтверждают, что его ядро ​​все еще полностью расплавлено, а мантия очень активна.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedLowlands = Видимый состав этого региона очень похож на морское дно Kerbin, и в результате он не очень хорошо передает сейсмические волны.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedGrandCanyonValleys = Судя по составу и признакам сжатия под огромным давлением, присутствующим здесь в грунте, это, по-видимому, древний океанический желоб.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedCraterGiant = Сейсмическое сканирование этого массивного кратера ясно показывает большие залежи плотных тяжелых металлов, указывая на то, что астероид, образовавший этот кратер, вероятно, был металлическим и был бы достаточно массивным, чтобы прорезать даже плотную атмосферу.

		// Wormhole(s)
		#LOC_KS_SciDef_rpwsScan_Wormholes_InSpace = Плазма солнечного ветра на обоих концах червоточины, по-видимому, взаимодействует здесь, образуя сложную среду солнечного ветра, не похожую ни на что, что вы когда-либо видели раньше.

		#LOC_KS_SciDef_scopeScan_WH3141A_InSpace = Вы почти можете увидеть другую планету на другой стороне. Вы видите кольца, яркую оранжевую звезду и... СВЯТОЙ КРАКЕН! Это большой черный глаз смотрит на тебя?
		#LOC_KS_SciDef_scopeScan_WH3141B_InSpace = Дружелюбная зеленая форма Jool размазана по пространству, почти как картина маслом или что-то в этом роде. Вы также можете увидеть намеки на Laythe, Vall и Tylo.

		#LOC_KS_SciDef_dmImagingPlatform_Wormholes_InSpace = Мультиспектральный анализ доказывает... назовем его «неубедительным». Свет из червоточины настолько сильно искажен, что трудно проверить точность любых показаний, которые вы считаете.

		#LOC_KS_SciDef_dmSIGINT_WH3141A_InSpaceLow = Судя по всему, от объекта исходят странные радиопередачи. Просматривая ленту, вы могли бы поклясться, что услышали, как кто-то сказал «Привет!» и «Летайте безопасно». Спасибо, загадочный космический голос. Мы будем летать безопасно!
		#LOC_KS_SciDef_dmSIGINT_WH3141B_InSpaceLow = Наблюдая за радиоактивностью, исходящей из червоточины, вы улавливаете искаженное эхо передач с Kerbin.

		#LOC_KS_SciDef_dmSolarParticles_WH3141A_InSpace = В этом месте коллекционеры улавливают удивительное количество солнечного ветра; вероятно, это доносится с другой стороны червоточины.
		#LOC_KS_SciDef_dmSolarParticles_WH3141B_InSpace = Солнечный ветер здесь представляет собой комбинацию ветров Kerbol и Sunorc; хотя показания Sunorc гораздо более устойчивы.

		#LOC_KS_SciDef_dmSoilMoisture_Wormholes_InSpaceLow = Микроволновое излучение исходит из червоточины с постоянной, но низкой скоростью. Виновата ли в этом сама червоточина или ее создает что-то на другой стороне?

		#LOC_KS_SciDef_dmRadiometerScan_Wormholes_InSpaceHigh = Трудно использовать этот инструмент, когда малейшее движение приводит к тому, что любые объекты, которые вы видите через червоточину, теряют фокус. Возможно, вам стоит просто стиснуть зубы и пройти дальше?

	}
}
