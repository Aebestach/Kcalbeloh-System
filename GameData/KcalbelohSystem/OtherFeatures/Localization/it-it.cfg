		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingLow_Highlands = Sebbene l'atmosfera qui sia densa e respirabile, le onde significano che devi fare attenzione quando prendi quei respiri.
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingLow_Cracks = L'atmosfera respirabile aiuta certamente la vivibilità di questo mondo acquatico, anche se le onde montuose non contribuiscono.
		//Volo ad alta quota
