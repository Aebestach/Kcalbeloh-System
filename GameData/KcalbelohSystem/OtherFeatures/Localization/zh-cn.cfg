		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedTwilight = 晨昏带土壤中发现极高的氢浓度，当然主要是水。行星大部分液态水都在这里。
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedWater = 这里极湿的地表自然含有大量氢，吸收大部分中子。希望你没在污染海洋什么的。

		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedTwilight = 排放物中检测到来自植被的碳化合物以及几种岩石。
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDesert = 这片干旱沙漠仍显示明显的生命迹象，汽化岩石顶层碰巧揭示了外星昆虫挖出的小隧道和一种耐旱草类的根。
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDay = 被太阳晒白的地表没有明显的有机成分；全是沙和岩石。
