		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowNight = Трещины все еще проходят по темной стороне Онрефни, выделяясь на фоне ярко освещенного аккреционного диска Ккальбело.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowCraters = Края кратеров Онрефни сверкают в губительном свете аккреционного диска. Возникает вопрос, что создало эти особенности — нашли ли они путь вблизи Kcalbeloh, или Онрефни был брошен сюда в прошлом, уже неся эти шрамы?
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceHigh = То, что вы видите перед собой, — это сама картина красоты в запустении. Онрефни — мир на грани разрушения, и все же, несмотря на то, что это безвоздушный маленький камень, которому нечего сопутствовать, кроме вращающегося космического урагана, который его окружает, апокалиптическая поверхность бланета абсолютно завораживает.

		#LOC_KS_SciDef_dmImagingPlatform_Onrefni_dmImagingPlatform_Onrefni_InSpaceLow = Мультиспектральный анализ указывает на отсутствие следов атмосферы, а на поверхности преобладают силикаты, богатые металлами. Скорее всего, эта поверхность представляет собой тонкий слой поверх бланкета, который представляет собой не что иное, как плотное металлическое ядро.
