		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Twilight = Сканирование барометра, проведенное в сумеречной зоне Suluco, выявило уникальную картину атмосферного давления, на которую влияет резкая разница температур между дневным и ночным полушариями. Сканирование показывает, что в сумеречной зоне постоянные сильные ветры в направлении дневного полушария, вероятно, вызванные температурным контрастом между соседними дневным и ночным полушариями. Узкое кольцо сумеречной вечности создает динамичную и турбулентную атмосферную область с переменным давлением.
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Night = Измерения барометра показывают более высокое атмосферное давление на поверхности ночного полушария, поскольку воздух из дневного полушария охлаждается и опускается, достигая ночного полушария, становясь более плотным и создавая область высокого давления. Опустившийся воздух затем движется по поверхности обратно к дневному полушарию, замыкая контур атмосферной циркуляции.
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingLow = Сканирование барометра, проведенное в нижних слоях атмосферы Suluco, выявило сложную картину распределения давления. В дневном полушарии, где воздух нагревается звездой, сканирование показывает зону низкого давления из-за поднимающегося воздуха из-за нагрева и уменьшения плотности. Напротив, ночное полушарие демонстрирует область высокого давления в нижних слоях атмосферы из-за нисходящего воздуха из-за охлаждения и повышенной плотности.
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingHigh = Сканирование барометра, проведенное в верхних слоях атмосферы Suluco, с учетом глобальных атмосферных условий, дает ценную информацию о сложных закономерностях распределения давления, на которые влияют приливно-приливная конфигурация планеты и температурный контраст между дневным и ночным полушариями.

		#LOC_KS_SciDef_seismicScan_Suluco_SrfLanded = Сейсмическое сканирование показывает, что Suluco является относительно геологически стабильным. Однако постоянные сильные ветры могут создавать трение и напряжение на поверхности планеты, что потенциально может привести к земным толчкам. Кроме того, в сумеречной зоне Suluco наблюдаются более сильные толчки земли, вероятно, вызванные силами трения, создаваемыми постоянными ветрами, а также разным нагревом и охлаждением поверхности в дневном и ночном полушариях.

		#LOC_KS_SciDef_gravityScan_Suluco = Глобальное гравитационное сканирование Suluco показывает относительно постоянное гравитационное поле на поверхности планеты без существенных изменений или аномалий. Обнаружено, что сила гравитации одинакова как в дневном, так и в ночном полушариях, а также в области между ними, известной как сумеречная зона.

