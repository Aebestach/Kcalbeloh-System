		// ******************************** Descrizioni dei pianeti ********************************
		#LOC_KS_Anehta_description = Anehta è un gigante gassoso che vanta un impressionante sistema di anelli planetari. Il pianeta è caratterizzato da una copertura nuvolosa perpetua, divisa in zone più chiare e fasce più scure. A causa dei contrastanti schemi di circolazione di queste zone e fasce, il pianeta subisce violente tempeste e turbolenze.
		#LOC_KS_Ahtpan_description = Ahtpan è un pianeta roccioso desertico con oceani composti principalmente da nafta. Anche se potrebbe sembrare una buona idea costruire uno stabilimento petrolchimico sulla superficie, il Kerbal Space Center (KSC) consiglia a tutti i kerbonauti di tenere i caschi durante l'esplorazione del pianeta. Questo perché l'atmosfera del pianeta emana un forte odore di naftalina!
		#LOC_KS_Anneheg_description = Anneheg è un pianeta dall'aspetto scuro simile al carbone che orbita molto vicino ad Aralc-A. A causa della sua vicinanza alla stella, il calore e la luce intensi hanno fatto sciogliere gran parte della sua superficie, formando fiumi e oceani di lava, nonché frequenti tempeste di metallo vaporizzato. Con le sue condizioni inospitali, Anneheg è considerato uno dei pianeti più infernali mai scoperti.
		#LOC_KS_AralcA_description = Aralc-A è la prima stella del sistema binario nel sistema Kcalbeloh ed è considerata la stella più luminosa e massiccia del sistema. La sua alta temperatura e il colore bianco-blu suggeriscono che sia una stella di sequenza principale di tipo A.
		#LOC_KS_AralcB_description = Aralc-B, la seconda stella del sistema binario, è una piccola stella di bassa massa classificata come stella di sequenza principale di tipo M, nota anche come nana rossa.
		#LOC_KS_AralcSystem_description = Questo è il baricentro del sistema stellare binario.
		#LOC_KS_Arorua_description = Arorua è un grande pianeta roccioso in rotazione sincrona con Aralc-B. A causa dei forti venti solari provenienti da Aralc-B, si possono osservare aurore dall'intero emisfero rivolto verso Aralc-B. Allo stesso tempo, la sua atmosfera viene gradualmente spazzata via dal vento solare della nana rossa.
		#LOC_KS_Dipuc_description = Dipuc è l'unica luna di Sera e la sua superficie è segnata da grandi crateri, indicando che ha assorbito molti impatti meteoritici gravi che altrimenti avrebbero colpito Sera. La luna è anche geologicamente attiva, con un numero significativo di vulcani attivi sulla superficie e montagne imponenti visibili anche da vicino a Sera.
		#LOC_KS_Efil_description = Efil appare come uno zaffiro incastonato vicino ad Anehta quando visto da lontano. La sua atmosfera affascinante e le belle spiagge la fanno sembrare un luogo di vacanza ideale. Forse in futuro il Kerbal Space Center (KSC) costruirà un complesso turistico lì. Tuttavia, resta la questione di chi potrebbe permettersi il biglietto per visitare questo pianeta lontano.
		#LOC_KS_Elad_description = Elad è la più grande luna di Anehta e fu la prima delle lune di Anehta ad essere scoperta. Si ritiene che Elad avesse un'atmosfera in passato e persino acqua liquida sulla superficie, ma resta un mistero il motivo per cui la luna abbia perso queste caratteristiche nel tempo.
		#LOC_KS_Enots_description = Enots è una piccola luna asteroidale incorporata nel sistema di anelli di Anehta, ed è considerata la più piccola luna conosciuta di Anehta.
		#LOC_KS_Eulb_description = Eulb è... una luna blu.
		#LOC_KS_Iomena_description = Iomena è un pianeta roccioso con grandi crateri e oceani. La ricerca scientifica ha indicato che la probabilità di vita su questo pianeta è estremamente bassa a causa delle alte concentrazioni di ammoniaca presenti sia nell'atmosfera che negli oceani. Tuttavia, gli scienziati non hanno abbandonato la possibilità di scoprire vita in ambienti così estremi.
		#LOC_KS_Kcalbeloh_description = Kcalbeloh è un buco nero supermassiccio ed è il centro del sistema Kcalbeloh. Non ha un getto né un disco di accrescimento blu surriscaldato, indicando che probabilmente non ha divorato una stella da milioni di anni.
		#LOC_KS_Maelg_description = Maelg è la stella meno massiccia e più fredda nel sistema Kcalbeloh, e di conseguenza emette significativamente meno luce delle altre stelle. È classificata come nana bruna di tipo L.
		#LOC_KS_Mehtna_description = Mehtna è un pianeta gelido in rotazione sincrona con Maelg. La maggior parte della sua superficie è coperta da spesse calotte glaciali, tranne la regione vicina al punto sub-stellare, soprannominata "Polo Caldo". A causa della bassa pressione atmosferica del pianeta, l'acqua bolle ben al di sotto della temperatura ambiente, quindi l'acqua esiste principalmente sotto forma di ghiaccio o vapore acqueo.
		#LOC_KS_Meiuqer_description = Meiuqer è un piccolo pianeta con un'orbita eccezionalmente eccentrica. La sua temperatura superficiale subisce fluttuazioni significative a seconda della distanza da Maelg.
		#LOC_KS_Noi_description = Noi è un asteroide troiano che libra intorno al punto di Lagrange L4 tra Sunorc e il Sistema Simetra-Simeht, che esiste 60° avanti rispetto al baricentro dei pianeti binari nella loro orbita.
		#LOC_KS_Noira_description = Noira è la luna che orbita più vicino al baricentro del sistema planetario binario Simetra-Simeht, ed è unica nel sistema Kcalbeloh per avere un'orbita retrograda. La sua superficie presenta un gigantesco cratere, suggerendo un impatto significativo da un corpo celeste relativamente grande in passato.
		#LOC_KS_Norihc_description = Norihc è una luna gelida che orbita il baricentro dei giganti gassosi binari. Nonostante l'esterno ghiacciato, è geologicamente attiva e presenta numerose profonde fessure sulle sue spesse calotte glaciali.
		#LOC_KS_Noyreg_description = Noyreg è una luna rocciosa con un'atmosfera estremamente densa che oscura la sua superficie sotto spessi strati nuvolosi. La sua atmosfera ha un'affascinante tonalità verde, ma atterrare su questa luna è considerato estremamente pericoloso a causa delle alte concentrazioni di componenti corrosivi e tossici nell'aria.
		#LOC_KS_Onrefni_description = Onrefni, un pianeta nano, orbita in estrema vicinanza a Kcalbeloh, subendo forti forze di marea che hanno lacerato la sua superficie.
		#LOC_KS_Rouqea_description = Rouqea è un affascinante mondo oceanico, completamente coperto d'acqua. A differenza di Laythe, il suo oceano è unico e distinto, con profondità immense che potrebbero produrre un mantello di ghiaccio esotico a causa della pressione estrema. Le sue misteriose e allettanti profondità continuano a catturare l'attenzione di ricercatori e scienziati.
		#LOC_KS_Sedah_description = Sedah è un gigante gassoso caldo che orbita molto vicino a Sunorc. Le sue alte temperature atmosferiche gli conferiscono un leggero bagliore. Nonostante sia simile per dimensioni a Jool, ha solo circa un settimo della massa di Jool, risultando in un'atmosfera meno densa e più "soffice".
		#LOC_KS_Sera_description = Sera è un pianeta roccioso sterile con un impressionante sistema di anelli e diversi grandi laghi. Sfortunatamente, i laghi sono tossici e non ci sono prove conosciute di vita su Sera.
		#LOC_KS_Simeht_description = Simeht, il pianeta più piccolo nel sistema di giganti gassosi binari, è anch'esso classificato come gigante di ghiaccio. Tuttavia, a differenza di Simetra, le sue fasce nuvolose e tempeste sono difficili da osservare in luce visibile.
		#LOC_KS_SimeSystem_description = Questo è il baricentro del sistema di giganti gassosi binari.
		#LOC_KS_Simetra_description = Simetra è il gigante di ghiaccio più grande nel sistema di giganti gassosi binari Simetra-Simeht. Il suo aspetto blu è attribuito alle tracce di metano trovate nelle sue regioni più esterne, mentre altre regioni del pianeta si ritiene siano colorate di verde e giallo a causa di composti sconosciuti.
		#LOC_KS_Suluco_description = Suluco è un pianeta simile a Kerbin in rotazione sincrona con Sunorc, cioè un lato del pianeta è sempre rivolto verso la stella mentre l'altro è in perpetua oscurità. È un mondo biforcato, con un netto contrasto tra i due emisferi. Un lato vive un giorno infinito mentre l'altro è avvolto nella notte eterna. Il confine tra le due metà è un anello stretto di eternità crepuscolare, l'unica regione del pianeta che potrebbe potenzialmente sostenere la vita.
		#LOC_KS_Sunorc_description = Sunorc è una stella di sequenza principale di tipo K, nota anche come nana arancione. È più piccola e fredda di Kerbol, rendendola di particolare interesse nella ricerca di vita extraterrestre. Sunorc ha una vita più lunga ed emette meno radiazioni UV, il che aumenta la probabilità di pianeti abitabili nel suo sistema.
		#LOC_KS_Tot_description = Una luna asteroidale in orbita attorno a Suluco.
		#LOC_KS_Uleg_description = Uleg è un pianeta gelido con un'orbita che lo porta lontano da Kcalbeloh. La sua superficie è prevalentemente coperta di ghiaccio. La sua orbita altamente inclinata ed eccentrica suggerisce che sia stato probabilmente catturato da Kcalbeloh.


