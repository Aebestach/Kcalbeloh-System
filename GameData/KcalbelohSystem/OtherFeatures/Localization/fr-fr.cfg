		// ******************************** Découverte des corps ********************************
		#autoLOC_RBodies_discovery_Kcalbeloh = Nous avons trouvé un endroit dans l'espace où même la lumière semble disparaître. C'est une découverte d'où même les blagues de Jeb ne peuvent s'échapper ! Espérons qu'il ne prenne pas goût aux fusées !
		#autoLOC_RBodies_discovery_Sunorc = Un petit point lumineux est apparu dans notre télescope, une réflexion pensions-nous ? Non, non, c'est une étoile !
		#autoLOC_RBodies_discovery_AralcA = Cette étoile était si brillante qu'elle a presque aveuglé Jeb ! On n'arrive pas à croire qu'on ne l'ait pas repérée avant !
		#autoLOC_RBodies_discovery_AralcB = Cette étoile est minuscule comparée à Kerbol... Mais elle semble danser avec une autre.
		#autoLOC_RBodies_discovery_Maelg = Bob l'a failli prendre pour une poussière sur l'objectif jusqu'à ce qu'on regarde de plus près. Ça ressemble plus à une grosse géante gazeuse, mais c'est chaud... Vraiment chaud !
		#autoLOC_RBodies_discovery_WH3141A = Nous avons découvert ce qui semble être... une anomalie ? La lumière ne se comporte pas correctement autour, il faut enquêter !
		#autoLOC_RBodies_discovery_WH3141B = C'est étrange, c'est une sorte d'anomalie... On n'arrive pas à comprendre ce que c'est, peut-être qu'une mission s'impose ? C'est trop loin cependant, on n'aura pas assez de snacks pour le voyage.
		#autoLOC_RBodies_discovery_Onrefni = Cette planète ressemble à un puzzle, avec la lueur chaude de la lave entre les pièces.
		#autoLOC_RBodies_discovery_Rouqea = Au premier coup d'œil, nos meilleurs scientifiques ont cru qu'on avait renversé une goutte d'eau sur l'image... C'était en fait un monde aquatique !
		#autoLOC_RBodies_discovery_Iomena = Ce monde cratérisé semble avoir une atmosphère, très fine comme notre voisine Duna.
		#autoLOC_RBodies_discovery_Uleg = De la glace !? Non... On dirait que c'est juste de la glace, bon c'était excitant tant que ça a duré.
		#autoLOC_RBodies_discovery_Mehtna = Étrange, celle-ci semble plus chaude d'un côté que de l'autre. Peut-être qu'on pourrait y prendre un beau bronzage.
		#autoLOC_RBodies_discovery_Meiuqer = Wow... C'est vraiment petit, c'est un miracle qu'on ait vu quoi que ce soit de si loin.
		#autoLOC_RBodies_discovery_Sedah = Une nouvelle sorte de glace !? C'est assez grand... Oh, non c'est plutôt comme Jool mais rose. Bizarre.
		#autoLOC_RBodies_discovery_Suluco = Au début on pensait que ce rocher était stérile, mais en regardant plus longtemps on a remarqué qu'il était aussi gelé. Bob dit qu'il veut y aller en vacances, on pense qu'il est fou.
		#autoLOC_RBodies_discovery_Tot =  C'est tout petit... Comme un astéroïde ! Je me demande si on pourrait le remorquer jusqu'à Kerbin pour tenir compagnie à Minmus ?
		#autoLOC_RBodies_discovery_Sera = Celle-ci ressemble un peu à Duna ! Très rouge, mais plus grande. Jeb l'aime parce que ça lui rappelle une voiture de course, elle a même une rayure !
		#autoLOC_RBodies_discovery_Dipuc = La Mun !? Comment elle est arrivée là ? Oh attends... Pas la Mun, fausse alerte.
		#autoLOC_RBodies_discovery_Simetra = Whoa c'est un gros rocher ! Oh attends non c'est juste coloré comme un rocher... Semble vraiment gazeux, ça sent quoi ?
		#autoLOC_RBodies_discovery_Noira = Cette lune orbite... À l'envers ? Bizarre. Ça a peut-être à voir avec le gros trou dedans ?
		#autoLOC_RBodies_discovery_Simeht = De la glace !? Non c'est bien trop grand pour être de la glace, très rappelant Minmus par la couleur mais bien plus grand.
		#autoLOC_RBodies_discovery_Noi =  Ce truc peut à peine être considéré comme une lune, plutôt un astéroïde... Je me demande si on resterait collé à la surface ou si on flotterait ?
		#autoLOC_RBodies_discovery_Norihc = On ne pourrait décrire ce gros rocher que comme... vaporeux... et froid.
		#autoLOC_RBodies_discovery_Noyreg = DES SNACKS !? ON A TROUVÉ LE JACKPOT !!!! Oh attends... C'est toxique vous dites ? Donc pas de snacks ?
		#autoLOC_RBodies_discovery_Anneheg = Whoa c'est un rocher chaud ! Il brille même !
		#autoLOC_RBodies_discovery_Arorua = Cette planète... semble scintiller et briller dans des motifs incroyables. Il nous faut plus de photos.
		#autoLOC_RBodies_discovery_Ahtpan = Hmm, ça a l'air jaune comme Kerbol. Ne semble pas aussi chaud cependant, Bob dit qu'on devrait essayer de l'enflammer et voir ce qui se passe.
		#autoLOC_RBodies_discovery_Anehta = Stupéfiant ! Celle-ci a d'énormes bandes autour et dedans ! À quoi ça ressemble depuis le sol ?
		#autoLOC_RBodies_discovery_Enots = Celle-ci est étrange... C'est petit comme un astéroïde, mais sa forme ressemble à une sorte d'œuvre d'art excentrique.
		#autoLOC_RBodies_discovery_Efil = Ça ressemble presque à Kerbin ! Ce serait définitivement l'endroit idéal ! Si on pouvait y arriver.
		#autoLOC_RBodies_discovery_Eulb = Celle-ci est grande comme la Mun... Mais bleue comme Minmus ? La glace nous attend !
		#autoLOC_RBodies_discovery_Elad = Whoa, celle-ci c'est comme la Mun mais presque aussi grande que Kerbin ! Jeb a toujours aimé les bons défis !

		// ******************************** Définitions scientifiques ********************************
		// Kcalbeloh
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceLow1 = S'approcher de Kcalbeloh en orbite basse donne l'impression d'être attiré dans un puits sans fond, l'intense attraction gravitationnelle rendant difficile le maintien de notre cap et le contrôle du vaisseau.
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceLow2 = Atterrisseur 1, préparez-vous à vous détacher, à mon signal.
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceHigh = Les forces gravitationnelles intenses ont fait dérailler nos instruments, et nous avons dû battre rapidement en retraite vers une distance plus sûre.

		#LOC_KS_SciDef_temperatureScan_Kcalbeloh_InSpaceLow = Les relevés de température aux environs de Kcalbeloh sont extrêmement élevés, indiquant une radiation intense provenant de son disque d'accrétion.

		#LOC_KS_SciDef_evaReport_Kcalbeloh_SrfLanded = Mon dieu, c'est plein de Krakens.
		#LOC_KS_SciDef_evaReport_Kcalbeloh_InSpaceLow = Le membre d'équipage a signalé une sensation d'apesanteur et d'émerveillement lors de l'EVA près de Kcalbeloh. L'intense attraction gravitationnelle était palpable même à distance de sécurité.
		#LOC_KS_SciDef_evaReport_Kcalbeloh_InSpaceHigh = Le rapport d'équipage lors d'une EVA près de Kcalbeloh révèle une vue à couper le souffle du disque d'accrétion jaune du trou noir supermassif.

		#LOC_KS_SciDef_mysteryGoo_Kcalbeloh_InSpaceLow = Une expérience Mystery Goo n'est pas possible ici, car les forces gravitationnelles intenses perturberaient probablement toute tentative d'expérience à proximité.

		#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceLow = Les résultats du scan gravitationnel indiquent une distorsion gravitationnelle significative, qui pourrait potentiellement aider les futures manœuvres de fronde gravitationnelle autour de ce corps céleste massif.
		//#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceHigh = Le scan gravitationnel de Kcalbeloh depuis une grande distance indique la présence de grandes concentrations de masse à proximité du trou noir.
		#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceHigh = Un scan gravitationnel de Kcalbeloh depuis loin révèle de minuscules irrégularités dans les données. Ce sont probablement des planètes, ou des « blanets », orbitant le trou noir. Certaines doivent être assez proches !

		#LOC_KS_SciDef_magnetometer_Kcalbeloh_InSpaceLow = L'intense radiation des particules du disque d'accrétion a court-circuité l'instrument avant que nous puissions prendre une lecture.

		// Onrefni
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded1 = Il est vraiment déconcertant de penser que la lumière qui illumine votre vue de cette... malheureuse petite planète ne provient pas d'une étoile, mais de matière et de gaz accélérés si rapidement par le puits gravitationnel gargantuesque du Kcalbeloh menaçant qu'ils brillent au rouge.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded2 = La planète elle-même semble gémir sous la pression d'être si proche du monstrueux Kcalbeloh, se déformant et se fissurant constamment sous votre vaisseau comme une pâte à tarte bon marché.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded3 = Cet endroit est à peu près aussi structurellement solide qu'un Vaisseau Spatial Sans Titre (avant l'ajout de moar entretoises).
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfLanded1 = Les paramètres de mission n'avaient pas prévu que l'unité de mesure de température soit exposée à des conditions aussi extrêmes. Cependant, elle fait son travail malgré tout et vous informe aimablement que c'est... *doux.*
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfLanded2 = Il ne devrait PAS faire si chaud sans étoile à proximité. La masse fait des choses effrayantes, généralement aux dépens d'Onrefni.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded1 = Vous comparez l'expérience de marcher sur Onrefni à marcher sur de gros flocons de céréales du petit-déjeuner, alors que vous « entendez » la fissure de la surface résonner dans votre jambe à chaque bond.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded2 = Vos pieds sont... sensiblement plus chauds que votre tête, comme vous l'indique aimablement le système d'exploitation de votre combinaison EVA actuellement en panique.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded3 = Vous trouvez difficile de vous déplacer sur cette surface irrégulière et étirée, car la couche supérieure de roche s'effrite à chaque bond lourd créé par vos tentatives de mouvement maladroites dans 32 % de la gravité de Kerbin.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfLanded1 = Le Goo semble frissonner au fond de sa capsule à la réalisation qu'il se trouve sur une planète si proche de Kcalbeloh.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfLanded2 = Le Goo semble se séparer en différentes couches, comme s'il imitait la géologie interne de la planète naine brisée sur laquelle il repose.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded1 = Les échantillons que vous collectez soigneusement apparaissent fortement aplatis et déformés par rapport aux échantillons extraplanétaires « conventionnels » vus lors des missions précédentes.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded2 = Les roches que vous collectez sont chaudes même à travers vos gants de combinaison, et vous ressentez une pointe de sympathie pour ces objets, certes inanimés mais torturés.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded3 = Vous remarquez une fine poussière de particules sur les échantillons que vous collectez qui semble recouvrir tout sur Onrefni, et vous supposez que cette poussière est créée et déposée simultanément par le disque d'accrétion proche de Kcalbeloh et la lente mais active désintégration de la planète naine elle-même.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfLanded1 = Les échantillons métalliques se liquéfient rapidement sous la lumière étrangère de Kcalbeloh, et les échantillons volatils comme la glace commencent à se sublimer rapidement après avoir été exposés au vide hostile autour d'Onrefni.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfLanded2 = La poussière omniprésente et chargée électriquement qui recouvre la surface d'Onrefni commence rapidement à tapisser l'intérieur de la soute à matériaux. À votre grand agacement, la poussière volatile provoque un court-circuit des électroniques de la soute, mettant hors service votre coûteuse nouvelle expérience scientifique quelques instants seulement après avoir collecté des données utiles.
		#LOC_KS_SciDef_seismicScan_Onrefni_SrfLanded = L'instrument sismique est totalement submergé de données provenant à la fois des forces de marée extrêmes et des impacts quasi constants du matériau du disque d'accrétion proche, ce qui caractérise grandement la nature chaotique d'Onrefni.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfLanded1 = Les lectures de gravité fluctuent légèrement selon l'endroit sur Onrefni où elles sont prises, probablement en raison du terrain instable et de la géologie intérieure dévastée de ce petit monde.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfLanded2 = La gravité sur Onrefni, bien que certainement instable, se stabilise généralement autour d'un niveau comparable, mais légèrement supérieur à la gravité de surface de Duna. Ce fait confirme la théorie suggérée par les lectures scientifiques antérieures selon laquelle ce petit monde possède un noyau de fer lourd, car un corps si petit ne possède généralement pas une gravité aussi élevée.

		#LOC_KS_SciDef_crewReport_Onrefni_SrfSplashed1 = Ce n'est pas ce que nous entendions par exploration approfondie. L'implication était que vous rentriez - Oui. Il est trop tard maintenant.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfSplashed2 = Vous vous rappelez ne pas être assez payé pour ça alors que vous regardez votre vaisseau se transformer en fondue métallique.
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfSplashed1 = C'est un crime contre les thermomètres, et vous le savez. Malheureusement, il est trop tard pour rectifier vos actes, car le thermomètre a fondu et n'est plus parmi nous.
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfSplashed2 = Pourquoi se fatiguer ? Vous connaissiez la réponse. T R O P   C H A U D .
		#LOC_KS_SciDef_evaReport_Onrefni_SrfSplashed1 = Vous savez, il était inévitable que quelqu'un de plus dense que Kcalbeloh comme vous passe à travers le processus de sélection rigoureux des kerbonautes du KSP juste pour marcher dans la lave sur une planète naine alien. Profitez de vos dernières secondes d'existence, ô... brave !
		#LOC_KS_SciDef_evaReport_Onrefni_SrfSplashed2 = Merci pour votre contribution significative à la science et pour votre sacrifice juste pour découvrir que, tenez-vous bien : LA LAVE EST CHAUDE !
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfSplashed1 = Le Goo méritait mieux, mais au moins il a péri dans l'exercice de ses fonctions pour Kerbalkind.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfSplashed2 = Le Goo survit à la chaleur incroyable plus longtemps qu'on ne l'anticiperait, mais même lui succombe rapidement à la fureur d'Onrefni.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfSplashed1 = Il a fondu. Quelle surprise.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfSplashed2 = Le KSC vous conseille de ne pas être si imprudent avec du matériel coûteux à l'avenir simplement pour vérifier si la lave était, en fait, chaude.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfSplashed = Le capteur de gravité crache une série de données absurdes alors qu'il commence à fondre sous la chaleur punitive des enfers d'Onrefni.

		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceLow1 = Vous avez une légère hésitation à l'idée d'atterrir sur le monde brisé en dessous de vous.
		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceLow2 = Vous ne voulez VRAIMENT pas atterrir là-bas. La surface semble à peu près aussi accueillante qu'un ours Kolar enragé.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceLow1 = Le thermomètre ne soupçonne pas encore la colère qui gît en dessous.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceLow2 = Vous n'êtes même pas encore à la surface et vos unités de mesure de température protestent déjà, pancartes et tout.
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceLow1 = Vous n'appréciez pas de flotter juste au-dessus de véritables rivières de lave. La sensation est semblable à se tenir juste à côté d'un chauffe-eau, même à travers votre combinaison.
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceLow2 = Entre la chaleur de la planète déchirée et la chaleur de Kcalbeloh de l'autre côté, vous vous sentez comme un repas micro-ondé pendant l'EVA, et vos systèmes de refroidissement réclament rapidement une augmentation.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceLow1 = Si vous ne saviez pas mieux, vous diriez que le Goo inanimé semblait activement se recroqueviller loin du petit monde brisé en dessous.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceLow2 = Le Goo ricoche de manière erratique sur son conteneur, semblant chercher un moyen de s'échapper.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceLow1 = La suite électronique dans la soute à matériaux réagit de manière particulière à l'environnement extrême unique autour de ce petit monde.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceLow2 = Vous observez l'équipement de test magnétique s'illuminer comme un sapin de Noël dans la soute à matériaux chaque fois que le trou noir est dans le champ de l'instrumentation. 
		#LOC_KS_SciDef_gravityScan_Onrefni_InSpaceLow = Le capteur peine à quantifier le jeu de tir à la corde planétaire joué autour de lui par le trou noir et Onrefni.
		#LOC_KS_SciDef_magnetometer_Onrefni_InSpaceLow = Le bras valide rapidement la théorie qu'Onrefni possède un noyau métallique lourd et proportionnellement immense, car il capte la signature magnétique relativement forte (pour sa taille) de la planète naine.

		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceHigh1 = Vous ne saviez pas qu'un rocher spatial pouvait paraître maléfique... jusqu'à aujourd'hui.
		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceHigh2 = Comment cette petite boule courageuse a-t-elle même pu se former si près du Grand Costaud là-bas ?
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceHigh1 = Les énormes lectures de chaleur du trou noir étouffent encore les données de température estimées de la roche fissurée sous vous à cette distance.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceHigh2 = Il vous faudra vous rapprocher d'Onrefni pour vous éloigner de la vaste signature thermique du trou noir curieux et obtenir des données significatives au-delà de « probablement C H A U D (et lumineux) ».
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceHigh1 = Vous faites de votre mieux pour l'impression de « grain de poussière insignifiant ». Hé, bon travail !
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceHigh2 = Vous essayez de décider si Onrefni est vraiment petit, ou si Kcalbeloh est juste vraiment, vraiment grand. Peut-être les deux ? Une étude plus approfondie est nécessaire.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceHigh1 = Le Goo semble inerte, comme paralysé par la taille du trou noir proche en comparaison du Onrefni comparativement minuscule.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceHigh2 = Le Goo s'étire vers les côtés opposés de son conteneur, comme s'il imitait les forces de marée qui ont brisé le petit monde en dessous.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceHigh1 = Avant de vous lancer dans cette mission, vous ne pensiez pas que des échantillons de matériaux puissent montrer de la peur, étant des objets inanimés. Vous aviez tort. Ces échantillons ont l'air totalement terrifiés en présence de l'horreur cosmique qu'est Kcalbeloh, tout en fonçant vers la roche troublée en dessous à une vitesse inimaginable.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceHigh2 = Certains des échantillons sensibles au magnétisme semblent légèrement graviter entre le trou noir et la planète naine loin en dessous, ce qui indique qu'Onrefni possède un grand noyau de fer, pas dissemblable de Moho.
		#LOC_KS_SciDef_gravityScan_Onrefni_InSpaceHigh = À cette distance, toute lecture de gravité substantielle de la petite planète qui aurait autrement été évidente est noyée par la signature suffocante de Kcalbeloh.
		#LOC_KS_SciDef_magnetometer_Onrefni_InSpaceHigh = Même à cette distance, une signature magnétique étonnamment ample rayonne d'Onrefni. La forme du champ magnétique est perturbée par le champ écrasant de Kcalbeloh, mais il y a QUELQUE CHOSE. Vous devrez vous rapprocher pour vérifier ces lectures.

		// Rouqea
		// Rapports d'équipage
		// À terre
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Lowlands = Entendre des craquements occasionnels de la coque de votre vaisseau est déconcertant, mais à cette profondeur dans les océans de Rouqea, il n'y a pas grand-chose à voir par le hublot.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Midlands = Les lumières de votre cabine d'équipage éclairent juste assez loin pour voir le fond sableux de l'océan où votre vaisseau s'est posé après avoir coulé si profondément.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Highlands = Contre le noir écrasant des profondeurs océaniques, vous pouvez voir des affleurements rocheux et - si vos yeux sont à croire - des montagnes sous-marines. Peut-être que ce sont elles qui provoquent les vagues monstrueuses en surface.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Cracks = Votre vaisseau, maintenant posé aux plus basses profondeurs de l'océan, gémit sous la pression de tout l'océan qui pèse sur lui. C'est plus profond que vous n'imaginiez que l'océan allait...
		// À l'eau
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Lowlands = En regardant par la cabine d'équipage, vous voyez que l'eau salée de Rouqea recouvre le hublot, obscurcissant partiellement l'horizon. C'est drôle, l'horizon n'a pas l'air aussi plat qu'il devrait l'être sur une planète océan...
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Midlands = Depuis votre cabine d'équipage, les eaux semblent calmes autour de vous. Vous fermez les yeux et vous détendez, en écoutant le bruit des vagues clapotant contre la coque de votre vaisseau. 
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Highlands = Le module d'équipage offre une vue fantastique sur les océans calmes de Rouqea, se lever à votre siège vous permet de voir jusqu'aux montagnes à l'horizon. Attendez...
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Cracks = En flottant au-dessus des parties les plus profondes de l'océan planétaire de Rouqea, vous notez à quel point les vagues deviennent agitées et au loin, à quelle hauteur elles déferlent ! Certaines atteignent presque les nuages !
		// Vol à basse altitude
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Lowlands = Depuis votre module d'équipage, vous pouvez voir les nuages autour et au-dessus de vous, et la mer calme en dessous. Il est difficile de ne pas être un peu inquiet de voir à quel point vous êtes proche de Kcalbeloh.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Midlands = Votre cockpit offre une vue magnifique sur l'océan qui s'étend tout autour de vous. Au loin, vous apercevez une vague de centaines de mètres de haut qui disparaît à l'horizon.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Highlands = En faisant rouler le vaisseau, le hublot capture un spectacle merveilleux ; les nuages s'écartent pour laisser place à une vague de magnitude titanesque. Avec ces vagues, vous pensez presque que vous volez peut-être trop bas...
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Cracks = Autour des zones de Rouqea connues pour être les plus profondes, vous voyez des colonnes de bulles s'élever des profondeurs de l'océan planétaire, pour être balayées par des vagues de la taille de montagnes.
		// Vol à haute altitude
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Lowlands = Il est difficile de ne pas apprécier le spectacle que vous voyez maintenant - le disque d'accrétion de Kcalbeloh illuminant les mers et ciels azur de Rouqea.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Midlands = Votre vaisseau vole gracieusement dans l'air au-dessus des nuages, vous permettant de capter chaque reflet des vagues loin en dessous.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Highlands = Même si haut, il est difficile de ne pas remarquer le terrain montagneux en dessous. Il est difficile d'ignorer la neige qui recouvre les - cette montagne vient-elle de bouger ?
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Cracks = Rouqea loin en dessous de vous, il est inquiétant de savoir que le trou noir qui plane au-dessus est si proche.
		// En orbite basse
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Lowlands = Vous regardez les ondulations encercler le monde aquatique massif en dessous. Votre briefing dit que ce sont des vagues de la taille de montagnes, mais ça ne peut pas être vrai, non ?
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Midlands = Il est difficile de comprendre la quantité d'eau sur une planète océan, et pourtant en dessous de vous se trouve Rouqea, surgissant dans votre hublot comme un joyau de saphir pur.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Highlands = Rouqea remplit votre fenêtre tout autant que Kcalbeloh - un toast à la fois à l'échelle du Trou Noir et à votre proximité avec le géant monde océan.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Cracks = Dans les zones plus calmes de l'océan, vous pouvez presque voir un reflet de Kcalbeloh ! Un reflet déformé, brisé, mais un reflet tout de même.
		// En orbite haute
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Lowlands = On dirait que quelqu'un a inondé Kerbin. Attendez, ce n'est pas Kerbin ?
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Midlands = Il semble que le temps pourrait s'écouler plus lentement autour du trou noir. Ou pas du tout ! En inspectant l'horloge au mur, il devient clair que Jeb a peut-être retiré les piles à un moment donné.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Highlands = Vous avez soudainement l'envie de construire, faire pivoter, puis tenter d'arrimer à une station spatiale.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Cracks = C'est paisible cette haute altitude au-dessus de l'atmosphère. Vous sentez qu'une musique d'orgue pulsante et forte changerait cette atmosphère paisible.
		// Scans de température
		// À terre
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Lowlands = La température est stupéfiante ! Peut-être que les forces de marée du trou noir provoquent une sorte d'effet volcanique dans le noyau de la planète.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Midlands = Pour être entouré d'eau, vous regardez l'affichage indiquer des températures de plus en plus élevées. Quelque chose chauffe les capteurs ! Le R&D va s'en donner à cœur joie.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Highlands = Les températures culminent de manière imprévisible. Peut-être y a-t-il une sortie volcanique sous-marine à proximité ?
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Cracks = La température chute soudainement d'une valeur très élevée à une valeur très basse. Presque glacial ! Qu'est-ce qui pourrait causer une telle variation ?
		// À l'eau
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Lowlands = La température de l'eau est parfaite pour une baignade ! Les vagues ? Pas tant que ça.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Midlands = L'eau est calme et modérément chaude - comme un jour à la plage sur Kerbin. Vous n'avez jamais connu Kerbin pour accueillir des vagues de la taille de montagnes, cependant.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Highlands = Vous vous demandez si la température de l'eau des montagnes au loin est la même, mais elles semblent s'éloigner à mesure que vous vous rapprochez. Pas d'inquiétude, il y en a une qui approche maintenant.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Cracks = L'eau est glacialement froide sous votre vaisseau, comme si quelque chose aspirait la chaleur de cet océan planétaire par ailleurs tropical.
		// Vol à basse altitude
		#LOC_KS_SciDef_temperatureScan_Rouqea_FlyingLow_Lowlands = L'air est chaud - parfait pour une session de parachutisme improvisée !
		#LOC_KS_SciDef_temperatureScan_Rouqea_FlyingLow_Midlands = Température parfaite pour des vacances - si seulement y arriver n'était pas si difficile.
		#LOC_KS_SciDef_temperatureScan_Rouqea_FlyingLow_Highlands = Température parfaite pour les vacances et le surf ! Il y a même des vagues pour surfer !
		#LOC_KS_SciDef_temperatureScan_Rouqea_FlyingLow_Cracks = L'air étant chaud par rapport à l'océan en dessous semble créer des tourbillons à la surface de l'eau. Fascinant !
		// Vol à haute altitude
		#LOC_KS_SciDef_temperatureScan_Rouqea_FlyingHigh_Lowlands = L'air que le thermomètre peut mesurer à cette altitude est frais.
		#LOC_KS_SciDef_temperatureScan_Rouqea_FlyingHigh_Midlands = L'air autour de vous est fin, mais votre thermomètre vous dit que plus vous êtes haut, plus l'air devient frais. 
		#LOC_KS_SciDef_temperatureScan_Rouqea_FlyingHigh_Highlands = Il y a peu d'air à mesurer, mais l'air présent mesure juste en dessous de la température ambiante. 
		#LOC_KS_SciDef_temperatureScan_Rouqea_FlyingHigh_Cracks = Il fait certainement plus froid ici-haut qu'à la surface !
		// En orbite basse
		#LOC_KS_SciDef_temperatureScan_Rouqea_InSpaceLow = Il est facile d'imaginer que l'eau est chaude d'ici, mais le thermomètre n'en a aucune idée.
		// En orbite haute
		#LOC_KS_SciDef_temperatureScan_Rouqea_InSpaceHigh = Le thermomètre vous lance un regard, vous suppliant d'arrêter de mesurer les températures depuis l'espace.

		// Rapports EVA
		// À terre3
		#LOC_KS_SciDef_evaReport_Rouqea_SrfLanded = La pression est bien trop forte pour votre combinaison EVA et pourtant vous êtes là. L'univers est à parts égales stupéfait et fier de vos réalisations aujourd'hui.
		// À l'eau
		#LOC_KS_SciDef_evaReport_Rouqea_SrfSplashed_Lowlands = Vous aviez raison ! L'eau est à la température parfaite pour nager.
		#LOC_KS_SciDef_evaReport_Rouqea_SrfSplashed_Midlands = C'est très chaud ! Comme un bain à bulles relaxant. Dans une machine à vagues.
		#LOC_KS_SciDef_evaReport_Rouqea_SrfSplashed_Highlands = Peut-être pouvez-vous surfer sur celles de la taille de montagnes aussi !
		#LOC_KS_SciDef_evaReport_Rouqea_SrfSplashed_Cracks = C'est un peu frais. Peut-être que des eaux plus chaudes sont nécessaires pour nager ici.
		// Vol à basse altitude
		#LOC_KS_SciDef_evaReport_Rouqea_FlyingLow_Lowlands = Vous ne pouvez pas dire à quelle distance au-dessus de l'eau scintillante vous êtes d'ici ! C'est plutôt désorientant sans aucune terre.
		#LOC_KS_SciDef_evaReport_Rouqea_FlyingLow_Midlands = L'air chaud sur votre visage est agréable, mais les vagues imposantes à mi-distance signifient que vous ne pouvez pas vous détendre longtemps.
		#LOC_KS_SciDef_evaReport_Rouqea_FlyingLow_Highlands = De cette hauteur vous pouvez presque voir le sommet des vagues !
		#LOC_KS_SciDef_evaReport_Rouqea_FlyingLow_Cracks = Vous pouvez voir la surface agitée de l'eau d'ici-haut !
		// Vol à haute altitude
		#LOC_KS_SciDef_evaReport_Rouqea_FlyingHigh_Lowlands = C'est une situation des plus dangereuses dans laquelle vous vous trouvez.
		#LOC_KS_SciDef_evaReport_Rouqea_FlyingHigh_Midlands = Que tant de ciel soit sombre, plutôt que des étoiles, à cette altitude est inquiétant pour le moins.
		#LOC_KS_SciDef_evaReport_Rouqea_FlyingHigh_Highlands = L'altitude parfaite pour secourir un vaisseau spatial en rotation !
		#LOC_KS_SciDef_evaReport_Rouqea_FlyingHigh_Cracks = Les vagues agitées en dessous de vous ressemblent presque à des bulles au fond d'une cascade depuis cette hauteur !
		// En orbite basse
		#LOC_KS_SciDef_evaReport_Rouqea_InSpaceLow = Pour une raison quelconque, vous pensez qu'il serait bon de vous assurer que votre sas a un joint approprié. Au cas où. 
		// En orbite haute
		#LOC_KS_SciDef_evaReport_Rouqea_InSpaceHigh = Vous avez l'impression de pouvoir passer des heures ici, mais il ne s'est écoulé que quelques secondes ! Intéressant ! 

		// Mystery Goo
		// À terre
		#LOC_KS_SciDef_mysteryGoo_Rouqea_SrfLanded_Lowlands = La substance semble avoir été compressée en un état solidifié à une telle profondeur sous l'eau ! La pression doit être énorme !
		#LOC_KS_SciDef_mysteryGoo_Rouqea_SrfLanded_Midlands = La substance s'est agglomérée en une boule lisse et semble s'être durcie à des niveaux de densité impossibles. Intéressant !
		#LOC_KS_SciDef_mysteryGoo_Rouqea_SrfLanded_Highlands = La substance est presque métallique à de telles pressions !
		#LOC_KS_SciDef_mysteryGoo_Rouqea_SrfLanded_Cracks = La substance a adopté une configuration d'une densité presque impossible à une telle profondeur sous-marine.
		// À l'eau
		#LOC_KS_SciDef_mysteryGoo_Rouqea_SrfSplashed_Lowlands = La substance pourrait fuir de sa chambre de confinement.
		#LOC_KS_SciDef_mysteryGoo_Rouqea_SrfSplashed_Midlands = La substance clapote dans sa chambre.
		#LOC_KS_SciDef_mysteryGoo_Rouqea_SrfSplashed_Highlands = La substance a une consistance gélatineuse ici !
		#LOC_KS_SciDef_mysteryGoo_Rouqea_SrfSplashed_Cracks = La substance semble nerveuse.
		// Vol à basse altitude
		#LOC_KS_SciDef_mysteryGoo_Rouqea_FlyingLow_Lowlands = La substance clapote dans son conteneur avec les mouvements du vaisseau.
		#LOC_KS_SciDef_mysteryGoo_Rouqea_FlyingLow_Midlands = Une partie de la substance s'échappe de son conteneur et éclabousse l'océan en dessous quelques secondes plus tard.
		#LOC_KS_SciDef_mysteryGoo_Rouqea_FlyingLow_Highlands = La substance brille à la lumière de Kcalbeloh.
		#LOC_KS_SciDef_mysteryGoo_Rouqea_FlyingLow_Cracks = Le Goo prend une couleur étrange dans la basse atmosphère ! 
		// Vol à haute altitude
		#LOC_KS_SciDef_mysteryGoo_Rouqea_FlyingHigh_Lowlands = La substance semble commencer à se solidifier et à cristalliser à mesure que vous montez vers l'espace.
		#LOC_KS_SciDef_mysteryGoo_Rouqea_FlyingHigh_Midlands = La substance semble se durcir à cette altitude.
		#LOC_KS_SciDef_mysteryGoo_Rouqea_FlyingHigh_Highlands = La substance semble s'agglomérer.
		#LOC_KS_SciDef_mysteryGoo_Rouqea_FlyingHigh_Cracks = La substance semble... vibrer légèrement ?
		// En orbite basse
		#LOC_KS_SciDef_mysteryGoo_Rouqea_InSpaceLow = La substance semble prendre la forme de globes, avec de minuscules particules de substance orbitant autour de plus grosses dans l'environnement de microgravité.
		// En orbite haute
		#LOC_KS_SciDef_mysteryGoo_Rouqea_InSpaceHigh = La substance continue de se sentir à l'aise dans cette profondeur de l'espace.

		// Échantillons de surface
		// À terre
		#LOC_KS_SciDef_surfaceSample_Rouqea_SrfLanded_Lowlands = Le fond océanique est très compressé à cette profondeur ! Vous avez du mal à remplir un sachet d'échantillons à cause de la pression !
		#LOC_KS_SciDef_surfaceSample_Rouqea_SrfLanded_Midlands = Vous collectez quelques morceaux de sable et de gravier épars.
		#LOC_KS_SciDef_surfaceSample_Rouqea_SrfLanded_Highlands = Vous prenez un échantillon de sol du fond océanique sous-marin. Il n'y a pas de sol. Vous prenez un échantillon de roche. Cela s'est mieux passé.
		#LOC_KS_SciDef_surfaceSample_Rouqea_SrfLanded_Cracks = Vous prenez un échantillon de surface et il y a effectivement très peu de surface à échantillonner.
		// À l'eau
		#LOC_KS_SciDef_surfaceSample_Rouqea_SrfSplashed_Lowlands = Vous prenez un échantillon de surface très aqueux. Il y a de l'eau dans votre sachet d'échantillons.
		#LOC_KS_SciDef_surfaceSample_Rouqea_SrfSplashed_Midlands = L'eau se répand sur d'autres échantillons pendant que vous essayez de la récupérer. Je suis sûr que le R&D ne se soucie pas de la contamination croisée, c'est une affaire de nourriture après tout.
		#LOC_KS_SciDef_surfaceSample_Rouqea_SrfSplashed_Highlands = Alors que l'eau se répand, vous vous rappelez que la contamination croisée ne compte que pour la nourriture, et comme ce n'est pas Minmus, vous n'avez rien à craindre.
		#LOC_KS_SciDef_surfaceSample_Rouqea_SrfSplashed_Cracks = Vous prenez un échantillon d'une des vagues qui passent et vous vous estimez chanceux qu'elle ne vous ait pas, à son tour, pris comme échantillon.

		// Laboratoire mobile de matériaux
		// À terre
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_SrfLanded_Lowlands = Les matériaux semblent subir une forte pression et se sont beaucoup condensés depuis votre dernière vérification.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_SrfLanded_Midlands = Au fond de l'océan, les matériaux sont... mouillés.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_SrfLanded_Highlands = En examinant vos échantillons, vous enregistrez les résultats... hmmm... oui... ils sont détrempés.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_SrfLanded_Cracks = Sommes-nous sûrs d'avoir pensé à étanchéifier les échantillons électroniques ici ?
		// À l'eau
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_SrfSplashed_Lowlands = Les matériaux oscillent d'avant en arrière pendant que le vaisseau tangue dans les vagues.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_SrfSplashed_Midlands = Certains matériaux dans la zone de matériaux ont été délogés par le passage de la dernière grosse vague.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_SrfSplashed_Highlands = Certains des matériaux les plus réactifs ont commencé à rouiller sous l'eau qui s'écoule sur eux.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_SrfSplashed_Cracks = L'eau agitée autour du vaisseau rend difficile l'observation des matériaux, mais vous prenez vos notes malgré leur état détrempé.
		// Vol à basse altitude
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_FlyingLow_Lowlands = La zone de matériaux résonne comme une maraca métallique pendant que vous volez dans les airs.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_FlyingLow_Midlands = La zone de matériaux est bien rangée ! Vous veillez à ne pas la laisser aussi organisée que vous l'avez trouvée - les gars du R&D ne peuvent pas avoir la vie trop facile, après tout.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_FlyingLow_Highlands = Vous vous demandez quels autres matériaux vous trouverez à la surface de la planète.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_FlyingLow_Cracks = L'eau semble bien agitée en dessous. Certains courants d'air font tanguer le vaisseau et perturbent certains matériaux, les plus fragiles ont été cassés.
		// Vol à haute altitude
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_FlyingHigh_Lowlands = À cette altitude, certains matériaux ont commencé à s'agglomérer.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_FlyingHigh_Midlands = Certains matériaux qui s'étaient précédemment liquéfiés ont commencé à s'évaporer.
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_FlyingHigh_Highlands = Observer l'effet de l'air fin et de haute altitude sur les matériaux est intéressant ! Vous vous demandez comment ils s'en sortiraient exposés au trou noir lui-même...
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_FlyingHigh_Cracks = La zone de matériaux contient des matériaux. Vous avez pensé vérifier cela avant d'enregistrer plus de données plus tard dans la mission.
		// En orbite basse
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_InSpaceLow = L'orbite de Rouqea constitue un magnifique arrière-plan pour contempler la collection de roches que vous avez apportée.
		// En orbite haute
		#LOC_KS_SciDef_mobileMaterialsLab_Rouqea_InSpaceHigh = Certains matériaux changent de couleur à l'approche de la ceinture de radiation entourant Rouqea. Elle doit avoir un champ magnétique !

		// Scan barométrique
		#LOC_KS_SciDef_barometerScan_Rouqea_SrfLanded = Le baromètre a atteint sa limite et tient bon pour la vie.
		#LOC_KS_SciDef_barometerScan_Rouqea_SrfLanded_Lowlands = La pression extrêmement élevée fait éclater le verre du baromètre. Avec le recul, vous auriez probablement dû prendre une garantie à vie pour ce truc.
		#LOC_KS_SciDef_barometerScan_Rouqea_SrfLanded_Cracks = Le baromètre a été compacté en un cube par les immenses pressions sous-marines.
		#LOC_KS_SciDef_barometerScan_Rouqea_SrfSplashed = Le baromètre approche de la pression maximale qu'il peut enregistrer.
		#LOC_KS_SciDef_barometerScan_Rouqea_FlyingLow = Les relevés de pression suggèrent une atmosphère brutalement épaisse. Cela pourrait expliquer comment la planète peut maintenir de l'eau liquide sans recevoir beaucoup de chaleur de Kcalbeloh.
		#LOC_KS_SciDef_barometerScan_Rouqea_FlyingHigh = Même à cette altitude, le baromètre enregistre une pression ambiante remarquablement élevée.

		// Scan gravimétrique
		// À terre
		#LOC_KS_SciDef_gravityScan_Rouqea_SrfLanded = La gravité ici semble être encore plus forte que lorsque vous l'avez mesurée à la surface ! Intéressant !
		// À l'eau
		#LOC_KS_SciDef_gravityScan_Rouqea_SrfSplashed = La gravité ici est un peu plus forte que sur Kerbin, mais ce n'est pas inconfortable, plutôt comme un jogging constant en montée ! Mais surfer le vaisseau sur le flanc des plus grosses vagues offre une expérience 0G merveilleuse !
		// En orbite basse
		#LOC_KS_SciDef_gravityScan_Rouqea_InSpaceLow = Les capteurs de gravité détectent que Rouqea est le corps gravitationnel dominant, mais toutes les quelques secondes une valeur d'une magnitude monumentale scintille sur l'écran. Vous imaginez que c'est Kcalbeloh qui vous rappelle qu'il est toujours là.
		// En orbite haute
		#LOC_KS_SciDef_gravityScan_Rouqea_InSpaceHigh = Avec Kcalbeloh si proche, il est difficile d'obtenir une lecture fiable de la gravité de Rouqea. Cependant, après une avalanche de lectures comme -65535, vous trouvez enfin la trace de l'attraction gravitationnelle qu'est Rouqea.

		// Analyse atmosphérique
		// Vol à basse altitude
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingLow_Lowlands = L'atmosphère de Rouqea est très similaire à l'atmosphère de Kerbin !
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingLow_Midlands = L'atmosphère de Rouqea est respirable ! Mais n'essayez pas de respirer sous l'eau. Ce n'est pas très malin.
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingLow_Highlands = Bien que l'atmosphère ici soit épaisse et respirable, les vagues signifient que vous devez faire attention au moment exact où vous prenez ces inspirations.
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingLow_Cracks = Le fait que l'atmosphère soit respirable aide certainement à la vivabilité de ce monde aquatique, même si les vagues montagneuses n'y contribuent pas.
		// Vol à haute altitude
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingHigh_Lowlands = L'atmosphère est plus fine ici-haut et il y a des traces d'hydrogène à cette altitude.
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingHigh_Midlands = Les traces d'hydrogène sont probablement dues à la présence de Kcalbeloh ! Les éléments plus légers s'échapperaient plus facilement, bien sûr, et Rouqea est donc au parfait endroit pour les recueillir !
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingHigh_Highlands = Haut dans l'atmosphère, vous détectez l'étrange signal d'une particule à haute énergie de Kcalbeloh, vous rappelant simplement qu'il pourrait décimer toute la planète en un clin d'œil si l'envie lui en prenait.
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingHigh_Cracks = L'air en haute altitude est globalement similaire à l'air en basse altitude. Juste plus fin, moins humide, et avec une vue existentiellement plus terrifiante d'un trou noir.

		// Scan sismique
		#LOC_KS_SciDef_seismicScan_Rouqea_SrfLanded = L'analyse des données sismiques collectées lors de l'atterrissage sur le fond marin de Rouqea a révélé des indications d'activité tectonique dans la croûte de la planète.

		// Magnétomètre
		#LOC_KS_SciDef_magnetometer_Rouqea_InSpaceLow = Les relevés du magnétomètre en orbite basse autour de Rouqea indiquent un champ magnétique faible mais détectable.
		#LOC_KS_SciDef_magnetometer_Rouqea_InSpaceHigh = Aucun champ magnétique n'a été détecté lors de l'expérience du magnétomètre dans les conditions d'orbite haute de Rouqea.


		// Iomena

		#LOC_KS_SciDef_crewReport_Iomena_SrfLanded = Le rapport d'équipage depuis la surface d'Iomena note l'environnement hostile de la planète et les conditions météorologiques extrêmes. Cependant, la beauté du paysage, avec ses cratères, océans, montagnes, canyons et rivières, est également notée, ainsi que la vue spectaculaire du trou noir.
		#LOC_KS_SciDef_crewReport_Iomena_SrfSplashed = Malgré les conditions hostiles, l'équipage a profité d'une vue spectaculaire de Kcalbeloh depuis la planète.
		#LOC_KS_SciDef_crewReport_Iomena_FlyingLow = En survolant les canyons et rivières d'Iomena, nous avons observé le terrain accidenté de la planète dans l'atmosphère fine.
		#LOC_KS_SciDef_crewReport_Iomena_FlyingHigh = Alors que nous planions dans la haute atmosphère d'Iomena, la vue était vraiment à couper le souffle. Nous pouvions voir les cratères et montagnes de la planète sous un angle entièrement nouveau. L'atmosphère fine nous permettait de voir au loin, et le disque d'accrétion brillant sur la surface de la planète créait un magnifique jeu de lumière et d'ombres.
		#LOC_KS_SciDef_crewReport_Iomena_InSpaceLow = Iomena semble être une planète froide et hostile, mais c'est toujours une destination fascinante pour l'exploration scientifique.
		#LOC_KS_SciDef_crewReport_Iomena_InSpaceHigh = Depuis haut au-dessus d'Iomena, le terrain accidenté et les vastes océans de la planète sont visibles. Les cratères et canyons créent un paysage dramatique, et les montagnes glacées scintillent à la lumière.

		#LOC_KS_SciDef_temperatureScan_Iomena_SrfLanded = Le scan de température à la surface d'Iomena révèle un environnement froid avec une température moyenne de -40°C. Cependant, la température varie considérablement selon l'emplacement, certaines zones étant beaucoup plus froides que d'autres.
		#LOC_KS_SciDef_temperatureScan_Iomena_SrfSplashed = Le scan de température effectué après l'amerrissage à la surface de l'océan d'Iomena a révélé que la température de l'océan est de -40°C, ce qui est cohérent avec l'environnement extrêmement froid de la planète.
		#LOC_KS_SciDef_temperatureScan_Iomena_FlyingLow = Le scan de température effectué en vol dans la basse atmosphère d'Iomena a révélé une diminution progressive de la température à mesure que l'altitude augmentait.
		#LOC_KS_SciDef_temperatureScan_Iomena_FlyingHigh = Alors que le vaisseau planait dans la haute atmosphère d'Iomena, les relevés de température indiquaient les conditions glaciales des régions de haute altitude de la planète.

		#LOC_KS_SciDef_evaReport_Iomena_SrfLanded = Lors de l'EVA à la surface d'Iomena, l'équipage a observé les grands cratères et le terrain accidenté, ainsi que la présence d'ammoniac dans les roches et le sol. Ils ont également noté les températures extrêmement froides et l'atmosphère fine, qui rendraient difficile la survie des kerbonautes sans équipement de protection.
		#LOC_KS_SciDef_evaReport_Iomena_SrfSplashed = Bien qu'il soit difficile de se déplacer à cause de la résistance du liquide, l'équipe EVA a pu collecter des échantillons de l'océan et observer les zones environnantes. La forte concentration d'ammoniac dans l'eau était immédiatement notable.
		#LOC_KS_SciDef_evaReport_Iomena_FlyingLow = Le rapport EVA en basse atmosphère sur Iomena révèle un environnement hostile avec des températures très basses. L'équipage observe également le terrain accidenté avec canyons, montagnes et rivières.
		#LOC_KS_SciDef_evaReport_Iomena_FlyingHigh = Le rapport EVA en vol dans la haute atmosphère d'Iomena indiquait que l'air était fin et que la température était extrêmement basse. La surface de la planète était visible en dessous, avec de grands cratères et des chaînes de montagnes.
		#LOC_KS_SciDef_evaReport_Iomena_InSpaceLow = Alors que le membre d'équipage s'aventurait à l'extérieur du vaisseau spatial, il a pu observer la planète Iomena depuis l'obscurité de l'espace. L'atmosphère fine donnait à la planète une apparence unique. Ce fut une expérience à couper le souffle et inoubliable.
		#LOC_KS_SciDef_evaReport_Iomena_InSpaceHigh = La vue depuis l'orbite haute au-dessus d'Iomena est spectaculaire, avec son terrain accidenté et ses vastes océans. L'atmosphère fine de la planète est visible dans une teinte bleu-gris.

		#LOC_KS_SciDef_surfaceSample_Iomena_SrfLanded = Lors de la collecte d'un échantillon de surface d'Iomena, il a été observé que le sol est principalement composé de minéraux silicatés et contient des niveaux élevés d'ammoniac. L'échantillon contenait également des traces de composés organiques, ce qui pourrait suggérer la possibilité de vie passée ou présente.
		#LOC_KS_SciDef_surfaceSample_Iomena_SrfSplashed = Lors de la collecte de l'échantillon liquide de l'océan d'Iomena, nous avons observé une forte concentration d'ammoniac, cohérente avec les études atmosphériques précédentes. Une analyse plus approfondie est nécessaire pour déterminer d'autres composants chimiques ou biologiques notables dans l'échantillon.

		#LOC_KS_SciDef_mobileMaterialsLab_Iomena_SrfLanded = L'expérience de la zone de matériaux à la surface d'Iomena a révélé la présence de divers minéraux, dont le fer, l'aluminium et le silicium. De plus, les échantillons de surface collectés indiquent une possible activité volcanique dans le passé. L'atmosphère fine contient également des niveaux élevés d'ammoniac, qui ont pu contribuer à la formation de certains de ces minéraux.
		#LOC_KS_SciDef_mobileMaterialsLab_Iomena_SrfSplashed = L'expérience de la zone de matériaux donne des résultats intéressants sur la composition chimique des océans de la planète, compte tenu de la forte concentration d'ammoniac présente.

		#LOC_KS_SciDef_barometerScan_Iomena_SrfLanded = Nous pouvons observer que la pression atmosphérique est inférieure à celle de Kerbin, ce qui est attendu étant donné que la planète a une atmosphère plus fine.
		#LOC_KS_SciDef_barometerScan_Iomena_SrfSplashed = La pression à la surface de l'océan s'est avérée dans la plage attendue selon les données précédentes : la pression atmosphérique était significativement inférieure à celle de Kerbin.

		#LOC_KS_SciDef_seismicScan_Iomena_SrfLanded = L'expérience de scan sismique menée sur Iomena en atterrissant sur sa surface a fourni des informations précieuses sur la structure interne de la planète. Le scan a révélé un réseau complexe de failles et de fractures sous la surface de la planète, indiquant une activité tectonique dans le passé de la planète. Les données ont également indiqué la présence d'un manteau rocheux solide et d'un noyau métallique.

		#LOC_KS_SciDef_gravityScan_Iomena_SrfLanded = Les relevés de gravité sur Iomena fluctuent de manière notable selon l'emplacement des mesures. Cela est probablement dû au terrain accidenté de la planète et à l'impact de ses nombreux cratères et canyons sur la géologie interne.
		#LOC_KS_SciDef_gravityScan_Iomena_InSpaceLow = Les relevés de gravité effectués en orbite basse autour d'Iomena montrent des valeurs relativement stables par rapport à celles prises à la surface de la planète. Lors du scan gravimétrique effectué en orbite basse autour d'Iomena, il a été observé que la planète a une attraction gravitationnelle relativement faible par rapport à Kerbin.
		#LOC_KS_SciDef_gravityScan_Iomena_InSpaceHigh = Les relevés de gravité fluctuent légèrement selon l'altitude du vaisseau spatial et l'attraction gravitationnelle de Kcalbeloh.

		#LOC_KS_SciDef_magnetometer_Iomena_InSpaceLow = Le faible champ magnétique d'Iomena est encore détectable même en orbite basse, indiquant une possible source de matériau magnétique sur ou sous la surface de la planète. Les variations de l'intensité du champ magnétique suggèrent également la présence de gisements minéraux localisés ou d'autres caractéristiques géologiques à investiguer.
		#LOC_KS_SciDef_magnetometer_Iomena_InSpaceHigh = Les relevés du magnétomètre depuis l'orbite haute d'Iomena montrent que la planète a un champ magnétique faible, probablement dû à son atmosphère fine et à l'absence d'un noyau riche en fer substantiel. Cependant, il existe de petites variations locales du champ magnétique, suggérant la présence de gisements minéraux ou d'autres caractéristiques géologiques à étudier.

		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_SrfLanded = D'après l'analyse atmosphérique effectuée en atterrissant sur Iomena, il apparaît que l'atmosphère de la planète est principalement composée d'ammoniac avec des traces de méthane et de dioxyde de carbone. L'atmosphère contient également de petites quantités de divers hydrocarbures, probablement dus à l'activité géologique.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_SrfSplashed = D'après l'analyse atmosphérique effectuée en amerrissant sur la surface liquide d'Iomena, il apparaît que l'atmosphère de la planète est principalement composée d'ammoniac avec des traces de méthane et de dioxyde de carbone. L'atmosphère contient également de petites quantités de divers hydrocarbures, probablement dus à l'activité géologique.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_FlyingLow = D'après l'analyse atmosphérique effectuée en vol à basse altitude sur Iomena, l'atmosphère de la planète est principalement composée d'ammoniac avec des traces de méthane et de dioxyde de carbone. La présence d'hydrocarbures suggère une activité géologique potentielle.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_FlyingHigh = Depuis la haute atmosphère d'Iomena, notre analyse indique que la concentration d'ammoniac est significativement plus élevée que dans la basse atmosphère. Cela suggère qu'il pourrait y avoir des processus géologiques ou atmosphériques qui concentrent l'ammoniac à des altitudes plus élevées.

		// Uleg
		#LOC_KS_SciDef_crewReport_Uleg_SrfLanded = Lors de l'atterrissage sur Uleg, l'équipage a signalé des températures extrêmement basses et des vents glacés constants. Ils ont également noté la présence de grandes formations de glace et des traces de cryovolcanisme actif. L'équipage a conclu qu'Uleg serait un environnement difficile pour toute future mission d'exploration.
		#LOC_KS_SciDef_crewReport_Uleg_FlyingLow = Nous avons pu observer le terrain glacé de la planète en détail lors de notre survol de la basse atmosphère d'Uleg. La surface était relativement plate avec quelques petites fissures et crêtes visibles. La température glaciale et la faible pression atmosphérique rendent la planète inhospitalière à la vie telle que nous la connaissons.
		#LOC_KS_SciDef_crewReport_Uleg_FlyingHigh = Nous avons traversé la haute atmosphère d'Uleg et rencontré des vents forts et un froid intense. L'épaisse couche de glace de la planète et la faible pression atmosphérique ont rendu difficile le maintien de l'altitude, et nos instruments ont montré que l'air était très sec. La vue d'en haut était à couper le souffle, avec des nuages tourbillonnants de cristaux de glace et des montagnes enneigées visibles au loin.
		#LOC_KS_SciDef_crewReport_Uleg_InSpaceLow = Alors que nous volions dans l'espace près d'Uleg, nous pouvions voir la surface glacée de la planète scintiller au loin. Malgré la distance d'avec Kcalbeloh, la gravité de la planète était encore fortement ressentie par notre vaisseau, nous rappelant les forces puissantes en jeu dans l'univers. L'obscurité de l'espace n'était qu'accentuée par la beauté glaciale d'Uleg, offrant un spectacle vraiment impressionnant.
		#LOC_KS_SciDef_crewReport_Uleg_InSpaceHigh = L'équipage rapporte que depuis l'orbite haute, Uleg apparaît comme un monde désolé et stérile avec une surface presque entièrement couverte de glace. L'orbite très inclinée et excentrique de la planète signifie qu'elle passe la plupart de son temps loin de Kcalbeloh, résultant en un environnement sombre et froid. Malgré ses conditions hostiles, l'équipage note que les caractéristiques uniques de la planète en font un sujet intrigant pour une étude ultérieure.

		#LOC_KS_SciDef_temperatureScan_Uleg_SrfLanded = La température à la surface d'Uleg est extrêmement froide, avec des relevés constamment en dessous du point de congélation. La glace couvrant la surface est probablement le résultat des températures glaciales de la planète, et il n'est pas clair s'il existe des zones sur la planète qui ne sont pas couvertes de glace.
		#LOC_KS_SciDef_temperatureScan_Uleg_FlyingLow = La température sur Uleg diminue significativement à mesure que l'altitude diminue, avec une différence pouvant atteindre 50 degrés Celsius entre la haute et la basse atmosphère. Cela est probablement dû à l'atmosphère fine de la planète et à l'absence de gaz à effet de serre.
		#LOC_KS_SciDef_temperatureScan_Uleg_FlyingHigh = La température dans la haute atmosphère d'Uleg est extrêmement basse, ce qui est probablement dû à la distance de la planète par rapport à Kcalbeloh, ainsi qu'à l'absence d'une atmosphère substantielle pour piéger la chaleur. Le scan de température montre également de petites variations de température dans la haute atmosphère, probablement dues aux différences de topographie de surface et de couverture de glace.

		#LOC_KS_SciDef_evaReport_Uleg_SrfLanded = Alors que l'équipage mettait pied sur la surface glacée d'Uleg, il a été frappé par le froid intense et l'immense étendue de terrain gelé devant lui. Le paysage glacé était parsemé d'affleurements rocheux. L'équipage a également signalé un sentiment d'émerveillement devant la beauté austère du paysage gelé d'Uleg, soulignant le potentiel de découverte scientifique même dans les environnements les plus extrêmes.
		#LOC_KS_SciDef_evaReport_Uleg_FlyingLow = En raison des températures extrêmement basses et du terrain glacé, conduire une EVA dans la basse atmosphère d'Uleg serait très difficile et dangereux. Il n'est pas recommandé de tenter une EVA dans de telles conditions.
		#LOC_KS_SciDef_evaReport_Uleg_FlyingHigh = En raison du froid extrême et de l'absence d'atmosphère, il n'est pas recommandé aux astronautes d'effectuer une EVA dans la haute atmosphère d'Uleg. Les conditions seraient trop hostiles et poseraient un risque significatif pour la sécurité de l'équipage.
		#LOC_KS_SciDef_evaReport_Uleg_InSpaceLow = Alors que le membre d'équipage s'aventurait à l'extérieur du vaisseau spatial, il a pu observer la planète glaciale Uleg depuis l'obscurité de l'espace. La surface de la planète était principalement couverte d'une épaisse couche de glace, lui donnant une apparence austère et désolée. Malgré les conditions froides et hostiles, le membre d'équipage s'émerveilla de la beauté de la planète sur le fond du cosmos infini.
		#LOC_KS_SciDef_evaReport_Uleg_InSpaceHigh = Lors de l'EVA en orbite haute au-dessus d'Uleg, le membre d'équipage a observé la surface glacée de la planète glaciale et son orbite très inclinée et excentrique. La vue à couper le souffle et inoubliable a mis en évidence les caractéristiques uniques de la planète, capturée sur fond d'obscurité spatiale.

		#LOC_KS_SciDef_surfaceSample_Uleg_SrfLanded = Lors de la collecte d'échantillons de surface d'Uleg, l'équipage a remarqué que la glace était extrêmement dure et montrait des traces d'exposition à des températures extrêmes. La composition des échantillons suggère que la glace est composée d'un mélange d'eau, de méthane et de dioxyde de carbone, ce qui pourrait fournir des informations précieuses sur l'histoire et la formation de la planète.

		#LOC_KS_SciDef_mobileMaterialsLab_Uleg_SrfLanded = Lors de l'expérience d'étude des matériaux menée à la surface d'Uleg, des échantillons de glace ont été analysés pour leur composition chimique et leurs propriétés physiques. L'analyse a révélé que la glace sur Uleg est principalement composée d'eau, avec de petites quantités d'autres éléments et composés. Les propriétés physiques de la glace indiquent qu'elle est très dure et fragile, probablement en raison des températures extrêmement froides sur la planète.

		#LOC_KS_SciDef_barometerScan_Uleg_SrfLanded = Le scan barométrique à la surface d'Uleg a indiqué une faible pression atmosphérique, cohérente avec les températures glaciales de la planète et l'absence d'atmosphère significative.
		#LOC_KS_SciDef_barometerScan_Uleg_FlyingLow = Le scan barométrique effectué dans la basse atmosphère d'Uleg a révélé une pression d'air significativement plus faible. Les relevés indiquent que l'atmosphère de la planète est extrêmement fine et impropre à la respiration.
		#LOC_KS_SciDef_barometerScan_Uleg_FlyingHigh = La pression serait trop faible pour que l'instrument détecte des données significatives. L'atmosphère fine ne permettrait pas au baromètre de fonctionner correctement.

		#LOC_KS_SciDef_seismicScan_Uleg_SrfLanded = Lors du scan sismique à la surface d'Uleg, l'équipement a enregistré plusieurs petits tremblements, indiquant que la planète pourrait encore être géologiquement active, bien que sa surface soit principalement gelée. Une analyse plus approfondie des données sera nécessaire pour déterminer la source de ces tremblements et leurs implications potentielles pour la géologie de la planète.

		#LOC_KS_SciDef_gravityScan_Uleg_SrfLanded = L'équipage a effectué un scan gravimétrique à la surface d'Uleg. Les résultats ont montré des variations du champ gravitationnel de la planète, indiquant la présence de régions relativement creuses sous la surface glacée. Une analyse plus approfondie est nécessaire pour déterminer la nature et la composition de ces régions.
		#LOC_KS_SciDef_gravityScan_Uleg_InSpaceLow = Lors de l'expérience de scan gravimétrique en orbite basse au-dessus d'Uleg, le vaisseau spatial a pu mesurer le champ gravitationnel de la planète. Les relevés ont montré une force gravitationnelle plus faible que prévu, indiquant qu'Uleg a une faible densité et pourrait avoir un intérieur partiellement creux.
		#LOC_KS_SciDef_gravityScan_Uleg_InSpaceHigh = Un scan gravimétrique a été effectué sur la planète Uleg depuis un vaisseau spatial en orbite haute. Le scan a révélé des variations significatives du champ gravitationnel de la planète, indiquant la présence de matériaux sous la surface moins denses.

		#LOC_KS_SciDef_magnetometer_Uleg_InSpace = Les données collectées ont montré un champ magnétique faible, probablement dû à l'absence d'un noyau de fer substantiel sur la planète. Les résultats seront utiles pour comprendre la géologie et la formation d'Uleg.

		#LOC_KS_SciDef_atmosphereAnalysis_Uleg_SrfLanded = Nous avons collecté des échantillons de gaz et mesuré la pression et la composition atmosphériques. Les résultats préliminaires suggèrent que l'atmosphère est principalement composée d'azote et de méthane, avec des traces d'autres gaz.
		#LOC_KS_SciDef_atmosphereAnalysis_UlegFlyingLow = Alors que le vaisseau spatial descendait dans la basse atmosphère d'Uleg, l'atmosphère s'est avérée fine et principalement composée d'azote. Le méthane et le dioxyde de carbone ont été détectés en traces. L'analyse a également montré que la pression atmosphérique augmentait avec la diminution de l'altitude.
		#LOC_KS_SciDef_atmosphereAnalysis_UlegFlyingHigh = L'analyse atmosphérique dans la haute atmosphère de la planète Uleg a révélé une forte concentration d'azote, de méthane et de dioxyde de carbone, suggérant que la planète pourrait connaître une forme d'activité géologique. De plus, la pression atmosphérique s'est avérée extrêmement faible, indiquant que la haute atmosphère d'Uleg est très fine.


		// Maelg
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceLow1 = Le corps juste à l'extérieur du hublot du vaisseau ne semble pas éblouir comme une vraie étoile le ferait, mais semble principalement baigner doucement la coque et les corps environnants d'une lueur douce.
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceLow2 = De cette distance rapprochée, les bandes de la naine brune sont clairement visibles, suggérant davantage son statut de « pas-quite-fusion ».
		#LOC_KS_SciDef_temperatureScan_Maelg_InSpaceLow = Bien que le thermomètre vous informe aimablement que Maelg est vraiment assez chaud, il révèle aussi qu'il ne fait qu'environ un tiers de la chaleur de Kerbol à sa « surface ».
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceLow1 = À cette distance rapprochée de la naine brune, avec seulement votre combinaison apparemment fragile vous protégeant de ses températures encore brûlantes, vous remettez en question les scientifiques Kerbal qui ont décrit l'étoile ratée à vous et votre équipage comme « petite et faible » lors du briefing de mission.
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceLow2 = La lumière émanant de Maelg n'est pas aussi dure que vous l'auriez attendu, et est en fait agréable.
		#LOC_KS_SciDef_mysteryGoo_Maelg_InSpaceLow = Le Goo non protégé commence rapidement à cuire et à se sublimer au contact rapproché de Maelg, malgré la température techniquement basse de la naine brune (en termes stellaires.)
		#LOC_KS_SciDef_mobileMaterialsLab_Maelg_InSpaceLow = Les échantillons de plomb et les autres métaux plus tendres commencent à bouillonner et à flotter hors de la soute à matériaux dans la lueur semblable à une lampe chauffante de Maelg, tandis que les échantillons plus résistants commencent simplement à briller de chaleur interne, pas dissimilairement au corps stellaire juste en dessous.
		#LOC_KS_SciDef_gravityScan_Maelg_InSpaceLow = La gravité indiquée à la surface de Maelg pourrait être comparée à une version substantiellement plus extrême du puits gravitationnel déjà puissant de Jool, car malgré sa taille (relativement parlant) petite, l'étoile ratée parvient à retenir Mehtna et Meiuqer assez solidement, malgré l'interférence des autres systèmes proches et de Kcalbeloh lui-même.
		#LOC_KS_SciDef_magnetometer_Maelg_InSpaceLow = Le magnétomètre révèle la fureur qui mijote dans l'autrement terne et faible Maelg, car il capte son champ magnétique violemment fort et les ceintures de radiation qui en résultent. Le KSC vous informe de le considérer comme les champs magnétiques de Jool sous stéroïdes... multipliés par 50.

		#LOC_KS_SciDef_crewReport_Maelg_InSpaceHigh1 = De cette distance, Maelg vous fait presque croire que c'est une étoile. Presque est le mot clé ici.
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceHigh2 = Tout au long d'ici, Maelg semble n'être qu'une veilleuse terne comparée aux projecteurs halogènes des étoiles auxquelles vous êtes habitué. Ce n'est certainement pas comparable à la colère impie de Kcalbeloh, ou même de Kerbol.
		#LOC_KS_SciDef_temperatureScan_Maelg_InSpaceHigh = De cette distance, Maelg n'est pas fortement détecté par l'unité de température. 
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceHigh1 = D'ici, Maelg vous rappelle un filament d'ampoule, brillant doucement par lui-même dans l'obscurité infinie. Comparé à l'horreur cosmique évoquée par Kcalbeloh, Maelg est assez réconfortant. 
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceHigh2 = Même si le vide de l'espace vous empêche de le faire physiquement, vous ne pouvez vous empêcher de vous sentir réchauffé par la lumière douce de Maelg. C'est facilement la plus confortable que vous ayez été sur ce voyage jusqu'à présent.
		#LOC_KS_SciDef_mysteryGoo_Maelg_InSpaceHigh = Le Goo semble prendre une teinte ambrée similaire à tout le reste dans le système Maelg. Ou est-ce juste un effet de la lumière terne qui recouvre tout à portée de vue ?
		#LOC_KS_SciDef_mobileMaterialsLab_Maelg_InSpaceHigh = La majorité des échantillons restent inertes à cette distance de la naine brune, à l'exception notable de sembler prendre la teinte sépia de l'étoile ratée en dessous. Cependant, la baie de test magnétique du laboratoire de matériaux indique que Maelg a un champ magnétique très étrange et puissant et est probablement assez volatil, malgré son apparence douce.
		#LOC_KS_SciDef_gravityScan_Maelg_InSpaceHigh = À cette distance, le puits gravitationnel de Maelg est un peu faible comparé aux vraies étoiles comme Kerbol, mais est encore palpable et dépasse de loin même les plus massives des planètes.
		#LOC_KS_SciDef_magnetometer_Maelg_InSpaceHigh = D'ici-haut, le champ magnétique détecté est encore assez docile, comme le reste de Maelg. Cependant, plus vous vous rapprochez, plus la violence au sein de la naine brune deviendra forte par rapport à vous et votre vaisseau minuscule.

		// Mehtna
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded1 = Vous ne pouvez vous empêcher d'être rappelé de photographies vintage en regardant la surface apparemment sépia de Mehtna depuis les fenêtres de l'atterrisseur.
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded2 = Comparé à certaines des destinations plus extrêmes en vitrine dans le voisinage de Kcalbeloh, tout cela est un changement de rythme bienvenu.
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded3 = Vous ne pouvez vous empêcher de vous sentir réconforté et même quelque peu somnolent sur ce petit monde sépia semblable à Duna.
		#LOC_KS_SciDef_temperatureScan_Mehtna_SrfLanded_TempLow = De ce côté de la planète, l'atmosphère se condense partiellement et tombe au sol en une sorte de neige fondue à cause du froid extrême, pas dissimilaire aux pôles de Duna, bien qu'à un degré bien moindre comparé à ce monde.
		#LOC_KS_SciDef_temperatureScan_Mehtna_SrfLanded_TempHigh = De ce côté de Mehtna, la fine atmosphère est substantiellement chauffée par le terne Maelg, et prouve qu'aucune partie de ce monde stérile et ambré n'est capable de supporter la vie, côté chaud ou froid nonobstant.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded1 = Vous sentez que tout autour de vous ressemble à une photographie vintage fanée. Votre propre peau semble prendre une teinte ambrée inhabituelle.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded2 = Vous avez le sentiment particulier, en vous tenant sur Mehtna, que ce monde est vraiment mort, semblable à une batterie épuisée.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded3 = Il est douteux que les panneaux solaires vous soient d'une grande utilité dans ce cadre terne.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_SrfLanded1 = Le Goo semble à la fois durcir et prendre une teinte sépia, et se sublime aussi légèrement dans l'atmosphère ténue.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_SrfLanded2 = Le Goo n'émane plus de chaleur en interne, et semble devenir aussi sans vie que Mehtna lui-même. 
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded1 = Les échantillons que vous collectez ne semblent pas totalement solides structurellement une fois déplacés, comme s'ils étaient fragilisés par leur immobilité prolongée.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded2 = Ces échantillons s'avéreront sans aucun doute utiles, car ils sont assez anciens à en juger par l'environnement apparemment inchangé qu'est la surface mehtnienne.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded3 = Les échantillons eux-mêmes semblent être un mélange sain de substrat et de morceaux de glace ancienne.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_SrfLanded1 = Selon l'orientation de la soute elle-même, les échantillons volatils dans la soute à matériaux alternent entre sublimation et congélation.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_SrfLanded2 = Les échantillons (à l'exception notable de l'échantillon d'eau, qui bout rapidement) restent principalement inchangés, en dehors d'une réaction très légère avec l'atmosphère ténue environnante.
		#LOC_KS_SciDef_barometerScan_Mehtna_SrfLanded = Le baromètre confirme la nature ténue de l'atmosphère de Mehtna, bien qu'il indique aussi qu'elle est un peu plus épaisse que celle de Duna. Cependant, comparée à des planètes comme Rouqea ou même des lunes comme Efil, cette atmosphère est de peu d'importance.
		#LOC_KS_SciDef_seismicScan_Mehtna_SrfLanded = Les scans sismiques indiquent que la seule activité détectable sur cette planète solitaire est causée par les impacts occasionnels.
		#LOC_KS_SciDef_gravityScan_Mehtna_SrfLanded = La gravité sur ce monde est assez substantielle comparée à d'autres destinations du système solaire et au-delà, représentant un peu plus de la moitié de celle de Kerbin. Vous la trouvez être un juste milieu pour explorer efficacement ce tombeau de monde sans être enlisé ou projeté trop loin à chaque pas.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_SrfLanded = L'analyseur atmosphérique indique que la fine atmosphère de cette planète consiste principalement en dioxyde de carbone et vapeur d'eau, avec une bonne quantité de gaz traces. Mehtna serait un candidat de choix pour la récolte de ressources atmosphériques !

		#LOC_KS_SciDef_crewReport_Mehtna_FlyingLow = Vous contemplez l'étrange planète en dessous, notant que la géographie semble totalement alien. Ceci est probablement causé par la… situation solaire unique à laquelle Mehtna fait face.
		#LOC_KS_SciDef_temperatureScan_Mehtna_FlyingLow = La température de l'atmosphère fluctue constamment selon l'endroit où le vaisseau se trouve au-dessus de la surface.
		#LOC_KS_SciDef_evaReport_Mehtna_FlyingLow = Cela doit être contraire aux directives de sécurité du programme. Heureusement, le KSC est à [CENSURÉ] années-lumière, donc ils n'ont pas besoin de le savoir.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_FlyingLow = Le Goo exposé bat dans le vent, mais seulement très légèrement. Il se sublime ce faisant, laissant un petit sillage de vapeur tandis que le vaisseau descend.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_FlyingLow = Plus vous descendez dans l'atmosphère de Mehtna, moins les échantillons volatils se subliment ; cependant, ils ne cessent jamais complètement.
		#LOC_KS_SciDef_barometerScan_Mehtna_FlyingLow = La pression, même à cette basse altitude au sens littéral, est notablement plus faible en haut du vaisseau qu'en bas.
		#LOC_KS_SciDef_gravityScan_Mehtna_FlyingLow = Les scans de gravité précis ne sont pas encore possibles à cette altitude car l'atmosphère ténue est juste assez substantielle pour déstabiliser le vaisseau et provoquer des oscillations, faussant l'instrument. Cependant, cela vous donne en retour des estimations de vitesses du vent (et des statistiques approximatives de gravité, comme prévu) !
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_FlyingLow = L'analyseur atmosphérique indique que la fine atmosphère de cette planète consiste principalement en dioxyde de carbone et vapeur d'eau, avec une bonne quantité de gaz traces. Mehtna serait un candidat de choix pour la récolte de ressources atmosphériques !

		#LOC_KS_SciDef_crewReport_Mehtna_FlyingHigh = Vous contemplez l'étrange planète loin en dessous, notant que la géographie semble totalement alien. Ceci est probablement causé- Vous devez arrêter de regarder cependant, car la force de l'entrée atmosphérique vous fait presque heurter la tête contre l'intérieur de votre casque si vous continuez à vous tourner pour regarder par la fenêtre.
		#LOC_KS_SciDef_temperatureScan_Mehtna_FlyingHigh = La température moyenne de la planète ne peut qu'être grossièrement estimée à cette altitude, en raison de la finesse de l'atmosphère. Cependant, ici-haut, c'est froid. Choc, nous savons.
		#LOC_KS_SciDef_evaReport_Mehtna_FlyingHigh = Essayez-vous de vous faire arracher de l'échelle du vaisseau par le cisaillement du vent et d'être projeté vers Kraken-sait-quoi à Mach 2 ?
		#LOC_KS_SciDef_mysteryGoo_Mehtna_FlyingHigh = Le Goo tremble violemment avec le reste du vaisseau, tout en semblant perdre sa couleur pour prendre la même teinte brunâtre que tout autour.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_FlyingHigh = Beaucoup d'échantillons sont secoués et se détachent sous la force de l'entrée atmosphérique, mais ne réagissent pas encore significativement à leur environnement. Vous notez cependant que l'expérience solaire dans la soute ne collecte qu'un filet de la faible lumière de Maelg… avant d'être secouée et projetée dans la section des métaux lourds de la soute, l'endommageant gravement.
		#LOC_KS_SciDef_barometerScan_Mehtna_FlyingHigh = À cette altitude, l'atmosphère est bien trop ténue pour faire autre chose que secouer votre vaisseau tandis que vous descendez vers l'étrange monde teinté de beige en dessous.
		#LOC_KS_SciDef_gravityScan_Mehtna_FlyingHigh = Malgré les perturbations causées par l'entrée du vaisseau dans l'atmosphère mehtnienne, la gravité en surface est estimée à environ 0,5 G.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_FlyingHigh = L'analyseur atmosphérique indique que la fine atmosphère de cette planète consiste principalement en dioxyde de carbone et vapeur d'eau, avec une bonne quantité de gaz traces. Mehtna serait un candidat de choix pour la récolte de ressources atmosphériques !

		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceLow1 = Le monde en dessous de vous vous rappelle un étang boueux, ou peut-être une boule de bois polie.
		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceLow2 = Vous ne pouvez vous empêcher de trouver Mehtna un peu comme un vilain petit canard comparé à Suluco ou Arorua, mais il a une sorte de charme réconfortant.
		#LOC_KS_SciDef_temperatureScan_Mehtna_InSpaceLow = Bien que le monde semble désolé et statique depuis cette altitude, les instruments thermométriques impliquent qu'au moins thermiquement parlant, Mehtna est assez varié.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceLow1 = La planète brune vous baigne de sa lumière, et vous vous retrouvez soudainement à avoir envie de chocolat.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceLow2 = En voyant Mehtna de près, vous avez soudainement envie de lancer une boule de boue à l'un de vos coéquipiers en revenant sur Kerbin.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_InSpaceLow = Le Goo se décompose et prend l'apparence et la consistance du caramel chaud, peut-être en réponse à l'environnement de radiation unique produit par Maelg.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_InSpaceLow = Les échantillons semblent indifférents à leur environnement, avec un manque d'activité dans la soute (à l'exception des échantillons d'eau qui grésillent tranquillement, mais personne ne vous a demandé, Échantillons d'eau).
		#LOC_KS_SciDef_gravityScan_Mehtna_InSpaceLow = La gravité en dessous est estimée à environ la moitié de celle de Kerbin, peut-être un tout petit peu plus.
		#LOC_KS_SciDef_magnetometer_Mehtna_InSpaceLow = Le champ magnétique détecté pourrait être assimilé à celui de Duna, mais amplifié. Ceci est probablement dû au fait que les deux planètes partagent un certain nombre de qualités, Mehtna étant toutefois substantiellement plus grande.

		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceHigh1 = Vous tentez de nettoyer la petite tache brune sur la fenêtre du vaisseau… Oh. Attendez une seconde.
		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceHigh2 = Si ce petit système solaire (ou techniquement, naine brune ?) était un vin, vous le décririez comme : « Brun, avec des nuances de beige et une touche de sépia, peut-être juste une légère pointe de zeste d'orange. »
		#LOC_KS_SciDef_temperatureScan_Mehtna_InSpaceHigh = Les lectures du thermomètre soulignent la faiblesse relative du chauffage de Maelg comparé à une étoile.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceHigh1 = Vous pensez qu'il y a un petit insecte brun dans votre casque et vous commencez à paniquer, jusqu'à ce que votre équipage vous rappelle aimablement où vous êtes.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceHigh2 = La faible lumière de Maelg se réfracte à travers l'atmosphère boueuse de Mehtna de manière étrange, donnant à cette atmosphère un aspect à la fois épais et fin.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_InSpaceHigh = Le Goo semble dériver vers la planète et Maelg autant qu'il le peut compte tenu de sa nature confinée, semblant tenter de ressentir de la chaleur.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_InSpaceHigh = La plupart des échantillons semblent normaux, mais quelques expériences plus fragiles semblent avoir gelé dans ce cadre à faible chaleur si loin de Maelg. Vous ne pouvez qu'imaginer à quel point Meiuqer doit être froid.
		#LOC_KS_SciDef_gravityScan_Mehtna_InSpaceHigh = La gravité en dessous est estimée à environ la moitié de celle de Kerbin, peut-être un tout petit peu plus.
		#LOC_KS_SciDef_magnetometer_Mehtna_InSpaceHigh = Le magnétomètre rapporte que, bien qu'un peu faible, Mehtna possède bel et bien un champ magnétique palpable ! Le champ n'est toutefois pas assez fort pour protéger quoi que ce soit en surface des radiations solaires/interstellaires de Maelg et de tous les autres systèmes solaires proches.

		// Meiuqer
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded1 = Cette petite pomme de terre spatiale poussiéreuse et froide reste indéniablement fascinante pour vous et votre équipage.
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded2 = De cette distance, la lumière déjà faible de Maelg s'estompe jusqu'à une quasi-insignifiance.
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded3 = La surface de Meiuqer apparaît comme si elle avait été dégelée et gelée à plusieurs reprises pendant un moment, semblable à une glace laissée fondre puis recongelée.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_SrfLanded1 = Bien que la température sur ce petit monde étrange fluctue assez souvent sur son orbite, elle n'est jamais “warm” par aucun concept de l'imagination.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_SrfLanded2 = Le thermomètre vous dit l'évidence dans cette situation particulière : F R O I D !
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded1 = En vous tenant sur la surface de Meiuqer, vous faites attention à ne pas éternuer et atteindre la vitesse de libération.
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded2 = Vous maniez un pouvoir cosmique infini. Vous avez légèrement lancé une pierre voisine, et elle a commencé à orbiter autour de Meiuqer. Il faut aimer la faible gravité.
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded3 = Mince, vous pensiez que Gilly était difficile à naviguer. Au moins Gilly n'est pas apparemment sombre tout le temps ou teintée comme un film vintage.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_SrfLanded1 = Le Goo gèle solidement et cogne contre son conteneur, le desserrant et le faisant flotter en masse solide à la vitesse de libération de Meiuqer.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_SrfLanded2 = Le Goo flotte presque dans sa capsule comme en microgravité, surtout une fois qu'il commence à la fois à se sublimer et à geler dans l'environnement de vide dur de Meiuqer.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded1 = Vous devez faire attention en collectant vos échantillons à ne pas flotter loin de Meiuqer.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded2 = Les échantillons que vous collectez sont remarquables. Alors que Mehtna est sans aucun doute ancienne, Meiuqer est littéralement intacte depuis sa formation, moins les effets causés par ses changements de température drastiques réguliers lorsqu'elle oscille près et loin de Maelg sur sa trajectoire orbitale très excentrique.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded3 = Maintenant que des échantillons ont été obtenus de ce petit monde étrange, il est clair que Meiuqer est un astéroïde de type « pile de gravats », en raison de son rayon substantiel malgré un champ gravitationnel plus faible que le bien plus petit Gilly.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_SrfLanded1 = Les échantillons ne réagissent pas beaucoup à l'exposition à Meiuqer, à part les échantillons volatils qui se vaporisent rapidement et/ou gèlent solidement.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_SrfLanded2 = Outre la sublimation, la seule chose observée dans le laboratoire de matériaux est l'expérience électrique qui devient instable et court-circuite à cause de la poussière entourant Meiuqer qui la recouvre en quelques minutes d'exposition. La poussière est apparemment chargée électriquement par Maelg, ou est au moins conductrice d'électricité dans une certaine mesure.
		#LOC_KS_SciDef_seismicScan_Meiuqer_SrfLanded = Les scans sismiques de Meiuqer révèlent sans surprise que le petit monde est entièrement mort et pourrait tout aussi bien être une pomme de terre géante flottant dans le vide de l'espace.
		#LOC_KS_SciDef_gravityScan_Meiuqer_SrfLanded = Vous tentez de mesurer la gravité sur Meiuqer. L'affichage du capteur descend à peine si bas, mais vous obtenez votre lecture.

		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceLow1 = La surface est quelque peu obscurcie par l'exosphère poussiéreuse de Meiuqer, mais elle n'est pas du tout comparable à une vraie atmosphère.
		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceLow2 = Vous observez une petite pierre percuter Meiuqer à vitesse modérée, envoyant un rocher de la taille d'une voiture flotter depuis la surface.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_InSpaceLow = Le thermomètre fait de son mieux pour l'impression « Stone Cold » après avoir tenté de prendre des relevés sur le planétoïde en dessous.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceLow1 = Vous pourriez assez facilement atterrir sur Meiuqer avec juste votre pack EVA d'ici, avec du carburant en réserve.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceLow2 = C'est particulier de penser que vous pouvez théoriquement sauter en orbite depuis la surface.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_InSpaceLow = Le Goo devient rapidement granuleux et recouvert de la poussière qui entoure Meiuqer.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_InSpaceLow = Les électroniques court-circuitent et les échantillons sont contaminés très rapidement par les quantités copieuses de poussière présentes autour de Meiuqer à cette basse altitude.
		#LOC_KS_SciDef_gravityScan_Meiuqer_InSpaceLow = Le scanner de gravité rit grossièrement et rapporte un chiffre négligeable.
		#LOC_KS_SciDef_magnetometer_Meiuqer_InSpaceLow = Le magnétomètre confirme à nouveau que l'intégralité de cette pomme de terre spatiale est, en fait, morte comme une enclume.

		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceHigh1 = Alors que le vaisseau progresse lentement sur son orbite au-dessus du planétoïde à une vitesse désespérément lente, vous avez tout le temps de regarder la boule de poussière céleste que vous « orbitiez » actuellement.
		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceHigh2 = Il semble que quelqu'un ait accidentellement laissé tomber une ration de pommes de terre par la trappe à ordures, vous pouvez la voir flotter à bonne distance du vaisseau- Oh.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_InSpaceHigh = Le thermomètre peine à estimer la température du corps loin en dessous, à cause de… vous savez, le vide.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceHigh1 = Vous pourriez ENCORE atterrir d'ici avec votre pack EVA ! Cela pourrait prendre quelques heures cependant, installez-vous confortablement.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceHigh2 = Vous vous assurez de ne faire aucun mouvement brusque à l'extérieur du vaisseau, de peur de tomber de l'orbite.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_InSpaceHigh = Le Goo semble complètement inerte, jusqu'à ce que vous réalisiez qu'il a gelé solidement. Il heurte alors l'une de ses parois intérieures et se brise en petits morceaux.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_InSpaceHigh = Outre le froid extrême, il ne se passe pas grand-chose aux échantillons dans la soute de science des matériaux, car vous êtes hors de portée de l'exosphère poussiéreuse de Meiuqer.
		#LOC_KS_SciDef_gravityScan_Meiuqer_InSpaceHigh = Le scanner de gravité se demande pourquoi vous vous êtes donné la peine alors qu'il retourne ses misérables lectures sur le champ gravitationnel du planétoïde.
		#LOC_KS_SciDef_magnetometer_Meiuqer_InSpaceHigh = Bien que vous sachiez que c'est une perte de temps de vérifier si le minuscule Meiuqer a un champ magnétique, vous préférez ne pas avoir d'ennuis avec le scientifique de votre équipage pour « ne pas maximiser le retour scientifique » ou autre absurdité.

		// Sunorc
		#LOC_KS_SciDef_crewReport_Sunorc_FlyingLow = D'une manière ou d'une autre, le vaisseau n'a pas encore fondu. *PAS ENCORE.*
		#LOC_KS_SciDef_crewReport_Sunorc_FlyingHigh = Vous êtes très inquiet de la résistance du vaisseau aux températures extrêmes.
		#LOC_KS_SciDef_crewReport_Sunorc_InSpaceLow = Il commence à faire chaud ici. Vous pourriez cuire quelque chose sur le panneau de contrôle.

		#LOC_KS_SciDef_temperatureScan_Sunorc_FlyingLow = [AUCUNE DONNÉE]
		#LOC_KS_SciDef_temperatureScan_Sunorc_FlyingHigh = Le thermomètre atteint instantanément le maximum, puis le minimum alors que les particules chargées interfèrent avec la connexion à l'instrument.
		#LOC_KS_SciDef_temperatureScan_Sunorc_InSpaceLow = Le thermomètre commence à monter à mesure que vous approchez de l'étoile.

		#LOC_KS_SciDef_evaReport_Sunorc_FlyingLow = COMMENT N'ÊTES-VOUS PAS MORT ??????
		#LOC_KS_SciDef_evaReport_Sunorc_FlyingHigh = Ce n'est pas une idée très intelligente et vous le savez.
		#LOC_KS_SciDef_evaReport_Sunorc_InSpaceLow = Vous êtes aveuglé par la lumière intense.

		#LOC_KS_SciDef_mysteryGoo_Sunorc_FlyingLow = Le conteneur a fondu et a libéré le Goo vaporisé.
		#LOC_KS_SciDef_mysteryGoo_Sunorc_FlyingHigh = Le Goo commence à se vaporiser dans son conteneur.
		#LOC_KS_SciDef_mysteryGoo_Sunorc_InSpaceLow = Le Goo commence à bouillir.

		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_FlyingLow = L'unité entière a fondu.
		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_FlyingHigh = Les échantillons fondent, ainsi que le reste de l'unité.
		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_InSpaceLow = Les échantillons commencent à briller à cause de la chaleur.

		#LOC_KS_SciDef_barometerScan_Sunorc_FlyingLow = Le baromètre crache toutes sortes de non-sens avant que la connexion à l'instrument ne soit perdue.
		#LOC_KS_SciDef_barometerScan_Sunorc_FlyingHigh = Le baromètre détecte une atmosphère très ténue, avant que les températures extrêmes ne fassent dérailler l'instrument.

		#LOC_KS_SciDef_magnetometer_Sunorc_InSpace = Le bras collecte des données sur les vents stellaires et les champs magnétiques de Sunorc.

		#LOC_KS_SciDef_gravityScan_Sunorc_InSpace = Les données du capteur de gravité nous donnent des informations sur la taille et la composition de Sunorc.

		#LOC_KS_SciDef_atmosphereAnalysis_Sunorc_FlyingLow = Nous ne pouvons obtenir aucune donnée de l'analyseur atmosphérique, donc il est probable que l'instrument soit fichu.
		#LOC_KS_SciDef_atmosphereAnalysis_Sunorc_FlyingHigh = Les particules chargées grillent les capteurs à l'intérieur de l'analyseur atmosphérique.



		// Sedah
		#LOC_KS_SciDef_crewReport_Sedah_FlyingLow = Vous commencez à remettre en question votre existence alors que votre vaisseau descend dans les profondeurs de la géante gazeuse chaude et floconneuse.
		#LOC_KS_SciDef_crewReport_Sedah_InSpaceLow = L'atmosphère de la planète semble turbulente et constamment en mouvement. La chaleur et la pression intenses à la surface créent des bandes tourbillonnantes de gaz qui semblent constamment se déplacer et s'agiter. L'équipage a également noté que la légère lueur de la planète était plus perceptible lors de l'approche rapprochée, créant un effet inquiétant et surnaturel. Malgré les conditions inhospitalières, l'équipage a exprimé son admiration pour la beauté et la grandeur de la géante gazeuse.
		#LOC_KS_SciDef_crewReport_Sedah_InSpaceHigh = L'équipage rapporte que Sedah apparaît comme un orbe lumineux et brillant dans l'espace en raison de ses températures atmosphériques élevées. De loin, elle semble de taille similaire à Jool. Son atmosphère moins dense lui donne une apparence « floconneuse ». L'équipage note qu'il serait intéressant d'étudier la composition atmosphérique de Sedah pour mieux comprendre les propriétés des géantes gazeuses chaudes.

		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingLow1 = Alors que le vaisseau descendait dans la basse atmosphère de Sedah, les lectures de température indiquaient une augmentation significative. La chaleur et la pression intenses à cette altitude rendaient difficile le fonctionnement des instruments, et l'équipage dut prendre des précautions spéciales pour éviter les dommages.
		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingLow2 = Les pressions extrêmes écrasent le thermomètre avant même qu'il n'ait une chance d'atteindre le maximum.
		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingHigh = Les lectures de température ont montré une augmentation significative par rapport à l'environnement spatial. La chaleur émanant de l'atmosphère de la planète a créé une lueur brillante autour du vaisseau spatial.

		#LOC_KS_SciDef_evaReport_SedahFlyingLow = Vous réfléchissez à pourquoi vous avez pensé que faire une EVA dans les profondeurs d'une géante gazeuse était une bonne idée.
		#LOC_KS_SciDef_evaReport_Sedah_InSpaceLow = Alors que le Kerbal sortait du vaisseau, il fut immédiatement frappé par les nuages tourbillonnants de la géante gazeuse. L'atmosphère était épaisse et brumeuse, avec une gamme de couleurs qui semblaient changer et se déplacer. Le Kerbal pouvait sentir la chaleur émanant de la planète, malgré la distance de sa surface. En flottant dans le vide, il ne pouvait s'empêcher de se sentir à la fois petit et impressionné par la taille et la puissance immenses de la géante gazeuse.
		#LOC_KS_SciDef_evaReport_Sedah_InSpaceHigh = Sedah se dressait au loin, une géante gazeuse massive avec une faible lueur éthérée. La lumière brillante de l'étoile projetait de longues ombres sur la combinaison du Kerbal, qui se sentait en apesanteur en dérivant dans le vide. C'était une expérience surréaliste et impressionnante de contempler la majesté de Sedah depuis un tel point de vue.

		#LOC_KS_SciDef_mysteryGoo_Sedah_FlyingLow = Le Goo est parfaitement rôti par les hautes températures dans la basse atmosphère de Sedah.

		#LOC_KS_SciDef_mobileMaterialsLab_Sedah_FlyingLow = Vous ne savez pas si les échantillons ont été cuits par les hautes températures ou écrasés par la pression extrême, mais est-ce vraiment important ? Ils sont ruinés dans les deux cas.

		#LOC_KS_SciDef_barometerScan_Sedah_FlyingLow1 = L'atmosphère floconneuse de Sedah semblait super dense et compacte. Les températures atmosphériques élevées et l'apparence lumineuse de Sedah sont devenues plus prononcées.
		#LOC_KS_SciDef_barometerScan_Sedah_FlyingLow2 = Le verre du baromètre s'est brisé, mais vous n'êtes pas sûr si c'était à cause de la haute température ou de la pression extrême, ou même des deux.
		#LOC_KS_SciDef_barometerScan_Sedah_FlyingHigh = Les lectures du baromètre montrent une diminution de la pression atmosphérique avec l'altitude. L'atmosphère floconneuse de Sedah semblait s'amincir progressivement avec les altitudes plus élevées.

		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceLow1 = Les lectures du scan de gravité ont montré une différence notable entre le côté lumineux et le côté sombre de Sedah, possiblement due à la différence de densité causée par la variation de température.
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceLow2 = Les données du capteur confirment que malgré sa taille imposante, Sedah n'est en fait pas si massive que ça, relativement à sa taille.
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceHigh1 = Les lectures ont montré que la gravité de Sedah était significativement plus faible comparée aux plus grandes géantes gazeuses comme Jool. La masse plus faible de Sedah a résulté en une attraction gravitationnelle moins intense, ce qui pourrait avoir des implications pour sa structure et composition globales.
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceHigh2 = Le capteur affiche une lecture anormalement basse pour une planète de cette taille. Il pourrait valoir la peine d'enquêter davantage.

		#LOC_KS_SciDef_magnetometer_Sedah_InSpaceLow = Sedah a exhibé un champ magnétique relativement fort et complexe dans son espace bas. Les données indiquaient la présence de tempêtes et fluctuations magnétiques, suggérant un environnement magnétique dynamique et actif autour de cette géante gazeuse chaude. Ces découvertes éclairent les caractéristiques magnétiques uniques de l'atmosphère « floconneuse » de Sedah et son impact potentiel sur la dynamique atmosphérique et la météo spatiale.
		#LOC_KS_SciDef_magnetometer_Sedah_InSpaceHigh = Les lectures du magnétomètre ont montré que Sedah avait un champ magnétique relativement faible comparé à son homologue plus grand, Jool, probablement en raison de sa masse plus faible. Cependant, il y avait encore des fluctuations magnétiques détectables, indiquant une activité magnétique dans l'atmosphère de Sedah.

		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingLow1 = L'analyse atmosphérique de la basse atmosphère de Sedah a révélé qu'elle est principalement composée d'hydrogène et d'hélium, avec des températures élevées et des motifs nuageux dynamiques. En raison de sa faible masse par rapport à sa taille, l'atmosphère de Sedah est moins dense et plus étendue, créant une apparence diffuse avec des limites moins distinctes entre les couches atmosphériques.
		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingLow2 = L'instrument a été écrasé par les pressions extrêmes dans la basse atmosphère de Sedah.
		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingHigh = L'analyse atmosphérique de la haute atmosphère de Sedah a révélé des températures extrêmement élevées et une apparence lumineuse, indiquant la chaleur intense de cette géante gazeuse. L'analyse a également confirmé que l'atmosphère de Sedah est moins dense et plus diffuse que celle de Jool, en raison de son rapport masse-taille plus faible, résultant en une apparence « floconneuse » avec des limites moins distinctes entre les couches atmosphériques.


		// Suluco
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Day = Le rapport d'équipage de l'hémisphère diurne de Suluco révèle un jour perpétuel avec une exposition constante au soleil intense de Sunorc, sans nuit, et le paysage est dominé par un environnement brûlant et stérile. L'équipage a noté l'absence de tout signe de vie ou de végétation, avec des températures extrêmes et des conditions difficiles.
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Twilight = Le rapport d'équipage de la zone crépusculaire de Suluco a révélé un environnement unique et intrigant. L'anneau étroit d'éternité crépusculaire entre les hémisphères diurne et nocturne est la seule région de la planète où les plantes et autres formes de vie peuvent prospérer. L'équipage a également observé les vents persistants forts dans la zone, probablement causés par le contraste de température extrême entre les deux hémisphères. Le rapport a souligné les conditions d'éclairage particulières de la zone crépusculaire, où un crépuscule perpétuel prévaut, créant une ambiance mystérieuse et surnaturelle.
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Night = Le rapport d'équipage de l'hémisphère nocturne de Suluco a révélé un environnement désolé et glacial, enveloppé dans une obscurité perpétuelle. Sans soleil atteignant ce côté de la planète, les températures étaient extrêmement froides et le paysage semblait stérile et inhospitalier, sans aucun signe de vie.
		#LOC_KS_SciDef_crewReport_Suluco_SrfSplashed = Le rapport d'équipage de la zone crépusculaire de Suluco, où les hémisphères diurne et nocturne se rencontrent, a révélé un environnement dynamique et turbulent. Les vents persistants forts causés par la différence de température marquée entre les deux hémisphères ont été observés, créant des conditions difficiles pour l'exploration. Malgré cela, l'équipage a noté la présence de formes de vie alien uniques et d'espèces végétales dans la zone crépusculaire, en faisant une région remarquable pour l'étude scientifique.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Day = Le rapport d'équipage de la basse atmosphère de l'hémisphère diurne de Suluco, où un côté de la planète est en plein jour perpétuel, a révélé des conditions extrêmes dues à l'exposition implacable à l'étoile Sunorc. L'équipage a observé des températures brûlantes et des radiations intenses, la surface de la planète étant baignée de soleil constant.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Twilight = Le rapport d'équipage de la basse atmosphère de la zone crépusculaire de Suluco, où les hémisphères diurne et nocturne se rencontrent, a révélé des conditions difficiles dues aux vents persistants forts causés par la différence de température marquée. Malgré la turbulence, l'équipage a observé des espèces végétales alien fascinantes et d'autres formes de vie exotiques dans cette région unique, la seule zone de la planète à supporter une telle vie.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Night = Le rapport d'équipage de la basse atmosphère de l'hémisphère nocturne de Suluco, où un côté est en obscurité perpétuelle, a révélé un environnement très différent de l'hémisphère diurne. L'équipage a observé des températures glaciales et une quasi-obscurité totale, avec seulement une faible lumière stellaire. La présence de calottes glaciaires et de formations glacées en surface indique de l'eau gelée dans la basse atmosphère de l'hémisphère nocturne.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingHigh = Notre vaisseau a observé des contrastes de température marqués, des vents forts et des compositions atmosphériques uniques dans la haute atmosphère de Suluco, une planète verrouillée par les marées avec des différences marquées entre ses hémisphères diurne et nocturne. L'hémisphère diurne présentait des températures brûlantes et des gaz ionisés, tandis que l'hémisphère nocturne était perpétuellement sombre et froid, avec des concentrations de gaz plus faibles. Des recherches supplémentaires sont nécessaires pour comprendre la dynamique atmosphérique complexe de cette planète unique.
		#LOC_KS_SciDef_crewReport_Suluco_InSpaceLow = Notre vaisseau est entré en orbite basse de Suluco, une planète verrouillée par les marées avec des contrastes extrêmes entre ses hémisphères diurne et nocturne. L'hémisphère diurne est brûlant avec des radiations solaires intenses, tandis que l'hémisphère nocturne est plongé dans une obscurité perpétuelle et un froid extrême. Nous avons observé un anneau étroit d'éternité crépusculaire, la zone crépusculaire, où une vie alien exotique pourrait prospérer. 
		#LOC_KS_SciDef_crewReport_Suluco_InSpaceHigh = Suluco ressemble à un œil vu de l'espace lointain. Nous sommes assez sûrs que cette planète est verrouillée par les marées par Sunorc, puisque nous pouvons facilement observer la différence entre l'hémisphère diurne et l'hémisphère nocturne. 

		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Day = Rapport de scan de température : Notre site d'atterrissage sur l'hémisphère diurne de Suluco révèle des températures brûlantes, la surface atteignant des extrêmes dus à l'exposition perpétuelle au soleil. Les lectures indiquent plus de 90 °C, rendant l'endroit inhospitalier pour la plupart des formes de vie. 
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Twilight = Notre site d'atterrissage sur la zone crépusculaire de Suluco révèle un profil de température unique et dynamique. La région connaît des fluctuations significatives dues au contraste marqué entre les hémisphères diurne et nocturne. Les lectures indiquent une plage de -25 à 45 °C, avec des changements rapides. Cet environnement dynamique présente des défis et opportunités uniques pour étudier l'interaction entre lumière et obscurité.
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Night = Notre site d'atterrissage sur l'hémisphère nocturne de Suluco révèle des températures extrêmement froides avec une moyenne de -65 °C, bien en dessous du point de congélation. L'absence de soleil dans cette région de nuit perpétuelle crée un environnement extrêmement froid, posant des défis pour la vie telle que nous la connaissons. 
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfSplashed = Notre amerrissage dans la zone crépusculaire de Suluco révèle un profil de température unique. L'anneau étroit d'éternité crépusculaire entre les hémisphères diurne et nocturne présente des températures modérées, probablement influencées par l'interaction constante. Cette région sert d'habitat potentiel pour des formes de vie alien exotiques, comme en témoignent la présence de végétation et d'autre activité biologique. 
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Day = Un scan de température dans la basse atmosphère de l'hémisphère diurne de Suluco révèle un gradient thermique significatif, avec des températures dépassant 90 °C. Le côté face à l'étoile subit des températures extrêmement élevées dues à l'exposition constante au soleil. L'absence de cycle nocturne entraîne un chauffage soutenu de l'atmosphère. Ces conditions extrêmes peuvent poser des défis pour l'exploration ou l'habitation dans l'hémisphère diurne de Suluco. 
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Twilight = Un scan de température dans la basse atmosphère de la zone crépusculaire de Suluco révèle des profils de température uniques par rapport aux hémisphères diurne et nocturne. La frontière entre les deux, la zone crépusculaire, présente une plage modérée de -15 à 45 °C, due à l'interaction constante entre les hémisphères, résultant en un environnement relativement tempéré.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Night = Un scan de température dans la basse atmosphère de l'hémisphère nocturne de Suluco révèle des conditions extrêmes. L'obscurité perpétuelle entraîne des températures significativement plus froides que l'hémisphère diurne et la zone crépusculaire. La température moyenne dans la basse atmosphère de l'hémisphère nocturne est de -65 °C, bien en dessous du point de congélation.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingHigh = Un scan de température dans la haute atmosphère de Suluco révèle des profils intéressants. Suluco étant verrouillée par les marées avec Sunorc, un côté en jour perpétuel et l'autre en nuit perpétuelle, la haute atmosphère montre des différences de température distinctes entre les hémisphères diurne et nocturne.

		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Day = En sortant du vaisseau sur la surface de l'hémisphère diurne de Suluco, je suis accueilli par une lumière solaire intense et implacable. La lumière est presque aveuglante et la chaleur est intense. Le terrain est accidenté et rocheux, avec de grandes formations rocheuses et des falaises abruptes. Les roches sont de couleurs variées, des roches volcaniques sombres aux plus claires et altérées. Le sol est sec et poussiéreux, avec peu de signes d'eau liquide.
		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Twilight = En posant le pied sur l'anneau étroit d'éternité crépusculaire qui marque la frontière entre les hémisphères diurne et nocturne de Suluco, je suis frappé par l'environnement unique et surnaturel. L'éclairage est surréaliste, un crépuscule perpétuel projetant une lueur éthérée. La flore et la faune sont exotiques, différentes de tout ce que j'ai vu, adaptées aux conditions uniques de cette zone crépusculaire. C'est un lieu fascinant et mystérieux, grouillant de vie ayant évolué à l'intersection rare de la lumière et de l'obscurité.
		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Night = Poser le pied sur le terrain sombre et gelé de l'hémisphère nocturne de Suluco est une expérience inquiétante. L'absence de soleil et l'obscurité perpétuelle créent un environnement froid, désolé et apparemment dépourvu de vie. Les températures sont bien en dessous du point de congélation, et la seule lumière vient des étoiles lointaines et de la faible lueur de la zone crépusculaire à l'horizon. C'est un contraste marqué avec l'hémisphère diurne lumineux et animé.
		#LOC_KS_SciDef_evaReport_Suluco_SrfSplashed = En amerrissant dans l'anneau étroit d'éternité crépusculaire qui marque la frontière entre les hémisphères diurne et nocturne de Suluco, je suis accueilli par une vision surréaliste. Les eaux sous moi grouillent de vie, plantes et créatures bioluminescentes illuminant l'obscurité de leur lueur surnaturelle. La température est modérée et l'air est empli de tranquillité. C'est une oasis de vie unique au milieu du contraste marqué entre le jour et la nuit éternels sur cette planète verrouillée par les marées.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Day = En survolant la basse atmosphère de l'hémisphère diurne de Suluco, je suis accueilli par une étendue infinie de lumière aveuglante. La température est brûlante et l'air est épais de chaleur et de radiations. Le paysage en dessous est stérile et inhospitalier, sans signe de vie. Le contraste entre le jour et la nuit éternels sur cette planète verrouillée par les marées est marqué, et les conditions difficiles de l'hémisphère diurne rappellent la nature extrême de ce monde.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Twilight = En m'aventurant dans la zone crépusculaire de Suluco, je suis accueilli par un spectacle surnaturel. L'anneau étroit d'éternité crépusculaire sert de frontière entre les hémisphères de jour et de nuit éternels, et il grouille de vie. Les vents persistants forts secouent mon vaisseau, indiquant l'extrême différence de température entre les hémisphères. J'observe des plantes étranges et exotiques, différentes de tout ce que j'ai vu, montrant des adaptations remarquables pour survivre dans cet environnement crépusculaire.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Night = La température chute dramatiquement et les vents hurlent sans relâche, résultat de l'extrême différence de température entre les hémisphères diurne et nocturne. L'absence de soleil rend la navigation difficile, mais l'éclairage intégré de ma combinaison m'aide à distinguer le paysage alien inquiétant. 
		#LOC_KS_SciDef_evaReport_Suluco_FlyingHigh = Le contraste entre l'hémisphère diurne lumineux et l'hémisphère nocturne sombre est à couper le souffle, et je m'émerveille des conditions uniques de cette planète verrouillée par les marées. Les conditions difficiles rendent les expériences ardues, mais les données que je collecte contribueront à notre compréhension de la dynamique atmosphérique et des schémas météorologiques de Suluco. 
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Day = En descendant vers l'hémisphère diurne, je suis accueilli par une luminosité aveuglante. Le jour perpétuel baigne le paysage d'une lueur brillante, le soleil ne se couchant jamais de ce côté de la planète. La température est brûlante et le paysage est dominé par de vastes déserts et plaines rocheuses. J'observe d'immenses dunes de sable façonnées par les vents implacables qui soufflent en surface, formant des motifs complexes dans le sable.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Twilight = La lumière du jour vive s'estompe en un crépuscule perpétuel, projetant une lueur surnaturelle sur le paysage. La température dans la zone crépusculaire est relativement modérée par rapport à l'hémisphère diurne, grâce au mélange constant d'air des deux hémisphères. Les vents ici sont forts et persistants, créant des formations nuageuses tourbillonnantes et des schémas météorologiques turbulents. Cet anneau étroit d'éternité crépusculaire est la seule région de Suluco potentiellement habitée par des plantes et autre vie alien exotique.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Night = Quand je suis dans l'espace au-dessus de l'hémisphère nocturne, l'obscurité m'enveloppe. La nuit perpétuelle de ce côté de Suluco est inquiétante, seules les étoiles lointaines fournissant une faible illumination. L'hémisphère nocturne est un royaume de froid et d'obscurité extrêmes, avec des conditions difficiles pour la vie. J'observe des lacs et rivières gelés, et le paysage est austère et stérile. 
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceHigh = Depuis une orbite haute, j'observe le contraste marqué entre l'hémisphère diurne de Suluco, baigné de jour perpétuel, et son hémisphère nocturne, enveloppé d'obscurité. Ces hémisphères uniques offrent des aperçus précieux sur l'interaction entre lumière, température et atmosphère sur cette planète verrouillée par les marées.

		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Day = L'échantillon de surface de l'hémisphère diurne de Suluco révèle un paysage stérile et rocheux avec des températures élevées et des radiations intenses. Le sol est sec et dépourvu de signes de matière organique ou de vie végétale. L'échantillon montre des signes d'altération extrême due à l'exposition constante au soleil, les formations rocheuses affichant des signes d'érosion et de dégradation.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Twilight = L'échantillon de surface collecté dans la zone crépusculaire de Suluco révèle un écosystème unique et diversifié grouillant de formes de vie alien. Le sol est un mélange de débris rocheux et de matière organique, indiquant la présence de vie végétale dans cette région. L'échantillon montre aussi des signes d'altération extrême, probablement dus aux vents persistants forts résultant de la différence de température entre les hémisphères diurne et nocturne.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Night = L'échantillon de surface collecté dans l'hémisphère nocturne de Suluco révèle un environnement désolé et froid avec des signes de vie minimaux. Le sol est composé de régolithe gelé et de débris glacés, indiquant des températures extrêmement basses inhospitalières pour la plupart des formes de vie. L'absence de vie végétale ou de matière organique suggère les conditions difficiles de l'obscurité perpétuelle de ce côté de la planète.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfSplashed = L'échantillon d'eau collecté dans l'océan de la zone crépusculaire de Suluco révèle un écosystème aquatique unique aux caractéristiques intrigantes. L'eau est relativement plus froide en raison de la proximité de l'hémisphère nocturne, et contient une diversité de micro-organismes alien et de vie végétale exotique. L'eau semble saumâtre, avec des niveaux de salinité plus élevés. L'eau est relativement agitée, avec des courants forts, probablement influencés par les vents persistants.

		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded = Le goo semble tout à fait content ici.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_DayPole = L'unité de confinement contient ce qui ne peut être décrit que comme du « goo séché » à l'intérieur. Non, ce n'est pas une collation.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_NightPole = Le couvercle de l'unité de confinement du goo a gelé fermé. Il ne serait pas déraisonnable de supposer que le goo à l'intérieur est également gelé.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Water = Le goo semble impatient d'aller nager.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_ColdOcean = Le goo semble impatient d'aller nager, ignorant à quel point l'eau est froide.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Day = La chaleur et l'air sec ont fait rétrécir le goo.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Tundra = L'intérieur de l'unité de confinement est plein de condensation.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Night = Le goo a gelé solidement. N'essayez pas de le manger. Ce n'est pas de la glace.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfSplashed = Le goo s'échappe dans l'eau !
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfSplashed_ColdOcean = Le goo s'échappe dans l'eau... puis revient promptement dans l'unité de confinement car il ne veut pas geler.
		#LOC_KS_SciDef_mysteryGoo_Suluco_FlyingLow = Le goo gigote autour tandis que le vaisseau vibre.

		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Day = L'étude des matériaux sur l'hémisphère diurne de Suluco, perpétuellement baigné de soleil, a livré des résultats intrigants. Les matériaux de surface montrent des signes d'érosion et d'altération étendues, probablement causées par les radiations solaires et l'exposition constante. Les hautes températures ont entraîné la formation de compositions minérales et structures uniques, suggérant des processus géologiques nouveaux. 
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Twilight = La zone crépusculaire de Suluco présente des composés organiques complexes et un mélange unique de processus géologiques et chimiques. Les matériaux de surface suggèrent la présence de vie alien exotique et donnent des aperçus sur la biologie et l'astrobiologie de la planète. Les vents dynamiques et le crépuscule perpétuel ont façonné la géologie et la chimie de cette région. 
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Night = L'hémisphère nocturne de Suluco, le côté perpétuellement sombre, présente des défis uniques pour l'étude des matériaux en raison des conditions extrêmes : températures glaciales et absence de soleil. L'analyse initiale révèle la présence d'eau gelée et de composés volatils, fournissant des aperçus sur la géologie et la composition chimique de la planète.
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfSplashed = Une étude des matériaux dans les océans de Suluco a livré des résultats intrigants. L'analyse des échantillons d'eau révèle des propriétés chimiques uniques, incluant des concentrations élevées de minéraux rares et de composés organiques. Les vents persistants de la zone crépusculaire joueraient un rôle dans la composition de l'océan et la vie alien exotique de la planète.

		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Day = Le scan barométrique dans l'hémisphère diurne de Suluco confirme la présence d'une zone de basse pression en surface, où l'air chauffé par l'étoile s'élève et diminue en densité. Cet air monte vers l'hémisphère nocturne à haute altitude. 
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Twilight = Un scan barométrique dans la zone crépusculaire de Suluco révèle un profil de pression atmosphérique unique influencé par la différence de température marquée entre les hémisphères. La zone crépusculaire connaît des vents persistants forts vers l'hémisphère diurne, probablement dus au contraste thermique. L'anneau étroit d'éternité crépusculaire crée une région atmosphérique dynamique et turbulente. 
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Night = Les mesures barométriques révèlent une pression atmosphérique plus élevée en surface de l'hémisphère nocturne, car l'air de l'hémisphère diurne se refroidit et descend en arrivant à l'hémisphère nocturne, devenant plus dense et créant une zone de haute pression. L'air descendu traverse ensuite la surface vers l'hémisphère diurne, fermant la boucle de la circulation atmosphérique. 
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingLow = Le scan barométrique dans la basse atmosphère de Suluco révèle un profil de distribution de pression complexe. Dans l'hémisphère diurne, l'air chauffé par l'étoile crée une zone de basse pression. En revanche, l'hémisphère nocturne présente une zone de haute pression en basse atmosphère, due à l'air descendant refroidi et plus dense. 
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingHigh = Le scan barométrique dans la haute atmosphère de Suluco, tenant compte des conditions atmosphériques globales, fournit des aperçus sur les profils de pression complexes influencés par la configuration verrouillée par les marées et le contraste thermique entre les hémisphères.

		#LOC_KS_SciDef_seismicScan_Suluco_SrfLanded = Le scan sismique indique que Suluco est relativement géologiquement stable. Cependant, les vents persistants peuvent créer friction et stress en surface, potentiellement menant à des tremblements de terre. La zone crépusculaire connaît des niveaux plus élevés de tremblements, probablement causés par les forces de friction des vents et le chauffage/refroidissement différentiel de la surface.

		#LOC_KS_SciDef_gravityScan_Suluco = Le scan gravimétrique global de Suluco révèle un champ gravitationnel relativement cohérent à la surface, sans variations ou anomalies significatives. La gravité est similaire dans les hémisphères diurne et nocturne, ainsi que dans la zone crépusculaire entre eux.

		#LOC_KS_SciDef_magnetometer_SulucoInSpace = Les mesures du magnétomètre indiquent que Suluco a un champ magnétique faible et relativement uniforme en orbite basse. Aucune variation ou anomalie significative n'est détectée. L'absence de variations suggère que le champ magnétique de Suluco est probablement généré par son géodynamo interne, comme les autres planètes telluriques. 

		#LOC_KS_SciDef_atmosphereAnalysis_Suluco = L'atmosphère de Suluco est principalement composée d'azote (N2) et d'oxygène (O2), avec des traces de dioxyde de carbone (CO2), méthane (CH4), ammoniac (NH3) et autres gaz mineurs. La pression atmosphérique moyenne de Suluco est inférieure à celle de Kerbin, donc attention à ne pas faire de sport intense.

		// Tot
		#LOC_KS_SciDef_crewReport_Tot_SrfLanded = On a presque l'impression qu'on pourrait désorbiter ce truc rien qu'en poussant dessus assez fort avec notre vaisseau.
		#LOC_KS_SciDef_crewReport_Tot_InSpace = Allez, on peut facilement construire des vaisseaux spatiaux plus grands que ce rocher !

		#LOC_KS_SciDef_evaReport_Tot_SrfLanded = Ne sautez pas. Vous pourriez vraiment échapper à la gravité de ce rocher en sautant dessus.
		#LOC_KS_SciDef_evaReport_Tot_InSpace = Avons-nous vraiment besoin d'atterrir sur ce rocher minuscule ? On pourrait facilement envoyer quelqu'un en bas et le faire remonter en n'utilisant que son jetpack EVA.

		#LOC_KS_SciDef_mysteryGoo_Tot_SrfLanded = Le goo semble chez lui sur Tot.
		#LOC_KS_SciDef_mysteryGoo_Tot_InSpaceLow = Le goo continue de rire. Vous menacez alors de souder son unité de confinement, à quel moment il se conforme enfin à votre demande d'arrêter de rire.
		#LOC_KS_SciDef_mysteryGoo_Tot_InSpaceHigh = Le goo semble rire en sentant la présence de Tot. Vous claquez son unité de confinement dans une tentative futile de le faire taire.

		#LOC_KS_SciDef_surfaceSample_Tot_SrfLanded = L'analyse de la surface de Tot suggère qu'il pourrait s'agir simplement d'un astéroïde capturé. Vous ne pouvez pas en être certain cependant.

		#LOC_KS_SciDef_seismicScan_Tot_SrfLanded = Le scanner sismique lit...... rien.

		#LOC_KS_SciDef_gravityScan_Tot_SrfLanded = Enfin, le capteur de gravité se concentre sur Tot maintenant qu'il est littéralement à côté de ce tout petit rocher.
		#LOC_KS_SciDef_gravityScan_Tot_InSpaceLow = Le capteur de gravité pointe toujours vers Suluco. Par frustration, vous faites un réinitialisation complète du capteur de gravité, pour qu'il tourne à nouveau son attention vers Suluco.
		#LOC_KS_SciDef_gravityScan_Tot_InSpaceHigh = Le capteur de gravité semble beaucoup plus intéressé par Suluco que par ce petit truc. Essayer de le faire se concentrer sur Tot serait un exercice de futilité.

		#LOC_KS_SciDef_magnetometer_Tot_InSpaceLow = Le bras est incapable de détecter aucun champ magnétique provenant de Tot
		#LOC_KS_SciDef_magnetometer_Tot_InSpaceHigh = Vous mesurez un champ magnétique modérément fort, mais il semble provenir de Suluco et non de...... quoi que soit ce truc.


		// Sera
		#LOC_KS_SciDef_crewReport_Sera_SrfLanded = Les Kerbals alertent le KSC qu'ils ont atterri sur Sera et préparent leurs bocaux d'échantillons.
		#LOC_KS_SciDef_crewReport_Sera_SrfSplashed = Les Kerbals alertent le KSC qu'ils ont amerri sur Sera et préparent leurs bouteilles d'eau.
		#LOC_KS_SciDef_crewReport_Sera_FlyingLow = L'équipage s'accorde que Sera est un spectacle magnifique à contempler avec son système d'anneaux.
		#LOC_KS_SciDef_crewReport_Sera_FlyingHigh = Vos Kerbals sont fascinés par la vue des anneaux de Sera.

		#LOC_KS_SciDef_temperatureScan_Sera_SrfLanded = Vous pourriez probablement faire du ski, s'il y avait de la neige...
		#LOC_KS_SciDef_temperatureScan_Sera_SrfSplashed = Vous ne devriez probablement pas nager dans cette eau.
		#LOC_KS_SciDef_temperatureScan_Sera_FlyingLow = Une rafale de vent froid vous fait presque tomber du vaisseau. Quelle frayeur !
		#LOC_KS_SciDef_temperatureScan_Sera_FlyingHigh = Il fait assez froid ici, n'est-ce pas ?
		#LOC_KS_SciDef_temperatureScan_Sera_InSpace = C'est froid. Je veux dire, à quoi vous attendiez-vous ?

		#LOC_KS_SciDef_evaReport_Sera_SrfLanded = La surface de Sera est un paysage stérile et rocheux avec des rochers épars. Le système d'anneaux frappant de Sera s'arc-boute au-dessus, projetant de longues ombres sur le terrain rocheux en dessous. Les lacs sont clairement visibles depuis la surface. L'absence de vie végétale ou animale renforce l'impression d'un monde désolé et inhospitalier. 
		#LOC_KS_SciDef_evaReport_Sera_SrfSplashed = La surface des lacs de Sera est un paysage surréaliste et inquiétant. Les teintes brunes des lacs se reflètent sur la visière du Kerbal, projetant une lueur surnaturelle sur tout. Le terrain environnant est stérile et rocheux, sans végétation ni signe de vie. La nature toxique du lac rend impossible la survie de toute forme de vie connue. 
		#LOC_KS_SciDef_evaReport_Sera_FlyingLow = Descendre dans la basse atmosphère de Sera est une expérience éprouvante. Les vents hurlent et secouent le Kerbal qui plonge vers la surface rocheuse, rendant le contrôle difficile. Malgré les conditions difficiles, la vue est à couper le souffle. Le terrain accidenté s'étend en dessous, parsemé de rochers géants et de chaînes de montagnes. L'atmosphère est épaisse et brumeuse, avec une teinte rougeâtre due aux particules d'oxyde de fer. Malgré la beauté de la planète, les conditions ici sont incroyablement difficiles. 
		#LOC_KS_SciDef_evaReport_Sera_FlyingHigh = La surface rocheuse de la planète s'éloigne dans le lointain, remplacée par un tourbillon de nuages et de gaz. L'atmosphère ici est fine et vaporeuse, avec une teinte rouge-jaune. Malgré la beauté de la planète depuis cette hauteur, les conditions sont incroyablement difficiles. C'est une zone dangereuse mais essentielle à explorer pour ceux qui cherchent à percer les mystères de ce monde stérile et rocheux.
		#LOC_KS_SciDef_evaReport_Sera_InSpaceLow = C'est un monde austère et sans vie, rien ne rompt la monotonie de sa surface infinie hormis le système d'anneaux frappant qui l'encercle. Effectuer une EVA dans l'espace bas au-dessus de Sera offre une perspective unique sur cette planète désolée, permettant aux chercheurs de l'observer à distance et d'étudier ses caractéristiques en détail. Les conditions sont difficiles, avec des températures extrêmes et des niveaux de radiation élevés.
		#LOC_KS_SciDef_evaReport_Sera_InSpaceHigh = Sera est un spectacle impressionnant vu d'en haut, avec son beau système d'anneaux et sa surface stérile et rocheuse s'étendant en dessous. En flottant en apesanteur au-dessus de la planète, vous avez été frappé par la désolation du paysage et les lacs toxiques et sans vie qui parsèment sa surface.

		#LOC_KS_SciDef_mysteryGoo_Sera_SrfLanded = Le goo est froid et a une petite quantité de poussière orange dessus.
		#LOC_KS_SciDef_mysteryGoo_Sera_SrfSplashed = Le goo s'est mouillé lors de votre amerrissage.
		#LOC_KS_SciDef_mysteryGoo_Sera_FlyingLow = Le goo commence à geler.
		#LOC_KS_SciDef_mysteryGoo_Sera_FlyingHigh = Le goo vacille dans son conteneur lors de votre rentrée atmosphérique.

		#LOC_KS_SciDef_surfaceSample_Sera_SrfLanded = L'échantillon de surface collecté sur Sera est composé d'un régolithe à grains fins rouge-brun apparemment érodé par des tempêtes de poussière et le vent. L'analyse chimique révèle une forte concentration de métaux lourds : fer, aluminium, titane, ainsi que d'autres éléments comme le silicium et le calcium. Si la présence de métaux lourds suggère une composition minérale potentiellement riche, l'absence de signes de composés organiques ou d'indicateurs de vie suggère que Sera n'est pas adaptée à la vie telle que nous la connaissons. 
		#LOC_KS_SciDef_surfaceSample_Sera_SrfSplashed = L'échantillon collecté dans l'un des lacs de Sera est composé d'eau. L'analyse chimique révèle une forte concentration de métaux lourds et autres composés toxiques. Cependant, l'absence de signes de vie suggère que Sera n'est pas adaptée à la vie telle que nous la connaissons.

		#LOC_KS_SciDef_mobileMaterialsLab_Sera_SrfLanded = La poussière soulevée à l'atterrissage recouvre les matériaux d'une fine poussière orange.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_SrfSplashed = L'eau s'infiltre dans l'unité, corrodant les matériaux.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_FlyingLow = Une fine couche de glace recouvre les matériaux.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_FlyingHigh = Une fine couche de glace recouvre les matériaux.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_InSpace = Les matériaux gèlent à l'exposition à l'espace.

		#LOC_KS_SciDef_barometerScan_Sera_InSpaceLow = Quelle surprise ! L'appareil affiche 0, comme s'il était dans le vide dans l'espace au-dessus de Sera !
		#LOC_KS_SciDef_barometerScan_Sera_InSpaceHigh = L'appareil affiche 0, comme s'il était dans le vide dans l'espace au-dessus de Sera !

		#LOC_KS_SciDef_seismicScan_Sera_SrfLanded = Le scan sismique de la croûte et du manteau de Sera révèle une planète très active tectoniquement, avec une activité sismique fréquente. La croûte est fracturée, avec des réseaux étendus de failles et fissures, probablement causés par les contraintes du système d'anneaux. Cependant, l'absence de signes de composés organiques ou d'indicateurs de vie suggère que Sera n'est pas adaptée à la vie telle que nous la connaissons. 

		#LOC_KS_SciDef_gravityScan_Sera_Srf = La gravité est juste un tout petit peu plus élevée que celle de Kerbin, à 1,08 g.

		#LOC_KS_SciDef_magnetometer_Sera_InSpace = Sera semble posséder un champ magnétique relativement fort, protégeant la planète des vents solaires de Sunorc.

		#LOC_KS_SciDef_atmosphereAnalysis_Sera_SrfLanded = L'analyse atmosphérique en surface de Sera révèle un environnement stérile et sans vie, sans signe de composés organiques ou d'indicateurs de vie. L'atmosphère est épaisse et composée principalement de dioxyde de carbone et d'azote, avec des traces d'argon et de méthane. 
		#LOC_KS_SciDef_atmosphereAnalysis_Sera_FlyingLow = L'analyse de la basse atmosphère de Sera révèle un environnement épais et brumeux, composé principalement de dioxyde de carbone et d'azote, avec des traces d'argon et de méthane. De plus, la basse atmosphère contient une quantité significative de poussière et de particules, suggérant des tempêtes de poussière ou des perturbations atmosphériques fréquentes. Cependant, l'absence de signes de composés organiques suggère que Sera n'est pas adaptée à la vie telle que nous la connaissons.
		#LOC_KS_SciDef_atmosphereAnalysis_Sera_FlyingHigh = L'analyse de la haute atmosphère de Sera révèle un environnement fin et ténu, avec des traces de dioxyde de carbone, azote et argon. Cependant, la haute atmosphère présente une concentration étonnamment élevée de particules chargées, suggérant un champ magnétique fort autour de la planète. L'absence de signes de composés organiques suggère que Sera n'est pas adaptée à la vie telle que nous la connaissons. 

		// Dipuc
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Lowlands = Comment différencier les régions basées sur l'altitude ? Oui, en les comparant aux zones environnantes plus élevées, mais à quel point les basses terres sont-elles « basses » par rapport au... « niveau de la mer » ? D'ailleurs, qu'est-ce qui compte comme « niveau de la mer » moyen sur un corps céleste sec et vide comme Dipuc, le point le plus bas non volcanique de la croûte, ou une profondeur arbitraire fixée par... quel comité ou individu ? Avec le manque de standardisation, autant ouvrir le sas pour prendre l'air par frustration.\n\n\n...attendez- 
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Midlands = Les terres moyennes, un endroit très... « moyen ». Peut-être avez-vous atterri ici pour les concentrations accrues de matériaux exploitables pour l'utilisation in situ des ressources ? Sinon, je recommande d'aller aux basses terres pour des zones plus sûres et plus douces pour la construction de colonies, ou aux hautes terres et montagnes pour des défis littéralement plus élevés, il n'y a pas grand-chose d'autre ici, à moins d'avoir un rover ou d'être dans un rover encapsulé et de vouloir surfer sur des vagues... des vagues statiques, je précise.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Highlands = Les hautes terres, plus élevées que la plupart des endroits sur Dipuc et une merveille pour contempler les environs. Les montagnes surpassent toutefois cette zone en splendeur de perspective. Les prospecteurs de ressources peuvent commencer à excaver à cœur joie, explorer le paysage de plus en plus escarpé, ou prétendre ne pas faire de cauchemars sur les marées titanesques de Rouqea.\n\n\nOui, il y a de VRAIES montagnes ici qui ne se déplacent pas rapidement, donc idéalement, pas besoin de s'inquiéter de la mortalité sur une lune solitaire comme celle-ci.\n\n...À moins que vous ne soyez un crétin baveux ou Danny ou Dennis et souhaitiez sacrifier des Kerbals au Kraken.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Mountains = « Ce ne sont pas des vagues, ce sont des montagnes », dit Gene Kerman à un vétéran de Rouqea en proie à la panique. Il affirme que les montagnes sont « immobiles, statiques et d'une teinte crème », et non « mobiles, dynamiques et teintées d'outremer ». De plus, la spectrométrie de masse et les scans gravimétriques révèlent de fortes concentrations de silicates, sulfates, carbonates et oxydes plus lourds intégrés dans plusieurs strates montagneuses, des matériaux et structures souterraines évidemment absents des vagues de plusieurs kilomètres de haut composées entièrement d'un mélange liquide impur de myriades de minéraux et composés organiques dans du monoxyde de dihydrogène oxygéné diatomique dissous. « Maintenant, parcourez le reste de la surface de Dipuc, exploitez le sol - de préférence pas à la pioche car tout éjecta minier pourrait s'avérer dangereux pour le Kerbal ou l'équipement - ou commencez l'établissement d'une colonie ici, de peur que les tonnes de delta-v consommées ne soient vaines ! »\n\n-Gene
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Poles = Ah, les régions polaires, où la neige abonde et les températures glaciales sont la norme.\n\nAttendez, non, c'est sur un monde de type Kerbin. Aucune glace n'est présente ici. Au moins l'atterrissage ici ne devrait pas être ardu, n'est-ce pas ?\n\nPourquoi l'activité volcanique est-elle inexistante dans cette région particulière mais abondante aux basses latitudes ? L'agitation tidale de Sera sur l'intérieur de Dipuc, qui exerce ses effets les plus forts dans les régions les plus proches du parent de Dipuc - les basses latitudes proches de l'équateur - pourrait l'expliquer, mais compte tenu de la rotation synchrone de Dipuc avec Sera, l'activité volcanique ne devrait-elle pas fréquenter son côté « proche » ? Quoi qu'il en soit, vu que le paysage n'est pas un merveilleux environnement hivernal, pensez à vous diriger plus au sud ou au nord d'ici.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterSouth = Le cratère sud apparaît... à quelle distance au sud de l'équateur de Dipuc ? À moins que le ciel vide au-dessus du lieu actuel n'expose Sera, les références pour la position latitudinale du cratère sud ne sont que périodiques, soit avec la présence gravitationnelle lointaine de Kcalbeloh soit avec Sunorc illuminant pendant au moins la moitié de la période de rotation et orbitale de Dipuc.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterEast = Le cratère oriental... à quelle distance à l'est du méridien principal se trouve-t-il ? Et qu'est-ce qui définit une longitude spécifique comme méridien principal ? Quelle caractéristique distinctive, naturelle ou non, justifie la sélection d'un méridien spécifique de Dipuc comme principal ?\n\n\nNon, Gene, c'est dans l'univers du jeu, utiliser la ligne verticale la plus centrale sur la carte des couleurs de Dipuc ne constitue pas une raison valable dans l'univers du jeu. Et était-ce avant ou après que tu aies tenté de consoler un Kerbal touché par Rouqea dans les Montagnes, compte tenu de l'hypocrisie du second scénario ?
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterWest = J'espère que vous apprécierez votre séjour au cratère occidental, surtout si vous manquez du propergol nécessaire pour transformer ce voyage aller simple en aller-retour. Quoi qu'il en soit, qu'est-ce qui a rendu le cratère occidental assez attrayant pour justifier une visite ? Après tout, les grands cratères comme ceux-ci ne sont que des marques glorifiées à la surface des mondes vides où de telles structures d'impact parsèment la surface à un rythme régulier. Cela dit, Dipuc semble faire exception - à l'exclusion du complexe des cratères occidental, oriental, sud et double, les cratères d'impact sont rarement trouvés ici. Peut-être que les activités internes et le volcanisme actif sont associés à la disparité de surface de Dipuc par rapport aux autres petits mondes vides similaires.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_DoubleCrater = Bienvenue au complexe du double cratère, où vous ne faites absolument pas l'expérience d'une vision double. Nous y sommes, après tout - aucun artefact visuel interne ou figment mental ne durerait aussi longtemps sans qu'un autre Kerbal ne s'adresse à votre état mental altéré.\n\nVous êtes seul dans le vide de Dipuc, n'est-ce pas ? Sinon, cessez vos illusions sur l'existence des doubles cratères de peur que le reste de l'équipage ne vous méprise comme beaucoup de Kerbals informés au pays le font avec les Flat Kerbiners ou les Nonexistent-Dressings.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Volcano = En ce qui concerne la sécurité, les cônes volcaniques à pentes raides sont passablement dangereux en raison de leur inclinaison abrupte, ce qui peut entraîner plusieurs accidents préjudiciables à la progression de la mission. Au moins la chaleur que vous attendriez de la surface d'un cône volcanique actif est absente ici, n'est-ce pas ?\n\nEt non, il y a peu de raisons de s'inquiéter des éruptions volcaniques ici, car l'environnement vide refroidirait immédiatement la lave en éruption et tout flux pyroclastique potentiel au point de devenir des flux de lahar lents et facilement évitables.\nSimplement... pour l'amour du Kraken, ne vous aventurez jamais à proximité du conduit volcanique actif.\n\n\nVous en êtes déjà proche, n'est-ce pas ?
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_VolcanoVent = Courts-circuits et arcs électriques ? Atmosphère à haute pression d'oxygène pur ? Odeur âcre ? Prévalence de matériaux hautement inflammables dans les atmosphères riches en oxygène ? Si votre vaisseau possède un compartiment qui remplit toutes ces conditions, félicitations, une simulation in situ de l'incendie d'Acapello 1 est imminente ! Et si la température dans ce conduit volcanique est suffisamment élevée pour enflammer plusieurs matériaux hautement inflammables actuellement présents dans le vaisseau, que le Kraken vous bénisse alors que l'intérieur de votre engin commence à devenir un four à pizza fermé et enflammé.\n\nJ'espère que le Kraken aime les Kerbals cuits et légèrement brûlés dans ce cas...

		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow1 = La tache pâteuse de Dipuc en tant que lune apparaît de manière appropriée bosselée, bien qu'il y ait plusieurs protubérances aux basses latitudes indicatives d'un volcanisme actif. La raison et le modus operandi de ces structures volcaniques sont actuellement inconnus, bien qu'une agitation tidale interne soit une possibilité probable. 
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow2 = Descendre davantage vers la surface ? Si oui, j'espère que vous avez préparé assez de ressources pour retourner en orbite basse de Dipuc ou vers tout vaisseau en orbite à proximité. S'éloigner davantage de Dipuc ? J'espère que vous avez apprécié votre séjour à sa proximité, en supposant qu'une telle visite était intentionnelle et non le résultat de... circonstances gravitationnelles anormales. Si vous comptez rester ici, je suppose que c'est voulu ; sinon, vous feriez mieux d'avoir des capsules cryogéniques et des réserves de Glykerol, sinon vos ressources de survie s'épuiseront progressivement, même avec des modules de recyclage disponibles.\n\n\n...Vous n'avez pas de mods de survie ou DeepFreeze installés, n'est-ce pas ?
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow3 = Cette lune induit l'ennui à un rythme plus élevé que [repainted Mun], pouvons-nous retourner à [Ares] ? Je n'aime pas orbiter autour d'une boule de pâte surdimensionnée, une qui N'EST MÊME PAS COMESTIBLE.\n\n\nAvis : veuillez ne pas consommer de pâtisserie crue ou de pâte à pain contenant des ingrédients ou des œufs facilement périssables, ils peuvent contenir des matériaux ou pathogènes potentiellement dangereux, en particulier lorsque l'un ou les deux constituants internes de l'œuf sont des ingrédients de la pâte. -Mortimer
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow4 = Ces régions montagneuses ne peuvent pas nous atteindre... Excellent, descendons pour échantillonner la surface et déterminer sa composition et sa saveur ! Oh, la surface n'est pas comestible ? Pourquoi sommes-nous ici alors ? Pour forcer les Kerbals traumatisés sur Rouqea à revivre des expériences traumatisantes dans une thérapie d'exposition au style humour noir ?

		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh1 = Boule de pâte. Je l'appelle ainsi. Si Minmus est la lune à la glace à la menthe, Dipuc est la lune boule de pâte. Étonnamment, l'Union astronomique internationale a quasi unanimement acquiescé à cette notion. Il semble que tout le monde au pays ait faim d'humour.\n\nEt oui, l'UAI existe ici, bien que principalement pour attester de l'existence de cette planète naine ennuyeuse mieux connue sous le nom de Dres, ou humoristiquement comme « la planète naine inexistante » ou « le Mun recolorié ».
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh2 = Je crois que nous ne devrions pas être ici. Les calculs orbitaux indiquaient tous que la sphère d'influence de Dipuc est trop minuscule pour affecter raisonnablement l'orbite à l'échelle temporelle de la mission. Le pont Einstein-Rosen voisin est-il impliqué dans cette anomalie gravitationnelle ? Après tout, c'est ainsi que nous sommes arrivés ici malgré la distance considérable depuis Kerbin.\n\n\n<color=#000000>[Vous êtes bien arrivés ici via des ponts Einstein-Rosen, correct ?]</color>
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh3 = En inversant le nom de cette lune, je dois demander : qu'est-ce qui rend cette lune appréciable en aucun sens du terme ?
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh4 = Bienvenue sur Dipuc, une lune vide du monde désertique principalement glacial Sera avec une teinte beige notable. Curieusement, peu de cratères marquent la surface, à l'exception de plusieurs grands complexes de cratères, dont une structure de double cratère qui se chevauche. Il semble y avoir plusieurs monticules concentrés aux basses latitudes ressemblant fortement à des cônes stratovolcaniques. Volcanisme actif ou récemment actif ? Quoi qu'il en soit, si votre visite des régions extérieures de Dipuc est prévue, pensez à descendre davantage pour vous renseigner sur son activité de surface.


		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Lowlands = Les basses terres sont, comme prévu, de basse altitude, du moins par rapport au terrain environnant, avec des pentes douces et des collines semblables à des dunes englobant l'ensemble des basses terres. La composition de surface locale ressemble à celle des terres moyennes et hautes, bien qu'elle apparaisse comme un mélange lâche de type régolithe de particules plus fines que dans l'un ou l'autre biome. Je me demande d'où viennent les mesures pour l'altitude de surface moyenne du « niveau de la mer », considérant qu'il n'y a pas d'océans à l'échelle mondiale à utiliser comme base ?
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Midlands = Un terrain accidenté et bosselé caractérise les terres moyennes, semble-t-il. L'élévation relative au « niveau de la mer » ici est significativement plus élevée que l'élévation moyenne des basses terres. La composition locale apparaît identique aux basses et hautes terres - vraisemblablement du matériau silicaté avec des oxydes, métaux, lanthanides et l'actinide occasionnel entre les deux. Les tailles des particules sont plus élevées ici, et les pierres plus grandes semblent occasionnellement se conglomérer avec les pierres voisines.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Highlands = Les hautes terres sont, comme prévu, de haute altitude par rapport au reste de la surface de Cupid-*ahem*-Dipuc, et ont une composition similaire aux terres moyennes et basses. Le terrain local est bosselé et escarpé à un degré supérieur aux terres moyennes. Je conseille vivement de rester prudent lors de l'exploration près des pentes abruptes et des structures semblables à des dunes ici. Les tailles des particules, non, les PIERRES ici sont particulièrement significatives et constituent un obstacle pour les véhicules rover plus petits.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Mountains = Des élévations significatives par rapport au niveau de la mer définissent les chaînes de montagnes et cordillères, qu'il y ait une atmosphère ou non, comme c'est le cas ici. Les teintes de surface intrinsèques ressemblent à celles des basses terres, terres moyennes et hautes, bien que la texture et l'apparence s'écartent des conventions des trois biomes susmentionnés. Ici, les roches de surface semblent avoir subi une métamorphose partielle. De plus, les concentrations d'actinides et de lanthanides abondants dans les noyaux des corps célestes différenciés sont élevées par rapport aux biomes environnants. Les roches non métamorphosées ici posent des risques significatifs pour les véhicules rover petits et moyens, bien que les plus grands puissent s'en sortir.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Poles = Les régions polaires de Dipuc présentent des niveaux similaires de terrain induisant l'ennui à la plupart de la surface ailleurs - teinte similaire, composition similaire, température similaire, et cetera. Les niveaux de température suscitent une certaine intrigue compte tenu de la plus grande distribution du rayonnement de Sunorc aux latitudes plus élevées, bien que l'activité en vol et extravéhiculaire devrait rencontrer des obstacles environnementaux minimes ici comme partout ailleurs, à l'exception des conduits volcaniques. 
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterSouth = Les régions aplaties du cratère géant du sud présentent des élévations plus basses que la plupart du terrain qui l'entoure. Les roches de surface indiquent une activité métamorphique antérieure, probablement due à l'événement d'impact qui a initialement généré le cratère géant du sud. Les teintes des roches dans la zone apparaissent légèrement plus sombres que le terrain environnant également, peut-être aussi à cause de l'événement d'impact ? Compte tenu des conduits volcaniques actifs de Dipuc, on pourrait supposer qu'une combinaison de roches métamorphiques et ignées compose le plancher du cratère, bien que l'apparence actuelle de la surface semble contraire à ces hypothèses.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterEast = Le cratère géant de l'est apparaît comme un vaste canyon traversant le terrain autrement normal de Dipuc, les hautes terres et montagnes et leurs hautes élévations entourant le cratère de manière omnidirectionnelle. Comme les autres cratères, la coloration de surface ici est notablement plus sombre que le reste, et est particulièrement notable lors de la comparaison des teintes de surface locales à celles des terres moyennes et hautes environnantes. Les roches ici semblent métamorphosées à un degré marqué, et la surface est plus lisse et plus rigide que le terrain plus accidenté, rocheux et poussiéreux caractéristique des biomes typiques ici.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterWest = Les élévations moyennes dans le cratère géant de l'ouest ressemblent à celles des autres cratères, avec des valeurs notablement plus basses que le terrain environnant. Les roches ici semblent quelque peu pulvérisées et poudreuses avec une ressemblance au régolithe toujours dangereux du Mun, mais semblent solidement fixées au sol, comme si un processus géomorphique s'était produit ici qui a comprimé les roches minuscules au terrain. De plus, la teinte globale du cratère est plus sombre que le terrain environnant. Peut-être est-ce dû à l'impact, ou s'agit-il d'un régolithe spécifique à la région en raison des conditions pendant et immédiatement après l'impact ? En note secondaire, la vue du terrain englobant le cratère géant de l'ouest apparaît de type canyon.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_DoubleCrater = L'élévation moyenne dans la région des doubles cratères est notablement plus basse que celle des basses terres. La coloration de surface est plus sombre que le terrain environnant et a une texture rocheuse différente. Les roches semblent quelque peu métamorphiques - une apparence attendue, étant donné que des changements environnementaux fulminants significatifs se sont produits dans cette région en raison des doubles impacts.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Volcano = L'élévation relative dans la région du volcan est plus élevée que le reste... pour des raisons évidentes. Le volcan est soit un stratovolcan soit un volcan à cône de scories, à en juger par sa forme conique abrupte et ses pentes tout aussi abruptes. Les températures au sol moyennes sont probablement plus élevées ici, bien qu'avec toutes nos combinaisons en place, cela ne serait détectable que via les lectures d'un thermomètre au sol. Une activité de microséismes est également attendue ici - il vaut mieux s'en informer davantage avec un sismomètre réel, cependant. 
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_VolcanoVent = Vous êtes dans une situation très, très précaire. Les températures sont suffisamment élevées pour traverser votre combinaison, et le conduit est actif, alors pourrais-je vous suggérer de planer au-dessus du conduit au lieu d'y marcher de peur de vous dématérialiser en une bouffée de fumée. Cela dit, les roches ignées semblent prévalentes dans les parois du conduit, bien que les parois inférieures semblent quelque peu fondues mais métamorphosées par la chaleur. Sera a-t-elle quelque chose à voir avec cela, ou l'activité volcanique de Dipuc est-elle indépendante de tout mécanisme de sa planète parente ?\n\n\nSi vous ne souhaitez pas finir comme l'équipage d'Acapello 1, QUITTEZ LES LIEUX IMMÉDIATEMENT.

		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Lowlands = Les basses terres de Dipuc apparaissent... relativement plates d'ici, avec les « dunes » occasionnelles en forme de rides parsèmant les plaines aux côtés du volcan actif occasionnel. En supposant que vous êtes actuellement du côté illuminé de la lune, la teinte de surface ressemble fortement à de la pâte à pain.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Midlands = Comme les basses terres, les terres moyennes ressemblent à de la pâte à pain fraîche par la teinte, bien qu'avec une apparence plus bosselée en raison du relief accidenté élevé de la région.\n\nSi la teinte de Dipuc ressemble à la pâte à pain et Minmus à la glace à la menthe, existe-t-il un monde ressemblant aux spaghettis ou à la pizza ?\n\n\n\nEt non, Io ne compte pas - la spéculation actuelle concerne les corps célestes de l'univers du jeu.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Highlands = Plus bosselées en apparence, les hautes terres, en raison des élévations généralement plus élevées, semblent plus proches du vaisseau - à moins que ledit vaisseau n'orbit à des altitudes dangereusement basses, auquel cas la perception de proximité devrait peu importer face au risque significatif de collision potentielle.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Mountains = La proximité des montagnes avec le vaisseau est... intimidante à en être éblouissant. La linéarité de plusieurs chaînes de montagnes apparaît comme des vagues. Sans l'absence d'atmosphère et les teintes crème-brun des montagnes, on pourrait les confondre avec les marées titanesques qui font régulièrement le tour de Rouqea.\n\nCompte tenu du paramètre gravitationnel de Dipuc, atterrir dans les régions montagneuses et retourner à un vaisseau en orbite basse uniquement avec le propergol EVA est une possibilité, comme sur Minmus. 
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Poles = Aucune glace d'aucune sorte - eau, dioxyde de carbone, méthane, ammoniac, et cetera - n'est présente aux pôles, ni ne devrait être attendue compte tenu du statut de Dipuc en tant que monde vide minuscule de taille et masse comparables à Minmus. Les pôles eux-mêmes apparaissent très similaires au reste de la surface aux latitudes plus basses, bien qu'aucune activité volcanique ne soit présente ici.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterSouth = Ah, le cratère géant du sud ! Un vaste... bassin... de platitude pure. Plutôt intuitif, vu son statut de cratère définissant les caractéristiques d'une lune passablement riche en relief. On s'attendrait à voir un pic central apparaître ici, mais les scans optiques et gravimétriques ne révèlent aucune anomalie indicative d'un pic central même érodé.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterEast = Le cratère géant de l'est, un gouffre décevamment plat avec des vues de surface prétendument impressionnantes qui émanent l'impression de se tenir dans un grand canyon particulièrement xérique... ou une collection concentrique de coulées de boue imposantes prêtes à vous submerger entièrement dans les fluides chargés de roches. Les scans visuels ne révèlent que peu de choses à part la légère différence de couleur entre celui-ci et les régions de haute élévation et montagneuses environnantes.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterWest = Pas grand-chose de notable initialement ici au-dessus du cratère géant de l'ouest. Une teinte de surface légèrement plus sombre que les régions de haute et moyenne élévation englobant le cratère, l'absence de pic central, et une vue décente en surface qui peut ressembler à fixer les parois d'un large canyon près du fond, et pas grand-chose d'autre.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_DoubleCrater = Le bassin d'impact des doubles cratères comprend principalement deux cratères d'impact, un cratère plus ancien et plus grand et un cratère plus jeune et plus petit, comme en témoigne le rebord du cratère minuscule qui empiète sur son voisin expansif. Un Kerbal à l'œil vif peut voir la légère différence de couleur entre les régions centrales des deux cratères et celles des zones de basse et moyenne élévation englobant le complexe. Étant donné la tendance des roches ignées solidifiées à se manifester en teintes plus sombres, les régions centrales sont des candidats possibles pour une activité magmatique antérieure généralisée, fournissant une explication potentielle de l'absence de pics centraux ici et dans les autres grands cratères de Dipuc. 
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Volcano = L'activité volcanique sur un monde aussi petit que Dipuc semble étrange. Les volcans ici, à en juger par leur apparence, sont de structure stratovolcanique - le cône volcanique consiste en plusieurs couches répétées de roches ignées multiples et d'éjecta volcaniques provenant d'éruptions répétées considérées comme récentes à l'échelle temporelle de Dipuc. L'atterrissage ici semble non viable en raison du terrain abrupt et en pente. 
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_VolcanoVent = Le conduit volcanique semble actif, vu l'apparence incandescente et fondue du lumen du conduit. Les lectures thermiques ne montrent aucun changement de température. Vous êtes en sécurité ici, pour l'instant. Tout ce qui doit être fait pour assurer votre continuité en tant que membre vivant, respirant et actif de la mission est de <color=#FF6A00>NE PAS DESCENDRE DAVANTAGE AU-DESSUS DU CONDUIT VOLCANIQUE ACTIF.</color> En supposant que votre vaisseau contient un cockpit, assurez-vous également que l'atmosphère N'EST PAS purement oxygénée - tout matériau hautement inflammable dans une atmosphère d'oxygène pur s'enflammera probablement spontanément sous des températures dépassant sa température de fonctionnement maximale.

		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh1 = La seule lune d'un monde désertique froid <color=#000000>[les ponts Einstein-Rosen ne comptent pas, si ce n'était pas déjà évident]</color> autour d'un analogue de Kerbol est un endroit plutôt banal pour un observateur lointain, bien qu'un examen plus rapproché puisse révéler davantage. À moins que la rencontre vous menant à sa sphère d'influence n'ait été involontaire ou ne soit survenue en raison de données anormales <color=#000000>[lire : bugs SOI]</color>, pensez à vous rapprocher pour examiner Dipuc de plus près ?
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh2 = L'apparence lointaine de Dipuc ressemble à de la pâte bosselée, une cacahuète... ou un noyau de cerise pâle. Peut-être que le Kraken pourrait avoir besoin d'une collation pour un apaisement momentané, ou d'un poison pour l'éliminer au profit de tous. Son parent, Sera, ne prêtera probablement que peu d'attention de toute façon. Que l'expérimentation avec, sur et autour de la lune miniature soit scientifiquement viable ou non dépend de votre discrétion, Kerbal intrépide.\n\n\nQuoi, vous pensez qu'une sonde peut atteindre si loin sans garantir une perte totale de contact ?
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh3 = Bien qu'à une distance déjà considérable de Kcalbeloh, son disque d'accrétion distinctif et son horizon des événements sont très visibles même avec des yeux assez myopes. Il vaudrait probablement mieux explorer cette zone qu'ici... à moins que vous ne soyez arrivé ici en premier depuis le trou de ver voisin et que vous ne vouliez pas dépenser plusieurs milliers voire millions de tonnes de carburant en delta-v.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh4 = Un endroit merveilleusement criblé de cratères, Dipuc. Bien qu'il semble avoir des structures aux basses latitudes ressemblant à des boutons de peau avec la zone surélevée et un pic central rougeâtre.\n\nOh, ce sont des cônes volcaniques ? Compte tenu de leur apparence rouge plus profonde, la lave qu'ils contiennent semble... froide. Peut-être que Dipuc était autrefois plus géologiquement active et violente ? Je repère des zones plus sombres qui ressemblent aux maria du Mun, certaines dans ces plus grands cratères également. Ce monde a peut-être été plus excitant dans le passé qu'aujourd'hui, qui sait ?

		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Lowlands = Puis-je demander exactement POURQUOI avez-vous effectué un scan barométrique dans un monde VIDE de tous les endroits ? S'il n'est pas entré dans un état irréparable et inopérant avant une réparation ultérieure déjà en raison de son entrée dans un environnement vide, votre tentative de collecter des données avec lui le fera sûrement d'un point de vue logique.\n\n\n<color=#000000>[Je me demande si un mod comme Kerbalism pourrait implémenter un mécanisme similaire...]</color>
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Midlands = Soit vous êtes stupide pour un Kerbal - une norme déjà basse - soit vous exécutez l'expérience sur un vaisseau d'atterrissage tout-en-un ou polyvalent. Si c'est le second cas, continuez et récoltez les récompenses de vos efforts, qui sont certes peu nombreux en supposant que vous êtes arrivé dans le système Kcalbeloh via des trous de ver gravitationnellement anormaux.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Highlands = Si vous effectuez ceci spécifiquement pour gagner des points de science, allez-y, mais veuillez noter la farce logique d'exécuter une expérience scientifique dépendante de l'atmosphère dans un environnement vide.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Mountains = Pourquoi devez-vous exécuter un scan barométrique, qui nécessite de résider dans une atmosphère pour obtenir un résultat, dans un environnement vide ? Est-ce Gene qui vous a poussé à faire ça, ou est-ce de votre propre initiative ? Quoi qu'il en soit, à moins d'exécuter ceci dans le cadre d'un groupe d'actions sur un atterrisseur polyvalent ou un vaisseau tout-en-un, je recommande de ne plus exécuter cette expérience dans ce type d'environnement.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Poles = Vous attendiez des pressions plus basses ici vu sa nature polaire ? Vous ne les trouveriez que dans des conditions atmosphériques, dont Dipuc est TOTALEMENT DÉPOURVU. Pour l'amour du Kraken, veuillez exécuter ceci dans des environnements appropriés. Même les mondes à atmosphère fine s'en sortent mieux avec cette expérience dans leur fine enveloppe gazeuse qu'ici.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterSouth = Excusez votre tournée plutôt pédante d'acquisition d'expériences scientifiques, mais avez-vous envisagé de cesser vos activités actuelles pour réfléchir exactement POURQUOI EFFECTUERIEZ-VOUS UN SCAN BAROMÉTRIQUE DANS UN VIDE ? Si vous avez des membres d'équipage à bord de votre vaisseau, j'espère que vous êtes préparé à la dérision pour cela.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterEast = « Pourquoi exactement effectuez-vous un scan barométrique sur Dipuc, un satellite naturel minuscule qui ne possède aucune trace d'atmosphère ? Mortimer, contactez le centre Kerbonaute, nous aurons besoin d'un psychanalyste pour quand l'équipage de la mission d'excursion en surface de Dipuc actuelle reviendra, nous avons un autre cas d'expérimentation scientifique absurde. » -Gene
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterWest = « Je suis devenu Ignoramus, ravageur d'intellect. Tous les génies tremblent devant moi et se prosternent à mes pieds ! » dit le Kerbal bizarre en tentant en vain d'utiliser un baromètre sur Dipuc. Gene, pour sa part, souhaitait couper par intermittence les liaisons de communication radio avec l'équipage de la mission en raison de son agacement. Cependant, il ne le pouvait pas, en raison du fait que la conscience constante et la transmission des données étaient primordiales pour assurer l'accomplissement des objectifs de la mission et la sécurité de l'équipage en cas de missions habitées comme celle qu'il présidait actuellement.\n\nGene, cependant, ne reçut aucun réconfort de ce savoir, sachant que le Kerbal qui tenta la barométrie dans le vide s'était donné une raison d'anticiper de succomber à la sélection naturelle.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_DoubleCrater = « En tentant d'effectuer une expérience barométrique in situ dans un environnement contraire aux conditions attendues dans lesquelles les barométries sont souvent effectuées, vous vous êtes certifié comme crétin professionnel et serez désormais en probation jusqu'à la conclusion de la mission. Ne résistez pas à votre sentence - cela ne fera qu'aggraver la sévérité et prolonger la durée de votre probation. Toute non-conformité supplémentaire entraînera une cessation immédiate via exposition directe au vide. » -Mortimer\n\nLe complexe Kerbonaute du Kerbal Space Center ne regrettera pas votre perte ; après tout, les Kerbonautes doivent être le summum de Kerbalkind pour traverser avec succès le cosmos infesté de Kraken.\n\nLe contrôle de mission ne regretterait pas non plus votre perte si vous êtes le seul membre d'équipage de votre mission actuelle.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Volcano = La thermométrie n'est-elle pas une expérience plus appropriée à exécuter à proximité d'un volcan, d'autant plus dans un environnement atmosphérique ? Même avec le dégazage volcanique, la pression des gaz libérés indiquerait un environnement pratiquement vide, comme le reste de ce monde par ailleurs statique en interne et dépourvu d'atmosphère.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_VolcanoVent = Votre bravoure face à une mort potentiellement imminente au milieu d'une situation précaire comme celle-ci est admirable, presque audacieuse et insouciante. Si les données de cette barométrie effectuée directement dans les conduits volcaniques de Dipuc sont récupérées par le contrôle de mission via les transmissions du réseau international d'espace lointain, qu'il soit connu que [Lorem Ipsum] Kerman fut un Kerbonaute courageux jusqu'à sa fin fondue.

		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = « Ahh, oui, un scan barométrique. Dans un vide. Quelle sagacité de votre part. Attendez, cette mission est inhabitée ? Qui parmi les ingénieurs du VAB a supposé qu'ajouter un baromètre à la sonde était une idée viable ? » -Gene
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = ...\n\n...\n\n...Pourquoi ?
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = N'avez-vous pas déjà exécuté cette expérience plusieurs fois dans un environnement vide avant de vous frayer un chemin jusqu'ici ? D'abord en orbite haute de Sera, puis en orbite haute de Dipuc, et maintenant en orbite basse de Dipuc. Où prévoyez-vous d'effectuer un autre scan barométrique ensuite, sur la surface sans atmosphère de Dipuc ?\n\n...Ne dites pas « déjà fait ».
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = Les résultats de votre scan barométrique indiquent une lecture de pression atmosphérique de [0] kilopascals (kPa), [null] millimètres de mercure et [void] bar. Par conséquent, nous pouvons conclure avec une forte probabilité que ce baromètre est utilisé dans un environnement vide. Pour récompenser votre crétinisme ingénieux, vous pouvez réclamer les éclats de mercure figé dont l'éjection à haute vitesse du récipient de confinement actuel en éclats semblables à des shrapnels est imminente. Veuillez rester conscient de votre environnement, et si vous effectuez la barométrie lors d'une activité extravéhiculaire, inspectez également immédiatement et minutieusement votre combinaison pour des anomalies. Merci pour votre temps, et souvenez-vous :\n\nSic itur ad astra !

		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = Votre stupidité flagrante pour avoir effectué un scan barométrique dans un lieu vide mérite des louanges et des récompenses sous forme d'une invitation (obligatoire) à Bop à la conclusion de la mission pour une interview exclusive avec le Kraken ! Nous attendons avec impatience votre retour sur Kerbin en suffisamment bonne santé !\n\n\n<color=#000000>[Toute tentative de résister à l'interview Kraken sur Bop provoquera une attaque vicieuse du Kraken au milieu de votre prochaine mission.]</color>
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = Un scan barométrique est totalement superflu dans cet environnement. À moins que l'emplacement actuel du baromètre ne soit un vaisseau polyvalent destiné à s'aventurer vers plusieurs corps célestes en plus de Dipuc, je vous recommande de ne plus utiliser le baromètre.\n\nÀ moins que vous n'effectuiez ceci pour des points de science supplémentaires, auquel cas, allez-y et profitez des subtilités techniques.
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = « J'espère vraiment que vous effectuez ceci pour les points de science et rien d'autre. Sinon le Kraken pourrait tenter de vous localiser et vous consommer au nom de vos congénères Kerbals au pays. » -extrait de Mortimer
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = Le compagnon boule de pâte minuscule de Sera ne gonflera pas dans cet environnement, surtout compte tenu de l'absence de preuves de formes de vie fermentantes et plus important encore, D'UNE ATMOSPHÈRE. Il est donc préférable de cesser la barométrie externe en quête de conditions adéquates de levée de pâte et d'effectuer plutôt une barométrie intérieure pour surveiller les fluctuations mineures de l'atmosphère interne... en supposant que le baromètre se trouve sur un vaisseau habité avec un ou plusieurs compartiments intérieurs.

		#LOC_KS_SciDef_mysteryGoo_Dipuc_SrfLanded = Le Goo semble se sentir menacé par le grondement lointain de la lune volcanique et tremble dans son conteneur. Quel peureux.
		#LOC_KS_SciDef_mysteryGoo_Dipuc_InSpaceLow = Un volcan entre en éruption loin en dessous en vue du Goo, qui recule de peur.
		#LOC_KS_SciDef_mysteryGoo_Dipuc_InSpaceHigh = Le Goo semble essayer de signaler au contrôle de mission qu'il veut rentrer à la maison.

		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLanded = Cet échantillon de roche semble être constitué de roche volcanique riche en métaux lourds.
		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLandedLowlands = Vous trouvez un morceau de verre volcanique très brillant au sol et le ramassez pour admirer sa surface lisse et réfléchissante. Malheureusement, vous devrez le donner aux scientifiques à votre retour, alors profitez-en pendant que vous le pouvez.
		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLandedVolcanoVent = WOUAH ! PATATE CHAUDE ! PATATE CHAUDE !!!

		#LOC_KS_SciDef_mobileMaterialsLab_Dipuc_SrfLanded = Les matériaux réagissent à la situation de manière décevamment attendue.
		#LOC_KS_SciDef_mobileMaterialsLab_Dipuc_InSpace = Les matériaux ne réagissent pas à l'espace près de Dipuc différemment qu'ils ne le feraient ailleurs. L'espace, c'est l'espace.

		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLanded = À cette distance de Sunorc, Dipuc est en fait plutôt froid.
		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLandedVolcano = Les pentes de ce volcan ne semblent pas être plus chaudes que le reste de Dipuc.
		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLandedVolcanoVent = Aïe. Ça pique légèrement.
		#LOC_KS_SciDef_temperatureScan_Dipuc_InSpace = Malgré la nature volcanique de la boule de pâte en dessous, le thermomètre ne semble pas conscient du degré de chaleur qu'il peut faire là-bas.

		#LOC_KS_SciDef_seismicScan_Dipuc_SrfLanded = Un grondement à basse fréquence cohérent avec l'activité volcanique proche reste constant partout sur Dipuc, un signe clair de l'activité de la lune.
		#LOC_KS_SciDef_seismicScan_Dipuc_SrfLandedVolcano = Le sol tremble assez pour être ressenti par un Kerbal. Peut-être devriez-vous partir d'ici...

		#LOC_KS_SciDef_gravityScan_Dipuc_SrfLanded = La gravité est similaire à celle du Mun, à 0,15 g.
		#LOC_KS_SciDef_gravityScan_Dipuc_InSpaceLow = En passant au-dessus de la surface de Dipuc, la lecture de gravité fluctue selon des motifs qui pourraient indiquer un flux de magma sous la surface.
		#LOC_KS_SciDef_gravityScan_Dipuc_InSpaceHigh = La gravité faible de Dipuc est assez uniforme à cette distance, mais il y a encore de petits pics dans les données.

		// Simetra-Simeht System
		#LOC_KS_SciDef_crewReport_SimeSystem_InSpaceHigh = Vous réfléchissez à l'origine de ce système. Comment exactement deux géantes gazeuses sont-elles venues si près l'une de l'autre ?
		#LOC_KS_SciDef_evaReport_SimeSystem_InSpaceHigh = Vous vous demandez comment ces deux planètes massives n'ont pas encore collisionné.
		#LOC_KS_SciDef_magnetometer_SimeSystem_InSpaceHigh = L'instrument détecte des champs magnétiques puissants, mais ne peut identifier s'ils proviennent de Simetra ou Simeht, ou même des deux.
		#LOC_KS_SciDef_gravityScan_SimeSystem_InSpaceHigh = Malgré les deux corps massifs au centre de ce système, le capteur affiche une valeur presque constante.

		// Simetra
		#LOC_KS_SciDef_crewReport_Simetra_FlyingLow = Vous commencez à remettre en question votre existence alors que votre vaisseau se fait lentement compacter par les pressions extrêmement élevées.
		#LOC_KS_SciDef_crewReport_Simetra_InSpace = Votre attention est attirée par la géante gazeuse massive à l'extérieur des hublots. 

		#LOC_KS_SciDef_temperatureScan_Simetra_FlyingLow = L'atmosphère extrêmement épaisse écrase le thermomètre.
		#LOC_KS_SciDef_temperatureScan_Simetra_FlyingHigh = Les températures dans la haute atmosphère sont très basses. 

		#LOC_KS_SciDef_evaReport_Simetra_FlyingLow = Le fait que vous ayez pu survivre assez longtemps pour faire un rapport ici-bas signifie que vous devez être un super-Kerbal.
		#LOC_KS_SciDef_evaReport_Simetra_FlyingHigh = C'est certainement une situation précaire.
		#LOC_KS_SciDef_evaReport_Simetra_InSpace = Vous contemplez avec admiration les différentes bandes de couleurs se formant à différentes latitudes de l'atmosphère de Simetra.

		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingLow1 = Les pressions extrêmes font entrer le goo dans un état supercritique.
		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingLow2 = La pression extrême compacte le goo en une sphère de la taille d'une balle de golf à l'ouverture de l'unité de confinement.
		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingHigh = Le goo réagit avec les divers composés de l'atmosphère.

		#LOC_KS_SciDef_mobileMaterialsLab_Simetra_FlyingLow = À l'ouverture des portes de la soute à matériaux, tous les échantillons sont instantanément écrasés par la pression extrême.
		#LOC_KS_SciDef_mobileMaterialsLab_Simetra_FlyingHigh = Plusieurs échantillons ont spontanément combusté après contact avec l'atmosphère.

		#LOC_KS_SciDef_barometerScan_Simetra_FlyingLow = Le baromètre sort de l'échelle au moment où son verre se brise.
		#LOC_KS_SciDef_barometerScan_Simetra_FlyingHigh = Les lectures du baromètre montent presque instantanément en flèche à mesure que vous descendez dans l'atmosphère de la géante de glace.

		#LOC_KS_SciDef_gravityScan_Simetra_InSpaceLow = Plus proche de Simetra, vous pouvez prendre une lecture bien plus précise de ses forces gravitationnelles.
		#LOC_KS_SciDef_gravityScan_Simetra_InSpaceHigh = Le capteur de gravité est perturbé par la proximité d'une autre géante de glace de taille similaire, et il pointe vers le barycentre du système.

		#LOC_KS_SciDef_magnetometer_Simetra_InSpaceLow = Maintenant que vous êtes plus proche de Simetra, vous pouvez prendre une lecture bien plus précise de son champ magnétique très fort.
		#LOC_KS_SciDef_magnetometer_Simetra_InSpaceHigh = Le bras du magnétomètre détecte un champ magnétique fort, mais la proximité de Simeht rend difficile de savoir s'il provient de Simetra seule ou des deux géantes de glace.

		#LOC_KS_SciDef_atmosphereAnalysis_Simetra_FlyingLow = Les pressions extrêmes aplatissent l'analyseur atmosphérique.
		#LOC_KS_SciDef_atmosphereAnalysis_Simetra_FlyingHigh = L'atmosphère semble être composée en grande partie de méthane, ainsi que de plusieurs autres composés que nous ne pouvons identifier.

		// Simeht
		#LOC_KS_SciDef_crewReport_Simeht_FlyingLow = Vous commencez à remettre en question votre existence alors que votre vaisseau se fait lentement compacter par les pressions extrêmement élevées.
		#LOC_KS_SciDef_crewReport_Simeht_InSpace = Votre attention est attirée par la géante gazeuse massive à l'extérieur des hublots. 

		#LOC_KS_SciDef_temperatureScan_Simeht_FlyingLow = L'atmosphère extrêmement épaisse écrase le thermomètre.
		#LOC_KS_SciDef_temperatureScan_Simeht_FlyingHigh = Les températures dans la haute atmosphère sont très basses. 

		#LOC_KS_SciDef_evaReport_Simeht_FlyingLow = Le fait que vous ayez pu survivre assez longtemps pour faire un rapport ici-bas signifie que vous devez être un super-Kerbal. 
		#LOC_KS_SciDef_evaReport_Simeht_FlyingHigh = C'est certainement une situation précaire.
		#LOC_KS_SciDef_evaReport_Simeht_InSpace = Vous ne pouvez vous empêcher de contempler avec admiration la géante gazeuse cyan-bleue. 

		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingLow1 = Les pressions extrêmes font entrer le goo dans un état supercritique.
		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingLow2 = La pression extrême compacte le goo en une sphère de la taille d'une balle de golf à l'ouverture de l'unité de confinement.
		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingHigh = Le goo réagit avec les composés de la haute atmosphère de manières auparavant jugées impossibles.

		#LOC_KS_SciDef_mobileMaterialsLab_Simeht_FlyingLow = À l'ouverture des portes de la soute à matériaux, tous les échantillons sont instantanément écrasés par la pression extrême.
		#LOC_KS_SciDef_mobileMaterialsLab_Simeht_FlyingHigh = Les échantillons réagissent avec les composés inconnus de l'atmosphère.

		#LOC_KS_SciDef_barometerScan_Simeht_FlyingLow = Le baromètre survit à peine à l'atmosphère écrasante. La pression ici est si élevée que toute eau qui pourrait exister devrait être à l'état supercritique.
		#LOC_KS_SciDef_barometerScan_Simeht_FlyingHigh = Les lectures du baromètre montent presque instantanément en flèche à mesure que vous descendez dans l'atmosphère de la géante de glace.

		#LOC_KS_SciDef_gravityScan_Simeht_InSpaceLow = Plus proche de Simeht, vous pouvez prendre une lecture bien plus précise de ses forces gravitationnelles.
		#LOC_KS_SciDef_gravityScan_Simeht_InSpaceHigh = Le capteur de gravité est perturbé par la proximité d'une autre géante de glace de taille similaire, et pointe vers le barycentre du système.

		#LOC_KS_SciDef_magnetometer_Simeht_InSpaceLow = Maintenant que vous êtes plus proche de Simeht, vous pouvez prendre une lecture bien plus précise de son champ magnétique très fort.
		#LOC_KS_SciDef_magnetometer_Simeht_InSpaceHigh = Le bras détecte un champ magnétique fort, mais la proximité de Simetra rend difficile de savoir s'il provient de Simeht seule ou des deux géantes de glace.

		#LOC_KS_SciDef_atmosphereAnalysis_Simeht_FlyingLow = Les pressions extrêmes ont aplati l'analyseur atmosphérique, mais pas avant qu'il ne détecte la présence de fluides supercritiques.
		#LOC_KS_SciDef_atmosphereAnalysis_Simeht_FlyingHigh = La haute atmosphère de Simeht contient des composés non reconnus par l'analyseur atmosphérique.

		// Noira
		#LOC_KS_SciDef_crewReport_Noira_SrfLanded = Le paysage extérieur vous rappelle beaucoup les images des premiers atterrissages sur le Mun. Bien sûr, il y a deux très, très grandes différences dans le ciel.
		#LOC_KS_SciDef_crewReport_Noira_InSpaceLow = Cela semble vieux jeu à ce stade, pour être honnête. Allons-y !
		#LOC_KS_SciDef_crewReport_Noira_InSpaceHigh = Il semble que même ici, dans ce système bizarre, des vues familières existent encore. Noira pourrait presque être confondue avec le Mun !

		#LOC_KS_SciDef_evaReport_Noira_SrfLanded = C'est un petit pas... Quoi ? Trop éculé ?
		#LOC_KS_SciDef_evaReport_Noira_InSpaceLow = La surface cratérisée qui passe en dessous de vous vous rend nostalgique.
		#LOC_KS_SciDef_evaReport_Noira_InSpaceHigh = Hein ? Qu'est-ce que le Mun fait ici ? ...Oh, c'est vrai. C'est physiquement impossible.

		#LOC_KS_SciDef_mysteryGoo_Noira_SrfLanded = Le Mystery Goo, ayant apparemment décidé de camper sur ses positions, est convaincu qu'on a atterri sur un plateau de tournage sur le Mun.
		#LOC_KS_SciDef_mysteryGoo_Noira_InSpaceLow = Le Goo n'est pas sûr de là où il est en ce moment.
		#LOC_KS_SciDef_mysteryGoo_Noira_InSpaceHigh = Le Goo semble penser qu'on lui joue un tour.

		#LOC_KS_SciDef_surfaceSample_Noira_SrfLanded = Des roches basaltiques et de la brèche, hein ? Comme c'est rétro de ta part, Noira.

		#LOC_KS_SciDef_mobileMaterialsLab_Noira_SrfLanded = La baie d'échantillons semble s'être recouverte d'une fine couche de poussière de la surface de Noira. Ça rappelle quelque chose.
		#LOC_KS_SciDef_mobileMaterialsLab_Noira_InSpace = Comme toujours, l'espace près de Noira ne semble pas affecter les matériaux différemment de l'espace ailleurs.

		#LOC_KS_SciDef_temperatureScan_Noira_SrfLanded = La température de surface de Noira est assez glaciale comparée au Mun, ce qui a du sens. Ici, elle reçoit moins de 8 % de la lumière que Kerbin reçoit !
		#LOC_KS_SciDef_temperatureScan_Noira_InSpace = Ça affiche « Lol ». Ou peut-être « 101 »... ?

		#LOC_KS_SciDef_barometerScan_Noira_SrfLanded = C'est peut-être inutile, mais pour être sûr, vous vérifiez le baromètre. C'est un vide poussé, d'accord.
		#LOC_KS_SciDef_barometerScan_Noira_InSpace = Vingt fois huit, ça ferait... six, environ... sept.

		#LOC_KS_SciDef_seismicScan_Noira_SrfLanded = Les fréquents tremblements indiquent que Noira est une lune malmenée par les forces de marée alors que les deux planètes voisines dansent autour.

		#LOC_KS_SciDef_gravityScan_Noira_SrfLanded = Les lectures de gravité de Noira sont réduites périodiquement lorsque les deux mondes jumeaux spiralent au-dessus.
		#LOC_KS_SciDef_gravityScan_Noira_InSpaceLow = La gravité de Noira est assez faible, donc Simetra et Simeht représentent encore une grande partie de la lecture.
		#LOC_KS_SciDef_gravityScan_Noira_InSpaceHigh = À cette altitude, l'attraction de Noira est difficile à distinguer de celle de Simetra et Simeht.
		// Norihc
		#LOC_KS_SciDef_crewReport_Norihc_SrfLanded = Il fait assez froid dehors pour congeler un snowkerb sur place.
		#LOC_KS_SciDef_crewReport_Norihc_Flying = Il n'y a vraiment pas beaucoup d'atmosphère ici. C'est moins du vol, et plus de la chute... avec style !
		#LOC_KS_SciDef_crewReport_Norihc_InSpaceLow = Norihc est assez... COOL ! Hein ? Hein ? Personne ?
		#LOC_KS_SciDef_crewReport_Norihc_InSpaceHigh = On dirait presque une grosse boule de neige. Ou peut-être... un cône de neige ? Mmmm... Saveur azote...

		#LOC_KS_SciDef_evaReport_Norihc_SrfLanded = La surface glacée reflète la faible lumière du soleil comme si elle était en cristal. Ce qui, eh bien, la glace est une sorte de cristal, donc...
		#LOC_KS_SciDef_evaReport_Norihc_Flying = Normalement ce serait une idée horrible, mais la fine atmosphère de Norihc l'a réduite à une simple idée terrible.
		#LOC_KS_SciDef_evaReport_Norihc_InSpaceLow = Ça vous rappelle une version plus brillante d'Eeloo. Les fissures qui sillonnent la surface de Norihc sont assez jolies.
		#LOC_KS_SciDef_evaReport_Norihc_InSpaceHigh = « Alors euh, Centre de Contrôle, rappelez-moi encore... comment on prononce ce nom ? Euh, reçu... »

		#LOC_KS_SciDef_mysteryGoo_Norihc_SrfLanded = Le Goo tremble. Il ne semble pas apprécier le froid.
		#LOC_KS_SciDef_mysteryGoo_Norihc_Flying = Le Goo referme à nouveau sa capsule de force, émettant des gloups de protestation en colère.
		#LOC_KS_SciDef_mysteryGoo_Norihc_InSpaceLow = Le Goo commence à regretter de s'être inscrit au programme spatial.
		#LOC_KS_SciDef_mysteryGoo_Norihc_InSpaceHigh = Vous sondez le Goo pour une réponse, mais il est trop occupé à regarder Simetra et Simeht s'orbitant mutuellement.

		#LOC_KS_SciDef_surfaceSample_Norihc_SrfLanded = Cet échantillon est principalement de la glace d'eau, avec des traces de composés tholin plus sombres et plus rouges.
		#LOC_KS_SciDef_surfaceSample_Norihc_SrfLandedLowlands = Vous trouvez un bel échantillon gris-rougeâtre et le rapportez pour analyse. Apparemment, il est principalement composé de composés tholin recouverts de glace d'eau, matière organique formée par l'exposition de composés carbonés simples au rayonnement solaire. Pas mal.

		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_SrfLanded = Les matériaux réagissent comme prévu aux pressions plus basses, mais peu de réactions chimiques substantielles ne se produisent en dehors de celles-ci 
		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_Flying = Le vent à basse pression fait peu pour disperser les échantillons les plus lâches, mais certains volent quand même grâce à la dépressurisation.
		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_InSpace = Encore ça. Est-ce que ça s'arrêtera un jour ?

		#LOC_KS_SciDef_temperatureScan_Norihc_SrfLanded = Norihc n'est en fait pas tout à fait aussi froid qu'on pourrait s'attendre d'un monde de glace. Il semble que le système Simetra-Simeht reçoive plus de lumière solaire que Jool, donc une lune de glace sera un peu plus chaude.
		#LOC_KS_SciDef_temperatureScan_Norihc_Flying = Zut, ça c'est froid. Peut-être pas autant que les mondes de glace les plus froids, mais quand même sacrément froid.
		#LOC_KS_SciDef_temperatureScan_Norihc_InSpace = Deux choses sont infinies : l'univers et la stupidité Kerbal ; et je ne suis pas sûr pour l'univers.

		#LOC_KS_SciDef_barometerScan_Norihc_SrfLanded = À la surface, la pression est nettement plus élevée. C'est environ un tiers de la pression de Duna cependant, donc c'est encore assez bas.
		#LOC_KS_SciDef_barometerScan_Norihc_Flying = L'instrument met un moment à enregistrer une valeur, à cause de la pression extrêmement basse. Il pensait que vous essayiez de l'utiliser dans l'espace à nouveau.
		#LOC_KS_SciDef_barometerScan_Norihc_InSpace = Le baromètre se met en grève en raison des mauvaises conditions de travail.

		#LOC_KS_SciDef_seismicScan_Norihc_SrfLanded = Le sismomètre enregistre plusieurs microséismes, l'activité atteignant un pic chaque fois qu'une planète passe directement au-dessus.

		#LOC_KS_SciDef_gravityScan_Norihc_SrfLanded = Les lectures de gravité sont quelque peu réduites lorsque Simetra ou Simeht passent au-dessus, suggérant l'effet des forces de marée sur la géologie de Norihc.
		#LOC_KS_SciDef_gravityScan_Norihc_InSpace = La présence de nombreux corps massifs à proximité crée un environnement gravioli assez complexe pour que le détecteur l'étudie.

		#LOC_KS_SciDef_atmosphereAnalysis_Norihc = La fine atmosphère de Norihc consiste principalement en azote, avec des traces de monoxyde de carbone et d'autres gaz.

		// Noyreg
		#LOC_KS_SciDef_crewReport_Noyreg_SrfLanded = Les kerbonautes à bord sont si impatients de quitter le vaisseau et d'explorer le nouveau monde vert devant eux, que le contrôle de mission doit leur rappeler l'atmosphère horriblement toxique et la pression extrême. À contrecœur, ils mettent leur casque.
		#LOC_KS_SciDef_crewReport_Noyreg_FlyingLow = Le vaisseau est ballotté par des vents extrêmes, qui menacent de le dévier de sa trajectoire vers une falaise voisine.
		#LOC_KS_SciDef_crewReport_Noyreg_FlyingHigh = Une substance jaunâtre mystérieuse se condense sur les vitres, rappelant à l'équipage à quel point Noyreg est inhospitalière, malgré sa couleur accueillante.
		#LOC_KS_SciDef_crewReport_Noyreg_InSpaceLow = « On peut atterrir ici ? » Le kerbonaute semble ignorer béatement la nature toxique de la lune en dessous, ce qui pousse le Centre de Contrôle à le lui rappeler gentiment.
		#LOC_KS_SciDef_crewReport_Noyreg_InSpaceHigh = Une planète verte avec une vraie surface ? Avons-nous enfin trouvé notre nouvelle maison ? Oh, 4,5 atmosphères de pression hein ? Ouais... Peut-être pas.

		#LOC_KS_SciDef_temperatureScan_Noyreg_SrfLanded = Les températures varient considérablement sur la lune, allant d'assez froid pour geler l'eau à assez chaud pour la faire bouillir, selon les conditions météorologiques.
		#LOC_KS_SciDef_temperatureScan_Noyreg_SrfLandedIceCaps = Les calottes glaciaires sont épargnées par la plupart des tumultes de Noyreg, connaissant des températures constamment glaciales et des vitesses de vent comparativement calmes.
		#LOC_KS_SciDef_temperatureScan_Noyreg_FlyingLow = La turbulente basse atmosphère de Noyreg contient des fronts en guerre d'atmosphère chaude et froide, se percutant à haute vitesse et provoquant des vents extrêmes malgré la composition très dense.
		#LOC_KS_SciDef_temperatureScan_Noyreg_FlyingHigh = À de telles altitudes, les températures très contrastées s'équilibrent et Noyreg devient presque paisible.
		#LOC_KS_SciDef_temperatureScan_Noyreg_InSpace = Connaissez-vous la définition de la folie ?

		#LOC_KS_SciDef_evaReport_Noyreg_SrfLanded = Oh, c'est beaucoup plus... orange que prévu. Quelle composition intéressante pourrait être responsable de ça ? De l'oxyde de fer, peut-être ? Ou quelque chose de plus exotique ?
		#LOC_KS_SciDef_evaReport_Noyreg_FlyingLow = Oh oh. Ça ne va pas bien se terminer.
		#LOC_KS_SciDef_evaReport_Noyreg_FlyingHigh = C'EST LE MEILLEUR PLAN QUI SOIT.
		#LOC_KS_SciDef_evaReport_Noyreg_InSpaceLow = Ce ne peut sûrement pas être -si- mauvais là-bas, non ? Je veux dire, c'est vert !
		#LOC_KS_SciDef_evaReport_Noyreg_InSpaceHigh = Ça vous rappelle Jool, mais beaucoup plus petit et probablement - espérons-le - moins meurtrier.

		#LOC_KS_SciDef_mysteryGoo_Noyreg_SrfLanded = Le Mystery Goo ne semble pas dérangé par l'atmosphère toxique ou les températures extrêmes. Il ne semble se soucier que du vent.
		#LOC_KS_SciDef_mysteryGoo_Noyreg_Flying = Le Goo apprécie plutôt la couleur de Noyreg, mais préférerait vraiment ne pas être exposé au mauvais temps.
		#LOC_KS_SciDef_mysteryGoo_Noyreg_InSpace = Le Goo « regarde » hors de son conteneur la lune en dessous avec intérêt.

		#LOC_KS_SciDef_surfaceSample_Noyreg_SrfLanded = La surface orange friable de Noyreg semble être extrêmement riche en composés organiques. Genre... VRAIMENT super riche. Elle manque à la fois de silicates et de métaux, ce qui suggère que Noyreg pourrait être composé principalement de carbone ! Wow, c'est bizarre !
		#LOC_KS_SciDef_surfaceSample_Noyreg_SrfLandedIceCaps = Cette substance semble être des hydrocarbures à longue chaîne gelés, plutôt que de la glace d'eau.

		#LOC_KS_SciDef_mobileMaterialsLab_SrfLanded = Un échantillon d'eau commence à former de la chlorite, indiquant la présence de beaucoup de dioxyde de chlore dans l'atmosphère. 
		#LOC_KS_SciDef_mobileMaterialsLab_Flying = Les vents forts dispersent les échantillons, en éclaboussant certains sur les parois du conteneur.
		#LOC_KS_SciDef_mobileMaterialsLab_InSpace = Soupir... Quand apprendrez-vous ?

		#LOC_KS_SciDef_barometerScan_Noyreg_SrfLanded = La pression indique environ 4,5 atmosphères. C'est beaucoup, mais la grande distance de Noyreg par rapport à Sunorc l'empêche de devenir trop chaud malgré tout.
		#LOC_KS_SciDef_barometerScan_Noyreg_FlyingLow = La lecture de pression monte soudainement en flèche lorsqu'une puissante rafale frappe le capteur.
		#LOC_KS_SciDef_barometerScan_Noyreg_FlyingHigh = La pression est un peu plus élevée dans la haute atmosphère en raison des températures plus basses.
		#LOC_KS_SciDef_barometerScan_Noyreg_InSpace = Encore une fois. Cet instrument. N'est pas. Assez précis. Pour détecter. Les exosphères ! Pour l'amour du Kraken, les gars !

		#LOC_KS_SciDef_seismicScan_Noyreg_SrfLanded = Les forces de marée des deux mondes massifs orbitant à proximité ont un effet notable sur la croûte de Noyreg, provoquant une activité sismique correspondant aux approches rapprochées des deux planètes.

		#LOC_KS_SciDef_gravityScan_Noyreg_SrfLanded = La lecture augmente légèrement chaque fois que Simetra ou Simeht passent au-dessus, montrant que Noyreg subit beaucoup de forces de marée.
		#LOC_KS_SciDef_gravityScan_Noyreg_InSpace = Les lectures de gravité fluctuent selon les formations de surface en dessous ; qui sont malheureusement masquées par l'épaisse couverture nuageuse.

		#LOC_KS_SciDef_magnetometer_Noyreg_InSpace = Les lectures du magnétomètre ont révélé des motifs et fluctuations complexes, suggérant la présence d'anomalies magnétiques et de phénomènes géologiques sous-jacents. Noyreg, avec son atmosphère traîtresse et ses mystères captivants, se dressait comme un témoignage des merveilles impressionnantes du cosmos.

		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_SrfLanded = L'atmosphère de Noyreg est composée principalement de dioxyde de carbone, avec des quantités mineures d'azote, de dioxyde de chlore et des traces d'autres gaz (souvent horriblement toxiques). Il n'est pas encore clair si le dioxyde de chlore est responsable de la couleur verte de l'atmosphère, ou s'il y a un effet de réfraction unique à l'œuvre. Peut-être un peu de colonne A, un peu de colonne B ?
		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_FlyingLow = L'analyse montre que l'atmosphère de dioxyde de carbone de Noyreg s'épaissit considérablement à ces altitudes, et c'est là que se trouvent les gaz plus lourds comme le dioxyde de chlore.
		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_FlyingHigh = L'azote et des traces d'autres gaz se trouvent à haute altitude au-dessus de Noyreg, mais l'écrasante majorité est du dioxyde de carbone.

		// Noi
		#LOC_KS_SciDef_crewReport_Noi_SrfLanded = Attendez, un instant. On a atterri ? Il fait encore tout noir dehors !
		#LOC_KS_SciDef_crewReport_Noi_InSpaceLow = Nnnnnope. Je ne le vois pas.
		#LOC_KS_SciDef_crewReport_Noi_InSpaceHigh = L'équipage découvre que, si on plisse les yeux, on peut à peine distinguer un astéroïde flottant à proximité.

		#LOC_KS_SciDef_evaReport_Noi_SrfLanded = Pour une raison quelconque, vous nourrissez une aversion intense pour les roches furtives.
		#LOC_KS_SciDef_evaReport_Noi_InSpaceLow = C'est une bonne chose que cette roche furtive ne soit nulle part près de notre maison. Si elle était sur une trajectoire de collision, nous ne la verrions jamais venir !
		#LOC_KS_SciDef_evaReport_Noi_InSpaceHigh = En regardant Noi, vous vous émerveillez de la beauté simple de sa surface criblée de cratères. Le Centre de Contrôle vous informe aimablement que vous ne regardez pas réellement Noi, et vous vous sentez soudainement très penaud.

		#LOC_KS_SciDef_mysteryGoo_Noi_SrfLanded = Le Goo est surpris d'apprendre qu'on est en fait à la surface de quelque chose, et doit regarder hors du conteneur pendant quelques bonnes secondes pour s'en assurer.
		#LOC_KS_SciDef_mysteryGoo_Noi_InSpaceLow = Le Goo est brièvement terrifié à l'idée qu'on ait soudainement été téléporté juste à côté de Kcalbeloh, car il voit un énorme vide noir couvrant le ciel. Il faut un moment pour le calmer et le rassurer que c'est juste Noi.
		#LOC_KS_SciDef_mysteryGoo_Noi_InSpaceHigh = Le Goo mystérieux est incapable de voir l'astéroïde voisin. Il pourrait avoir besoin d'aide pour le repérer.

		#LOC_KS_SciDef_surfaceSample_Noi_SrfLanded = Vous ramassez un morceau de roche particulièrement noirci, et décidez que ce serait un excellent cadeau de Khristmas pour le membre de votre famille que vous aimez le moins.

		#LOC_KS_SciDef_mobileMaterialsLab_Noi_SrfLanded = Il devient de plus en plus évident que ces échantillons réagissent de la même manière dans le vide, qu'ils soient à la surface de quelque chose ou non.
		#LOC_KS_SciDef_mobileMaterialsLab_Noi_InSpace = Les matériaux réagissent à peu près de la même manière qu'en espace interplanétaire.

		#LOC_KS_SciDef_temperatureScan_Noi_SrfLanded = Les scans de la surface de Noi révèlent qu'il fait sacrément froid.
		#LOC_KS_SciDef_temperatureScan_Noi_InSpace = Peut-être qu'un de ces jours, vous vérifierez la température dans l'espace et ça vous donnera des données. Jusque-là, vous continuerez à vous cogner la tête contre ce mur.

		#LOC_KS_SciDef_barometerScan_Noi_SrfLanded = Le baromètre est surtout confus sur pourquoi vous prendriez la peine de le vérifier.
		#LOC_KS_SciDef_barometerScan_Noi_InSpace = Ouais. Pas de pression... Vous êtes surpris ? Quelqu'un l'est ?

		#LOC_KS_SciDef_seismicScan_Noi_SrfLanded = Silence total. Il semble que Noi soit trop petit pour recevoir des impacts réguliers.

		#LOC_KS_SciDef_gravityScan_Noi_SrfLanded = La gravité de Noi est marginalement plus forte en surface qu'en orbite, mais c'est encore pratiquement rien. Sauter en EVA ici serait une terrible idée.
		#LOC_KS_SciDef_gravityScan_Noi_InSpace = Le moniteur de gravité est endormi et doit être réveillé pour prendre une lecture. La vitesse orbitale ici est vraiment basse, et la gravité fluctue énormément de presque rien à pratiquement rien selon la partie de Noi qui est en dessous.

		// Aralc System
		#LOC_KS_SciDef_crewReport_AralcSystem_InSpaceHigh = Vous réfléchissez à l'origine de ce système. Comment exactement deux étoiles sont-elles venues si proches l'une de l'autre ?
		#LOC_KS_SciDef_magnetometer_AralcSystem_InSpaceHigh = L'instrument détecte de puissants champs magnétiques stellaires, mais il est probable que cette lecture soit dominée par le bien plus grand Aralc-A. 
		#LOC_KS_SciDef_gravityScan_AralcSystem_InSpaceHigh = Malgré les deux corps massifs au centre de ce système, le capteur affiche une valeur presque constante.

		// Aralc-A
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceLow = La luminosité pure d'Aralc-A vous fait regretter de ne pas avoir apporté des couvre-fenêtres. Ce qui ne changerait rien à la chaleur, cependant.
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceHigh1 = C'est certainement une grosse étoile brillante. 
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceHigh2 = L'intérieur de la capsule serait un four s'il n'y avait pas les radiateurs... attendez, vous vous êtes souvenu d'apporter des panneaux radiateurs, n'est-ce pas ?

		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceLow1 = Le thermomètre a partiellement fondu.
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceLow2 = Aviez-vous vraiment besoin d'un thermomètre pour voir à quel point il faisait chaud ici ?
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceHigh1 = Le thermomètre atteint son maximum en raison de la proximité de cette étoile massive. 
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpacehigh2 = Le thermomètre a partiellement fondu.

		#LOC_KS_SciDef_evaReport_AralcA_InSpaceLow = Pourquoi avez-vous pensé que faire une EVA si près d'une étoile aussi massive était une bonne idée ? Pourquoi ?
		#LOC_KS_SciDef_evaReport_AralcA_InSpaceHigh = Vous êtes presque aveuglé par la lumière intense de l'étoile massive.

		#LOC_KS_SciDef_mysteryGoo_AralcA_InSpaceLow = L'unité de confinement du Goo brille de chaleur et la dilatation thermique a fait bloquer le couvercle. Il ne serait pas déraisonnable de supposer que le Goo a été bien rôti.

		#LOC_KS_SciDef_mobileMaterialsLab_AralcA_InSpaceLow = L'intérieur du laboratoire mobile de matériaux a partiellement fondu.
		#LOC_KS_SciDef_mobileMaterialsLab_AralcA_InSpaceHigh = Les échantillons commencent à briller à cause de la chaleur immense, et certains montrent des signes de dégradation.

		#LOC_KS_SciDef_barometerScan_AralcA_InSpaceLow = Les températures extrêmes font fissurer le verre du baromètre.

		#LOC_KS_SciDef_gravityScan_AralcA_InSpaceLow = La masse pure de l'étoile et votre proximité avec elle submergent presque l'instrument.
		#LOC_KS_SciDef_gravityScan_AralcA_InSpaceHigh = L'instrument indique une attraction gravitationnelle très forte. 

		#LOC_KS_SciDef_magnetometer_AralcA_InSpaceLow = Nous ne savons pas exactement à quel point les champs magnétiques d'Aralc-A sont puissants, mais nous savons qu'ils étaient assez puissants pour griller l'instrument.
		#LOC_KS_SciDef_magnetometer_AralcA_InSpaceHigh = L'instrument indique des champs magnétiques forts, mais les lectures ne sont pas fiables. 

		//Anneheg
		#LOC_KS_SciDef_crewReport_Anneheg_SrfLanded = L'intérieur de la capsule devient très très chaud. Vous pourriez faire cuire un snack sur le panneau de contrôle.
		#LOC_KS_SciDef_crewReport_Anneheg_SrfSplashed1 = C'est un miracle que le vaisseau ne soit pas devenu un avec la lave. Pas encore.
		#LOC_KS_SciDef_crewReport_Anneheg_SrfSplashed2 = Pour l'amour du Kraken, pourquoi avez-vous pensé qu'amerrir dans la lave était une bonne idée ?
		#LOC_KS_SciDef_crewReport_Anneheg_InSpaceLow = Il fait de plus en plus chaud ici. Avez-vous pensé à emporter assez de radiateurs ?
		#LOC_KS_SciDef_crewReport_Anneheg_InSpaceHigh = Il commence à faire chaud ici.

		#LOC_KS_SciDef_temperatureScan_Anneheg_SrfLanded = Les lectures du thermomètre dépassent l'échelle. La coloration du thermomètre s'est également considérablement estompée. 
		#LOC_KS_SciDef_temperatureScan_Anneheg_SrfSplashed1 = Le thermomètre atteint instantanément son maximum avant de fondre et de ne faire qu'un avec la lave.
		#LOC_KS_SciDef_temperatureScan_Anneheg_SrfSplashed2 = C'est un crime contre les thermomètres et vous le savez. Malheureusement, il est trop tard pour rectifier vos actes, car le thermomètre ne fait plus qu'un avec la lave.
		#LOC_KS_SciDef_temperatureScan_Anneheg_SrfSplashed3 = Alors que l'instrument fond, vous réalisez très vite qu'apporter le thermomètre était inutile.
		#LOC_KS_SciDef_temperatureScan_Anneheg_InSpaceLow = Le thermomètre approche de la valeur maximale qu'il peut mesurer.
		#LOC_KS_SciDef_temperatureScan_Anneheg_InSpaceHigh = Le thermomètre commence à monter.

		#LOC_KS_SciDef_evaReport_Anneheg_SrfLanded1 = Alors que le système de refroidissement de votre combinaison peine à suivre la chaleur, vous notez les étranges piliers et tours qui parsèment la surface.
		#LOC_KS_SciDef_evaReport_Anneheg_SrfLanded2 = Vous pourriez facilement faire frire un snack à la surface de cette planète. Je ne dis pas que vous devriez. Je dis juste que vous pourriez.
		#LOC_KS_SciDef_evaReport_Anneheg_SrfLanded_Lava = Je ne vais même pas remettre en question pourquoi vous pensez que c'est une bonne idée.
		#LOC_KS_SciDef_evaReport_Anneheg_SrfSplashed1 = SORTEZ ! DE ! LA ! LAVE !
		#LOC_KS_SciDef_evaReport_Anneheg_SrfSplashed2 = Quel Kraken vous a possédé pour vous faire penser qu'aller nager dans la lave était une bonne idée ?
		#LOC_KS_SciDef_evaReport_Anneheg_InSpaceLow = Il fait TRÈS chaud ici. Vous feriez mieux de rentrer.
		#LOC_KS_SciDef_evaReport_Anneheg_InSpaceHigh = Vous êtes presque aveuglé par la lumière intense provenant d'Aralc-A.

		#LOC_KS_SciDef_mysteryGoo_Anneheg_SrfLanded = Le Goo a été bien rôti. L'intérieur de l'unité de confinement brille également en rouge.
		#LOC_KS_SciDef_mysteryGoo_Anneheg_SrfSplashed1 = Le Goo se vaporise instantanément à cause de la chaleur immense. 
		#LOC_KS_SciDef_mysteryGoo_Anneheg_SrfSplashed2 = Le Goo accepte son destin de ne faire qu'un avec la lave.
		#LOC_KS_SciDef_mysteryGoo_Anneheg_InSpaceLow = Le Goo montre des signes de dommages thermiques étendus.
		#LOC_KS_SciDef_mysteryGoo_Anneheg_InSpaceHigh = Le Goo affiche des signes de dommages thermiques.

		#LOC_KS_SciDef_Anneheg_surfaceSample_SrfLanded = La surface d'Anneheg semble être un mélange de verre volcanique et de métaux lourds résistants à la chaleur.
		#LOC_KS_SciDef_surfaceSample_Anneheg_SrfLanded_Lava = Votre gant commence à fondre alors que vous tentez de prélever un échantillon de lave.
		#LOC_KS_SciDef_surfaceSample_Anneheg_SrfSplashed = Alors que votre combinaison commence à fondre, vous réalisez très vite que prélever un échantillon de lave littérale n'est probablement pas la meilleure idée.

		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_SrfLanded = L'intérieur de la baie de matériaux a subi une fusion partielle. 
		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_SrfSplashed1 = La baie de matériaux a fondu et s'est transformée en un désordre méconnaissable. Le KSC ne sera pas content de ce que vous avez fait à ce truc.
		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_SrfSplashed2 = Pourquoi regardez-vous même ici ? IL. N'Y. A. PLUS. RIEN. À. ÉTUDIER.
		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_InSpaceLow = Plusieurs échantillons se sont dégradés à cause de la chaleur intense. L'unité elle-même affiche aussi des signes de dommages liés à la chaleur.
		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_InSpaceHigh = Les échantillons brillent de chaleur.

		#LOC_KS_SciDef_barometerScan_Anneheg_SrfLanded = Malgré l'absence d'atmosphère de la planète, les lectures du baromètre ont dépassé l'échelle à cause de la chaleur immense.
		#LOC_KS_SciDef_barometerScan_Anneheg_SrfSplashed1 = Malgré le fait de ne pas être exposé à l'air, la garantie de cet appareil a été annulée à cause de votre imprudence.
		#LOC_KS_SciDef_barometerScan_Anneheg_SrfSplashed2 = Le verre du baromètre s'est brisé à cause de la chaleur immense.

		#LOC_KS_SciDef_seismicScan_Anneheg_SrfLanded = L'accéléromètre a grillé à cause de la chaleur et n'est plus fonctionnel.

		#LOC_KS_SciDef_gravityScan_Anneheg_SrfLanded = Alors que le capteur de gravité chauffe, il court-circuite et ses lectures dépassent l'échelle.
		#LOC_KS_SciDef_gravityScan_Anneheg_InSpaceLow = Vous pouvez obtenir une lecture plus précise des forces gravitationnelles en vous rapprochant de la planète, bien que la chaleur intense rende les lectures peu fiables.
		#LOC_KS_SciDef_gravityScan_Anneheg_InSpaceHigh = Les forces de marée d'Aralc-A à proximité faussent les lectures du capteur de gravité.

		#LOC_KS_SciDef_magnetometer_Anneheg_InSpaceLow = Juste avant que le bras ne grille, vous avez pu prendre une brève mesure du faible champ magnétique d'Anneheg, bien que savoir si cette lecture n'est que du bruit d'Aralc-A soit une question de conjecture.
		#LOC_KS_SciDef_magnetometer_Anneheg_InSpaceHigh = L'intense radiation d'Aralc-A a grillé le bras du magnétomètre.


		// Aralc-B
		#LOC_KS_SciDef_crewReport_AralcB_InSpaceLow = La lumière d'Aralc-B n'est pas aussi aveuglante que celle de son compagnon bien plus grand, mais il serait tout de même imprudent de la regarder directement.
		#LOC_KS_SciDef_crewReport_AralcB_InSpaceHigh = Il commence à faire chaud ici, mais ce n'est pas aussi mauvais que nous l'avions anticipé.

		#LOC_KS_SciDef_temperatureScan_AralcB_InSpaceLow = Le thermomètre a atteint sa limite. S'approcher autant d'une étoile, même relativement petite, est imprudent.

		#LOC_KS_SciDef_evaReport_AralcB_InSpaceLow = Vous êtes presque aveuglé par la lumière intense d'être si proche d'une étoile.

		#LOC_KS_SciDef_mysteryGoo_AralcB_InSpaceLow = L'unité de confinement du Goo est brûlante au toucher. Un coup d'œil à l'intérieur révèle que le Goo est en train de griller.

		#LOC_KS_SciDef_mobileMaterialsLab_AralcB_InSpaceLow = Les échantillons commencent à briller à cause de la chaleur immense, et certains montrent des signes de dégradation.
		#LOC_KS_SciDef_mobileMaterialsLab_AralcB_InSpaceHigh = Les échantillons sont chauds au toucher. Ils sont toutefois encore intacts.

		#LOC_KS_SciDef_magnetometer_AralcB_InSpaceLow = Être proche d'Aralc-B vous permet de prendre une lecture beaucoup plus précise de ses champs magnétiques. Ils sont assez forts, mais c'est attendu d'une étoile de la séquence principale.
		#LOC_KS_SciDef_magnetometer_AralcB_InSpaceHigh = L'instrument détecte un champ magnétique très fort, mais cela pourrait être dû à l'influence d'Aralc-A à proximité.

		// Arorua
		#LOC_KS_SciDef_crewReport_Arorua_SrfLanded = Wow, il fait chaud ici. On pourrait faire cuire un snack sur le panneau de contrôle !
		#LOC_KS_SciDef_crewReport_Arorua_Flying = Vous admirez la beauté accidentée de la surface d'Arorua, en ignorant les avertissements de température stridents dans votre vaisseau.
		#LOC_KS_SciDef_crewReport_Arorua_InSpaceLow = Vos yeux sont attirés par la belle aurore qui enveloppe presque toute la planète.
		#LOC_KS_SciDef_crewReport_Arorua_InSpaceHigh = Vous êtes presque aveuglé par la lumière des deux étoiles Aralc, mais vous parvenez à distinguer le grand rocher sphérique qu'est Arorua. 

		#LOC_KS_SciDef_temperatureScan_Arorua_SrfLanded = Les températures de surface oscillent entre torride et *mortel* selon la position d'Aralc-A dans le ciel.
		#LOC_KS_SciDef_temperatureScan_Arorua_SrfLanded_Substellar = Le thermomètre vous lance un regard mortel et s'éteint.
		#LOC_KS_SciDef_temperatureScan_Arorua_FlyingLow = Les lectures de température dans la basse atmosphère vous font tomber la mâchoire. Il fait C H A U D ici !
		#LOC_KS_SciDef_temperatureScan_Arorua_FlyingHigh = Même effleurer la haute atmosphère fait monter le thermomètre en flèche.
		#LOC_KS_SciDef_temperatureScan_Arorua_InSpace = Le simple fait d'exister si près du centre du système Aralc fait que les lectures de température commencent à grimper.

		#LOC_KS_SciDef_evaReport_Arorua_SrfLanded = Il fait C H A U D ici ! Pourquoi avons-nous choisi d'atterrir ici ?
		#LOC_KS_SciDef_evaReport_Arorua_SrfLanded_Substellar = CHAUD ! CHAUD ! IL FAUT SI CHAUD ICI ! LAISSEZ-MOI RENTRER !
		#LOC_KS_SciDef_evaReport_Arorua_Flying = Vous êtes vraiment fou de penser que sortir maintenant est une bonne idée !
		#LOC_KS_SciDef_evaReport_Arorua_InSpaceLow = C'est si beau. Si seulement ce n'était pas si proche d'une étoile.
		#LOC_KS_SciDef_evaReport_Arorua_InSpaceHigh = Votre attention est attirée par la longue queue qui s'échappe d'Arorua.

		#LOC_KS_SciDef_mysteryGoo_Arorua_SrfLanded = Vous parvenez à forcer l'ouverture du couvercle du conteneur de Goo. Le conteneur est plein de suie et de cendres, le Goo est introuvable.
		#LOC_KS_SciDef_mysteryGoo_Arorua_FlyingLow = La dilatation thermique a fait que le couvercle du conteneur de Goo s'est coincé en position fermée. Quoi qu'il en soit, le Goo est en train de griller.
		#LOC_KS_SciDef_mysteryGoo_Arorua_FlyingHigh = Le Goo rebondit dans son conteneur dans une frénésie paniquée.
		#LOC_KS_SciDef_mysteryGoo_Arorua_InSpace = Le conteneur de Goo chauffe. Le Goo ne semble pas très à l'aise dedans.

		#LOC_KS_SciDef_surfaceSample_Arorua_SrfLanded = Vous prenez un échantillon de la surface d'Arorua. Vous pouvez sentir la chaleur de l'échantillon même à travers votre gant fortement isolé.

		#LOC_KS_SciDef_mobileMaterialsLab_Arorua_SrfLanded = Exposer les échantillons à l'atmosphère d'Arorua était une erreur. Au moins un des échantillons semble avoir *détoné* dans la baie de matériaux, transformant l'intérieur de l'unité en un désordre de métal et de fils carbonisés.
		#LOC_KS_SciDef_mobileMaterialsLab_Arorua_Flying = Les échantillons ont commencé à s'enflammer spontanément après avoir réagi avec ce qui se trouve dans l'atmosphère d'Arorua.
		#LOC_KS_SciDef_mobileMaterialsLab_Arorua_InSpace = Les échantillons montrent des signes de dégradation à cause de la chaleur d'Aralc-B.

		#LOC_KS_SciDef_barometerScan_Arorua_SrfLanded = Le verre du baromètre s'est fissuré à cause de la chaleur, rendant l'appareil inopérant et annulant sa garantie. 
		#LOC_KS_SciDef_barometerScan_Arorua_FlyingLow = Le baromètre affiche bizarrement une pression *négative* à cause de la surchauffe.
		#LOC_KS_SciDef_barometerScan_Arorua_FlyingHigh = Même à cette altitude, les lectures du baromètre commencent à monter en flèche, bien que les lectures inexactes précédentes nous amènent à remettre en question l'exactitude de ces pics. 
		#LOC_KS_SciDef_barometerScan_Arorua_InSpace = Le baromètre commence à donner des lectures inexactes à cause de la chaleur d'Aralc-B

		#LOC_KS_SciDef_seismicScan_Arorua_SrfLanded = Le capteur sismique s'éteint automatiquement à cause de la chaleur. Vous feriez mieux de rentrer ce truc.

		#LOC_KS_SciDef_gravityScan_Arorua_SrfLanded = Les lectures du capteur de gravité deviennent inexactes à cause de la chaleur.
		#LOC_KS_SciDef_gravityScan_Arorua_InSpace = Le capteur de gravité détecte de petites variations dans la gravité locale d'Arorua alors qu'il tourne autour de la planète et qu'Arorua orbite autour d'Aralc-B.

		#LOC_KS_SciDef_magnetometer_Arorua_InSpace = Le magnétomètre détecte de grandes quantités de particules chargées provenant d'Aralc-B, érodant l'atmosphère d'Arorua.

		#LOC_KS_SciDef_atmosphereAnalysis_Arorua_SrfLanded = L'analyseur atmosphérique surchauffe et s'éteint.
		#LOC_KS_SciDef_atmosphereAnalysis_Arorua_FlyingLow = L'analyseur atmosphérique peut prendre des lectures plus précises dans la basse atmosphère. L'atmosphère est épaisse et composée de composés exotiques, probablement un produit d'être constamment cuite par deux soleils.
		#LOC_KS_SciDef_atmosphereAnalysis_Arorua_FlyingHigh = L'analyseur atmosphérique crache des lectures aberrantes à cause du flux constant de particules chargées provenant d'Aralc-B.

		// Ahtpan
		#LOC_KS_SciDef_crewReport_Ahtpan_SrfLanded1 = L'intérieur du vaisseau sent la naphtaline. Qui a laissé le sas ouvert trop longtemps ?
		#LOC_KS_SciDef_crewReport_Ahtpan_SrfLanded2 = Vous voyez des tempêtes de poussière à l'horizon. Au moins nous sommes en sécurité dans ce vaisseau.
		#LOC_KS_SciDef_crewReport_Ahtpan_SrfSplashed = Le vaisseau est maintenant couvert de ce qui est essentiellement du kérosène. Ce serait beaucoup plus inquiétant s'il y avait de l'oxygène dans l'atmosphère.
		#LOC_KS_SciDef_crewReport_Ahtpan_FlyingLow = Il semble vraiment assez poussiéreux ici. 
		#LOC_KS_SciDef_crewReport_Ahtpan_FlyingLow_NaphthanOceans = Vous vous réconfortez à l'idée que si vous manquez de carburant, vous pouvez au moins atterrir dans un véritable océan de carburant.
		#LOC_KS_SciDef_crewReport_Ahtpan_InSpace = La planète en dessous semble très désertique. 

		#LOC_KS_SciDef_temperatureScan_Ahtpan_SrfLanded = Il fait chaud ici, mais ce n'est rien qu'on ne puisse gérer. 
		#LOC_KS_SciDef_temperatureScan_Ahtpan_SrfLanded_Islands = Les températures de surface sont au-dessus du point d'éclair du kérosène. En raison des fortes concentrations d'hydrocarbures dans l'air, vérifiez votre vaisseau pour vous assurer qu'il n'y a pas de fuites d'oxydant, car cela pourrait présenter un risque d'incendie massif. 
		#LOC_KS_SciDef_temperatureScan_Ahtpan_SrfLanded_Coast = Les températures de surface sont au-dessus du point d'éclair du kérosène. En raison des fortes concentrations d'hydrocarbures dans l'air, vérifiez votre vaisseau pour vous assurer qu'il n'y a pas de fuites d'oxydant, car cela pourrait présenter un risque d'incendie massif. 
		#LOC_KS_SciDef_temperatureScan_Ahtpan_SrfSplashed = L'huile rend la lecture du thermomètre difficile. 
		#LOC_KS_SciDef_temperatureScan_Ahtpan_FlyingLow = Il commence à faire assez chaud dehors. 
		#LOC_KS_SciDef_temperatureScan_Ahtpan_FlyingHigh = Même à cette altitude, il commence déjà à faire un peu chaud.
		#LOC_KS_SciDef_temperatureScan_Ahtpan_InSpace = La proximité de la planète avec les deux étoiles la rend plutôt torride même dans l'espace. 

		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded = Vous voyez une tempête de poussière approcher. Ce serait une bonne idée de rentrer.
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded_Islands = Ce serait un endroit idéal pour installer une plateforme pétroli- Pardon, que disiez-vous ?
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded_Coast = Ce serait un endroit idéal pour installer une plateforme pétroli- Pardon, que disiez-vous ?
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded_NaphthanOceans1 = Je ne recommanderais pas d'essayer de nager là-dedans. 
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded_NaphthanOceans2 = Vous êtes rempli d'excitation à l'idée d'un océan d'or noir... puis il vous vient à l'esprit qu'il faut en fait ramener ce truc à la maison pour en tirer un quelconque profit.
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfSplashed = Vous avez du mal à nager dans l'huile épaisse qui compose les océans d'Ahtpan.
		#LOC_KS_SciDef_evaReport_Ahtpan_Flying = Hé, je crois voir une tempête de poussière au loin !
		#LOC_KS_SciDef_evaReport_Ahtpan_InSpace = Vous prenez un moment pour admirer les paysages en dessous, et les deux soleils au loin.
		#LOC_KS_SciDef_evaReport_Ahtpan_InSpaceLow_NaphthanOceans = Hé, vous pensez que c'est du pétrole en dessous de nous ?

		#LOC_KS_SciDef_mysteryGoo_Ahtpan_SrfLanded = Le Goo semble se nourrir des hydrocarbures dans l'air.
		#LOC_KS_SciDef_mysteryGoo_Ahtpan_SrfSplashed = Le Goo a été recouvert de noir par l'océan de pétrole.
		#LOC_KS_SciDef_mysteryGoo_Ahtpan_InSpaceLow = On dirait que le Goo veut atterrir ici pour rendre visite à sa famille.
		#LOC_KS_SciDef_mysteryGoo_Ahtpan_InSpaceHigh = Le Goo semble ressentir une sorte de parenté avec l'océan organique.

		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfLanded = Le sol est assez sableux. Très évocateur des déserts de Kerbin.
		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfLanded_Coast = L'échantillon de surface contient des traces d'une substance semblable au kérosène.  
		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfLanded_NaphthanOceans1 = Votre gant est maintenant couvert d'une substance semblable au kérosène. On dirait que ça pourrait faire une bonne source de carburant.
		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfLanded_NaphthanOceans2 = Il semblerait que les océans d'Ahtpan soient faits d'or noi- pardon, de pétrole. 
		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfSplashed = Votre combinaison est recouverte de la substance semblable au kérosène qui compose les océans d'Ahtpan. Ça va prendre du temps à nettoyer.

		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_SrfLanded = Les échantillons réagissent avec les vapeurs d'hydrocarbures dans l'air. 
		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_SrfLanded_Coast = Certains échantillons semblent s'être enflammés spontanément après avoir réagi avec les fortes concentrations de vapeurs d'hydrocarbures dans l'atmosphère.
		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_SrfSplashed = L'intérieur du Science Jr. est maintenant couvert d'huile. Je ne recommanderais pas d'essayer de nettoyer l'unité en brûlant l'huile.
		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_FlyingLow = Les échantillons réagissent avec les vapeurs d'hydrocarbures dans l'air. 
		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_InSpace = Malgré l'intérêt évident de cette planète, les matériaux ne réagissent pas à la situation.

		#LOC_KS_SciDef_barometerScan_Ahtpan_SrfSplashed = L'huile obstrue les orifices du baromètre, le rendant inutile.
		#LOC_KS_SciDef_barometerScan_Ahtpan_SrfLanded = Le baromètre enregistre une pression atmosphérique nettement plus élevée que sur Duna, mais significativement plus basse que sur Kerbin. Le vol motorisé pourrait être difficile.
		#LOC_KS_SciDef_barometerScan_Ahtpan_Flying = Le baromètre se bouche lentement à cause des hydrocarbures dans l'air.
		#LOC_KS_SciDef_barometerScan_Ahtpan_InSpace = L'instrument, en acte de défi, décide d'insister que la pression est actuellement de 999999999 kPa.

		#LOC_KS_SciDef_seismicScan_Ahtpan_SrfLanded = Des grondements profonds et lointains sont captés par le sismographe. On dirait que l'intérieur d'Ahtpan bouge encore !

		#LOC_KS_SciDef_gravityScan_Ahtpan_SrfLanded = La gravité sur Ahtpan est du côté faible ; c'est environ la moyenne pour une planète tellurique.
		#LOC_KS_SciDef_gravityScan_Ahtpan_InSpaceLow = Les lectures fluctuent un peu lorsque le capteur passe au-dessus des différentes formations de surface, mais c'est difficile de se concentrer là-dessus quand vous rêvassez à tout l'argent que vous allez gagner avec ces océans de pétrole !
		#LOC_KS_SciDef_gravityScan_Ahtpan_InSpaceLow_NaphthanOceans = Les lectures du capteur semblent changer légèrement à mesure que nous passons au-dessus des océans en dessous.
		#LOC_KS_SciDef_gravityScan_Ahtpan_InSpaceHigh = Les lectures du capteur de gravité suggèrent une planète de taille moyenne en dessous.

		#LOC_KS_SciDef_magnetometer_Ahtpan_InSpaceLow = Le bras détecte un champ magnétique modérément fort, probablement suffisant pour utiliser une boussole avec une certaine fiabilité. Il est possible que ce soit ce qui permet à l'atmosphère d'exister sans être érodée par les vents stellaires des deux étoiles.
		#LOC_KS_SciDef_magnetometer_Ahtpan_InSpaceHigh = Le bras détecte un champ magnétique, mais il est difficile de dire s'il provient de la planète en dessous ou juste du bruit des deux étoiles.

		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_SrfLanded = L'analyseur atmosphérique détecte des concentrations modérées de vapeurs d'hydrocarbures, ce qui donne probablement à cet endroit l'odeur distinctive de naphtaline.
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_SrfLanded_Islands = L'analyseur atmosphérique détecte de fortes concentrations de vapeurs d'hydrocarbures dans l'atmosphère, probablement parce qu'il y a un véritable océan d'hydrocarbures juste à côté de nous.
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_SrfLanded_Coast = L'analyseur atmosphérique détecte de fortes concentrations de vapeurs d'hydrocarbures dans l'atmosphère, probablement parce qu'il y a un véritable océan d'hydrocarbures juste à côté de nous.
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_FlyingLow = L'analyse de la basse atmosphère révèle de faibles concentrations de vapeurs d'hydrocarbures. 
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_FlyingLow_NaphthanOceans = Les lectures de l'analyseur atmosphérique indiquent de fortes concentrations de vapeurs d'hydrocarbures, peut-être dû au fait qu'il y a un véritable océan de pétrole sous nous. 
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_FlyingHigh = L'analyse de la haute atmosphère révèle de faibles concentrations de vapeurs d'hydrocarbures. 


		// Anehta
		#LOC_KS_SciDef_crewReport_Anehta_FlyingLow = « On a emballé les hélices ? » L'équipage a oublié à cause du stress.
		#LOC_KS_SciDef_crewReport_Anehta_FlyingHigh = L'équipage est calme, confiant en votre manœuvre d'aérofreinage précisément calculée. Vous L'AVEZ bien calculée, n'est-ce pas ?
		#LOC_KS_SciDef_crewReport_Anehta_InSpaceLow = Okay, on s'approche un peu trop pour le confort, Anehta...
		#LOC_KS_SciDef_crewReport_Anehta_InSpaceHigh = Le Centre de Contrôle refuse la demande de l'équipage de voler à travers les anneaux.

		#LOC_KS_SciDef_evaReport_Anehta_FlyingLow = Vous avez eu de meilleures idées.
		#LOC_KS_SciDef_evaReport_Anehta_FlyingHigh = Qui a autorisé ça ?!
		#LOC_KS_SciDef_evaReport_Anehta_InSpaceLow = Vous fermez les yeux et réalisez que vous pouvez encore voir les étoiles. Peut-être devriez-vous rentrer.
		#LOC_KS_SciDef_evaReport_Anehta_InSpaceHigh = « Vous savez, je chanterais une chanson, mais "La planète Anehta est bleue, et je n'y peux rien" ne sonne pas vraiment bien rythmiquement. »

		#LOC_KS_SciDef_mysteryGoo_Anehta_FlyingLow = Le Goo est-il devenu bleu, ou est-ce juste l'éclairage ?
		#LOC_KS_SciDef_mysteryGoo_Anehta_FlyingHigh = Le Mystery Goo s'inquiète de ne pas rentrer à la maison.
		#LOC_KS_SciDef_mysteryGoo_Anehta_InSpaceLow = Le Goo s'est formé en deux masses distinctes ; une grande sphère centrale et un ensemble d'anneaux l'entourant.
		#LOC_KS_SciDef_mysteryGoo_Anehta_InSpaceHigh = Le Goo semble s'intéresser à Efil.

		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_FlyingLow = Le laboratoire de matériaux a déjà été écrasé par la pression et ne peut pas s'ouvrir correctement.
		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_FlyingHigh = Les vents puissants, la pression croissante et les températures qui changent rapidement font un désordre de la baie d'échantillons.
		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_InSpace = L'environnement à haute radiation a fait briller quelques échantillons. On dirait que ce serait amusant de peindre la fusée avec... Attendez. Vous venez d'avoir un déjà-vu ?

		#LOC_KS_SciDef_temperatureScan_Anehta_FlyingLow = Il n'y a vraiment pas de géante gazeuse froide, n'est-ce pas ?
		#LOC_KS_SciDef_temperatureScan_Anehta_FlyingHigh = La haute atmosphère commence fraîche, puis il fait VRAIMENT froid. Ça va probablement devenir beaucoup plus chaud très bientôt à moins que vous arrêtiez de tomber.
		#LOC_KS_SciDef_temperatureScan_Anehta_InSpace = Brillant. Quel plan de génie allez-vous inventer ensuite ?

		#LOC_KS_SciDef_barometerScan_Anehta_FlyingLow = Le baromètre a miraculeusement survécu à la pression extrême. Cependant, il pense maintenant qu'il est submergé dans un liquide et recommande d'acheter un PresMat Underwater Pressure Sensor (tm).
		#LOC_KS_SciDef_barometerScan_Anehta_FlyingHigh = La pression augmente rapidement à mesure que l'altitude diminue. Cela semblerait suggérer qu'Anehta est une sorte de monde gigantesque à base de gaz - un « Colosse atmosphérique », si vous voulez.
		#LOC_KS_SciDef_barometerScan_Anehta_InSpace = Peut-être qu'un jour prochain, ça fonctionnera.

		#LOC_KS_SciDef_gravityScan_Anehta_InSpaceLow = C'est beaucoup de graviolis, mais le trou noir proche (relativement parlant) offre à Anehta une concurrence sérieuse. Vous vous demandez si la planète se sent complexée par ça.
		#LOC_KS_SciDef_gravityScan_Anehta_InSpaceHigh = Les nombreuses lunes d'Anehta génèrent leurs propres lectures de gravité, bien qu'aucune ne rivalise avec la puissance de l'attraction d'Anehta.

		#LOC_KS_SciDef_atmosphereAnalysis_Anehta_FlyingLow = La vapeur d'eau est devenue moins courante dans les couches nuageuses inférieures à mesure que l'atmosphère s'épaissit.
		#LOC_KS_SciDef_atmosphereAnalysis_Anehta_FlyingHigh = Outre l'hydrogène et l'hélium attendus, la vapeur d'eau est très abondante ici. Cela ferait d'Anehta une géante gazeuse de classe II selon le système Sudarskerb.

		#LOC_KS_SciDef_magnetometer_Anehta_InSpaceLow = Les lectures du magnétomètre depuis l'orbite basse d'Anehta dans l'espace ont révélé des schémas de champ magnétique complexes et dynamiques. Le champ magnétique de la planète présentait des variations significatives d'intensité et de direction, les ceintures et zones plus sombres de la couverture nuageuse perpétuelle montrant une activité magnétique plus élevée.
		#LOC_KS_SciDef_magnetometer_Anehta_InSpaceHigh = Contrairement à la nature turbulente et fluctuante du champ magnétique observé en orbite basse, le champ magnétique dans la région de haute altitude semble relativement stable, avec une intensité et une direction constantes. Le système d'anneaux planétaires présente également des fluctuations magnétiques minimales dans cette région, suggérant un environnement magnétique plus cohérent et organisé.

		// Enots
		#LOC_KS_SciDef_crewReport_Enots_SrfLanded = Le sol ici est très rocheux. Il est possible que cette roche soit faite d'un noyau exposé recouvert de couches de débris d'anneaux.
		#LOC_KS_SciDef_crewReport_Enots_InSpaceLow = Les débris d'anneaux ne devraient pas poser problème ici. Reste maintenant la question de l'atterrissage sur la surface rocheuse.
		#LOC_KS_SciDef_crewReport_Enots_InSpaceHigh = L'objet semble très petit comparé à Anehta. Nous devrions faire preuve de prudence et essayer d'éviter de heurter les débris d'anneaux.

		#LOC_KS_SciDef_temperatureScan_Enots_SrfLanded = Enots est assez chaud du côté jour. Anehta est peut-être une géante gazeuse, mais elle reçoit à peu près autant de soleil que Kerbin.
		#LOC_KS_SciDef_temperatureScan_Enots_InSpace = Vous trouvez ça drôle ?

		#LOC_KS_SciDef_evaReport_Enots_SrfLanded = Vous levez les yeux et voyez Anehta. Elle occupe une énorme partie du ciel au-dessus de vous et montre à quel point vous êtes minuscule dans cet univers.
		#LOC_KS_SciDef_evaReport_Enots_InSpaceLow = Capitaine, êtes-vous sûr que nous devrions être ici ?
		#LOC_KS_SciDef_evaReport_Enots_InSpaceHigh = C'est une situation précaire et vous devriez être prudent.

		#LOC_KS_SciDef_mysteryGoo_Enots_SrfLanded = Le Goo semble tout à fait à l'aise à la surface d'Enots.
		#LOC_KS_SciDef_mysteryGoo_Enots_InSpaceLow = Le Goo semble inhabituellement attiré par la surface d'Enots. Espérons que cela n'affectera pas notre orbite.
		#LOC_KS_SciDef_mysteryGoo_Enots_InSpaceHigh = Le Goo affiche un comportement erratique autour d'Enots. Nous devons enquêter davantage.

		#LOC_KS_SciDef_surfaceSample_Enots_SrfLanded = La surface est assez poussiéreuse et rocheuse. En creusant plus profondément, cependant, vous heurtez un mur de fer solide.

		#LOC_KS_SciDef_mobileMaterialsLab_Enots_SrfLanded = Étant un petit caillou sans air, Enots n'a pas d'effet différent sur les matériaux.
		#LOC_KS_SciDef_mobileMaterialsLab_Enots_InSpaceLow = Que pensez-VOUS que font les matériaux ? C'est probablement plus intéressant que ce qui se passe réellement là-dedans.
		#LOC_KS_SciDef_mobileMaterialsLab_Enots_InSpaceHigh = Les matériaux semblent briller en bleu. Vous réalisez alors que c'est juste la lumière réfléchie par Anehta.

		#LOC_KS_SciDef_barometerScan_Enots_SrfLanded = Selon vos calculs, c'était très probablement un gaspillage de Funds.
		#LOC_KS_SciDef_barometerScan_Enots_InSpace = D'une certaine manière cosmique, oui.

		#LOC_KS_SciDef_gravityScan_Enots_SrfLanded = La gravité de surface ici est très faible. Essayez de ne pas tomber, ou plutôt, de ne pas sauter.
		#LOC_KS_SciDef_gravityScan_Enots_InSpaceLow = Le scanner de gravité est maintenant plus concentré sur Enots. Cependant, les lectures n'expliquent toujours pas le Goo qui devient fou.
		#LOC_KS_SciDef_gravityScan_Enots_InSpaceHigh = Le capteur oscille entre Enots et Anehta. Ce n'est pas aussi mauvais que lors de l'expédition Tot, cependant.

		#LOC_KS_SciDef_seismicScan_Enots_SrfLanded = Le scanner sismique ne détecte aucune activité autre que de minuscules impacts de micrométéorites.


		// Efil
		#LOC_KS_SciDef_crewReport_Efil_SrfLanded = Dès que nous avons atterri sur Efil, nous avons été frappés par la beauté du paysage d'Efil. L'air était épais et humide, et les riches teintes de la flore et de la faune ont créé une tapisserie vibrante qui s'étendait à perte de vue. Les plages étaient couvertes de sable blanc scintillant, et les eaux océaniques étaient d'une clarté cristalline. Nous avons également observé des créatures bioluminescentes fascinantes qui brillaient magnifiquement dans l'obscurité.
		#LOC_KS_SciDef_crewReport_Efil_SrfSplashed = Le vaisseau spatial a amerri dans un lagon d'eau cristalline, et l'équipage a eu l'occasion d'explorer le monde sous-marin. La vie marine était diverse et colorée, et l'équipage a mené diverses expériences pour en apprendre davantage sur l'écosystème de la planète.
		#LOC_KS_SciDef_crewReport_Efil_FlyingLow = Alors que nous descendions plus profondément dans la basse atmosphère d'Efil, nous étions fascinés par les vues à couper le souffle qui se déployaient devant nos yeux. L'atmosphère était remplie de couleurs vives, et l'air grouillait de vie. Nous nous sommes émerveillés des plages magnifiques avec leurs eaux scintillantes, et des forêts denses avec leur feuillage vert luxuriant. 
		#LOC_KS_SciDef_crewReport_Efil_FlyingHigh = La haute atmosphère d'Efil semble fine et claire. En descendant dans la haute atmosphère d'Efil, nous avons été accueillis par les couleurs époustouflantes et la beauté naturelle de la planète. Les forêts luxuriantes et les océans cristallins étaient vraiment un spectacle à contempler.
		#LOC_KS_SciDef_crewReport_Efil_InSpaceLow = Le rapport d'équipage de l'observation d'Efil en orbite basse a révélé un spectacle à couper le souffle ressemblant à un précieux saphir en orbite autour d'Anehta. L'atmosphère d'Efil dégageait un charme envoûtant avec des couleurs vives et des formations nuageuses intrigantes. La surface de la planète présentait des plages immaculées et des forêts denses, invitant à une exploration plus poussée. 
		#LOC_KS_SciDef_crewReport_Efil_InSpaceHigh = Le rapport d'équipage de l'observation d'Efil en orbite haute a révélé des vues impressionnantes d'une planète ressemblant à un saphir au loin. L'atmosphère d'Efil semblait envoûtante avec des couleurs vives, rappelant un cadre paradisiaque. L'équipage a noté la beauté à couper le souffle et les caractéristiques uniques d'Efil, fournissant des informations précieuses pour une exploration et une étude plus poussées de ce monde remarquable.

		#LOC_KS_SciDef_temperatureScan_Efil_SrfLanded = La température variait considérablement selon l'heure et l'emplacement sur Efil, de 25 à 35 degrés Celsius le jour et 5 degrés Celsius la nuit. Pendant l'éclipse solaire qui se produit chaque jour sur cette lune, la lumière était complètement bloquée par Anehta, et la température à la surface d'Efil peut chuter considérablement d'environ 15 à 20 degrés Celsius.
		#LOC_KS_SciDef_temperatureScan_Efil_SrfSplashed = La surface de la planète, couverte par un vaste océan, présentait des températures relativement stables tout au long du jour et de la nuit, variant de 28 à 32 degrés Celsius. L'eau semblait agir comme un régulateur naturel, maintenant une température constante à la surface de la planète.
		#LOC_KS_SciDef_temperatureScan_Efil_FlyingLow = Alors que l'équipage s'aventurait dans la basse atmosphère d'Efil, ils ont rencontré une couche où la température a grimpé de manière inattendue. Cette montée soudaine de température était inattendue et intrigante, car elle défiait le schéma précédemment observé, ce qui pourrait potentiellement être attribué à des dynamiques atmosphériques uniques ou à des schémas climatiques locaux.
		#LOC_KS_SciDef_temperatureScan_Efil_FlyingHigh = Dans la haute atmosphère, l'équipage a observé une baisse progressive de la température, conforme à la tendance attendue de baisse de température avec l'altitude. 

		#LOC_KS_SciDef_evaReport_Efil_SrfLanded = En posant le pied sur la surface d'Efil, la beauté captivante de cette planète semblable à un saphir s'est déployée devant moi. L'atmosphère m'enveloppait dans son étreinte douce, offrant une respiration rafraîchissante à chaque inspiration. Les plages magnifiques, parées d'eaux turquoise scintillantes, s'étendaient comme le chef-d'œuvre d'un peintre, tandis que les forêts luxuriantes m'appelaient de leurs teintes vives et murmures mystérieux.
		#LOC_KS_SciDef_evaReport_Efil_SrfSplashed = Les vagues douces portaient les échos d'une harmonie sauvage, comme si l'essence même de la nature dansait en elles. Le monde sous-marin révélait une tapisserie de vie, où des formations de coraux irisés se balançaient gracieusement, et des créatures exotiques, parées de teintes vives, glissaient à travers les courants.
		#LOC_KS_SciDef_evaReport_Efil_FlyingLow = Le monde se déployait sous moi comme un rêve envoûtant. Le dais émeraude du feuillage dense s'étendait à perte de vue, entrelacé de brumes éthérées qui murmuraient des récits de secrets anciens. La brise douce caressait mon visage, portant le doux parfum des fleurs exotiques, tandis que les mélodies de créatures invisibles remplissaient l'air de leur symphonie harmonieuse.
		#LOC_KS_SciDef_evaReport_Efil_FlyingHigh = L'étendue azur s'étendait devant moi, son immensité semblant infinie. La lumière binaire du soleil dansait sur les volutes de nuages, projetant des teintes éthérées à travers le ciel. De ce point de vue, je pouvais contempler la véritable splendeur d'Efil, avec ses forêts luxuriantes et ses plages immaculées embrassant le paysage en dessous. 
		#LOC_KS_SciDef_evaReport_Efil_InSpaceLow = Le joyau de saphir, suspendu dans l'immensité du cosmos, émanait une lueur éthérée qui capturait mon imagination. L'absence de gravité me permettait de glisser sans effort à travers l'étendue céleste, observant la danse complexe des étoiles et des galaxies lointaines.
		#LOC_KS_SciDef_evaReport_Efil_InSpaceHigh = La planète lointaine, avec son atmosphère pittoresque, scintillait comme une tapisserie de couleurs envoûtante. Flottant en apesanteur, je m'émerveillais du ballet cosmique des étoiles, leur lumière radieuse dansant sur le fond velouté de l'univers.

		#LOC_KS_SciDef_mysteryGoo_Efil_SrfLanded = Le Goo semble se calmer dans son conteneur. Puis il réalise qu'il n'est pas sur Kerbin et semble avoir une crise existentielle.
		#LOC_KS_SciDef_mysteryGoo_Efil_SrfSplashed = Le Goo s'échappe dans l'eau ! Il retourne ensuite promptement à la sécurité de son conteneur car ce n'est pas de l'eau qu'il a touchée auparavant.
		#LOC_KS_SciDef_mysteryGoo_Efil_FlyingLow = Le Goo gigote de façon excitée alors que le vaisseau vole dans les airs.
		#LOC_KS_SciDef_mysteryGoo_Efil_FlyingHigh = Le Goo semble penser qu'il est dans l'atmosphère de Kerbin. Si seulement il savait......

		#LOC_KS_SciDef_surfaceSample_Efil_SrfLanded = J'ai soigneusement collecté des échantillons du sol, admirant sa texture riche et ses couleurs vives, chaque grain témoignant de la tapisserie complexe de la vie qui prospérait dans ce royaume envoûtant.
		#LOC_KS_SciDef_surfaceSample_Efil_SrfSplashed = Le royaume submergé de l'océan d'Efil a dévoilé une tapisserie de vie envoûtante, alors que les eaux immaculées m'embrassaient. Avec un soin méticuleux, j'ai prélevé des échantillons de l'écosystème marin prospère, où les coraux vibrants et la flore marine délicate témoignaient de la riche biodiversité de la planète. 

		#LOC_KS_SciDef_mobileMaterialsLab_Efil_SrfLanded = Dans l'étreinte du paysage idyllique d'Efil, mon équipe s'est lancée dans une étude complexe de la composition géologique de la lune. Des instruments délicats ont méticuleusement analysé la diversité des roches et minéraux, dévoilant les secrets de sa formation et offrant des aperçus de l'interaction complexe des forces élémentaires qui ont façonné ce joyau céleste. Nos découvertes promettent d'approfondir notre compréhension de la géologie unique d'Efil et de contribuer à notre compréhension plus large de l'évolution planétaire.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_SrfSplashed = Plongés dans l'étreinte azur d'Efil, notre étude des matériaux a pris un tournant inattendu alors que nous nous aventurions dans les profondeurs de son océan cristallin. En analysant les échantillons immergés, nous avons découvert une remarquable interaction de minéraux exotiques, révélant les trésors cachés de la lune. La relation complexe entre l'environnement aquatique et la composition géologique s'est dévoilée sous nos yeux, enflammant notre curiosité scientifique et élargissant notre compréhension de ce monde énigmatique.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_FlyingLow = En descendant dans les couches inférieures de l'atmosphère captivante d'Efil, notre étude des matériaux a dévoilé la composition complexe de son terrain rocheux. Avec une analyse méticuleuse et une instrumentation précise, nous avons examiné les minéraux et éléments uniques présents, peignant un portrait vivant de la tapisserie géologique de la lune.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_FlyingHigh = Plongés dans les couches supérieures de l'atmosphère envoûtante d'Efil, notre étude des matériaux s'est aventurée dans des domaines inexplorés. L'interaction des composés atmosphériques et des formations minérales complexes laissait entrevoir l'interconnectivité profonde entre ce monde envoûtant et la tapisserie de son environnement captivant.

		#LOC_KS_SciDef_barometerScan_Efil_Srf = Alors que nos pieds touchaient fermement le terrain vibrant d'Efil, nous avons déployé le baromètre, mesurant la pression atmosphérique avec précision. Les lectures reflétaient la nature dynamique de la planète, avec des fluctuations qui suggéraient des forces invisibles façonnant son équilibre délicat.
		#LOC_KS_SciDef_barometerScan_Efil_FlyingLow = En nous aventurant dans les couches inférieures de l'atmosphère d'Efil, notre baromètre a consciencieusement enregistré les fluctuations subtiles de la pression atmosphérique. Les données ont capturé l'interaction dynamique des courants atmosphériques, laissant entrevoir les mécanismes complexes qui façonnent ce monde vibrant.
		#LOC_KS_SciDef_barometerScan_Efil_FlyingHigh = En montant vers les couches supérieures de l'atmosphère d'Efil, le baromètre a consciencieusement capturé la diminution de la pression atmosphérique, faisant écho à la transition éthérée vers les hauteurs célestes. 

		#LOC_KS_SciDef_seismicScan_Efil_SrfLanded = En posant le pied sur la surface à couper le souffle d'Efil, nos instruments de scan sismique ont commencé leur danse complexe avec la géologie de la planète. Les vibrations et les échos ont traversé le terrain, dévoilant les secrets cachés sous la beauté azur, cartographiant le réseau complexe de chambres souterraines et le battement doux du noyau ancien d'Efil. Chaque impulsion sismique faisait écho à l'histoire de la planète, peignant une image vivante de sa tapisserie géologique, dévoilant un monde aussi vibrant et énigmatique que les paysages captivants qui ornaient sa surface.

		#LOC_KS_SciDef_gravityScan_Efil_SrfLanded = Les pieds fermement plantés sur les rives envoûtantes d'Efil, nous avons entrepris un scan gravitationnel pour percer les mystères contenus dans l'étreinte gravitationnelle de la planète. Alors que nos instruments mesuraient méticuleusement les fluctuations subtiles des forces gravitationnelles, nous avons acquis des aperçus sur la distribution de la masse sous la surface, l'interaction complexe de la dynamique planétaire et les trésors cachés sous le voile azur. 
		#LOC_KS_SciDef_gravityScan_Efil_InSpaceLow = Dans l'immensité de l'espace, notre vaisseau spatial a entrepris un scan gravitationnel au-dessus d'Efil, capturant la chorégraphie céleste des forces gravitationnelles. En suspension dans l'apesanteur, nous avons observé les douces tractions du champ gravitationnel d'Efil, cartographiant les motifs complexes qui façonnent le tissu du cosmos.
		#LOC_KS_SciDef_gravityScan_Efil_InSpaceHigh = Au milieu des vastes étendues de l'espace, notre vaisseau s'est aventuré à de grandes hauteurs au-dessus du monde envoûtant d'Efil, capturant la danse céleste des forces gravitationnelles. Depuis ce point de vue élevé, nous avons été témoins de l'interaction complexe entre Efil et ses compagnons cosmiques, traçant les courbes et ondulations dans le tissu de l'espace-temps. 

		#LOC_KS_SciDef_magnetometer_Efil_InSpace = Dans l'étendue de l'espace, notre magnétomètre a sondé avec diligence le champ magnétique entourant le monde éthéré d'Efil. Nous avons détecté les fluctuations et ondulations subtiles du magnétisme planétaire, peignant un portrait vivant des forces en jeu. Le scan du magnétomètre a dévoilé la danse complexe entre le champ magnétique d'Efil et les forces célestes qui façonnent son existence.

		#LOC_KS_SciDef_atmosphereAnalysis_Efil_Srf = À la surface d'Efil, notre analyse atmosphérique a révélé un mélange harmonieux de gaz, dominé par une riche abondance d'oxygène et des traces d'autres éléments essentiels. L'air portait un parfum subtil de flore, évoquant les forêts luxuriantes qui ornent ce monde captivant. De plus, nous avons détecté la présence d'aérosols délicats en suspension dans l'atmosphère, contribuant aux spectacles visuels à couper le souffle qui ornent l'horizon.
		#LOC_KS_SciDef_atmosphereAnalysis_Efil_FlyingLow = Plongés dans la basse atmosphère d'Efil, notre analyse atmosphérique a dévoilé une interaction dynamique des gaz, avec des concentrations plus élevées d'oxygène et un équilibre délicat d'azote et d'éléments traces. L'air contenait des traces de composés aromatiques, évoquant le parfum des fleurs vibrantes qui parsèment le paysage. 
		#LOC_KS_SciDef_atmosphereAnalysis_Efil_FlyingHigh = En montant dans la haute atmosphère d'Efil, nous avons observé une atmosphère raréfiée, peu peuplée de gaz et enrichie de particules délicates qui diffusent la lumière, conférant une lueur mystique aux cieux. La présence de particules ionisées laissait entrevoir le ballet céleste des particules chargées, contribuant aux aurores éthérées qui embellissent les couches les plus hautes de cette planète impressionnante.

		// Eulb
		#LOC_KS_SciDef_crewReport_Eulb_SrfLanded = C'est certainement une expérience qui ne se produit qu'une fois par lune bleue !
		#LOC_KS_SciDef_crewReport_Eulb_InSpace = Le bleu intense de la lune sous vous rend difficile de se concentrer sur la tâche à accomplir.

		#LOC_KS_SciDef_temperatureScan_Eulb_SrfLanded = Malgré son bleu glacial, Eulb est en fait plutôt chaud pendant la journée. Pourtant, les choses bleues ne sont-elles pas censées être plus chaudes ?
		#LOC_KS_SciDef_temperatureScan_Eulb_InSpace = Quand ça fonctionnera vraiment un jour, vous allez avoir l'air tellement stupides.

		#LOC_KS_SciDef_evaReport_Eulb_SrfLanded = Marcher sur la surface d'Eulb a taché votre combinaison spatiale d'une teinte de bleu clair. Arrêtez de rire. Ce n'est pas drôle.
		#LOC_KS_SciDef_evaReport_Eulb_InSpace = En regardant la lune bleue sous vous, vous vous demandez comment un corps céleste peut être si... bleu.

		#LOC_KS_SciDef_mysteryGoo_Eulb_SrfLanded = Le Goo a « bleui » dans son conteneur. Interprétez ça comme vous voulez.
		#LOC_KS_SciDef_mysteryGoo_Eulb_InSpace = Le Goo ne semble pas faire grand-chose. 

		#LOC_KS_SciDef_surfaceSample_Eulb_SrfLanded = L'échantillon a taché votre gant d'une couleur bleue très distincte.
		#LOC_KS_SciDef_surfaceSample_Eulb_SrfLanded_Craters = L'échantillon de matériau que vous avez collecté ne semble pas provenir d'Eulb.

		#LOC_KS_SciDef_mobileMaterialsLab_Eulb_SrfLanded = La baie d'échantillons s'est recouverte de la poussière bleue mystérieuse qui recouvre la surface d'Eulb, mais reste par ailleurs inerte.
		#LOC_KS_SciDef_mobileMaterialsLab_Eulb_InSpace = Les matériaux semblent être bleus. Vous envisagez de les remonter le moral, mais vous réalisez que cette expression n'est pas littérale.

		#LOC_KS_SciDef_barometerScan_Eulb_SrfLanded = Bon, pour être juste, Eulb n'a pas beaucoup moins de gravité que Duna. Il est théoriquement possible qu'elle ait pu avoir une atmosphère, non ?
		#LOC_KS_SciDef_barometerScan_Eulb_InSpace = Le baromètre semble avoir le « blues » d'être utilisé incorrectement à nouveau, et a décidé d'« aérer » ses griefs.

		#LOC_KS_SciDef_seismicScan_Eulb_SrfLanded = Le capteur sismique détecte une activité sismique très faible sous la surface.

		#LOC_KS_SciDef_gravityScan_Eulb_SrfLanded = Le capteur effectue une étude détaillée de la gravité locale depuis la surface, nous permettant de déduire la structure interne.
		#LOC_KS_SciDef_gravityScan_Eulb_InSpace = Le capteur mesure la gravité d'Eulb, donnant un indice sur la structure interne de la lune bleue.

		#LOC_KS_SciDef_magnetometer_Eulb_InSpaceLow = Être plus proche d'Eulb nous permet de prendre une lecture plus précise de son champ magnétique.
		#LOC_KS_SciDef_magnetometer_Eulb_InSpaceHigh = L'instrument détecte un champ magnétique résiduel provenant de la lune bleue, mais la lecture est pleine de bruit du champ magnétique d'Anehta.

		// Elad
		#LOC_KS_SciDef_crewReport_Elad_SrfLanded = L'équipage se demande à quoi ressemblait cet endroit quand Elad avait une atmosphère.
		#LOC_KS_SciDef_crewReport_Elad_InSpaceLow = La ressemblance avec Tylo est là, mais il y a une autre lune qui existe peut-être ou non et à laquelle Elad ressemble encore plus...
		#LOC_KS_SciDef_crewReport_Elad_InSpaceHigh = Elad looms nearby, seeming quite peaceful despite its apparently tragic past.

		#LOC_KS_SciDef_evaReport_Elad_SrfLanded = On se sent un peu comme à la maison ! Enfin, ce serait le cas s'il y avait de l'air.
		#LOC_KS_SciDef_evaReport_Elad_InSpaceLow = Celui qui continue à voler les atmosphères des grosses lunes doit être retrouvé et traduit en justice.
		#LOC_KS_SciDef_evaReport_Elad_InSpaceHigh = Même Elad semble avoir une très légère teinte bleue. Cela pourrait être dû à la couleur d'Aralc-A, cependant.

		#LOC_KS_SciDef_mysteryGoo_Elad_SrfLanded = Le Goo pleure (des larmes faites de Goo) et utilise un mouchoir (également fait de Goo) pour essuyer ses pseudopodes.
		#LOC_KS_SciDef_mysteryGoo_Elad_InSpaceLow = Le conteneur reste fermé. Il semble que le Goo soit devenu dépressif.
		#LOC_KS_SciDef_mysteryGoo_Elad_InSpaceHigh = Le Goo se sent triste.

		#LOC_KS_SciDef_surfaceSample_Elad_SrfLanded = La surface ici semble avoir été érodée, mais pas par des micrométéorites ou des radiations.
		#LOC_KS_SciDef_surfaceSample_Elad_SrfLandedLowlands = Vous ramassez une roche particulièrement intéressante et la mettez dans votre poche. Elle semble être une sorte de minéral salé, densément compacté comme sous une pression énorme.
		#LOC_KS_SciDef_surfaceSample_Elad_SrfLandedGrandCanyon = Le sol ici est si fortement compressé qu'il a dû être autrefois une fosse océanique.

		#LOC_KS_SciDef_mobileMaterialsLab_Elad_SrfLanded = Les matériaux réagissent vaguement à la situation de manière frustrante et indescriptible, vous obligeant à rédiger un rapport totalement générique.
		#LOC_KS_SciDef_mobileMaterialsLab_Elad_InSpace = Peut-être qu'un jour, vous trouverez une partie de l'espace qui soit simplement différente, les échantillons ne brilleront pas et ne feront pas une bonne peinture pour fusée.

		#LOC_KS_SciDef_seismicScan_Elad_SrfLanded = Les lectures suggèrent fortement qu'Elad est encore sismiquement actif.

		#LOC_KS_SciDef_temperatureScan_Elad_SrfLanded = Le thermomètre lit la température de la surface d'Elad ; selon l'endroit où vous vous trouvez, elle sera différente. Rien ne retient cette température, elle va refroidir une fois le jour parti.
		#LOC_KS_SciDef_temperatureScan_Elad_SrfLanded_GrandCanyons = Cet endroit semble être plus frais !
		#LOC_KS_SciDef_temperatureScan_Elad_InSpaceLow = Descendre tout en n'étant en contact avec rien ne va rien changer.
		#LOC_KS_SciDef_temperatureScan_Elad_InSpaceHigh = Le thermomètre a enregistré sa propre température. Que pensez-vous faire en mettant un thermomètre de cuisine dans le vide de l'espace ?

		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded = Le baromètre détecte une concentration plus élevée de particules. Des particules qui pourraient être des vestiges d'un passé atmosphérique dense. Cela ne signifie pas que vous pouvez faire du parachutisme.
		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded_GrandCanyons = La pression ici est légèrement plus élevée, vous ne pouvez toujours pas faire voler un avion en papier ici.
		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded_RiftValleys = La pression ici est légèrement plus élevée, vous ne pouvez toujours pas faire voler un avion en papier ici.
		#LOC_KS_SciDef_barometerScan_Elad_InSpaceLow = Le baromètre détecte plus que rien. Il semble y avoir une augmentation significative des particules.
		#LOC_KS_SciDef_barometerScan_Elad_InSpaceHigh = Le baromètre ne détecte rien.

		#LOC_KS_SciDef_gravityScan_Elad_SrfLanded = Cette petite boîte attachée à ce vaisseau semble être attirée vers le sol, ce qui pourrait prouver la présence d'une attraction gravitationnelle produite par Elad. Cet effet est causé par la capacité de la masse à courber l'espace-temps autour d'elle. C'est ce qu'on appelle la gravité, mais si vous avez réussi à amener ça ici, vous devriez le savoir. N'est-ce pas ?
		#LOC_KS_SciDef_gravityScan_Elad_InSpaceLow = Certaines irrégularités sont détectées qui causent des irrégularités dans la distribution de la force gravitationnelle d'Elad, qui est loin d'être irrégulière.
		#LOC_KS_SciDef_gravityScan_Elad_InSpaceHigh = La gravité d'Elad semble assez constante depuis cette distance. Les irrégularités de sa surface ne semblent pas déplacer son centre de gravité.





		// Wormhole(s)
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceLow1 = Vous aimeriez que quelqu'un soit là pour vous expliquer cette anomalie spatiale d'une complexité ahurissante avec rien qu'un crayon et du papier.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceLow2 = Alors que vous tentez de fixer la distorsion dans l'espace-temps, vous pensez voir une image déformée de... une sorte d'énorme chose brillante, avec trois... non, quatre points autour ? Malgré votre excitation et votre envie d'en savoir plus, ce pourrait être un jeu de lumière, et vous essayez de calmer vos spéculations folles.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceHigh1 = Vous avez du mal à repérer le trou de ver, mais une fois que vous le voyez, c'est tout ce que vous pouvez regarder.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceHigh2 = Vous frissonnez à l'idée que le KSC veut vous envoyer VOUS à travers ce truc vers Kraken-sait-où, peut-être des milliers ou des millions d'années-lumière de chez vous.

		#LOC_KS_SciDef_temperatureScan_WH3141A_InSpaceLow = Votre thermomètre ne semble pas avoir détecté quoi que ce soit d'inhabituel, malgré l'anomalie qui brise l'espace-temps à portée de crachat du vaisseau.
		#LOC_KS_SciDef_temperatureScan_WH3141A_InSpaceHigh = Votre thermomètre ne semble pas avoir détecté quoi que ce soit d'inhabituel, malgré l'anomalie qui brise l'espace-temps à portée de crachat du vaisseau.

		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceLow1 = Vous avez un désir très fort, et tout à fait rationnel, de NE PAS traverser le trou de ver avec rien d'autre que votre combinaison pour vous protéger.
		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceLow2 = BEAUCOUP trop proche pour le confort.
		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceHigh = En regardant dans le trou de ver (qui pourrait tout aussi bien être l'œil du Kraken lui-même), vous êtes reconnaissant que les combinaisons EVA exigent de porter une couche. Vous savez, au cas où pour des moments comme celui-ci. 

		#LOC_KS_SciDef_mysteryGoo_WH3141A_InSpaceLow = Le Goo semble se reculer du trou de ver, comme par peur de celui-ci.
		#LOC_KS_SciDef_mysteryGoo_WH3141A_InSpaceHigh = Le Goo semble se reculer du trou de ver, comme par peur de celui-ci.

		#LOC_KS_SciDef_mobileMaterialsLab_WH3141A_InSpaceLow = Les échantillons magnétiques réagissent violemment à être si proches de l\'anomalie, se détachant de la structure de la baie de matériaux vers le trou de ver.
		#LOC_KS_SciDef_mobileMaterialsLab_WH3141A_InSpaceHigh = Les échantillons magnétiques réagissent violemment à être si proches de l\'anomalie, se détachant de la structure de la baie de matériaux vers le trou de ver.

		#LOC_KS_SciDef_gravityScan_WH3141A_InSpaceLow = Les lectures du capteur de gravité fluctuent de manière erratique, car il semble incapable de quantifier ou même de traiter ce champ gravitationnel vraiment bizarre.
		#LOC_KS_SciDef_gravityScan_WH3141A_InSpaceHigh = Les lectures du capteur de gravité fluctuent de manière erratique, car il semble incapable de quantifier ou même de traiter ce champ gravitationnel vraiment bizarre.

		#LOC_KS_SciDef_magnetometer_WH3141A_InSpaceLow = Si proche de l'anomalie, le magnétomètre a l'équivalent numérique d'une crise de panique et cesse de fonctionner complètement avec un code d'erreur que vous et votre équipage ne connaissez pas.
		#LOC_KS_SciDef_magnetometer_WH3141A_InSpaceHigh = En entrant dans le petit puits gravitationnel du trou de ver, le magnétomètre commence à donner des lectures instables, comme s'il était confus... ou comme s'il détectait plusieurs « champs magnétiques à proximité » conçus en même temps. Étrange.



		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceLow1 = Vous et votre équipage n'avez pas hâte de retraverser une autre de ces choses. 
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceLow2 = Vous pensez pouvoir voir le point qu'est Kerbol à travers l'anomalie elle-même, mais vous ne pouvez pas en être sûr.
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceHigh1 = Oh, super. Pas ENCORE ÇA. Vous avez pensé que vous alliez mourir au moins 9 fois séparément la dernière fois que vous en avez traversé un.
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceHigh2 = Penser que c'est le « portail » pour rentrer... Vous mettez certainement beaucoup de foi en quelque chose pour vous ramener chez Maman et Papa Kerman que vous ou même les meilleurs scientifiques Kerbal ne peuvent commencer à comprendre dans son intégralité.

		#LOC_KS_SciDef_temperatureScan_WH3141B_InSpaceLow = Votre thermomètre ne semble pas avoir détecté quoi que ce soit d'inhabituel, malgré l'anomalie qui brise l'espace-temps à portée de crachat du vaisseau.
		#LOC_KS_SciDef_temperatureScan_WH3141B_InSpaceHigh = Votre thermomètre ne semble pas avoir détecté quoi que ce soit d'inhabituel, malgré l'anomalie qui brise l'espace-temps à portée de crachat du vaisseau.

		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceLow1 = Bien que sachant que la maison n'est qu'« un saut » plus loin, vous ne voulez certainement pas traverser l'anomalie avec seulement votre combinaison pour vous protéger.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceLow2 = À sa manière, regarder ce truc d'aussi près est tout aussi mauvais, voire pire que d'être en EVA en orbite basse autour de Kcalbeloh.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceHigh1 = Bien que cosmiquement terrifiant de manière similaire à Kcalbeloh, le petit « trou » dans l'espace-temps est indéniablement particulier, et quelque peu beau de cette perspective.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceHigh2 = En regardant dans le trou de ver (qui pourrait tout aussi bien être l'œil de Kraken Lui-même), vous êtes reconnaissant que les combinaisons EVA exigent que vous portiez une couche. Vous savez, au cas où pour des moments comme celui-ci.

		#LOC_KS_SciDef_mysteryGoo_WH3141B_InSpaceLow = Le Goo semble se reculer du trou de ver, comme par peur de celui-ci.
		#LOC_KS_SciDef_mysteryGoo_WH3141B_InSpaceHigh = Le Goo semble se reculer du trou de ver, comme par peur de celui-ci.

		#LOC_KS_SciDef_mobileMaterialsLab_WH3141B_InSpaceLow = Les échantillons magnétiques réagissent violemment à être si proches de l'anomalie, se détachant de la structure de la baie de matériaux vers le trou de ver.
		#LOC_KS_SciDef_mobileMaterialsLab_WH3141B_InSpaceHigh = Les échantillons magnétiques réagissent violemment à être si proches de l'anomalie, se détachant de la structure de la baie de matériaux vers le trou de ver.

		#LOC_KS_SciDef_gravityScan_WH3141B_InSpaceLow = Les lectures du capteur de gravité fluctuent de manière erratique, car il semble incapable de quantifier ou même de traiter ce champ gravitationnel vraiment bizarre.
		#LOC_KS_SciDef_gravityScan_WH3141B_InSpaceHigh = Les lectures du capteur de gravité fluctuent de manière erratique, car il semble incapable de quantifier ou même de traiter ce champ gravitationnel vraiment bizarre.

		#LOC_KS_SciDef_magnetometer_WH3141B_InSpaceLow = Si proche de l'anomalie, le magnétomètre a l'équivalent numérique d'une crise de panique et cesse de fonctionner complètement avec un code d'erreur que vous et votre équipage ne connaissez pas.
		#LOC_KS_SciDef_magnetometer_WH3141B_InSpaceHigh = En entrant dans le petit puits gravitationnel du trou de ver, le magnétomètre commence à donner des lectures instables, comme s'il était confus... ou comme s'il détectait plusieurs « champs magnétiques à proximité » conçus en même temps. Étrange.


		// Home Switch Exclusive
		//-------------SulucoHome------------
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Day = Il fait certainement chaud ici. Heureusement que ce vaisseau a la climatisation.
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Twilight = C'est la maison. Que dire d'autre ?
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Night = Heureusement que ce vaisseau a un chauffage.
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfSplashed = Le vaisseau se balance doucement d'avant en arrière dans les vagues. 
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingLow = Le vaisseau vibre alors qu'il vole à travers l'atmosphère.
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingLow_Twilight = Hé, je crois que je peux voir ma maison d'ici !
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingHigh = Des vents soudains et violents menacent de pousser le vaisseau hors de sa trajectoire. Qu'est-ce qui se passe ici ?
		#LOC_KS_SciDef_crewReport_SulucoHome_InSpaceLow = On a réussi à atteindre l'espace !
		#LOC_KS_SciDef_crewReport_SulucoHome_InSpaceHigh = D'aussi haut, vous pouvez clairement voir les trois zones de Suluco : un désert brûlé connaissant un jour éternel, une nature gelée connaissant une nuit éternelle, et la bande crépusculaire entre les deux que vous appelez maison.

		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Day = Vous aviez entendu parler de la chaleur du côté jour de Suluco, mais maintenant vous pouvez en faire l'expérience vous-même. Vous ressentez un fort désir de partir.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Twilight = Ah, twilight zone, sweet twilight zone!
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Night = Je sais que certaines choses valent mieux ne pas être dites, mais on a l'impression qu'il devrait faire beaucoup plus froid de ce côté de la planète.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded = Je ne pense pas qu'on avait vraiment besoin d'une combinaison spatiale pour venir ici.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfSplashed = Je suppose que c'est le moment idéal pour aller nager.
		#LOC_KS_SciDef_evaReport_SulucoHome_FlyingLow = C'est certainement une situation des plus précaires.
		#LOC_KS_SciDef_evaReport_SulucoHome_FlyingHigh = Wheeeeeeeeeee!
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Day = Vous admirez la vue du désert perpétuel sous vous. 
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Twilight = Wow, je n'ai jamais su à quel point il y a peu d'espace pour nous habiter.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Night = Vous admirez les vues des terres gelées sous vous.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Water = C'est en fait assez frappant de savoir à quel point il y a peu d'eau liquide à la surface de notre planète d'origine.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceHigh = Notre maison ressemble certainement à un globe oculaire, n'est-ce pas ?

		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Day = Le sol ici est grossier et très sec, probablement parce que ce côté de la planète reçoit un bain de soleil perpétuel.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Twilight = Le sol ici est plutôt humide, probablement à cause de la fonte des neiges du côté nuit de la planète.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Night = Le sol ici est gelé, probablement parce qu'il ne reçoit pas beaucoup de chaleur. Je comprends pourquoi personne n'a tenté de cultiver ici.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded = Vous prenez un échantillon du sol de Suluco pour analyse.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfSplashed = C'est de l'eau. Qu'attendiez-vous d'autre ?

		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Day = Beaucoup d'échantillons se sont dégradés à cause du bain de soleil constant. Il y a aussi des preuves d'un petit incendie à l'intérieur de la baie de matériaux.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Twilight = Les échantillons n'ont pas encore montré de changements significatifs.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Night = Les échantillons ont des cristaux de glace qui poussent à l'intérieur.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfSplashed = Beaucoup d'échantillons montrent des signes de corrosion à cause de l'exposition à l'eau. Étrangement, l'un des échantillons semble aussi carbonisé.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_Flying = Les échantillons moins résistants se sont déposés à travers l'intérieur de l'unité. Je n'envie pas celui qui devra nettoyer ça.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_InSpace = Certains échantillons semblent s'être détachés et flottent maintenant à l'intérieur de la baie de matériaux.

		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Day = Il fait très chaud ici. Il faudrait être fou pour vouloir vivre ici !
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_DayPole = C'est la partie la plus chaude de la planète, et OH LÀ LÀ, il fait chaud ici ! Pas étonnant que nous ne nous soyons pas installés dans cette zone de la planète.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Twilight = La température ici est parfaite. Maintenant je comprends pourquoi nous vivons dans cette partie de la planète.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Night = La température sur cette moitié de la planète est presque insupportablement froide.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_NightPole = C'est la partie la plus froide de la planète, et il semble que le thermomètre ait gelé. Inutile de dire qu'il est évident pourquoi personne ne vit ici.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfSplashed_Water = La température de l'eau est en fait agréable ici. On dirait qu'on pourrait raisonnablement faire une baignade.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfSplashed_ColdOcean = Le thermomètre se brise au contact des eaux glacées. Heureusement qu'on a une garantie, non ? Quoi, « elle est annulée » ??
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow = Les courants de convection à travers l'atmosphère créent des fluctuations de température significatives lorsque vous traversez différentes altitudes.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow_Day = Les températures au-dessus de la zone diurne sont légèrement plus fraîches qu'à la surface, mais pas de beaucoup. Les courants ascendants chauds rendent l'air plus chaud qu'il ne le serait autrement.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow_Night = Les courants descendants froids entraînent une température atmosphérique locale beaucoup plus basse qu'elle ne le serait autrement.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingHigh = Les températures dans la haute atmosphère sont plus uniformes, mais il y a encore des preuves de convection à travers l'atmosphère.

		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Day = La présence d'une zone de basse pression sur le côté jour nous amène à croire que l'air est chauffé par la lumière du soleil ici, puis transporté vers les régions plus froides via les courants atmosphériques supérieurs.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Twilight = Il y a un vent très persistant entre le côté jour et le côté nuit de la planète. Des recherches supplémentaires doivent être menées sur la formation de ces vents.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Night = La présence d'une zone de haute pression sur le côté nuit nous donne une image plus complète des courants atmosphériques de Suluco. L'air est chauffé sur le côté jour, puis s'écoule vers le côté nuit via les courants de convection, où il se refroidit et retourne vers le côté jour, créant les vents persistants.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfSplashed = L'eau a inondé le baromètre, le rendant inutilisable.
		#LOC_KS_SciDef_barometerScan_SulucoHome_FlyingLow = Les fluctuations de pression atmosphérique nous amènent à spéculer sur l'existence de courants de convection dans l'atmosphère, qui proviendraient probablement du gradient de température entre les deux moitiés de la planète.
		#LOC_KS_SciDef_barometerScan_SulucoHome_FlyingHigh = D'autres fluctuations de pression atmosphérique semblent confirmer l'existence de courants de convection atmosphérique.
		#LOC_KS_SciDef_barometerScan_SulucoHome_InSpaceLow = Le baromètre affiche zéro ! Nous devons être dans l'espace !

		#LOC_KS_SciDef_seismicScan_SulucoHome_SrfLanded = Le scanner sismique détecte très peu d'activité sismique. Notre maison est probablement géologiquement très stable.

		#LOC_KS_SciDef_gravityScan_SulucoHome_SrfLanded = Après avoir correctement calibré le capteur de gravité, vous prenez une lecture de la gravité locale à la surface de Suluco.
		#LOC_KS_SciDef_gravityScan_SulucoHome_SrfSplashed = Le capteur de gravité grille au contact de l'eau.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Day = Le côté désert semble avoir une gravitation très stable, suggérant une très faible variabilité de la composition géologique.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Twilight = En passant au-dessus de la zone crépusculaire, le capteur de gravité enregistre une très légère baisse des lectures de gravité locale, suggérant que cette partie de la planète est à une altitude relativement basse.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Night = Les lectures du capteur de gravité fluctuent lorsqu'il passe au-dessus du côté nuit, particulièrement au-dessus des sommets gelés.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace = Vous prenez une lecture de la gravité locale au-dessus de Suluco.

		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Day = L'analyse de l'atmosphère du côté jour de Suluco révèle une humidité étonnamment élevée, probablement parce que l'air chaud peut retenir beaucoup d'humidité.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Twilight = L'air dans la zone crépusculaire est modérément humide. Parfait pour vivre ici. 
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Night = L'analyse de l'atmosphère du côté nuit de Suluco révèle une humidité extrêmement faible, probablement parce que la plupart de l'humidité dans l'air devient de la neige.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow = En raison des courants atmosphériques, l'air que l'analyseur atmosphérique capte pourrait provenir d'une partie complètement différente de la planète.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow_Day = L'analyseur atmosphérique détecte de petites concentrations de fines particules de sol, qui ont probablement été soulevées du sol par de forts courants ascendants.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow_Night = Des gouttelettes d'eau surfondue gèlent au contact de l'analyseur atmosphérique, obstruant ses orifices.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingHigh = La composition atmosphérique à haute altitude est bien plus uniforme.

		#LOC_KS_SciDef_magnetometer_SulucoHome_InSpace = Le bras du magnétomètre détecte un champ magnétique faible et uniforme autour de Suluco, qui protège probablement l'atmosphère de notre planète d'origine et nous permet de vivre ici. Ce champ magnétique est probablement créé par une géodynamo interne.


		//-------------EfilHome------------
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded = Peu importe par quelle fenêtre vous regardez, vos yeux sont ravis par de magnifiques paysages qui menacent de vous distraire de la mission en cours.
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Beach = Non, ne le faites pas ! Résistez à l'envie ! Nous avons une mission à accomplir !
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Mountains = Nous sommes sur une sacrée pente. Êtes-vous sûr que c'est sûr ?
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Forests = Le pare-brise semble couvert de restes d'insectes. Ça va être pénible à nettoyer.
		#LOC_KS_SciDef_crewReport_EfilHome_SrfSplashed = Le vaisseau se balance doucement d'avant en arrière dans les vagues. Vous pensez voir des poissons sous la surface. 
		#LOC_KS_SciDef_crewReport_EfilHome_FlyingLow = En regardant par la fenêtre, vous pouvez voir les magnifiques paysages sous vous.
		#LOC_KS_SciDef_crewReport_EfilHome_FlyingHigh = Même à cette altitude, vous pouvez encore distinguer les forêts luxuriantes à la surface d'Efil.
		#LOC_KS_SciDef_crewReport_EfilHome_InSpace = Vous êtes captivé par les vues d'Efil avec Anehta en arrière-plan. Ça ne peut vraiment pas être beaucoup mieux.

		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded = Prenez un moment pour apprécier à quel point notre maison est magnifique. Assurons-nous qu'elle le reste.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Beach = C'est le moment idéal pour aller nager !
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Mountains = Vous admirez les vues époustouflantes du terrain autour de vous.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Forests = C'est si...... beau ici ! Qu'est-ce que c'est ? Non, je ne pleure pas. Je transpire juste par les yeux.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Water = D'accord, très bien. Vous pouvez aller nager. Juste ne vous éloignez pas trop du vaisseau.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfSplashed = Il fait beau. Je ne peux pas vous en vouloir d'aller nager.
		#LOC_KS_SciDef_evaReport_EfilHome_FlyingLow = C'est certainement une situation des plus précaires.
		#LOC_KS_SciDef_evaReport_EfilHome_FlyingHigh = Wheeeeeeeeeee !
		#LOC_KS_SciDef_evaReport_EfilHome_InSpace = Vous êtes incapable de détourner votre attention du monde absolument magnifique sous vous. Vous êtes très reconnaissant d'appeler cet endroit votre maison.

		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded = Vous prenez un échantillon du sol sur Efil.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Beach = Vous prenez un échantillon de la plage, puis le laissez tomber immédiatement en réalisant que vous avez un gant plein de crabes des sables !
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Grassland = Vous prenez un échantillon des herbes qui couvrent la surface. Elles semblent très saines.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Desert = Vous prenez un échantillon du sable du désert. Il est très fin mais étonnamment pas si sec.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Tundra = Vous prenez un échantillon du sol gelé sous vous. Même ici, il y a encore une quantité modeste de flore qui pousse.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Mountains = Vous prenez une petite roche des montagnes. Elle est très lisse, probablement à cause de l'érosion par la fonte des neiges.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Forests = Vous prenez un échantillon du sol forestier, en ramassant une petite quantité de flore. Vous vous rappelez à quel point votre maison est luxuriante et belle.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfSplashed = C'est de l'eau. Qu'attendiez-vous d'autre ?

		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfLanded = Le Goo semble s'ennuyer.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfLanded_Beach = Le Goo rebondit de façon excitée dans son conteneur.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfSplashed = Le Goo s'échappe dans l'eau !
		#LOC_KS_SciDef_mysteryGoo_EfilHome_Flying = Le Goo gigote de façon excitée alors que le vaisseau vole dans les airs.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_InSpace = Le Goo se sent comme chez lui ici. 

		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded = RnD dit que les échantillons dans ce truc sont connus pour attirer la flore et la faune, mais qu'est-ce qu'ils en savent ?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Grassland = Plusieurs échantillons ont des mauvaises herbes qui poussent. Quelqu'un a-t-il laissé tomber des graines par hasard ?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Beach = Vous ouvrez la baie de matériaux pour étudier les échantillons, pour découvrir une rave de crabes des sables en cours à l'intérieur. Malheureusement, il semble que les échantillons soient devenus des rafraîchissements. *soupir.*
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Forests = L'intérieur de la baie de matériaux est devenu un biome à part entière. Il y a des fleurs et des jeunes pousses qui poussent dans les échantillons !
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfSplashed = Vous regardez avec horreur un groupe de crevettes nager dans la baie de matériaux et dévorer tous les échantillons. Ces trucs n'étaient pas bon marché, stupides crustacés !
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_Flying = Plusieurs échantillons se sont détachés de leurs supports et ont transformé l'intérieur de la baie de matériaux en œuvre d'art moderne. Combien pensez-vous qu'on pourrait en tirer aux enchères ?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_InSpace = La structure cristalline des échantillons a changé à cause de l'environnement en microgravité. Je me demande comment ils réagiront sur d'autres mondes.

		#LOC_KS_SciDef_temperatureScan_EfilHome_SrfLanded = Il semble que peu importe où vous êtes, la température est vivable. Un rappel de l'unicité de votre monde d'origine.
		#LOC_KS_SciDef_temperatureScan_EfilHome_SrfSplashed = La température de l'eau est agréable et fraîche. Hé, non ! Ça ne veut pas dire que vous pouvez aller nager !
		#LOC_KS_SciDef_temperatureScan_EfilHome_InSpace = Le thermomètre affiche zéro. Normal, nous sommes dans l'espace.

		#LOC_KS_SciDef_barometerScan_EfilHome_SrfLanded = La pression atmosphérique sur votre monde d'origine est plus basse que ce à quoi vous êtes habitué, mais reste bien dans la plage confortable.
		#LOC_KS_SciDef_barometerScan_EfilHome_SrfSplashed = L'eau pénètre dans les orifices du baromètre, les obstruant et rendant l'appareil inutilisable.
		#LOC_KS_SciDef_barometerScan_EfilHome_InSpace = Le baromètre affiche zéro ! Nous devons être dans l'espace !

		#LOC_KS_SciDef_seismicScan_EfilHome_SrfLanded = Le sismomètre enregistre des informations sur l'activité sismique d'Efil, donnant un aperçu de la structure interne de notre maison.

		#LOC_KS_SciDef_gravityScan_EfilHome_SrfLanded = Le capteur de gravité affiche une valeur bien plus élevée qu'il ne devrait. On dirait qu'il pourrait avoir besoin d'être recalibré. 
		#LOC_KS_SciDef_gravityScan_EfilHome_SrfSplashed = Le capteur de gravité court-circuite lorsque l'eau pénètre à l'intérieur.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Water = Le capteur de gravité détecte de brefs changements dans la gravité locale au-dessus de l'océan, probablement dus à l'influence d'Anehta et des autres lunes du système.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Beach = La lecture du capteur de gravité s'aplatit lorsqu'il passe au-dessus de la plage.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Grassland = La lecture du capteur de gravité s'aplatit lorsqu'il passe au-dessus des prairies tout aussi plates.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Desert = Le capteur de gravité s'aplatit lorsqu'il passe au-dessus du désert. 
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Tundra = La toundra sous vous fait que le capteur de gravité fait une brève pointe.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Mountains = Le capteur de gravité suit le relief des montagnes en dessous, entraînant de petits mais très notables changements dans la lecture de la gravité locale.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Forests = Le capteur de gravité crache des absurdités. Il semble incapable de gérer la quantité massive de végétation en dessous.

		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded = L'instrument effectue son analyse de l'atmosphère d'Efil.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Water = L'instrument est inondé d'eau et devient inutilisable.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_TropicalDesert = Malgré le fait que ce soit un désert, l'air ici est inhabituellement humide.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_ColdDesert = L'air ici est froid et très sec.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Mountains = L'air dans les montagnes est froid et sec en raison de l'altitude. Ça semble être un endroit amusant pour faire une randonnée.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Forests = L'analyseur atmosphérique ne semble rien enregistrer du tout. Vous voyez alors un gros insecte s'envoler d'un des orifices.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Beach = L'air ici est très humide, probablement parce que nous sommes juste à côté d'une grande étendue d'eau.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_FlyingLow = La basse atmosphère d'Efil est encore très vivable.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_FlyingHigh = Il y a très peu d'atmosphère à ces altitudes. 

		#LOC_KS_SciDef_magnetometer_EfilHome_InSpace = Le bras du magnétomètre détecte un champ magnétique fort et très légèrement fluctuant, probablement dû à l'influence d'Anehta à proximité.

		//-------------RouqeaHome------------
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded = Qu'est-ce que vous faites ici ?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_KSC = Qui vit dans un centre spatial sous la mer ?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_Runway = Sérieusement, pourquoi faites-vous ça ? N'avez-vous pas assez souffert ?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_Launchpad = Pourquoi vous faites-vous ça ?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfSplashed = Vous n'êtes pas obligé de faire ça, vous savez.
		#LOC_KS_SciDef_crewReport_RouqeaHome_FlyingLow = Il n'est pas trop tard pour faire demi-tour.
		#LOC_KS_SciDef_crewReport_RouqeaHome_FlyingHigh = Est-ce que je me fais comprendre ?
		#LOC_KS_SciDef_crewReport_RouqeaHome_InSpaceLow = D'accord, vous êtes arrivé dans l'espace. Bravo, je suppose ?
		#LOC_KS_SciDef_crewReport_RouqeaHome_InSpaceHigh = Très bien, vous êtes arrivé jusqu'ici. Autant aller jusqu'au bout et visiter une autre planète.

		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded = Veuillez consulter un médecin.
		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded_Runway = Pourquoi me donnerais-je la peine de vous dire que c'est une mauvaise idée ?
		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded_Launchpad = Veuillez faire examiner votre tête. Ce n'est pas un comportement normal.
		#LOC_KS_SciDef_evaReport_RouqeaHome_FlyingLow = Assurez-vous de vous accrocher pour la vie.
		#LOC_KS_SciDef_evaReport_RouqeaHome_FlyingHigh = Le fait que vous ayez pensé que c'était une bonne idée signifie que vous êtes soit stupide, soit fou, soit les deux.

		#LOC_KS_SciDef_mysteryGoo_RouqeaHome_SrfLanded_LaunchpadRunwayKSC = Vous savez que vous êtes fou quand même le MYSTERY GOO semble sain d'esprit à côté de vous.


		// ******************************** DMagic Science Definitions ********************************

		// Kcalbeloh
		#LOC_KS_SciDef_dmMagScan_Kcalbeloh_SrfLanded = Le bras est des spaghettis. Vous êtes des spaghettis. Tout est des spaghettis ! Qu'est-ce qui se passe ?!?! POURQUOI Y A-T-IL TANT DE PÂTES ?!?!
		#LOC_KS_SciDef_dmMagScan_Kcalbeloh_InSpaceHigh = À une telle distance de Kcalbeloh, il y a très peu d'activité à signaler. C'est beaucoup comme l'espace interplanétaire, ou même interstellaire.

		#LOC_KS_SciDef_rpwsScan_Kcalbeloh_InSpaceLow = Les ondes radio et les particules ionisées du disque d'accrétion endommagent les détecteurs, provoquant une défaillance aiguë de tous ses systèmes. C'est probablement réparable, cependant... probablement.
		#LOC_KS_SciDef_rpwsScan_Kcalbeloh_InSpaceHigh = De faibles émissions radio peuvent être détectées provenant du lointain Kcalbeloh, mais à part Maelg, toutes les autres étoiles produisent bien plus d'activité.

		#LOC_KS_SciDef_scopeScan_Kcalbeloh_InSpaceLow = L'interne qui regarde le flux du télescope devient brièvement assez excité quand il repère la prétendue « singularité » - il s'avère que les forces intenses ont fissuré la lentille et créé un point lumineux au centre.
		#LOC_KS_SciDef_scopeScan_Kcalbeloh_InSpaceHigh = Le disque d'accrétion de Kcalbeloh est capturé avec des détails époustouflants par l'instrument, et une analyse plus rapprochée révèle que les bords du disque sont légèrement décalés vers le rouge et le bleu.

		#LOC_KS_SciDef_dmImagingPlatform_Kcalbeloh_InSpaceLow = Bien que les capteurs soient théoriquement capables d'analyser le disque d'accrétion depuis cette distance sans que la lumière ne cause de dommages, ils ne le peuvent pas, car ils sont désespérément déformés par les forces intenses en jeu.
		#LOC_KS_SciDef_dmImagingPlatform_Kcalbeloh_InSpaceHigh = L'analyse multispectrale confirme que les deux extrémités du disque d'accrétion sont subtilement décalées vers le rouge et le bleu. La composition du disque, quant à elle, semble être principalement de l'hydrogène et de l'hélium, confirmant qu'il est constitué de masse d'au moins une étoile que Kcalbeloh a dévorée il y a plusieurs millions d'années.

		#LOC_KS_SciDef_dmSIGINT_Kcalbeloh_InSpaceLowNorthernHemisphere = En étudiant la télémétrie, vous entendez les sons de... un banjo ? Puis un harmonica, une voix qui siffle, un tambour, une flûte et un piano. Ça sonne... sentimental, nostalgique même. Puis vous vous réveillez, et la chanson a disparu. Était-ce un rêve ?
		#LOC_KS_SciDef_dmSIGINT_Kcalbeloh_InSpaceLowSouthernHemisphere = Le disque d'accrétion de Kcalbeloh émet constamment des ondes radio intenses, bien que cet instrument ne soit pas assez sensible pour détecter le rayonnement Kerman.

		#LOC_KS_SciDef_dmSolarParticles_Kcalbeloh_InSpaceLow = Les particules à haute énergie grillent complètement le concentrateur d'ions actif et détruisent les plaquettes sensibles des collecteurs passifs. Bravo, génie.
		#LOC_KS_SciDef_dmSolarParticles_Kcalbeloh_InSpaceHigh = Le « vent holaire » du disque d'accrétion dépose des particules ionisées dans les collecteurs, mais il y a aussi des traces très faibles provenant de plusieurs autres directions, probablement des étoiles les plus massives du système Kcalbeloh.

		#LOC_KS_SciDef_dmSoilMoisture_Kcalbeloh_InSpaceLow = D'accord. Qui est le comique qui a ajouté un capteur pour détecter l'eau via les émissions micro-ondes à la mission TROU NOIR ? Je veux des noms !

		#LOC_KS_SciDef_dmRadiometerScan_Kcalbeloh_InSpaceHigh = Bien que l'horizon des événements lui-même ait un albédo précisément nul, le disque d'accrétion émet de la lumière dans toutes les longueurs d'onde enregistrées, comme une étoile. Cependant, il est considérablement plus faible que la plupart des étoiles.

		// Onrefni
		#LOC_KS_SciDef_dmMagScan_Onrefni_SrfLanded = Le champ magnétique de surface d'Onrefni est assez fort, surtout pour un corps si petit. Son noyau est probablement proportionnellement énorme, et fortement brassé - pétri, même - par l'immense attraction gravitationnelle de Kcalbeloh.
		#LOC_KS_SciDef_dmMagScan_Onrefni_SrfSplashed = Beaucoup ont spéculé que si nous savions pourquoi le magnétomètre a envoyé le message « oh non, pas encore ! » en fondant dans la lave sur une blanète orbitant de près un trou noir supermassif, nous en saurions bien plus sur la nature de l'univers qu'actuellement.

		#LOC_KS_SciDef_rpwsScan_Onrefni_InSpaceLow = Même avec une magnétosphère puissante, Onrefni ne peut guère empêcher le prétendu « vent holaire » de balayer sa surface.
		#LOC_KS_SciDef_rpwsScan_Onrefni_InSpaceHigh = Le « vent holaire » de Kcalbeloh souffle fort ici. On pourrait presque l'entendre hurler, sauf que l'espace ne fonctionne pas comme ça, bien sûr. Mais le silence rend sans doute toute la scène encore plus inquiétante...

		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowLava = La roche noire comme la nuit contraste fortement avec les traînées rouge-orange vif de lave brûlante, s'écoulant à travers les fissures de la surface d'Onrefni. On se demande combien de temps encore cela peut durer.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowDay = De profondes fissures couvrent la surface d'Onrefni, surtout du côté jour. On dirait qu'une entité colossale l'a frappé et a brisé la moitié de la surface.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowNight = Des fissures sillonnent encore la face sombre d'Onrefni, mises en évidence par le disque d'accrétion brillamment illuminé de Kcalbeloh.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowCraters = Les bords des cratères d'Onrefni scintillent dans la lumière sinistre du disque d'accrétion. On se demande ce qui a créé ces formations - se sont-ils retrouvés près de Kcalbeloh, ou Onrefni a-t-il été projeté ici dans le passé, portant déjà ces cicatrices ?
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceHigh = Ce que vous voyez devant vous est l'image même de la beauté dans la désolation. Onrefni est un monde au bord de la destruction, et pourtant malgré être un petit rocher sans air avec rien d'autre que l'ouragan cosmique tourbillonnant qui l'entoure, la surface apocalyptique de la blanète est absolument captivante.

		#LOC_KS_SciDef_dmImagingPlatform_Onrefni_dmImagingPlatform_Onrefni_InSpaceLow = L'analyse multispectrale n'indique aucune trace d'atmosphère, et une surface dominée par des silicates riches en métaux. Très probablement, cette surface est une fine couche au-dessus d'une blanète qui n'est presque rien d'autre qu'un noyau métallique dense.
		#LOC_KS_SciDef_dmImagingPlatform_Onrefni_dmImagingPlatform_Onrefni_InSpaceHigh = L'imagerie thermique indique que, malgré le verrouillage tidal, Onrefni est brûlant des deux côtés. Le côté jour n'est probablement pas beaucoup réchauffé par la lumière de toute façon ; c'est la gravité de Kcalbeloh qui fait ça.

		#LOC_KS_SciDef_dmSIGINT_Onrefni_InSpaceLow = Onrefni ne semble pas avoir changé du tout l'environnement radio ; l'activité constante du disque d'accrétion reste inchangée ici.

		#LOC_KS_SciDef_dmNAlbedoScan_Onrefni_SrfLanded = Il est difficile d'obtenir une lecture précise avec tous les neutrons qui volent dans tous les sens, mais la surface d'Onrefni est recouverte d'atomes d'hydrogène. Ce n'est certainement pas de l'eau, mais plutôt des dépôts du « vent holaire » intense et du contact direct avec le disque d'accrétion.

		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfLanded = La surface d'Onrefni s'avère extrêmement résistante à vos tentatives de la vaporiser avec un laser. Le peu qui se vaporise effectivement confirme seulement que la composition est principalement de la roche ignée, et de la roche très résistante à la chaleur. Ça colle.
		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfLandedLava = Donc votre plan est de faire fondre la lave avec un laser ? D'accord, parions.
		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfSplashed = Tout va bien. Je suis d'accord avec les événements qui se déroulent actuellement.

		#LOC_KS_SciDef_dmSolarParticles_Onrefni_InSpace = Les particules à haute énergie s'avèrent tout aussi dangereuses pour le collecteur qu'elles l'étaient quand nous n'étions pas près d'Onrefni.

		#LOC_KS_SciDef_dmSoilMoisture_Onrefni_InSpaceLow = Euh... Oui. Oui, cette blanète a définitivement des dépôts d'eau souterrains. Bien sûr...

		#LOC_KS_SciDef_dmRadiometerScan_Onrefni_InSpaceHigh = En raison de sa surface sombre, Onrefni a un albédo très faible qui réfléchit très peu de lumière dans toutes les longueurs d'onde.

		#LOC_KS_SciDef_dmseismicHammer_Onrefni_SrfLanded = Onrefni résonne très facilement, confirmant presque la présence de son noyau métallique massivement disproportionné.

		#LOC_KS_SciDef_dmbathymetryscan_Onrefni_SrfSplashed = Désactivez « Ignorer la température max », espèce de lâche !

		// Rouqea
		#LOC_KS_SciDef_dmMagScan_Rouqea_SrfLanded = Le bras n'était manifestement pas conçu pour ce genre de pression, et des parties semblent s'être froissées.
		#LOC_KS_SciDef_dmMagScan_Rouqea_SrfSplashed = Le champ magnétique de la surface de Rouqea est un peu plus fort qu'en orbite, mais il reste faible. Étant donné sa proximité avec Kcalbeloh, les forces de marée devraient agiter le noyau. Peut-être qu'il n'a pas de noyau métallique du tout ?

		#LOC_KS_SciDef_rpwsScan_Rouqea_InSpaceHigh = Le vent du trou noir provenant du disque d'accrétion de Kcalbeloh produit des interactions intéressantes avec l'atmosphère dense de Rouqea, mais elles ne sont pas vraiment si spéciales par rapport à ce que nous avons vu auparavant.
		#LOC_KS_SciDef_rpwsScan_Rouqea_InSpaceLow = L'atmosphère épaisse et la surface humide de Rouqea produisent beaucoup d'activité radio fascinante. C'est vraiment un monde extraterrestre !

		#LOC_KS_SciDef_scopeScan_Rouqea_InSpaceHigh = Blue, blue.
		#LOC_KS_SciDef_scopeScan_Rouqea_InSpaceLow = Euh. De l'eau. Et... il y a de l'eau par là-bas, et... Oh, regardez ça ! C'est de l'eau.

		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceHigh = L'analyse multispectrale de l'atmosphère de Rouqea confirme qu'elle est majoritairement composée d'azote, mais il y a aussi pas mal d'oxygène. C'est intéressant, pourrait-il y avoir de la vie sur Rouqea ?
		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceLow = L'examen de la surface de Rouqea dans la plupart des spectres ne révèle pas grand-chose sous la surface. L'eau semble assez profonde.
		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceLowHighlands = L'analyse de cette région des océans de Rouqea révèle quelque chose de surprenant ; par endroits l'eau semble n'avoir que 100 m de profondeur !

		//Non-Hellswitch Rouqea Only
		#LOC_KS_SciDef_dmSIGINT_Rouqea_InSpaceLow = Bien que l'atmosphère et les océans turbulents de Rouqea produisent beaucoup d'activité radio intéressante, rien ne suggère une présence intelligente en bas.

		//Rouqea Hellswitch Only
		#LOC_KS_SciDef_dmSIGINT_RouqeaHome_InSpaceLow = Malheureusement, à cette altitude le dernier match de headball est trop brouillé pour être apprécié, la transmission devant traverser tant d'eau et d'atmosphère pour atteindre l'espace.

		#LOC_KS_SciDef_dmNAlbedoScan_Rouqea_SrfSplashed = ...Oui, c'est de l'eau.
		#LOC_KS_SciDef_dmNAlbedoScan_Rouqea_SrfLanded = Malheureusement, l'instrument semble s'être écrasé sous la pression d'eau absurde. Nous ne saurons peut-être jamais si Rouqea abrite de l'eau.

		#LOC_KS_SciDef_dmlaserblastscan_Rouqea_SrfSplashed = L'analyse laser confirme que le liquide est de l'eau. Ça semble assez évident, mais c'est toujours bon de vérifier.
		#LOC_KS_SciDef_dmlaserblastscan_Rouqea_SrfLanded = L'analyse laser confirme que le solide est... de l'eau ? Attendez, c'est de la glace d'eau ? Mais il fait si chaud... Est-ce de la glace exotique ? C'est mon type de glace préféré ! Génial.

		#LOC_KS_SciDef_dmSolarParticles_Rouqea_InSpaceHigh = Le « vent holaire » de Kcalbeloh semble être tout ce qu'il y a à cette altitude. Aucune preuve de ceintures de radiation Van Kerman n'est détectée.
		#LOC_KS_SciDef_dmSolarParticles_Rouqea_InSpaceLow = Près de Rouqea, le collecteur capte de la vapeur d'eau en plus de l'azote et de l'oxygène - mais le vent du trou noir de Kcalbeloh est encore fort.

		#LOC_KS_SciDef_dmSoilMoisture_Rouqea_InSpaceLow = De l'eau ? Oui !

		#LOC_KS_SciDef_dmRadiometerScan_Rouqea_InSpaceHigh = Bien que belle dans le spectre visible, la surface océanique de Rouqea a un albédo plutôt faible - et son atmosphère dense absorbe la plupart des longueurs d'onde non visibles.

		#LOC_KS_SciDef_dmseismicHammer_Rouqea_SrfSplashed = Euh... Plouf ? Vous n'êtes pas sûr de ce que vous attendiez.
		#LOC_KS_SciDef_dmseismicHammer_Rouqea_SrfLanded = Malheureusement, même à cette profondeur il n'y a pas beaucoup de données à collecter, car les capteurs sont lamentablement hors de leur élément et flottent probablement sur les vagues énormes au-dessus. Les capteurs locaux vous indiquent au moins que les environs immédiats semblent résonner comme on s'attendrait de la glace exotique.

		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedGenericShallow = Rien que de l'eau sur des kilomètres dans toutes les directions, y compris vers le bas. Les scans de l'eau elle-même ne révèlent aucun composé organique.
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedGenericDeep = Même bien en dessous de la surface, tout ce que vous voyez c'est de l'eau. Malgré la présence d'oxygène dans l'atmosphère au-dessus, il n'y a aucun signe de vie, même au niveau microscopique.
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedHighlandsShallow = Le scanner détecte en fait des signes d'une surface solide en dessous ! Plongeons plus profond !
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedHighlandsDeep = Vous pouvez en fait voir une surface solide à cette profondeur ! Malgré cela, tous les signes indiquent que Rouqea est totalement sans vie.

		#LOC_KS_SciDef_dmbiodrillscan_Rouqea_SrfLanded = La foreuse trouve principalement de l'eau et des traces d'autres éléments, mais aucun signe d'activité biologique. Il est probable que la source de l'oxygène de Rouqea soit de nature géologique.

		// Iomena
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLanded = Iomena a un champ magnétique de surface appréciable qui se déforme fortement selon l'emplacement, mais même dans les parties les plus calmes il reste un flux constant d'activité. C'est probablement un véritable champ magnétique produit par un effet géodynamo.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedHighlands = L'activité magnétique à cet endroit est en fait un peu plus faible ici, peut-être à cause du relief surélevé réduisant la densité des minerais magnétiques dans la croûte.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedMountainsAll = Le champ magnétique se renforce ici, peut-être à cause de matériau magnétisé remonté à la croûte depuis les profondeurs d'Iomena.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedCraters = Des régions isolées d'activité magnétique intense suggéreraient que l'impacteur a dispersé des minerais magnétiques à l'atterrissage.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedCanyonsAll = Certaines lignes de champ magnétique longent les parois du canyon, confirmant la présence de matériaux magnétiquement actifs.

		#LOC_KS_SciDef_rpwsScan_Iomena_InSpaceLow = À cette distance de Kcalbeloh, le « vent holaire » est nettement plus faible, malgré être encore assez proche du disque d'accrétion.
		#LOC_KS_SciDef_rpwsScan_Iomena_InSpaceHigh = Le flux du vent du trou noir provenant du disque d'accrétion de Kcalbeloh est parfois interrompu par des traces de particules chargées soufflées par la fine atmosphère d'Iomena.

		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowGeneric = Les champs désolés de roches bleu-gris ont une beauté surprenante. La vue en surface est probablement assez spectaculaire, surtout avec Kcalbeloh en arrière-plan.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowMountainsAll = Les pics d'Iomena se distinguent, car la plupart sont givrés d'une sorte de substance brillante. Ce n'est probablement pas de la glace d'eau, cependant...
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowCanyonsAll = Ces canyons ont l'air assez spectaculaires en effet. Mais l'atmosphère est-elle assez épaisse pour voler à travers ? Nous devons le découvrir, tout de suite !
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowCraters = Les rives glacées des cratères inondés d'Iomena doivent être à couper le souffle. Même depuis l'espace, elles ont une certaine beauté solitaire.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowOceans = Quoi que soit ce truc, ce n'est probablement pas de l'eau. Les conditions devraient être bonnes pour l'ammoniac liquide en surface, donc si nous atterrissons là, SOUVENEZ-VOUS de ne pas en boire.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceHigh = De loin, les traits gris ternes d'Iomena montrent des signes clairs d'écoulement liquide passé et présent en surface ; bien qu'à cette distance de Kcalbeloh, il fait probablement trop froid pour l'eau liquide.

		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowGeneric = À en juger par l'analyse multi-spectrale, la surface bleu-gris d'Iomena semble être un mélange assez standard de divers minéraux silicatés et d'ammoniac.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowWater = Ce liquide est à la bonne température pour être de l'ammoniac, selon les lectures IR.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowMountainsAll = La signature IR indique que la substance brillante couvrant les montagnes d'Iomena est probablement de la glace d'ammoniac.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceHigh = L'atmosphère fine d'Iomena contient principalement de l'ammoniac, bien que les lectures suggèrent des traces de méthane et de dioxyde de carbone. Ces traces pourraient être une biosignature - cela mérite une étude plus approfondie !

		#LOC_KS_SciDef_dmSIGINT_Iomena_InSpaceLow = La seule activité radio ici, outre le « vent holaire » de Kcalbeloh, est produite par les interactions entre celui-ci et la fine atmosphère d'Iomena.

		#LOC_KS_SciDef_dmNAlbedoScan_Iomena_SrfLanded = La surface d'Iomena est universellement saturée d'hydrogène ; cependant, la grande majorité ne semble pas être de l'eau. Il est plus probable que ce soit de l'ammoniac, et potentiellement des composés organiques.

		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedGeneric = Les scans du panache créé en vaporisant la surface indiquent plusieurs silicates riches en fer, tous fortement saturés d'ammoniac.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedOceans = Ce sol humide a été imbibé d'ammoniac liquide, selon notre analyse. Il y a aussi des hydrocarbures simples dans le sol.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfSplashed = Le soufflage du liquide confirme l'absence quasi totale d'eau ; à la place, seuls l'ammoniac et les hydrocarbures à chaîne courte sont détectés.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedMountainsAll = La substance blanche brillante couvrant ce sommet de montagne semble être de la glace d'ammoniac.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedCanyonsAll = Des roches riches en fer sont trouvées ici, ayant peut-être chuté des parois du canyon.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedLowlands = Les régions basses d'Iomena rassemblent probablement les roches les plus denses et riches en fer au fil du temps. Cela expliquerait la très haute teneur en fer du sol ici.

		#LOC_KS_SciDef_dmSolarParticles_Iomena_InSpaceLow = Des traces d'ammoniac s'incrustent dans les collecteurs, mais à part ça il n'y a pas grand-chose d'autre ici. Même le « vent holaire » a disparu.
		#LOC_KS_SciDef_dmSolarParticles_Iomena_InSpaceHigh = Le « vent holaire » de Kcalbeloh est déjà assez faible à cette distance, car même avec sa taille immense, il n'émet pas autant que la plupart des étoiles. 

		#LOC_KS_SciDef_dmSoilMoisture_Iomena_InSpaceLow = Les faibles émissions micro-ondes aident à corroborer l'hypothèse que la surface d'Iomena est dominée par l'ammoniac, pas l'eau.

		#LOC_KS_SciDef_dmRadiometerScan_Iomena_InSpaceHigh = La surface principalement grise d'Iomena produit un albédo globalement faible, et son atmosphère absorbe la plupart des longueurs d'onde visibles selon un schéma indiquant de grandes quantités de gaz ammoniac.

		#LOC_KS_SciDef_dmseismicHammer_Iomena_SrfLandedRocky = La roche ici résonne bien, donnant aux capteurs une image claire de la structure intérieure d'Iomena. Il y a de grandes cavernes souterraines, probablement érodées par l'écoulement d'ammoniac liquide - et la plupart de la croûte semble être de composition rocheuse. Il y a étonnamment peu de glace d'eau.
		#LOC_KS_SciDef_dmseismicHammer_Iomena_SrfLandedWet = Le sol humide (d'ammoniac liquide) et mou ici n'est pas particulièrement bon pour transmettre les ondes sismiques. Alors... Quoi, vous avez pris ce marteau et vous êtes immédiatement allé chercher le sol le plus mou que vous pouviez trouver ? Allez ailleurs, Iomena est assez rocheux.

		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedOceansShallow = Le liquide est définitivement de l'ammoniac, mais il y a aussi une concentration notable de molécules organiques complexes. Celles-ci pourraient avoir plusieurs origines potentielles - dont une est effectivement de nature biologique. Nous devrions aller plus profond !
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedOceansDeep = La caméra montre une cheminée hydrothermale... ou... comme on appelle ça dans l'ammoniac. Quoi qu'il en soit, elle crache de la fumée noire, indiquant une certaine activité volcanique actuelle sur Iomena. La vraie découverte est dans l'échantillon d'ammoniac - de nouveaux hydrocarbures continuent de se former, et un microscope révèle de minuscules organismes métabolisant le contenu du panache de fumée !
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedCraterLakesShallow = Des molécules organiques complexes flottent sur le lac d'ammoniac et suggèrent l'existence potentielle de vie sur Iomena, malgré le froid et l'environnement toxique. Si quelque chose vit ici, il trouverait probablement notre maison bien trop chaude.
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedCraterLakesDeep = La partie la plus profonde de ce lac révèle une formation continue d'hydrocarbures dans la région la plus profonde et la plus chaude de la planète. Des composés de soufre et de phosphore dérivent également dans l'eau, impliquant une activité volcanique limitée ailleurs. Un examen plus approfondi au microscope confirme nos soupçons - les micro-organismes utilisent effectivement les volatils et les convertissent en hydrocarbures !

		#LOC_KS_SciDef_dmbiodrillscan_Iomena_SrfLandedRocky = La roche ici contient des traces de matière organique, mais il n'y a pas d'autres signes d'activité biologique.
		#LOC_KS_SciDef_dmbiodrillscan_Iomena_SrfLandedWet = Une concentration substantielle de molécules organiques et d'éléments volatils - principalement soufre et phosphore - est détectée dans cet échantillon de carotte.

		// Uleg
		#LOC_KS_SciDef_dmMagScan_Uleg_SrfLanded = Même à sa surface, le champ magnétique d'Uleg est extrêmement faible.
		#LOC_KS_SciDef_dmMagScan_Uleg_InSpaceHigh = Aucun champ magnétique n'est détecté à cette altitude. Il est probable qu'Uleg manque d'un noyau fer-nickel, car son orbite extrême devrait lui faire subir des forces de marée significatives.

		#LOC_KS_SciDef_rpwsScan_Uleg_InSpace = L'environnement plasma radio varie considérablement selon la position d'Uleg sur son orbite. Près de l'apobeloh, c'est très calme. Mais au péribeloh, le « vent holaire » de Kcalbeloh peut être ressenti ; à peine.

		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowGeneric = La surface criblée de cratères d'Uleg rappelle un peu trop la glace biscuits et crème. Quand le public verra ces photos, ils vont saliver.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowCrater = Voilà un sacré cratère. Il est tellement érodé qu'il a fallu un moment pour l'identifier comme tel.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowRiftValleys = Ce canyon massif s'étend à travers la surface d'Uleg, formant un circuit géant jusqu'au pôle nord. Ce serait un parcours de course aérienne phénoménal, n'était l'atmosphère extrêmement fine. Maudit soit le destin ! Enfin... Peut-être que pour les VRAIS casse-cou, ça pourrait marcher. Il y a aussi la possibilité de courses au sol !
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowBasins = Le large bassin ouvert semble avoir un terrain très plat. Ce pourrait être un bon endroit pour construire une base, si ça vous tente. Mais avec l'orbite absurde d'Uleg, il y a probablement de meilleurs endroits. 
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowMountains = De minuscules montagnes parsèment la surface d'Uleg comme des miettes de cookie au chocolat dans un vaste océan de glace vanille. Zut, vous avez encore faim !
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceHigh = Cette blanète terne semble scintiller dans l'obscurité comme une boule de dessert irrésistible. Elle vous supplie pratiquement de vous approcher...

		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceLow = L'analyse de surface indique que la surface d'Uleg est principalement composée de glace d'eau.
		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceLowMountains = Les données des images des montagnes plus sombres d'Uleg montrent que la surface est encore de la glace d'eau. Il est probable qu'une structure cristalline différente explique sa couleur plus sombre.
		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceHigh = L'atmosphère fine d'Uleg semble être principalement composée d'azote selon l'analyse à large spectre, avec des quantités significatives de méthane et de dioxyde de carbone également.

		#LOC_KS_SciDef_dmSIGINT_Uleg_InSpaceLow = L'atmosphère fine et calme d'Uleg et sa distance par rapport à Kcalbeloh donnent un environnement radio plutôt peu intéressant.

		#LOC_KS_SciDef_dmNAlbedoScan_Uleg_SrfLanded = Le signal neutronique clair et basse énergie confirme que la majorité de la surface d'Uleg est faite de glace d'eau. Givré !

		#LOC_KS_SciDef_dmlaserblastscan_Uleg_SrfLandedGeneric = L'analyse chimique de la surface glacée d'Uleg montre que la plupart de la blanète est recouverte d'une fine couche de glace d'eau dure et fragile, avec une glace plus solide et plus sombre en dessous. Il y a aussi des traces de glace de méthane et de dioxyde de carbone dans ce revêtement de surface. Elle a peut-être été déposée ici par les vents glacés.
		#LOC_KS_SciDef_dmlaserblastscan_Uleg_SrfLandedMountainsCliffs = Cette région d'Uleg a une coloration plus sombre que le reste, mais l'analyse montre que la composition chimique est encore principalement de la glace d'eau, probablement d'une structure cristalline différente de la fine couche couvrant le reste de la surface.

		#LOC_KS_SciDef_dmSolarParticles_Uleg_InSpace = Si loin de Kcalbeloh, le « vent holaire » est très rare - et il l'est encore plus quand Uleg est haut sur son orbite. Cela signifie qu'il n'y a pas grand-chose pour le collecteur à traiter à part des traces de particules d'azote, probablement de l'atmosphère d'Uleg.

		#LOC_KS_SciDef_dmSoilMoisture_Uleg_InSpaceLow = Uleg est principalement composé d'eau selon les émissions micro-ondes, qui sont très fortes quelle que soit la région d'Uleg actuellement en dessous.

		#LOC_KS_SciDef_dmRadiometerScan_Uleg_InSpaceHigh = La surface d'Uleg a un albédo assez élevé partout dans les spectres visible et IR, cependant elle semble absorber fortement la lumière UV. Cela indique de grandes quantités de glace d'eau en surface.

		#LOC_KS_SciDef_dmseismicHammer_Uleg_SrfLanded = La surface fragile et glacée se fissure facilement à l'impact du marteau, mais les ondes se propagent encore assez bien. Les lectures indiquent un cryovolcanisme actif sur tout Uleg.

		#LOC_KS_SciDef_dmbiodrillscan_Uleg_SrfLanded = L'échantillon de carotte est plein de glace, de méthane et un peu de dioxyde de carbone, mais pas grand-chose d'autre. Il est peu probable que le méthane soit d'origine biologique.

		// Maelg
		#LOC_KS_SciDef_rpwsScan_Maelg_InSpaceLow = Malgré le fait que Maelg fusionne du deutérium et du lithium, il ne semble pas s'échapper de l'objet - ou du moins, pas en quantités significatives.
		#LOC_KS_SciDef_rpwsScan_Maelg_InSpaceHigh = En tant que naine brune, Maelg ne produit pas vraiment de vent solaire. Cependant, l'activité magnétique produit des lectures intéressantes.

		#LOC_KS_SciDef_scopeScan_Maelg_InSpaceLow = Pour ne pas être une étoile (techniquement), Maelg est assez brillant depuis cette distance. Heureusement, le télescope est livré avec des filtres. Il capture des images haute résolution des tempêtes orange déchaînées de Maelg ; comme une sorte de version folle de Jool en feu !
		#LOC_KS_SciDef_scopeScan_Maelg_InSpaceHigh = Le télescope peut facilement faire la mise au point sur Maelg sans dommage grâce à sa très faible luminosité, lui permettant de capturer des images très détaillées de l'objet substellaire.

		#LOC_KS_SciDef_dmImagingPlatform_Maelg_InSpace = L'analyse spectrale de Maelg corrobore la classification antérieure comme objet de type L, et montre des preuves claires de fusion du deutérium et du lithium en hélium-3 et hélium-4 respectivement. 

		#LOC_KS_SciDef_dmSIGINT_Maelg_InSpaceLow = Une véritable explosion d'émissions radio émane de Maelg en permanence, alors que son intérieur tourbillonne et s'écoule violemment.

		#LOC_KS_SciDef_dmSolarParticles_Maelg_InSpaceLow = Plusieurs isotopes d'hélium se déposent dans les collecteurs, mais loin d'autant qu'on en recevrait d'une vraie étoile.
		#LOC_KS_SciDef_dmSolarParticles_Maelg_InSpaceHigh = En tant que naine brune de type L, la fusion du deutérium et du lithium de Maelg ne produit pas de vent solaire détectable, et les collecteurs restent vides.

		#LOC_KS_SciDef_dmSoilMoisture_Maelg_InSpaceLow = Des émissions micro-ondes puissantes sont détectées, mais il est impossible qu'elles proviennent de dépôts d'eau, car Maelg est une NAINE BRUNE. Au cas où vous auriez oublié. Pas une planète, ni une étoile.

		#LOC_KS_SciDef_dmRadiometerScan_Maelg_InSpaceHigh = Maelg émet relativement peu de lumière dans les spectres visibles, mais est beaucoup plus visible dans la gamme IR. Quoi qu'il en soit, à cette distance ce n'est pas difficile à voir.

		// Mehtna
		#LOC_KS_SciDef_dmMagScan_Mehtna_SrfLanded = Le champ magnétique de Mehtna reste faible depuis la surface, bien qu'il soit facilement détectable.

		#LOC_KS_SciDef_rpwsScan_Mehtna_InSpace = Puisque l'atmosphère de Mehtna est assez calme, la planète manque d'un champ magnétique fort, et Maelg n'émet pas de vent solaire significatif, il y a à peine une activité à détecter ici.

		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowDay = Plusieurs caractéristiques intéressantes sont présentes dans l'« iris » brun foncé de Mehtna, formant des motifs uniques.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowIce = De magnifiques fissures complexes traversent la surface de Mehtna dans les régions éclairées, produisant des photos envoûtantes.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowNight = Hmm... Oui, c'est bien sombre.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowGrandCrater = La surface de Mehtna presque sans cratères rend cet énorme cratère une caractéristique assez frappante !
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceHigh = Le « pôle chaud » de Mehtna donne vraiment l'impression d'un globe oculaire, fixant toujours directement Maelg. C'est un peu flippant, en fait.

		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowDayGrandCrater = Les scans multispectraux de la surface plus sombre de Mehtna indiquent une surface principalement standard de silicates.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowIce = La substance blanche semble être de la glace d'eau, comme prédit par notre analyse antérieure de la température et de l'atmosphère de la planète. Aucun liquide n'est présent car la basse pression fait que l'eau se sublime directement en gaz.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowNight = Les scans IR montrent une surface désolée au « pôle froid » de Mehtna, couverte de cratères et principalement dépourvue des fissures vues du côté visible.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceHigh = L'analyse spectrale révèle que l'atmosphère de Mehtna est principalement du dioxyde de carbone et de la vapeur d'eau - cette dernière est probablement produite par la sublimation de la glace du côté jour.

		#LOC_KS_SciDef_dmSIGINT_Mehtna_InSpaceLow = Hmm... Rien que du silence radio provenant de Mehtna, malheureusement.

		#LOC_KS_SciDef_dmNAlbedoScan_Mehtna_SrfLandedRock = Les zones plus sombres de Mehtna sont, peut-être assez inattendument, principalement dépourvues de dépôts d'eau. C'est probablement parce qu'à ces températures et pressions, l'eau se sublime directement en gaz au lieu de devenir liquide.
		#LOC_KS_SciDef_dmNAlbedoScan_Mehtna_SrfLandedIce = La surface gelée ici produit un fort signal neutronique basse énergie, confirmant qu'il s'agit de glace d'eau.

		#LOC_KS_SciDef_dmlaserblastscan_Mehtna_SrfLandedRock = L'analyse laser dit plus de silicates. Youpi ! Ce n'est pas du tout ennuyeux ! Pas du tout...
		#LOC_KS_SciDef_dmlaserblastscan_Mehtna_SrfLandedIce = Tout ce qui concerne les propriétés de Mehtna, de sa température à son atmosphère, dit que ce ne pourrait être que de la glace d'eau. Je vous laisse deviner ce que montre l'analyse chimique.

		#LOC_KS_SciDef_dmSolarParticles_Mehtna_InSpace = L'espace près de Mehtna est très vide, comme en orbite de Maelg. Mais près de la planète, il y a des traces de dioxyde de carbone.

		#LOC_KS_SciDef_dmSoilMoisture_Mehtna_InSpaceLow = Les émissions micro-ondes rendent évident qu'une grande partie de Mehtna est couverte de glace d'eau, bien que même au-dessus des zones plus sèches face au soleil (face à la naine ?), un fond constant reste. Cela s'expliquerait bien par la vapeur d'eau dans l'atmosphère.

		#LOC_KS_SciDef_dmRadiometerScan_Mehtna_InSpaceHigh = La grande tache sombre de Mehtna et sa signature d'absorption UV confirment qu'elle est couverte de glace d'eau, et les spectres de son atmosphère suggèrent une composition majoritaire de dioxyde de carbone et de vapeur d'eau.

		#LOC_KS_SciDef_dmseismicHammer_Mehtna_SrfLanded = Les réflexions de subsurface montrent peu de preuves d'activité géologique sur Mehtna.

		#LOC_KS_SciDef_dmbiodrillscan_Mehtna_SrfLanded = L'échantillon de carotte reste décevamment, mais comme prévu, inerte.

		// Meiuqer
		#LOC_KS_SciDef_dmMagScan_Meiuqer_SrfLanded = Vous vérifiez le magnétomètre par principe. Rien, pas même des champs magnétiques localisés générés par des gisements de métal.

		#LOC_KS_SciDef_rpwsScan_Meiuqer_InSpace = Dans ce petit coin particulier de l'espace, il n'y a presque précisément rien pour l'instrument RPWS à détecter. Presque pas d'activité radio, pas de plasma solaire, rien. Mais vous le vérifiez quand même. Au cas où.

		#LOC_KS_SciDef_scopeScan_Meiuqer_InSpaceLow = Oh, c'est en fait une petite roche plutôt charmante. Tourbillonnante et brune, elle rappelle un trou de beignet couvert de sucre roux.
		#LOC_KS_SciDef_scopeScan_Meiuqer_InSpaceHigh = Mmmm.... Patates spatiales...

		#LOC_KS_SciDef_dmImagingPlatform_Meiuqer_InSpace = C'est une roche ! Je sais que c'est une roche ! Vous ne pensez pas que je reconnais une roche quand j'en vois une ? Je passe beaucoup de temps à fixer des photos de roches !

		#LOC_KS_SciDef_dmSIGINT_Meiuqer_InSpaceLow = Les roches n'émettent pas de signaux radio, idiot.

		#LOC_KS_SciDef_dmNAlbedoScan_Meiuqer_SrfLanded = Vous savez, quand je me suis inscrit pour superviser les missions spatiales, je m'attendais à voir beaucoup d'explosions. Pas à fixer une télémétrie ennuyeuse toute la journée.

		#LOC_KS_SciDef_dmlaserblastscan_Meiuqer_SrfLanded = im on ur rokc, lazrin ur rocks.

		#LOC_KS_SciDef_dmSolarParticles_Meiuqer_InSpace = Un instant, vous auriez juré que le collecteur de particules solaires ronflait.

		#LOC_KS_SciDef_dmSoilMoisture_Meiuqer_InSpaceLow = Aucune lecture micro-ondes, sauf celles du four à micro-ondes au centre spatial - l'interne qui surveille le flux réchauffe des nouilles épicées.

		#LOC_KS_SciDef_dmRadiometerScan_Meiuqer_InSpaceHigh = Meiuqer a un albédo très faible en raison de sa surface sombre, un fait aggravé par l'extrême pâleur de la lumière provenant de Maelg.

		#LOC_KS_SciDef_dmseismicHammer_Meiuqer_SrfLanded = En tant qu'astéroïde « tas de gravats » de faible densité, Meiuqer est maintenu ensemble très lâchement - et certains débris de l'impact ont sans doute atteint la vitesse de libération. Cela signifie aussi que vous n'avez obtenu aucune donnée utile.

		// Sunorc
		#LOC_KS_SciDef_dmMagScan_Sunorc_InSpaceLow = Le bras semble avoir du mal à maintenir son intégrité structurelle, car il est actuellement en train d'être converti en liquide.

		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceLow = De nombreuses taches solaires sont détectées par l'instrument lors de l'analyse des ondes radio émises par la surface de Sunorc.
		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceHigh = Cette étoile de type K émet des vents solaires puissants, comme la plupart des étoiles ont tendance à le faire. Les interactions avec la magnétosphère de Sedah sont notables, car les ondes radio émises par la planète sont plus faibles que prévu pour un objet de sa taille.

		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceLow = Eh bien, c'était un gaspillage d'argent. Vous venez peut-être de ruiner le télescope orbital.
		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceHigh = Espèce de fou ! Vous essayez de détruire le télescope ? Cet appareil est conçu pour la photographie planétaire !

		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceLow = Vous avez annulé la garantie.
		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceHigh = Eh bien, c'était une mauvaise idée. Les instruments sensibles se sont automatiquement éteints au moment où ils ont été braqués sur Sunorc, et ont peut-être été endommagés.

		#LOC_KS_SciDef_dmSIGINT_Sunorc_InSpaceLow = Comme la plupart des étoiles, Sunorc émet des ondes radio dans un large spectre. Les pics d'activité radio semblent correspondre à la formation et au mouvement des taches solaires.

		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceLow = La densité écrasante du vent solaire force l'appareil à s'éteindre, empêchant toute collecte de données utiles. Espérons qu'il n'est pas endommagé.
		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceHigh = Le vent solaire de Sunorc est typique pour une étoile, bien qu'il soit un peu plus faible qu'une étoile de type G comme Kerbol.

		#LOC_KS_SciDef_dmSoilMoisture_Sunorc_InSpaceLow = Il serait peut-être préférable de ne pas déployer d'équipement sensible pour détecter les émissions micro-ondes en orbite stellaire basse. Peut-être. Éventuellement.

		#LOC_KS_SciDef_dmRadiometerScan_Sunorc_InSpaceHigh = Sunorc émet beaucoup de lumière dans la plupart des longueurs d'onde enregistrées, cependant, en tant qu'étoile de type K (ou naine orange), elle émet considérablement moins de lumière bleue et UV qu'une étoile de type G (ou naine jaune) comme Kerbol. En raison de sa température plus basse, ces types d'étoiles peuvent vivre des milliards d'années de plus que les naines jaunes.

		// Sedah
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceLow = Le vent solaire frappe durement l'atmosphère gonflée de Sedah, produisant d'étranges signaux depuis l'intérieur de la planète. Cela suggère qu'un courant électrique traverse la planète, ce qui produirait beaucoup de chaleur interne et pourrait expliquer sa taille énorme. Il ne doit cependant pas être aussi puissant que prévu, car ce courant ne produit qu'un champ magnétique qui, bien que puissant, est un peu faible par rapport à Jool.
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceHigh = Le plasma énergisé bombarde Sedah, produisant un fascinant motif répétitif d'ondes radio qui devrait fournir aux chercheurs du laboratoire beaucoup de données à étudier.

		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceLow = Les photos en gros plan révèlent des nuages tourbillonnants et turbulents ainsi que d'énormes ouragans, certains assez grands pour avaler des planètes entières !
		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceHigh = La planète brille à cause de la chaleur intense de son atmosphère, faisant même briller faiblement le côté sombre.

		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceLow = La composition atmosphérique suggère que la planète aurait normalement pu avoir une coloration plus crème, mais grâce à la chaleur extrême elle brille d'un rouge terne.
		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceHigh = Sedah irradie la chaleur très intensément, ce qui lui fait émettre beaucoup plus de lumière infrarouge qu'une planète gazeuse ne le ferait normalement.

		#LOC_KS_SciDef_dmSIGINT_Sedah_InSpaceLow = Les émissions radio de Sedah sont extrêmement variées et immensément puissantes, probablement en raison des interactions complexes entre le vent solaire et ses propres processus internes.

		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceLow = Du côté nuit, des traces d'hydrogène et d'hélium sont détectées en orbite à travers l'énorme exosphère de Sedah. Du côté jour, le collecteur est bombardé de particules chargées du vent solaire.
		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceHigh = Pas grand-chose d'autre que le vent solaire n'est détecté ici, bien qu'il y ait de légères traces d'hydrogène et d'hélium ordinaires qui deviennent plus courantes en orbitant derrière Sedah.

		#LOC_KS_SciDef_dmSoilMoisture_Sedah_InSpaceLow = Les fortes émissions micro-ondes détectées en orbite de Sedah sont, sans aucun doute, produites par les mécanismes internes de la planète.

		#LOC_KS_SciDef_dmRadiometerScan_Sedah_InSpaceHigh = Une lecture thermique intense est enregistrée lors des scans de Sedah, même sur le côté nuit. Ceci est clairement causé par la température ridiculement élevée de la planète géante.

		// Suluco
		#LOC_KS_SciDef_dmMagScan_Suluco_SrfLanded = Suluco semble avoir un champ magnétique faible depuis la surface, ce qui signifie qu'il n'offre pas autant de protection contre le vent solaire qu'il serait idéal. Cependant, la vie sur la bande crépusculaire persiste malgré tout, car l'exposition au soleil y est de toute façon limitée.
		#LOC_KS_SciDef_dmMagScan_Suluco_InSpaceHigh = À cette distance, le champ magnétique de Suluco est très faible. Il ne semble pas s'étendre très loin au-dessus de la surface.

		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceHigh = La magnétosphère relativement faible de Suluco ne dévie pas beaucoup du vent solaire de Sunorc, mais elle semble faire suffisamment pour protéger la vie en surface.
		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceLow = L'analyse des ondes plasma indique un anneau diffus de particules chargées autour de l'équateur de Suluco ; signes d'une faible ceinture de Van Kerman.

		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceHigh = Bien qu'on l'appelle planète « œil », Suluco ne ressemble pas vraiment à un œil. Le contraste marqué entre son soi-disant « pôle chaud » et la bande crépusculaire est frappant, cependant.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDay = Le côté jour de Suluco est presque aveuglant de luminosité, et il semble sec comme un os. D'immenses mers de dunes de sable ondulantes caractérisent la région.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDayPole = Le point substellaire est aveuglant ; il réfléchit beaucoup de lumière et semble si chaud qu'on pourrait probablement y faire cuire des œufs. Même les nuages semblent avoir été vaporisés.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowNight = On ne voit rien.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowTwilight = Les étroites régions tempérées de Suluco ont des collines vertes ondulantes et des océans ouverts. Vous remarquez sur plusieurs photos que les nuages tournent autour des pôles jour et nuit, plutôt qu'autour de l'axe de rotation de la planète.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowWater = Les océans de Suluco sont confinés à une bande étroite le long du terminateur jour-nuit, tout comme la vie. Les courants océaniques dans ces régions sont différents de tout ce que les Kerbals ont jamais vu.

		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceHigh = Un scan complet de l'atmosphère de Suluco dans les spectres UV et IR révèle qu'elle est principalement composée d'azote et d'oxygène, comme prévu.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDay = Le côté jour de Suluco renvoie la lumière directement vers Sunorc, réfléchissant beaucoup de lumière dans les spectres UV et IR.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDayPole = Le point substellaire réfléchit de loin le plus de lumière solaire, provoquant une pointe notable dans les lectures IR.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowNight = L'imagerie infrarouge permet un regard plus clair sur le côté nuit de Suluco. La topographie est, curieusement, globalement similaire au côté jour, en ce sens qu'elle est largement dominée par des collines et des montagnes. Cependant, le côté nuit de Suluco est également couvert de cratères.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowTwilight = Les gaz traces détectés lors de l'analyse montrent des signes clairs d'activité biologique en cours dans la bande crépusculaire, bien qu'ils s'estompent avec le temps plus on s'éloigne vers le côté jour ou nuit.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowWater = L'imagerie thermique révèle la topographie sous-marine des océans de Suluco. Vu sa géographie inhabituelle, il y aura beaucoup à étudier ici.

		//Non-Homeswitch Suluco Only
		#LOC_KS_SciDef_dmSIGINT_Suluco_InSpaceLow = Le vent solaire produit une activité d'ondes radio légèrement intéressante, mais il n'y a vraiment rien d'extraordinaire.

		//Suluco Homeswitch Only
		#LOC_KS_SciDef_dmSIGINT_SulucoHome_InSpaceLow = Les scans radio captent des transmissions dispersées provenant de diverses colonies et structures en surface. Certains petits avant-postes sont même situés assez loin dans les deux hémisphères jour et nuit. Les Kerbals ne sont pas ici depuis si longtemps, mais en ce temps nous avons déjà commencé à faire de Suluco un chez-soi. Si vous syntonisez bien, vous pouvez même capter le dernier match de headball !

		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDay = Les traces d'hydrogène souterrain sont pratiquement inexistantes ici. Seules de minuscules traces existent dans les zones d'ombre permanente.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDayPole = Au point substellaire, la surface n'est pas sèche comme un os - au moins ceux-là ont un PEU d'eau. Le seul hydrogène ici semble consister en des traces déposées par le vent solaire constant.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDesert = Il y a un peu d'hydrogène dans cette région, indiquant de l'eau enfouie un peu sous la surface. C'est sec, mais survivable.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedNight = Selon les scans d'hydrogène... ou, euh, les scans visuels, la glace d'eau solide recouvre chaque surface du côté nuit. La neige glaciale souffle et s'écoule comme du sable dans les terres sans lumière.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedTwilight = Des concentrations très élevées d'hydrogène sont trouvées dans le sol de la bande crépusculaire, principalement de l'eau bien sûr. La majorité de l'eau liquide de la planète se trouve ici.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedWater = La surface extrêmement humide ici contient naturellement beaucoup d'hydrogène et absorbe la plupart des neutrons. Vous espérez ne pas polluer l'océan ou quelque chose comme ça.

		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedTwilight = Des composés carbonés du feuillage ainsi que plusieurs types de roche sont détectés dans les émissions.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDesert = Ce désert aride montre encore des signes clairs de vie, car vaporiser la couche supérieure de roche révèle de minuscules tunnels creusés par des insectes extraterrestres et les racines d'une herbe résistante.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDay = La surface décolorée par le soleil n'a pas de composant organique appréciable ; ce n'est que du sable et de la roche.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNight = Dans l'obscurité du côté nuit, seuls de la glace d'eau et des traces de divers minéraux sont trouvés. Même les montagnes sont recouvertes d'épaisses glaciers permanents aussi solides que la roche.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNightCraters = Ce cratère d'impact contient significativement plus de composés minéraux et de métaux à la surface que les pergélaciers environnants, provenant presque sûrement de l'impacteur qui a formé le cratère.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfSplashedWater = La vaporisation du fluide confirme qu'il s'agit bien d'eau, mais vous n'aviez sûrement pas besoin de cet instrument spécialisé pour le déterminer.

		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceLow = En plus du vent solaire quelque peu affaibli, des particules d'azote et d'oxygène de l'atmosphère de Suluco s'incrustent également dans les plaquettes.
		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceHigh = Le faible champ magnétique de Suluco fait peu pour empêcher le vent solaire d'impacter les plaquettes ; l'environnement ici n'est pas très différent de l'espace interplanétaire.

		#LOC_KS_SciDef_dmSoilMoisture_Suluco_InSpaceLow = Les émissions micro-ondes en bande L sont assez constantes sur la majeure partie de la surface de Suluco, cependant lorsque l'antenne passe au-dessus de l'hémisphère jour, les lectures chutent progressivement jusqu'à pratiquement zéro au-dessus du point substellaire.

		#LOC_KS_SciDef_dmRadiometerScan_Suluco_InSpaceHigh = L'albédo varie considérablement selon que le capteur voit davantage l'hémisphère jour ou la bande crépusculaire ; bien plus que pour la plupart des corps célestes.

		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedTwilight = Le sol mou absorbe une partie des ondes, mais donne quand même un aperçu de la variation géologique entre les côtés jour et nuit de Suluco.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedDay = Le côté jour sablonneux de Suluco est fantastique pour absorber les ondes sismiques, vous ne pouvez donc vraiment pas apprendre grand-chose ici. Peut-être auriez-vous plus de chance dans les montagnes ?
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedNight = La neige est densément compactée ici, rendant impossible d'obtenir quoi que ce soit d'utile des données. Les glaciers montagneux pourraient offrir plus d'informations.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsDayTwilight = La surface dure conduit bien les ondes sismiques, vous donnant amplement l'occasion d'étudier l'intérieur de Suluco. Il semble que Suluco soit encore assez géologiquement actif, bien que l'activité volcanique soit très rare.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsNight = Le glacier rocheux se reflète nettement à travers la croûte de Suluco, vous montrant des preuves de cavernes souterraines massives pouvant contenir de l'eau liquide et potentiellement des écosystèmes isolés !
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedWater = Le sol meuble réfléchit mal les ondes sismiques, vous n'obtenez donc pas beaucoup de données utiles.

		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterShallow = Les eaux crépusculaires peu profondes de Suluco abritent tout un bestiaire de vie microscopique et macroscopique ; mais aucune n'est plus fascinante que les « colonies » de plantes coloniales. Elles flottent en immenses tapis à la surface de l'océan, avec d'énormes voiles qui captent à la fois le vent et le soleil.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterDeep = Profondément sous la surface, une grande variété d'animaux colorés naviguent sur le fond marin. À bien des égards ils ressemblent à la vie sur Kerbin, mais en diffèrent beaucoup ailleurs. Pour commencer, sans cycle jour/nuit, il n'y a pas de migration verticale diurne.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanShallow = Les conditions glaciales dans les océans du côté quasi-sombre de Suluco rappellent un océan arctique, mais comme c'est si proche des eaux plus chaudes, la température change beaucoup plus vite, et certains animaux se déplacent entre les deux en quelques heures.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanDeep = La vie marine profonde est à peu près la même partout sur Suluco. Isolée du soleil quel que soit l'endroit, la vie ici est difficile à distinguer de celle des longitudes plus chaudes.

		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTwilight = L'échantillon de carotte grouille de vie ; pas étonnant vu la couleur verte du sol ici. De petits organismes creusent des tunnels dans la terre et établissent de minuscules terriers où ils élèvent leurs petits en sécurité.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDesert = Malgré les conditions plus rudes, la vie prospère ici comme dans les déserts de Kerbin. Le sable est chaud, mais il offre aussi une belle répit du soleil implacable pour les animaux rusés, et représente une opportunité sous forme de ressources inexploitées, si quelque chose est assez courageux pour braver la chaleur.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTundra = Les toundras crépusculaires de Suluco ont une lueur inquiétante en permanence ; approprié vu qu'elles semblent froides comme la tombe. Pourtant, la vie survit ici. Alors que sur le côté jour un insecte pourrait creuser pour échapper au soleil, ici ils creusent pour piéger la chaleur et rester au chaud. De nombreux animaux nichent ici car les conditions hostiles offrent aussi une protection contre les prédateurs.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDay = Bien que vous ne vous attendiez pas à trouver quoi que ce soit, vous pourriez être surpris de voir que même ici, de minuscules animaux survivent, en plus de micro-organismes résistants. Les animaux sont universellement petits et doivent passer presque toute leur vie sous terre pour éviter la lumière du soleil, mais ils se sont adaptés pour supporter la chaleur dans les zones ombragées. Comme le soleil ne bouge jamais, ces zones ombragées sont permanentes.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNight = Le côté nuit de Suluco est désolé et impitoyable, mais si la vie a pu survivre aux pôles de Kerbin, elle peut le faire ici aussi. Contrairement aux minuscules animaux du côté jour, ceux-ci sont généralement énormes, pour générer autant de chaleur corporelle que possible - qu'ils stockent dans d'épaisses couches de graisse. Quelques espèces choisies sont même connues pour migrer à travers de courtes portions du côté nuit pour éviter les prédateurs.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDayPole = Malgré la persistance de la vie sur Suluco, la maigre présence du côté jour diminue progressivement jusqu'au point substellaire - un endroit si chaud, si désolé et inhospitalier, que rien ne peut survivre ici à part les micro-organismes extrêmophiles. Pourtant, malgré tout, QUELQUE CHOSE vit ici. N'est-ce pas fou ?
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNightPole = Le pôle nuit est la partie absolument la plus froide de Suluco. Nulle part sur Kerbin il ne fait aussi froid. Et pourtant... Une espèce persiste. Des bêtes titanesques planent en immenses troupeaux, naviguant d'un bout de la bande crépusculaire à l'autre en traversant directement le côté nuit. Elles parcourent la distance en quelques jours seulement, survivant grâce à leur épaisse isolation et planant dans l'air dense et glacial.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedWater = Certains organismes marins semblent avoir pondu leurs œufs sur le rivage ici ; une vue courante sur toutes les plages de Suluco. Les grands invertébrés pondent leurs œufs ici, les enfouissant dans le sable pour les protéger des prédateurs aquatiques.

		// Tot
		#LOC_KS_SciDef_dmMagScan_Tot_SrfLanded = Toujours aucune activité magnétique à signaler, à part Suluco.

		#LOC_KS_SciDef_rpwsScan_Tot_InSpace = Le vent solaire de Sunorc est fort ici, il ne s'apaise vraiment que lorsque vous traversez la magnétogaine de Suluco ou l'ombre de Tot.

		#LOC_KS_SciDef_scopeScan_Tot_InSpaceLow = Le télescope capture beaucoup de minuscules roches et cratères à la surface de Tot avec une grande précision, mais il semble un peu surdimensionné pour ce travail.
		#LOC_KS_SciDef_scopeScan_Tot_InSpaceHigh = Pour être tout à fait juste envers Tot, c'est une petite pomme de terre plutôt mignonne.

		#LOC_KS_SciDef_dmImagingPlatform_Tot_InSpace = Tot semble être un astéroïde principalement rocheux selon l'analyse multispectrale. Bon, on a fini ici ?

		#LOC_KS_SciDef_dmSIGINT_Tot_InSpaceLow = Désolé, rien d'intéressant ici.

		#LOC_KS_SciDef_dmNAlbedoScan_Tot_SrfLanded = Rien de notable n'est détecté dans les scans de la surface ici.

		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLanded = L'astéroïde semble principalement rocheux, mais il y a en fait un peu plus de métal ici que prévu. Une étude plus approfondie, particulièrement dans les régions inférieures, pourrait s'avérer instructive.
		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLandedLowlands = Les régions basses de Tot ont une concentration de métal bien plus élevée que prévu. Il semble que la composition de Tot soit un mélange de rocheux et de métallique. Cela pourrait expliquer sa densité inhabituellement élevée.
		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLandedCraters = Les cratères d'impact sur Tot révèlent des parties plus profondes de l'astéroïde qui sont principalement métalliques. Si l'intérieur est tout comme cela, cela pourrait expliquer pourquoi il a plus du double de la gravité de Gilly malgré une taille inférieure au tiers.

		#LOC_KS_SciDef_dmSolarParticles_Tot_InSpace = Le contenu du vent solaire ici n'est pas différent de ce qu'il était en orbite de Suluco.

		#LOC_KS_SciDef_dmSoilMoisture_Tot_InSpaceLow = Les résultats de l'expérience... sont trop ennuyeux à décrire, malheureusement.

		#LOC_KS_SciDef_dmRadiometerScan_Tot_InSpaceHigh = La majeure partie de la surface de Tot est sombre et absorbe à la fois la lumière visible et IR, cependant les régions les plus basses sont marginalement plus réfléchissantes. Curieux...

		#LOC_KS_SciDef_dmseismicHammer_Tot_SrfLanded = Attention ! Vous allez le casser ! Non, pas le marteau, idiot - l'astéroïde !
		#LOC_KS_SciDef_dmseismicHammer_Tot_SrfLandedLowlandsCraters = L'impact résonne plus que prévu, donnant une image claire de tout l'intérieur de Tot. L'astéroïde semble avoir été autrefois deux - un astéroïde métallique et un impacteur rocheux. C'est l'explication la plus simple pour la composition très variée, allant de la pierre peu compactée et mal résonante aux sections solides riches en fer et nickel qui deviennent plus courantes plus on descend. C'est forcément pourquoi Tot est si dense.

		// Sera
		#LOC_KS_SciDef_dmMagScan_Sera_SrfLanded = Les lignes de champ magnétique s'étendent dans toutes les directions à la surface de Sera, indiquant la présence évidente de nombreux champs magnétiques locaux puissants à proximité.
		#LOC_KS_SciDef_dmMagScan_Sera_InSpaceHigh = Des lectures magnétiques fortes, même à cette altitude, indiquent qu'une puissante magnétosphère entoure Sera. Il est possible que les forces de marée de Dipuc aient aidé à maintenir le noyau de Sera actif, mais est-il vraiment assez proche pour cela ?

		#LOC_KS_SciDef_rpwsScan_Sera_InSpaceLow = Un anneau de particules chargées semble encercler Sera en orbite basse ; indubitablement une ceinture de Van Kerman dangereuse.
		#LOC_KS_SciDef_rpwsScan_Sera_InSpaceHigh = En passant à travers la magnétogaine de Sera, le vent solaire déjà faible diminue considérablement. D'autres lectures suggèrent que le champ magnétique de Sera est assez fort.

		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowLakes = Ces lacs semblent avoir une sorte de couleur brun pêche, comme l'atmosphère. À première vue, impossible de savoir s'il s'agit d'eau ou non en regardant simplement.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowIslands = De petites îles émergent des lacs massifs - ou seraient-ce des mers intérieures ? On se demande à quoi ressemble la vue depuis ces rivages extraterrestres.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowRiftValley = Cela semble être une sorte de vallée du rift, un type de vallée formée lorsque la lithosphère est tirée par la tectonique extensive. C'est une preuve assez claire de tectonique active sur Sera, du moins il y a quelques centaines de millions d'années.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowGeneric = Les collines et plaines couleur pêche de Sera semblent décidément appétissantes. Ça commence à vous rappeler beaucoup trop un fruit.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowMountains = D'immenses chaînes de montagnes s'étendent sur une grande partie de la surface de Sera. Un regard plus attentif révèle des vallées en forme de veines s'étendant entre les pics, formant de beaux motifs pas trop différents d'une fractale.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceHigh = De haut au-dessus de Sera, ses anneaux sont révélés en détail précis. La couleur et la luminosité des anneaux suggèrent qu'ils sont rocheux de composition - peut-être avec un peu de glace - et étaient probablement autrefois une petite lune déchirée. Avec le temps et des simulations, nous pourrons peut-être déterminer à quoi ressemblait cette lune.

		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceLow = Les scans spectraux montrent que la surface de Sera contient de grandes quantités de métaux lourds ; en particulier, le fer, l'aluminium et le titane sont assez répandus. Cela aide à expliquer sa couleur brun rosé.
		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceLowLakes = Le spectre d'absorption de ce liquide indique clairement qu'il s'agit d'eau, et non d'un autre fluide.
		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceHigh = L'analyse spectroscopique des anneaux de Sera indique une composition siliceuse, plutôt que métallique comme sa planète mère. Une explication possible de cette différence est que le corps qui a formé ces anneaux était un astéroïde capturé.

		#LOC_KS_SciDef_dmSIGINT_Sera_InSpaceLow = Des motifs radio complexes mais typiques sont générés par les interactions entre le vent solaire de Sunorc et l'atmosphère de Sera.

		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedLakes = Les neutrons de haute énergie produisent une réponse claire indiquant que, compte tenu de la température et de la pression, le liquide doit être de l'eau.
		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedLowlandsIslands = Le sol ici est humide et produit donc un signal constant indiquant des dépôts d'eau souterrains.
		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedRock = La roche ici est assez sèche, et l'instrument ne détecte que des traces d'hydrogène sous la surface.

		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedLowlands = Les zones basses plus roses de Sera semblent être composées de roche riche en fer, avec une bonne dose d'aluminium et de titane, qui diluent la couleur et lui donnent cet aspect brun-rosé.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedMidlandsHighlands = Les zones plus sombres et plus élevées de Sera sont pauvres en aluminium et titane par rapport aux basses terres, ce qui explique leur couleur.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedMountains = Les montagnes de Sera semblent être très riches en magnétite naturelle, un type de minerai de fer hautement magnétique.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedPeaks = L'analyse montre que cette substance est de la glace d'eau, ce qui a du sens compte tenu de l'altitude.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedPoles = Les pôles de Sera semblent dépourvus de calottes glaciaires, mais l'analyse montre qu'un léger revêtement de glace d'eau existe bien ici.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedLakesIslands = Le sol humide ici est encore riche en métaux comme la plupart de la surface, mais il y a aussi une forte concentration d'eau.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfSplashed = Les scans du liquide confirment qu'il s'agit d'eau, comme prévu. Cependant, il y a une forte concentration de métaux lourds et d'autres toxines ; rendant la présence de vie extrêmement improbable.

		#LOC_KS_SciDef_dmSolarParticles_Sera_InSpaceLow = De grandes quantités de particules chargées et des traces de dioxyde de carbone, d'azote et même de métaux lourds s'incrustent dans les collecteurs. C'est une preuve assez claire d'une ceinture de Van Kerman, mais les autres particules doivent provenir de l'atmosphère de Sera.
		#LOC_KS_SciDef_dmSolarParticles_Sera_InSpaceHigh = Le vent solaire à cette distance est devenu assez faible, mais il est encore facile de collecter un bon nombre de particules solaires avec le concentrateur d'ions et les plaquettes.

		#LOC_KS_SciDef_dmSoilMoisture_Sera_InSpaceLow = Les fortes émissions micro-ondes au-dessus des lacs sont une preuve assez claire d'eau en abondance relative sur Sera.

		#LOC_KS_SciDef_dmRadiometerScan_Sera_InSpaceHigh = La surface et les lacs de Sera semblent absorber beaucoup de lumière UV et même IR à ondes courtes, suggérant une surface riche en métaux et une atmosphère pleine de dioxyde de carbone.

		#LOC_KS_SciDef_dmseismicHammer_Sera_Rocky = Les ondes sismiques générées par l'impact révèlent une planète très tectoniquement active. Les plaques continuent de se déplacer progressivement à la surface, et une série complexe de caractéristiques mineures peut être formée par les légères forces de marée de son système d'anneaux et de Dipuc.
		#LOC_KS_SciDef_dmseismicHammer_Sera_Wet = Le sol humide ne s'avère pas très propice aux réflexions sismiques, et vous n'obtenez pas beaucoup de données utiles. Un point de vue plus élevé et plus rocheux pourrait être un meilleur choix.

		#LOC_KS_SciDef_dmbathymetryscan_Sera_SrfSplashedShallow = L'analyse chimique ne peint pas un tableau réjouissant. Bien que le liquide soit de l'eau, il est inondé de métaux lourds toxiques qui rendent le maintien de la vie très improbable.
		#LOC_KS_SciDef_dmbathymetryscan_Sera_SrfSplashedDeep = Deepément sous la surface de l'eau, les lacs de Sera ne sont pas moins toxiques. L'existence de vie ici est hautement improbable.

		#LOC_KS_SciDef_dmbiodrillscan_Sera_SrfLanded = L'échantillon de carotte est absolument rempli de métaux lourds hautement toxiques, et rien qui pourrait même être potentiellement interprété comme une biosignature. Tant pis.

		// Dipuc
		#LOC_KS_SciDef_dmMagScan_Dipuc_SrfLanded = Les lignes de champ magnétique semblent suivre des caractéristiques qui ne sont pas visibles à sa surface. Cela pourrait être dû au fait que de la roche magnétisée en fusion s'écoule en profondeur.
		#LOC_KS_SciDef_bothMagScan_Dipuc_InSpaceLow = Dipuc a un champ magnétique assez substantiel, bien qu'il ne soit pas aussi puissant qu'on pourrait s'y attendre. Cela pourrait signifier que son activité volcanique est due à une combinaison d'un noyau encore en fusion et des forces de marée de Sera.
		#LOC_KS_SciDef_bothMagScan_Dipuc_InSpaceHigh = À cette altitude, une lecture magnétique faible est détectée depuis Dipuc. Se rapprocher faciliterait la vérification de sa force exacte.

		#LOC_KS_SciDef_rpwsScan_Dipuc_InSpaceLow = Dans l'espace près de Dipuc, le vent solaire est notablement dévié par son champ magnétique respectable.
		#LOC_KS_SciDef_rpwsScan_Dipuc_InSpaceHigh = Au-dessus de la lune volcanique, les particules chargées sont tout aussi courantes qu'en orbite de Sera.

		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowGeneric = La surface criblée de cratères de Dipuc doit offrir de superbes vues au sol. On ne voit pas souvent une lune sans atmosphère aussi intéressante. Elle est au moins aussi unique que Sera !
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowCraterSouthCraterEast = Les éjectas d'impact rayonnent depuis ce cratère comme des rayons de soleil. Et WOW, ces lignes s'étendent loin ! Ce qui a créé ce cratère avait beaucoup d'énergie.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowCraterWest = Ce cratère de taille respectable est un peu moins spectaculaire que les deux plus grands, et l'absence d'éjectas d'impact le montre.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowDoubleCrater = D'un point de vue géologique, ce n'est pas du tout une formation improbable. Mais c'est quand même intéressant de voir comment les bords de ces deux cratères se chevauchent.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowVolcano = Les volcans de Dipuc sont tous constamment actifs, et des éruptions mineures se produisent assez régulièrement. Le télescope capture un panache de gaz et de poussière en forme de parapluie alors qu'il est projeté hors de Dipuc et probablement vers l'orbite de Sera.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowMountains = Ces crêtes montagneuses prononcées sont aussi claires que le jour dans le télescope, et il capture des images frappantes des ombres qu'elles projettent sur la surface en dessous.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceHigh = Cette lune rappelle un peu une boule de pâte bien pétrie. À en juger par l'activité volcanique, elle semble bien faire le travail de se cuire elle-même.

		#LOC_KS_SciDef_dmImagingPlatform_Dipuc_InSpaceLow = Les scans UV montrent une atmosphère exceptionnellement fine riche en soufre planant bas au-dessus de la surface de la lune, probablement produite activement par ses volcans.
		#LOC_KS_SciDef_dmImagingPlatform_Dipuc_InSpaceHigh = L'imagerie thermique montre que les températures varient énormément sur Dipuc, fortement corrélées à l'activité volcanique.

		#LOC_KS_SciDef_dmSIGINT_Dipuc_InSpaceLow = Étonnamment, Dipuc semble émettre de faibles ondes radio. Une étude à long terme sera probablement nécessaire pour en déterminer la cause.

		#LOC_KS_SciDef_dmNAlbedoScan_Dipuc_SrfLanded = La surface de Dipuc semble être assez pauvre en hydrogène selon les scans neutroniques.
		#LOC_KS_SciDef_dmNAlbedoScan_Dipuc_SrfLandedPoles = Des traces d'hydrogène sont indiquées ici, probablement originaires de petites quantités de glace d'eau souterraine.

		#LOC_KS_SciDef_dmlaserblastscan_Dipuc_SrfLanded = La surface ici est composée de roche silicatée riche en métaux lourds, suggérant une composition similaire à Sera et une origine commune. Elle se trouve sous forme de roche volcanique, naturellement.

		#LOC_KS_SciDef_dmSolarParticles_Dipuc_InSpaceLow = Le collecteur de particules solaires détecte des traces de soufre et de divers métaux lourds, probablement projetés dans l'espace par les innombrables éruptions et mis en orbite par la gravité de Sera.
		#LOC_KS_SciDef_dmSolarParticles_Dipuc_InSpaceHigh = Au-dessus de Dipuc, le vent solaire est tout ce que le collecteur peut collecter.

		#LOC_KS_SciDef_dmSoilMoisture_Dipuc_InSpaceLow = De faibles émissions micro-ondes sont détectées depuis les pôles, mais nulle part ailleurs. Dipuc, comme prévu, est assez sec.

		#LOC_KS_SciDef_dmRadiometerScan_Dipuc_InSpaceHigh = La surface volcanique plutôt sombre de Dipuc a un albédo étonnamment élevé dans les spectres non visibles, à l'exclusion des longueurs d'onde IR.

		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLanded = Dipuc a une structure intérieure complexe. Les scans initiaux semblent suggérer que Dipuc est façonné à la fois par un noyau encore en fusion et par les forces de marée de Sera.
		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLandedVolcano = Il est impossible d'obtenir une lecture claire de la structure interne de Dipuc ici à cause du grondement constant. Cela fournit quand même des données fascinantes en soi.
		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLandedVolcanoVent = Alors. Ne vous retrouvez pas dans la lave.

		// Noi
		#LOC_KS_SciDef_dmMagScan_Noi_SrfLanded = Hmm. Non, toujours pas de champ magnétique.
		#LOC_KS_SciDef_bothMagScan_Noi_InSpace = Le charbon n'émet pas de champ magnétique, imbécile !

		#LOC_KS_SciDef_rpwsScan_Noi_InSpace = Le vent solaire de Sunorc est extrêmement rare à cette distance, et Noi ne semble avoir aucune influence sur lui au-delà de séparer le flux comme une petite pierre dans un ruisseau doux.

		#LOC_KS_SciDef_scopeScan_Noi_InSpaceLow = Où sont passées les étoiles ?! Oh, c'est juste Noi. Fausse alerte...
		#LOC_KS_SciDef_scopeScan_Noi_InSpaceHigh = D'accord, j'abandonne. Qu'est-ce que je suis censé regarder ?

		#LOC_KS_SciDef_dmImagingPlatform_Noi_InSpaceLow = De la roche riche en carbone et des matériaux plus rocheux à base de silicates sont détectés dans les scans détaillés de la surface de Noi.
		#LOC_KS_SciDef_dmImagingPlatform_Noi_InSpaceHigh = L'imagerie thermique révèle à quel point Noi est vraiment froide. Elle est carbonée selon les scans, mais aurait pu facilement être glacée à cette distance de Sunorc.

		#LOC_KS_SciDef_dmSIGINT_Noi_InSpaceLow = Do-dodo-do-doooo... Euh, rien. Pas d'activité radio ici.

		#LOC_KS_SciDef_dmNAlbedoScan_Noi_SrfLanded = Dans un environnement si calme largement dépourvu de neutrons ambiants, une lecture de haute précision peut être prise. Pour sa distance de Sunorc, Noi manque beaucoup de glace.

		#LOC_KS_SciDef_dmlaserblastscan_Noi_SrfLanded = Les scans de surface indiquent une surface extrêmement riche en carbone parsemée d'autres minéraux, principalement des silicates.

		#LOC_KS_SciDef_dmSolarParticles_Noi_InSpace = Rien n'a vraiment changé aux environs de Noi par rapport à l'espace interplanétaire.

		#LOC_KS_SciDef_dmSoilMoisture_Noi_InSpaceLow = Seules de très faibles émissions micro-ondes indiquent que Noi est étonnamment sec pour un astéroïde si loin de Sunorc. Il est possible qu'il se soit formé plus à l'intérieur et ait été éjecté vers le système externe, finissant ici.

		#LOC_KS_SciDef_dmRadiometerScan_Noi_InSpaceHigh = Voilà un astéroïde bien sombre. Noi absorbe fortement la lumière dans presque tous les spectres, avec même beaucoup d'absorption UV pour un astéroïde de type C. Le résultat est un objet à peine visible, surtout qu'il est si loin de son étoile.

		#LOC_KS_SciDef_dmseismicHammer_Noi_SrfLanded = L'astéroïde de faible densité absorbe assez bien les ondes sismiques, rendant la collecte de données difficile. Mais ce n'est pas difficile de deviner à quoi ressemble l'intérieur, de toute façon.

		// SimeSystem
		#LOC_KS_SciDef_rpwsScan_SimeSystem_InSpaceHigh = Cette partie de l'espace reçoit très peu de vent solaire, donc presque toute l'activité radio ici est générée par les deux champs magnétiques massifs interagissant entre eux et avec les atmosphères des autres lunes.

		#LOC_KS_SciDef_scopeScan_SimeSystem_InSpaceHigh = La danse complexe que les deux corps exécutent est tout simplement à couper le souffle, et un time-lapse de photos le prouve. Ils sont comme des partenaires dans une sorte de tango céleste géant et impressionnant.

		#LOC_KS_SciDef_dmImagingPlatform_SimeSystem_InSpaceHigh = L'analyse spectrale des deux corps montre des preuves de beaucoup de méthane dans les deux atmosphères. Les explications pour les bandes vertes et bleues de Simetra restent insaisissables...

		#LOC_KS_SciDef_dmSolarParticles_SimeSystem_InSpaceHigh = Les particules du vent solaire sont assez rares ici, et le collecteur ne capte que des traces d'azote, de dioxyde de carbone et de dioxyde de chlore.

		#LOC_KS_SciDef_dmRadiometerScan_SimeSystem_InSpaceHigh = Pris ensemble, les deux corps ont un albédo combiné assez élevé. Simeht en particulier est assez brillant.

		// Simetra/Simeht Shared
		#LOC_KS_SciDef_rpwsScan_SimeBoth_InSpaceHigh = Un environnement électrostatique incroyablement complexe se trouve ici entre les deux planètes, alors que leurs magnétosphères et atmosphères interagissent.
		#LOC_KS_SciDef_dmSIGINT_SimBoth_InSpaceLow = Les champs magnétiques des deux planètes géantes produisent de puissantes ondes radio par leurs interactions, résultant en une cacophonie de bruit radio.
		#LOC_KS_SciDef_dmSolarParticles_SimeBoth_InSpace = Les collecteurs détectent des traces d'hydrogène, d'hélium et de méthane alors que Simetra et Simeht dansent l'un autour de l'autre.

		// Simetra
		#LOC_KS_SciDef_rpwsScan_Simetra_InSpaceLow = De puissantes ondes radio émettent de l'atmosphère de Simetra, bien que Simeht légèrement moins massif soit un très proche second.

		#LOC_KS_SciDef_scopeScan_Simetra_InSpace = Les bandes colorées de Simetra vous font vous demander quels composés donnent aux longitudes équatoriales ces teintes vertes et jaunes frappantes.

		#LOC_KS_SciDef_dmImagingPlatform_Simetra_InSpace = Son atmosphère supérieure semble être principalement composée de méthane, tandis que les couches inférieures sont largement de l'hydrogène, de l'hélium et du méthane, avec des traces de soufre et de dioxyde de chlore. Ce dioxyde de chlore pourrait expliquer ses bandes vertes, en combinaison avec le méthane.

		#LOC_KS_SciDef_dmSoilMoisture_Simetra_InSpaceLow = Les émissions micro-ondes de Simetra indiquent un intérieur plein de glace d'eau.

		#LOC_KS_SciDef_dmRadiometerScan_Simetra_InSpaceHigh = Dans le spectre IR, Simetra émet un peu plus que Simeht, indiquant des températures plus élevées et un processus de chauffage interne plus énergétique.

		// Simeht
		#LOC_KS_SciDef_rpwsScan_Simeht_InSpaceLow = L'atmosphère de Simeht marginalement moins massive semble générer des émissions d'ondes radio qui sont plus faibles dans une proportion similaire.

		#LOC_KS_SciDef_scopeScan_Simeht_InSpace = Simeht semble presque sans caractéristiques dans les images télescopiques distantes, cependant ce regard de près révèle ses bandes équatoriales plus claires, les faibles hypercanes tourbillonnants sur les bords, et même les subtiles différences entre les bandes plus polaires.

		#LOC_KS_SciDef_dmImagingPlatform_Simeht_InSpace = L'atmosphère hydrogène-hélium de Simeht contient également beaucoup de méthane, ce qui aide à expliquer sa couleur cyan claire.

		#LOC_KS_SciDef_dmSoilMoisture_Simeht_InSpaceLow = De puissantes émissions micro-ondes signalent la présence de grandes quantités de glace d'eau en profondeur dans Simeht.

		#LOC_KS_SciDef_dmRadiometerScan_Simeht_InSpaceHigh = Simeht réfléchit beaucoup de lumière dans le spectre visible, lui donnant un albédo élevé.

		// Noira
		#LOC_KS_SciDef_dmMagScan_Noira_SrfLanded = À la surface, de petits champs magnétiques localisés peuvent être détectés, mais la lune semble manquer d'un champ magnétique plus large. Ou bien il est imperceptible par rapport aux planètes jumelles, et les données devront être étudiées avec plus de précision.
		#LOC_KS_SciDef_bothMagScan_Noira_InSpace = Les champs magnétiques de Simetra et Simeht submergent les capteurs, et rien ne peut être détecté provenant de Noira.

		#LOC_KS_SciDef_rpwsScan_Noira_InSpace = Seule l'activité plasma radio générée par Simetra et Simeht est détectée. Tout ce que fait Noira est de séparer le flux.

		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowGeneric = La surface criblée de cratères de Noira est une vue bienvenue dans un système plein de bizarreries.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowGrandCrater = « La capacité de détruire une planète est insignifiante face au pouvoir du Kraken. »
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowCraters = Les cratères sont répartis uniformément sur toute la surface de la lune, indiquant qu'elle n'est pas en rotation synchrone. C'est probablement parce que Simetra et Simeht bougent simplement trop.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowRiftValleys = Il est assez clair que les forces de marée doivent étirer la pauvre Noira jusqu'à la rupture, créant ces immenses vallées du rift.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowBasins = Ces larges bassins sombres rappellent des temps plus simples, quand le programme spatial luttait encore pour poser des bottes sur le Mun.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceHigh = La petite boule grise rappelle le Mun, tant par la couleur que par les cratères qui marquent sa surface. Un cratère proportionnellement énorme peut être vu à une extrémité de la lune, invitant des comparaisons avec une certaine station de combat destructrice de planètes.

		#LOC_KS_SciDef_dmImagingPlatform_Noira_InSpaceLow = Le régolite sur Noira a une composition similaire au Mun, avec de fortes concentrations de silicates et d'aluminium.
		#LOC_KS_SciDef_dmImagingPlatform_Noira_InSpaceHigh = L'analyse de Noira depuis une orbite haute montre une surface chaotique, criblée de cratères et couverte de dépressions.

		#LOC_KS_SciDef_dmSIGINT_Noira_InSpaceLow = La surveillance radio de Noira ne révèle rien d'intéressant, seulement des signaux réfléchis par les planètes jumelles.

		#LOC_KS_SciDef_dmNAlbedoScan_Noira_SrfLanded = De l'hydrogène sous la surface est détecté partout sur Noira ; preuve probable de dépôts d'eau.

		#LOC_KS_SciDef_dmlaserblastscan_Noira_SrfLanded = Les scans de surface donnent une lecture familière ; une surface riche en silicates avec beaucoup d'aluminium. Moins familier est la concentration notable de glace d'eau.

		#LOC_KS_SciDef_dmSolarParticles_Noira_InSpace = Les particules traces près de Noira semblent être à peu près les mêmes qu'ailleurs dans le système Simetra-Simeht.

		#LOC_KS_SciDef_dmSoilMoisture_Noira_InSpaceLow = Les lectures indiquent que de grandes quantités de glace d'eau sont enfouies sous la surface de la petite lune, ce qui pourrait signifier que Noira a des océans d'eau souterrains !

		#LOC_KS_SciDef_dmRadiometerScan_Noira_InSpaceHigh = L'albédo global de Noira est assez similaire à celui du Mun, mais sa grande distance de Sunorc signifie que son irradiance absolue est très faible.

		#LOC_KS_SciDef_dmseismicHammer_Noira_SrfLanded = Les réflexions sismiques montrent clairement des preuves de grandes cavernes souterraines, peut-être remplies d'eau liquide !

		// Norihc
		#LOC_KS_SciDef_dmMagScan_Norihc_SrfLanded = Un champ magnétique faible peut être mesuré depuis la surface de Norihc, mais ce n'est rien de particulièrement impressionnant.
		#LOC_KS_SciDef_bothMagScan_Norihc_InSpaceLow = L'activité géologique de Norihc ne semble pas produire un champ magnétique fort. Comme l'activité géologique est probablement générée principalement par les forces de marée, Norihc manque probablement d'un noyau métallique en fusion, ce qui l'expliquerait.
		#LOC_KS_SciDef_bothMagScan_Norihc_InSpaceHigh = Les seuls champs magnétiques détectés jusqu'à présent appartiennent à Simetra et Simeht.

		#LOC_KS_SciDef_rpwsScan_Norihc_InSpace = De faibles perturbations sont générées lorsque les magnétosphères de Simetra et Simeht sont déformées par Norihc.

		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowGeneric = La surface fissurée de Norihc rappelle plutôt Eeloo, avec ses profondes tranchées et ses basses terres plus sombres.
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowCratersAll = Norihc est marqué par des cratères grands et petits, remettant en question l'ancienneté de la surface. Si elle est étirée par les deux planètes, pourquoi sa surface semble-t-elle ne pas avoir changé depuis si longtemps ?
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowCracks = Ces fissures s'enfoncent profondément dans les épaisses calottes glaciaires globales de Norihc. Elles feraient probablement d'excellents circuits de course !
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceHigh = La pauvre Norihc semble avoir été malmenée par les forces de marée de ses planètes parents.

		#LOC_KS_SciDef_dmImagingPlatform_Norihc_InSpaceLow = La spectroscopie de la surface confirme qu'elle est principalement composée de glace d'eau, avec des composés de tholine partiellement givrés dans les basses terres.
		#LOC_KS_SciDef_dmImagingPlatform_Norihc_InSpaceHigh = L'atmosphère de Norihc est principalement composée d'azote, avec des traces de monoxyde de carbone et d'autres gaz.

		#LOC_KS_SciDef_dmSIGINT_Norihc_InSpaceLow = L'activité radio en orbite de Norihc est calme, à l'exception du bruit généré par Simetra et Simeht.

		#LOC_KS_SciDef_dmNAlbedoScan_Norihc_SrfLanded = Les signaux d'hydrogène dans cette région semblent confirmer d'épaisses calottes de glace d'eau, avec le potentiel d'un océan d'eau liquide bien en dessous.

		#LOC_KS_SciDef_dmlaserblastscan_Norihc_SrfLanded = Le faisceau provoque une explosion de vapeur en creusant un trou dans la surface, confirmant qu'il s'agit de glace d'eau.
		#LOC_KS_SciDef_dmlaserblastscan_Norihc_SrfLandedLowlands = En plus de la vapeur, le scan indique également l'existence de composés tholin à la surface ici.

		#LOC_KS_SciDef_dmSolarParticles_Norihc_InSpace = Des traces d'azote peuvent être trouvées en orbite de Norihc, mais sinon l'espace est encore plus vide que d'habitude.

		#LOC_KS_SciDef_dmSoilMoisture_Norihc_InSpaceLow = L'eau est assez courante partout sur Norihc, même dans les basses terres où la lecture est la plus faible. S'il y a des océans liquides sous la surface, cet instrument ne peut pas les distinguer.

		#LOC_KS_SciDef_dmRadiometerScan_Norihc_InSpaceHigh = La fine atmosphère de Norihc n'absorbe pas beaucoup, permettant à la surface brillante de réfléchir beaucoup de lumière dans la plupart des longueurs d'onde sauf l'UV.

		#LOC_KS_SciDef_dmseismicHammer_Norihc_SrfLanded = Les lectures sismiques montrent des signes clairs d'un océan liquide sous la surface de Norihc. Compte tenu de la présence de composés organiques, la vie est une possibilité distincte.

		#LOC_KS_SciDef_dmbiodrillscan_Norihc_SrfLanded = Cet échantillon de carotte est principalement de la glace, avec des composés tholin qui semblent s'être retrouvés piégés à l'intérieur après la formation. S'il y a un océan souterrain sur Norihc, la foreuse ne peut pas l'atteindre.

		// Noyreg
		#LOC_KS_SciDef_dmMagScan_Noyreg_SrfLanded = Le champ magnétique de Noyreg ne semble pas beaucoup changer à la surface.
		#LOC_KS_SciDef_bothMagScan_Noyreg_InSpaceLow = Pour un objet si grand avec autant de gravité, le champ magnétique de Noyreg est assez faible. Cela pourrait être dû à une combinaison d'un noyau riche en fer largement refroidi et d'un manque de minéraux magnétiques en surface.
		#LOC_KS_SciDef_bothMagScan_Noyreg_InSpaceHigh = Un champ magnétique faible est détecté depuis au-dessus de Noyreg ; et il est plus faible que prévu. Une étude plus approfondie pourrait éclairer ce mystère.

		#LOC_KS_SciDef_rpwsScan_Noyreg_InSpace = Le rayonnement solaire libère des particules chargées de l'épaisse atmosphère de Noyreg, produisant des ondes plasma lorsqu'elles interagissent avec les champs magnétiques dansants des géants jumeaux.

		#LOC_KS_SciDef_scopeScan_Noyreg_InSpaceLow = Il n'y a pas grand-chose à voir avec tous les nuages denses couvrant la surface. Seule une partie de la surface est visible, mais tout ce qu'on peut distinguer ce sont quelques hautes montagnes qui percent à travers les nuages les plus bas.
		#LOC_KS_SciDef_scopeScan_Noyreg_InSpaceHigh = Quelle couleur fascinante ! Cela ne va sûrement pas raviver les vieux débats sur la couleur de Jool...

		#LOC_KS_SciDef_dmImagingPlatform_Noyreg_InSpaceLow = En regardant à travers la couverture nuageuse dense, on voit des signes d'une surface incroyablement riche en carbone. Il est possible que Noyreg soit principalement composé de carbone, mais ce serait une découverte exceptionnellement rare !
		#LOC_KS_SciDef_dmImagingPlatform_Noyreg_InSpaceHigh = L'analyse spectroscopique montre une atmosphère principalement composée de dioxyde de carbone, le reste étant de l'azote, du dioxyde de chlore et des gaz traces. D'après cette analyse initiale, la source de sa couleur verte n'est pas claire. Ce pourrait être le dioxyde de chlore, ou un type d'effet de diffusion sans précédent. Une étude plus approfondie est nécessaire.

		#LOC_KS_SciDef_dmSIGINT_Noyreg_InSpaceLow = L'épaisse atmosphère de Noyreg crée des signaux radio rythmiques lorsqu'elle est énergisée par les magnétosphères de Simetra et Simeht.

		#LOC_KS_SciDef_dmNAlbedoScan_Noyreg_SrfLanded = La surface de Noyreg semble être riche en hydrogène. Mais à ces températures et pressions, ce sont probablement des hydrocarbures à longue chaîne plutôt que de l'eau.

		#LOC_KS_SciDef_dmlaserblastscan_Noyreg_SrfLanded = La flamme produite identifie la substance comme extrêmement riche en carbone ; la majorité de la composition est en fait du carbone. C'est très inhabituel et semblerait suggérer que Noyreg est un type d'objet très rare - une carbonia, ou monde de carbone.
		#LOC_KS_SciDef_dmlaserblastscan_Noyreg_SrfLandedIceCaps = L'analyse laser confirme la présence de plusieurs hydrocarbures à longue chaîne gelés ici, et il n'y a aucun signe de glace d'eau.

		#LOC_KS_SciDef_dmSolarParticles_Noyreg_InSpace = L'espace près de Noyreg contient des traces de dioxyde de carbone, probablement originaires de l'atmosphère dense de la lune.

		#LOC_KS_SciDef_dmSoilMoisture_Noyreg_InSpaceLow = Peu d'émissions micro-ondes sont détectées depuis Noyreg, ce qui semble signifier qu'il a peu ou pas d'eau.

		#LOC_KS_SciDef_dmRadiometerScan_Noyreg_InSpaceHigh = L'atmosphère dense de Noyreg absorbe beaucoup de lumière UV et IR, et absorbe aussi beaucoup du spectre visible. C'est peut-être pourquoi il paraît vert.

		#LOC_KS_SciDef_dmseismicHammer_Noyreg_SrfLanded = La composition intérieure de Noyreg révèle qu'une grande partie a une densité similaire au diamant, et si les lectures sont correctes, elle n'a qu'un petit noyau métallique largement mort. Ça confirme : Noyreg est principalement faite de carbone.

		#LOC_KS_SciDef_dmbiodrillscan_Noyreg_SrfLanded = L'échantillon de carotte est absolument rempli de carbone ! C'est-à-dire... juste beaucoup et beaucoup de carbone et de composés hydrocarbonés, dont aucun ne semble avoir été formé par une activité biologique.

		// Aralc-A
		#LOC_KS_SciDef_rpwsScan_AralcA_InSpaceLow = L'instrument a sauté la fusion et commence à se sublimer.
		#LOC_KS_SciDef_rpwsScan_AralcA_InSpaceHigh = Le vent solaire provenant d'Aralc-A est extrêmement puissant, même à cette distance.

		#LOC_KS_SciDef_scopeScan_AralcA_InSpace = MES YEUX !!!

		#LOC_KS_SciDef_dmImagingPlatform_AralcA_InSpace = La plateforme d'imagerie refuse catégoriquement d'exposer ses instruments délicats. Vous aurez besoin d'un outil plus spécialisé pour ce genre de travail.

		#LOC_KS_SciDef_dmSIGINT_AralcA_InSpaceLow = Aralc-A émet des quantités extrêmes de rayonnement dans la plupart des spectres, surtout ceux que cet instrument ne peut pas détecter. Mais nous savons à quoi ressemblent les étoiles bleues, non ? Nous n'avions pas -vraiment- besoin d'apporter cette chose lourde jusqu'ici, n'est-ce pas ?

		#LOC_KS_SciDef_dmSolarParticles_AralcA_InSpaceLow = Une chose est sûre. La garantie est définitivement annulée maintenant.
		#LOC_KS_SciDef_dmSolarParticles_AralcA_InSpaceHigh = Le vent solaire d'Aralc-A est bien plus puissant que ce pour quoi cet instrument a été conçu, mais il tient le coup admirablement.

		#LOC_KS_SciDef_dmSoilMoisture_AralcA_InSpaceLow = Les antennes ont commencé à ressembler à de l'eau beaucoup plus que cette étoile.

		#LOC_KS_SciDef_dmRadiometerScan_AralcA_InSpaceHigh = Aralc-A émet beaucoup plus de lumière UV que la plupart des étoiles plus petites et plus froides. Tout ce qui vit dans ce système stellaire devrait être bien protégé, et n'aurait pas trop de temps pour évoluer non plus. Mais, comme on dit... « Efil » trouve toujours un chemin.

		// Anneheg
		#LOC_KS_SciDef_dmMagScan_Anneheg_SrfLanded = La quantité massive de radiation ici a rendu le pauvre bras non fonctionnel, bien qu'au moins il reste... -principalement- droit.

		#LOC_KS_SciDef_rpwsScan_Anneheg_InSpace = Je veux que vous deviniez à quel point de plasma solaire circule ici. Puis, prenez cette estimation et multipliez-la par cent. Voilà votre réponse.

		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceLow = Les formations tourbillonnantes et vitreuses d'Anneheg montrent à quel point la surface de la planète est gravement endommagée. Il est peu probable qu'elle se soit formée à cette distance d'Aralc-A, sinon elle aurait été détruite il y a des éons.
		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceLowLava = Les océans de lave d'Anneheg strient la planète comme des plaies ouvertes. Aralc-A déchire ce monde.
		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceHigh = Anneheg est difficile à distinguer dans la mer de lumière aveuglante, surtout avec sa surface ignée si sombre.

		#LOC_KS_SciDef_dmImagingPlatform_Anneheg_InSpaceLow = Les scans de la surface d'Anneheg indiquent du verre volcanique avec une teneur en métaux extrêmement élevée ; il est probable que cette planète ne soit qu'une fine croûte recouvrant le noyau d'une planète autrefois bien plus grande.
		#LOC_KS_SciDef_dmImagingPlatform_Anneheg_InSpaceHigh = Malgré l'albédo extrêmement faible de la planète, l'irradiance absolue d'Anneheg reste élevée en raison du véritable rayon de la mort balayant sa surface.

		#LOC_KS_SciDef_dmSIGINT_Anneheg_InSpaceLow = Seule l'intense activité radio d'Aralc-A peut être détectée ici.

		#LOC_KS_SciDef_dmNAlbedoScan_Anneheg_SrfLanded = Les lectures d'hydrogène en surface sont assurément uniquement le résultat du vent solaire absurde le déposant à la surface.

		#LOC_KS_SciDef_dmlaserblastscan_Anneheg_SrfLanded = La surface d'Anneheg est si résistante à la chaleur que le laser n'a même aucun effet dessus. Bon, c'est raté.

		#LOC_KS_SciDef_dmSolarParticles_Anneheg_InSpaceLow = Anneheg semble perdre de la masse, à en juger par la roche et le métal collectés ; surtout lors du passage de la ligne crépusculaire.
		#LOC_KS_SciDef_dmSolarParticles_Anneheg_InSpaceHigh = À cette altitude, seul le vent solaire extrême d'Aralc-A est collecté.

		#LOC_KS_SciDef_dmSoilMoisture_Anneheg_InSpaceLow = Les antennes peuvent à peine fonctionner si près d'Aralc-A, mais elles ne détectent de toute façon rien provenant de la planète.

		#LOC_KS_SciDef_dmRadiometerScan_Anneheg_InSpaceHigh = L'irradiance absolue d'Anneheg est très élevée malgré la surface extrêmement sombre, en raison de sa proximité avec Aralc-A.

		#LOC_KS_SciDef_dmseismicHammer_Anneheg_SrfLanded = L'impact confirme que la composition d'Anneheg est hautement métallique ; au moins 80 % de l'objet est du métal.

		#LOC_KS_SciDef_dmbathymetryscan_Anneheg_SrfSplashedShallow = Hmm. C'est bizarre. Il semble que nous ne soyons pas encore fondus.
		#LOC_KS_SciDef_dmbathymetryscan_Anneheg_SrfSplashedDeep = Une Potion de Résistance au Feu nous aiderait à voir beaucoup plus clairement ici-bas.

		// Aralc-B
		#LOC_KS_SciDef_rpwsScan_AralcB_InSpaceLow = Un vent solaire intense est projeté par les deux étoiles, donnant aux antennes beaucoup à traiter.
		#LOC_KS_SciDef_rpwsScan_AralcB_InSpaceHigh = Vous n'êtes pas si loin d'Aralc-B, donc le plasma solaire est déjà assez dense ici sans même compter les contributions d'Aralc-A.

		#LOC_KS_SciDef_scopeScan_AralcB_InSpace = C'est peut-être une naine rouge, mais c'est quand même une étoile. Pointer un télescope planétaire sensible dessus est une mauvaise décision.

		#LOC_KS_SciDef_dmImagingPlatform_AralcB_InSpace = La plateforme d'imagerie s'éteint en détectant la lumière d'Aralc-B. Même une naine rouge est trop brillante pour qu'elle puisse l'étudier.

		#LOC_KS_SciDef_dmSIGINT_AralcB_InSpaceLow = Les ondes radio émises par les deux étoiles sont très intenses, et vous commencez à douter de l'intégrité structurelle de l'antenne massive.

		#LOC_KS_SciDef_dmSolarParticles_AralcB_InSpaceLow = Les plaquettes sensibles ont commencé à se détériorer rapidement sous la chaleur intense.
		#LOC_KS_SciDef_dmSolarParticles_AralcB_InSpaceHigh = Le vent solaire provenant d'Aralc-B est à peu près égal à celui d'Aralc-A à cette distance.

		#LOC_KS_SciDef_dmSoilMoisture_AralcB_InSpaceLow = L'appareil ne peut pas tolérer la chaleur, et les polymères avancés qui constituent sa composition chimique ont commencé à se dégrader. En d'autres termes, le truc pour trouver l'eau spatiale est cassé.

		#LOC_KS_SciDef_dmRadiometerScan_AralcB_InSpaceHigh = En tant que naine rouge, Aralc-B émet beaucoup de lumière infrarouge et est plutôt faible dans les spectres visible et UV.

		// Arorua
		#LOC_KS_SciDef_dmMagScan_Arorua_SrfLanded = Depuis la surface, il semble qu'Arorua ait un champ magnétique assez fort, qui pourrait freiner un peu le flux de particules chargées et prolonger la vie de son atmosphère.

		#LOC_KS_SciDef_rpwsScan_Arorua_InSpace = Les particules chargées inondent l'espace autour d'Arorua, une explication facile et évidente pour son atmosphère en ablation.

		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowGeneric = La surface d'Arorua est principalement vallonnée et sombre, mais sous la lumière solaire extrême elle brille comme du verre. Peut-être qu'une partie -est- du verre !
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowSubstellarPoint = Le point faisant face à Aralc-B est principalement sans relief, mais savoir que c'est le point où toute la lumière du soleil est concentrée fait se demander à quel point il doit faire chaud là-bas.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowMountainsAll = Les montagnes d'Arorua brillent à travers la basse atmosphère, mises en valeur contre les basses terres plus sombres.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowCliffsAll = Ces falaises sont assez abruptes. Elles pourraient faire une bonne destination touristique.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceHigh = Les aurores d'Arorua brillent magnifiquement en dessous, et vous vous demandez pourquoi elle n'est pas couverte de nuages plus opaques. Peut-être l'était-elle à un moment, mais la lumière du soleil intense les a soufflés aussi.

		#LOC_KS_SciDef_dmImagingPlatform_Arorua_InSpaceLow = Les scans IR de la surface d'Arorua fournissent une carte détaillée de la façon dont la planète est chauffée par ses deux soleils.
		#LOC_KS_SciDef_dmImagingPlatform_Arorua_InSpaceHigh = L'analyse spectrale de l'atmosphère d'Arorua révèle qu'elle est principalement composée de dioxyde de carbone, et pas grand-chose d'autre.

		#LOC_KS_SciDef_dmSIGINT_Arorua_InSpaceLow = Alors que l'atmosphère d'Arorua s'ablate, elle génère un déluge d'activité radio intense.

		#LOC_KS_SciDef_dmNAlbedoScan_Arorua_SrfLanded = Les niveaux de neutrons de fond sont assez élevés, grâce à Aralc-B. C'est malgré l'atmosphère épaisse, et cela rend difficile une lecture précise.

		#LOC_KS_SciDef_dmlaserblastscan_Arorua_SrfLanded = Les scans laser révèlent une composition assez typique pour la surface d'une planète rocheuse, les minéraux siliceux constituant la majeure partie de la surface.

		#LOC_KS_SciDef_dmSolarParticles_Arorua_InSpaceLow = En orbite basse d'Arorua, une concentration relativement élevée de molécules de dioxyde de carbone est captée, probablement de son atmosphère en ablation.
		#LOC_KS_SciDef_dmSolarParticles_Arorua_InSpaceHigh = Le vent solaire remplit l'espace près d'Arorua, menaçant de commencer à souffler le vaisseau spatial aussi !

		#LOC_KS_SciDef_dmSoilMoisture_Arorua_InSpaceLow = Les seules lectures micro-ondes détectables proviennent d'Aralc-B et d'Aralc-A.

		#LOC_KS_SciDef_dmRadiometerScan_Arorua_InSpaceHigh = Malgré l'épaisse atmosphère de dioxyde de carbone d'Arorua, l'irradiance absolue est assez élevée en raison de sa proximité avec deux étoiles. Les énormes aurores scintillantes aident probablement aussi.

		#LOC_KS_SciDef_dmseismicHammer_Arorua_SrfLanded = L'analyse sophistiquée du marteau suggère qu'Arorua a une composition assez typique pour un monde terrestre, avec une croûte rocheuse et un noyau métallique partiellement en fusion.

		#LOC_KS_SciDef_dmbiodrillscan_Arorua_SrfLanded = C'est peut-être improbable, tiré par les cheveux, ou même fou - mais vous prenez quand même un échantillon de carotte sans vie, juste pour être absolument sûr.
		#LOC_KS_SciDef_dmbiodrillscan_Arorua_SrfLandedSubstellarPoint = Écoutez, on ne sait jamais, d'accord ? ON NE SAIT JAMAIS.

		// Ahtpan
		#LOC_KS_SciDef_dmMagScan_Ahtpan_SrfLanded = Après une analyse complète, vous déduisez que si le champ magnétique d'Ahtpan est relativement faible, il est tout juste assez fort pour tenir les vents solaires à distance.

		#LOC_KS_SciDef_rpwsScan_Ahtpan_InSpaceLow = Le champ magnétique provenant d'Ahtpan est substantiellement plus fort ici, suffisant pour transformer la tempête figurative de particules chargées en une simple brise gérable.
		#LOC_KS_SciDef_rpwsScan_Ahtpan_InSpaceHigh = Les motifs d'ondes radio indiquent une distorsion claire dans l'environnement magnétique ici ; c'est probablement l'œuvre d'un champ entourant Ahtpan. 

		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowGeneric = Ahtpan ressemble à un monde désertique tout droit sorti d'un film de science-fiction. Mais aucun auteur de science-fiction n'a jamais été assez inspiré pour imaginer des océans de pétrole ! La vérité est plus étrange que la fiction, semble-t-il, et peut-être plus impressionnante aussi. Moins de combats spatiaux, cependant...
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowMountains = Les montagnes d'Ahtpan se distinguent par des teintes plus rouges, offrant un bon contraste avec le reste de la surface beige.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowNaphthaOceansCoast = Ces photos nous assureront sûrement beaucoup de financement de l'industrie pétrolière.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowIslands = Tout peut être acheté et vendu pour le bon PÉÉÉÉTROOOOLE !
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowCraters = Ahtpan a une atmosphère assez épaisse, donc les rares impacteurs qui parviennent à la traverser doivent être de grande taille. La taille de ces cratères en est la preuve.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceHigh = La perspective d'une planète entière couverte d'océans d'or noir était trop tentante pour la laisser passer. Alors vous braquez le télescope sur Ahtpan et commencez à prendre des photos.

		#LOC_KS_SciDef_dmImagingPlatform_Ahtpan_InSpaceLow = L'analyse spectrale est indubitable - ce sont des océans de naphte. Des mers entières de précieux « explodium » attendent l'exploitation - que ce soit pour l'ISRU ou pour le profit !
		#LOC_KS_SciDef_dmImagingPlatform_Ahtpan_InSpaceHigh = L'atmosphère d'Ahtpan est principalement composée de dioxyde de carbone, mais il y a aussi de très fortes concentrations de vapeurs d'hydrocarbures dans de nombreuses régions.

		#LOC_KS_SciDef_dmSIGINT_Ahtpan_InSpaceLow = La surveillance radio ne détecte que du bruit statique lors des scans d'Ahtpan. C'est parfait : pas d'opérations minières extraterrestres signifie que nous avons la planète pour nous seuls ! Premier arrivé, premier servi, hein, E.T. ?

		#LOC_KS_SciDef_dmNAlbedoScan_Ahtpan_SrfLanded = Même sur terre, le capteur détecte beaucoup de dépôts d'hydrogène. Même le sol en est riche !
		#LOC_KS_SciDef_dmNAlbedoScan_Ahtpan_SrfSplashed = Une signature d'hydrogène très forte confirme nos espoirs les plus fous - que la surface d'Ahtpan est couverte d'océans de naphte.

		#LOC_KS_SciDef_dmlaserblastscan_Ahtpan_SrfLanded = L'analyse chimique de la surface sablonneuse révèle une composition principalement siliceuse, avec beaucoup d'hydrocarbures dispersés partout.
		#LOC_KS_SciDef_dmlaserblastscan_Ahtpan_SrfSplashed = La substance réagit violemment au laser et s'enflamme ! Oui, c'est bien du pétrole.

		#LOC_KS_SciDef_dmSolarParticles_Ahtpan_InSpaceLow = Le vent solaire est un peu plus rare ici, et l'instrument capte des traces de dioxyde de carbone et d'hydrocarbures.
		#LOC_KS_SciDef_dmSolarParticles_Ahtpan_InSpaceHigh = Ahtpan est assez violemment bombardé par Aralc-A, mais le vent solaire est un peu moins intense ici qu'en espace interplanétaire, impliquant l'existence d'un champ magnétique modérément fort.

		#LOC_KS_SciDef_dmSoilMoisture_Ahtpan_InSpaceLow = Les émissions micro-ondes d'Ahtpan sont très faibles, indiquant que la substance à sa surface n'est pas de l'eau.

		#LOC_KS_SciDef_dmRadiometerScan_Ahtpan_InSpaceHigh = L'atmosphère d'Ahtpan absorbe beaucoup de fréquences UV et IR à ondes courtes, indiquant que la majorité est probablement du dioxyde de carbone. La surface a un albédo assez élevé, ce qui aide à compenser quelque peu l'effet de serre.

		#LOC_KS_SciDef_dmseismicHammer_Ahtpan_SrfLanded = Les ondes sismiques montrent que l'intérieur d'Ahtpan est encore quelque peu actif, et son noyau est très probablement encore en fusion.

		#LOC_KS_SciDef_dmbathymetryscan_Ahtpan_SrfSplashedShallow = La caméra ne peut vraiment rien voir dans l'huile épaisse, mais l'analyse chimique confirme qu'il s'agit d'un type de naphte.
		#LOC_KS_SciDef_dmbathymetryscan_Ahtpan_SrfSplashedDeep = Je ne vois rien du tout, Capitaine !

		#LOC_KS_SciDef_dmbiodrillscan_Ahtpan_SrfLanded = L'échantillon de carotte révèle beaucoup de naphte, mais pas grand-chose d'autre. Il n'y a aucun signe d'activité biologique en cours.

		// Anehta
		#LOC_KS_SciDef_bothMagScan_Anehta_InSpaceLow = Les lectures du magnétomètre confirment la présence de plusieurs ceintures de radiation Van Kerman en orbite basse d'Anehta.
		#LOC_KS_SciDef_bothMagScan_Anehta_InSpaceHigh = Le champ magnétique d'Anehta est assez typique pour une géante gazeuse, bien qu'en raison de sa masse extrême il soit l'un des champs magnétiques planétaires les plus puissants jamais observés.

		#LOC_KS_SciDef_rpwsScan_Anehta_InSpaceLow = De puissantes et fréquentes émissions d'ondes radio « siffleur d'éclair » sont détectées depuis Anehta, suggérant une atmosphère chaotique avec beaucoup d'activité géomagnétique.
		#LOC_KS_SciDef_rpwsScan_Anehta_InSpaceHigh = Le puissant champ magnétique d'Anehta capture et accélère les particules chargées de ses deux étoiles. Ce processus provoque des impulsions d'ondes radio répétitives qui correspondent à sa période de rotation.

		#LOC_KS_SciDef_scopeScan_Anehta_InSpaceLow = Les ciels bleus en dessous font un tableau assez joli, et vous capturez ses tours massives de vapeur d'eau avec des détails spectaculaires. Vous êtes certain que Kerbin tout entier pourrait tenir dans certaines de ces tempêtes.
		#LOC_KS_SciDef_scopeScan_Anehta_InSpaceHigh = Les anneaux bleu-blanc d'Anehta correspondent assez bien à la géante gazeuse en couleur, mais comment est-ce possible ? Ce ne peut pas être de la glace ; Anehta est bien en deçà de la ligne de gel de ses étoiles. Peut-être que les anneaux sont faits de la même matière qu'Eulb ?

		#LOC_KS_SciDef_dmImagingPlatform_Anehta_InSpaceLow = Les scans complets des nuages supérieurs d'Anehta montrent une composition principalement d'hydrogène, d'hélium et de vapeur d'eau.
		#LOC_KS_SciDef_dmImagingPlatform_Anehta_InSpaceHigh = Les scans d'Anehta indiquent qu'il s'agit d'une géante gazeuse de classe II selon le système de classification Sudarskerb. Ses nuages supérieurs bleu-blanc brillants réfléchissent beaucoup de lumière visible, et une forte absorption UV indique qu'ils sont faits de vapeur d'eau.

		#LOC_KS_SciDef_dmSIGINT_Anehta_InSpaceLow = Anehta émet une symphonie de signaux radio alors que sa basse atmosphère tourbillonne et tempête, et le vent solaire qui a traversé sa magnétosphère bombarde inutilement son atmosphère profonde.

		#LOC_KS_SciDef_dmSolarParticles_Anehta_InSpaceLow = Protégés du vent solaire par Anehta, les collecteurs captent principalement de l'hydrogène, de l'hélium et des molécules d'eau.
		#LOC_KS_SciDef_dmSolarParticles_Anehta_InSpaceHigh = Le vent solaire près d'Anehta est d'une force similaire à Kerbin, mais il s'apaise rapidement lorsque le vaisseau pénètre plus profondément dans la puissante magnétosphère du géant.

		#LOC_KS_SciDef_dmSoilMoisture_Anehta_InSpaceLow = Un fort signal micro-ondes est reçu ; une indication que l'atmosphère d'Anehta contient une abondante vapeur d'eau.

		#LOC_KS_SciDef_dmRadiometerScan_Anehta_InSpaceHigh = Anehta a un albédo assez élevé, en raison de sa coloration bleu-blanc agréable. De fortes émissions thermiques, même sur la face sombre, indiquent un important chauffage interne.

		// Enots
		#LOC_KS_SciDef_dmMagScan_Enots_SrfLanded = Enots ne semble pas générer de champ magnétique. Quelle surprise...
		#LOC_KS_SciDef_bothMagScan_Enots_InSpace = La seule magnétosphère que l'instrument peut détecter provient d'Anehta.

		#LOC_KS_SciDef_rpwsScan_Enots_InSpace = Enots ne cause que des distorsions mineures dans la magnétosphère d'Anehta, comme la pierre proverbiale dans la rivière qui divise son flux.

		#LOC_KS_SciDef_scopeScan_Enots_InSpaceLow = La minuscule petite lune ressemble à quelqu'un qui aurait pris un gros morceau de schiste et l'aurait lancé en orbite.
		#LOC_KS_SciDef_scopeScan_Enots_InSpaceHigh = Attendez une minute ! Quelqu'un a sérieusement nommé cette chose « Enots » ? Quel genre de nom c'est ça ? 

		#LOC_KS_SciDef_dmImagingPlatform_Enots_InSpace = L'analyse multispectrale montre qu'Enots est principalement composé de minéraux silicatés sombres.

		#LOC_KS_SciDef_dmSIGINT_Enots_InSpaceLow = Les seuls signaux radio ici proviennent d'Anehta.

		#LOC_KS_SciDef_dmNAlbedoScan_Enots_SrfLanded = Les faibles signaux d'hydrogène pourraient s'expliquer par des traces de l'exosphère d'Anehta captées par cette petite lune.

		#LOC_KS_SciDef_dmlaserblastscan_Enots_SrfLanded = Le laser pulvérise une petite crête, révélant une composition principalement de roche silicatée - spécifiquement de la calcédoine. Il y a des traces d'oxydes d'aluminium qui pourraient être du corindon, ce qui explique la légère teinte bleue des régions équatoriales.

		#LOC_KS_SciDef_dmSolarParticles_Enots_InSpace = Les collecteurs captent un grand nombre de particules des anneaux d'Anehta, révélant une composition principalement de minéraux silicatés et d'oxydes d'aluminium, qui pourraient être du corindon bleu.

		#LOC_KS_SciDef_dmSoilMoisture_Enots_InSpaceLow = Enots ne semble pas générer d'émissions micro-ondes, écartant la présence de glace d'eau sur ou sous sa surface.

		#LOC_KS_SciDef_dmRadiometerScan_Enots_InSpaceHigh = Enots a un albédo très faible, mais l'analyse spectrale n'indique pas la présence de carbone. Cela suggère une autre origine pour sa couleur noire.

		#LOC_KS_SciDef_dmseismicHammer_Enots_SrfLanded = Les ondes sismiques se reflètent bien à travers la petite lune, indiquant qu'elle est assez dense et bien maintenue par les forces structurelles.

		// Efil
		#LOC_KS_SciDef_dmMagScan_Efil_SrfLanded = Le magnétomètre a capté le fort champ magnétique d'Efil depuis la surface, montrant comment les lignes de champ s'alignent parfaitement avec l'axe de rotation de la lune, comme deux danseurs en parfaite synchronisation.

		#LOC_KS_SciDef_rpwsScan_Efil_InSpace = L'ionosphère d'Efil interagit avec le puissant champ magnétique d'Anehta, peignant un tableau coloré de la relation entre les atmosphères et magnétosphères de ces deux mondes - Anehta le protecteur, et Efil l'enfant toujours rebelle désireux de prouver qu'elle... peut... dévier le vent solaire, euh, toute seule ? Écoutez, je manque de matière ici. 

		#LOC_KS_SciDef_scopeScan_Efil_InSpaceHigh = Comme une bille bleue parfaite, Efil brille en nuances de bleu-vert dans le télescope. L'image ne peut pas vraiment capturer la beauté d'Efil, mais elle peut au moins en préserver une fraction.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowWater = Les océans d'Efil brillent dans la lumière des deux soleils, illuminés en cyan vif comme une illustration tout droit sortie de la couverture d'un roman de science-fiction classique.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowRainforests = D'épaisses forêts tropicales d'arbres extraterrestres aux feuilles bleu-vert couvrent une grande partie de la surface de la planète, évoquant des images d'un Kerbin ancien romantisé, où des bêtes colossales parcouraient encore le monde - pourtant cette version de Kerbin a disparu depuis longtemps, tandis qu'Efil flotte ici, résolument tangible.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowGrassland = Des collines vertes ondulantes s'étendent sur Efil dans les régions basses, parsemées de parterres de fleurs et encadrées par des forêts tropicales comme peintes par un maître artiste.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowTropicalDesert = Les déserts tropicaux d'Efil peuvent être moins accueillants que la plupart de la planète, mais ils n'en sont pas moins beaux. Les dunes de sable ondulent comme les collines herbeuses ailleurs, sans doute parcourues par des troupeaux d'animaux résistants du désert - comme en témoignent les longues traces laissées dans le sable.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowNeedleleafForests = Les forêts arctiques d'Efil sont aussi luxuriantes et pleines de vie que les climats plus chauds, couvertes de vastes étendues de nature sauvage et glacées de neige.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowTundraColdDesert = Les régions froides et stériles d'Efil sont parmi les seuls endroits dépourvus de la beauté qui englobe le reste de la planète. Au lieu de cela, elles sont stériles et pour la plupart sans vie ; quelques-unes des dernières zones de désolation sur le monde grouillant d'Efil.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowMountainsSnowMountains = Les sommets d'Efil percent au-dessus des nuages, comme pour mieux voir le magnifique paysage qui les entoure. Sans doute peu de vie là-haut, mais il y a une sorte de paix à cela, n'est-ce pas ? Debout au sommet d'un tel pic, on ne ressentirait sûrement que la tranquillité.

		#LOC_KS_SciDef_dmImagingPlatform_Efil_InSpaceHigh = La large tapisserie de couleurs d'Efil s'étend bien dans les spectres non visibles, remplissant une véritable toile de données pour nos scientifiques. Ce qui est certain, c'est que, comme Kerbin, son atmosphère contient principalement de l'azote et de l'oxygène ; des signes clairs de vie combinés aux images d'Efil peintes en lumière visible.

		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmImagingPlatform_Efil_InSpaceLow = La géologie et la biologie très variées d'Efil forment un tableau complexe, racontant la riche histoire d'une lune enveloppée dans l'étreinte de la vie. Des montagnes imposantes aux plaines ondulantes, des jungles denses aux profondes fosses océaniques, Efil a beaucoup à offrir. Les touristes vont adorer cet endroit ! Je mets ça dans la brochure touristique.
		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmSIGINT_Efil_InSpaceLow = L'activité radio de l'atmosphère d'Efil raconte ses interactions avec la magnétosphère d'Anehta, mais personne ne chante cette chanson. C'est-à-dire qu'il n'y a aucune preuve de vie intelligente.

		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmImagingPlatform_EfilHome_InSpaceLow = La géologie et la biologie très variées d'Efil forment un tableau complexe, racontant la riche histoire d'une lune enveloppée dans l'étreinte de la vie. Des montagnes imposantes aux plaines ondulantes, des jungles denses aux profondes fosses océaniques, Efil a beaucoup à offrir.
		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmSIGINT_EfilHome_InSpaceLow = L'atmosphère d'Efil chante une chanson de magnétisme et - attendez, coupez les fioritures. J'entends le dernier match de ballon qui commence, je veux écouter !

		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedRainforestsGrassland = Le sol humide et fertile d'Efil est riche en atomes d'hydrogène des molécules d'eau, insufflant la vie à ses grandes forêts et prairies étendues.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedTropicalDesert = Bien que le sable ici soit sec, des traces d'eau continuent de fournir aux habitants du désert un rafraîchissement bien nécessaire.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedArcticBiomes = Gelé dans la glace et la neige, le sol arctique fournit volontiers de l'eau douce à ceux qui veulent bien la prendre.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedMountains = Les montagnes d'Efil sont comparativement sèches, pour la plupart dépourvues de vie car ces hautes altitudes rendent même Efil incapable de subvenir aux besoins de ses habitants.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedSnowMountains = Les sommets enneigés offrent de superbes vues, mais constituent un sol pauvre pour que la vie s'établisse. Malgré l'abondance d'eau, il n'y a rien à boire.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedBeach = Le sable humide ici collerait à vos orteils, si vous étiez là en personne pour en profiter. La teneur en hydrogène vous dit ce qui est déjà évident par le flux de la caméra ; cette plage est régulièrement touchée par des eaux cristallines et vivifiantes.

		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfSplashedWater = Pulvériser les vagues ondulantes confirme qu'il s'agit bien de précieuse eau liquide rafraîchissante - bien qu'avec une salinité peu appétissante.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedRainforestsGrassland = Les scans de surface montrent une abondance d'hydrogène, non seulement dans l'eau mais aussi dans les composés organiques ; un témoignage de l'écosystème florissant d'Efil.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedTropicalDesert = Le laser pénètre profondément dans le sable sec, révélant très peu d'hydrogène. Pour une région aussi aride, ça a du sens.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedMountains = Les hautes altitudes des montagnes d'Efil sont déficientes en eau et en vie.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedArcticBiomes = Même les régions les plus glaciales d'Efil grouillent de vie ; une fine couche de neige en surface cache un lit d'activité en dessous.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedSnowMountains = Bien qu'on puisse trouver beaucoup de glace d'eau sur ces sommets enneigés, peu d'autre chose est à trouver, car ces zones sont trop reculées pour que beaucoup survive.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedBeach = Il semble gaspillant de confirmer ce qui est déjà évident avec cet instrument coûteux... Peut-être êtes-vous simplement incrédule qu'une lune puisse avoir des mers si claires et propres ?

		#LOC_KS_SciDef_dmSolarParticles_Efil_InSpaceLow = En effleurant la couche la plus externe de l'atmosphère d'Efil, l'instrument collecte des molécules d'eau en plus du vent solaire - un signe clair qu'Efil est autant une retraite tropicale qu'elle en a l'air.
		#LOC_KS_SciDef_dmSolarParticles_Efil_InSpaceHigh = Des éléments plus lourds se déposent dans les wafer, preuve qu'Efil a une sorte de ceinture de Van Kerman à elle - comme si elle voulait emprisonner la vie qui vit sur elle. Peut-être qu'Efil n'est pas un hôte aussi gracieux qu'on ne le pensait ?

		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmSoilMoisture_Efil_InSpaceLow = Les émissions micro-ondes rendent encore plus clair que la surface d'Efil est pratiquement trempée d'eau. Bien que cela semble futile, il ne faut jamais oublier le faux paradis glacial qu'était Laythe, donc il est sage de vérifier.
		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmSoilMoisture_EfilHome_InSpaceLow = Les émissions micro-ondes rendent encore plus clair que la surface d'Efil est pratiquement trempée d'eau. C'était déjà connu, cependant, cela sert d'utile calibration de l'instrument si rien d'autre - et nous rappelle à quel point Laythe s'est révélé être un faux paradis, dans les âges passés.

		#LOC_KS_SciDef_dmRadiometerScan_Efil_InSpaceHigh = La surface brillante d'Efil est fortement teintée d'une magnifique nuance de cyan par son atmosphère épaisse, qui absorbe la plupart des UV et de la lumière proche infrarouge.

		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedSandy = La surface poudreuse en dessous absorbe très bien les ondes sismiques, résistant à vos tentatives de découvrir ses secrets.
		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedSoily = Le sol en dessous atténue la plupart des ondes qui le traversent, mais murmure des indices de cavernes s'étendant profondément sous la surface.
		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedRocky = Les ondes sismiques se propagent bien ici, vous montrant une image plus claire de l'intérieur d'Efil - bien qu'avec toutes les cavernes et couches, ce n'est rien de trop surprenant.

		#LOC_KS_SciDef_dmbathymetryscan_Efil_SrfSplashedWaterShallow = Un trésor de faune bioluminescente nage dans les eaux tropicales chaudes d'Efil, révélé en grand détail par les eaux cristallines.
		#LOC_KS_SciDef_dmbathymetryscan_Efil_SrfSplashedWaterDeep = Les profondeurs sombres d'Efil ne sont guère sombres du tout, car la vie marine lumineuse parsème le paysage jusqu'à l'horizon, apparaissant comme des étoiles nageant à travers un océan extraterrestre.

		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedBeach = Dans la zone intertidale, un petit animal ressemblant à un mammifère fait son nid dans une coquille, un charmant renversement d'un concept familier de Kerbin et un excellent exemple d'évolution convergente. Il utilise les coquilles abandonnées d'autres créatures marines comme abri, mais peut se déplacer étonnamment vite s'il est forcé de l'abandonner.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedRainforests = Une créature gluante à quatre membres se balance de branche en branche dans la canopée dense, ressemblant presque à une sorte de Kraken vertébré. Ou du moins, ce serait le cas si elle n'était pas d'une couleur bleue frappante. La créature observe votre vaisseau avec un intérêt particulier pendant que vous prenez un échantillon de sol, et descend de l'arbre pour lui donner un coup inoffensif avant de battre rapidement en retraite.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedGrassland = Des troupeaux de bêtes trapues à six pattes et à la peau ridée parcourent les plaines ouvertes, leurs effectifs si nombreux que peu de prédateurs peuvent les défier. Heureusement, ce troupeau n'interrompt pas le processus de prélèvement, mais à l'avenir il pourrait être prudent de scanner la zone avec les caméras du vaisseau plus régulièrement.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTropicalDesert = De petits animaux poilus creusent dans le sable pour établir des colonies colossales, créant de vastes réseaux souterrains de tunnels. Une sorte d'organisme bioluminescent semblable à un champignon pousse parmi les tunnels, qu'ils ont appris à cultiver et à manger. Au-dessus du sol, de grands troupeaux d'herbivores hauts aux longues pattes broutent les plus hauts arbres et communiquent silencieusement par des rayures qui peuvent briller d'une lumière vive.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedNeedleleafForests = Des invertébrés de taille kerbale se fondent dans la neige, leurs exosquelettes aussi pâles et blancs que leur environnement. L'un s'élance vers le vaisseau quand la foreuse s'étend, mais s'arrête avant de le toucher, semblant sentir peu de chaleur de son extérieur rigide et décidant que ce serait un mauvais déjeuner.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTundra = La toundra d'Efil est stérile mais loin d'être sans vie. D'énormes herbivores migrateurs peuvent être observés ici, recouverts d'une épaisse fourrure malgré leur nature invertébrée. Avec leurs longues pattes flexibles, ils peuvent se tenir debout pour presque tripler leur hauteur et atteindre toutes les branches sauf les plus hautes des arbres.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedColdDesert = Les déserts arctiques ont très peu de grands animaux, mais le sol en dessous grouille d'activité. Des créatures minuscules et poilues, de la taille d'insectes, courent dans la neige, creusant des tunnels et trouvant des plantes résistantes aux racines nutritives à récolter.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedMountains = Malheureusement, il n'y a pas grand-chose à voir à cette altitude. Le sol est surtout sans vie aux plus hauts sommets d'Efil, cependant, de grandes créatures au bec en forme de lance et aux ailes énormes peuvent encore être vues perchées sur les falaises. Pendant la nuit planétaire, quand Efil passe dans l'ombre d'Anehta, ces animaux prennent le ciel pour attraper des créatures marines et les ramener ici pour nourrir leurs petits affamés.

		// Eulb
		#LOC_KS_SciDef_dmMagScan_Eulb_SrfLanded = Le champ magnétique d'Eulb est assez faible, mais il n'est pas difficile à détecter avec l'instrument depuis la surface. De plus, il y a plusieurs champs localisés plus petits et plus forts à proximité.

		#LOC_KS_SciDef_rpwsScan_Eulb_InSpace = Le faible champ magnétique d'Eulb génère des distorsions fascinantes dans le champ magnétique d'Anehta alors qu'il orbite la planète géante.

		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowGeneric = Bon, pourquoi c'est bleu ? Est-ce qu'on a abordé ça ? Quelqu'un travaille sur ça ? Faites - Faites travailler quelqu'un sur ça.
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersSmall = Ça me donne un « déjà bleu »... Vous comprenez ?
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersBig = Les plus grands cratères d'Eulb sont parfois difficiles à distinguer des maria. Ils semblent presque avoir été érodés, mais la seule force qui pourrait faire cela serait les impacts de micrométéorites. Eulb est-il vraiment si ancien ?
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowDoubleCrater = Oh, voilà une caractéristique intéressante. Il semble s'agir de deux cratères d'impact imbriqués, un plus grand et un plus petit. Le cratère le plus interne semble être le plus jeune des deux.
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceHigh = Une lune bleue... Bon. Jeb, il est temps de sortir le costume de poulet.

		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceLow = Les scans spectroscopiques de la surface d'Eulb montrent une forte absorption IR presque partout sur la surface de la lune. Cela implique le corindon bleu, communément appelé saphir, comme responsable de sa couleur bleue frappante.
		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceHigh = Une atmosphère extrêmement ténue adhère à la surface d'Eulb. Elle est bien trop fine pour être détectée avec un baromètre.

		#LOC_KS_SciDef_dmSIGINT_Eulb_InSpaceLow = Plusieurs passages de surveillance radio ne révèlent rien d'intéressant sur Eulb.

		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLanded = Le scan ne révèle pas de quantités significatives d'hydrogène souterrain sur Eulb.
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPoles = Les faibles niveaux d'hydrogène ici peuvent s'expliquer par des dépôts de glace d'eau dispersés.
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPolarCrater = Un signal d'hydrogène assez fort est détecté ici, probablement parce qu'une grande partie de la zone du cratère polaire repose dans une ombre permanente.

		#LOC_KS_SciDef_dmlaserblastscan_Eulb_SrfLanded = L'analyse chimique de la surface d'Eulb montre qu'elle est relativement pauvre en silicates et extrêmement riche en aluminium et oxygène. Cela pointe vers le corindon bleu comme raison de sa coloration bleue, un matériau communément appelé saphir.

		#LOC_KS_SciDef_dmSolarParticles_Eulb_InSpace = Le faible champ magnétique d'Eulb fait peu pour dévier le vent solaire, mais Anehta fait beaucoup du travail pour lui de toute façon.

		#LOC_KS_SciDef_dmSoilMoisture_Eulb_InSpaceLow = Un faible signal micro-ondes est détecté, mais seulement lorsque les antennes sont pointées vers les pôles.

		#LOC_KS_SciDef_dmRadiometerScan_Eulb_InSpaceHigh = Eulb a un albédo assez élevé. Sa surface brillante réfléchit beaucoup de lumière dans toutes les longueurs d'onde enregistrées sauf le rouge et l'infrarouge.

		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLanded = Les scans sismiques sont assez bien absorbés par le régolite bleu poudreux. Vous pourriez obtenir de meilleurs résultats dans un endroit plus solide, comme un grand cratère.
		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLandedCratersBig = L'analyse de l'intérieur d'Eulb révèle une composition dense, probablement aussi riche en oxydes d'aluminium comme le corindon que la surface. 

		// Elad
		#LOC_KS_SciDef_dmMagScan_Elad_SrfLanded = Les lignes de champ magnétique suivent des directions étranges, semblant pointer vers une paire de pôles magnétiques inclinés d'environ 40 degrés par rapport à l'axe de rotation.
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceLow = Elad a un champ magnétique puissant, comparable en force à Kerbin.
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceHigh = L'interférence magnétique d'Anehta est un peu plus faible à cette distance, et Elad semble générer un champ magnétique considérable de son propre chef.

		#LOC_KS_SciDef_rpwsScan_Elad_InSpace = Elad déforme fortement le champ magnétique d'Anehta avec son propre champ puissant, le duo s'avérant assez efficace pour dévier ensemble le vent solaire.

		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGeneric = Les terres désolées d'Elad contrastent fortement avec les collines luxuriantes et les mers cristallines d'Efil, et rappellent sombrement la fragilité de la vie dans l'univers.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraters = La nature clairsemée de ces cratères par rapport à d'autres objets, comme Eulb à proximité, donne beaucoup de poids à l'idée qu'Elad avait une atmosphère épaisse assez récemment.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterLarge = Elad a plusieurs grands cratères comme celui-ci dispersés, qui semblent tous être des caractéristiques assez récentes.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterGiant = Ce cratère énorme est assez grand pour avoir pu être responsable de la perte de l'atmosphère d'Elad, mais il est impossible d'en être sûr.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCanyon = Ce canyon est si escarpé et si profond qu'il a dû être autrefois une fosse océanique.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowValleys = Elad est couvert de canyons profonds et de vallées du rift qui constituent une preuve claire de tectonique des plaques active dans son passé.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCliff = Whoa. Voilà une vraie falaise. Une tectonique des plaques intense doit être responsable d'une crête si énorme.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceHigh = RnD dit que ces étranges caractéristiques de surface ne peuvent vraiment s'expliquer que par Elad ayant récemment perdu une atmosphère épaisse et peut-être des océans. Ça semble si désolé... Est-ce vraiment possible ?

		#LOC_KS_SciDef_dmImagingPlatform_Elad_InSpaceLow = L'analyse spectrale montre que la surface a une composition similaire à Kerbin ; riche en silicates et métaux.
		#LOC_KS_SciDef_dmImagingPlatform_Elad_InSpaceHigh = Les émissions thermiques révèlent des signes de chauffage interne sur Elad, indiquant une activité géologique actuelle. 

		#LOC_KS_SciDef_dmSIGINT_Elad_InSpaceLow = Si quoi que ce soit, ou qui que ce soit, a autrefois vécu sur Elad, ils sont maintenant silencieux à la radio.

		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLanded = Il y a un faible signal d'hydrogène ici, mais il est difficile de déterminer s'il est faible en raison de la distance ou de faibles concentrations.
		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLandedLowlands = Des niveaux élevés d'hydrogène sont détectés, mais le signal est faible après avoir traversé beaucoup de roche. Cela pourrait indiquer la présence d'océans liquides profondément sous terre !

		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedMidlandsHighlands = La surface désolée d'Elad semble être chimiquement composée principalement de silicates, d'oxygène et d'aluminium. Comme Kerbin, une grande partie de sa surface est faite de granit.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedLowlands = Le sol ici contient une forte concentration de sel, impliquant fortement qu'il était autrefois le fond d'une mer ou d'un océan d'eau liquide.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCanyon = La surface densément compactée dans ce canyon est extrêmement salée, donnant beaucoup de poids à l'hypothèse qu'il s'agissait autrefois d'une fosse océanique profonde.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCliff = Cette falaise massive semble contenir plusieurs types de quartz.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedValleys = Les « vallées » d'Elad présentent un terrain salé densément compacté, impliquant que beaucoup, sinon toutes, étaient autrefois des fosses océaniques profondes. Il est possible qu'Elad ait été un monde océanique comme Laythe.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCratersCraterLarge = Les fortes concentrations de métaux étrangers et de composés carbonés autrement rares sur Elad donnent un aperçu de la composition de l'impacteur qui a produit ce cratère.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCraterGiant = Ce cratère massif est riche en métaux lourds et autres composés normalement absents de la surface d'Elad, preuve suggérant que l'impacteur était très dense et probablement très lourd.

		#LOC_KS_SciDef_dmSolarParticles_Elad_InSpaceLow = De légères traces d'azote sont détectées par les capteurs en orbite basse d'Elad, peut-être les derniers vestiges de son autrefois épaisse atmosphère.
		#LOC_KS_SciDef_dmSolarParticles_Elad_InSpaceHigh = Elad fait un travail remarquable pour dévier le vent solaire même à cette altitude, mais un certain nombre de particules chargées sont collectées de manière à impliquer l'existence d'une ceinture de radiation Van Kerman.

		#LOC_KS_SciDef_dmSoilMoisture_Elad_InSpaceLow = Orbiter au-dessus des régions les plus basses d'Elad révèle un signal micro-ondes constamment fort, impliquant fortement l'existence d'océans souterrains d'eau liquide. Si Elad a autrefois abrité la vie, il est tout à fait possible qu'elle vive encore là-bas !

		#LOC_KS_SciDef_dmRadiometerScan_Elad_InSpaceHigh = La surface brillante d'Elad a un albédo global assez élevé, favorisé par l'absence mystérieuse d'atmosphère de la lune.

		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLanded = Les réflexions sismiques des profondeurs d'Elad confirment que son noyau est encore entièrement en fusion et que son manteau est très actif.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedLowlands = La composition apparente de cette région correspond étroitement aux fonds marins de Kerbin, et par conséquent elle ne transmet pas très bien les ondes sismiques.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedGrandCanyonValleys = Cela semble être une ancienne fosse océanique, à en juger par la composition et les signes de compression sous une pression énorme présents dans le sol ici.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedCraterGiant = Les scans sismiques de ce cratère massif montrent clairement de grands dépôts de métaux lourds denses, indiquant que l'astéroïde qui a produit ce cratère était probablement métallique et aurait été assez massif pour traverser même une atmosphère épaisse.

		// Wormhole(s)
		#LOC_KS_SciDef_rpwsScan_Wormholes_InSpace = Le plasma du vent solaire aux deux extrémités du trou de ver semble interagir ici, formant un environnement de vent solaire complexe différent de tout ce que vous avez jamais vu.

		#LOC_KS_SciDef_scopeScan_WH3141A_InSpace = Vous pouvez presque voir une autre planète de l'autre côté. Vous voyez des anneaux, une étoile orange brillante, et... SAINT KRAKEN ! Est-ce un grand œil noir qui vous fixe ?
		#LOC_KS_SciDef_scopeScan_WH3141B_InSpace = La forme verte amicale de Jool est étalée à travers l'espace, presque comme une peinture à l'huile ou quelque chose comme ça. Vous pouvez aussi voir des aperçus de Laythe, Vall et Tylo.

		#LOC_KS_SciDef_dmImagingPlatform_Wormholes_InSpace = L'analyse multispectrale prouve... appelons ça « non concluante ». La lumière du trou de ver est si fortement déformée qu'il est difficile de vérifier que les lectures que vous prenez sont exactes.

		#LOC_KS_SciDef_dmSIGINT_WH3141A_InSpaceLow = D'étranges transmissions radio semblent provenir de l'objet. En surveillant le flux, vous auriez juré avoir entendu quelqu'un dire « Bonjour ! » et « Bon vol ». Merci, mystérieuse voix spatiale. Nous volerons en toute sécurité !
		#LOC_KS_SciDef_dmSIGINT_WH3141B_InSpaceLow = En surveillant l'activité radio émise par le trou de ver, vous captez les échos déformés des transmissions de Kerbin.

		#LOC_KS_SciDef_dmSolarParticles_WH3141A_InSpace = Les collecteurs captent une quantité surprenante de vent solaire à cet endroit ; cela provient probablement de l'autre côté du trou de ver.
		#LOC_KS_SciDef_dmSolarParticles_WH3141B_InSpace = Le vent solaire ici est une combinaison des vents de Kerbol et Sunorc ; bien que les lectures de Sunorc soient beaucoup plus stables.

		#LOC_KS_SciDef_dmSoilMoisture_Wormholes_InSpaceLow = Des radiations micro-ondes émanent du trou de ver à un rythme constant mais faible. Le trou de ver lui-même en est-il responsable, ou quelque chose de l'autre côté les génère-t-il ?

		#LOC_KS_SciDef_dmRadiometerScan_Wormholes_InSpaceHigh = Il est difficile d'utiliser cet instrument quand le moindre mouvement fera perdre la mise au point de tout objet visible à travers le trou de ver. Peut-être devriez-vous simplement serrer les dents et traverser ?

	}
}
