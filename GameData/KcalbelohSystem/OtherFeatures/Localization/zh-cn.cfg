		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceLow = 好吧，这是浪费钱。你可能刚毁掉了轨道望远镜。
		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceHigh = 你这疯子！想毁掉望远镜吗？这设备是为行星摄影设计的！

		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceLow = 你已使保修失效。
		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceHigh = 好吧，那是个坏主意。敏感仪器一对准Sunorc就自动关机，可能已损坏。

		#LOC_KS_SciDef_dmSIGINT_Sunorc_InSpaceLow = 像大多数恒星一样，Sunorc在宽频谱发射无线电波。无线电活动峰值似乎与黑子的形成和移动相关。

		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceLow = 恒星风的压倒性密度迫使设备关机，无法收集任何有用数据。希望没坏。
		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceHigh = Sunorc的恒星风对恒星来说很典型，虽然比Kerbol这样的G型星稍弱。

