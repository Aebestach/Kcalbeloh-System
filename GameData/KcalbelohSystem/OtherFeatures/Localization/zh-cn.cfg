		//Suluco Homeswitch Only
		#LOC_KS_SciDef_dmSIGINT_SulucoHome_InSpaceLow = 无线电扫描接收到来自各处地表殖民地和流动站的零散传输。有些小型前哨甚至深入昼夜半球相当远的距离。小绿人到这里没多久，但在这段时间里我们已经开始让Suluco有家的感觉。调对了甚至能收到最新头球比赛！

		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDay = 这里的地下氢痕迹几乎不存在。只有永久阴影处有微量。
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDayPole = 在亚恒星点，地表干得不像骨头——至少骨头还有点水。这里唯一的氢似乎由恒定恒星风沉积的痕迹组成。
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDesert = 这地区有一点氢，表明地表稍下有水。很干，但能生存。
