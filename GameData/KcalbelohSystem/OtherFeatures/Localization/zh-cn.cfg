		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh2 = Dipuc 从远处看像疙疙瘩瘩的面团、一颗花生……或苍白的樱桃核。或许海妖需要点零食暂时安抚，或毒药好为大家除害。它的母星 Sera 大概也不会在意。是否在这颗迷你卫星上及周围做实验科学上可行，就看你判断了，无畏的小绿人。\n\n\n什么，你以为探测器能飞这么远还保证不失联？
