		// Iomena

		#LOC_KS_SciDef_crewReport_Iomena_SrfLanded = El informe de la tripulación desde la superficie de Iomena señala el duro entorno del planeta y las condiciones meteorológicas extremas. Sin embargo, también se destaca la belleza del paisaje, con sus cráteres, océanos, montañas, cañones y ríos, así como la impresionante vista del agujero negro.
		#LOC_KS_SciDef_crewReport_Iomena_SrfSplashed = A pesar de las duras condiciones, la tripulación disfrutó de una vista espectacular de Kcalbeloh desde el planeta.
		#LOC_KS_SciDef_crewReport_Iomena_FlyingLow = Mientras sobrevolábamos los cañones y ríos de Iomena, observamos el terreno accidentado del planeta en la fina atmósfera.
		#LOC_KS_SciDef_crewReport_Iomena_FlyingHigh = Mientras surcábamos la atmósfera superior de Iomena, la vista era verdaderamente impresionante. Pudimos ver los cráteres y montañas del planeta desde una perspectiva completamente nueva. La fina atmósfera permitía ver muy lejos, y el disco de acreción brillando en la superficie del planeta creaba un hermoso juego de luz y sombras.
		#LOC_KS_SciDef_crewReport_Iomena_InSpaceLow = Iomena parece ser un planeta frío y hostil, pero sigue siendo un destino fascinante para la exploración científica.
		#LOC_KS_SciDef_crewReport_Iomena_InSpaceHigh = Desde lo alto sobre Iomena, el terreno accidentado del planeta y los vastos océanos son visibles. Los cráteres y cañones crean un paisaje dramático, y las montañas heladas brillan bajo la luz.

		#LOC_KS_SciDef_temperatureScan_Iomena_SrfLanded = El escaneo de temperatura en la superficie de Iomena revela un entorno frío con una temperatura media de -40°C. Sin embargo, la temperatura varía mucho según la ubicación, con algunas zonas mucho más frías que otras.
		#LOC_KS_SciDef_temperatureScan_Iomena_SrfSplashed = El escaneo de temperatura realizado tras amerizar en la superficie oceánica de Iomena reveló que la temperatura del océano es de -40°C, consistente con el entorno extremadamente frío del planeta.
		#LOC_KS_SciDef_temperatureScan_Iomena_FlyingLow = El escaneo de temperatura realizado mientras volábamos en la atmósfera baja de Iomena reveló una disminución gradual de la temperatura al aumentar la altitud.
		#LOC_KS_SciDef_temperatureScan_Iomena_FlyingHigh = Mientras la nave surcaba la atmósfera superior de Iomena, las lecturas de temperatura indicaban las gélidas condiciones de las regiones de gran altitud del planeta.

		#LOC_KS_SciDef_evaReport_Iomena_SrfLanded = Durante el EVA en la superficie de Iomena, la tripulación observó los grandes cráteres y el terreno accidentado, así como la presencia de amoníaco en las rocas y el suelo. También señalaron las temperaturas extremadamente frías y la fina atmósfera, que dificultarían la supervivencia de los kerbals sin equipo de protección.
		#LOC_KS_SciDef_evaReport_Iomena_SrfSplashed = Aunque fue un desafío moverse debido a la resistencia del líquido, el equipo EVA pudo recoger muestras del océano y observar las zonas circundantes. La alta concentración de amoníaco en el agua era inmediatamente notable.
		#LOC_KS_SciDef_evaReport_Iomena_FlyingLow = El informe EVA en la atmósfera baja de Iomena revela un entorno hostil con temperaturas muy bajas. La tripulación también observa el terreno accidentado con cañones, montañas y ríos.
		#LOC_KS_SciDef_evaReport_Iomena_FlyingHigh = El informe EVA mientras volábamos en la atmósfera superior de Iomena indicaba que el aire era fino y la temperatura extremadamente baja. La superficie del planeta era visible abajo, con grandes cráteres y cordilleras.
		#LOC_KS_SciDef_evaReport_Iomena_InSpaceLow = Cuando el miembro de la tripulación se aventuró fuera de la nave espacial, pudo observar el planeta Iomena desde la oscuridad del espacio. La fina atmósfera daba al planeta una apariencia única. Fue una experiencia impresionante e inolvidable.
		#LOC_KS_SciDef_evaReport_Iomena_InSpaceHigh = La vista desde el espacio alto sobre Iomena es impresionante, con su terreno accidentado y vastos océanos. La fina atmósfera del planeta es visible en un tono azul grisáceo.

		#LOC_KS_SciDef_surfaceSample_Iomena_SrfLanded = Al recoger una muestra de superficie de Iomena, se observó que el suelo está compuesto principalmente de minerales de silicato y contiene altos niveles de amoníaco. La muestra también contenía trazas de compuestos orgánicos, lo que puede sugerir la posibilidad de vida en el pasado o presente.
		#LOC_KS_SciDef_surfaceSample_Iomena_SrfSplashed = Al recoger la muestra líquida del océano de Iomena, observamos una alta concentración de amoníaco, consistente con estudios atmosféricos previos. Se requiere más análisis para determinar otros componentes químicos o biológicos notables.

		#LOC_KS_SciDef_mobileMaterialsLab_Iomena_SrfLanded = El experimento de la bahía de materiales en la superficie de Iomena reveló la presencia de varios minerales, incluyendo hierro, aluminio y silicio. Además, las muestras de superficie indican la posibilidad de actividad volcánica en el pasado. La fina atmósfera también contiene altos niveles de amoníaco.
		#LOC_KS_SciDef_mobileMaterialsLab_Iomena_SrfSplashed = El experimento de la bahía de materiales produce resultados interesantes sobre la composición química de los océanos del planeta, dada la alta concentración de amoníaco presente.

		#LOC_KS_SciDef_barometerScan_Iomena_SrfLanded = Podemos observar que la presión atmosférica es menor que la de Kerbin, lo cual es esperado dado que el planeta tiene una atmósfera más fina.
		#LOC_KS_SciDef_barometerScan_Iomena_SrfSplashed = La presión en la superficie del océano estaba dentro del rango esperado según datos previos: la presión atmosférica era significativamente menor que la de Kerbin.

		#LOC_KS_SciDef_seismicScan_Iomena_SrfLanded = El experimento de escaneo sísmico realizado en Iomena mientras estaba en su superficie proporcionó información valiosa sobre la estructura interna del planeta. El escaneo reveló una red compleja de fallas y fracturas bajo la superficie.

		#LOC_KS_SciDef_gravityScan_Iomena_SrfLanded = Las lecturas de gravedad en Iomena fluctúan notablemente según la ubicación. Esto probablemente se debe al terreno irregular y al impacto de sus numerosos cráteres y cañones.
		#LOC_KS_SciDef_gravityScan_Iomena_InSpaceLow = Las lecturas de gravedad en órbita baja alrededor de Iomena muestran valores relativamente estables. Se observó que el planeta tiene una atracción gravitatoria relativamente débil comparada con Kerbin.
		#LOC_KS_SciDef_gravityScan_Iomena_InSpaceHigh = Las lecturas de gravedad fluctúan ligeramente según la altitud de la nave y la atracción gravitatoria de Kcalbeloh.

		#LOC_KS_SciDef_magnetometer_Iomena_InSpaceLow = El débil campo magnético de Iomena sigue siendo detectable incluso en órbita baja, indicando una posible fuente de material magnético en o bajo la superficie.
		#LOC_KS_SciDef_magnetometer_Iomena_InSpaceHigh = Las lecturas del magnetómetro desde la órbita alta de Iomena muestran que el planeta tiene un campo magnético débil, probablemente debido a su fina atmósfera.

		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_SrfLanded = Según el análisis atmosférico realizado en Iomena, la atmósfera del planeta está compuesta principalmente de amoníaco con trazas de metano y dióxido de carbono.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_SrfSplashed = Según el análisis atmosférico realizado en la superficie líquida de Iomena, la atmósfera está compuesta principalmente de amoníaco con trazas de metano y dióxido de carbono.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_FlyingLow = Según el análisis atmosférico en altitudes bajas de Iomena, la atmósfera está compuesta principalmente de amoníaco con trazas de metano y dióxido de carbono.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_FlyingHigh = Desde la atmósfera superior de Iomena, nuestro análisis indica que la concentración de amoníaco es significativamente mayor que en la atmósfera inferior.

		// Uleg
		#LOC_KS_SciDef_crewReport_Uleg_SrfLanded = Al aterrizar en Uleg, la tripulación informó de temperaturas extremadamente bajas y vientos helados constantes. También señalaron la presencia de grandes formaciones de hielo y evidencia de criovulcanismo activo.
		#LOC_KS_SciDef_crewReport_Uleg_FlyingLow = Pudimos observar el terreno helado del planeta con más detalle durante nuestro sobrevuelo de la atmósfera baja de Uleg. La superficie era relativamente plana con algunas grietas y crestas visibles.
		#LOC_KS_SciDef_crewReport_Uleg_FlyingHigh = Volamos por la atmósfera superior de Uleg y encontramos vientos fuertes y frío intenso. La gruesa capa de hielo y la baja presión atmosférica dificultaron mantener la altitud.
		#LOC_KS_SciDef_crewReport_Uleg_InSpaceLow = Mientras volábamos en el espacio cerca de Uleg, pudimos ver la superficie helada del planeta brillando a lo lejos. A pesar de estar lejos de Kcalbeloh, la gravedad del planeta aún se sentía fuertemente.
		#LOC_KS_SciDef_crewReport_Uleg_InSpaceHigh = La tripulación informa que desde lo alto del espacio, Uleg aparece como un mundo desolado y estéril con una superficie casi enteramente cubierta de hielo.

		#LOC_KS_SciDef_temperatureScan_Uleg_SrfLanded = La temperatura en la superficie de Uleg es extremadamente fría, con lecturas consistentemente por debajo del punto de congelación.
		#LOC_KS_SciDef_temperatureScan_Uleg_FlyingLow = La temperatura en Uleg disminuye significativamente al bajar la altitud, con una diferencia de hasta 50 grados Celsius entre la atmósfera superior e inferior.
		#LOC_KS_SciDef_temperatureScan_Uleg_FlyingHigh = La temperatura en la atmósfera superior de Uleg es extremadamente baja, probablemente debido a la distancia del planeta respecto a Kcalbeloh.

		#LOC_KS_SciDef_evaReport_Uleg_SrfLanded = Cuando la tripulación pisó la superficie helada de Uleg, quedaron impresionados por el frío intenso y la vasta extensión de terreno congelado ante ellos.
		#LOC_KS_SciDef_evaReport_Uleg_FlyingLow = Debido a las temperaturas extremadamente bajas y el terreno helado, realizar un EVA en la atmósfera baja de Uleg sería muy desafiante y peligroso.
		#LOC_KS_SciDef_evaReport_Uleg_FlyingHigh = Debido al frío extremo y la falta de atmósfera, no se recomienda realizar un EVA en la atmósfera superior de Uleg.
		#LOC_KS_SciDef_evaReport_Uleg_InSpaceLow = Cuando el miembro de la tripulación se aventuró fuera de la nave, pudo observar el gélido planeta Uleg desde la oscuridad del espacio.
		#LOC_KS_SciDef_evaReport_Uleg_InSpaceHigh = Durante el EVA en el espacio alto sobre Uleg, el miembro de la tripulación observó la superficie cubierta de hielo del planeta y su órbita muy inclinada y excéntrica.

		#LOC_KS_SciDef_surfaceSample_Uleg_SrfLanded = Al recoger muestras de superficie de Uleg, la tripulación notó que el hielo era extremadamente duro y mostraba evidencia de haber estado expuesto a temperaturas extremas.

		#LOC_KS_SciDef_mobileMaterialsLab_Uleg_SrfLanded = Durante el experimento de estudio de materiales en la superficie de Uleg, se analizaron muestras de hielo para su composición química y propiedades físicas.

		#LOC_KS_SciDef_barometerScan_Uleg_SrfLanded = El escaneo barométrico en la superficie de Uleg indicó una baja presión atmosférica, consistente con las temperaturas gélidas del planeta.
		#LOC_KS_SciDef_barometerScan_Uleg_FlyingLow = El escaneo barométrico en la atmósfera baja de Uleg reveló una presión de aire significativamente menor.
		#LOC_KS_SciDef_barometerScan_Uleg_FlyingHigh = La presión sería demasiado baja para que el instrumento detecte datos significativos.

		#LOC_KS_SciDef_seismicScan_Uleg_SrfLanded = Durante el escaneo sísmico en la superficie de Uleg, el equipo registró varios temblores menores, indicando que el planeta puede seguir geológicamente activo.

		#LOC_KS_SciDef_gravityScan_Uleg_SrfLanded = La tripulación realizó un escaneo gravitatorio en la superficie de Uleg. Los resultados mostraron variaciones en el campo gravitatorio del planeta.
		#LOC_KS_SciDef_gravityScan_Uleg_InSpaceLow = Durante el experimento de escaneo gravitatorio en el espacio bajo sobre Uleg, la nave pudo medir el campo gravitatorio del planeta.
		#LOC_KS_SciDef_gravityScan_Uleg_InSpaceHigh = Se realizó un escaneo gravitatorio del planeta Uleg desde una nave en órbita alta.

		#LOC_KS_SciDef_magnetometer_Uleg_InSpace = Los datos recogidos mostraron un campo magnético débil, probablemente debido a la falta de un núcleo de hierro sustancial en el planeta.

		#LOC_KS_SciDef_atmosphereAnalysis_Uleg_SrfLanded = Recogimos muestras de gas y medimos la presión y composición atmosférica. Los resultados preliminares sugieren que la atmósfera está compuesta principalmente de nitrógeno y metano.
		#LOC_KS_SciDef_atmosphereAnalysis_UlegFlyingLow = A medida que la nave descendía a la atmósfera baja de Uleg, se encontró que la atmósfera era fina y compuesta principalmente de nitrógeno.
		#LOC_KS_SciDef_atmosphereAnalysis_UlegFlyingHigh = El análisis atmosférico en la atmósfera superior de Uleg reveló una alta concentración de nitrógeno, metano y dióxido de carbono.


		// Maelg
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceLow1 = El cuerpo justo fuera del ojo de buey de la nave no parece brillar como lo haría una verdadera estrella, sino que principalmente baña suavemente el casco y los cuerpos circundantes con un resplandor tenue.
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceLow2 = Desde esta distancia cercana, las bandas de la enana marrón son claramente visibles, insinuando aún más su condición de «casi-fusión».
		#LOC_KS_SciDef_temperatureScan_Maelg_InSpaceLow = Aunque el termómetro te informa amablemente de que Maelg es bastante caliente, también revela que solo tiene aproximadamente un tercio del calor de Kerbol en su «superficie».
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceLow1 = A esta distancia cercana de la enana marrón, con solo tu aparentemente frágil traje protegiéndote de sus temperaturas aún abrasadoras, cuestionas a los científicos kerbales que te describieron la estrella fallida como «pequeña y tenue» durante el briefing de la misión.
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceLow2 = La luz que emana de Maelg no es tan dura como esperabas, y en realidad es algo agradable.
		#LOC_KS_SciDef_mysteryGoo_Maelg_InSpaceLow = El Goo sin protección comienza rápidamente a cocerse y sublimarse en el contacto cercano con Maelg, a pesar de la técnicamente baja temperatura de la enana marrón (en términos estelares, claro).
		#LOC_KS_SciDef_mobileMaterialsLab_Maelg_InSpaceLow = Las muestras de plomo y otros metales más blandos comienzan a burbujear y flotar fuera de la bahía de materiales bajo el resplandor tipo lámpara de calor de Maelg, mientras que las muestras más resistentes simplemente comienzan a brillar con calor interno, no muy diferente del cuerpo estelar justo debajo.
		#LOC_KS_SciDef_gravityScan_Maelg_InSpaceLow = La gravedad indicada en la superficie de Maelg podría compararse con una versión sustancialmente más extrema del ya poderoso pozo gravitatorio de Jool, ya que a pesar de su (relativamente hablando) pequeño tamaño, la estrella fallida es capaz de retener a Mehtna y Meiuqer con bastante seguridad, a pesar de la interferencia de los otros sistemas cercanos y del propio Kcalbeloh.
		#LOC_KS_SciDef_magnetometer_Maelg_InSpaceLow = El magnetómetro revela la furia que bulle dentro del por lo demás tenue y débil Maelg, al captar su violentamente fuerte campo magnético y los consiguientes cinturones de radiación. El KSC te informa que pienses en ello como los campos magnéticos de Jool con esteroides... multiplicado por 50.

		#LOC_KS_SciDef_crewReport_Maelg_InSpaceHigh1 = Desde esta distancia, Maelg casi te engaña haciéndote creer que es una estrella. Casi es la palabra clave aquí.
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceHigh2 = Tan lejos como estamos aquí, Maelg parece ser poco más que una tenue luz nocturna comparada con los focos halógenos de las estrellas a las que estás acostumbrado. Ciertamente no es comparable en absoluto con la ira impía de Kcalbeloh, ni siquiera con Kerbol.
		#LOC_KS_SciDef_temperatureScan_Maelg_InSpaceHigh = Desde esta distancia, Maelg no es detectado fuertemente por la unidad de temperatura.
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceHigh1 = Desde aquí, Maelg te recuerda al filamento de una bombilla, brillando suavemente por sí solo en la oscuridad infinita. Comparado con el horror cósmico evocado por Kcalbeloh, Maelg es bastante reconfortante.
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceHigh2 = Aunque el vacío del espacio te impide hacerlo físicamente, no puedes evitar sentirte calentado por la suave luz de Maelg. Es fácilmente lo más cómodo que has estado en este viaje hasta ahora.
		#LOC_KS_SciDef_mysteryGoo_Maelg_InSpaceHigh = El Goo parece adoptar un tono ámbar similar a todo lo demás en el sistema Maelg. ¿O es solo un truco de la tenue luz que cubre todo lo que está a la vista?
		#LOC_KS_SciDef_mobileMaterialsLab_Maelg_InSpaceHigh = La mayoría de las muestras permanecen inertes a esta distancia de la enana marrón, con la notable excepción de parecer adoptar el tono sepia de la estrella fallida de abajo. Sin embargo, la bahía de pruebas magnéticas dentro del laboratorio de materiales indica que Maelg tiene un campo magnético muy extraño y poderoso y probablemente es bastante volátil, a pesar de su apariencia suave.
		#LOC_KS_SciDef_gravityScan_Maelg_InSpaceHigh = A esta distancia, el pozo gravitatorio de Maelg es un poco tenue comparado con estrellas verdaderas como Kerbol, pero sigue siendo palpable y supera con creces incluso al más masivo de los planetas.
		#LOC_KS_SciDef_magnetometer_Maelg_InSpaceHigh = Desde aquí arriba, el campo magnético detectado sigue siendo bastante manso, como el resto de Maelg. Sin embargo, cuanto más te acerques, más fuerte se volverá la violencia dentro de la enana marrón en relación a ti y tu diminuta nave.

		//Mehtna
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded1 = No puedes evitar recordar fotografías vintage al mirar la aparentemente sepia superficie de Mehtna desde las ventanas del módulo de aterrizaje.
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded2 = Comparado con algunos de los destinos más extremos en exhibición en el vecindario de Kcalbeloh, todo esto es un bienvenido cambio de ritmo.
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded3 = No puedes evitar sentirte reconfortado e incluso algo somnoliento en este pequeño mundo sepia similar a Duna.
		#LOC_KS_SciDef_temperatureScan_Mehtna_SrfLanded_TempLow = En este lado del planeta, la atmósfera se condensa parcialmente y cae al suelo en una especie de aguanieve debido al frío extremo, no muy diferente de los polos de Duna, aunque de forma mucho más reducida comparado con ese mundo.
		#LOC_KS_SciDef_temperatureScan_Mehtna_SrfLanded_TempHigh = En este lado de Mehtna, la fina atmósfera se calienta sustancialmente por el tenue Maelg, y demuestra que ninguna parte de este mundo ámbar yermo es capaz de sustentar vida, lado caliente o frío sin importar.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded1 = Sientes que todo a tu alrededor se parece a una fotografía vintage desvaída. Tu propia piel parece adoptar un tono ámbar inusual.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded2 = Obtienes la peculiar sensación al estar sobre Mehtna de que este mundo está verdaderamente muerto, como una batería agotada.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded3 = Es dudoso que los paneles solares te sirvan de mucho en este entorno tenue.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_SrfLanded1 = El Goo parece endurecerse y adoptar un tono sepia, y también sublimarse ligeramente en la tenue atmósfera.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_SrfLanded2 = El Goo ya no emana calor internamente, y parece volverse tan sin vida como el propio Mehtna.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded1 = Las muestras que recoges parecen no ser totalmente estructuralmente sólidas una vez movidas, como si fueran frágiles por haber estado estáticas tanto tiempo.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded2 = Estas muestras sin duda resultarán útiles, ya que son bastante antiguas a juzgar por el aparentemente inalterado entorno que es la superficie mehtniana.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded3 = Las muestras en sí parecen ser una saludable mezcla de sustrato y trozos antiguos de hielo.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_SrfLanded1 = Dependiendo de la orientación de la bahía misma, las muestras volátiles en la bahía de materiales alternan entre sublimación y congelación sólida.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_SrfLanded2 = Las muestras (con la notable excepción de la muestra de agua, que hierve rápidamente) permanecen principalmente sin cambios, además de parecer reaccionar muy ligeramente con la atmósfera tenue circundante.
		#LOC_KS_SciDef_barometerScan_Mehtna_SrfLanded = El barómetro confirma la naturaleza tenue de la atmósfera de Mehtna, aunque también indica que es bastante más gruesa que la atmósfera de Duna. Sin embargo, en comparación con planetas como Rouqea o incluso lunas como Efil, esta atmósfera es de poca consecuencia.
		#LOC_KS_SciDef_seismicScan_Mehtna_SrfLanded = Los escaneos sísmicos indican que la única actividad detectable en este solitario planeta es causada por impactos ocasionales.
		#LOC_KS_SciDef_gravityScan_Mehtna_SrfLanded = La gravedad en este mundo es bastante sustancial comparada con otros destinos a lo largo del sistema solar y más allá, llegando a poco más de la mitad de la gravedad de Kerbin. La encuentras un feliz término medio para explorar efectivamente esta tumba de mundo sin empantanarte o salir volando demasiado lejos con cada paso.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_SrfLanded = El analizador atmosférico indica que la fina atmósfera de este planeta consiste principalmente en dióxido de carbono y vapor de agua, con una saludable cantidad de gases traza. ¡Mehtna sería un candidato principal para la extracción de recursos atmosféricos!

		#LOC_KS_SciDef_crewReport_Mehtna_FlyingLow = Miras el extraño planeta debajo, notando que la geografía parece totalmente alienígena. Esto probablemente es causado por la… única situación solar que enfrenta Mehtna.
		#LOC_KS_SciDef_temperatureScan_Mehtna_FlyingLow = La temperatura de la atmósfera fluctúa constantemente según dónde esté la nave sobre la superficie.
		#LOC_KS_SciDef_evaReport_Mehtna_FlyingLow = Esto tiene que ir contra las normas de seguridad del programa. Por suerte, el KSC está a [REDACTADO] años luz, así que no tienen que saberlo.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_FlyingLow = El Goo expuesto se agita con el viento, pero solo muy ligeramente. Se sublima al hacerlo, dejando un pequeño rastro de vapor mientras la nave desciende.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_FlyingLow = Cuanto más desciendes en la atmósfera de Mehtna, menos se subliman las muestras volátiles; sin embargo, nunca dejan de hacerlo por completo.
		#LOC_KS_SciDef_barometerScan_Mehtna_FlyingLow = La presión, incluso a esta baja altitud literal, es notablemente menor en la parte superior del vehículo que en la inferior.
		#LOC_KS_SciDef_gravityScan_Mehtna_FlyingLow = Los escaneos gravitatorios precisos aún no son posibles a esta altitud debido a que la fina atmósfera es lo suficientemente sustancial como para desestabilizar la nave y causar oscilaciones.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_FlyingLow = El analizador atmosférico indica que la fina atmósfera de este planeta consiste principalmente en dióxido de carbono y vapor de agua, con una saludable cantidad de gases traza. ¡Mehtna sería un candidato principal para la extracción de recursos atmosféricos!

		#LOC_KS_SciDef_crewReport_Mehtna_FlyingHigh = Miras el extraño planeta muy abajo, notando que la geografía parece totalmente alienígena. Esto probablemente es causado por… Tienes que dejar de mirar, ya que la fuerza de entrada atmosférica casi te hace golpear la cabeza en el interior del casco si sigues girando para mirar por la ventana.
		#LOC_KS_SciDef_temperatureScan_Mehtna_FlyingHigh = La temperatura media del planeta solo puede estimarse aproximadamente a esta altitud, debido a lo fina que es la atmósfera. Sin embargo, aquí arriba hace frío. Vaya sorpresa, lo sabemos.
		#LOC_KS_SciDef_evaReport_Mehtna_FlyingHigh = ¿Estás INTENTANDO que te arranquen de la escalera de la nave por el cizallamiento del viento y te lancen a sabe-quien-qué a Mach 2?
		#LOC_KS_SciDef_mysteryGoo_Mehtna_FlyingHigh = El Goo tiembla violentamente con el resto del vehículo, mientras también parece desvanecerse en color al mismo tono marrón del que todo lo rodea.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_FlyingHigh = Muchas de las muestras se sueltan por la fuerza de la entrada atmosférica, pero por lo demás aún no reaccionan significativamente a su entorno.
		#LOC_KS_SciDef_barometerScan_Mehtna_FlyingHigh = A esta altitud, la atmósfera es demasiado tenue para hacer mucho más que sacudir tu nave mientras desciendes hacia el extraño mundo beige de abajo.
		#LOC_KS_SciDef_gravityScan_Mehtna_FlyingHigh = A pesar de las perturbaciones causadas por la entrada de la nave en la atmósfera mehtniana, la gravedad en la superficie se estima en aproximadamente 0,5 G o algo así.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_FlyingHigh = El analizador atmosférico indica que la fina atmósfera de este planeta consiste principalmente en dióxido de carbono y vapor de agua, con una saludable cantidad de gases traza. ¡Mehtna sería un candidato principal para la extracción de recursos atmosféricos!

		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceLow1 = El mundo debajo de ti te recuerda a un estanque lodoso, o quizás una bola de madera pulida.
		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceLow2 = No puedes evitar encontrar a Mehtna como un patito feo comparado con Suluco o Arorua, pero tiene una especie de encanto reconfortante.
		#LOC_KS_SciDef_temperatureScan_Mehtna_InSpaceLow = Aunque el mundo parece desolado y estático desde esta altitud, los instrumentos termométricos implican que al menos térmicamente hablando, Mehtna es bastante variado.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceLow1 = El planeta marrón te baña en su luz, y de repente te sientes con ganas de chocolate.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceLow2 = Al ver Mehtna de cerca, tienes el repentino impulso de lanzar una bola de barro a uno de tus compañeros al volver a Kerbin.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_InSpaceLow = El Goo se descompone y adopta la apariencia y consistencia de salsa de chocolate caliente, quizás en respuesta al entorno de radiación único producido por Maelg.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_InSpaceLow = Las muestras parecen ser indiferentes a su entorno, con falta de actividad en la bahía (menos las muestras de agua que silenciosamente se evaporan, pero nadie te preguntó por ti, Muestras de Agua).
		#LOC_KS_SciDef_gravityScan_Mehtna_InSpaceLow = La gravedad abajo se estima en aproximadamente la mitad de la de Kerbin, quizás un poquito más.
		#LOC_KS_SciDef_magnetometer_Mehtna_InSpaceLow = El campo magnético detectado podría equipararse a ser algo similar al de Duna, solo que amplificado. Esto probablemente se debe a que los dos planetas comparten varias cualidades, solo que Mehtna es sustancialmente más grande.

		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceHigh1 = Intentas limpiar la pequeña mancha marrón de la ventana de la nave… Oh. Espera un momento.
		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceHigh2 = Si este pequeño sistema solar (¿o técnicamente, enana marrón?) fuera un vino, lo describirías como: «Marrón, con sobretonos de beige y un toque de sepia, quizás solo una mera pizca de ralladura de naranja.»
		#LOC_KS_SciDef_temperatureScan_Mehtna_InSpaceHigh = Las lecturas del termómetro enfatizan la relativa debilidad del calentamiento de Maelg comparado con una estrella.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceHigh1 = Crees que hay un pequeño bicho marrón en tu casco y empiezas a entrar en pánico, hasta que tu tripulación te recuerda amablemente dónde estás.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceHigh2 = La tenue luz de Maelg se refracta a través de la atmósfera de aspecto lodoso de Mehtna de una manera extraña, haciendo que dicha atmósfera parezca tanto densa como fina al mismo tiempo.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_InSpaceHigh = El Goo parece derivar hacia el planeta y Maelg tanto como puede dada su naturaleza confinada, aparentemente en un intento de sentir calor.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_InSpaceHigh = La mayoría de las muestras parecen normales, pero algunos de los experimentos más frágiles parecen haberse congelado en el entorno de bajo calor tan lejos de Maelg. Solo puedes imaginar lo frío que debe estar Meiuqer.
		#LOC_KS_SciDef_gravityScan_Mehtna_InSpaceHigh = La gravedad abajo se estima en aproximadamente la mitad de la de Kerbin, quizás un poquito más.
		#LOC_KS_SciDef_magnetometer_Mehtna_InSpaceHigh = El magnetómetro informa que aunque un poco débil, ¡Mehtna realmente posee un campo magnético palpable! Sin embargo, el campo no es lo suficientemente fuerte para proteger nada en la superficie de la radiación solar/interestelar de Maelg y todos los demás sistemas solares cercanos.

		//Meiuqer
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded1 = Esta pequeña y polvorienta patata espacial fría sigue siendo innegablemente fascinante para ti y tu tripulación.
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded2 = Desde esta distancia, la ya tenue luz de Maelg se desvanece hasta la casi insignificancia.
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded3 = La superficie de Meiuqer parece como si hubiera sido descongelada y congelada repetidamente por algún tiempo, similar a un helado dejado derretir y luego volver a congelar.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_SrfLanded1 = Aunque la temperatura en este pequeño y extraño mundo fluctúa bastante a menudo en su órbita, nunca es «cálida» por ningún concepto de la imaginación.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_SrfLanded2 = El termómetro te dice lo obvio en esta situación particular: ¡F R Í O!
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded1 = Mientras estás en la superficie de Meiuqer, tienes cuidado de no estornudar y alcanzar la velocidad de escape.
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded2 = Manejas poder cósmico infinito. Lanzaste ligeramente una roca cercana, y ha comenzado a orbitar Meiuqer. Hay que amar la baja gravedad.
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded3 = Vaya, pensabas que Gilly era difícil de navegar. Al menos Gilly no parece estar oscura todo el tiempo o teñida como película vintage.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_SrfLanded1 = El Goo se congela sólido y suena contra su contenedor, aflojándolo y causando que flote en una masa sólida a la velocidad de escape de Meiuqer.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_SrfLanded2 = El Goo casi flota en su cápsula como si aún estuviera en microgravedad, especialmente una vez que comienza a sublimarse y congelarse en el duro vacío de Meiuqer.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded1 = Tienes que tener cuidado al recoger tus muestras de no flotar lejos de Meiuqer.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded2 = Las muestras que recoges son bastante notables. Mientras Mehtna es indudablemente antiguo, Meiuqer está literalmente intacto desde su formación, menos los efectos causados por sus regulares y drásticos cambios de temperatura al acercarse y alejarse de Maelg en su altamente excéntrica órbita.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded3 = Ahora que se han obtenido muestras de este extraño pequeño mundo, está claro que Meiuqer es un asteroide tipo «pila de escombros», debido a su radio sustancial a pesar de tener un campo gravitatorio más débil que el mucho más pequeño Gilly.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_SrfLanded1 = Las muestras no reaccionan mucho al ser expuestas a Meiuqer, además de que las muestras volátiles se vaporizan rápidamente y/o se congelan sólidas.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_SrfLanded2 = Además de la sublimación, lo único observado en el laboratorio de materiales es que el experimento eléctrico se vuelve inestable y hace cortocircuito debido al polvo que rodea a Meiuqer recubriéndolo en solo unos minutos de exposición. El polvo aparentemente está siendo cargado eléctricamente por Maelg, o al menos es conductor de electricidad hasta cierto punto.
		#LOC_KS_SciDef_seismicScan_Meiuqer_SrfLanded = Los escaneos sísmicos de Meiuqer revelan sin sorpresa que el pequeño mundo está completamente muerto y bien podría ser una patata gigante flotando en el vacío del espacio.
		#LOC_KS_SciDef_gravityScan_Meiuqer_SrfLanded = Intentas medir la gravedad en Meiuqer. La pantalla del sensor apenas llega tan bajo, pero obtienes tu lectura.

		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceLow1 = La superficie está algo oscurecida por la exosfera polvorienta de Meiuqer, pero no es en absoluto comparable a una verdadera atmósfera.
		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceLow2 = Observas cómo una pequeña roca impacta Meiuqer a velocidad moderada, enviando una roca del tamaño de un coche flotando desde la superficie.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_InSpaceLow = El termómetro hace su mejor impresión de «Piedra Fría» tras intentar tomar lecturas en el planetoide de abajo.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceLow1 = Podrías aterrizar fácilmente en Meiuqer solo con tu propulsor EVA desde aquí, con combustible de sobra.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceLow2 = Es peculiar pensar que teóricamente puedes saltar a órbita desde la superficie.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_InSpaceLow = El Goo rápidamente se vuelve arenoso y recubierto con el polvo que rodea a Meiuqer.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_InSpaceLow = La electrónica hace cortocircuito y las muestras se contaminan muy rápidamente por las copiosas cantidades de polvo presentes alrededor de Meiuqer a esta baja altitud.
		#LOC_KS_SciDef_gravityScan_Meiuqer_InSpaceLow = El escáner gravitatorio se ríe groseramente e informa una cifra insignificante.
		#LOC_KS_SciDef_magnetometer_Meiuqer_InSpaceLow = El magnetómetro confirma de nuevo que la totalidad de esta patata espacial está, de hecho, más muerta que muerta.

		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceHigh1 = Mientras la nave se arrastra en su órbita sobre el planetoide a una velocidad insoportablemente lenta, tienes mucho tiempo para mirar la mota de polvo celeste que actualmente «orbitas».
		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceHigh2 = Parece que alguien dejó caer accidentalmente una ración de patata por el conducto de basura, puedes verla flotando a buena distancia de la nave… Oh.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_InSpaceHigh = El termómetro lucha por estimar la temperatura del cuerpo muy abajo, debido a… ya sabes, el vacío.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceHigh1 = ¡Aún podrías aterrizar desde aquí con tu propulsor EVA! Podría tomar unas horas, ponte cómodo.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceHigh2 = Te aseguras de no hacer movimientos bruscos fuera de la nave, no sea que te caigas de órbita.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_InSpaceHigh = El Goo parece estar completamente inerte, hasta que te das cuenta de que se ha congelado sólido. Luego golpea una de sus paredes internas y se rompe en pequeños pedazos.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_InSpaceHigh = Además de estar extremadamente frías, no pasa mucho con las muestras en la bahía de ciencia de materiales, ya que estás fuera del alcance de la exosfera polvorienta de Meiuqer.
		#LOC_KS_SciDef_gravityScan_Meiuqer_InSpaceHigh = El escáner gravitatorio cuestiona por qué te molestaste mientras devuelve sus mezquinas lecturas del campo gravitatorio del planetoide.
		#LOC_KS_SciDef_magnetometer_Meiuqer_InSpaceHigh = Aunque sabes que es una pérdida de tiempo comprobar si el diminuto Meiuqer tiene un campo magnético, prefieres no meterte en problemas con el científico de tu tripulación de nuevo por «no maximizar el retorno científico» o algo así.

		// Sunorc
		#LOC_KS_SciDef_crewReport_Sunorc_FlyingLow = De alguna manera la nave aún no se ha fundido. *AÚN.*
		#LOC_KS_SciDef_crewReport_Sunorc_FlyingHigh = Estás muy preocupado por lo bien que la nave podría resistir las temperaturas extremas.
		#LOC_KS_SciDef_crewReport_Sunorc_InSpaceLow = Se está calentando aquí dentro. Podrías cocinar algo en el panel de control.

		#LOC_KS_SciDef_temperatureScan_Sunorc_FlyingLow = [SIN DATOS]
		#LOC_KS_SciDef_temperatureScan_Sunorc_FlyingHigh = El termómetro alcanza el máximo al instante, luego toca fondo cuando partículas cargadas interfieren con la conexión al instrumento.
		#LOC_KS_SciDef_temperatureScan_Sunorc_InSpaceLow = El termómetro comienza a subir a medida que te acercas a la estrella.

		#LOC_KS_SciDef_evaReport_Sunorc_FlyingLow = ¿CÓMO NO ESTÁS MUERTO??????
		#LOC_KS_SciDef_evaReport_Sunorc_FlyingHigh = Esta no es una idea muy inteligente y lo sabes.
		#LOC_KS_SciDef_evaReport_Sunorc_InSpaceLow = Estás cegado por la intensa luz.

		#LOC_KS_SciDef_mysteryGoo_Sunorc_FlyingLow = El contenedor se ha fundido y ha liberado el Goo vaporizado.
		#LOC_KS_SciDef_mysteryGoo_Sunorc_FlyingHigh = El Goo comienza a vaporizarse en su contenedor.
		#LOC_KS_SciDef_mysteryGoo_Sunorc_InSpaceLow = El Goo está empezando a hervir.

		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_FlyingLow = Toda la unidad se ha fundido.
		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_FlyingHigh = Las muestras se están fundiendo, como el resto de la unidad.
		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_InSpaceLow = Las muestras están empezando a brillar por el calor.

		#LOC_KS_SciDef_barometerScan_Sunorc_FlyingLow = El barómetro escupe todo tipo de tonterías antes de que se pierda la conexión con el instrumento.
		#LOC_KS_SciDef_barometerScan_Sunorc_FlyingHigh = El barómetro detecta una atmósfera muy tenue, antes de que las temperaturas extremas hagan que el instrumento se vuelva loco.

		#LOC_KS_SciDef_magnetometer_Sunorc_InSpace = El boom recoge datos sobre los vientos estelares y campos magnéticos de Sunorc.

		#LOC_KS_SciDef_gravityScan_Sunorc_InSpace = Los datos del sensor gravitatorio nos dan información sobre el tamaño y composición de Sunorc.

		#LOC_KS_SciDef_atmosphereAnalysis_Sunorc_FlyingLow = No podemos obtener ningún dato del analizador atmosférico, así que lo más probable es que el instrumento esté perdido.
		#LOC_KS_SciDef_atmosphereAnalysis_Sunorc_FlyingHigh = Las partículas cargadas fríen los sensores dentro del analizador atmosférico.



		// Sedah
		#LOC_KS_SciDef_crewReport_Sedah_FlyingLow = Comienzas a cuestionar tu existencia mientras tu nave desciende a las profundidades del gigante gaseoso caliente y esponjoso.
		#LOC_KS_SciDef_crewReport_Sedah_InSpaceLow = La atmósfera del planeta parece turbulenta y en constante movimiento. El intenso calor y la presión en la superficie del planeta crean bandas giratorias de gases que parecen desplazarse y agitarse constantemente. La tripulación también notó que el ligero resplandor del planeta era más notable durante la aproximación cercana, creando un efecto inquietante y de otro mundo. A pesar de las condiciones inhóspitas del planeta, la tripulación expresó asombro ante la belleza y grandeza del gigante gaseoso.
		#LOC_KS_SciDef_crewReport_Sedah_InSpaceHigh = La tripulación informa que Sedah aparece como un orbe brillante y luminoso en el espacio debido a sus altas temperaturas atmosféricas. Desde la distancia, parece de tamaño similar a Jool. Su atmósfera menos densa le da una apariencia «esponjosa». La tripulación señala que sería interesante estudiar la composición atmosférica de Sedah para comprender mejor las propiedades de los gigantes gaseosos calientes.

		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingLow1 = A medida que la nave descendía por la atmósfera inferior de Sedah, las lecturas de temperatura indicaron un aumento significativo. El intenso calor y la presión a esta altitud dificultaron el funcionamiento correcto de los instrumentos de la nave, y la tripulación tuvo que tomar precauciones especiales para evitar daños al equipo.
		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingLow2 = Las presiones extremas aplastan el termómetro antes de que tenga siquiera la oportunidad de llegar al máximo.
		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingHigh = Las lecturas de temperatura mostraron un aumento significativo en comparación con el entorno del espacio exterior. El calor emanado de la atmósfera del planeta creó un brillante resplandor alrededor de la nave espacial. 

		#LOC_KS_SciDef_evaReport_SedahFlyingLow = Te preguntas por qué pensaste que hacer un EVA en las profundidades de un gigante gaseoso era una buena idea. 
		#LOC_KS_SciDef_evaReport_Sedah_InSpaceLow = Cuando el Kerbal salió de la nave espacial, fue inmediatamente impactado por las nubes giratorias del gigante gaseoso. La atmósfera era espesa y brumosa, con una gama de colores que parecían cambiar a medida que se movían. El Kerbal podía sentir el calor emanando del planeta, a pesar de estar tan lejos de su superficie. Mientras flotaba en el vacío, no podía evitar sentirse pequeño y asombrado por el inmenso tamaño y poder del gigante gaseoso.
		#LOC_KS_SciDef_evaReport_Sedah_InSpaceHigh = Sedah se alzaba imponente en la distancia, un gigante gaseoso masivo con un tenue resplandor etéreo. La brillante luz de la estrella proyectaba largas sombras sobre el traje del Kerbal, y el Kerbal se sentía ingrávido mientras flotaba por el vacío. Fue una experiencia surrealista e inspiradora presenciar la majestuosidad de Sedah desde tal punto de vista.

		#LOC_KS_SciDef_mysteryGoo_Sedah_FlyingLow = El Goo se asa por completo debido a las altas temperaturas en la atmósfera inferior de Sedah.

		#LOC_KS_SciDef_mobileMaterialsLab_Sedah_FlyingLow = No sabes si las muestras se cocinaron por las altas temperaturas o se aplastaron por la presión extrema, pero ¿realmente importa? Están arruinadas de cualquier manera.

		#LOC_KS_SciDef_barometerScan_Sedah_FlyingLow1 = La atmósfera esponjosa de Sedah parecía ser súper densa y compacta. Las altas temperaturas atmosféricas y la apariencia luminosa de Sedah se volvieron más pronunciadas.
		#LOC_KS_SciDef_barometerScan_Sedah_FlyingLow2 = El cristal del barómetro se ha roto, pero no estás seguro de si fue por la alta temperatura o la presión extrema, o incluso ambas. 
		#LOC_KS_SciDef_barometerScan_Sedah_FlyingHigh = Las lecturas del barómetro muestran una disminución de la presión atmosférica con la altitud. La atmósfera esponjosa de Sedah parecía adelgazarse gradualmente a mayores altitudes.

		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceLow1 = Las lecturas del escaneo gravitacional mostraron una diferencia notable entre el lado brillante y oscuro de Sedah, posiblemente debido a la diferencia de densidad causada por la variación de temperatura. 
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceLow2 = Los datos del sensor confirman que a pesar de su enorme tamaño, Sedah en realidad no es tan masivo, en relación con su tamaño.
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceHigh1 = Las lecturas mostraron que la gravedad de Sedah era significativamente más débil en comparación con gigantes gaseosos más grandes como Jool. La menor masa de Sedah resultó en una atracción gravitacional menos intensa, lo que podría tener implicaciones para su estructura y composición general.
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceHigh2 = El sensor muestra una lectura anormalmente baja para un planeta de este tamaño. Podría valer la pena investigar más.

		#LOC_KS_SciDef_magnetometer_Sedah_InSpaceLow = Sedah exhibió un campo magnético relativamente fuerte y complejo en su espacio inferior. Los datos indicaron la presencia de tormentas magnéticas y fluctuaciones, sugiriendo un entorno magnético dinámico y activo alrededor de este gigante gaseoso caliente. Estos hallazgos arrojan luz sobre las características magnéticas únicas de la atmósfera «esponjosa» de Sedah y su impacto potencial en la dinámica atmosférica general del planeta y el clima espacial. 
		#LOC_KS_SciDef_magnetometer_Sedah_InSpaceHigh = Las lecturas del magnetómetro mostraron que Sedah tenía un campo magnético relativamente débil en comparación con su contraparte más grande, Jool, probablemente debido a su menor masa. Sin embargo, aún había fluctuaciones magnéticas detectables, indicando la presencia de cierta actividad magnética en la atmósfera de Sedah.

		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingLow1 = El análisis atmosférico de la atmósfera inferior de Sedah reveló que está compuesta principalmente de hidrógeno y helio, con altas temperaturas y patrones de nubes dinámicos. Debido a su baja masa en comparación con su tamaño, la atmósfera de Sedah es menos densa y más extendida, creando una apariencia difusa con límites menos definidos entre las capas atmosféricas.
		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingLow2 = El instrumento fue aplastado por las presiones extremas en la atmósfera inferior de Sedah.
		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingHigh = El análisis atmosférico de la atmósfera superior de Sedah reveló temperaturas extremadamente altas y una apariencia luminosa, indicando el intenso calor de este gigante gaseoso. El análisis también confirmó que la atmósfera de Sedah es menos densa y más difusa en comparación con Jool, debido a su menor relación masa-tamaño, resultando en una apariencia «esponjosa» con límites menos definidos entre las capas atmosféricas.


		// Suluco
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Day = El informe de la tripulación del hemisferio diurno de Suluco revela un día perpetuo con exposición constante a la intensa luz solar de Sunorc, sin noche, y el paisaje está dominado por un ambiente abrasador y estéril. La tripulación notó la ausencia de cualquier signo de vida o vegetación, con temperaturas extremas y condiciones duras. 
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Twilight = El informe de la tripulación de la zona crepuscular de Suluco reveló un entorno único e intrigante. El estrecho anillo de eternidad crepuscular entre los hemisferios diurno y nocturno es la única región del planeta donde las plantas y otras formas de vida pueden prosperar. Además, la tripulación observó los persistentes fuertes vientos en el área, probablemente causados por el contraste extremo de temperatura entre los dos hemisferios. El informe también destacó las peculiares condiciones de iluminación en la zona crepuscular, donde prevalece un crepúsculo perpetuo, creando un ambiente misterioso y de otro mundo.
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Night = El informe de la tripulación del hemisferio nocturno de Suluco reveló un entorno desolado y gélido, envuelto en oscuridad perpetua. Sin luz solar que llegue a este lado del planeta, las temperaturas eran extremadamente frías y el paisaje parecía estéril e inhóspito, sin ningún signo de vida. 
		#LOC_KS_SciDef_crewReport_Suluco_SrfSplashed = El informe de la tripulación de la zona crepuscular de Suluco, donde se encuentran los hemisferios diurno y nocturno del planeta, reveló un entorno dinámico y turbulento. Se observaron los persistentes fuertes vientos causados por la marcada diferencia de temperatura entre los dos hemisferios, creando condiciones desafiantes para la exploración. A pesar de esto, la tripulación notó la presencia de formas de vida alienígenas únicas y especies de plantas en la zona crepuscular, convirtiéndola en una región notable para el estudio científico.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Day = El informe de la tripulación de la atmósfera inferior del hemisferio diurno de Suluco, donde un lado del planeta está en luz diurna perpetua, reveló condiciones extremas debido a la exposición implacable a la estrella Sunorc. La tripulación observó temperaturas abrasadoras e intensa radiación, con la superficie del planeta bañada en luz solar constante.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Twilight = El informe de la tripulación de la atmósfera inferior de la zona crepuscular de Suluco, donde se encuentran los hemisferios diurno y nocturno del planeta, reveló condiciones desafiantes debido a los persistentes fuertes vientos causados por la marcada diferencia de temperatura entre los dos hemisferios. A pesar de la turbulencia, la tripulación observó fascinantes especies de plantas alienígenas y otras formas de vida exóticas en esta región única, que es la única zona del planeta que soporta tal vida.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Night = El informe de la tripulación de la atmósfera inferior del hemisferio nocturno de Suluco, donde un lado del planeta está en oscuridad perpetua, reveló un entorno muy diferente en comparación con el hemisferio diurno. La tripulación observó temperaturas gélidas y oscuridad casi total, con solo tenue luz estelar iluminando el paisaje. La tripulación también observó la presencia de casquetes de hielo congelados y formaciones heladas en la superficie, indicando la presencia de agua congelada en la atmósfera inferior del hemisferio nocturno.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingHigh = Nuestra nave espacial observó marcados contrastes de temperatura, fuertes vientos y composiciones atmosféricas únicas en la atmósfera superior de Suluco, un planeta con acoplamiento de marea y grandes diferencias entre sus hemisferios diurno y nocturno. El hemisferio diurno exhibía temperaturas abrasadoras y gases ionizados, mientras que el hemisferio nocturno estaba perpetuamente oscuro y frío, con menores concentraciones de gas. Se necesita más investigación para comprender la compleja dinámica atmosférica de este planeta único.
		#LOC_KS_SciDef_crewReport_Suluco_InSpaceLow = Nuestra nave espacial ha entrado en la órbita espacial baja de Suluco, un planeta con acoplamiento de marea y contrastes extremos entre sus hemisferios diurno y nocturno. El hemisferio diurno está abrasador con intensa radiación solar, mientras que el hemisferio nocturno está sumido en oscuridad perpetua y frío extremo. Observamos un estrecho anillo de eternidad crepuscular, conocido como zona crepuscular, donde la vida alienígena exótica podría prosperar.
		#LOC_KS_SciDef_crewReport_Suluco_InSpaceHigh = Suluco parece un ojo desde el espacio lejano. Estamos bastante seguros de que este planeta está acoplado por marea a Sunorc, ya que podemos observar fácilmente la diferencia entre el hemisferio diurno y el nocturno. 

		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Day = Informe de escaneo de temperatura: Nuestro lugar de aterrizaje en el hemisferio diurno de Suluco revela temperaturas abrasadoras, con la superficie alcanzando máximos extremos debido a la exposición perpetua del planeta a la luz solar. Las lecturas indican más de 90 grados Celsius, lo que lo hace inhóspito para la mayoría de formas de vida.
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Twilight = Nuestro lugar de aterrizaje en la zona crepuscular de Suluco revela un perfil de temperatura único y dinámico. La región experimenta fluctuaciones significativas de temperatura debido al marcado contraste entre los hemisferios diurno y nocturno. Las lecturas indican un rango de -25 a 45 grados Celsius, con cambios rápidos en períodos cortos de tiempo. Este entorno dinámico presenta desafíos y oportunidades únicos para estudiar la interacción entre luz y oscuridad en la zona crepuscular de Suluco.
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Night = Nuestro lugar de aterrizaje en el hemisferio nocturno de Suluco revela temperaturas extremadamente frías con una media de -65 grados Celsius, muy por debajo del punto de congelación. La falta de luz solar en esta región de noche perpetua resulta en un entorno extremadamente frío, lo que plantea desafíos para la vida tal como la conocemos.
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfSplashed = Nuestro amerizaje en la zona crepuscular de Suluco revela un patrón de temperatura único. El estrecho anillo de eternidad crepuscular entre los hemisferios diurno y nocturno exhibe temperaturas moderadas, probablemente influenciadas por la interacción constante entre ambos hemisferios. Esta región sirve como hábitat potencial para formas de vida alienígenas exóticas, como lo evidencia la presencia de vida vegetal y otra actividad biológica.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Day = Realizar un escaneo de temperatura en la atmósfera inferior del hemisferio diurno de Suluco revela un gradiente de temperatura significativo, con temperaturas superiores a 90 grados Celsius. El lado del planeta que mira a la estrella experimenta temperaturas extremadamente altas debido a la exposición constante a la luz solar. La falta de un ciclo nocturno resulta en un calentamiento sostenido de la atmósfera, llevando a temperaturas abrasadoras. Estas condiciones extremas pueden plantear desafíos para la exploración o habitación potencial en el hemisferio diurno de Suluco.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Twilight = Realizar un escaneo de temperatura en la atmósfera inferior de la zona crepuscular de Suluco revela patrones de temperatura únicos en comparación con los hemisferios diurno y nocturno. El límite entre ambos hemisferios, conocido como zona crepuscular, exhibe un rango de temperatura moderado de -15 a 45 grados Celsius. Esto se debe a la interacción constante entre ambos hemisferios, resultando en un entorno relativamente templado comparado con las condiciones extremas de temperatura de los hemisferios diurno y nocturno.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Night = Realizar un escaneo de temperatura en la atmósfera inferior del hemisferio nocturno de Suluco revela condiciones de temperatura extremas. La oscuridad perpetua en el hemisferio nocturno resulta en temperaturas significativamente más frías comparadas con el hemisferio diurno y la zona crepuscular. La temperatura media en la atmósfera inferior del hemisferio nocturno es de -65 grados Celsius, con temperaturas cayendo muy por debajo del punto de congelación.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingHigh = Realizar un escaneo de temperatura en la atmósfera superior de Suluco revela patrones de temperatura interesantes. Como Suluco está acoplado por marea a Sunorc, con un lado en día perpetuo y el otro en noche perpetua, la atmósfera superior muestra diferencias de temperatura distintas entre los hemisferios diurno y nocturno.

		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Day = Al salir de la nave espacial y pisar la superficie del hemisferio diurno de Suluco, me recibe una luz solar intensa e implacable. La luz es casi cegadora y el calor es intenso. El terreno en el hemisferio diurno es accidentado y rocoso, con grandes formaciones rocosas y acantilados escarpados. Las rocas son de colores variados, desde rocas volcánicas oscuras hasta otras más claras y erosionadas. El suelo está seco y polvoriento, con pocos signos de agua líquida.
		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Twilight = Al pisar el estrecho anillo de eternidad crepuscular que marca el límite entre los hemisferios diurno y nocturno de Suluco, me impresiona el entorno único y de otro mundo. La iluminación es surrealista, con un estado perpetuo de crepúsculo que proyecta un resplandor etéreo. La flora y fauna aquí son exóticas y diferentes a todo lo que he visto antes, adaptadas a las condiciones únicas de esta zona crepuscular. Es un lugar fascinante y misterioso, rebosante de vida que ha evolucionado en la rara intersección entre luz y oscuridad.
		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Night = Salir al terreno oscuro y helado del hemisferio nocturno de Suluco es una experiencia inquietante. La falta de luz solar y la oscuridad perpetua crean un entorno frío, desolado y aparentemente desprovisto de vida. Las temperaturas están muy por debajo del punto de congelación, y la única luz proviene de estrellas lejanas y el tenue resplandor de la zona crepuscular en el horizonte. Es un contraste marcado con el brillante y bullicioso hemisferio diurno.
		#LOC_KS_SciDef_evaReport_Suluco_SrfSplashed = Al amerizar en el estrecho anillo de eternidad crepuscular que marca el límite entre los hemisferios diurno y nocturno de Suluco, me recibe una visión surrealista. Las aguas bajo mí rebosan de vida, con plantas y criaturas bioluminiscentes iluminando la oscuridad con su resplandor de otro mundo. La temperatura es moderada y el aire está lleno de una sensación de tranquilidad. Es un oasis único de vida en medio del marcado contraste entre el día y la noche eternos en este planeta con acoplamiento de marea.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Day = Mientras surco la atmósfera inferior del hemisferio diurno de Suluco, me encuentro con una extensión interminable de luz solar cegadora. La temperatura es abrasadora y el aire está cargado de calor y radiación. El paisaje inferior es árido e inhóspito, sin signos de vida. El contraste entre el día y la noche eternos en este planeta con acoplamiento de marea es marcado, y las duras condiciones del hemisferio diurno son un recordatorio de la naturaleza extrema de este mundo.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Twilight = Al adentrarme en la zona crepuscular de Suluco, me recibe un espectáculo de otro mundo. El estrecho anillo de eternidad crepuscular sirve como límite entre los hemisferios de día y noche eternos, y rebosa de vida. Los persistentes fuertes vientos golpean mi nave, indicando la extrema diferencia de temperatura entre los hemisferios diurno y nocturno. Observo plantas extrañas y exóticas, diferentes a cualquier otra que haya visto, mostrando adaptaciones notables para sobrevivir en este entorno crepuscular.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Night = La temperatura cae drásticamente y los vientos aúllan sin cesar, resultado de la extrema diferencia de temperatura entre los hemisferios diurno y nocturno. La falta de luz solar dificulta la navegación, pero la iluminación incorporada de mi traje me ayuda a distinguir el inquietante paisaje alienígena.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingHigh = El contraste entre el brillante hemisferio diurno y el oscuro hemisferio nocturno es impresionante, y me maravillo de las condiciones únicas que existen en este planeta con acoplamiento de marea. Las duras condiciones hacen que sea un desafío realizar experimentos, pero los datos que recopilo contribuirán a nuestra comprensión de la dinámica atmosférica y los patrones climáticos de Suluco.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Day = Al descender hacia el hemisferio diurno, me recibe un brillo cegador. El día perpetuo baña el paisaje en un resplandor brillante, con el sol nunca poniéndose en este lado del planeta. La temperatura es abrasadora y el paisaje está dominado por vastos desiertos y llanuras rocosas. Observo enormes dunas de arena moldeadas por los vientos implacables que soplan sobre la superficie, formando intrincados patrones en la arena.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Twilight = La brillante luz diurna se desvanece en un crepúsculo perpetuo, proyectando un resplandor de otro mundo sobre el paisaje. La temperatura en la zona crepuscular es relativamente moderada comparada con el hemisferio diurno, gracias a la mezcla constante de aire de ambos hemisferios. Los vientos aquí son fuertes y persistentes, creando formaciones nubosas en espiral y patrones climáticos turbulentos. Este estrecho anillo de eternidad crepuscular es la única región en Suluco que potencialmente alberga plantas y otra vida alienígena exótica.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Night = Cuando estoy en el espacio sobre el hemisferio nocturno, la oscuridad me envuelve. La noche perpetua en este lado de Suluco es inquietante, con solo estrellas lejanas proporcionando una tenue iluminación. El hemisferio nocturno es un reino de frío y oscuridad extremos, con condiciones duras que dificultan la existencia de vida. Observo lagos y ríos congelados, y el paisaje es austero y árido.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceHigh = Desde una órbita alta, observo el marcado contraste entre el hemisferio diurno de Suluco, bañado en luz diurna perpetua, y su hemisferio nocturno, envuelto en oscuridad. Estos hemisferios únicos ofrecen valiosas perspectivas sobre la interacción entre luz, temperatura y atmósfera en este planeta con acoplamiento de marea.

		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Day = La muestra de superficie del hemisferio diurno de Suluco revela un paisaje árido y rocoso con altas temperaturas e intensa radiación. El suelo está seco y desprovisto de cualquier signo de materia orgánica o vida vegetal. La muestra muestra evidencia de meteorización extrema debido a la exposición constante a la luz solar, con formaciones rocosas mostrando signos de erosión y degradación.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Twilight = La muestra de superficie recogida de la zona crepuscular de Suluco revela un ecosistema único y diverso rebosante de formas de vida alienígenas. El suelo es una mezcla de escombros rocosos y materia orgánica, indicando la presencia de vida vegetal en esta región. La muestra también muestra evidencia de meteorización extrema, probablemente debido a los persistentes fuertes vientos resultantes de la diferencia de temperatura entre los hemisferios diurno y nocturno.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Night = La muestra de superficie recogida del hemisferio nocturno de Suluco revela un entorno desolado y frío con mínimos signos de vida. El suelo está compuesto de regolito congelado y escombros helados, indicando temperaturas extremadamente bajas que son inhóspitas para la mayoría de formas de vida. La ausencia de vida vegetal o materia orgánica en la muestra sugiere las duras condiciones de oscuridad perpetua en este lado del planeta.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfSplashed = La muestra de agua recogida del océano en la zona crepuscular de Suluco revela un ecosistema acuático único con características intrigantes. El agua es relativamente más fría debido a la proximidad al hemisferio nocturno, y contiene una diversa variedad de microorganismos alienígenas y vida vegetal exótica. El agua parece ser salobre, con niveles de salinidad más altos. El agua es relativamente agitada, con fuertes corrientes, probablemente influenciadas por los persistentes fuertes vientos.

		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded = El goo parece bastante contento aquí.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_DayPole = La unidad de contención tiene lo que solo puede describirse como «goo deshidratado» dentro. No, no es un tentempié.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_NightPole = La tapa de la unidad de contención del goo se ha congelado. No sería descabellado asumir que el goo dentro también está congelado.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Water = El goo parece ansioso por darse un baño.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_ColdOcean = El goo parece ansioso por darse un baño, sin saber lo fría que está el agua realmente.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Day = El calor y el aire seco han hecho que el goo se encoja.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Tundra = El interior de la unidad de contención está lleno de condensación.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Night = El goo se ha congelado por completo. No intentes comértelo. No es helado.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfSplashed = ¡El goo se escapa al agua!
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfSplashed_ColdOcean = El goo se escapa al agua... y luego regresa rápidamente a la unidad de contención porque no quiere congelarse.
		#LOC_KS_SciDef_mysteryGoo_Suluco_FlyingLow = El goo se menea mientras la nave vibra. 

		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Day = El estudio de materiales realizado en el hemisferio diurno de Suluco, la región perpetuamente bañada por la luz solar, ha arrojado hallazgos intrigantes. Los materiales superficiales analizados muestran signos de extensa meteorización y erosión, probablemente causados por la dura radiación solar y la exposición constante a la luz solar. Las altas temperaturas en este lado del planeta han resultado en la formación de composiciones minerales y estructuras únicas, sugiriendo la presencia de procesos geológicos novedosos.
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Twilight = La zona crepuscular de Suluco exhibe compuestos orgánicos complejos y una mezcla única de procesos geológicos y químicos. Los materiales superficiales sugieren la presencia de vida alienígena exótica y proporcionan perspectivas sobre la biología y astrobiología del planeta. Los vientos dinámicos y el crepúsculo perpetuo han moldeado la geología y química de esta región, proporcionando valiosas perspectivas sobre la biología, astrobiología e historia geológica de Suluco.
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Night = El hemisferio nocturno de Suluco, el lado perpetuamente oscuro del planeta, presenta desafíos únicos para el estudio de materiales debido a condiciones ambientales extremas, incluyendo temperaturas de congelación y falta de luz solar. El análisis inicial de materiales superficiales revela la presencia de agua congelada y compuestos volátiles, proporcionando valiosas perspectivas sobre la geología y composición química del planeta.
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfSplashed = Realizar un estudio de materiales en los océanos de Suluco ha arrojado resultados intrigantes. El análisis de muestras de agua recogidas de los océanos revela propiedades químicas únicas, incluyendo altas concentraciones de minerales raros y compuestos orgánicos no encontrados en otras partes del planeta. Se cree que los persistentes fuertes vientos en la zona crepuscular juegan un papel en la composición del océano, impactando la distribución de materiales y moldeando las formas de vida alienígenas exóticas del planeta.

		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Day = El escaneo barométrico en el hemisferio diurno de Suluco confirma la presencia de una zona de baja presión en la superficie del hemisferio diurno, donde el aire es calentado por la estrella, asciende y disminuye en densidad. Este aire ascendente se mueve hacia el hemisferio nocturno a gran altitud.
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Twilight = Un escaneo barométrico realizado en la zona crepuscular de Suluco revela un patrón de presión atmosférica único influenciado por la marcada diferencia de temperatura entre los hemisferios diurno y nocturno. El escaneo indica que la zona crepuscular experimenta persistentes fuertes vientos hacia el hemisferio diurno, probablemente impulsados por el contraste de temperatura entre los hemisferios adyacentes. El estrecho anillo de eternidad crepuscular crea una región atmosférica dinámica y turbulenta con presiones variables.
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Night = Las mediciones barométricas revelan una mayor presión atmosférica en la superficie del hemisferio nocturno, porque el aire del hemisferio diurno se enfría y desciende al llegar al hemisferio nocturno, volviéndose más denso y creando un área de alta presión. El aire descendido luego viaja por la superficie de vuelta hacia el hemisferio diurno, cerrando el ciclo de la circulación atmosférica.
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingLow = El escaneo barométrico realizado en la atmósfera inferior de Suluco revela un patrón de distribución de presión complejo. En el hemisferio diurno, donde el aire es calentado por la estrella, el escaneo indica una zona de baja presión, debido al aire ascendente por calentamiento y menor densidad. En contraste, el hemisferio nocturno exhibe un área de alta presión en la atmósfera inferior, debido al aire descendente por enfriamiento y mayor densidad.
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingHigh = El escaneo barométrico realizado en la atmósfera superior de Suluco, teniendo en cuenta las condiciones atmosféricas globales, proporciona valiosas perspectivas sobre los complejos patrones de distribución de presión influenciados por la configuración de acoplamiento de marea del planeta y el contraste de temperatura entre los hemisferios diurno y nocturno.

		#LOC_KS_SciDef_seismicScan_Suluco_SrfLanded = El escaneo sísmico indica que Suluco es relativamente estable geológicamente. Sin embargo, los persistentes fuertes vientos pueden crear fricción y estrés en la superficie del planeta, potencialmente llevando a temblores de tierra. Además, la zona crepuscular de Suluco experimenta mayores niveles de temblores, probablemente causados por las fuerzas de fricción generadas por los vientos persistentes, así como por el calentamiento y enfriamiento diferencial de la superficie en los hemisferios diurno y nocturno.

		#LOC_KS_SciDef_gravityScan_Suluco = El escaneo gravitatorio global de Suluco revela un campo gravitatorio relativamente consistente en toda la superficie del planeta sin variaciones o anomalías significativas. La fuerza gravitatoria es similar en ambos hemisferios diurno y nocturno, así como en la región entre ellos conocida como zona crepuscular.

		#LOC_KS_SciDef_magnetometer_SulucoInSpace = Las mediciones del magnetómetro indican que Suluco tiene un campo magnético débil y relativamente uniforme en su superficie en la región de órbita baja. No se detectan variaciones o anomalías significativas en la fuerza del campo magnético. La falta de variaciones significativas del campo magnético sugiere que el campo magnético de Suluco probablemente es generado por su geodinamo interno, similar a otros planetas terrestres.

		#LOC_KS_SciDef_atmosphereAnalysis_Suluco = La atmósfera de Suluco está compuesta principalmente de nitrógeno (N2) y oxígeno (O2), con trazas de dióxido de carbono (CO2), metano (CH4), amoníaco (NH3) y otros gases menores. La presión atmosférica media de Suluco es menor que la de Kerbin, así que ten cuidado de no hacer deportes intensos.

		// Tot
		#LOC_KS_SciDef_crewReport_Tot_SrfLanded = Casi parece que podríamos desorbitar esta cosa solo empujándola lo suficientemente fuerte con nuestra nave espacial.
		#LOC_KS_SciDef_crewReport_Tot_InSpace = ¡Vamos, podemos construir naves espaciales más grandes que esta roca fácilmente!

		#LOC_KS_SciDef_evaReport_Tot_SrfLanded = No saltes. Podrías escapar realmente de la gravedad de esta roca saltando de ella.
		#LOC_KS_SciDef_evaReport_Tot_InSpace = ¿Realmente necesitamos aterrizar en esta pequeña roca? Podríamos enviar fácilmente a alguien abajo y de vuelta usando solo su propulsor EVA.

		#LOC_KS_SciDef_mysteryGoo_Tot_SrfLanded = El goo parece sentirse como en casa en Tot.
		#LOC_KS_SciDef_mysteryGoo_Tot_InSpaceLow = El goo sigue riendo. Luego lo amenazas con soldar su unidad de contención, momento en el que finalmente cumple con tu solicitud de dejar de reír.
		#LOC_KS_SciDef_mysteryGoo_Tot_InSpaceHigh = El goo parece reír al sentir la presencia de Tot. Golpeas su unidad de contención en un intento fútil de silenciarlo.

		#LOC_KS_SciDef_surfaceSample_Tot_SrfLanded = El análisis de la superficie de Tot sugiere que podría ser un asteroide capturado. Aunque no puedes estar seguro de esto.

		#LOC_KS_SciDef_seismicScan_Tot_SrfLanded = El escáner sísmico lee...... nada.

		#LOC_KS_SciDef_gravityScan_Tot_SrfLanded = Finalmente, el sensor gravitatorio se enfoca en Tot ahora que está literalmente justo al lado de esta pequeña roca.
		#LOC_KS_SciDef_gravityScan_Tot_InSpaceLow = El sensor gravitatorio sigue apuntando hacia Suluco. Por frustración, haces un reinicio forzado del sensor gravitatorio, solo para que vuelva a prestar atención a Suluco una vez más.
		#LOC_KS_SciDef_gravityScan_Tot_InSpaceHigh = El sensor gravitatorio parece mucho más interesado en Suluco que en esta pequeña cosa. Intentar que se enfoque en Tot sería un ejercicio de futilidad.

		#LOC_KS_SciDef_magnetometer_Tot_InSpaceLow = El boom no puede detectar ningún campo magnético proveniente de Tot.
		#LOC_KS_SciDef_magnetometer_Tot_InSpaceHigh = Mides un campo magnético moderadamente fuerte, pero parece ser de Suluco y no de...... lo que sea esta cosa.


		// Sera
		#LOC_KS_SciDef_crewReport_Sera_SrfLanded = Los kerbals alertan al KSC de que han aterrizado en Sera y están preparando sus frascos de muestras.
		#LOC_KS_SciDef_crewReport_Sera_SrfSplashed = Los kerbals alertan al KSC de que han amerizado en Sera y están preparando sus botellas de agua.
		#LOC_KS_SciDef_crewReport_Sera_FlyingLow = La tripulación está de acuerdo en que Sera es una vista impresionante con su sistema de anillos.
		#LOC_KS_SciDef_crewReport_Sera_FlyingHigh = Tus kerbals están hipnotizados ante la vista de los anillos de Sera.

		#LOC_KS_SciDef_temperatureScan_Sera_SrfLanded = Podrías ir a esquiar, si hubiera nieve...
		#LOC_KS_SciDef_temperatureScan_Sera_SrfSplashed = Probablemente no deberías nadar en esta agua.
		#LOC_KS_SciDef_temperatureScan_Sera_FlyingLow = ¡Una ráfaga de viento frío casi te empuja fuera de la nave. Por los pelos!
		#LOC_KS_SciDef_temperatureScan_Sera_FlyingHigh = Hace bastante frío aquí fuera, ¿verdad?
		#LOC_KS_SciDef_temperatureScan_Sera_InSpace = Hace frío. O sea, ¿qué esperabas?

		#LOC_KS_SciDef_evaReport_Sera_SrfLanded = La superficie de Sera es un paisaje árido y rocoso con rocas dispersas salpicando el terreno. El impresionante sistema de anillos de Sera se arquea sobre la cabeza, proyectando largas sombras sobre el terreno rocoso inferior. Los lagos son claramente visibles desde la superficie. La ausencia de vida vegetal o animal en la superficie refuerza la impresión de un mundo desolado e inhóspito.
		#LOC_KS_SciDef_evaReport_Sera_SrfSplashed = La superficie de los lagos de Sera es un paisaje surrealista e inquietante. Los tonos marrones de los lagos se reflejan en la visera del kerbal, proyectando un resplandor de otro mundo sobre todo. El terreno circundante es árido y rocoso, sin vegetación ni signos de vida. La naturaleza tóxica del lago hace imposible que cualquier forma de vida conocida sobreviva.
		#LOC_KS_SciDef_evaReport_Sera_FlyingLow = Descender por la atmósfera inferior de Sera es una experiencia angustiosa. Los vientos aúllan y golpean al kerbal mientras se precipita hacia la superficie rocosa del planeta, dificultando mantener el control. A pesar de las condiciones desafiantes, la vista es impresionante. El terreno accidentado del planeta se extiende abajo, salpicado de rocas gigantes y cordilleras. La atmósfera es espesa y brumosa, con un tinte rojizo causado por la alta concentración de partículas de óxido de hierro en el aire. A pesar de la belleza del planeta, las condiciones aquí son increíblemente duras.
		#LOC_KS_SciDef_evaReport_Sera_FlyingHigh = La superficie rocosa del planeta se aleja en la distancia, reemplazada por un remolino de nubes y gases. La atmósfera aquí es fina y tenue, con un tinte rojo-amarillo. A pesar de la belleza del planeta desde esta altura, las condiciones aquí son increíblemente duras. Esta es un área peligrosa pero esencial para explorar para quienes buscan desentrañar los misterios de este mundo árido y rocoso.
		#LOC_KS_SciDef_evaReport_Sera_InSpaceLow = Es un mundo austero y sin vida, sin nada que rompa la monotonía de su interminable superficie excepto el impresionante sistema de anillos que lo rodea. Realizar un EVA en el espacio bajo sobre Sera proporciona una perspectiva única de este planeta desolado, permitiendo a los investigadores observarlo a distancia y estudiar sus características con increíble detalle. Las condiciones aquí son desafiantes, con temperaturas extremas y altos niveles de radiación.
		#LOC_KS_SciDef_evaReport_Sera_InSpaceHigh = Sera es una vista impresionante desde lo alto, con su hermoso sistema de anillos y su superficie árida y rocosa extendiéndose abajo. Mientras flotabas ingrávido sobre el planeta, te impresionó la desolación del paisaje y los lagos tóxicos y sin vida que salpican su superficie.

		#LOC_KS_SciDef_mysteryGoo_Sera_SrfLanded = El goo está frío y tiene una pequeña cantidad de polvo naranja encima.
		#LOC_KS_SciDef_mysteryGoo_Sera_SrfSplashed = El goo se mojó al amerizar.
		#LOC_KS_SciDef_mysteryGoo_Sera_FlyingLow = El goo está empezando a congelarse.
		#LOC_KS_SciDef_mysteryGoo_Sera_FlyingHigh = El goo se menea en su contenedor mientras reentras.

		#LOC_KS_SciDef_surfaceSample_Sera_SrfLanded = La muestra de superficie recogida de Sera está compuesta de un regolito de grano fino, rojizo-marrón, que parece haber sido erosionado por frecuentes tormentas de polvo y viento. El análisis químico de la muestra revela una alta concentración de metales pesados, incluyendo hierro, aluminio y titanio, así como menores cantidades de otros elementos como silicio y calcio. Aunque la presencia de metales pesados sugiere una composición mineral potencialmente rica, la falta de signos detectables de compuestos orgánicos u otros indicadores de vida sugiere que Sera no es adecuada para sustentar vida tal como la conocemos.
		#LOC_KS_SciDef_surfaceSample_Sera_SrfSplashed = La muestra recogida de uno de los lagos de Sera está compuesta de agua. El análisis químico de la muestra revela una alta concentración de metales pesados y otros compuestos tóxicos. Sin embargo, la falta de signos detectables de vida sugiere que Sera no es adecuada para sustentar vida tal como la conocemos.

		#LOC_KS_SciDef_mobileMaterialsLab_Sera_SrfLanded = El polvo que se levantó al aterrizar recubre los materiales con un fino polvo naranja.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_SrfSplashed = El agua se filtra en la unidad, corroiendo los materiales.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_FlyingLow = Una fina capa de hielo recubre los materiales.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_FlyingHigh = Una fina capa de hielo recubre los materiales.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_InSpace = Los materiales se congelan al exponerse al espacio exterior.

		#LOC_KS_SciDef_barometerScan_Sera_InSpaceLow = ¡Qué sorpresa! ¡El dispositivo marca 0, como si estuviera en el vacío del espacio sobre Sera!
		#LOC_KS_SciDef_barometerScan_Sera_InSpaceHigh = El dispositivo marca 0, como si estuviera en el vacío del espacio sobre Sera.

		#LOC_KS_SciDef_seismicScan_Sera_SrfLanded = El escaneo sísmico realizado en la corteza y manto de Sera revela un planeta altamente tectónicamente activo, con frecuente actividad sísmica. La corteza del planeta está fracturada, con extensas redes de fallas y fisuras, probablemente causadas por las tensiones inducidas por el sistema de anillos del planeta. Sin embargo, la falta de signos detectables de compuestos orgánicos u otros indicadores de vida sugiere que Sera no es adecuada para sustentar vida tal como la conocemos.

		#LOC_KS_SciDef_gravityScan_Sera_Srf = La gravedad es solo un poco más alta que la de Kerbin, a 1,08 gees.

		#LOC_KS_SciDef_magnetometer_Sera_InSpace = Sera parece tener un campo magnético relativamente fuerte, protegiendo el planeta de los vientos solares de Sunorc.

		#LOC_KS_SciDef_atmosphereAnalysis_Sera_SrfLanded = El análisis atmosférico realizado en la superficie de Sera revela un entorno árido y sin vida, sin signos detectables de compuestos orgánicos u otros indicadores de vida. La atmósfera es espesa y está compuesta principalmente de dióxido de carbono y nitrógeno, con trazas de otros gases como argón y metano.
		#LOC_KS_SciDef_atmosphereAnalysis_Sera_FlyingLow = El análisis atmosférico realizado en la atmósfera inferior de Sera revela un entorno espeso y brumoso, con una composición principalmente de dióxido de carbono y nitrógeno, y trazas de otros gases como argón y metano. Además, la atmósfera inferior de Sera exhibe una cantidad significativa de polvo y materia particulada, lo que sugiere la presencia de frecuentes tormentas de polvo o perturbaciones atmosféricas. Sin embargo, la falta de signos detectables de compuestos orgánicos en la atmósfera de Sera sugiere que el planeta no es adecuado para sustentar vida tal como la conocemos.
		#LOC_KS_SciDef_atmosphereAnalysis_Sera_FlyingHigh = El análisis atmosférico realizado en la atmósfera superior de Sera revela un entorno fino y tenue, con trazas de varios gases como dióxido de carbono, nitrógeno y argón. Sin embargo, la atmósfera superior de Sera exhibe una cantidad sorprendentemente alta de partículas cargadas, lo que sugiere la presencia de un fuerte campo magnético alrededor del planeta. Sin embargo, la falta de signos detectables de compuestos orgánicos en la atmósfera de Sera sugiere que el planeta no es adecuado para sustentar vida tal como la conocemos. 

		// Dipuc
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Lowlands = ¿Cómo se pueden diferenciar las regiones basadas en elevación? Sí, comparándolas con las áreas circundantes de mayor elevación, pero ¿qué tan «bajas» son las Tierras Bajas respecto al... «nivel del mar»? Hablando de eso, ¿qué cuenta como «nivel del mar» medio en un cuerpo celeste de vacío seco como Dipuc, el punto más bajo no volcánico en la corteza, o una profundidad arbitraria establecida por... ¿qué comité o individuo? Con la falta de estandarización presente, uno bien podría abrir la escotilla para aire fresco por frustración.\n\n\n...espera-
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Midlands = Las Tierras Medias, un lugar muy... «medio» para estar. ¿Quizás aterrizaste aquí por la posibilidad de mayores concentraciones de materiales viables para utilización de recursos in situ? Si no, te recomiendo que te muevas a las Tierras Bajas para áreas más seguras y suaves para construcción de colonias, o a las Tierras Altas y Montañas para desafíos literalmente más elevados; no hay mucho más aquí, a menos que tengas un rover contigo o estés en un rover encapsulado y desees surfear algunas olas... olas estáticas, añadiría.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Highlands = Las Tierras Altas, más altas que la mayoría de lugares en Dipuc y una maravilla para contemplar los alrededores. Las Montañas superan esta área en esplendor de perspectiva, sin embargo. Los prospectores de recursos pueden comenzar a excavar a su gusto, explorando el paisaje cada vez más escarpado, o fingiendo no tener pesadillas sobre las mareas siempre titánicas de Rouqea.\n\n\nSí, hay montañas REALES aquí que no se mueven rápidamente en un corto período, así que idealmente uno no debería preocuparse por la posibilidad de mortalidad en una luna solitaria como esta.\n\n...A menos que seas un imbécil babeante o seas Danny o Dennis y desees sacrificar algunos Kerbals al Kraken.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Mountains = «Esas no son olas, son montañas», dice Gene Kerman a un veterano de Rouqea presa del pánico. Afirma que las montañas son «inmóviles, estáticas y de tono cremoso», no «móviles, dinámicas y teñidas de ultramar». Además, la espectrometría de masas y los escaneos gravimétricos arrojan altas concentraciones de silicatos, sulfatos, carbonatos y óxidos más pesados incrustados en varios estratos montañosos, materiales y estructuras subterráneas obviamente no encontrados en olas de kilómetros de altura compuestas enteramente de una mezcla líquida impura de miríadas de minerales y orgánicos en monóxido de dihidrógeno oxigenado diatómico disuelto. «¡Ahora a recorrer el resto de la superficie de Dipuc, excavar el suelo -preferiblemente no con un pico considerando que cualquier eyección minera puede resultar peligrosa para el kerbal excavador o el equipo- o comenzar el establecimiento de colonia aquí, no sea que las toneladas consumidas de delta-v sean en vano!»\n\n-Gene
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Poles = Ah, las regiones polares, donde abunda la nieve y las temperaturas gélidas son la norma.\n\nEspera, no, eso es en un mundo tipo Kerbin. No hay hielo aquí. Al menos aterrizar aquí no debería ser arduo, ¿verdad?\n\n¿Por qué la actividad volcánica es inexistente en esta región particular pero abundante en las latitudes más bajas? La agitación de marea de Sera en el interior de Dipuc exhibiendo los efectos más fuertes en las regiones más cercanas al padre de Dipuc -las latitudes más bajas cercanas al ecuador- podría explicarlo, pero considerando la rotación síncrona de Dipuc con Sera, ¿no debería la actividad volcánica frecuentar su lado «cercano»? En cualquier caso, viendo que el paisaje no es un maravilloso entorno invernal, ¿te importa atravesar más al sur o norte de aquí?
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterSouth = El Cráter Sur aparece... ¿a qué distancia al sur del ecuador de Dipuc? A menos que los cielos de vacío sobre la ubicación actual exhiban a Sera, los marcos de referencia para la posición latitudinal del Cráter Sur son meramente periódicos, ya sea con la presencia gravitatoria distante de Kcalbeloh o el iluminador Sunorc apareciendo durante al menos la mitad del período rotacional y orbital de Dipuc.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterEast = El Cráter Este... ¿a qué distancia al este está del meridiano principal? ¿Y qué define una longitud específica como meridiano principal? ¿Qué característica definitoria, natural o de otro tipo, justifica la selección de un meridiano específico de Dipuc como el primario?\n\n\nNo, Gene, esto es dentro del universo, usar la línea vertical del medio en el mapa de colores de Dipuc no constituye una razón válida dentro del universo. ¿Y fue esto antes o después de que intentaras consolar a un kerbal tocado por Rouqea en las Montañas, considerando la hipocresía del último escenario?
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterWest = Espero que disfrutes tu estancia en el Cráter Oeste, especialmente si careces del propulsante necesario para convertir este viaje de ida en uno de ida y vuelta. En cualquier caso, ¿qué hizo al Cráter Oeste lo bastante atractivo para merecer una visita? Después de todo, cráteres grandes como estos son cicatrices glorificadas en la superficie de mundos de vacío donde tales estructuras de impacto salpican la superficie a un ritmo regular. Por otra parte, Dipuc parece ser una excepción: aparte del Complejo de Cráteres Occidental, Oriental, Sur y Doble, los cráteres de impacto se encuentran escasamente aquí. Quizás las actividades internas y el volcanismo activo se asocian con la disparidad superficial de Dipuc respecto a otros pequeños mundos de vacío como él.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_DoubleCrater = Bienvenido al Complejo del Cráter Doble, donde definitivamente no estás experimentando visión doble. Estamos en él, después de todo: ningún artefacto visual interno o figuración mental duraría tanto y sin que otro kerbal aborde tu estado mental alterado.\n\nEstás solo en el vacío de Dipuc, ¿verdad? Si no, cesa tus ilusiones sobre la existencia de los Cráteres Dobles no sea que el resto de la tripulación te desprecie como muchos kerbals informados en casa hacen con los Kerbiners Planos o los Vestidos Inexistentes.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Volcano = En cuanto a la seguridad, los conos volcánicos de pendiente pronunciada son bastante peligrosos por su inclinación escarpada, lo que puede llevar a varios accidentes perjudiciales para el progreso de la misión. Al menos el calor que esperarías que emanara de la superficie de un cono volcánico activo está ausente aquí, ¿verdad?\n\nY no, hay poca necesidad de preocuparse por erupciones volcánicas aquí dado que el entorno de vacío enfriaría inmediatamente la lava en erupción y cualquier flujo piroclástico potencial hasta el punto de convertirse en flujos de lahar de flujo lento y fácilmente evitables. Solo... por el amor del Kraken, nunca te aventures cerca del respiradero volcánico activo.\n\n\nYa estás cerca, ¿verdad?
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_VolcanoVent = ¿Cortocircuitos y arcos eléctricos? ¿Atmósfera de oxígeno puro a alta presión? ¿Olor acre? ¿Prevalencia de materiales altamente inflamables en atmósferas de oxígeno puro? Si tu nave tiene un compartimento que cumple todas esas condiciones, ¡felicidades, una simulación in situ del incendio del Acapello 1 es inminente! Y si la temperatura en este respiradero volcánico es lo bastante alta para encender varios materiales altamente inflamables actualmente en la nave, que el Kraken te bendiga mientras el interior de tu nave comienza a convertirse en un horno de pizza cerrado e incandescente.\n\nEspero que al Kraken le gusten los kerbals horneados y ligeramente quemados en ese caso...

		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow1 = La mota de masa de Dipuc como luna aparece apropiadamente irregular, aunque hay varias protuberancias en las latitudes más bajas indicativas de volcanismo activo. La razón y el modus operandi de estas estructuras volcánicas es actualmente desconocido, aunque la agitación de marea interna es una posibilidad probable.
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow2 = ¿Descendiendo más a la superficie? Si es así, espero que hayas preparado suficientes recursos para regresar a la órbita baja de Dipuc o cualquier nave en órbita en las inmediaciones. ¿Ascendiendo más desde Dipuc? Espero que hayas disfrutado tu estancia en su proximidad, asumiendo que tal visita fue intencional y no el resultado de... circunstancias gravitatorias anómalas. Si pretendes permanecer aquí, supongo que esto es intencional; si no, más te vale tener algunas cápsulas criogénicas y reservas de Glykerol, o tus recursos de soporte vital se agotarán constantemente, incluso con cualquier módulo de reciclaje disponible.\n\n\n...No tienes ningún mod de soporte vital o DeepFreeze instalado, ¿verdad?
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow3 = Esta luna induce aburrimiento a mayor ritmo que [Mun repintado], ¿podemos volver a [Ares]? No me gusta orbitar una bola de masa sobredimensionada, una que NI SIQUIERA ES COMESTIBLE.\n\n\nAviso: por favor no consumas masa cruda o de pan que contenga ingredientes fácilmente perecederos o huevos, pueden contener materiales o patógenos potencialmente peligrosos, particularmente cuando uno o ambos constituyentes internos del huevo son ingredientes de la masa. -Mortimer
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow4 = Esas regiones montañosas no pueden alcanzarnos... ¡Excelente, descendamos para muestrear la superficie y determinar su composición y sabor! ¿Oh, la superficie no es comestible? ¿Entonces por qué estamos aquí? ¿Para forzar a los kerbals traumatizados en Rouqea a revivir experiencias traumáticas en alguna terapia de exposición de humor enfermizo?

		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh1 = Bola de masa. Lo digo yo. Si Minmus es la luna de helado de menta, Dipuc es la luna de bola de masa. Sorprendentemente, la Unión Astronómica Internacional asintió casi unánimemente a tal noción. Parece que todos en casa tienen hambre de humor.\n\nY sí, la UAI existe aquí, aunque principalmente para atestiguar la existencia de ese aburrido planeta enano más conocido como Dres, o humorísticamente como «el planeta enano inexistente» o «el Mun recoloreado».
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh2 = Creo que no deberíamos estar aquí. Los cálculos orbitales indicaban todos que la esfera de influencia de Dipuc es demasiado diminuta para afectar razonablemente la órbita en la escala temporal de la misión. ¿Está el cercano puente Einstein-Rosen involucrado en esta anomalía gravitatoria? Después de todo, es cómo llegamos aquí a pesar de la enorme distancia desde Kerbin.\n\n\n<color=#000000>[¿Llegaste aquí vía puentes Einstein-Rosen, correcto?]</color>
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh3 = Al invertir el nombre de esta luna, debo preguntar; ¿qué hace a esta luna apreciable en algún sentido de la palabra?
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh4 = Bienvenido a Dipuc, una luna de vacío del mundo desértico primordialmente gélido Sera con un notable tono beige. Curiosamente, pocos cráteres salpican la superficie, aparte de varios grandes complejos de cráteres, incluyendo una estructura de cráter doble superpuesta. Parece haber varios montículos concentrados en las latitudes más bajas que se parecen mucho a conos estratovolcánicos. ¿Volcanismo activo o recientemente activo? En cualquier caso, si tu visita a las regiones exteriores de Dipuc es intencional, ¿te importa descender más para indagar sobre su actividad superficial?


		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Lowlands = Las Tierras Bajas son, predeciblemente, de baja elevación, al menos respecto al terreno circundante, con pendientes suaves y colinas tipo dunas que abarcan la totalidad de las Tierras Bajas. La composición superficial local se parece a la encontrada en las Tierras Medias y Altas, aunque aparece como una mezcla suelta tipo regolito de partículas más finas que en cualquiera de los dos biomas. Me pregunto, ¿de dónde sacan las mediciones para la altitud superficial media del «nivel del mar», considerando que no hay océanos globales que usar como base?
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Midlands = Terreno escarpado y accidentado caracteriza las Tierras Medias, al parecer. La elevación relativa al «nivel del mar» aquí es significativamente mayor que la elevación media de las Tierras Bajas. La composición local parece idéntica a Tierras Bajas y Altas: presumiblemente material silíceo con óxidos, metales, lantánidos y el ocasional actínido entre medio. Los tamaños de partícula son mayores aquí, y piedras más grandes parecen conglomerarse ocasionalmente con piedras vecinas.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Highlands = Las Tierras Altas son predeciblemente de alta elevación respecto al resto de la superficie de Cupid-*ejem*-Dipuc, y tienen una composición similar a Tierras Medias y Bajas. El terreno local es accidentado y escarpado en un grado mayor que las Tierras Medias. Aconsejo encarecidamente permanecer cauteloso al explorar cerca de las pendientes pronunciadas y estructuras tipo dunas aquí. Los tamaños de las partículas, no, las ROCAS aquí son particularmente significativos y suponen un impedimento para vehículos rover más pequeños.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Mountains = Elevaciones significativas relativas al nivel del mar definen cordilleras y cordilleras por igual, independientemente de la atmósfera del mundo o la falta de ella, como es el caso aquí. Los tonos superficiales intrínsecos se parecen a los de Tierras Bajas, Medias y Altas, aunque la textura y apariencia se apartan de las convenciones de los tres biomas mencionados. Aquí, las rocas superficiales parecen haber sufrido metamorfosis parcial. Además, las concentraciones de actínidos y lantánidos abundantes en los núcleos de cuerpos celestes diferenciados están elevadas respecto a los biomas circundantes. Las rocas no metamórficas aquí suponen riesgos significativos para vehículos rover pequeños y medianos, aunque los más grandes pueden ir bien.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Poles = Las regiones polares de Dipuc exhiben niveles similares de terreno inductor de aburrimiento a la mayoría de la superficie en otros lugares: tono similar, composición similar, temperatura similar, etc. Los niveles de temperatura suscitan curiosidad considerando la mayor distribución de la radiación de Sunorc en latitudes más altas, aunque la actividad en vuelo y extravehicular debería encontrar impedimentos ambientales mínimos aquí como en todas partes excepto los respiraderos volcánicos.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterSouth = Las regiones aplanadas del Cráter Gigante Sur manifiestan elevaciones más bajas que la mayoría del terreno que lo rodea. Las rocas superficiales indican actividad metamórfica previa, probablemente del evento de impacto que generó inicialmente el Cráter Gigante Sur. Los tonos de roca en el lugar parecen ligeramente más oscuros que el terreno circundante también, ¿quizás también del evento de impacto? Considerando los respiraderos volcánicos activos de Dipuc, uno supondría una combinación de rocas metamórficas e ígneas componiendo el suelo del cráter, aunque la apariencia superficial actual parece contraria a tales suposiciones.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterEast = El Cráter Gigante Este aparece como un vasto cañón cortando el terreno por lo demás normal de Dipuc, ya que las Tierras Altas y Montañas y sus elevaciones altas rodean el Cráter omnidireccionalmente. Como los otros cráteres, la coloración superficial aquí es notablemente más oscura que el resto, y es especialmente notable al comparar los tonos superficiales locales con los de las Tierras Medias y Altas circundantes. Las rocas aquí parecen metamórficas en grado marcado, y la superficie es más suave y rígida que el terreno más escarpado, rocoso y polvoriento característico de los biomas típicos aquí.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterWest = Las elevaciones medias en el Cráter Gigante Oeste se parecen a las de los otros cráteres, notablemente menores que el terreno circundante. Las rocas aquí parecen algo pulverizadas y polvorientas con parecido al regolito siempre peligroso del Mun, pero parecen estar firmemente asentadas en el suelo, como si algún proceso geomórfico ocurriera aquí que comprimió las diminutas rocas al terreno. Además, el tono general del Cráter es más oscuro que el terreno circundante. ¿Quizás se debe al impacto, o es un regolito específico de la región debido a las condiciones durante e inmediatamente después del impacto? Como nota adicional, la vista del terreno que rodea el Cráter Gigante Oeste parece tipo cañón.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_DoubleCrater = La elevación media en la región de los Cráteres Dobles es notablemente más baja que la de las Tierras Bajas. La coloración superficial es más oscura que el terreno circundante y tiene una textura rocosa diferente. Las rocas parecen algo metamórficas: una apariencia esperada, dado que ocurrieron cambios ambientales fulminantes significativos en esta región debido a los dobles impactos.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Volcano = La elevación relativa en la región del Volcán es más alta que el resto... por razones obvias. El volcán es un estratovolcán o un cono de escoria, a juzgar por su forma cónica escarpada y laderas igualmente escarpadas. Las temperaturas del suelo medias probablemente son más altas aquí, aunque con todos nuestros trajes puestos, solo sería detectable mediante lecturas de termómetro de suelo. También se espera actividad de microtemblores aquí; mejor indagar más sobre eso con un sismómetro real.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_VolcanoVent = Estás en una situación muy, muy precaria. Las temperaturas son lo bastante altas para penetrar tu traje, y el respiradero está activo, así que te sugiero que te mantengas flotando sobre el respiradero en lugar de pisar en él no sea que termines desmaterializándote en una bocanada de humo. Aparte de eso, las rocas ígneas parecen prevalentes en las paredes del respiradero, aunque las paredes inferiores parecen algo fundidas pero metamórficas por el calor. ¿Tiene Sera algo que ver con esto, o la actividad volcánica de Dipuc es independiente de cualquier mecanismo de su planeta padre?\n\n\nSi deseas no terminar como la tripulación del Acapello 1, SAL DEL LUGAR INMEDIATAMENTE.

		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Lowlands = Las tierras bajas de Dipuc parecen... relativamente planas desde aquí, con las ocasionales «dunas» onduladas salpicando las llanuras junto al ocasional volcán activo. Asumiendo que estás actualmente en el lado iluminado de la luna, el tono superficial se parece mucho a la masa de pan.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Midlands = Como las Tierras Bajas, las Tierras Medias se parecen a la masa de pan fresca en tono, aunque con apariencia más grumosa debido a la escarpadura elevada de la región.\n\nSi el tono de Dipuc se parece a la masa de pan y Minmus al helado de menta, ¿hay un mundo que se parezca al espagueti o la pizza?\n\n\n\nY no, Io no cuenta: la especulación actual concierne a los cuerpos celestiales del universo.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Highlands = Más accidentadas en apariencia, las Tierras Altas, debido a las elevaciones generalmente más altas, parecen más cercanas a la nave; a menos que dicha nave orbite a altitudes peligrosamente bajas, en cuyo caso la percepción de proximidad importaría poco ante el riesgo significativo de colisión potencial.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Mountains = La proximidad de las montañas a la nave es... deslumbrantemente intimidante. La linealidad de varias cordilleras parece olas. Si no fuera por la falta de atmósfera y los tonos cremosos-marrones de las montañas, uno podría confundirlas con las mareas titánicas que circunnavegan regularmente Rouqea.\n\nDado el parámetro gravitacional de Dipuc, aterrizar en las regiones montañosas y regresar a una nave en órbita baja únicamente con propulsor EVA es una posibilidad, como en Minmus.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Poles = Nada de hielo de ningún tipo —agua, dióxido de carbono, metano, amoníaco, etc.— está presente en los polos, ni debería esperarse dado el estatus de Dipuc como diminuto mundo de vacío de tamaño y masa comparables a Minmus. Los polos en sí parecen muy similares al resto de la superficie en latitudes más bajas, aunque no hay actividad volcánica aquí.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterSouth = ¡Ah, el Cráter Gigante Sur! Una cuenca... expansiva... de pura planicie. Bastante intuitivo, dado su estatus como cráter definitorio de una luna decentemente rica en rasgos. Uno esperaría un pico central aquí, pero los escaneos ópticos y gravimétricos no revelan anomalías indicativas ni siquiera de un pico central erosionado.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterEast = El Cráter Gigante Este, una sima decepcionantemente plana con vistas superficiales supuestamente impresionantes que emanan la impresión de estar en un gran cañón particularmente xérico... o una colección concéntrica de deslizamientos de lodo imponentes dispuestos a inundarte por completo en fluidos cargados de rocas. Los escaneos visuales revelan poco de interés salvo la ligera diferencia de color entre él y las regiones de alta elevación y montañosas circundantes.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterWest = No hay mucho de nota inicial aquí sobre el Cráter Gigante Oeste. Un tono superficial ligeramente más oscuro que las regiones de alta y media elevación que envuelven el cráter, la falta de pico central y una vista decente en superficie que puede parecerse a mirar las paredes de un cañón ancho cerca del fondo, y nada más.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_DoubleCrater = La cuenca de impacto de los Cráteres Dobles comprende principalmente dos cráteres de impacto, un cráter más viejo y grande y uno más joven y pequeño, como evidencia el borde del cráter diminutivo que se introduce en su vecino expansivo. Un Kerbal de ojo agudo puede ver la ligera diferencia de color entre las regiones centrales de ambos cráteres y las de las áreas de baja y media elevación que rodean el complejo. Dada la tendencia de las rocas ígneas solidificadas a manifestarse en tonos más oscuros, las regiones centrales son posibles candidatas a actividad magmática previa generalizada, proporcionando una explicación potencial para la falta de picos centrales tanto aquí como en los otros cráteres mayores de Dipuc.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Volcano = La actividad volcánica en un mundo tan pequeño como Dipuc suena extraña. Los volcanes aquí, deduciendo por su apariencia, son de estructura estratovolcánica: el cono volcánico consiste en varias capas repetidas de múltiples rocas ígneas y eyección volcánica de erupciones repetidas consideradas recientes en la escala temporal de Dipuc. Aterrizar aquí parece inviable debido al terreno escarpado e inclinado.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_VolcanoVent = El respiradero volcánico parece activo, dada la apariencia incandescente y fundida del lumen del respiradero. Las lecturas térmicas no muestran cambio de temperatura. Estás a salvo aquí, por ahora. Todo lo que debe hacerse para asegurar tu continuidad como miembro vivo, respirante y activo de la misión es <color=#FF6A00>NO DESCENDER MÁS SOBRE EL RESPIRADERO VOLCÁNICO ACTIVO.</color> Asumiendo que tu nave contiene una cabina, asegúrate también de que la atmósfera NO sea puramente oxígeno: cualquier material de alta inflamabilidad en atmósfera de oxígeno puro probablemente se encenderá espontáneamente bajo temperaturas que excedan su temperatura máxima de funcionamiento.

		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh1 = La única luna de un mundo desértico frío <color=#000000>[los puentes Einstein-Rosen no cuentan, por si no era obvio]</color> alrededor de un análogo de Kerbol es un lugar bastante poco notable para un observador lejano, aunque una inspección más cercana puede revelar más. A menos que el encuentro que te llevó a su esfera de influencia fuera involuntario o ocurriera por datos anómalos <color=#000000>[léase: glitches de SOI]</color>, ¿te importa gravitar más cerca para escrutar Dipuc?
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh2 = La apariencia distante de Dipuc se parece a masa grumosa, un cacahuete... o un hueso de cereza pálido. Quizás el Kraken podría usar un tentempié para apaciguamiento momentáneo, o un veneno para eliminarlo en beneficio de todos. Su padre, Sera, probablemente prestará poca atención de todos modos. Si experimentar con, en y alrededor de la miniluna es científicamente viable depende de tu discreción, intrépido Kerbal.\n\n\n¿Qué, crees que una sonda puede llegar tan lejos sin garantizar pérdida total de contacto?
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh3 = Aunque ya a una distancia considerable de Kcalbeloh, su distintivo disco de acreción y horizonte de sucesos son muy visibles incluso con ojos bastante miopes. Probablemente sería mejor explorar esa zona que aquí... a menos que hayas llegado primero desde el agujero de gusano cercano y quieras no gastar varios miles o millones de toneladas de combustible en delta-v.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh4 = Un lugar maravillosamente craterizado, Dipuc. Aunque parece tener estructuras en las latitudes más bajas que se parecen a granos de piel con el área elevada y un pico central rojizo.\n\n¿Oh, esos son conos volcánicos? Considerando su apariencia roja más intensa, la lava contenida en ellos parece... fría. ¿Quizás Dipuc fue una vez más geológicamente activo y violento? Veo áreas más oscuras que se parecen a los maria del Mun, algunas de ellas en esos cráteres más grandes también. Supongo que este mundo pudo haber sido más emocionante en el pasado comparado con hoy, ¿quién sabe?

		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Lowlands = ¿Puedo preguntar exactamente POR QUÉ ejecutaste un escaneo barométrico en un mundo de VACÍO de todos los lugares? Si no entró en un estado irreparable e inoperable hasta la reparación subsiguiente ya debido a su entrada en un entorno de vacío, intentar recopilar datos de él seguramente lo hará desde un sentido lógico.\n\n\n<color=#000000>[Me pregunto si un mod como Kerbalism podría implementar una mecánica similar...]</color>
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Midlands = O eres necio para un Kerbal —un estándar ya bajo— o estás ejecutando el experimento en un vehículo de aterrizaje de una sola etapa a todas partes o multipropósito. Si es el último caso, continúa y cosecha las recompensas por tus esfuerzos, que son admitidamente pocos asumiendo que llegaste al sistema Kcalbeloh vía agujeros de gusano gravitacionalmente anómalos.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Highlands = Si estás realizando esto específicamente para ganar puntos de ciencia adicionales, adelante, pero ten en cuenta la farsa lógica de ejecutar un experimento científico dependiente de la atmósfera en un entorno de vacío.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Mountains = ¿Por qué debes ejecutar un escaneo barométrico, que requiere residir en una atmósfera para obtener cualquier resultado, en un entorno de vacío? ¿Gene te puso a esto, o es por tu cuenta? En cualquier caso, a menos que lo ejecutes como parte de un grupo de acción en un módulo de aterrizaje multipropósito o de una sola etapa a cualquier parte, recomiendo que no ejecutes este experimento en este tipo de entorno específico de nuevo.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Poles = ¿Esperabas presiones más bajas aquí dada su naturaleza polar? Solo las encontrarías en condiciones atmosféricas, de las cuales Dipuc CARECE TOTALMENTE. Por el amor del Kraken, ejecuta esto en entornos apropiados. Incluso los mundos con atmósfera fina están mejor con este experimento ejecutándose dentro de su fina envoltura gaseosa que aquí.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterSouth = Disculpa tu ronda bastante pedante de obtención de experimentos científicos, pero ¿has considerado cesar tus actividades actuales para reflexionar exactamente POR QUÉ EJECUTARÍAS UN ESCANEO BAROMÉTRICO EN UN VACÍO? Si tienes compañeros de tripulación a bordo de tu nave, espero que estés preparado para la burla por esto.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterEast = «¿Por qué exactamente estás ejecutando un escaneo barométrico en Dipuc, un diminuto satélite natural que carece de cualquier vestigio de atmósfera? Mortimer, contacta con el Centro Kerbonauta, necesitaremos un psicoanalista para cuando regrese la tripulación de la misión de excursión superficial de Dipuc, tenemos otro caso de experimentación científica sin sentido.» -Gene
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterWest = «¡Me he convertido en Ignoramus, devastador del intelecto. ¡Todos los genios se acobardan ante mí y se postran a mis pies!» dijo el Kerbal extraño mientras intentaba en vano ejecutar un barómetro en Dipuc. Gene, por su parte, deseaba cortar intermitentemente los enlaces de comunicación por radio con la tripulación de la misión debido a su exasperación. Sin embargo, no pudo, debido a que la conciencia constante y la transmisión de datos eran primordiales para asegurar el cumplimiento de los objetivos de la misión y la seguridad de la tripulación en caso de misiones tripuladas como la que actualmente estaba presidiendo.\n\nGene, sin embargo, no recibió ningún consuelo de tal conocimiento, sabiendo que el Kerbal que intentó la barometría en vacío se dio a sí mismo una razón para anticipar sucumbir a la selección natural.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_DoubleCrater = «Al intentar realizar un experimento barométrico in situ en un entorno contrario a las condiciones esperadas en las que los barómetros suelen ejecutarse, te has certificado como zoquete profesional y estarás en libertad condicional hasta la conclusión de la misión. No resistas tu sentencia: solo agravará la severidad y extenderá la duración de tu libertad condicional. Cualquier incumplimiento adicional resultará en terminación inmediata vía exposición directa al vacío.» -Mortimer\n\nEl Complejo Kerbonauta del Kerbal Space Center no echará de menos tu pérdida; después de todo, los Kerbonautas deben ser la cumbre de Kerbalkind para atravesar con éxito el cosmos infestado de Kraken.\n\nTampoco el Control de Misión echaría de menos tu pérdida si resultas ser el único miembro de la tripulación en tu misión actual.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Volcano = ¿No es la termometría un experimento más apropiado para ejecutar en la proximidad de un volcán, más aún en un entorno atmosférico? Incluso con desgasificación volcánica, la presión de los gases liberados leería un entorno prácticamente de vacío, como el resto de este mundo por lo demás internamente estático y atmosféricamente vacío.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_VolcanoVent = Tu valor ante la potencial muerte inminente en medio de una situación precaria como esta es admirable, casi audaz y descuidado. Si los datos de esta barometría tomada directamente dentro de los respiraderos volcánicos de Dipuc son recuperados por el Control de Misión vía transmisiones de la Red Internacional de Espacio Profundo, que conste que [Lorem Ipsum] Kerman fue un valiente Kerbonauta hasta su final fundido.

		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = «Ah, sí, un escaneo barométrico. En un vacío. Qué sagaz de tu parte. Espera, ¿esta misión no está tripulada? ¿Quién entre los ingenieros del VAB supuso que añadir un barómetro a la sonda era una noción viable?» -Gene
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = ...\n\n...\n\n...¿Por qué?
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = ¿No has ejecutado ya este experimento varias veces en un entorno de vacío antes de vagar hasta aquí? Primero en órbita alta de Sera, luego en órbita alta de Dipuc, y ahora en órbita baja de Dipuc. ¿Dónde planeas realizar otro escaneo barométrico a continuación, en la superficie sin atmósfera de Dipuc?\n\n...Por favor no digas «ya estuve, ya lo hice».
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = Los resultados de tu escaneo barométrico indican una lectura de presión atmosférica de [0] kilopascales (kPa), [nulo] milímetros de mercurio y [vacío] bar. Por tanto, podemos concluir con alta probabilidad que este barómetro está siendo utilizado en un entorno de vacío. Para recompensar tu ingenioso cretinismo, puedes reclamar los fragmentos de mercurio coagulado cuya eyección a alta velocidad del recipiente de contención actual en fragmentos tipo metralla es inminente. Por favor mantente atento a tu entorno, y si realizas la barometría en actividad extravehicular, inspecciona también inmediata y minuciosamente tu traje en busca de características anómalas. Gracias por tu tiempo, y recuerda:\n\n¡Sic itur ad astra!

		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = ¡Tu flagrante estupidez por ejecutar un escaneo barométrico en un lugar de vacío merece elogios y recompensas en forma de una invitación (obligatoria) a Bop tras la conclusión de la misión para una entrevista exclusiva con el Kraken! ¡Esperamos tu regreso a Kerbin con suficiente bienestar con anticipación!\n\n\n<color=#000000>[Cualquier intento de resistir la entrevista con el Kraken basada en Bop provocará un ataque feroz del Kraken en medio de tu próxima misión participante.]</color>
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = Un escaneo barométrico es totalmente superfluo en este entorno. A menos que la ubicación actual del barómetro sea una nave multipropósito destinada a aventurarse a múltiples cuerpos celestes además de Dipuc, recomiendo que no utilices el barómetro una vez más.\n\nA menos que estés realizando esto por puntos de ciencia adicionales, en cuyo caso, adelante y aprovecha las tecnicidades.
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = «Espero que estés realizando esto por los puntos de ciencia y nada más. De lo contrario, el Kraken puede intentar localizarte y consumirte en nombre de tus compañeros Kerbals en casa.» -extracto de Mortimer
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = El diminuto compañero bola de masa de Sera no crecerá en este entorno, especialmente dada la falta de evidencia de formas de vida fermentadoras y más importante, UNA ATMÓSFERA. Así que es mejor cesar la barometría externa en busca de condiciones adecuadas de levado de masa y en su lugar realizar una barometría interior para monitorear fluctuaciones menores en la atmósfera interna... asumiendo que el barómetro está en una nave tripulada con uno o más compartimentos interiores.

		#LOC_KS_SciDef_mysteryGoo_Dipuc_SrfLanded = El Goo parece sentirse amenazado por el lejano retumbar de la luna volcánica y tiembla dentro de su contenedor. Qué cobarde.
		#LOC_KS_SciDef_mysteryGoo_Dipuc_InSpaceLow = Un volcán entra en erupción muy abajo a la vista del Goo, y este retrocede asustado.
		#LOC_KS_SciDef_mysteryGoo_Dipuc_InSpaceHigh = El Goo parece estar intentando señalar al Control de Misión que quiere irse a casa.

		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLanded = Esta muestra de roca parece consistir en roca volcánica rica en metales pesados.
		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLandedLowlands = Encuentras un trozo muy brillante de vidrio volcánico en el suelo y lo recoges para maravillarte de su superficie lisa y reflectante. Por desgracia, tendrás que dárselo a los científicos cuando llegues a casa, así que mejor disfrútalo mientras puedas.
		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLandedVolcanoVent = ¡GUAU! ¡PAPA CALIENTE! ¡PAPA CALIENTE!

		#LOC_KS_SciDef_mobileMaterialsLab_Dipuc_SrfLanded = Los materiales reaccionan a la situación de una manera decepcionantemente esperada.
		#LOC_KS_SciDef_mobileMaterialsLab_Dipuc_InSpace = Los materiales no reaccionan al espacio cerca de Dipuc de diferente manera que al espacio en cualquier otro lugar. El espacio es el espacio.

		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLanded = A esta distancia de Sunorc, Dipuc es en realidad bastante frío.
		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLandedVolcano = Las laderas inclinadas de este volcán no parecen ser más calientes que el resto de Dipuc.
		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLandedVolcanoVent = Ay. Eso escuece un poco.
		#LOC_KS_SciDef_temperatureScan_Dipuc_InSpace = A pesar de la naturaleza volcánica de la bola de masa de abajo, el termómetro no parece ser consciente de lo caliente que puede llegar a estar ahí abajo.

		#LOC_KS_SciDef_seismicScan_Dipuc_SrfLanded = Un retumbar de baja frecuencia consistente con la actividad volcánica cercana permanece constante en todo Dipuc, una clara señal de lo activa que es esta luna.
		#LOC_KS_SciDef_seismicScan_Dipuc_SrfLandedVolcano = El suelo tiembla lo suficiente para que un kerbal lo sienta. Quizás deberías irte de aquí...

		#LOC_KS_SciDef_gravityScan_Dipuc_SrfLanded = La gravedad es similar a la del Mun, a 0,15g.
		#LOC_KS_SciDef_gravityScan_Dipuc_InSpaceLow = Al pasar sobre la superficie de Dipuc, la lectura de gravedad fluctúa en patrones que pueden indicar flujo de magma subsuperficial.
		#LOC_KS_SciDef_gravityScan_Dipuc_InSpaceHigh = La débil gravedad de Dipuc es bastante uniforme a esta distancia, pero aún hay pequeños picos en los datos.

		// Simetra-Simeht System
		#LOC_KS_SciDef_crewReport_SimeSystem_InSpaceHigh = Te preguntas sobre el origen de este sistema. ¿Cómo llegaron exactamente dos gigantes gaseosos tan cerca el uno del otro?
		#LOC_KS_SciDef_evaReport_SimeSystem_InSpaceHigh = Te preguntas cómo estos dos planetas masivos no han colisionado entre sí todavía.
		#LOC_KS_SciDef_magnetometer_SimeSystem_InSpaceHigh = El instrumento detecta poderosos campos magnéticos, pero no puede identificar si provienen de Simetra o Simeht, o incluso de ambos.
		#LOC_KS_SciDef_gravityScan_SimeSystem_InSpaceHigh = A pesar de los dos cuerpos masivos en el centro de este sistema, el sensor muestra un valor casi constante.

		// Simetra
		#LOC_KS_SciDef_crewReport_Simetra_FlyingLow = Empiezas a cuestionar tu existencia mientras tu nave se compacta lentamente por las presiones extremadamente altas.
		#LOC_KS_SciDef_crewReport_Simetra_InSpace = Tu atención se dirige al gigante gaseoso masivo fuera de las ventanillas.

		#LOC_KS_SciDef_temperatureScan_Simetra_FlyingLow = La atmósfera extremadamente espesa aplasta el termómetro.
		#LOC_KS_SciDef_temperatureScan_Simetra_FlyingHigh = Las temperaturas en la atmósfera superior son muy bajas.

		#LOC_KS_SciDef_evaReport_Simetra_FlyingLow = El hecho de que hayas podido sobrevivir lo suficiente para hacer un informe aquí abajo significa que debes ser super-kerbal.
		#LOC_KS_SciDef_evaReport_Simetra_FlyingHigh = Esta es ciertamente una situación precaria.
		#LOC_KS_SciDef_evaReport_Simetra_InSpace = Miras asombrado las diferentes bandas de color que se forman a diferentes latitudes de la atmósfera de Simetra.

		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingLow1 = Las presiones extremas hacen que el goo entre en un estado supercrítico.
		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingLow2 = La presión extrema compacta el goo en una esfera del tamaño de una pelota de golf al abrir la unidad de contención.
		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingHigh = El goo reacciona con los diversos compuestos de la atmósfera.

		#LOC_KS_SciDef_mobileMaterialsLab_Simetra_FlyingLow = Al abrir las puertas de la bahía de materiales, todas las muestras se aplastan instantáneamente por la presión extrema.
		#LOC_KS_SciDef_mobileMaterialsLab_Simetra_FlyingHigh = Varias de las muestras han combustado espontáneamente tras entrar en contacto con la atmósfera.

		#LOC_KS_SciDef_barometerScan_Simetra_FlyingLow = El barómetro se sale de escala justo cuando su cristal se rompe.
		#LOC_KS_SciDef_barometerScan_Simetra_FlyingHigh = Las lecturas del barómetro se disparan casi instantáneamente al descender en la atmósfera del gigante de hielo.

		#LOC_KS_SciDef_gravityScan_Simetra_InSpaceLow = Más cerca de Simetra, puedes tomar una lectura mucho más precisa de sus fuerzas gravitatorias.
		#LOC_KS_SciDef_gravityScan_Simetra_InSpaceHigh = El sensor gravitatorio se desvía por la proximidad de otro gigante de hielo de tamaño similar, y apunta hacia el baricentro del sistema.

		#LOC_KS_SciDef_magnetometer_Simetra_InSpaceLow = Ahora que estás más cerca de Simetra, puedes tomar una lectura mucho más precisa de su campo magnético muy fuerte.
		#LOC_KS_SciDef_magnetometer_Simetra_InSpaceHigh = El boom del magnetómetro detecta un fuerte campo magnético, pero la proximidad de Simeht dificulta saber si proviene solo de Simetra o de ambos gigantes de hielo.

		#LOC_KS_SciDef_atmosphereAnalysis_Simetra_FlyingLow = Las presiones extremas aplastan el analizador atmosférico.
		#LOC_KS_SciDef_atmosphereAnalysis_Simetra_FlyingHigh = La atmósfera parece consistir en gran parte de metano, así como de varios otros compuestos que no podemos identificar.

		// Simeht
		#LOC_KS_SciDef_crewReport_Simeht_FlyingLow = Empiezas a cuestionar tu existencia mientras tu nave se compacta lentamente por las presiones extremadamente altas.
		#LOC_KS_SciDef_crewReport_Simeht_InSpace = Tu atención se dirige al gigante gaseoso masivo fuera de las ventanillas.

		#LOC_KS_SciDef_temperatureScan_Simeht_FlyingLow = La atmósfera extremadamente espesa aplasta el termómetro.
		#LOC_KS_SciDef_temperatureScan_Simeht_FlyingHigh = Las temperaturas en la atmósfera superior son muy bajas.

		#LOC_KS_SciDef_evaReport_Simeht_FlyingLow = El hecho de que hayas podido sobrevivir lo suficiente para hacer un informe aquí abajo significa que debes ser super-kerbal.
		#LOC_KS_SciDef_evaReport_Simeht_FlyingHigh = Esta es ciertamente una situación precaria.
		#LOC_KS_SciDef_evaReport_Simeht_InSpace = No puedes evitar mirar con asombro el gigante gaseoso cian-azul.

		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingLow1 = Las presiones extremas hacen que el goo entre en un estado supercrítico.
		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingLow2 = La presión extrema compacta el goo en una esfera del tamaño de una pelota de golf al abrir la unidad de contención.
		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingHigh = El goo reacciona con los compuestos de la atmósfera superior de formas que antes se creían imposibles.

		#LOC_KS_SciDef_mobileMaterialsLab_Simeht_FlyingLow = Al abrir las puertas de la bahía de materiales, todas las muestras se aplastan instantáneamente por la presión extrema.
		#LOC_KS_SciDef_mobileMaterialsLab_Simeht_FlyingHigh = Las muestras reaccionan con los compuestos desconocidos de la atmósfera.

		#LOC_KS_SciDef_barometerScan_Simeht_FlyingLow = El barómetro apenas sobrevive a la atmósfera aplastante. La presión aquí es tan alta que cualquier agua que pudiera existir aquí tendría que existir en estado supercrítico.
		#LOC_KS_SciDef_barometerScan_Simeht_FlyingHigh = Las lecturas del barómetro se disparan casi instantáneamente al descender en la atmósfera del gigante de hielo.

		#LOC_KS_SciDef_gravityScan_Simeht_InSpaceLow = Más cerca de Simeht, puedes tomar una lectura mucho más precisa de sus fuerzas gravitatorias.
		#LOC_KS_SciDef_gravityScan_Simeht_InSpaceHigh = El sensor gravitatorio se desvía por la proximidad de otro gigante de hielo de tamaño similar, y apunta hacia el baricentro del sistema.

		#LOC_KS_SciDef_magnetometer_Simeht_InSpaceLow = Ahora que estás más cerca de Simeht, puedes tomar una lectura mucho más precisa de su campo magnético muy fuerte.
		#LOC_KS_SciDef_magnetometer_Simeht_InSpaceHigh = El boom detecta un fuerte campo magnético, pero la proximidad de Simetra dificulta saber si proviene solo de Simeht o de ambos gigantes de hielo.

		#LOC_KS_SciDef_atmosphereAnalysis_Simeht_FlyingLow = Las presiones extremas han aplastado el analizador atmosférico, pero no antes de que detecte la presencia de fluidos supercríticos.
		#LOC_KS_SciDef_atmosphereAnalysis_Simeht_FlyingHigh = La atmósfera superior de Simeht contiene compuestos no reconocidos por el analizador atmosférico.

		// Noira
		#LOC_KS_SciDef_crewReport_Noira_SrfLanded = El paisaje exterior te recuerda mucho a las imágenes de los primeros aterrizajes en el Mun. Por supuesto, hay dos diferencias muy, muy grandes en el cielo.
		#LOC_KS_SciDef_crewReport_Noira_InSpaceLow = Esto se siente ya muy visto en este punto, para ser honesto. ¡Bajemos ahí!
		#LOC_KS_SciDef_crewReport_Noira_InSpaceHigh = Parece que incluso aquí, en este sistema extraño, aún existen vistas familiares. ¡Noira casi podría confundirse con el Mun!

		#LOC_KS_SciDef_evaReport_Noira_SrfLanded = Un pequeño paso... ¿Qué? ¿Demasiado manido?
		#LOC_KS_SciDef_evaReport_Noira_InSpaceLow = La superficie craterizada pasando por debajo te hace sentir nostálgico.
		#LOC_KS_SciDef_evaReport_Noira_InSpaceHigh = ¿Eh? ¿Qué hace el Mun aquí? ...Ah, cierto. Eso es físicamente imposible.

		#LOC_KS_SciDef_mysteryGoo_Noira_SrfLanded = El Mystery Goo, aparentemente decidido a plantar su proverbial talón, se ha convencido de que hemos aterrizado en un plató de rodaje en el Mun.
		#LOC_KS_SciDef_mysteryGoo_Noira_InSpaceLow = El Goo no está seguro de dónde está ahora mismo.
		#LOC_KS_SciDef_mysteryGoo_Noira_InSpaceHigh = El Goo parece pensar que le están haciendo una broma.

		#LOC_KS_SciDef_surfaceSample_Noira_SrfLanded = ¿Rocas basálticas y brecha? Qué retro de tu parte, Noira.

		#LOC_KS_SciDef_mobileMaterialsLab_Noira_SrfLanded = La bahía de muestras parece haberse recubierto con una fina capa de polvo de la superficie de Noira. Eso es familiar.
		#LOC_KS_SciDef_mobileMaterialsLab_Noira_InSpace = Como siempre, el espacio cerca de Noira no parece afectar a los materiales de forma diferente al espacio en cualquier otro lugar.

		#LOC_KS_SciDef_temperatureScan_Noira_SrfLanded = La temperatura superficial de Noira es bastante gélida comparada con el Mun, lo cual tiene sentido. ¡Aquí fuera, debe estar recibiendo menos del 8% de la luz que recibe Kerbin!
		#LOC_KS_SciDef_temperatureScan_Noira_InSpace = Dice «Lol». ¿O quizás es «101»...?

		#LOC_KS_SciDef_barometerScan_Noira_SrfLanded = Quizás sea inútil, pero por si acaso, compruebas el barómetro. Es un vacío duro, efectivamente.
		#LOC_KS_SciDef_barometerScan_Noira_InSpace = Veinte por ocho, eso sería... seis, aproximadamente... siete.

		#LOC_KS_SciDef_seismicScan_Noira_SrfLanded = Los frecuentes temblores apuntan a que Noira es una luna azotada por fuerzas de marea mientras los dos planetas cercanos bailan alrededor.

		#LOC_KS_SciDef_gravityScan_Noira_SrfLanded = Las lecturas de gravedad de Noira se reducen periódicamente mientras los mundos gemelos espiralan arriba.
		#LOC_KS_SciDef_gravityScan_Noira_InSpaceLow = La gravedad de Noira es bastante baja, así que Simetra y Simeht aún constituyen una gran parte de la lectura.
		#LOC_KS_SciDef_gravityScan_Noira_InSpaceHigh = A esta altitud, la atracción de Noira es difícil de distinguir de Simetra y Simeht.
		// Norihc
		#LOC_KS_SciDef_crewReport_Norihc_SrfLanded = Parece lo bastante frío ahí fuera para congelar a un snowkerb.
		#LOC_KS_SciDef_crewReport_Norihc_Flying = Realmente no hay mucha atmósfera aquí. Esto es menos como volar y más como caer... ¡con estilo!
		#LOC_KS_SciDef_crewReport_Norihc_InSpaceLow = Norihc es bastante... ¡FRÍO! ¿Eh? ¿Eh? ¿Alguien?
		#LOC_KS_SciDef_crewReport_Norihc_InSpaceHigh = Casi parece una gran bola de nieve. ¿O quizás... un granizado? Mmmm... Sabor nitrógeno...

		#LOC_KS_SciDef_evaReport_Norihc_SrfLanded = La superficie helada refleja la tenue luz solar como si estuviera hecha de cristal. Que, bueno, el hielo -es- un tipo de cristal, así que...
		#LOC_KS_SciDef_evaReport_Norihc_Flying = Normalmente esto sería una idea horrenda, pero la fina atmósfera de Norihc la ha reducido a solo una terrible.
		#LOC_KS_SciDef_evaReport_Norihc_InSpaceLow = Te recuerda un poco a una versión más brillante de Eeloo. Las grietas que cruzan la superficie de Norihc son bastante bonitas.
		#LOC_KS_SciDef_evaReport_Norihc_InSpaceHigh = «Así que eh, Control de Misión, recuérdame otra vez... ¿cómo se pronuncia ese nombre? Eh, recibido...»

		#LOC_KS_SciDef_mysteryGoo_Norihc_SrfLanded = El Goo está temblando. No parece muy aficionado al frío.
		#LOC_KS_SciDef_mysteryGoo_Norihc_Flying = El Goo fuerza su cápsula a cerrarse de nuevo, soltando glorps de protesta enfadados.
		#LOC_KS_SciDef_mysteryGoo_Norihc_InSpaceLow = El Goo está empezando a arrepentirse de apuntarse al programa espacial.
		#LOC_KS_SciDef_mysteryGoo_Norihc_InSpaceHigh = Sondeas al Goo para una respuesta, pero está demasiado ocupado viendo a Simetra y Simeht orbitándose mutuamente.

		#LOC_KS_SciDef_surfaceSample_Norihc_SrfLanded = Esta muestra es mayormente hielo de agua, con trazas de compuestos de tolina más oscuros y rojizos.
		#LOC_KS_SciDef_surfaceSample_Norihc_SrfLandedLowlands = Encuentras una bonita muestra rojiza-grisácea y la traes para análisis. Aparentemente está hecha mayormente de compuestos de tolina recubiertos de hielo de agua, materia orgánica formada al exponer compuestos de carbono simples a la radiación solar. Interesante.

		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_SrfLanded = Los materiales reaccionan como se esperaba a las menores presiones, pero pocas reacciones químicas sustanciales tienen lugar además de esas.
		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_Flying = El viento de baja presión hace poco para mover las muestras más sueltas, pero algunas aún vuelan gracias a la despresurización.
		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_InSpace = Esto otra vez. ¿Alguna vez parará?

		#LOC_KS_SciDef_temperatureScan_Norihc_SrfLanded = Norihc en realidad no es tan frío como podrías esperar de un mundo de hielo. Parece que el sistema Simetra-Simeht recibe más luz solar que Jool, así que una luna de hielo va a ser un poco más cálida.
		#LOC_KS_SciDef_temperatureScan_Norihc_Flying = Vaya, hace frío. Quizás no tanto como los mundos de hielo más gélidos, pero bastante frío.
		#LOC_KS_SciDef_temperatureScan_Norihc_InSpace = Dos cosas son infinitas: el universo y la estupidez kerbal; y no estoy seguro del universo.

		#LOC_KS_SciDef_barometerScan_Norihc_SrfLanded = En la superficie, la presión es bastante más alta. Sin embargo, es aproximadamente un tercio de la presión de Duna, así que sigue siendo bastante baja.
		#LOC_KS_SciDef_barometerScan_Norihc_Flying = El instrumento tarda un poco en registrar un valor, gracias a la presión extremadamente baja. Pensó que intentabas usarlo en el espacio otra vez.
		#LOC_KS_SciDef_barometerScan_Norihc_InSpace = El barómetro se va a la huelga por las malas condiciones de trabajo.

		#LOC_KS_SciDef_seismicScan_Norihc_SrfLanded = El sismómetro registra varios temblores menores, con la actividad alcanzando un pico cada vez que un planeta pasa directamente encima.

		#LOC_KS_SciDef_gravityScan_Norihc_SrfLanded = Las lecturas de gravedad se reducen algo cuando Simetra o Simeht pasan por encima, insinuando el efecto de las fuerzas de marea en la geología de Norihc.
		#LOC_KS_SciDef_gravityScan_Norihc_InSpace = La presencia de numerosos cuerpos masivos en las inmediaciones crea un entorno gravioli bastante complejo para que el detector estudie.

		#LOC_KS_SciDef_atmosphereAnalysis_Norihc = La fina atmósfera de Norihc consiste mayormente en nitrógeno, con trazas de monóxido de carbono y otros gases.

		// Noyreg
		#LOC_KS_SciDef_crewReport_Noyreg_SrfLanded = Los kerbonautas dentro están tan ansiosos por salir de la nave espacial y explorar el nuevo mundo verde ante ellos, que el Control de Misión tiene que recordarles la atmósfera horriblemente tóxica y la presión extrema. A regañadientes, se ponen los cascos.
		#LOC_KS_SciDef_crewReport_Noyreg_FlyingLow = La nave es golpeada por vientos extremos, que amenazan con desviarla del rumbo y estrellarla contra algún acantilado cercano.
		#LOC_KS_SciDef_crewReport_Noyreg_FlyingHigh = Una misteriosa sustancia amarillenta se condensa en las ventanillas, recordando a la tripulación lo inhóspito que es Noyreg, a pesar de su color amigable.
		#LOC_KS_SciDef_crewReport_Noyreg_InSpaceLow = «¿Podemos aterrizar aquí?» El kerbonauta parece felizmente inconsciente de la naturaleza tóxica de la luna de abajo, lo que lleva al Control de Misión a recordárselo amablemente.
		#LOC_KS_SciDef_crewReport_Noyreg_InSpaceHigh = ¿Un planeta verde con una superficie real? ¿Hemos encontrado finalmente nuestro nuevo hogar? Oh, ¿4,5 atmósferas de presión? Sí... Quizás no.

		#LOC_KS_SciDef_temperatureScan_Noyreg_SrfLanded = Las temperaturas varían drásticamente en toda la luna, desde lo bastante frío para congelar agua hasta lo bastante caliente para hervirla, dependiendo de las condiciones meteorológicas.
		#LOC_KS_SciDef_temperatureScan_Noyreg_SrfLandedIceCaps = Los casquetes de hielo se libran de la mayor parte del tumulto de Noyreg, experimentando temperaturas consistentemente gélidas y velocidades de viento comparativamente tranquilas.
		#LOC_KS_SciDef_temperatureScan_Noyreg_FlyingLow = La turbulenta atmósfera inferior de Noyreg contiene frentes en guerra de atmósfera caliente y fría, chocando entre sí a alta velocidad e induciendo vientos extremos a pesar de la composición muy densa.
		#LOC_KS_SciDef_temperatureScan_Noyreg_FlyingHigh = A tan altas altitudes, las temperaturas muy contrastantes se equilibran y Noyreg se vuelve casi tranquilo.
		#LOC_KS_SciDef_temperatureScan_Noyreg_InSpace = ¿Conoces la definición de locura?

		#LOC_KS_SciDef_evaReport_Noyreg_SrfLanded = Oh, es mucho más... naranja de lo que esperabas. ¿Qué tipo de composición interesante podría ser responsable de esto? ¿Óxido de hierro, quizás? ¿O quizás algo más exótico?
		#LOC_KS_SciDef_evaReport_Noyreg_FlyingLow = Oh oh. Esto no va a terminar bien.
		#LOC_KS_SciDef_evaReport_Noyreg_FlyingHigh = ESTE ES EL MEJOR PLAN.
		#LOC_KS_SciDef_evaReport_Noyreg_InSpaceLow = Seguro que no puede ser -tan- malo ahí abajo, ¿verdad? ¡O sea, es verde!
		#LOC_KS_SciDef_evaReport_Noyreg_InSpaceHigh = Te recuerda a Jool, pero mucho más pequeño y probablemente, con suerte, menos asesino.

		#LOC_KS_SciDef_mysteryGoo_Noyreg_SrfLanded = El Mystery Goo no parece molesto por la atmósfera tóxica o las temperaturas extremas. Solo parece importarle el viento.
		#LOC_KS_SciDef_mysteryGoo_Noyreg_Flying = Al Goo le gusta bastante el color de Noyreg, pero preferiría no estar expuesto al mal tiempo.
		#LOC_KS_SciDef_mysteryGoo_Noyreg_InSpace = El Goo «mira» desde su contenedor la luna de abajo con interés.

		#LOC_KS_SciDef_surfaceSample_Noyreg_SrfLanded = La superficie naranja desmenuzable de Noyreg parece ser extremadamente rica en compuestos orgánicos. Como... REALMENTE jodidamente rica. Carece tanto de silicatos como de metales, lo que implica que Noyreg puede estar compuesto mayormente de carbono. ¡Vaya, eso es raro!
		#LOC_KS_SciDef_surfaceSample_Noyreg_SrfLandedIceCaps = Esta sustancia parece ser hidrocarburos de cadena larga congelados, en lugar de hielo de agua.

		#LOC_KS_SciDef_mobileMaterialsLab_SrfLanded = Una muestra de agua comienza a formar clorita, indicando la presencia de mucho dióxido de cloro en la atmósfera.
		#LOC_KS_SciDef_mobileMaterialsLab_Flying = Los fuertes vientos mueven las muestras, salpicando algunas contra las paredes del contenedor.
		#LOC_KS_SciDef_mobileMaterialsLab_InSpace = Suspiro... ¿Cuándo aprenderás?

		#LOC_KS_SciDef_barometerScan_Noyreg_SrfLanded = La presión marca aproximadamente 4,5 atmósferas. Eso es bastante, pero la gran distancia de Noyreg de Sunorc evita que se caliente demasiado incluso así.
		#LOC_KS_SciDef_barometerScan_Noyreg_FlyingLow = La lectura de presión se dispara repentinamente cuando una potente ráfaga golpea el sensor.
		#LOC_KS_SciDef_barometerScan_Noyreg_FlyingHigh = La presión es un poco más alta en la atmósfera superior debido a las menores temperaturas.
		#LOC_KS_SciDef_barometerScan_Noyreg_InSpace = Otra vez. Este instrumento. No es. Lo bastante preciso. Para detectar. ¡Exósferas! ¡Por el amor del Kraken, chicos!

		#LOC_KS_SciDef_seismicScan_Noyreg_SrfLanded = Las fuerzas de marea de los dos mundos masivos orbitando cerca tienen un efecto notable en la corteza de Noyreg, causando actividad sísmica que corresponde con los acercamientos de ambos planetas.

		#LOC_KS_SciDef_gravityScan_Noyreg_SrfLanded = La lectura aumenta ligeramente cada vez que Simetra o Simeht pasan por encima, mostrando que Noyreg experimenta muchas fuerzas de marea.
		#LOC_KS_SciDef_gravityScan_Noyreg_InSpace = Las lecturas de gravedad fluctúan según las características superficiales de abajo; que están tristemente ocultas por la espesa capa de nubes.

		#LOC_KS_SciDef_magnetometer_Noyreg_InSpace = Las lecturas del magnetómetro revelaron patrones e fluctuaciones intrincados, insinuando la presencia de anomalías magnéticas y fenómenos geológicos subyacentes. Noyreg, con su atmósfera traicionera y misterios cautivadores, se erigía como testimonio de las asombrosas maravillas del cosmos.

		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_SrfLanded = La atmósfera de Noyreg está compuesta mayormente de dióxido de carbono, con cantidades menores de nitrógeno, dióxido de cloro y trazas de otros gases (a menudo horriblemente tóxicos). Aún no está claro si el dióxido de cloro es el culpable del color verde de la atmósfera, o si hay un efecto de refracción único involucrado. ¿Quizás un poco de la columna A, un poco de la columna B?
		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_FlyingLow = El análisis muestra que la atmósfera de dióxido de carbono de Noyreg se espesa considerablemente a estas altitudes, y es donde se encuentran gases más pesados como el dióxido de cloro.
		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_FlyingHigh = Se encuentran nitrógeno y trazas de otros gases a altas altitudes sobre Noyreg, pero la abrumadora mayoría es dióxido de carbono.

		// Noi
		#LOC_KS_SciDef_crewReport_Noi_SrfLanded = Espera, un momento. ¿Hemos aterrizado? ¡Sigue todo negro fuera!
		#LOC_KS_SciDef_crewReport_Noi_InSpaceLow = Nnnnno. No lo veo.
		#LOC_KS_SciDef_crewReport_Noi_InSpaceHigh = La tripulación descubre que, si entrecierras los ojos, apenas puedes distinguir un asteroide flotando cerca.

		#LOC_KS_SciDef_evaReport_Noi_SrfLanded = Por alguna razón, albergas un intenso desagrado por las rocas sigilosas.
		#LOC_KS_SciDef_evaReport_Noi_InSpaceLow = Menos mal que esta roca sigilosa no está cerca de nuestro hogar. ¡Si estuviera en curso de colisión, nunca la veríamos venir!
		#LOC_KS_SciDef_evaReport_Noi_InSpaceHigh = Mientras miras a Noi, te maravillas de la simple belleza de su superficie craterizada. El Control de Misión te informa amablemente de que en realidad no estás mirando a Noi, y de repente te sientes muy avergonzado.

		#LOC_KS_SciDef_mysteryGoo_Noi_SrfLanded = El Goo se sorprende al aprender que en realidad estamos en la superficie de algo, y tiene que asomarse del contenedor durante unos segundos sólidos para asegurarse.
		#LOC_KS_SciDef_mysteryGoo_Noi_InSpaceLow = El Goo está brevemente aterrorizado de que hayamos sido teletransportados de repente justo al lado de Kcalbeloh, al ver un enorme vacío negro cubriendo el cielo. Tarda un poco en calmarlo y tranquilizarlo de que es solo Noi.
		#LOC_KS_SciDef_mysteryGoo_Noi_InSpaceHigh = El misterioso goo no puede ver el asteroide cercano. Puede que necesite ayuda para localizarlo.

		#LOC_KS_SciDef_surfaceSample_Noi_SrfLanded = Recoges un trozo de roca particularmente ennegrecido y decides que sería un gran regalo de Khristmas para tu familiar menos favorito.

		#LOC_KS_SciDef_mobileMaterialsLab_Noi_SrfLanded = Se está volviendo cada vez más obvio que estas muestras reaccionan igual en el vacío, estén o no en la superficie de algo.
		#LOC_KS_SciDef_mobileMaterialsLab_Noi_InSpace = Los materiales reaccionan de forma muy similar a como lo hicieron en el espacio interplanetario.

		#LOC_KS_SciDef_temperatureScan_Noi_SrfLanded = Los escaneos de la superficie de Noi revelan que está bastante frío.
		#LOC_KS_SciDef_temperatureScan_Noi_InSpace = Quizás algún día comprobarás la temperatura en el espacio y te dará algunos datos. Hasta entonces, seguirás golpeando tu proverbial cabeza contra esta pared.

		#LOC_KS_SciDef_barometerScan_Noi_SrfLanded = El barómetro está mayormente confundido sobre por qué te molestarías en comprobarlo.
		#LOC_KS_SciDef_barometerScan_Noi_InSpace = Sí. Sin presión... ¿Te sorprende? ¿A alguien?

		#LOC_KS_SciDef_seismicScan_Noi_SrfLanded = Silencio absoluto. Parece que Noi es demasiado pequeño para recibir impactos regulares.

		#LOC_KS_SciDef_gravityScan_Noi_SrfLanded = La gravedad de Noi es marginalmente más fuerte en la superficie que en órbita, pero sigue siendo básicamente nada. Saltar en EVA aquí sería una idea terrible.
		#LOC_KS_SciDef_gravityScan_Noi_InSpace = El monitor de gravedad está dormido y debe despertarse para tomar una lectura. La velocidad orbital aquí es muy baja, y la gravedad fluctúa salvajemente de casi nada a básicamente nada dependiendo de qué parte de Noi está abajo.

		// Aralc System
		#LOC_KS_SciDef_crewReport_AralcSystem_InSpaceHigh = Te preguntas sobre el origen de este sistema. ¿Cómo llegaron exactamente dos estrellas tan cerca la una de la otra?
		#LOC_KS_SciDef_magnetometer_AralcSystem_InSpaceHigh = El instrumento detecta poderosos campos magnéticos estelares, pero es probable que esta lectura esté dominada por el mucho más grande Aralc-A.
		#LOC_KS_SciDef_gravityScan_AralcSystem_InSpaceHigh = A pesar de los dos cuerpos masivos en el centro de este sistema, el sensor muestra un valor casi constante.

		// Aralc-A
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceLow = El puro brillo de Aralc-A te hace desear haber traído cubreventanas. Aunque no harían nada con el calor.
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceHigh1 = Ciertamente es una estrella grande y brillante.
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceHigh2 = El interior de la cápsula sería un horno si no fuera por los radiadores... espera, ¿recordaste traer paneles de radiadores, verdad?

		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceLow1 = El termómetro se ha fundido parcialmente.
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceLow2 = ¿Realmente necesitabas un termómetro para ver lo caliente que estaba aquí abajo?
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceHigh1 = El termómetro llega al máximo debido a la proximidad a esta estrella masiva.
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpacehigh2 = El termómetro se ha fundido parcialmente.

		#LOC_KS_SciDef_evaReport_AralcA_InSpaceLow = ¿Por qué pensaste que hacer un EVA tan cerca de una estrella tan masiva era una buena idea? ¿Por qué?
		#LOC_KS_SciDef_evaReport_AralcA_InSpaceHigh = Casi te quedas ciego por la intensa luz de la estrella masiva.

		#LOC_KS_SciDef_mysteryGoo_AralcA_InSpaceLow = La unidad de contención del Goo brilla incandescente y la expansión térmica ha hecho que la tapa se atasque. No sería descabellado asumir que el Goo estaba bien asado.

		#LOC_KS_SciDef_mobileMaterialsLab_AralcA_InSpaceLow = El interior del Laboratorio de Materiales Móvil se ha fundido parcialmente.
		#LOC_KS_SciDef_mobileMaterialsLab_AralcA_InSpaceHigh = Las muestras están empezando a brillar debido al intenso calor, y algunas muestran signos de descomposición.

		#LOC_KS_SciDef_barometerScan_AralcA_InSpaceLow = Las temperaturas extremas hacen que el cristal del barómetro se agriete.

		#LOC_KS_SciDef_gravityScan_AralcA_InSpaceLow = La enorme masa de la estrella y tu proximidad a ella casi abruman del instrumento.
		#LOC_KS_SciDef_gravityScan_AralcA_InSpaceHigh = El instrumento lee una atracción gravitatoria muy fuerte.

		#LOC_KS_SciDef_magnetometer_AralcA_InSpaceLow = No sabemos exactamente cuán poderosos son los campos magnéticos de Aralc-A, pero sí sabemos que fueron lo bastante poderosos para freír el instrumento.
		#LOC_KS_SciDef_magnetometer_AralcA_InSpaceHigh = El instrumento lee fuertes campos magnéticos, pero las lecturas no son fiables. 

		//Anneheg
