		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterEast = Восточный кратер... насколько далеко он находится на востоке от нулевого меридиана? А что определяет конкретную долготу как нулевой меридиан? Какая определяющая особенность, естественная или иная, гарантирует выбор определенного меридиана Dipuc в качестве основного?\n\n\nНет, Gene, это во вселенной, использование средней вертикальной линии на цветовой карте Dipuc не является для этого действительной причиной во вселенной. И было ли это до или после того, как вы попытались утешить затронутого Rouqea кербала в горах, учитывая лицемерие последнего сценария?
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterWest = Надеюсь, вам понравится пребывание в Западном Кратере, особенно если у вас нет необходимого топлива, чтобы превратить это путешествие в один конец в путешествие в обе стороны. В любом случае, что сделало Западный кратер настолько привлекательным, что его стоит посетить? В конце концов, подобные большие кратеры — это прославленные оспины на поверхности вакуумных миров, где такие ударные структуры регулярно засоряют поверхность. Опять же, Dipuc, по-видимому, является исключением: за исключением Западного, Восточного, Южного и Комплекса двойных кратеров, ударные кратеры здесь встречаются редко. Возможно, внутренняя активность и активный вулканизм связаны с несоответствием поверхности Dipuc по сравнению с другими подобными маленькими вакуумными мирами.
