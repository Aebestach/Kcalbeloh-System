		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Mountains = «Это не волны, это горы», — говорит Gene Керман охваченному паникой ветерану Rouqea. Он утверждает, что горы «неподвижны, статичны и кремового цвета», а не «подвижны, динамичны и имеют ультрамариновый оттенок». Кроме того, масс-спектрометрия и гравиметрическое сканирование выявили высокие концентрации более тяжелых силикатов, сульфатов, карбонатов и оксидов, заключенных в нескольких горных пластах, материалов и подземных структур, очевидно не встречающихся в волнах километровой высоты, состоящих полностью из нечистой жидкой смеси мириад минералов и органических веществ в растворенном двухатомном кислородсодержащем монооксиде дигидрогена. «Теперь приступайте к пересечению остальной части поверхности Dipuc, заминируйте почву — желательно не киркой, учитывая, что любой горный выброс может оказаться опасным для раскопок Кербала или оборудования — или начните создание колонии здесь, чтобы израсходованные тонны дельта-v не оказались напрасными!»\n\n-Гин
