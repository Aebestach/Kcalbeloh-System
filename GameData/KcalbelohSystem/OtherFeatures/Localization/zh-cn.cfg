		#LOC_KS_SciDef_crewReport_Noyreg_SrfLanded = 当我们着陆在Noyreg崎岖的表面上时，它神秘的吸引力吸引着我们的感官。浓密大气中迷人的绿色雾霭掩盖着一个充满危险的世界，腐蚀性的物质潜伏其中。每一步，我们都拥抱着危险而美丽的景色，记录着这颗红色岩质的卫星上的秘密，同时穿越这危险的地貌，永远在它的红色岩石画布上留下我们的足迹。
		#LOC_KS_SciDef_crewReport_Noyreg_FlyingLow = 当我们达到Noyreg的较低大气层时，我们被它那不祥的吸引力所笼罩。崎岖的红色表面隐藏在一片旋转的云层之下，透着迷人的绿色。空气中弥漫着腐蚀性和有毒的元素，提醒我们这个神秘的卫星的危险本质。
		#LOC_KS_SciDef_crewReport_Noyreg_FlyingHigh = 当我们进入Noyreg大气层的上层时，一种忐忑不安的感觉笼罩着我们。崎岖的地形被一层厚厚的云层所掩盖，弥漫着怪异的绿色光芒。空气中浓郁的腐蚀性和有毒元素提醒着我们在这个卫星上任务有多危险。
		#LOC_KS_SciDef_crewReport_Noyreg_InSpaceLow = 当我们从太空船的内中观察Noyreg时，它崎岖的红色表面和神秘的云层大气吸引着我们的感官。弥漫在空气中的神秘绿光暗示着如果我们冒险接近的话，等待着我们的会是隐藏的危险。
		#LOC_KS_SciDef_crewReport_Noyreg_InSpaceHigh = 当我们凝视着遥远的Noyreg时，它的岩石表面被浓密云层所掩盖，我们的期待越来越大。大气层中那神秘的绿色光辉唤起了我们的好奇和兴趣。

