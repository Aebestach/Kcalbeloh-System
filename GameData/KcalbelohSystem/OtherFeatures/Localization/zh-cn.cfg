		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLandedLowlands = 检测到高水平氢，但信号穿过大量岩石后变弱。这可能表明深处存在液态海洋！

		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedMidlandsHighlands = Elad荒凉的地表化学成分主要是硅酸盐、氧和铝。与Kerbin一样，地表大部分由花岗岩组成。
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedLowlands = 此处地面含有大量盐分，强烈暗示曾经是液态水海洋或海的海底。
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCanyon = 这条峡谷中密布的地表极其咸，强烈支持它曾是深海沟的假设。
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCliff = 这座巨大悬崖似乎含有几种石英。
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedValleys = Elad的"峡谷"有密布咸地，暗示许多、如果不是全部曾是深海沟。Elad可能曾经像Laythe一样是海洋世界。
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCratersCraterLarge = 高浓度的外来金属和Elad上通常罕见的碳化合物，为揭示形成该撞击坑的撞击体成分提供了线索。
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCraterGiant = 这个巨大撞击坑富含重金属和Elad地表通常不常见的其他化合物，证据表明撞击体非常致密、可能非常重。

