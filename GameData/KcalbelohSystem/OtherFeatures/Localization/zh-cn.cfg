		#LOC_KS_SciDef_evaReport_Efil_SrfSplashed = 温柔的波浪传递着野性且和谐的波动，仿佛自然的精华在其中舞动。水下世界展现出生命的图景，闪光的珊瑚群优雅地摇曳，色彩鲜艳的奇特生物在洋流中滑行。
		#LOC_KS_SciDef_evaReport_Efil_FlyingLow = 世界在我脚下如梦幻般展开。翠绿的浓密树冠伸展到眼前的尽头，与飘渺的薄雾交织在一起，低语着古老的秘密。温柔的微风拂过我的脸庞，带来外星花朵的甜美香气，而生命的旋律则以和谐的交响乐填满周围的空气。
