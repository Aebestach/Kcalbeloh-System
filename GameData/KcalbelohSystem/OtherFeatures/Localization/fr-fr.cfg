		// ******************************** Trou de ver ********************************
		#LOC_KS_WH_description = Un trou de ver est une distorsion spatio-temporelle particulière qui relie le système Kerbol et le système Kcalbeloh. Pour traverser le trou de ver, il faut abaisser le périapside du vaisseau spatial en dessous de 30 km, tout en évitant de s'approcher trop du centre du trou de ver.
