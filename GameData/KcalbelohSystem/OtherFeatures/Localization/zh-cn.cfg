		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceHigh2 = 好像有人不小心从垃圾槽里掉下来一个土豆口粮，你可以看到它离飞船还有一段距离漂浮着，哦。
		#LOC_KS_SciDef_temperatureScan_Meiuqer_InSpaceHigh = 温度计由于......呃，真空的原因，很难估计下方物体的温度。
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceHigh1 = 你仍然可以使用太空行走背包从这里降落！不过可能需要几个小时，找个舒适点的位置吧。
