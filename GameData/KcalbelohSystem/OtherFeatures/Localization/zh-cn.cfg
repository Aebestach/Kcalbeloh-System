		// ******************************** Research Bodies ********************************
		#autoLOC_RBodies_discovery_Kcalbeloh = 我们在太空中发现了一个连光都会消失的地方. 这是一项重大发现, 连Jeb的笑话都逃不出去! 希望它别对火箭产生兴趣!
		#autoLOC_RBodies_discovery_Sunorc = 透过望远镜我们发现了一个小小的光点, 我们以为是反射？不, 不, 那是一颗恒星!
