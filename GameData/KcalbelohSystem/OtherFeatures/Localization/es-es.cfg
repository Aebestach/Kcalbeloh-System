		// ******************************** Cuerpos de investigación ********************************
		#autoLOC_RBodies_discovery_Kcalbeloh = ¡Encontramos un punto en el espacio donde incluso la luz parece desaparecer! Este es un descubrimiento del que ni siquiera los chistes de Jeb pueden escapar. ¡Esperemos que no le tome gusto a los cohetes!
		#autoLOC_RBodies_discovery_Sunorc = Apareció un pequeño punto de luz a través de nuestro telescopio, ¿un reflejo pensamos? ¡No, no, es una estrella!
		#autoLOC_RBodies_discovery_AralcA = ¡Esta estrella era tan brillante que casi deja ciego a Jeb! ¡No podemos creer que no la hayamos visto hasta ahora!
		#autoLOC_RBodies_discovery_AralcB = Esta estrella es insignificante en comparación con Kerbol... Pero parece moverse en un baile con otra.
		#autoLOC_RBodies_discovery_Maelg = Bob casi descartó esta estrella como una mota en la lente hasta que miramos más de cerca. Parece más un gran gigante gaseoso, ¡pero está caliente... muy caliente!
		#autoLOC_RBodies_discovery_WH3141A = Hemos descubierto lo que parece ser... ¿una anomalía? La luz no se comporta bien alrededor de ella, ¡necesitamos investigar!
		#autoLOC_RBodies_discovery_WH3141B = Esto es extraño, es algún tipo de anomalía... No podemos descifrar qué es este objeto, ¿quizás hace falta una misión? Aunque está demasiado lejos, no pudimos empacar suficientes snacks para el viaje.
		#autoLOC_RBodies_discovery_Onrefni = Este planeta parece un rompecabezas, con el brillo incandescente de la lava entre las piezas.
		#autoLOC_RBodies_discovery_Rouqea = A primera vista nuestros mejores científicos pensaron que alguien derramó una gota de agua en la imagen... ¡Resulta que era un mundo acuático!
		#autoLOC_RBodies_discovery_Iomena = Este mundo craterizado parece tener atmósfera, muy fina como nuestra vecina Duna.
		#autoLOC_RBodies_discovery_Uleg = ¿¡Helado!? No... Parece que es solo hielo, bueno, fue emocionante mientras duró.
		#autoLOC_RBodies_discovery_Mehtna = Extraño, este parece más caliente por un lado que por el otro. Quizás podríamos broncearnos bien allí.
		#autoLOC_RBodies_discovery_Meiuqer = Vaya... Esta cosa es pequeña, es una maravilla que hayamos visto algo desde tan lejos.
		#autoLOC_RBodies_discovery_Sedah = ¿¡Algún tipo de helado nuevo!? Es bastante grande... Oh, da igual, es como Jool pero rosa. Raro.
		#autoLOC_RBodies_discovery_Suluco = Al principio pensamos que esta roca era estéril, pero después de mirar más tiempo notamos que también estaba congelada. Bob dijo que quiere vacacionar allí, creemos que está loco.
		#autoLOC_RBodies_discovery_Tot =  Esta cosa es pequeña... ¡Como un asteroide! ¿Me pregunto si podemos remolcarla hasta Kerbin para darle compañía a Minmus?
		#autoLOC_RBodies_discovery_Sera = ¡Este es como Duna! Muy rojo, aunque más grande. A Jeb le gusta porque le recuerda a un coche de carreras, ¡incluso tiene una raya!
		#autoLOC_RBodies_discovery_Dipuc = ¿¡El Mun!? ¿Cómo llegó allí? Oh espera... No es el Mun, falsa alarma.
		#autoLOC_RBodies_discovery_Simetra = ¡Guau, esa es una roca grande! Oh espera no, solo está coloreada como una roca... Parece muy gaseosa, ¿cómo olerá?
		#autoLOC_RBodies_discovery_Noira = Esta luna está orbitando... ¿Al revés? Raro. ¿Me pregunto si tiene algo que ver con el gran abollón que tiene?
		#autoLOC_RBodies_discovery_Simeht = ¿¡Helado!? Da igual, es demasiado grande para ser helado, muy reminiscente en color a Minmus pero mucho más grande.
		#autoLOC_RBodies_discovery_Noi =  Esta cosa apenas puede considerarse una luna, más bien un asteroide... ¿Me pregunto si nos quedaríamos pegados a la superficie o simplemente flotaríamos?
		#autoLOC_RBodies_discovery_Norihc = Solo se podría describir esta gran roca como... vaporosa... y fría.
		#autoLOC_RBodies_discovery_Noyreg = ¿¡SNACKS!? ¡¡¡¡¡ENCONTRAMOS EL DORADO!!!!! Oh espera... ¿Dices que es tóxico? ¿Entonces no hay snacks?
		#autoLOC_RBodies_discovery_Anneheg = ¡Guau, esa es una roca caliente! ¡Incluso brilla!
		#autoLOC_RBodies_discovery_Arorua = Este planeta... parece brillar y resplandecer con patrones asombrosos. Necesitamos más fotos.
		#autoLOC_RBodies_discovery_Ahtpan = Hmm, se ve amarillo como Kerbol. Aunque no parece tan cálido, Bob dice que deberíamos intentar encenderlo y ver qué pasa.
		#autoLOC_RBodies_discovery_Anehta = ¡Impresionante! ¡Este tiene enormes bandas tanto alrededor como dentro! ¿Cómo se verá desde el suelo?
		#autoLOC_RBodies_discovery_Enots = Este es extraño... Es pequeño como un asteroide, pero su forma es como una especie de obra de arte excéntrica.
		#autoLOC_RBodies_discovery_Efil = ¡Casi parece Kerbin! ¡Este definitivamente sería el lugar ideal! Si pudiéramos llegar allí, claro.
		#autoLOC_RBodies_discovery_Eulb = ¡Este es grande como el Mun... Pero es azul como Minmus! ¡El helado nos espera!
		#autoLOC_RBodies_discovery_Elad = ¡Guau, este es como el Mun pero casi tan grande como Kerbin! ¡A Jeb siempre le gustó un buen desafío!

		// ******************************** Science Definitions ********************************
		// Kcalbeloh
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceLow1 = Acercarse a Kcalbeloh en órbita baja se siente como ser arrastrado a un pozo sin fondo, con la intensa atracción gravitatoria dificultando mantener la orientación y el control de la nave espacial.
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceLow2 = Módulo de aterrizaje 1, prepárate para desacoplarte, a mi señal.
		#LOC_KS_SciDef_crewReport_Kcalbeloh_InSpaceHigh = Las intensas fuerzas gravitatorias hicieron que nuestros instrumentos se volvieran locos, y tuvimos que retirarnos rápidamente a una distancia más segura.

		#LOC_KS_SciDef_temperatureScan_Kcalbeloh_InSpaceLow = Las lecturas de temperatura en las inmediaciones de Kcalbeloh son extremadamente altas, lo que indica una intensa radiación procedente de su disco de acreción.

		#LOC_KS_SciDef_evaReport_Kcalbeloh_SrfLanded = Dios mío, está lleno de Krakens.
		#LOC_KS_SciDef_evaReport_Kcalbeloh_InSpaceLow = El miembro de la tripulación informó sentirse ingrávido y asombrado mientras realizaba el EVA cerca de Kcalbeloh. La intensa atracción gravitatoria era palpable incluso desde una distancia segura.
		#LOC_KS_SciDef_evaReport_Kcalbeloh_InSpaceHigh = El informe de la tripulación durante un EVA cerca de Kcalbeloh revela una vista impresionante del disco de acreción amarillo del agujero negro supermasivo.

		#LOC_KS_SciDef_mysteryGoo_Kcalbeloh_InSpaceLow = Un experimento de Mystery Goo no es posible aquí, ya que las intensas fuerzas gravitatorias probablemente alterarían cualquier intento de realizar un experimento en tan estrecha proximidad.

		#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceLow = Los resultados del escaneo gravitatorio indican una distorsión gravitatoria significativa, que podría ayudar en futuras maniobras de asistencia gravitatoria alrededor de este cuerpo celeste masivo.
		//#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceHigh = El escaneo gravitacional de Kcalbeloh desde una gran distancia indica la presencia de grandes concentraciones de masa en las proximidades del agujero negro.
		#LOC_KS_SciDef_gravityScan_Kcalbeloh_InSpaceHigh = Un escaneo gravitatorio de Kcalbeloh desde lejos revela pequeñas irregularidades en los datos. Lo más probable es que sean planetas, o «blanets», orbitando el agujero negro. ¡Algunos tendrían que estar bastante cerca!

		#LOC_KS_SciDef_magnetometer_Kcalbeloh_InSpaceLow = La intensa radiación de las partículas del disco de acreción fundió el instrumento antes de que pudiéramos tomar una lectura.

		// Onrefni
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded1 = Es verdaderamente desconcertante pensar que la luz que ilumina tu vista de este… desafortunado planetita no proviene de una estrella, sino de material y gas acelerados tan rápido por el enorme pozo gravitatorio del imponente Kcalbeloh que brilla al rojo vivo.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded2 = El propio planeta parece gemir bajo la presión de estar tan cerca del monstruoso Kcalbeloh, desplazándose y agrietándose constantemente bajo tu nave como una masa de tarta barata.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfLanded3 = Este lugar tiene una estructura tan sólida como una Nave Espacial Sin Título (antes de añadir más refuerzos).
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfLanded1 = Los parámetros de la misión no contemplaban que la unidad de medición de temperatura estuviera expuesta a condiciones tan extremas. Sin embargo, cumple su función de todos modos y te informa amablemente de que hace… *un tiempo templado*.
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfLanded2 = NO debería hacer tanto calor sin una estrella cerca. La masa hace cosas aterradoras, normalmente a costa de Onrefni.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded1 = Comparas la experiencia de caminar sobre Onrefni con caminar sobre copos grandes de cereales de desayuno, mientras «oyes» el crujido de la superficie reverberar por tu pierna con cada salto.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded2 = Tus pies están… sustancialmente más calientes que tu cabeza, como te informa amablemente el sistema operativo de tu traje EVA, actualmente en pánico.
		#LOC_KS_SciDef_evaReport_Onrefni_SrfLanded3 = Te resulta difícil moverte por la superficie irregular y estirada, ya que la capa superior de roca se desprende con cada salto pesado provocado por tus torpes intentos de moverte con un 32% de la gravedad de Kerbin.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfLanded1 = El Goo parece estremecerse en el fondo de su cápsula al darse cuenta de que está en un planeta tan cerca de Kcalbeloh.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfLanded2 = El Goo parece separarse en diferentes capas, como si imitara la geología interior del planeta enano destrozado sobre el que descansa.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded1 = Las muestras que recoges con cuidado parecen mucho más aplanadas y deformadas en comparación con las muestras extraplanetarias «convencionales» vistas en misiones anteriores.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded2 = Las rocas que recoges están calientes incluso a través de los guantes del traje, y sientes una punzada de compasión por estos objetos, admitámoslo, inanimados pero torturados.
		#LOC_KS_SciDef_surfaceSample_Onrefni_SrfLanded3 = Notas un fino polvillo en las muestras que recoges que parece cubrir todo en Onrefni, y asumes que dicho polvo es creado y depositado por el cercano disco de acreción de Kcalbeloh y la lenta pero activa fragmentación del propio planeta enano simultáneamente.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfLanded1 = Las muestras metálicas se funden rápidamente bajo la luz alienígena de Kcalbeloh, y las muestras volátiles como el hielo comienzan a sublimarse en poco tiempo al exponerse al duro vacío alrededor de Onrefni.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfLanded2 = El polvo omnipresente y cargado eléctricamente que cubre la superficie de Onrefni comienza rápidamente a recubrir el interior de la bahía de materiales. Para tu fastidio, el polvo volátil provoca un cortocircuito en la electrónica de la bahía, desmantelando tu caro nuevo experimento científico momentos después de recoger datos útiles.
		#LOC_KS_SciDef_seismicScan_Onrefni_SrfLanded = El instrumento sísmico está completamente inundado de datos procedentes tanto de las fuerzas de marea extremas como de los impactos casi constantes del material del cercano disco de acreción, lo que caracteriza en gran medida la naturaleza caótica de Onrefni.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfLanded1 = Las lecturas de gravedad fluctúan ligeramente según dónde en Onrefni se tomen, probablemente debido al terreno inestable y la geología interior destrozada del pequeño mundo.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfLanded2 = La gravedad en Onrefni, aunque ciertamente inestable, suele estabilizarse en un nivel comparable, aunque ligeramente superior a la gravedad superficial de Duna. Este hecho respalda la teoría insinuada por lecturas científicas previas de que el pequeño mundo posee un núcleo de hierro pesado, ya que un cuerpo tan pequeño normalmente no posee una gravedad tan alta.

		#LOC_KS_SciDef_crewReport_Onrefni_SrfSplashed1 = Esto no es lo que queríamos decir con exploración exhaustiva. La idea era que volvieras a casa. Vale. Ya es demasiado tarde.
		#LOC_KS_SciDef_crewReport_Onrefni_SrfSplashed2 = Recuerdas que no te pagan lo suficiente mientras ves tu nave convertirse en fondue metálico.
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfSplashed1 = Esto es un crimen contra los termómetros, y lo sabes. Por desgracia, es demasiado tarde para rectificar tus acciones, ya que el termómetro se ha fundido y ya no está entre nosotros.
		#LOC_KS_SciDef_temperatureScan_Onrefni_SrfSplashed2 = ¿Para qué molestarse? Ya sabías la respuesta. D E M A S I A D O   C A L O R .
		#LOC_KS_SciDef_evaReport_Onrefni_SrfSplashed1 = Sabes, era inevitable que alguien más denso que Kcalbeloh como tú colara en el riguroso proceso de selección de kerbonautas del KSP solo para pisar lava en un planeta enano alienígena. ¡Disfruta tus últimos segundos de existencia, oh… valiente!
		#LOC_KS_SciDef_evaReport_Onrefni_SrfSplashed2 = Gracias por tu valiosa contribución a la ciencia y por tu sacrificio solo para descubrir que, mira tú: ¡LA LAVA QUEMA!
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfSplashed1 = El Goo merecía algo mejor, pero al menos pereció cumpliendo su deber con la kerbalkind.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_SrfSplashed2 = El Goo sobrevive al calor increíble más de lo que cabría esperar, pero incluso él sucumbe rápidamente a la furia de Onrefni.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfSplashed1 = Se fundió. Vaya sorpresa.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_SrfSplashed2 = El KSC te aconseja no ser tan imprudente con el hardware caro en el futuro solo para verificar si la lava estaba, de hecho, caliente.
		#LOC_KS_SciDef_gravityScan_Onrefni_SrfSplashed = El sensor gravitatorio escupe series de datos sin sentido mientras comienza a fundirse bajo el calor castigador de los infiernos de Onrefni.

		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceLow1 = Tienes una ligera vacilación ante la idea de aterrizar en el mundo destrozado debajo de ti.
		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceLow2 = REALMENTE no quieres aterrizar ahí abajo. La superficie parece tan amigable como un Oso Kolar rabioso.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceLow1 = El termómetro aún no sospecha la ira que yace abajo.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceLow2 = Ni siquiera has llegado a la superficie y tus unidades de medición de temperatura ya están protestando, pancartas y todo.
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceLow1 = No disfrutas flotando justo encima de ríos literales de lava. La sensación es similar a estar junto a un calentador de agua, incluso a través del traje.
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceLow2 = Entre el calor del planeta desgarrado y el calor de Kcalbeloh al otro lado, te sientes como una comida microondas durante el EVA, y tus sistemas de refrigeración exigen rápidamente un aumento.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceLow1 = Si no supieras más, dirías que el Goo inanimado parecía encogerse activamente del pequeño mundo roto de abajo.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceLow2 = El Goo rebota erráticamente en su contenedor, como si intentara encontrar un medio de escape.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceLow1 = La suite electrónica en la bahía de materiales reacciona de manera peculiar al entorno extremo único alrededor de este pequeño mundo.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceLow2 = Observas el equipo de pruebas magnéticas iluminarse como un árbol de Navidad dentro de la bahía de materiales siempre que el agujero negro está a la vista de los instrumentos.
		#LOC_KS_SciDef_gravityScan_Onrefni_InSpaceLow = El sensor lucha por cuantificar el juego de tira y afloja planetario que se libra a su alrededor entre el agujero negro y Onrefni.
		#LOC_KS_SciDef_magnetometer_Onrefni_InSpaceLow = El boom hace rápidamente creíble la teoría de que Onrefni posee un núcleo metálico pesado y proporcionalmente inmenso, al captar la firma magnética bastante fuerte (para su tamaño) del planeta enano.

		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceHigh1 = No sabías que una roca espacial podría parecer malvada… hasta hoy.
		#LOC_KS_SciDef_crewReport_Onrefni_InSpaceHigh2 = ¿Cómo llegó esta pelotita valiente a formarse tan cerca del Gran Tipo de ahí?
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceHigh1 = Las enormes lecturas de calor del agujero negro aún ahogan los datos de temperatura estimados de la roca agrietada debajo de ti a esta distancia.
		#LOC_KS_SciDef_temperatureScan_Onrefni_InSpaceHigh2 = Necesitarás acercarte más a Onrefni para alejarte de la vasta firma de calor del Agujero Negro Entrometido y obtener datos significativos más allá de «probablemente C A L O R (y brillante)».
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceHigh1 = Haces tu mejor impresión de «motita insignificante». ¡Oye, buen trabajo!
		#LOC_KS_SciDef_evaReport_Onrefni_InSpaceHigh2 = Intentas decidir si Onrefni es realmente pequeño, o si Kcalbeloh es simplemente muy, muy grande. ¿Quizás ambos? Se requiere más estudio.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceHigh1 = El Goo parece estar inerte, como paralizado por el tamaño del agujero negro cercano en comparación con el comparativamente minúsculo Onrefni.
		#LOC_KS_SciDef_mysteryGoo_Onrefni_InSpaceHigh2 = El Goo se estira hacia lados opuestos de su contenedor, como si emulara las fuerzas de marea que han destrozado el pequeño mundo de abajo.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceHigh1 = Antes de embarcarte en esta misión, no pensabas que las muestras de material pudieran mostrar miedo, siendo objetos inanimados y tal. Te equivocaste. Esas muestras parecen absolutamente aterrorizadas ante el horror cósmico que es Kcalbeloh, mientras también se precipitan hacia la roca problemática de abajo a velocidad inimaginable.
		#LOC_KS_SciDef_mobileMaterialsLab_Onrefni_InSpaceHigh2 = Algunas de las muestras magnéticamente sensibles parecen gravitar ligeramente entre el agujero negro y el planeta enano muy abajo, lo que indica que Onrefni posee un gran núcleo de hierro, no muy diferente de Moho.
		#LOC_KS_SciDef_gravityScan_Onrefni_InSpaceHigh = A esta distancia, cualquier lectura gravitatoria sustancial del pequeño planeta que de otro modo sería obvia queda ahogada por la firma asfixiante de Kcalbeloh.
		#LOC_KS_SciDef_magnetometer_Onrefni_InSpaceHigh = Incluso a esta distancia, una firma magnética sorprendentemente amplia irradia desde Onrefni. La forma del campo magnético está perturbada por el campo abrumador de Kcalbeloh, pero HAY ALGO ahí. Necesitarás acercarte para verificar estas lecturas.

		// Rouqea
		//Crew Reports
		//Landed
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Lowlands = Escuchar crujidos ocasionales del casco de tu nave es desconcertante, pero a esta profundidad en los océanos de Rouqea, no hay mucho que ver por la ventana.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Midlands = Las luces de tu cabina iluminan lo suficiente para ver el fondo arenoso del océano donde tu nave se ha asentado tras hundirse tanto.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Highlands = Contra la aplastante oscuridad de las profundidades oceánicas, puedes ver afloramientos de roca y —si tus ojos no te engañan— montañas submarinas. Quizás estas sean lo que impulsa las monstruosas olas en la superficie.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfLanded_Cracks = Tu nave, ahora asentada en las profundidades más bajas del océano, gime bajo la presión de todo el océano. Esto es más profundo de lo que imaginabas...
		//Splashed
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Lowlands = Al asomarte por la cabina, ves que el agua salada de Rouqea cubre la ventanilla, ocultando parcialmente el horizonte. Qué curioso, el horizonte no se ve tan plano como debería en un planeta oceánico...
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Midlands = Desde tu cabina, las aguas se ven calmadas a tu alrededor. Cierras los ojos y te relajas, escuchando el sonido de las olas golpeando el casco de tu nave.
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Highlands = El módulo de tripulación ofrece una vista fantástica sobre los océanos tranquilos de Rouqea; al ponerte de pie puedes ver hasta las montañas en el horizonte. Espera...
		#LOC_KS_SciDef_crewReport_Rouqea_SrfSplashed_Cracks = Flotando sobre las partes más profundas del océano planetario de Rouqea, notas lo agitadas que se vuelven las olas y lo altas que crecen a lo lejos. ¡Algunas casi alcanzan las nubes!
		//Low Flying
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Lowlands = Desde tu módulo de tripulación puedes ver las nubes alrededor y encima de ti, y el mar tranquilo debajo. Aunque es difícil no inquietarse un poco por lo cerca que estás de Kcalbeloh.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Midlands = Tu cabina ofrece una vista maravillosa del océano, que se extiende a tu alrededor. A lo lejos, atisbas una ola de cientos de metros de altura que se desliza hacia el horizonte.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Highlands = Al girar la nave, la ventanilla capta un espectáculo maravilloso: las nubes apartándose para dar paso a una ola de magnitud titánica. Con estas olas, casi piensas que podrías estar volando demasiado bajo...
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingLow_Cracks = Alrededor de las zonas de Rouqea conocidas como las más profundas, ves columnas de burbujas subir desde las profundidades del océano planetario, solo para ser arrastradas por olas del tamaño de montañas.
		//High Flying
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Lowlands = Es difícil no apreciar lo que ves ahora: el disco de acreción de Kcalbeloh iluminando los mares y cielos azules de Rouqea.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Midlands = Tu nave vuela con gracia por el aire sobre las nubes, permitiéndote captar cada destello de las olas muy abajo.
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Highlands = Incluso tan alto, es difícil no notar el terreno montañoso debajo. Es difícil ignorar la nieve que recubre las montañas... ¿esa montaña acaba de moverse?
		#LOC_KS_SciDef_crewReport_Rouqea_FlyingHigh_Cracks = Rouqea muy abajo, es inquietante saber que el agujero negro que se cierne arriba está tan cerca.
		//In Low Space
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Lowlands = Observas cómo las ondas rodean el masivo mundo acuático debajo de ti. Tu briefing dice que son olas del tamaño de montañas, pero eso no puede ser cierto, ¿verdad?
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Midlands = Es difícil comprender cuánta agua hay en un planeta oceánico, y sin embargo debajo de ti está Rouqea, imponente en tu ventanilla como una gema de zafiro puro.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Highlands = Rouqea llena tu ventana tanto como Kcalbeloh: un brindis tanto por la escala del Agujero Negro como por tu proximidad al gigantesco mundo oceánico.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceLow_Cracks = En las porciones más calmadas del océano, ¡casi puedes ver un reflejo de Kcalbeloh! Un reflejo distorsionado y roto, pero un reflejo al fin y al cabo.
		//In High Space
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Lowlands = Parece que alguien inundó Kerbin. Espera, ¿eso no es Kerbin?
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Midlands = Parece que el tiempo podría fluir más lento alrededor del agujero negro. ¡O no fluir en absoluto! Al inspeccionar el reloj de la pared, queda claro que Jeb pudo haber quitado las pilas en algún momento.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Highlands = De repente tienes la necesidad de construir, rotar e intentar acoplar con una estación espacial.
		#LOC_KS_SciDef_crewReport_Rouqea_InSpaceHigh_Cracks = Es tranquilo tan alto sobre la atmósfera. Sientes que una música de órgano pulsante y fuerte cambiaría esa atmósfera pacífica.
		//Temperature Scans
		//Landed
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Lowlands = ¡La temperatura es asombrosa! Quizás las fuerzas de marea del agujero negro están causando algún efecto volcánico dentro del núcleo del planeta.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Midlands = A pesar de estar rodeado de agua, ves cómo la pantalla muestra temperaturas cada vez más altas. ¡Algo está calentando los sensores! I+D se lo pasará en grande con esto.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Highlands = Las temperaturas alcanzan picos salvajes en momentos impredecibles. ¿Quizás hay una salida volcánica submarina cerca?
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfLanded_Cracks = La temperatura cae repentinamente de un valor muy alto a uno muy bajo. ¡Casi helada! ¿Qué podría causar tal variación?
		//Splashed
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Lowlands = ¡La temperatura del agua es perfecta para nadar! ¿Las olas? No tanto.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Midlands = El agua está calmada y moderadamente cálida, como un día en la playa en Kerbin. Aunque nunca supiste que Kerbin albergara olas del tamaño de montañas.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Highlands = Te preguntas si la temperatura del agua de las montañas a lo lejos es la misma, pero parecen alejarse cuando te acercas. No te preocupes, hay una acercándose ahora.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Cracks = El agua está heladamente fría bajo tu nave, como si algo estuviera absorbiendo el calor de este océano planetario por lo demás tropical.
		//Low Flying
