		#LOC_KS_SciDef_evaReport_Sera_FlyingHigh = Скалистая поверхность планеты уходит вдаль, заменяясь кружащимся водоворотом облаков и газов. Атмосфера здесь тонкая и дымчатая, красно-желтого оттенка. Несмотря на красоту планеты с этой высоты, условия здесь невероятно суровые. Это опасная, но важная область для исследования для тех, кто хочет разгадать тайны этого бесплодного, каменистого мира.
