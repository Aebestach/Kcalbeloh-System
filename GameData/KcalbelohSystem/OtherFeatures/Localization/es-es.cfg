		#LOC_KS_SciDef_evaReport_Anehta_FlyingHigh = ¿Quién autorizó esto?
		#LOC_KS_SciDef_evaReport_Anehta_InSpaceLow = Cierras los ojos y te das cuenta de que aún puedes ver las estrellas. Quizás deberías volver dentro.
		#LOC_KS_SciDef_evaReport_Anehta_InSpaceHigh = «Sabes, cantaría una canción, pero "el planeta Anehta es azul, y no hay nada que pueda hacer" no fluye muy bien rítmicamente».

		#LOC_KS_SciDef_mysteryGoo_Anehta_FlyingLow = ¿El Goo se ha vuelto azul, o es solo la iluminación?
		#LOC_KS_SciDef_mysteryGoo_Anehta_FlyingHigh = El Mystery Goo está preocupado de no volver a casa.
		#LOC_KS_SciDef_mysteryGoo_Anehta_InSpaceLow = El Goo se ha formado en dos masas separadas: una gran esfera central y un conjunto de anillos que la rodean.
		#LOC_KS_SciDef_mysteryGoo_Anehta_InSpaceHigh = El Goo parece estar interesado en Efil.

		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_FlyingLow = El laboratorio de materiales ya ha sido aplastado por la presión y no puede abrirse correctamente.
		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_FlyingHigh = Los vientos potentes, la presión creciente y las temperaturas que cambian rápidamente hacen un desastre de la bahía de muestras.
		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_InSpace = El entorno de alta radiación hizo que algunas muestras brillaran. Parece que sería divertido pintar el cohete con... Espera. ¿Acabas de tener un déjà vu?

		#LOC_KS_SciDef_temperatureScan_Anehta_FlyingLow = Realmente no existe algo como un gigante gaseoso frío, ¿verdad?
		#LOC_KS_SciDef_temperatureScan_Anehta_FlyingHigh = La atmósfera superior empieza fría, luego se pone MUY fría. Probablemente va a hacer mucho más calor muy pronto a menos que dejes de caer.
		#LOC_KS_SciDef_temperatureScan_Anehta_InSpace = Brillante. ¿Qué plan genial se te ocurrirá a continuación?

		#LOC_KS_SciDef_barometerScan_Anehta_FlyingLow = El barómetro ha sobrevivido milagrosamente a la presión extrema. Sin embargo, ahora cree que está sumergido en líquido y recomienda comprar un PresMat Underwater Pressure Sensor (tm).
		#LOC_KS_SciDef_barometerScan_Anehta_FlyingHigh = La presión aumenta rápidamente a medida que disminuye la altitud. Esto parecería sugerir que Anehta es una especie de mundo gigantesco basado en gas, un «Coloso Atmosférico», por así decirlo.
		#LOC_KS_SciDef_barometerScan_Anehta_InSpace = Quizás algún día pronto esto funcionará.

		#LOC_KS_SciDef_gravityScan_Anehta_InSpaceLow = Eso son muchos graviolis, pero el agujero negro cercano (relativamente hablando) le está dando a Anehta una competencia dura. Te preguntas si el planeta se siente inseguro por esto.
		#LOC_KS_SciDef_gravityScan_Anehta_InSpaceHigh = Las numerosas lunas de Anehta generan sus propias lecturas de gravedad, aunque ninguna iguala la pura fuerza del poderoso tirón de Anehta.

		#LOC_KS_SciDef_atmosphereAnalysis_Anehta_FlyingLow = El vapor de agua se ha vuelto menos común en las capas de nubes inferiores a medida que la atmósfera se espesa.
		#LOC_KS_SciDef_atmosphereAnalysis_Anehta_FlyingHigh = Además del hidrógeno y helio esperados, el vapor de agua es muy abundante aquí. Esto haría de Anehta un gigante gaseoso de Clase II según el sistema Sudarskerb.

		#LOC_KS_SciDef_magnetometer_Anehta_InSpaceLow = Las lecturas del magnetómetro desde la órbita baja de Anehta en el espacio revelaron patrones de campo magnético complejos y dinámicos. El campo magnético del planeta exhibió variaciones significativas en intensidad y dirección, con los cinturones y zonas más oscuros de la cobertura nubosa perpetua mostrando mayor actividad magnética.
		#LOC_KS_SciDef_magnetometer_Anehta_InSpaceHigh = A diferencia de la naturaleza turbulenta y fluctuante del campo magnético observado en la órbita baja, el campo magnético en la región de alta altitud parecía ser relativamente estable, con una intensidad y dirección consistentes. El sistema de anillos planetarios también exhibió fluctuaciones magnéticas mínimas en esta región, sugiriendo un entorno magnético más consistente y organizado.

		// Enots
		#LOC_KS_SciDef_crewReport_Enots_SrfLanded = El suelo aquí es muy rocoso. Es posible que esta roca esté hecha de un núcleo expuesto cubierto por capas de escombros de anillos.
		#LOC_KS_SciDef_crewReport_Enots_InSpaceLow = Los escombros de anillos no deberían ser un problema aquí. Ahora viene el problema de aterrizar en la superficie rocosa.
		#LOC_KS_SciDef_crewReport_Enots_InSpaceHigh = El objeto se ve muy pequeño comparado con Anehta. Deberíamos tener precaución e intentar evitar chocar con escombros de anillos.

		#LOC_KS_SciDef_temperatureScan_Enots_SrfLanded = Enots es bastante cálido en el lado diurno. Anehta puede ser un gigante gaseoso, pero recibe aproximadamente tanto sol como Kerbin.
		#LOC_KS_SciDef_temperatureScan_Enots_InSpace = ¿Te parece gracioso?

		#LOC_KS_SciDef_evaReport_Enots_SrfLanded = Miras hacia arriba y ves Anehta. Ocupa una enorme porción del cielo sobre ti y muestra lo diminuto que eres en este universo.
		#LOC_KS_SciDef_evaReport_Enots_InSpaceLow = Capitán, ¿estás seguro de que deberíamos estar aquí fuera?
		#LOC_KS_SciDef_evaReport_Enots_InSpaceHigh = Esta es una situación precaria y deberías tener cuidado.

		#LOC_KS_SciDef_mysteryGoo_Enots_SrfLanded = El Goo parece sentirse como en casa en la superficie de Enots.
		#LOC_KS_SciDef_mysteryGoo_Enots_InSpaceLow = El Goo parece estar inusualmente atraído por la superficie de Enots. Con suerte, esto no afectará nuestra órbita.
		#LOC_KS_SciDef_mysteryGoo_Enots_InSpaceHigh = El Goo muestra un comportamiento errático alrededor de Enots. Debemos investigar esto más a fondo.

		#LOC_KS_SciDef_surfaceSample_Enots_SrfLanded = La superficie es bastante polvorienta y rocosa. Sin embargo, al excavar más profundo, te encuentras con una pared de hierro sólido.

		#LOC_KS_SciDef_mobileMaterialsLab_Enots_SrfLanded = Siendo una pequeña piedra sin aire, Enots no tiene un efecto diferente en los materiales.
		#LOC_KS_SciDef_mobileMaterialsLab_Enots_InSpaceLow = ¿Qué crees TÚ que están haciendo los materiales? Probablemente sea más interesante que lo que realmente está pasando ahí dentro.
		#LOC_KS_SciDef_mobileMaterialsLab_Enots_InSpaceHigh = Los materiales parecen brillar en azul. Entonces te das cuenta de que es solo luz reflejada de Anehta.

		#LOC_KS_SciDef_barometerScan_Enots_SrfLanded = Según tus cálculos, esto fue muy probablemente un desperdicio de Fondos.
		#LOC_KS_SciDef_barometerScan_Enots_InSpace = En un sentido cósmico, sí.

		#LOC_KS_SciDef_gravityScan_Enots_SrfLanded = La gravedad superficial aquí es muy baja. Intenta no caerte, o más bien, saltarte.
		#LOC_KS_SciDef_gravityScan_Enots_InSpaceLow = El escáner de gravedad está ahora más enfocado en Enots. Sin embargo, las lecturas aún no explican que el Goo se vuelva loco.
		#LOC_KS_SciDef_gravityScan_Enots_InSpaceHigh = El sensor oscila entre Enots y Anehta. Aunque no es tan malo como en la expedición Tot.

		#LOC_KS_SciDef_seismicScan_Enots_SrfLanded = El escáner sísmico no detecta actividad aparte de pequeños impactos de micrometeoritos.


		// Efil
		#LOC_KS_SciDef_crewReport_Efil_SrfLanded = En cuanto aterrizamos en Efil, nos impresionó la belleza del paisaje. El aire era denso y húmedo, y los ricos tonos de la flora y fauna creaban un tapiz vibrante que se extendía hasta donde alcanzaba la vista. Las playas estaban cubiertas de arena blanca brillante y las aguas eran cristalinas. También observamos fascinantes criaturas bioluminiscentes que brillaban intensamente en la oscuridad.
		#LOC_KS_SciDef_crewReport_Efil_SrfSplashed = La nave amerizó en una laguna cristalina y la tripulación tuvo la oportunidad de explorar el mundo submarino. La vida marina era diversa y colorida, y la tripulación realizó varios experimentos para aprender más sobre el ecosistema del planeta.
		#LOC_KS_SciDef_crewReport_Efil_FlyingLow = Al descender más en la atmósfera inferior de Efil, quedamos cautivados por las vistas impresionantes que se desplegaron ante nuestros ojos. La atmósfera estaba llena de colores vibrantes y el aire bullía de vida. Admiramos las playas impresionantes con sus aguas brillantes y los densos bosques con su follaje verde exuberante.
		#LOC_KS_SciDef_crewReport_Efil_FlyingHigh = La atmósfera superior de Efil parece fina y clara. Al descender a la atmósfera superior de Efil, nos recibieron los impresionantes colores y la belleza natural del planeta. Los bosques exuberantes y los océanos cristalinos eran verdaderamente un espectáculo digno de contemplar.
		#LOC_KS_SciDef_crewReport_Efil_InSpaceLow = El informe de la tripulación desde la observación de Efil en órbita baja reveló una vista impresionante que se asemeja a una preciosa gema de zafiro en órbita alrededor de Anehta. La atmósfera de Efil exudaba un encanto cautivador con colores vibrantes y formaciones nubosas intrigantes. La superficie del planeta mostraba playas prístinas y densos bosques, invitando a una mayor exploración.
		#LOC_KS_SciDef_crewReport_Efil_InSpaceHigh = El informe de la tripulación desde la observación de Efil en órbita alta reveló vistas impresionantes de un planeta que se asemeja a una gema de zafiro en la distancia. La atmósfera de Efil parecía encantadora con colores vívidos, reminiscente de un entorno paradisíaco. La tripulación señaló la belleza impresionante y las características únicas de Efil, proporcionando valiosas perspectivas para una mayor exploración y estudio de este mundo notable.

		#LOC_KS_SciDef_temperatureScan_Efil_SrfLanded = La temperatura variaba mucho según la hora del día y la ubicación en Efil, con 25 a 35 grados Celsius durante el día y 5 grados Celsius por la noche. Durante el eclipse solar que ocurre cada día en esta luna, la luz era completamente bloqueada por Anehta, y la temperatura en la superficie de Efil puede desplomarse significativamente aproximadamente 15 a 20 grados Celsius.
		#LOC_KS_SciDef_temperatureScan_Efil_SrfSplashed = La superficie del planeta, cubierta por un vasto océano, exhibió temperaturas relativamente estables durante el día y la noche, entre 28 y 32 grados Celsius. El agua parecía actuar como regulador natural, manteniendo una temperatura consistente en toda la superficie del planeta.
		#LOC_KS_SciDef_temperatureScan_Efil_FlyingLow = Cuando la tripulación se aventuró en la atmósfera inferior de Efil, encontraron una capa donde la temperatura subió inesperadamente. Este aumento repentino de temperatura fue inesperado e intrigante, ya que desafiaba el patrón previamente observado, lo que podría atribuirse a dinámicas atmosféricas únicas o patrones climáticos locales.
		#LOC_KS_SciDef_temperatureScan_Efil_FlyingHigh = En la atmósfera superior, la tripulación observó una disminución gradual de la temperatura, consistente con la tendencia esperada de descenso de temperatura al aumentar la altitud. 

		#LOC_KS_SciDef_evaReport_Efil_SrfLanded = Al pisar la superficie de Efil, la cautivadora belleza de este planeta similar al zafiro se desplegó ante mí. La atmósfera me envolvió en su suave abrazo, ofreciendo un aliento refrescante con cada inhalación. Las impresionantes playas, adornadas con aguas turquesa brillantes, se extendían como la obra maestra de un pintor, mientras los bosques exuberantes llamaban con sus tonos vibrantes y susurros misteriosos.
		#LOC_KS_SciDef_evaReport_Efil_SrfSplashed = Las suaves olas llevaban los ecos de una armonía indómita, como si la propia esencia de la naturaleza bailara en ellas. El mundo submarino reveló un tapiz de vida, donde formaciones de coral iridiscentes se balanceaban con gracia y criaturas exóticas, adornadas con tonos vívidos, se deslizaban por las corrientes.
		#LOC_KS_SciDef_evaReport_Efil_FlyingLow = El mundo se desplegó bajo mí como un sueño encantador. El dosel de follaje denso en tonos esmeralda se extendía hasta donde alcanzaba la vista, entretejido con nieblas etéreas que susurraban historias de secretos antiguos. La suave brisa acariciaba mi rostro, llevando el dulce aroma de flores exóticas, mientras las melodías de criaturas invisibles llenaban el aire con su sinfonía armoniosa.
		#LOC_KS_SciDef_evaReport_Efil_FlyingHigh = La extensión azul se extendía ante mí, su vastedad aparentemente infinita. La luz solar binaria bailaba sobre las nubes tenues, proyectando tonos etéreos en el cielo. Desde este punto de vista, podía contemplar el verdadero esplendor de Efil, con sus bosques exuberantes y playas prístinas abrazando el paisaje inferior.
		#LOC_KS_SciDef_evaReport_Efil_InSpaceLow = La joya de zafiro, suspendida en la vastedad del cosmos, emanaba un resplandor etéreo que capturó mi imaginación. La ausencia de gravedad me permitió deslizarme sin esfuerzo por la extensión celestial, observando la intrincada danza de estrellas y galaxias distantes.
		#LOC_KS_SciDef_evaReport_Efil_InSpaceHigh = El planeta distante, con su atmósfera pintoresca, brillaba como un tapiz de colores fascinante. Flotando ingrávido, admiré el ballet cósmico de las estrellas, su luz radiante bailando sobre el fondo aterciopelado del universo.

		#LOC_KS_SciDef_mysteryGoo_Efil_SrfLanded = El Goo parece calmarse en su contenedor. Luego se da cuenta de que no está en Kerbin y parece tener una crisis existencial.
		#LOC_KS_SciDef_mysteryGoo_Efil_SrfSplashed = ¡El Goo escapa al agua! Luego regresa rápidamente a la seguridad de su contenedor porque esta no es agua que haya tocado antes.
		#LOC_KS_SciDef_mysteryGoo_Efil_FlyingLow = El Goo se mueve emocionado mientras la nave vuela por el aire.
		#LOC_KS_SciDef_mysteryGoo_Efil_FlyingHigh = El Goo parece pensar que está en la atmósfera de Kerbin. Si supiera......

		#LOC_KS_SciDef_surfaceSample_Efil_SrfLanded = Recogí cuidadosamente muestras del suelo, admirando su rica textura y colores vibrantes, cada grano un testimonio del intrincado tapiz de vida que prosperaba en este reino encantador.
		#LOC_KS_SciDef_surfaceSample_Efil_SrfSplashed = El reino sumergido del océano de Efil reveló un tapiz encantador de vida, mientras las aguas prístinas me abrazaban. Con meticuloso cuidado, obtuve muestras del próspero ecosistema marino, donde corales vibrantes y delicada flora marina hablaban de la rica biodiversidad del planeta. 

		#LOC_KS_SciDef_mobileMaterialsLab_Efil_SrfLanded = En el abrazo del paisaje idílico de Efil, mi equipo emprendió un intrincado estudio de la composición geológica de la luna. Instrumentos delicados analizaron meticulosamente la diversa variedad de rocas y minerales, desvelando los secretos de su formación y ofreciendo vislumbres del intrincado juego de fuerzas elementales que dieron forma a esta gema celestial. Nuestros hallazgos prometen profundizar nuestra comprensión de la geología única de Efil y contribuir a nuestra comprensión más amplia de la evolución planetaria.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_SrfSplashed = Inmersos en el abrazo azul de Efil, nuestro estudio de materiales tomó un giro inesperado al aventurarnos en las profundidades de su océano cristalino. Analizando las muestras sumergidas, descubrimos un notable juego de minerales exóticos, revelando los tesoros ocultos de la luna. La intrincada relación entre el entorno acuático y la composición geológica se desveló ante nuestros ojos, encendiendo nuestra curiosidad científica y ampliando nuestra comprensión de este mundo enigmático.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_FlyingLow = Al descender a las regiones inferiores de la cautivadora atmósfera de Efil, nuestro estudio de materiales reveló la intrincada composición de su terreno rocoso. Con análisis meticuloso e instrumentación precisa, examinamos los minerales y elementos únicos presentes, pintando un retrato vívido del tapiz geológico de la luna.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_FlyingHigh = Inmersos en las regiones superiores de la encantadora atmósfera de Efil, nuestro estudio de materiales se aventuró en reinos inexplorados. El juego de compuestos atmosféricos y formaciones minerales intrincadas insinuaba la profunda interconectividad entre este mundo fascinante y el tapiz de su cautivador entorno.

		#LOC_KS_SciDef_barometerScan_Efil_Srf = Al tocar firmemente con nuestros pies el terreno vibrante de Efil, desplegamos el barómetro, midiendo la presión atmosférica con precisión. Las lecturas reflejaban la naturaleza dinámica del planeta, con fluctuaciones que insinuaban fuerzas invisibles moldeando su delicado equilibrio.
		#LOC_KS_SciDef_barometerScan_Efil_FlyingLow = Al aventurarnos en las regiones inferiores de la atmósfera de Efil, nuestro barómetro registró diligentemente las sutiles fluctuaciones de la presión del aire. Los datos capturaron el dinámico juego de corrientes atmosféricas, insinuando los intrincados mecanismos que dan forma a este mundo vibrante.
		#LOC_KS_SciDef_barometerScan_Efil_FlyingHigh = Al ascender hacia las regiones superiores de la atmósfera de Efil, el barómetro capturó diligentemente la presión atmosférica decreciente, haciendo eco de la etérea transición hacia las alturas celestiales. 

		#LOC_KS_SciDef_seismicScan_Efil_SrfLanded = Al pisar la impresionante superficie de Efil, nuestros instrumentos de escaneo sísmico comenzaron su intrincada danza con la geología del planeta. Vibraciones y ecos viajaron por el terreno, desvelando los secretos ocultos bajo la belleza azul, mapeando la intrincada red de cámaras subterráneas y el suave latido del antiguo núcleo de Efil. Cada pulso sísmico hacía eco con la historia del planeta, pintando un cuadro vívido de su tapiz geológico, revelando un mundo tan vibrante y enigmático como los cautivadores paisajes que adornaban su superficie.

		#LOC_KS_SciDef_gravityScan_Efil_SrfLanded = Con nuestros pies firmemente plantados en las fascinantes orillas de Efil, emprendimos un escaneo de gravedad para desvelar los misterios contenidos en el abrazo gravitacional del planeta. Mientras nuestros instrumentos medían meticulosamente las sutiles fluctuaciones de las fuerzas gravitacionales, obtuvimos perspectivas sobre la distribución de masa bajo la superficie, el intrincado juego de dinámicas planetarias y los tesoros ocultos bajo el velo azul.
		#LOC_KS_SciDef_gravityScan_Efil_InSpaceLow = En la vasta extensión del espacio, nuestra nave emprendió un escaneo de gravedad sobre Efil, capturando la coreografía celestial de las fuerzas gravitacionales. Suspendidos en ingravidez, observamos los suaves tirones y empujes del campo gravitacional de Efil, mapeando los intrincados patrones que dan forma al tejido del cosmos.
		#LOC_KS_SciDef_gravityScan_Efil_InSpaceHigh = En medio de las vastas extensiones del espacio, nuestra nave se aventuró a grandes alturas sobre el encantador mundo de Efil, capturando la danza celestial de las fuerzas gravitacionales. Desde este elevado punto de vista, presenciamos el intrincado juego entre Efil y sus compañeros cósmicos, trazando las curvas y ondulaciones en el tejido del espacio-tiempo. 

		#LOC_KS_SciDef_magnetometer_Efil_InSpace = En la extensión del espacio, nuestro magnetómetro sondeó diligentemente el campo magnético que rodea el etéreo mundo de Efil. Detectamos las sutiles fluctuaciones y ondulaciones del magnetismo planetario, pintando un retrato vívido de las fuerzas en juego. El escaneo del magnetómetro reveló la intrincada danza entre el campo magnético de Efil y las fuerzas celestiales que dan forma a su existencia.

		#LOC_KS_SciDef_atmosphereAnalysis_Efil_Srf = En la superficie de Efil, nuestro análisis atmosférico reveló una mezcla armoniosa de gases, dominada por una rica abundancia de oxígeno y trazas de otros elementos esenciales. El aire llevaba una fragancia sutil de flora, insinuando los bosques exuberantes que adornan este mundo cautivador. Además, detectamos la presencia de delicados aerosoles suspendidos en la atmósfera, contribuyendo a las impresionantes exhibiciones visuales que adornan el horizonte.
		#LOC_KS_SciDef_atmosphereAnalysis_Efil_FlyingLow = Inmersos en la atmósfera inferior de Efil, nuestro análisis atmosférico reveló un dinámico juego de gases, con mayores concentraciones de oxígeno y un delicado equilibrio de nitrógeno y elementos traza. El aire contenía trazas de compuestos aromáticos, evocando el aroma de flores vibrantes que salpican el paisaje.
		#LOC_KS_SciDef_atmosphereAnalysis_Efil_FlyingHigh = Al ascender a la atmósfera superior de Efil, observamos una atmósfera enrarecida, escasamente poblada de gases y enriquecida con partículas delicadas que dispersan la luz, otorgando un resplandor místico a los cielos. La presencia de partículas ionizadas insinuaba el ballet celestial de partículas cargadas, contribuyendo a las etéreas auroras que adornan las regiones más altas de este impresionante planeta.

		// Eulb
		#LOC_KS_SciDef_crewReport_Eulb_SrfLanded = ¡Esta es ciertamente una experiencia de una vez en una luna azul!
		#LOC_KS_SciDef_crewReport_Eulb_InSpace = La pura azulidad de la luna bajo ti dificulta concentrarse en la tarea que tienes entre manos.

		#LOC_KS_SciDef_temperatureScan_Eulb_SrfLanded = A pesar de ser azul hielo, Eulb es en realidad bastante cálido durante el día. Aunque, ¿no se supone que las cosas azules son más calientes?
		#LOC_KS_SciDef_temperatureScan_Eulb_InSpace = Cuando esto funcione algún día, vais a quedar muy tontos.

		#LOC_KS_SciDef_evaReport_Eulb_SrfLanded = Caminar por la superficie de Eulb ha manchado tu traje espacial con un tono azul claro. Deja de reírte. No tiene gracia.
		#LOC_KS_SciDef_evaReport_Eulb_InSpace = Mirando la luna azul bajo ti, reflexionas sobre cómo un cuerpo celeste puede ser tan... azul.

		#LOC_KS_SciDef_mysteryGoo_Eulb_SrfLanded = El Goo se «azuleó» en su contenedor. Interprétalo como quieras.
		#LOC_KS_SciDef_mysteryGoo_Eulb_InSpace = El Goo no parece estar haciendo mucho. 

		#LOC_KS_SciDef_surfaceSample_Eulb_SrfLanded = La muestra ha manchado tu guante con un color azul muy distintivo.
		#LOC_KS_SciDef_surfaceSample_Eulb_SrfLanded_Craters = La muestra de material que recogiste no parece haberse originado en Eulb.

		#LOC_KS_SciDef_mobileMaterialsLab_Eulb_SrfLanded = La bahía de muestras se ha cubierto del misterioso polvo azul que recubre la superficie de Eulb, pero por lo demás permanece inerte.
		#LOC_KS_SciDef_mobileMaterialsLab_Eulb_InSpace = Los materiales parecen estar azules. Consideras animarlos, pero entonces te das cuenta de que esa expresión no es literal.

		#LOC_KS_SciDef_barometerScan_Eulb_SrfLanded = Vale, para ser justos, Eulb no tiene mucho menos gravedad que Duna. Es teóricamente posible que pudiera haber tenido atmósfera, ¿verdad?
		#LOC_KS_SciDef_barometerScan_Eulb_InSpace = El barómetro parece sentirse «azul» por ser usado incorrectamente de nuevo, y ha decidido «ventilar» sus quejas.

		#LOC_KS_SciDef_seismicScan_Eulb_SrfLanded = El sensor sísmico detecta actividad sísmica muy débil bajo la superficie.

		#LOC_KS_SciDef_gravityScan_Eulb_SrfLanded = El sensor realiza un estudio detallado de la gravedad local desde la superficie, permitiéndonos inferir cómo es la estructura interna.
		#LOC_KS_SciDef_gravityScan_Eulb_InSpace = El sensor lee la gravedad de Eulb, dando una pista sobre la estructura interna de la luna azul.

		#LOC_KS_SciDef_magnetometer_Eulb_InSpaceLow = Estar más cerca de Eulb nos permite tomar una lectura más precisa de su campo magnético.
		#LOC_KS_SciDef_magnetometer_Eulb_InSpaceHigh = El instrumento lee un campo magnético residual proveniente de la luna azul, pero la lectura está llena de ruido del campo magnético de Anehta.

		// Elad
		#LOC_KS_SciDef_crewReport_Elad_SrfLanded = La tripulación se pregunta cómo era este lugar cuando Elad tenía atmósfera.
		#LOC_KS_SciDef_crewReport_Elad_InSpaceLow = El parecido con Tylo está ahí, pero hay otra luna que puede o no existir a la que Elad se parece aún más...
		#LOC_KS_SciDef_crewReport_Elad_InSpaceHigh = Elad se cierne cerca, pareciendo bastante tranquilo a pesar de su aparentemente trágico pasado.

		#LOC_KS_SciDef_evaReport_Elad_SrfLanded = ¡Se siente como en casa! Bueno, lo haría, si hubiera aire.
		#LOC_KS_SciDef_evaReport_Elad_InSpaceLow = Quienquiera que siga robando las atmósferas de las lunas grandes debe ser encontrado y llevado ante la justicia.
		#LOC_KS_SciDef_evaReport_Elad_InSpaceHigh = Incluso Elad parece tener un tinte azul muy ligero. Aunque esto podría deberse al color de Aralc-A.

		#LOC_KS_SciDef_mysteryGoo_Elad_SrfLanded = El Goo está llorando (lágrimas hechas de goo) y usa un pañuelo (también hecho de goo) para secarse los pseudópodos.
		#LOC_KS_SciDef_mysteryGoo_Elad_InSpaceLow = El contenedor permanece cerrado. Parece que el Goo se ha deprimido.
		#LOC_KS_SciDef_mysteryGoo_Elad_InSpaceHigh = El Goo se siente triste.

		#LOC_KS_SciDef_surfaceSample_Elad_SrfLanded = La superficie aquí parece haber sido erosionada, pero no por micrometeoritos o radiación.
		#LOC_KS_SciDef_surfaceSample_Elad_SrfLandedLowlands = Coges una roca particularmente interesante y te la guardas. Parece ser algún tipo de mineral salino, densamente compactado como bajo tremenda presión.
		#LOC_KS_SciDef_surfaceSample_Elad_SrfLandedGrandCanyon = El suelo aquí está tan comprimido que tuvo que haber sido una vez una fosa oceánica.

		#LOC_KS_SciDef_mobileMaterialsLab_Elad_SrfLanded = Los materiales reaccionan vagamente a la situación de una manera frustrantemente indefinida, obligándote a escribir un informe completamente genérico.
		#LOC_KS_SciDef_mobileMaterialsLab_Elad_InSpace = Quizás algún día encontrarás una parte del espacio que sea simplemente diferente, las muestras no brillarán y no servirán para buena pintura de cohetes.

		#LOC_KS_SciDef_seismicScan_Elad_SrfLanded = Las lecturas sugieren fuertemente que Elad sigue siendo sísmicamente activo.

		#LOC_KS_SciDef_temperatureScan_Elad_SrfLanded = El termómetro está leyendo la temperatura de la superficie de Elad; según dónde estés, será diferente. No hay nada que retenga esta temperatura, se enfriará cuando se acabe el día.
		#LOC_KS_SciDef_temperatureScan_Elad_SrfLanded_GrandCanyons = ¡Este lugar parece ser más frío!
		#LOC_KS_SciDef_temperatureScan_Elad_InSpaceLow = Bajar más mientras no estás en contacto con nada no va a cambiar nada.
		#LOC_KS_SciDef_temperatureScan_Elad_InSpaceHigh = El termómetro registró su propia temperatura. ¿Qué crees que estás haciendo poniendo un termómetro de cocina en el vacío del espacio?

		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded = El barómetro escanea una mayor concentración de partículas. Partículas que podrían ser restos de un pasado atmosférico denso. Esto no significa que puedas hacer paracaidismo.
		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded_GrandCanyons = La presión aquí es ligeramente mayor, aún no puedes volar un avión de papel aquí.
		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded_RiftValleys = La presión aquí es ligeramente mayor, aún no puedes volar un avión de papel aquí.
		#LOC_KS_SciDef_barometerScan_Elad_InSpaceLow = El barómetro escanea más que nada. Parece haber un aumento significativo de partículas.
		#LOC_KS_SciDef_barometerScan_Elad_InSpaceHigh = El barómetro no escanea nada.

		#LOC_KS_SciDef_gravityScan_Elad_SrfLanded = Esta pequeña caja adherida a esta nave parece ser atraída hacia el suelo; esto podría probar la presencia de una atracción gravitacional producida por Elad. Este efecto es causado por la capacidad de la masa de curvar el espacio-tiempo a su alrededor. Esto se llama gravedad, pero si lograste llegar hasta aquí deberías saberlo. ¿Verdad?
		#LOC_KS_SciDef_gravityScan_Elad_InSpaceLow = Se perciben algunas irregularidades que causan irregularidades en la distribución de la fuerza gravitacional de Elad, que está lejos de ser irregular.
		#LOC_KS_SciDef_gravityScan_Elad_InSpaceHigh = La gravedad de Elad parece bastante consistente desde esta distancia. Sus irregularidades superficiales no parecen mover su centro de gravedad.





		// Wormhole(s)
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceLow1 = Desearías que alguien estuviera aquí para explicarte esta anomalía espacial aturdidoramente compleja con solo un lápiz y papel.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceLow2 = Al intentar mirar fijamente la distorsión en el espacio-tiempo, crees ver una imagen distorsionada de... alguna clase de cosa enorme y brillante, con tres... no, cuatro puntos alrededor? A pesar de tu emoción y deseo de saber más, pudo haber sido un truco de la luz, e intentas calmar tu especulación desenfrenada.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceHigh1 = Te cuesta localizar el agujero de gusano, pero una vez que lo ves, es todo lo que puedes mirar.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceHigh2 = Te estremeces al pensar que el KSC quiere enviarte A TI a través de esa cosa a sabe-el-Kraken-qué, posiblemente a miles o millones de años luz de casa.

		#LOC_KS_SciDef_temperatureScan_WH3141A_InSpaceLow = Tu termómetro no parece haber detectado que algo esté fuera de lo ordinario, a pesar de la anomalía que rompe el espacio-tiempo a un tiro de escupir de la nave.
		#LOC_KS_SciDef_temperatureScan_WH3141A_InSpaceHigh = Tu termómetro no parece haber detectado que algo esté fuera de lo ordinario, a pesar de la anomalía que rompe el espacio-tiempo a un tiro de escupir de la nave.

		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceLow1 = Tienes un deseo muy fuerte y bastante racional de NO atravesar el agujero de gusano con solo tu traje protegiéndote.
		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceLow2 = DEMASIADO cerca para la comodidad.
		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceHigh = Al mirar dentro del agujero de gusano (que bien podría ser el ojo del mismísimo Kraken), agradeces que los trajes EVA exijan que lleves pañal. Ya sabes, por si acaso en momentos como este. 

		#LOC_KS_SciDef_mysteryGoo_WH3141A_InSpaceLow = El Goo parece encogerse lejos del agujero de gusano, como si le tuviera miedo.
		#LOC_KS_SciDef_mysteryGoo_WH3141A_InSpaceHigh = El Goo parece encogerse lejos del agujero de gusano, como si le tuviera miedo.

		#LOC_KS_SciDef_mobileMaterialsLab_WH3141A_InSpaceLow = Las muestras magnéticas reaccionan violentamente al estar tan cerca de la anomalía, desprendiéndose de la estructura de la bahía de materiales hacia el agujero de gusano.
		#LOC_KS_SciDef_mobileMaterialsLab_WH3141A_InSpaceHigh = Las muestras magnéticas reaccionan violentamente al estar tan cerca de la anomalía, desprendiéndose de la estructura de la bahía de materiales hacia el agujero de gusano.

		#LOC_KS_SciDef_gravityScan_WH3141A_InSpaceLow = Las lecturas del sensor de gravedad fluctúan violentamente, ya que parece ser incapaz de cuantificar o incluso procesar este campo gravitacional verdaderamente extraño.
		#LOC_KS_SciDef_gravityScan_WH3141A_InSpaceHigh = Las lecturas del sensor de gravedad fluctúan violentamente, ya que parece ser incapaz de cuantificar o incluso procesar este campo gravitacional verdaderamente extraño.

		#LOC_KS_SciDef_magnetometer_WH3141A_InSpaceLow = Tan cerca de la anomalía, el magnetómetro tiene el equivalente numérico de un ataque de pánico y deja de funcionar por completo con un código de error que tú y tu tripulación no conocen.
		#LOC_KS_SciDef_magnetometer_WH3141A_InSpaceHigh = Al entrar en el pequeño pozo gravitacional del agujero de gusano, el magnetómetro empieza a dar lecturas inestables, como si estuviera confuso... o como si detectara múltiples «campos magnéticos cercanos» como está diseñado a la vez. Extraño.



		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceLow1 = Tú y tu tripulación no tienen ganas de atravesar otra de estas cosas de nuevo.
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceLow2 = Crees poder ver el punto que es Kerbol a través de la anomalía misma, pero no puedes estar seguro.
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceHigh1 = Oh, genial. Otra vez ESTO. Pensaste que ibas a morir en al menos 9 ocasiones distintas la última vez que atravesaste uno.
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceHigh2 = Pensar que ese es el «portal» de vuelta a casa… Sin duda has puesto mucha fe en algo para llevarte de vuelta a Mamá y Papá Kerman que ni tú ni los mejores científicos Kerbal pueden siquiera empezar a comprender en su totalidad.

		#LOC_KS_SciDef_temperatureScan_WH3141B_InSpaceLow = Tu termómetro no parece haber detectado que algo esté fuera de lo ordinario, a pesar de la anomalía que rompe el espacio-tiempo a un tiro de escupir de la nave.
		#LOC_KS_SciDef_temperatureScan_WH3141B_InSpaceHigh = Tu termómetro no parece haber detectado que algo esté fuera de lo ordinario, a pesar de la anomalía que rompe el espacio-tiempo a un tiro de escupir de la nave.

		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceLow1 = Pese a saber que casa está a solo «un salto» de distancia, desde luego no quieres atravesar la anomalía con solo tu traje para protegerte.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceLow2 = A su manera, mirar fijamente esta cosa desde tan cerca es igual de malo, si no peor, que estar en un EVA de órbita baja alrededor de Kcalbeloh.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceHigh1 = Aunque cósmicamente horroroso de forma similar a Kcalbeloh, el pequeño «agujero» en el espacio-tiempo es indudablemente peculiar, y algo hermoso desde esta perspectiva.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceHigh2 = Al mirar dentro del agujero de gusano (que bien podría ser el ojo del mismísimo Kraken), agradeces que los trajes EVA exijan que lleves pañal. Ya sabes, por si acaso en momentos como este. 

		#LOC_KS_SciDef_mysteryGoo_WH3141B_InSpaceLow = El Goo parece encogerse lejos del agujero de gusano, como si le tuviera miedo.
		#LOC_KS_SciDef_mysteryGoo_WH3141B_InSpaceHigh = El Goo parece encogerse lejos del agujero de gusano, como si le tuviera miedo.

		#LOC_KS_SciDef_mobileMaterialsLab_WH3141B_InSpaceLow = Las muestras magnéticas reaccionan violentamente al estar tan cerca de la anomalía, desprendiéndose de la estructura de la bahía de materiales hacia el agujero de gusano.
		#LOC_KS_SciDef_mobileMaterialsLab_WH3141B_InSpaceHigh = Las muestras magnéticas reaccionan violentamente al estar tan cerca de la anomalía, desprendiéndose de la estructura de la bahía de materiales hacia el agujero de gusano.

		#LOC_KS_SciDef_gravityScan_WH3141B_InSpaceLow = Las lecturas del sensor de gravedad fluctúan violentamente, ya que parece ser incapaz de cuantificar o incluso procesar este campo gravitacional verdaderamente extraño.
		#LOC_KS_SciDef_gravityScan_WH3141B_InSpaceHigh = Las lecturas del sensor de gravedad fluctúan violentamente, ya que parece ser incapaz de cuantificar o incluso procesar este campo gravitacional verdaderamente extraño.

		#LOC_KS_SciDef_magnetometer_WH3141B_InSpaceLow = Tan cerca de la anomalía, el magnetómetro tiene el equivalente numérico de un ataque de pánico y deja de funcionar por completo con un código de error que tú y tu tripulación no conocen.
		#LOC_KS_SciDef_magnetometer_WH3141B_InSpaceHigh = Al entrar en el pequeño pozo gravitacional del agujero de gusano, el magnetómetro empieza a dar lecturas inestables, como si estuviera confuso... o como si detectara múltiples «campos magnéticos cercanos» como está diseñado a la vez. Extraño.


		// Home Switch Exclusive
		//-------------SulucoHome------------
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Day = Desde luego hace calor aquí fuera. Menos mal que esta nave tiene aire acondicionado.
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Twilight = Es casa. ¿Qué más hay que decir?
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Night = Menos mal que esta nave tiene calefacción.
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfSplashed = La nave se mece suavemente de un lado a otro en las olas.
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingLow = La nave vibra al volar por la atmósfera.
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingLow_Twilight = ¡Eh, creo que puedo ver mi casa desde aquí!
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingHigh = Vientos fuertes repentinos amenazan con desviar la nave del rumbo. ¿Qué está pasando aquí arriba?
		#LOC_KS_SciDef_crewReport_SulucoHome_InSpaceLow = ¡Hemos llegado al espacio!
		#LOC_KS_SciDef_crewReport_SulucoHome_InSpaceHigh = Desde esta altura, puedes ver claramente las tres zonas de Suluco: un desierto abrasado con día eterno, una naturaleza helada con noche eterna, y la franja crepuscular entre ambas que llamas hogar.

		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Day = Habías oído lo caliente que era el lado diurno de Suluco, pero ahora puedes experimentarlo por ti mismo. Sientes un fuerte deseo de irte.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Twilight = ¡Ah, zona crepuscular, dulce zona crepuscular!
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Night = Sé que algunas cosas es mejor dejarlas sin decir, pero parece que debería hacer mucho más frío en este lado del planeta.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded = No creo que realmente necesitáramos un traje espacial para llegar aquí.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfSplashed = Supongo que ahora es tan buen momento como cualquier otro para darse un baño.
		#LOC_KS_SciDef_evaReport_SulucoHome_FlyingLow = Esta es ciertamente una situación muy precaria.
		#LOC_KS_SciDef_evaReport_SulucoHome_FlyingHigh = ¡Uiiiiiiiiii!
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Day = Admiras la vista del desierto perpetuo bajo ti.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Twilight = Vaya, nunca supe cuán poca área hay para que habitemos.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Night = Admiras las vistas de las tierras heladas bajo ti.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Water = Es realmente impresionante saber cuán poca agua líquida hay en la superficie de nuestro planeta hogar.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceHigh = Nuestro hogar ciertamente parece un globo ocular, ¿verdad?

		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Day = El suelo aquí es áspero y muy seco, probablemente porque este lado del planeta recibe un baño de sol perpetuo.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Twilight = El suelo aquí es bastante húmedo, probablemente por el deshielo del lado nocturno del planeta.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Night = El suelo aquí está congelado, probablemente por no recibir mucho calor. Entiendo por qué nadie ha intentado cultivar aquí.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded = Coges una muestra del suelo de Suluco para análisis.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfSplashed = Es agua. ¿Qué más esperabas?

		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Day = Muchas de las muestras se han descompuesto debido al constante baño de sol. También hay evidencia de un pequeño incendio dentro de la bahía de materiales.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Twilight = Las muestras aún no han mostrado cambios significativos.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Night = Las muestras tienen cristales de hielo creciendo en su interior.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfSplashed = Muchas de las muestras muestran signos de corrosión por exposición al agua. Extrañamente, una de las muestras también parece carbonizada.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_Flying = Las muestras menos resistentes se depositaron por el interior de la unidad. No envidio a quien tenga que limpiar eso.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_InSpace = Algunas de las muestras parecen haberse soltado y ahora flotan dentro de la bahía de materiales.

		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Day = Hace mucho calor aquí fuera. ¡Tendrías que estar loco para querer vivir aquí!
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_DayPole = Esta es la parte más caliente del planeta, ¡y vaya si hace calor aquí! No es de extrañar que no nos hayamos establecido en esta zona del planeta.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Twilight = La temperatura aquí es la ideal. Ahora entiendo por qué vivimos en esta parte del planeta.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Night = La temperatura en esta mitad del planeta es casi insoportablemente fría.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_NightPole = Esta es la parte más fría del planeta, y parece que el termómetro se ha congelado. Huelga decir que es obvio por qué nadie vive aquí.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfSplashed_Water = La temperatura del agua es en realidad agradable aquí. Parece que uno podría darse un baño razonablemente.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfSplashed_ColdOcean = El termómetro se hace añicos al tocar las aguas gélidas. Menos mal que tenemos garantía, ¿verdad? ¿Qué quieres decir con «está anulada»?
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow = Las corrientes de convección en la atmósfera crean fluctuaciones significativas de temperatura al pasar por diferentes altitudes.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow_Day = Las temperaturas sobre la zona diurna son ligeramente más frescas que en superficie, pero no mucho. Las corrientes ascendentes cálidas hacen el aire más caliente de lo que sería de otro modo.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow_Night = Las corrientes descendentes frías hacen que la temperatura atmosférica local sea mucho más baja de lo que sería de otro modo.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingHigh = Las temperaturas en la atmósfera alta son más uniformes, pero aún hay evidencia de convección a través de la atmósfera.

		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Day = La presencia de una zona de baja presión en el lado diurno nos lleva a creer que el aire se calienta por la luz solar aquí, y luego es transportado hacia regiones más frías vía corrientes atmosféricas superiores.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Twilight = Hay un viento muy persistente entre el lado diurno y nocturno del planeta. Se debe realizar más investigación sobre cómo se forman estos vientos.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Night = La presencia de una zona de alta presión en el lado nocturno nos da una imagen más completa de las corrientes atmosféricas de Suluco. El aire se calienta en el lado diurno, luego fluye al lado nocturno vía corrientes de convección, donde se enfría y fluye de vuelta al lado diurno, dando lugar a los vientos persistentes.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfSplashed = El agua ha inundado el barómetro, dejándolo inutilizable.
		#LOC_KS_SciDef_barometerScan_SulucoHome_FlyingLow = Las fluctuaciones de presión atmosférica nos llevan a especular sobre la existencia de corrientes de convección en la atmósfera, que probablemente se originarían del gradiente de temperatura entre las dos mitades del planeta.
		#LOC_KS_SciDef_barometerScan_SulucoHome_FlyingHigh = Más fluctuaciones de presión atmosférica parecen confirmar la existencia de corrientes de convección atmosférica.
		#LOC_KS_SciDef_barometerScan_SulucoHome_InSpaceLow = ¡El barómetro marca cero! ¡Debemos estar en el espacio!

		#LOC_KS_SciDef_seismicScan_SulucoHome_SrfLanded = El escáner sísmico detecta muy poca actividad sísmica. Nuestro hogar es probablemente geológicamente muy estable.

		#LOC_KS_SciDef_gravityScan_SulucoHome_SrfLanded = Habiendo calibrado correctamente el sensor de gravedad, tomas una lectura de la gravedad local en la superficie de Suluco.
		#LOC_KS_SciDef_gravityScan_SulucoHome_SrfSplashed = El sensor de gravedad se quema al entrar en contacto con el agua.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Day = El lado desértico parece tener una gravitación muy estable, sugiriendo muy baja variabilidad en la composición geológica.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Twilight = Al pasar sobre la zona crepuscular, el sensor de gravedad lee una caída muy ligera en las lecturas de gravedad local, sugiriendo que esta parte del planeta está a una elevación relativamente baja.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Night = Las lecturas del sensor de gravedad fluctúan al pasar sobre el lado nocturno, particularmente sobre las cimas montañosas heladas.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace = Tomas una lectura de la gravedad local sobre Suluco.

		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Day = El análisis de la atmósfera en el lado diurno de Suluco revela una humedad sorprendentemente alta, probablemente porque el aire cálido puede retener mucha humedad.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Twilight = El aire en la zona crepuscular es moderadamente húmedo. Perfecto para vivir aquí.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Night = El análisis de la atmósfera en el lado nocturno de Suluco revela una humedad extremadamente baja, probablemente porque la mayor parte de la humedad del aire se convierte en nieve.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow = Debido a las corrientes atmosféricas, el aire que capta el analizador atmosférico podría haberse originado en una parte completamente diferente del planeta.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow_Day = El analizador atmosférico detecta pequeñas concentraciones de partículas finas de suelo, que probablemente fueron arrastradas del suelo por fuertes corrientes ascendentes.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow_Night = Las gotas de agua superenfriada se congelan al contactar con el analizador atmosférico, bloqueando sus puertos.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingHigh = La composición atmosférica a gran altitud es mucho más uniforme.

		#LOC_KS_SciDef_magnetometer_SulucoHome_InSpace = El brazo del magnetómetro detecta un campo magnético débil y uniforme alrededor de Suluco, que probablemente es lo que protege la atmósfera de nuestro planeta hogar y nos permite vivir aquí. Es probable que este campo magnético sea creado por un geodinamo interno.


		//-------------EfilHome------------
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded = No importa por qué ventana mires, tus ojos disfrutan de paisajes hermosos que amenazan con distraerte de la misión en curso.
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Beach = ¡No, no lo hagas! ¡Resiste la tentación! ¡Tenemos una misión que completar!
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Mountains = Estamos en una pendiente de cuidado. ¿Estás seguro de que esto es seguro?
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Forests = El parabrisas parece estar cubierto de restos de insectos. Va a costar limpiarlo.
		#LOC_KS_SciDef_crewReport_EfilHome_SrfSplashed = La nave se mece suavemente de un lado a otro en las olas. Crees poder ver algunos peces bajo la superficie.
		#LOC_KS_SciDef_crewReport_EfilHome_FlyingLow = Mirando por la ventana, puedes ver los paisajes espléndidos bajo ti.
		#LOC_KS_SciDef_crewReport_EfilHome_FlyingHigh = Incluso a esta altura, aun puedes distinguir los frondosos bosques en la superficie de Efil.
		#LOC_KS_SciDef_crewReport_EfilHome_InSpace = Quedas cautivado por las vistas de Efil con Anehta al fondo. Realmente no puede ser mucho mejor que esto.

		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded = Tómate un momento para apreciar lo hermoso que es nuestro hogar. Asegurémonos de que siga así.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Beach = ¡Parece un momento ideal para darse un baño!
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Mountains = Contemplas las impresionantes vistas del terreno a tu alrededor.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Forests = ¡Es tan... hermoso aquí fuera! ¿Qué pasa? No, no estoy llorando. Solo sudo por los ojos.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Water = Vale, de acuerdo. Puedes darte un baño. Solo no te alejes demasiado de la nave.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfSplashed = Hace un día precioso. No puedo culparte por querer darte un baño.
		#LOC_KS_SciDef_evaReport_EfilHome_FlyingLow = Esta es ciertamente una situación muy precaria.
		#LOC_KS_SciDef_evaReport_EfilHome_FlyingHigh = ¡Uiiiiiiiiii!
		#LOC_KS_SciDef_evaReport_EfilHome_InSpace = No puedes apartar la atención del mundo absolutamente espléndido bajo ti. Estás muy agradecido de poder llamar a este lugar tu hogar.

		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded = Coges una muestra del suelo de Efil.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Beach = Coges una muestra de la playa y la sueltas de inmediato al darte cuenta de que tienes el guante lleno de cangrejos de arena.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Grassland = Coges una muestra de las hierbas que cubren la superficie. Parecen estar muy sanas.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Desert = Coges una muestra de la arena del desierto. Es muy fina pero sorprendentemente no tan seca.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Tundra = Coges una muestra del suelo helado bajo ti. Incluso aquí, aún crece una modesta cantidad de flora.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Mountains = Coges una pequeña roca de las montañas. Es muy lisa, probablemente por la erosión del deshielo.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Forests = Coges una muestra del suelo del bosque, recogiendo una pequeña cantidad de flora en el proceso. Te acuerdas de lo frondoso y hermoso que es tu hogar.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfSplashed = Es agua. ¿Qué más esperabas?

		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfLanded = El Goo parece aburrido.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfLanded_Beach = El Goo rebota emocionado dentro de su contenedor.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfSplashed = ¡El Goo se escapa al agua!
		#LOC_KS_SciDef_mysteryGoo_EfilHome_Flying = El Goo se mueve emocionado mientras la nave vuela por el aire.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_InSpace = El Goo se siente como en casa aquí.

		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded = I+D dice que las muestras de esta cosa atraen tanto flora como fauna, pero ¿qué sabrán ellos?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Grassland = Varias muestras tienen malas hierbas creciendo. ¿Alguien dejó caer semillas por casualidad?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Beach = Abres la bahía de materiales para estudiar las muestras, solo para descubrir una fiesta de cangrejos de arena dentro. Por desgracia, parece que las muestras se convirtieron en aperitivos. *suspiro.*
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Forests = El interior de la bahía de materiales se ha convertido en un bioma propio. ¡Hay flores y arbolillos creciendo de las muestras!
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfSplashed = Observas con horror cómo un grupo de gambas nada hasta la bahía de materiales y devora todas las muestras. ¡Esas cosas no eran baratas, estúpidos crustáceos!
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_Flying = Varias muestras se han soltado de sus soportes y han convertido el interior de la bahía de materiales en una obra de arte moderno. ¿Cuánto crees que podríamos vender esto en una subasta?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_InSpace = La estructura cristalina de las muestras ha cambiado por estar en un entorno de microgravedad. Me pregunto cómo reaccionarán en otros mundos.

		#LOC_KS_SciDef_temperatureScan_EfilHome_SrfLanded = Parece que no importa dónde estés, la temperatura es habitable. Un recordatorio de lo único que es tu mundo natal.
		#LOC_KS_SciDef_temperatureScan_EfilHome_SrfSplashed = La temperatura del agua es agradable y fresca. ¡Eh, no! ¡Eso no significa que puedas darte un baño!
		#LOC_KS_SciDef_temperatureScan_EfilHome_InSpace = El termómetro marca cero. Ya ves, estamos en el espacio.

		#LOC_KS_SciDef_barometerScan_EfilHome_SrfLanded = La presión atmosférica en tu mundo natal es menor de lo que estás acostumbrado, pero aún dentro del rango cómodo.
		#LOC_KS_SciDef_barometerScan_EfilHome_SrfSplashed = El agua entra por los puertos del barómetro, obstruyéndolos y dejando el dispositivo inutilizable.
		#LOC_KS_SciDef_barometerScan_EfilHome_InSpace = ¡El barómetro marca cero! ¡Debemos estar en el espacio!

		#LOC_KS_SciDef_seismicScan_EfilHome_SrfLanded = El sismómetro registra información sobre la actividad sísmica de Efil, dando una idea de la estructura interna de nuestro hogar.

		#LOC_KS_SciDef_gravityScan_EfilHome_SrfLanded = El sensor de gravedad marca un valor mucho más alto del que debería. Parece que puede necesitar recalibración.
		#LOC_KS_SciDef_gravityScan_EfilHome_SrfSplashed = El sensor de gravedad se cortocircuita al entrar agua.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Water = El sensor de gravedad detecta breves cambios en la gravedad local sobre el océano, probablemente por la influencia de Anehta y las otras lunas del sistema.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Beach = La lectura del sensor de gravedad se estabiliza al pasar sobre la playa.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Grassland = La lectura del sensor de gravedad se estabiliza al pasar sobre las igualmente llanas praderas.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Desert = La lectura del sensor de gravedad se aplana al pasar sobre el desierto.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Tundra = La tundra bajo ti hace que el sensor de gravedad tenga un pico muy breve.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Mountains = El sensor de gravedad sigue el terreno de las montañas bajo ti, resultando en cambios pequeños pero muy notables en la lectura de gravedad local.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Forests = El sensor de gravedad suelta disparates. Parece ser incapaz de manejar la gran cantidad de vegetación bajo él.

		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded = El instrumento realiza su análisis de la atmósfera de Efil.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Water = El instrumento se inunda de agua y queda inutilizable.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_TropicalDesert = A pesar de ser un desierto, el aire aquí es inusualmente húmedo.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_ColdDesert = El aire aquí es frío y muy seco.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Mountains = El aire en las montañas es frío y seco por la altitud. Parece un lugar divertido para hacer senderismo.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Forests = El analizador atmosférico no parece registrar nada. Luego ves un insecto grande salir volando de uno de los puertos.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Beach = El aire aquí es muy húmedo, probablemente porque estamos junto a una gran masa de agua.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_FlyingLow = La atmósfera baja de Efil sigue siendo muy habitable.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_FlyingHigh = Hay muy poca atmósfera a estas altitudes.

		#LOC_KS_SciDef_magnetometer_EfilHome_InSpace = El brazo del magnetómetro detecta un campo magnético fuerte y ligeramente fluctuante, probablemente por la influencia del cercano Anehta.

		//-------------RouqeaHome------------
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded = ¿Qué haces aquí abajo?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_KSC = ¿Quién vive en un centro espacial bajo el mar?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_Runway = En serio, ¿por qué haces esto? ¿No has sufrido suficiente?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_Launchpad = ¿Por qué te haces esto a ti mismo?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfSplashed = Sabes que no tienes que hacer esto.
		#LOC_KS_SciDef_crewReport_RouqeaHome_FlyingLow = Aún no es tarde para dar la vuelta.
		#LOC_KS_SciDef_crewReport_RouqeaHome_FlyingHigh = ¿Te está llegando algo de lo que digo?
		#LOC_KS_SciDef_crewReport_RouqeaHome_InSpaceLow = Vale, llegaste al espacio. Bravo, supongo.
		#LOC_KS_SciDef_crewReport_RouqeaHome_InSpaceHigh = Bien, has llegado hasta aquí. Igual de bien puedes seguir hasta el final y visitar algún otro planeta.

		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded = Por favor, busca ayuda.
		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded_Runway = ¿Para qué me molesto en decirte que es una mala idea?
		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded_Launchpad = Por favor, que te revisen la cabeza. Esto no es un comportamiento normal.
		#LOC_KS_SciDef_evaReport_RouqeaHome_FlyingLow = Por favor, asegúrate de agarrarte como si te fuera la vida.
		#LOC_KS_SciDef_evaReport_RouqeaHome_FlyingHigh = El hecho de que pensaras que era buena idea significa que eres tonto, loco o ambas cosas.

		#LOC_KS_SciDef_mysteryGoo_RouqeaHome_SrfLanded_LaunchpadRunwayKSC = Sabes que estás loco cuando incluso el GOO MISTERIOSO parece cuerdo a tu lado.


		// ******************************** DMagic Science Definitions ********************************

		// Kcalbeloh
		#LOC_KS_SciDef_dmMagScan_Kcalbeloh_SrfLanded = El boom es espagueti. Tú eres espagueti. ¡Todo es espagueti! ¿¡Qué está pasando?!?! ¿¡POR QUÉ HAY TANTA PASTA?!?
		#LOC_KS_SciDef_dmMagScan_Kcalbeloh_InSpaceHigh = A tal distancia de Kcalbeloh, hay muy poca actividad de la que hablar. Es muy parecido al espacio interplanetario, o incluso interestelar.

		#LOC_KS_SciDef_rpwsScan_Kcalbeloh_InSpaceLow = Las ondas de radio y partículas ionizadas del disco de acreción dañan los detectores, causando fallo agudo en todos sus sistemas. Aunque probablemente sea reparable... probablemente.
		#LOC_KS_SciDef_rpwsScan_Kcalbeloh_InSpaceHigh = Se pueden detectar débiles emisiones de radio originadas del distante Kcalbeloh, pero además de Maelg, todas las demás estrellas están produciendo mucha más actividad.

		#LOC_KS_SciDef_scopeScan_Kcalbeloh_InSpaceLow = El becario que observa la transmisión del telescopio se emociona brevemente cuando ve la llamada «singularidad»; resulta que las intensas fuerzas agrietaron la lente y crearon un punto brillante en el centro.
		#LOC_KS_SciDef_scopeScan_Kcalbeloh_InSpaceHigh = El disco de acreción de Kcalbeloh se captura con impresionante detalle con el instrumento, y un análisis más cercano revela que los bordes del disco están ligeramente desplazados al rojo y al azul.

		#LOC_KS_SciDef_dmImagingPlatform_Kcalbeloh_InSpaceLow = Aunque los sensores serían teóricamente capaces de analizar el disco de acreción desde esta distancia sin que la luz cause daños, no pueden hacerlo, ya que están irremediablemente deformados por las intensas fuerzas en juego.
		#LOC_KS_SciDef_dmImagingPlatform_Kcalbeloh_InSpaceHigh = El análisis multiespectral confirma que los dos extremos del disco de acreción están sutilmente desplazados al rojo y al azul. La composición del disco, mientras tanto, parece ser en gran parte hidrógeno y helio, confirmando que está compuesto de masa de al menos una estrella que Kcalbeloh devoró hace muchos millones de años.

		#LOC_KS_SciDef_dmSIGINT_Kcalbeloh_InSpaceLowNorthernHemisphere = Mientras estudias la telemetría, oyes los sonidos de... ¿un banjo tocando? Luego una armónica, una voz silbando, un tambor, una flauta y un piano. Suena... sentimental, nostálgico incluso. Luego te despiertas y la canción se ha ido. ¿Fue todo un sueño?
		#LOC_KS_SciDef_dmSIGINT_Kcalbeloh_InSpaceLowSouthernHemisphere = El disco de acreción de Kcalbeloh emite ondas de radio intensas constantemente, aunque este instrumento no es ni de lejos lo bastante sensible para detectar ninguna radiación Kerman.

		#LOC_KS_SciDef_dmSolarParticles_Kcalbeloh_InSpaceLow = Las partículas de alta energía fríen por completo el concentrador de iones activo y destruyen las obleas sensibles de los colectores pasivos. Buen trabajo, genio.
		#LOC_KS_SciDef_dmSolarParticles_Kcalbeloh_InSpaceHigh = El «viento holar» del disco de acreción deposita partículas ionizadas en los colectores, pero también hay trazas muy débiles de múltiples otras direcciones, probablemente originadas de las estrellas más masivas del sistema Kcalbeloh.

		#LOC_KS_SciDef_dmSoilMoisture_Kcalbeloh_InSpaceLow = Vale. ¿Quién es el cómico que añadió un sensor para detectar agua mediante emisiones de microondas a la misión del AGUJERO NEGRO? ¡Quiero nombres!

		#LOC_KS_SciDef_dmRadiometerScan_Kcalbeloh_InSpaceHigh = Aunque por supuesto el horizonte de sucesos en sí tiene un albedo de precisamente cero, el disco de acreción está emitiendo luz en todas las longitudes de onda registradas, como hace una estrella. Sin embargo, es considerablemente más tenue que la mayoría de estrellas.

		// Onrefni
		#LOC_KS_SciDef_dmMagScan_Onrefni_SrfLanded = El campo magnético superficial de Onrefni es bastante fuerte, especialmente para un cuerpo tan pequeño. Su núcleo es muy probablemente desproporcionadamente enorme, y fuertemente agitado —amasado, incluso— por la inmensa atracción gravitacional de Kcalbeloh.
		#LOC_KS_SciDef_dmMagScan_Onrefni_SrfSplashed = Muchos han especulado que si supiéramos por qué el magnetómetro envió el mensaje «¡oh no, otra vez!» al fundirse en la lava de un blanet en órbita cercana a un agujero negro supermasivo, conoceríamos mucho más sobre la naturaleza del universo de lo que sabemos ahora.

		#LOC_KS_SciDef_rpwsScan_Onrefni_InSpaceLow = Incluso con una magnetosfera potente, Onrefni puede hacer poco para detener el llamado «viento holar» que azota su superficie.
		#LOC_KS_SciDef_rpwsScan_Onrefni_InSpaceHigh = El «viento holar» de Kcalbeloh sopla con fuerza aquí. Casi puedes oírlo aullar, excepto que el espacio no funciona así, claro. Pero el silencio hace que toda la escena sea aún más inquietante...

		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowLava = La roca negra como la noche contrasta fuertemente con las brillantes franjas rojo-naranja de lava ardiente que fluyen por las grietas de la superficie de Onrefni. Uno se pregunta cuánto tiempo más podrá aguantar esto.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowDay = Profundas fisuras cubren la superficie de Onrefni, especialmente en el lado diurno. Parece que alguna entidad espacial colosal le dio un puñetazo y destrozó la mitad de la superficie.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowNight = Las grietas siguen atravesando el lado oscuro de Onrefni, resaltadas contra el brillantemente iluminado disco de acreción de Kcalbeloh.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowCraters = Los bordes de los cráteres de Onrefni brillan bajo la luz siniestra del disco de acreción. Uno se pregunta qué creó estas formaciones: ¿se acercaron a Kcalbeloh, o Onrefni fue lanzado aquí en el pasado ya con estas cicatrices?
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceHigh = Lo que ves ante ti es la imagen misma de la belleza en la desolación. Onrefni es un mundo al borde de la destrucción, y aun así, pese a ser una pequeña roca sin aire con nada que la acompañe salvo el huracán cósmico que la rodea, la superficie apocalíptica del blanet es absolutamente cautivadora.

		#LOC_KS_SciDef_dmImagingPlatform_Onrefni_dmImagingPlatform_Onrefni_InSpaceLow = El análisis multiespectral indica que no hay trazas de atmósfera, y una superficie dominada por silicatos ricos en metales. Lo más probable es que esa superficie sea una fina capa sobre un blanet que es casi solo un denso núcleo metálico.
		#LOC_KS_SciDef_dmImagingPlatform_Onrefni_dmImagingPlatform_Onrefni_InSpaceHigh = La imagen térmica indica que, a pesar de estar acoplado por marea, Onrefni está abrasador en ambos lados. El lado diurno probablemente no se calienta mucho por la luz de todos modos; es la gravedad de Kcalbeloh la que lo hace.

		#LOC_KS_SciDef_dmSIGINT_Onrefni_InSpaceLow = Onrefni no parece haber cambiado en absoluto el entorno de radio; la actividad constante del disco de acreción permanece sin cambios aquí.

		#LOC_KS_SciDef_dmNAlbedoScan_Onrefni_SrfLanded = Es difícil obtener una lectura precisa con todos los neutrones volando en todas direcciones, pero la superficie de Onrefni está recubierta de átomos de hidrógeno. Esto ciertamente no es agua, sino depósitos del intenso «viento holar» y del contacto directo con el disco de acreción.

		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfLanded = La superficie de Onrefni demuestra ser extremadamente resistente a tus intentos de vaporizarla con un láser. Lo poco que realmente se vaporiza solo confirma que la composición es principalmente roca ígnea, y roca muy resistente al calor. Tiene sentido.
		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfLandedLava = ¿Así que tu plan es fundir la lava con un láser? Vale, apostemos.
		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfSplashed = Esto está bien. Estoy bien con los eventos que se están desarrollando actualmente.

		#LOC_KS_SciDef_dmSolarParticles_Onrefni_InSpace = Las partículas de alta energía resultan igual de peligrosas para el colector que cuando no estábamos cerca de Onrefni.

		#LOC_KS_SciDef_dmSoilMoisture_Onrefni_InSpaceLow = Erm... Sí. Sí, este blanet definitivamente tiene depósitos de agua subsuperficiales. Claro...

		#LOC_KS_SciDef_dmRadiometerScan_Onrefni_InSpaceHigh = Debido a su superficie oscura, Onrefni tiene un albedo muy bajo que refleja muy poca luz en todas las longitudes de onda.

		#LOC_KS_SciDef_dmseismicHammer_Onrefni_SrfLanded = Onrefni resuena muy fácilmente, confirmando casi por completo la presencia de su núcleo metálico masivamente desproporcionado.

		#LOC_KS_SciDef_dmbathymetryscan_Onrefni_SrfSplashed = ¡Apaga «Ignorar Temperatura Máxima», cobarde!

		// Rouqea
		#LOC_KS_SciDef_dmMagScan_Rouqea_SrfLanded = El boom evidentemente no fue diseñado para este tipo de presión, y partes de él parecen haberse aplastado.
		#LOC_KS_SciDef_dmMagScan_Rouqea_SrfSplashed = El campo magnético de la superficie de Rouqea es un poco más fuerte que en órbita, pero sigue siendo débil. Dada su proximidad a Kcalbeloh, las fuerzas de marea deberían estar agitando el núcleo. ¿Quizás no tiene núcleo metálico en absoluto?

		#LOC_KS_SciDef_rpwsScan_Rouqea_InSpaceHigh = El viento del agujero negro del disco de acreción de Kcalbeloh está produciendo algunas interacciones interesantes con la densa atmósfera de Rouqea, pero no son realmente tan especiales comparadas con lo que hemos visto antes.
		#LOC_KS_SciDef_rpwsScan_Rouqea_InSpaceLow = La espesa atmósfera y la superficie húmeda de Rouqea producen mucha actividad fascinante de ondas de radio. ¡Este es verdaderamente un mundo alienígena!

		#LOC_KS_SciDef_scopeScan_Rouqea_InSpaceHigh = Azul, azul.
		#LOC_KS_SciDef_scopeScan_Rouqea_InSpaceLow = Uhhh. Agua. Y... hay algo de agua por ahí, y... ¡Oh, mira eso! Es agua.

		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceHigh = El análisis multiespectral de la atmósfera de Rouqea confirma que la mayoría es nitrógeno, pero también hay bastante oxígeno. Eso es interesante, ¿podría haber vida en Rouqea?
		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceLow = Examinar la superficie de Rouqea en la mayoría de espectros no revela mucho bajo la superficie. Parece que el agua es bastante profunda.
		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceLowHighlands = ¡Analizar esta región de los océanos de Rouqea revela algo sorprendente; en partes el agua parece tener solo 100 m de profundidad!

		//Non-Hellswitch Rouqea Only
		#LOC_KS_SciDef_dmSIGINT_Rouqea_InSpaceLow = Aunque la turbulenta atmósfera y océanos de Rouqea producen mucha actividad de radio interesante, no hay nada que sugiera una presencia inteligente ahí abajo.

		//Rouqea Hellswitch Only
		#LOC_KS_SciDef_dmSIGINT_RouqeaHome_InSpaceLow = Por desgracia, a esta altitud el último partido de headball está demasiado distorsionado para disfrutarlo, con la transmisión teniendo que atravesar tanta agua y atmósfera para llegar al espacio.

		#LOC_KS_SciDef_dmNAlbedoScan_Rouqea_SrfSplashed = ...Sí, es agua.
		#LOC_KS_SciDef_dmNAlbedoScan_Rouqea_SrfLanded = Por desgracia, el instrumento parece haberse aplastado bajo la absurda presión del agua. Quizás nunca sepamos si Rouqea alberga agua.

		#LOC_KS_SciDef_dmlaserblastscan_Rouqea_SrfSplashed = El análisis láser confirma que el líquido es agua. Parece bastante obvio, pero siempre es bueno comprobarlo.
		#LOC_KS_SciDef_dmlaserblastscan_Rouqea_SrfLanded = El análisis láser confirma que el sólido es... ¿agua? Espera, ¿es hielo de agua? Pero hace tanto calor... ¿Es hielo exótico? ¡Ese es mi tipo de hielo favorito! Genial.

		#LOC_KS_SciDef_dmSolarParticles_Rouqea_InSpaceHigh = El «viento holar» de Kcalbeloh parece ser todo lo que hay a esta altitud. No se detecta evidencia de cinturones de radiación Van Kerman.
		#LOC_KS_SciDef_dmSolarParticles_Rouqea_InSpaceLow = Cerca de Rouqea, el colector capta vapor de agua además de nitrógeno y oxígeno, pero el viento del agujero negro de Kcalbeloh sigue siendo fuerte.

		#LOC_KS_SciDef_dmSoilMoisture_Rouqea_InSpaceLow = ¿Agua? ¡Sí!

		#LOC_KS_SciDef_dmRadiometerScan_Rouqea_InSpaceHigh = Aunque hermosa en el espectro visible, la superficie oceánica de Rouqea tiene un albedo bastante bajo, y su densa atmósfera absorbe la mayoría de longitudes de onda no visibles de la luz.

		#LOC_KS_SciDef_dmseismicHammer_Rouqea_SrfSplashed = Erm... ¿Chapoteo? No estás seguro de qué esperabas.
		#LOC_KS_SciDef_dmseismicHammer_Rouqea_SrfLanded = Por desgracia, incluso a esta profundidad no hay muchos datos que recoger, ya que los sensores están lamentablemente fuera de su elemento y probablemente flotando de todos modos en las enormes olas de arriba. Los sensores locales al menos te dicen que los alrededores inmediatos parecen resonar como se espera del hielo exótico.

		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedGenericShallow = Nada más que agua por kilómetros en todas direcciones, incluyendo hacia abajo. Los escaneos del agua misma no revelan compuestos orgánicos.
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedGenericDeep = Incluso bien bajo la superficie, todo lo que puedes ver es agua. A pesar de la presencia de oxígeno en la atmósfera de arriba, no hay signos de vida, ni siquiera a nivel microscópico.
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedHighlandsShallow = ¡El escáner realmente detecta signos de una superficie sólida ahí abajo! ¡Sumergámonos más!
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedHighlandsDeep = ¡Puedes ver realmente una superficie sólida a esta profundidad! A pesar de esto, todos los signos apuntan a que Rouqea es totalmente sin vida.

		#LOC_KS_SciDef_dmbiodrillscan_Rouqea_SrfLanded = El taladro encuentra mayormente agua y trazas de otros elementos, pero no hay signos de actividad biológica. Es probable que la fuente del oxígeno de Rouqea sea de naturaleza geológica.

		// Iomena
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLanded = Iomena tiene un campo magnético superficial apreciable que se distorsiona fuertemente según la ubicación, pero incluso en las partes más tranquilas sigue habiendo un flujo constante de actividad. Probablemente sea un campo magnético propio producido por un efecto geodinamo.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedHighlands = La actividad magnética en esta ubicación es en realidad un poco más débil aquí, posiblemente porque el terreno elevado reduce la densidad de minerales magnéticos en la corteza.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedMountainsAll = El campo magnético se fortalece aquí, posiblemente por material magnetizado que asciende a la corteza desde las profundidades de Iomena.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedCraters = Regiones aisladas de intensa actividad magnética sugieren que el impactador dispersó minerales magnéticos al aterrizar.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedCanyonsAll = Algunas líneas del campo magnético recorren las paredes del cañón, confirmando la presencia de materiales magnéticamente activos.

		#LOC_KS_SciDef_rpwsScan_Iomena_InSpaceLow = A esta distancia de Kcalbeloh, el «viento holar» es notablemente más débil, pese a seguir bastante cerca del disco de acreción.
		#LOC_KS_SciDef_rpwsScan_Iomena_InSpaceHigh = El flujo del viento del agujero negro del disco de acreción de Kcalbeloh a veces se interrumpe por indicios de partículas cargadas expulsadas de la delgada atmósfera de Iomena.

		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowGeneric = Los campos desolados de rocas azul grisáceas tienen una belleza sorprendente. La vista en superficie es probablemente bastante espectacular, especialmente con Kcalbeloh al fondo.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowMountainsAll = Los picos de Iomena destacan, ya que la mayoría están escarchados con alguna sustancia brillante. Aunque probablemente no sea hielo de agua...
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowCanyonsAll = Estos cañones se ven realmente dramáticos. ¿Pero es la atmósfera lo bastante densa para volar a través de ellos? ¡Necesitamos averiguarlo, ya!
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowCraters = Las orillas gélidas de los cráteres inundados de Iomena deben ser impresionantes. Incluso desde el espacio, tienen una cierta belleza solitaria.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowOceans = Sea lo que sea esta sustancia, probablemente no es agua. Las condiciones deberían ser adecuadas para amoníaco líquido en superficie, así que si aterrizamos allí, POR FAVOR recuerda no beber nada.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceHigh = Desde la distancia, las tenues características grises de Iomena muestran claras señales de flujo líquido pasado y presente en la superficie; aunque a esta distancia de Kcalbeloh, lo más probable es que haga demasiado frío para agua líquida.

		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowGeneric = Según el análisis multiespectral, la superficie azul grisácea de Iomena parece ser una mezcla bastante estándar de varios minerales silíceos y amoníaco.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowWater = Según las lecturas de infrarrojos, este líquido tiene la temperatura adecuada para ser amoníaco.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowMountainsAll = La firma de infrarrojos indica que la sustancia brillante que cubre las montañas de Iomena es probablemente hielo de amoníaco.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceHigh = La delgada atmósfera de Iomena contiene principalmente amoníaco, aunque las lecturas sugieren trazas de metano y dióxido de carbono. ¡Estas trazas podrían ser una biofirma — merece más estudio!

		#LOC_KS_SciDef_dmSIGINT_Iomena_InSpaceLow = La única actividad de radio aquí además del «viento holar» de Kcalbeloh es producida por las interacciones entre este y la delgada atmósfera de Iomena.

		#LOC_KS_SciDef_dmNAlbedoScan_Iomena_SrfLanded = La superficie de Iomena está universalmente saturada de hidrógeno; sin embargo, la gran mayoría no es probable que sea agua. Es más probable que sea amoníaco, y potencialmente algunos compuestos orgánicos.

		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedGeneric = Los escaneos de la pluma creada al vaporizar la superficie indican varios silicatos ricos en hierro, todos fuertemente saturados de amoníaco.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedOceans = Según nuestro análisis, este suelo húmedo ha sido empapado con amoníaco líquido. También hay algunos hidrocarburos simples incrustados en el suelo.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfSplashed = Bombardear el líquido confirma la casi total ausencia de agua; en su lugar, solo se detectan amoníaco e hidrocarburos de cadena corta.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedMountainsAll = La sustancia blanca brillante que cubre este pico montañoso parece ser hielo de amoníaco.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedCanyonsAll = Se encuentran aquí rocas ricas en hierro, posiblemente caídas de las paredes del cañón.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedLowlands = Las regiones bajas de Iomena probablemente acumulan con el tiempo las rocas más densas y ricas en hierro. Esto ayudaría a explicar el muy alto contenido de hierro en el suelo aquí.

		#LOC_KS_SciDef_dmSolarParticles_Iomena_InSpaceLow = Trazas de amoníaco se incrustan en los colectores, pero aparte de eso no hay mucho más aquí. Incluso el «viento holar» ha desaparecido.
		#LOC_KS_SciDef_dmSolarParticles_Iomena_InSpaceHigh = El «viento holar» de Kcalbeloh ya es bastante más débil a esta distancia, ya que incluso con su inmenso tamaño, no emite tanto como la mayoría de estrellas.

		#LOC_KS_SciDef_dmSoilMoisture_Iomena_InSpaceLow = Las bajas emisiones de microondas ayudan a corroborar la hipótesis de que la superficie de Iomena está dominada por amoníaco, no agua.

		#LOC_KS_SciDef_dmRadiometerScan_Iomena_InSpaceHigh = La superficie mayormente gris de Iomena produce un albedo general bajo, y su atmósfera absorbe la mayoría de longitudes de onda visibles en un patrón que indica grandes cantidades de gas amoníaco.

		#LOC_KS_SciDef_dmseismicHammer_Iomena_SrfLandedRocky = La roca aquí resuena bien, dando a los sensores una imagen clara de la estructura interior de Iomena. Hay algunas grandes cavernas subterráneas, probablemente erosionadas por flujos de amoníaco líquido, y la mayor parte de la corteza parece ser de composición rocosa. Hay sorprendentemente poco hielo de agua.
		#LOC_KS_SciDef_dmseismicHammer_Iomena_SrfLandedWet = El suelo húmedo (con amoníaco líquido) y blando aquí no es especialmente bueno para transmitir ondas sísmicas. Así que... ¿qué, cogiste este martillo y fuiste directo a buscar el suelo más blando que encontraste? Ve a otro sitio, Iomena es bastante rocoso.

		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedOceansShallow = El líquido es definitivamente amoníaco, pero también hay una concentración considerable de algunas moléculas orgánicas complejas. Estas podrían tener varios orígenes potenciales, pero uno de ellos es efectivamente biológico. ¡Deberíamos sumergirnos más!
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedOceansDeep = La cámara muestra una fuente hidrotermal... o... como quieras llamarlas en amoníaco. En cualquier caso, está expulsando humo negro, indicando cierto nivel de actividad volcánica actual en Iomena. ¡El verdadero descubrimiento está en la muestra de amoníaco: siguen formándose nuevos hidrocarburos, y un microscopio revela pequeños organismos metabolizando el contenido de la pluma de humo!
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedCraterLakesShallow = Moléculas orgánicas complejas flotan en el lago de amoníaco y sugieren la posible existencia de vida en Iomena, pese al frío y al entorno tóxico. Si algo vive aquí, probablemente encontraría nuestro hogar demasiado caliente.
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedCraterLakesDeep = La parte más profunda de este lago revela la formación continua de hidrocarburos en la región más profunda y cálida del planeta. Compuestos de azufre y fósforo también flotan en el agua, implicando actividad volcánica limitada en otros lugares. ¡Una mirada más cercana con microscopio confirma nuestras sospechas: los microorganismos están utilizando los volátiles y convirtiéndolos en hidrocarburos!

		#LOC_KS_SciDef_dmbiodrillscan_Iomena_SrfLandedRocky = La roca aquí contiene trazas de materia orgánica, pero no hay otros signos de actividad biológica.
		#LOC_KS_SciDef_dmbiodrillscan_Iomena_SrfLandedWet = Se detecta una concentración sustancial de moléculas orgánicas y elementos volátiles —principalmente azufre y fósforo— en esta muestra de núcleo.

		// Uleg
		#LOC_KS_SciDef_dmMagScan_Uleg_SrfLanded = Incluso en su superficie, el campo magnético de Uleg es extremadamente débil.
		#LOC_KS_SciDef_dmMagScan_Uleg_InSpaceHigh = No se detecta campo magnético a esta altitud. Es probable que Uleg carezca de un núcleo de hierro-níquel, ya que su órbita extrema debería hacerle experimentar fuerzas de marea significativas.

		#LOC_KS_SciDef_rpwsScan_Uleg_InSpace = El entorno de plasma de radio varía drásticamente según la posición de Uleg en su órbita. Cerca del apobeloh, está muy tranquilo. Pero en el peribeloh, el «viento holar» de Kcalbeloh puede sentirse; aunque solo apenas.

		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowGeneric = La superficie craterizada de Uleg recuerda un poco demasiado al helado de galletas y nata. Cuando el público vea estas fotos, se les hará la boca agua.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowCrater = Eso sí que es un cráter impresionante. Está tan erosionado que costó un poco identificarlo como tal.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowRiftValleys = Este cañón masivo se extiende por la superficie de Uleg, formando un circuito gigante hasta el polo norte. Sería una pista de carreras aéreas fenomenal, si no fuera por la atmósfera extremadamente delgada. ¡Maldita sea, destino! Bueno... Quizás para los verdaderos temerarios aún funcionaría. ¡También existe la posibilidad de carreras terrestres!
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowBasins = La amplia cuenca abierta parece tener un terreno muy plano. Podría ser un buen lugar para construir una base, si te apetece. Pero con la absurda órbita de Uleg, probablemente hay mejores lugares.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowMountains = Pequeñas montañas salpican la superficie de Uleg como migas de galleta de chocolate en un vasto océano de helado de vainilla. ¡Maldita sea, ahora tienes hambre de nuevo!
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceHigh = Este tenue blanet parece brillar en la oscuridad como una bola de postre irresistible. Prácticamente te pide que te acerques...

		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceLow = El análisis de superficie indica que la superficie de Uleg está compuesta principalmente de hielo de agua.
		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceLowMountains = Los datos de las imágenes de las montañas más oscuras de Uleg muestran que la superficie sigue siendo hielo de agua. Es probable que una estructura cristalina diferente explique su color más oscuro.
		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceHigh = La delgada atmósfera de Uleg parece estar compuesta principalmente de nitrógeno según el análisis de espectro amplio, con cantidades significativas de metano y dióxido de carbono también.

		#LOC_KS_SciDef_dmSIGINT_Uleg_InSpaceLow = La delgada y tranquila atmósfera de Uleg y su distancia de Kcalbeloh dan como resultado un entorno de radio bastante poco interesante.

		#LOC_KS_SciDef_dmNAlbedoScan_Uleg_SrfLanded = La señal clara de neutrones de baja energía confirma que la mayor parte de la superficie de Uleg está hecha de hielo de agua. ¡Gélido!

		#LOC_KS_SciDef_dmlaserblastscan_Uleg_SrfLandedGeneric = El análisis químico de la superficie helada de Uleg muestra que la mayor parte del blanet está cubierta por una fina capa de hielo de agua duro y quebradizo, con hielo mucho más sólido y oscuro debajo. También hay trazas de hielo de metano y dióxido de carbono en este recubrimiento superficial. Puede haber sido depositado aquí por los vientos gélidos.
		#LOC_KS_SciDef_dmlaserblastscan_Uleg_SrfLandedMountainsCliffs = Esta región de Uleg tiene una coloración más oscura que el resto, pero el análisis muestra que la composición química sigue siendo mayormente hielo de agua, probablemente de una estructura cristalina diferente a la fina capa que cubre el resto de la superficie.

		#LOC_KS_SciDef_dmSolarParticles_Uleg_InSpace = Tan lejos de Kcalbeloh, el «viento holar» es muy escaso, y aún más cuando Uleg está alto en su órbita. Esto significa que no hay mucho que el colector pueda procesar aparte de trazas de partículas de nitrógeno, probablemente de la atmósfera de Uleg.

		#LOC_KS_SciDef_dmSoilMoisture_Uleg_InSpaceLow = Uleg está compuesto principalmente de agua según las emisiones de microondas, que son muy fuertes independientemente de qué región de Uleg esté actualmente debajo.

		#LOC_KS_SciDef_dmRadiometerScan_Uleg_InSpaceHigh = La superficie de Uleg tiene un albedo bastante alto en todo el espectro visible e infrarrojo, sin embargo, parece absorber fuertemente la luz UV. Esto indica grandes cantidades de hielo de agua en la superficie.

		#LOC_KS_SciDef_dmseismicHammer_Uleg_SrfLanded = La superficie helada y quebradiza se agrieta fácilmente al impactar el martillo, pero las ondas aún viajan bastante bien. Las lecturas indican criovulcanismo activo en todo Uleg.

		#LOC_KS_SciDef_dmbiodrillscan_Uleg_SrfLanded = La muestra de núcleo está llena de hielo, metano y un poco de dióxido de carbono, pero no mucho más. Es poco probable que el metano sea de origen biológico.

		// Maelg
		#LOC_KS_SciDef_rpwsScan_Maelg_InSpaceLow = A pesar de que Maelg está fusionando deuterio y litio, no parece estar escapando del objeto, o al menos no en cantidades significativas.
		#LOC_KS_SciDef_rpwsScan_Maelg_InSpaceHigh = Siendo una enana marrón, Maelg no produce realmente viento solar. Sin embargo, la actividad magnética sí produce algunas lecturas interesantes.

		#LOC_KS_SciDef_scopeScan_Maelg_InSpaceLow = Para no ser una estrella (técnicamente), Maelg es bastante brillante desde esta distancia. Por suerte, el telescopio vino con filtros. Captura imágenes de alta resolución de las furiosas tormentas naranjas de Maelg; ¡como una especie de versión loca de Jool hecha de fuego!
		#LOC_KS_SciDef_scopeScan_Maelg_InSpaceHigh = El telescopio puede enfocar fácilmente en Maelg sin daños gracias a su muy baja luminosidad, permitiendo capturar imágenes muy detalladas del objeto subestelar.

		#LOC_KS_SciDef_dmImagingPlatform_Maelg_InSpace = El análisis espectral de Maelg corrobora la clasificación anterior como objeto tipo L, y muestra evidencia clara de deuterio y litio siendo fusionados en helio-3 y helio-4, respectivamente. 

		#LOC_KS_SciDef_dmSIGINT_Maelg_InSpaceLow = Una auténtica ráfaga de emisiones de radio emana de Maelg en todo momento, mientras su interior se agita y fluye violentamente.

		#LOC_KS_SciDef_dmSolarParticles_Maelg_InSpaceLow = Varios isótopos de helio se depositan en los colectores, pero ni de lejos tanto como se recibiría de una estrella verdadera.
		#LOC_KS_SciDef_dmSolarParticles_Maelg_InSpaceHigh = Como enana marrón tipo L, la fusión de deuterio y litio de Maelg no produce viento solar detectable, y los colectores permanecen vacíos.

		#LOC_KS_SciDef_dmSoilMoisture_Maelg_InSpaceLow = Se detectan potentes emisiones de microondas, pero es imposible que provengan de depósitos de agua, ya que Maelg es una ENANA MARRÓN. Por si lo habías olvidado. No es un planeta ni una estrella.

		#LOC_KS_SciDef_dmRadiometerScan_Maelg_InSpaceHigh = Maelg emite comparativamente poca luz en el espectro visible, pero es mucho más visible en el rango infrarrojo. De cualquier forma, a esta distancia no es difícil de ver.

		// Mehtna
		#LOC_KS_SciDef_dmMagScan_Mehtna_SrfLanded = El campo magnético de Mehtna sigue siendo débil desde la superficie, aunque fácilmente detectable.

		#LOC_KS_SciDef_rpwsScan_Mehtna_InSpace = Dado que la atmósfera de Mehtna es bastante tranquila, el planeta carece de un campo magnético fuerte y Maelg no emite viento solar significativo, apenas hay actividad que detectar aquí.

		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowDay = Varias características interesantes están presentes en el «iris» marrón oscuro de Mehtna, formando patrones únicos.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowIce = Grietas bellamente intrincadas recorren la superficie de Mehtna en las regiones iluminadas, produciendo fotos fascinantes.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowNight = Hmm... Sí, desde luego está oscuro.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowGrandCrater = ¡La superficie mayormente sin cráteres de Mehtna hace que este enorme cráter sea una característica bastante llamativa!
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceHigh = El «Polo Cálido» de Mehtna hace que parezca realmente un globo ocular, siempre mirando directamente a Maelg. Es un poco inquietante, la verdad.

		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowDayGrandCrater = Los escaneos multiespectrales de la superficie más oscura de Mehtna indican una superficie mayormente estándar de silicatos.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowIce = La sustancia blanca parece ser hielo de agua, como predijo nuestro análisis anterior de la temperatura y atmósfera del planeta. No hay líquido presente porque su baja presión hace que el agua sublime directamente a gas.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowNight = Los escaneos IR muestran una superficie desolada en el «polo frío» de Mehtna, cubierta de cráteres y mayormente carente de las grietas vistas en el lado visible.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceHigh = El análisis espectral revela que la atmósfera de Mehtna es mayormente dióxido de carbono y vapor de agua; este último probablemente se produce por la sublimación del hielo en el lado diurno.

		#LOC_KS_SciDef_dmSIGINT_Mehtna_InSpaceLow = Hmm... Lamentablemente, solo silencio de radio desde Mehtna.

		#LOC_KS_SciDef_dmNAlbedoScan_Mehtna_SrfLandedRock = Las zonas más oscuras de Mehtna están, quizás de forma inesperada, mayormente desprovistas de depósitos de agua. Probablemente porque a estas temperaturas y presiones, el agua sublima directamente a gas en lugar de volverse líquida.
		#LOC_KS_SciDef_dmNAlbedoScan_Mehtna_SrfLandedIce = La superficie helada aquí produce una fuerte señal de neutrones de baja energía, confirmando que es hielo de agua.

		#LOC_KS_SciDef_dmlaserblastscan_Mehtna_SrfLandedRock = El análisis láser indica más silicatos. ¡Genial! ¡Para nada aburrido! Para nada...
		#LOC_KS_SciDef_dmlaserblastscan_Mehtna_SrfLandedIce = Todo sobre las propiedades de Mehtna, desde su temperatura hasta su atmósfera, indica que esto solo puede ser hielo de agua. Te dejo adivinar qué muestra el análisis químico.

		#LOC_KS_SciDef_dmSolarParticles_Mehtna_InSpace = El espacio cerca de Mehtna está muy vacío, como en órbita de Maelg. Pero cerca del planeta hay algunas trazas de dióxido de carbono.

		#LOC_KS_SciDef_dmSoilMoisture_Mehtna_InSpaceLow = Las emisiones de microondas hacen obvio que gran parte de Mehtna está cubierta de hielo de agua, aunque incluso sobre las áreas más secas orientadas al sol (¿a la enana?), permanece un fondo constante. Esto se explicaría bien por el vapor de agua en la atmósfera.

		#LOC_KS_SciDef_dmRadiometerScan_Mehtna_InSpaceHigh = La gran mancha oscura de Mehtna y su firma absorbente de UV confirman que está cubierto de hielo de agua, y los espectros de su atmósfera sugieren una composición mayoritaria de dióxido de carbono y vapor de agua.

		#LOC_KS_SciDef_dmseismicHammer_Mehtna_SrfLanded = Las reflexiones subsuperficiales muestran poca evidencia de actividad geológica en Mehtna.

		#LOC_KS_SciDef_dmbiodrillscan_Mehtna_SrfLanded = La muestra de núcleo permanece decepcionantemente, pero como se esperaba, inerte.

		// Meiuqer
		#LOC_KS_SciDef_dmMagScan_Meiuqer_SrfLanded = Revisas el magnetómetro por principio. Nada, ni siquiera campos magnéticos localizados generados por depósitos de metal.

		#LOC_KS_SciDef_rpwsScan_Meiuqer_InSpace = En este rincón particular del espacio, casi no hay nada que el instrumento RPWS pueda detectar. Casi ninguna actividad de radio, ningún plasma solar, nada. Pero lo compruebas de todos modos. Por si acaso.

		#LOC_KS_SciDef_scopeScan_Meiuqer_InSpaceLow = Oh, en realidad es una roquita bastante encantadora. Con remolinos y marrón, recuerda a un donut cubierto de azúcar moreno.
		#LOC_KS_SciDef_scopeScan_Meiuqer_InSpaceHigh = Mmmm... Patatas espaciales...

		#LOC_KS_SciDef_dmImagingPlatform_Meiuqer_InSpace = ¡Es una roca! ¡Sé que es una roca! ¿No crees que reconozco una roca cuando la veo? ¡Paso mucho tiempo mirando fotos de rocas!

		#LOC_KS_SciDef_dmSIGINT_Meiuqer_InSpaceLow = Las rocas no emiten señales de radio, tonto.

		#LOC_KS_SciDef_dmNAlbedoScan_Meiuqer_SrfLanded = Sabes, cuando me apunté para supervisar misiones espaciales, esperaba ver muchas explosiones. No quedarme mirando telemetría aburrida todo el día.

		#LOC_KS_SciDef_dmlaserblastscan_Meiuqer_SrfLanded = Estoy en tu roca, lazrando tus rocas.

		#LOC_KS_SciDef_dmSolarParticles_Meiuqer_InSpace = Por un momento, habrías jurado que el colector de partículas solares estaba roncando.

		#LOC_KS_SciDef_dmSoilMoisture_Meiuqer_InSpaceLow = No hay lecturas de microondas, excepto las del microondas del centro espacial: el becario que monitorea la transmisión está calentando unos fideos picantes.

		#LOC_KS_SciDef_dmRadiometerScan_Meiuqer_InSpaceHigh = Meiuqer tiene un albedo muy bajo debido a su superficie oscura, un hecho agravado por la extrema tenuidad de la luz procedente de Maelg.

		#LOC_KS_SciDef_dmseismicHammer_Meiuqer_SrfLanded = Como asteroide de «pila de escombros» de baja densidad, Meiuqer está unido muy débilmente, y parte del escombro del impacto sin duda alcanzó la velocidad de escape. Esto también significa que no obtuviste datos útiles.

		// Sunorc
		#LOC_KS_SciDef_dmMagScan_Sunorc_InSpaceLow = El brazo parece tener problemas para mantener la integridad estructural, ya que actualmente se está convirtiendo en líquido.

		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceLow = El instrumento detecta numerosas manchas solares al analizar las ondas de radio que emite la superficie de Sunorc.
		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceHigh = Esta estrella tipo K emite poderosos vientos solares, como suelen hacer la mayoría de estrellas. Las interacciones con la magnetosfera de Sedah son notables, ya que las ondas de radio que emite el planeta son más débiles de lo esperado para un objeto de su tamaño.

		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceLow = Bueno, esto fue un desperdicio de dinero. Puede que hayas arruinado el telescopio orbital.
		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceHigh = ¡Maniático! ¿Intentas destruir el telescopio? ¡Este dispositivo está diseñado para fotografía planetaria!

		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceLow = Has anulado la garantía.
		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceHigh = Bueno, fue una mala idea. Los instrumentos sensibles se apagaron automáticamente en cuanto se enfocaron en Sunorc, y pueden haberse dañado.

		#LOC_KS_SciDef_dmSIGINT_Sunorc_InSpaceLow = Como la mayoría de estrellas, Sunorc emite ondas de radio en un amplio espectro. Los picos de actividad de radio parecen correlacionarse con la formación y movimiento de manchas solares.

		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceLow = La abrumadora densidad del viento solar obliga al dispositivo a apagarse, impidiendo recoger datos útiles. Esperemos que no esté dañado.
		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceHigh = El viento solar de Sunorc es típico de una estrella, aunque es un poco más débil que una estrella tipo G como Kerbol.

		#LOC_KS_SciDef_dmSoilMoisture_Sunorc_InSpaceLow = Quizás sería mejor no desplegar equipos sensibles para detectar emisiones de microondas en órbita estelar baja. Tal vez. Quizás.

		#LOC_KS_SciDef_dmRadiometerScan_Sunorc_InSpaceHigh = Sunorc emite mucha luz en la mayoría de longitudes de onda registradas; sin embargo, como estrella tipo K (o enana naranja) emite considerablemente menos luz azul y UV que una estrella tipo G (o enana amarilla) como Kerbol. Por su menor temperatura, estos tipos de estrellas pueden vivir miles de millones de años más que las enanas amarillas.

		// Sedah
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceLow = El viento solar golpea con fuerza la atmósfera esponjosa de Sedah, produciendo extrañas señales desde el interior del planeta. Esto sugiere que una corriente eléctrica recorre el planeta, lo que produciría mucho calor interno y ayudaría a explicar su enorme tamaño. Sin embargo, no debe ser tan potente como se esperaba, ya que esta corriente solo produce un campo magnético que, aunque potente, es un poco débil en comparación con Jool.
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceHigh = El plasma energizado bombardea Sedah, resultando en un fascinante patrón repetitivo de ondas de radio que debería dar a los del laboratorio muchos datos para estudiar.

		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceLow = Las fotos de primer plano revelan nubes turbulentas en remolino y enormes huracanes, ¡algunos lo suficientemente grandes como para tragarse planetas enteros!
		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceHigh = El planeta brilla por el intenso calor de su atmósfera, haciendo que incluso el lado oscuro brille tenuemente.

		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceLow = La composición atmosférica sugiere que el planeta normalmente podría haber tenido una coloración más cremosa, pero gracias al calor extremo brilla con un rojo apagado.
		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceHigh = Sedah irradia calor muy intensamente, haciendo que emita mucha más luz infrarroja de lo que un planeta gaseoso normalmente emitiría.

		#LOC_KS_SciDef_dmSIGINT_Sedah_InSpaceLow = Las emisiones de radio de Sedah son enormemente variadas e inmensamente potentes, probablemente debido a las complejas interacciones entre el viento solar y sus propios procesos internos.

		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceLow = En el lado nocturno se detectan partículas traza de hidrógeno y helio al orbitar a través de la enorme exosfera de Sedah. En el lado diurno, el colector es bombardeado con partículas cargadas del viento solar.
		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceHigh = No se detecta mucho además del viento solar aquí, aunque hay ligeras trazas de hidrógeno y helio ordinarios que se vuelven más comunes al orbitar detrás de Sedah.

		#LOC_KS_SciDef_dmSoilMoisture_Sedah_InSpaceLow = Las fuertes emisiones de microondas detectadas en órbita de Sedah son, sin duda, producidas por los mecanismos internos del planeta.

		#LOC_KS_SciDef_dmRadiometerScan_Sedah_InSpaceHigh = Se registra una intensa lectura térmica de los escaneos de Sedah, incluso en el lado nocturno. Esto está claramente causado por la ridículamente alta temperatura del planeta gigante.

		// Suluco
		#LOC_KS_SciDef_dmMagScan_Suluco_SrfLanded = Suluco parece tener un campo magnético débil desde la superficie, lo que significa que no ofrece tanta protección contra el viento solar como sería ideal. Sin embargo, la vida en la franja crepuscular persiste de todos modos, ya que la exposición al sol es limitada allí.
		#LOC_KS_SciDef_dmMagScan_Suluco_InSpaceHigh = A esta distancia, el campo magnético de Suluco es muy tenue. No parece extenderse muy lejos por encima de la superficie.

		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceHigh = La magnetosfera relativamente débil de Suluco no desvía mucho el viento solar de Sunorc, pero parece hacer lo suficiente para proteger la vida en la superficie.
		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceLow = El análisis de ondas de plasma indica un anillo difuso de partículas cargadas alrededor del ecuador de Suluco; signos de un tenue cinturón Van Kerman.

		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceHigh = Aunque se le llama planeta ojo, Suluco no se parece mucho a un ojo. Sin embargo, el contraste marcado entre su llamado «polo caliente» y la franja crepuscular es llamativo.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDay = El lado diurno de Suluco es casi cegadoramente brillante y se ve seco como un hueso. Interminables mares de dunas de arena ondulantes caracterizan la región.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDayPole = El punto subestelar es cegador; refleja mucha luz y parece tan caliente que probablemente podrías cocinar huevos en él. Incluso las nubes parecen haberse vaporizado.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowNight = No se ve nada.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowTwilight = Las estrechas regiones templadas de Suluco tienen colinas verdes ondulantes y océanos abiertos. Notas en varias fotos que las nubes giran alrededor de los polos diurno y nocturno, en lugar del eje de rotación del planeta.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowWater = Los océanos de Suluco están confinados a una estrecha franja a lo largo del terminador día-noche, igual que la vida. Las corrientes oceánicas en estas regiones son como nada que los Kerbals hayan visto antes.

		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceHigh = Un escaneo completo de la atmósfera de Suluco en espectros UV e IR revela que está compuesta principalmente de nitrógeno y oxígeno, como se esperaba.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDay = El lado diurno de Suluco devuelve la luz directamente a Sunorc, reflejando mucha luz en espectros UV e IR.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDayPole = El punto subestelar refleja con diferencia la mayor cantidad de luz solar, causando un pico notable en las lecturas de IR.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowNight = La imagen infrarroja permite una visión más clara del lado nocturno de Suluco. La topografía es, curiosamente, bastante similar al lado diurno, ya que está dominada en gran parte por colinas y montañas. Sin embargo, interesantemente, el lado nocturno de Suluco también está cubierto de cráteres.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowTwilight = Los gases traza detectados durante el análisis muestran claras señales de actividad biológica en curso en la franja crepuscular, aunque se van disminuyendo cuanto más lejos miras hacia el lado diurno o nocturno.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowWater = La imagen térmica revela la topografía submarina de los océanos de Suluco. Dada su geografía inusual, hay mucho que estudiar aquí.

		//Non-Homeswitch Suluco Only
		#LOC_KS_SciDef_dmSIGINT_Suluco_InSpaceLow = El viento solar produce algunas actividades de ondas de radio ligeramente interesantes, pero en realidad no hay nada fuera de lo común.

		//Suluco Homeswitch Only
		#LOC_KS_SciDef_dmSIGINT_SulucoHome_InSpaceLow = Los escaneos de radio captan transmisiones dispersas de varias colonias y estructuras superficiales. Algunos pequeños puestos avanzados están incluso ubicados bastante adentro de ambos hemisferios diurno y nocturno. Los Kerbals no llevan aquí tanto tiempo, pero en ese tiempo ya hemos empezado a hacer que Suluco se sienta como en casa. ¡Si sintonizas bien, incluso puedes captar el último partido de headball!

		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDay = Las trazas de hidrógeno subsuperficial son prácticamente inexistentes aquí. Solo existen pequeñas trazas en zonas de sombra permanente.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDayPole = En el punto subestelar, la superficie no está seca como un hueso; al menos esos tienen ALGO de agua. El único hidrógeno aquí parece consistir en trazas depositadas por el constante viento solar.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDesert = Hay un poco de hidrógeno en esta región, indicando agua enterrada un poco bajo la superficie. Está seco, pero es habitable.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedNight = Según los escaneos de hidrógeno... o, eh, escaneos visuales, hielo de agua sólido cubre cada superficie en el lado nocturno. La nieve gélida sopla y fluye como arena en los páramos sin luz.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedTwilight = Se encuentran concentraciones muy altas de hidrógeno en el suelo de la franja crepuscular, mayormente agua por supuesto. La mayoría del agua líquida del planeta puede encontrarse aquí.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedWater = La superficie extremadamente húmeda aquí contiene naturalmente muchísimo hidrógeno, y absorbe la mayoría de los neutrones. Esperas no estar contaminando el océano o algo así.

		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedTwilight = Se detectan compuestos de carbono del follaje así como varios tipos de roca en las emisiones.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDesert = Este desierto árido sigue mostrando claras señales de vida, ya que vaporizar la capa superior de roca revela pequeños túneles excavados por insectos alienígenas y las raíces de un tipo resistente de hierba.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDay = La superficie blanqueada por el sol no tiene un componente orgánico apreciable; todo es arena y roca.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNight = En la oscuridad del lado nocturno solo se encuentran hielo de agua y trazas de varios minerales. Incluso las montañas están cubiertas de gruesos glaciares permanentes tan sólidos como la roca.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNightCraters = Este cráter de impacto contiene significativamente más compuestos minerales y metales en la superficie que los perma-glaciares circundantes, casi seguramente originados del impactador que formó el cráter.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfSplashedWater = Vaporizar el fluido confirma que es efectivamente agua, pero seguramente no necesitabas este instrumento especializado para determinarlo.

		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceLow = Además del viento solar algo debilitado, partículas de nitrógeno y oxígeno de la atmósfera de Suluco también se incrustan en las obleas.
		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceHigh = El débil campo magnético de Suluco hace poco para detener el viento solar que impacta las obleas; el entorno aquí no es muy diferente del espacio interplanetario.

		#LOC_KS_SciDef_dmSoilMoisture_Suluco_InSpaceLow = Las emisiones de microondas en banda L son bastante constantes en la mayor parte de la superficie de Suluco; sin embargo, cuando la antena pasa sobre el hemisferio diurno, las lecturas van bajando gradualmente hasta casi cero sobre el punto subestelar.

		#LOC_KS_SciDef_dmRadiometerScan_Suluco_InSpaceHigh = El albedo varía drásticamente dependiendo de si el sensor ve más del hemisferio diurno o de la franja crepuscular; mucho más que la mayoría de cuerpos celestes.

		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedTwilight = El suelo blando absorbe parte de las ondas, pero aún da una idea de cómo varía la geología entre los lados diurno y nocturno de Suluco.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedDay = El arenoso lado diurno de Suluco es fantástico para absorber ondas sísmicas, así que realmente no puedes aprender mucho aquí. ¿Quizás tendrías más suerte en las montañas?
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedNight = La nieve está densamente compactada aquí, haciendo imposible extraer algo útil de los datos. Los glaciares montañosos pueden ofrecer más información.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsDayTwilight = La superficie dura conduce bien las ondas sísmicas, dándote amplia oportunidad de estudiar el interior de Suluco. Parece que Suluco sigue siendo bastante geológicamente activo, aunque la actividad volcánica es muy escasa.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsNight = El glaciar similar a roca refleja limpiamente a través de la corteza de Suluco, mostrándote evidencia de cavernas subsuperficiales masivas que pueden contener agua líquida, ¡y potencialmente ecosistemas aislados!
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedWater = El suelo suelto refleja mal las ondas sísmicas, así que no obtienes muchos datos útiles.

		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterShallow = Las aguas crepusculares poco profundas de Suluco albergan toda una colección de vida microscópica y macroscópica; pero ninguna es más fascinante que las «colonias» de plantas coloniales. Flotan en enormes esteras en la superficie del océano, con velas masivas que captan tanto el viento como el sol.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterDeep = En las profundidades bajo la superficie, una amplia variedad de animales coloridos navegan por el fondo marino. En muchos aspectos son como la vida en Kerbin, pero muy diferentes en otros. Para empezar, sin ciclo día/noche, no hay migración vertical diurna.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanShallow = Las condiciones gélidas en los océanos del lado casi oscuro de Suluco recuerdan a un océano ártico, pero como está tan cerca de aguas más cálidas, la temperatura cambia mucho más rápido, y algunos animales se mueven entre ambas en cuestión de horas.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanDeep = La vida marina profunda es muy similar en todo Suluco. Al estar aislada del sol sin importar la ubicación, la vida aquí es difícil de distinguir de la de longitudes más cálidas.

		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTwilight = La muestra de núcleo está repleta de vida; no es sorpresa considerando el color verde del suelo aquí. Pequeños organismos excavan túneles en la tierra y establecen pequeñas madrigueras donde crían a sus jóvenes con seguridad.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDesert = A pesar de las condiciones más duras, la vida aquí prospera tanto como en los desiertos de Kerbin. La arena está caliente, pero también proporciona un buen respiro del sol implacable para animales astutos, y representa una oportunidad en forma de recursos sin explotar, si algo es lo suficientemente valiente como para enfrentar el calor.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTundra = Las tundras crepusculares de Suluco tienen un brillo inquietante en todo momento; apropiado considerando que se sienten frías como la tumba. Aún así, la vida sobrevive aquí. Mientras que en el lado diurno un insecto podría excavar para escapar del sol, aquí excavan para atrapar calor y mantenerse calientes. Muchos animales anidan aquí porque las duras condiciones también ofrecen seguridad contra los depredadores.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDay = Aunque no esperas encontrar nada, podrías sorprenderte al ver que incluso aquí sobreviven pequeños animales, además de microorganismos resistentes. Los animales son universalmente pequeños y tienen que pasar casi toda su vida bajo tierra para evitar la luz solar, pero se han adaptado para soportar el calor en zonas sombreadas. Como el sol nunca se mueve, estos puntos sombreados son permanentes.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNight = El lado nocturno de Suluco es desolado e implacable, pero si la vida pudo sobrevivir en los polos de Kerbin, también puede aquí. En contraste con los pequeños animales del lado diurno, estos suelen ser enormes, para generar tanto calor corporal como sea posible, que almacenan en gruesas capas de grasa. Se sabe que algunas especies incluso migran a través de tramos cortos del lado nocturno para evitar depredadores.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDayPole = A pesar de la persistencia de la vida en Suluco, la escasa presencia en el lado diurno se va disminuyendo gradualmente hasta que llegas al punto subestelar, un lugar tan caliente, tan desolado e inhóspito, que nada más que microorganismos extremófilos puede sobrevivir aquí. Aún así, a pesar de todo, ALGO vive aquí. ¿No es increíble?
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNightPole = El polo nocturno es la parte absolutamente más fría de Suluco. En ningún lugar de Kerbin hace tanto frío. Y sin embargo... Una especie persiste. Bestias titánicas surcan el cielo en bandadas enormes, navegando de un extremo de la franja crepuscular al otro atravesando directamente el lado nocturno. Recorren la distancia en apenas días, sobreviviendo gracias a su grueso aislamiento y planeando en el aire denso y gélido.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedWater = Algunos organismos marinos parecen haber puesto sus huevos en la orilla aquí; una vista común en las playas de Suluco. Los grandes invertebrados pondrán sus huevos aquí, enterrándolos en la arena, para protegerlos de los depredadores acuáticos.

		// Tot
		#LOC_KS_SciDef_dmMagScan_Tot_SrfLanded = Todavía no hay actividad magnética que mencionar, aparte de Suluco.

		#LOC_KS_SciDef_rpwsScan_Tot_InSpace = El viento solar de Sunorc es fuerte aquí, solo realmente amaina cuando pasas por la magnetocola de Suluco o la sombra de Tot.

		#LOC_KS_SciDef_scopeScan_Tot_InSpaceLow = El telescopio captura muchas rocas diminutas y cráteres en la superficie de Tot con gran detalle, pero parece un poco excesivo para este trabajo.
		#LOC_KS_SciDef_scopeScan_Tot_InSpaceHigh = Para ser completamente justos con Tot, es una patatita bastante adorable.

		#LOC_KS_SciDef_dmImagingPlatform_Tot_InSpace = Tot parece ser un asteroide principalmente rocoso según el análisis multiespectral. Vale, ¿hemos terminado aquí?

		#LOC_KS_SciDef_dmSIGINT_Tot_InSpaceLow = Lo siento, no hay nada interesante aquí.

		#LOC_KS_SciDef_dmNAlbedoScan_Tot_SrfLanded = No se detecta nada notable en los escaneos de la superficie aquí.

		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLanded = El asteroide parece principalmente rocoso, pero en realidad hay un poco más de metal aquí de lo anticipado. Un estudio más profundo, particularmente en las regiones más bajas, puede resultar revelador.
		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLandedLowlands = Las regiones bajas de Tot tienen una concentración de metal mucho mayor de lo esperado. Parece que la composición de Tot es una mezcla de rocoso y metálico. Esto podría explicar su densidad inusualmente alta.
		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLandedCraters = Los cráteres de impacto en Tot revelan partes más profundas del asteroide que son mayormente metálicas. Si el interior es todo así, podría ser por eso que tiene más del doble de la gravedad de Gilly a pesar de ser poco menos de un tercio de su tamaño.

		#LOC_KS_SciDef_dmSolarParticles_Tot_InSpace = El contenido del viento solar aquí no es diferente al que había en órbita de Suluco.

		#LOC_KS_SciDef_dmSoilMoisture_Tot_InSpaceLow = Los resultados del experimento... son demasiado aburridos de describir, por desgracia.

		#LOC_KS_SciDef_dmRadiometerScan_Tot_InSpaceHigh = La mayor parte de la superficie de Tot es oscura y absorbe tanto luz visible como IR; sin embargo, las regiones más bajas son marginalmente más reflectantes. Curioso...

		#LOC_KS_SciDef_dmseismicHammer_Tot_SrfLanded = ¡Cuidado! ¡Lo vas a romper! No, no el martillo, tonto, ¡el asteroide!
		#LOC_KS_SciDef_dmseismicHammer_Tot_SrfLandedLowlandsCraters = El impacto resuena más de lo esperado, dando una imagen clara del interior completo de Tot. El asteroide parece haber sido en su día dos cuerpos: un asteroide metálico y un impactador rocoso. Esta es la explicación más sencilla para la composición muy variada, que va desde piedra suelta y poco resonante hasta secciones sólidas ricas en hierro y níquel que se vuelven más comunes cuanto más profundo vas. Esto tiene que ser por qué Tot es tan denso.

		// Sera
		#LOC_KS_SciDef_dmMagScan_Sera_SrfLanded = Las líneas del campo magnético se extienden en todas direcciones sobre la superficie de Sera, indicando la clara presencia de muchos campos magnéticos locales potentes en las cercanías.
		#LOC_KS_SciDef_dmMagScan_Sera_InSpaceHigh = Lecturas magnéticas fuertes, incluso a esta altitud, indican que una potente magnetosfera rodea a Sera. Es posible que las fuerzas de marea de Dipuc hayan ayudado a mantener activo el núcleo de Sera, pero ¿está realmente lo suficientemente cerca para eso?

		#LOC_KS_SciDef_rpwsScan_Sera_InSpaceLow = Un anillo de partículas cargadas parece estar rodeando a Sera en órbita baja; inconfundiblemente un peligroso cinturón Van Kerman.
		#LOC_KS_SciDef_rpwsScan_Sera_InSpaceHigh = Al pasar por la magnetocola de Sera, el ya débil viento solar disminuye significativamente. Otras lecturas sugieren que el campo magnético de Sera es bastante fuerte.

		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowLakes = Estos lagos parecen tener una especie de color marrón melocotón, como la atmósfera. A bote pronto, no hay forma de saber si son agua o no con solo mirar.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowIslands = Pequeñas islas asoman desde los enormes lagos, ¿o serían mares interiores? Uno se pregunta cómo será la vista desde esas costas alienígenas.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowRiftValley = Esto parece ser algún tipo de rift valley, un tipo de valle formado cuando la litosfera se separa por tectónica extensional. Es una evidencia bastante clara de tectónica activa en Sera, al menos desde hace unos buenos cientos de millones de años.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowGeneric = Las colinas y llanuras de color melocotón de Sera se ven decididamente apetitosas. Ha empezado a recordarte demasiado a una fruta.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowMountains = Colosales cordilleras abarcan gran parte de la superficie de Sera. Una mirada más cercana revela valles en forma de vetas que se extienden entre los picos, formando hermosos patrones no muy distintos de un fractal.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceHigh = Desde lo alto sobre Sera, sus anillos se revelan con nitidez. El color y brillo de los anillos sugerirían que son de composición rocosa, quizás con algo de hielo también, y probablemente fueron en su día una pequeña luna destrozada. Con tiempo y algunas simulaciones, podremos averiguar cómo podría haber sido esa luna.

		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceLow = Los escaneos espectrales muestran que la superficie de Sera contiene altas cantidades de metales pesados; en particular, hierro, aluminio y titanio son bastante prevalentes. Esto ayuda a explicar su color marrón rosáceo.
		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceLowLakes = El espectro de absorción de este líquido deja bastante claro que es agua, no algún otro fluido.
		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceHigh = El análisis espectroscópico de los anillos de Sera apunta hacia una composición silícea, en lugar de metálica como su planeta padre. Una posible explicación de la discrepancia es que el cuerpo que formó estos anillos era un asteroide capturado.

		#LOC_KS_SciDef_dmSIGINT_Sera_InSpaceLow = Patrones de radio intrincados pero típicos son generados por las interacciones entre el viento solar de Sunorc y la atmósfera de Sera.

		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedLakes = Los neutrones de alta energía producen una respuesta clara que indica que, dadas la temperatura y presión, el líquido debe ser agua.
		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedLowlandsIslands = El suelo aquí está húmedo y produce una señal constante que indica depósitos de agua subsuperficiales.
		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedRock = La roca aquí está bastante seca, y el instrumento solo detecta trazas de hidrógeno bajo la superficie.

		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedLowlands = Las zonas más rosadas y bajas de Sera parecen estar compuestas de roca rica en hierro, con una buena cantidad de aluminio y titanio también, que diluyen el color y le dan ese aspecto marrón rosáceo.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedMidlandsHighlands = Las zonas más oscuras y elevadas de Sera son pobres en aluminio y titanio comparadas con las tierras bajas, lo que explica su color.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedMountains = Las montañas de Sera parecen ser muy ricas en magnetita natural, un tipo de mineral de hierro altamente magnético.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedPeaks = El análisis muestra que esta sustancia es hielo de agua, lo cual tiene sentido dada la altitud.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedPoles = Los polos de Sera parecen carecer de casquetes de hielo, pero el análisis muestra que sí existe aquí una ligera capa de hielo de agua.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedLakesIslands = El suelo húmedo aquí sigue siendo rico en metales como la mayor parte de la superficie, aunque también hay una alta concentración de agua.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfSplashed = Los escaneos del líquido confirman que es agua, como se esperaba. Sin embargo, hay una alta concentración de metales pesados y otras toxinas; haciendo la presencia de vida extremadamente improbable.

		#LOC_KS_SciDef_dmSolarParticles_Sera_InSpaceLow = Grandes cantidades de partículas cargadas y trazas de dióxido de carbono, nitrógeno e incluso algunos metales pesados se incrustan en los colectores. Esta es una evidencia bastante clara de un cinturón Van Kerman, pero las otras partículas deben provenir de la atmósfera de Sera.
		#LOC_KS_SciDef_dmSolarParticles_Sera_InSpaceHigh = El viento solar a esta distancia se ha vuelto bastante débil, pero aún es fácil reunir un buen número de partículas solares con el concentrador de iones y las obleas.

		#LOC_KS_SciDef_dmSoilMoisture_Sera_InSpaceLow = Las fuertes emisiones de microondas sobre los lagos son una evidencia bastante clara de agua en relativa abundancia en Sera.

		#LOC_KS_SciDef_dmRadiometerScan_Sera_InSpaceHigh = La superficie y los lagos de Sera parecen absorber mucha luz UV e incluso IR de onda corta, sugiriendo una superficie rica en metales y una atmósfera llena de dióxido de carbono.

		#LOC_KS_SciDef_dmseismicHammer_Sera_Rocky = Las ondas sísmicas generadas por el impacto revelan un planeta muy tectónicamente activo. Las placas continúan moviéndose gradualmente sobre la superficie, y una intrincada serie de características menores puede formarse por las ligeras fuerzas de marea de su sistema de anillos y Dipuc.
		#LOC_KS_SciDef_dmseismicHammer_Sera_Wet = El suelo húmedo no resulta muy propicio para reflexiones sísmicas, y no obtienes muchos datos útiles. Un punto de vista más alto y rocoso podría ser mejor opción.

		#LOC_KS_SciDef_dmbathymetryscan_Sera_SrfSplashedShallow = El análisis químico no pinta un panorama bonito. Aunque el líquido es agua, está inundado de metales pesados tóxicos que hacen muy improbable sustentar vida.
		#LOC_KS_SciDef_dmbathymetryscan_Sera_SrfSplashedDeep = En las profundidades bajo la superficie del agua, los lagos de Sera no son menos tóxicos. La existencia de vida aquí es muy improbable.

		#LOC_KS_SciDef_dmbiodrillscan_Sera_SrfLanded = La muestra de núcleo está absolutamente llena de metales pesados altamente tóxicos, y nada que pueda ni siquiera interpretarse potencialmente como biofirma. Oh bien.

		// Dipuc
		#LOC_KS_SciDef_dmMagScan_Dipuc_SrfLanded = Las líneas del campo magnético parecen seguir características que no son visibles en su superficie. Esto podría deberse a que roca magnetizada fundida fluye en las profundidades.
		#LOC_KS_SciDef_bothMagScan_Dipuc_InSpaceLow = Dipuc tiene un campo magnético bastante sustancial, aunque no es tan potente como cabría esperar. Esto podría significar que su actividad volcánica se debe a una combinación de un núcleo aún fundido y fuerzas de marea de Sera.
		#LOC_KS_SciDef_bothMagScan_Dipuc_InSpaceHigh = A esta altitud se detecta una lectura magnética débil de Dipuc. Acercarse más facilitaría verificar su fuerza exacta.

		#LOC_KS_SciDef_rpwsScan_Dipuc_InSpaceLow = En el espacio cerca de Dipuc, el viento solar está siendo notablemente desviado por su respetable campo magnético.
		#LOC_KS_SciDef_rpwsScan_Dipuc_InSpaceHigh = Alto sobre la luna volcánica, las partículas cargadas son tan comunes como en órbita de Sera.

		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowGeneric = La superficie llena de calamidades y cráteres de Dipuc debe ofrecer vistas impresionantes en el suelo. No es frecuente ver una luna sin atmósfera tan interesante como esta. ¡Vaya, es al menos tan única como Sera!
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowCraterSouthCraterEast = La eyección de impacto se irradia desde este cráter como rayos de sol. ¡Y VAYA, esas líneas llegan muy lejos! Lo que sea que hizo este cráter tenía mucha energía.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowCraterWest = Este cráter considerable es un poco menos dramático que los dos más grandes, y la falta de eyección de impacto lo demuestra.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowDoubleCrater = Geológicamente hablando, esta no es una formación improbable en absoluto. Pero sigue siendo interesante ver cómo los bordes de estos dos cráteres se superponen entre sí.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowVolcano = Los volcanes de Dipuc están todos constantemente activos, y las erupciones menores ocurren con bastante regularidad. El telescopio capta una pluma de gas y polvo en forma de paraguas al ser expulsada de Dipuc y probablemente hacia la órbita de Sera.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowMountains = Estas pronunciadas crestas montañosas son tan claras como el día en el telescopio, y captura imágenes impactantes de las sombras que proyectan en la superficie inferior.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceHigh = Esta luna recuerda un poco a una bola de masa bien amasada. A juzgar por la actividad volcánica, parece estar haciendo un buen trabajo horneándose a sí misma.

		#LOC_KS_SciDef_dmImagingPlatform_Dipuc_InSpaceLow = Los escaneos UV muestran una atmósfera excepcionalmente delgada rica en azufre flotando baja sobre la superficie de la luna, probablemente producida activamente por sus volcanes.
		#LOC_KS_SciDef_dmImagingPlatform_Dipuc_InSpaceHigh = La imagen térmica muestra que las temperaturas varían enormemente en Dipuc, fuertemente correlacionadas con la actividad volcánica.

		#LOC_KS_SciDef_dmSIGINT_Dipuc_InSpaceLow = Sorprendentemente, Dipuc parece estar emitiendo débiles ondas de radio. Probablemente se requerirá un estudio a largo plazo para determinar la causa.

		#LOC_KS_SciDef_dmNAlbedoScan_Dipuc_SrfLanded = La superficie de Dipuc parece ser bastante pobre en hidrógeno según los escaneos de neutrones.
		#LOC_KS_SciDef_dmNAlbedoScan_Dipuc_SrfLandedPoles = Se indican trazas de hidrógeno aquí, probablemente originadas de pequeñas cantidades de hielo de agua subsuperficial.

		#LOC_KS_SciDef_dmlaserblastscan_Dipuc_SrfLanded = La superficie aquí está compuesta de roca silícea rica en metales pesados, sugiriendo una composición similar a Sera y un origen común. Se encuentra en forma de roca volcánica, naturalmente.

		#LOC_KS_SciDef_dmSolarParticles_Dipuc_InSpaceLow = El colector de partículas solares capta trazas de azufre y varios metales pesados, probablemente lanzados al espacio por las innumerables erupciones y puestos en órbita por la gravedad de Sera.
		#LOC_KS_SciDef_dmSolarParticles_Dipuc_InSpaceHigh = Alto sobre Dipuc, el viento solar es todo lo que el colector puede recolectar.

		#LOC_KS_SciDef_dmSoilMoisture_Dipuc_InSpaceLow = Se detectan débiles emisiones de microondas desde los polos, pero en ningún otro lugar. Dipuc, bastante predeciblemente, está bastante seco.

		#LOC_KS_SciDef_dmRadiometerScan_Dipuc_InSpaceHigh = La bastante oscura superficie volcánica de Dipuc tiene un albedo sorprendentemente alto en espectros no visibles, excluyendo longitudes de onda IR.

		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLanded = Dipuc tiene una estructura interior compleja. Los escaneos iniciales parecen sugerir que Dipuc está moldeado tanto por un núcleo aún fundido como por las fuerzas de marea de Sera.
		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLandedVolcano = Es imposible obtener una lectura clara de la composición interna de Dipuc aquí debido al constante retumbar. Aún así, esto proporciona datos fascinantes por derecho propio.
		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLandedVolcanoVent = Ahora bien. No os metáis en lava.

		// Noi
		#LOC_KS_SciDef_dmMagScan_Noi_SrfLanded = Hmm. No, todavía no hay campo magnético.
		#LOC_KS_SciDef_bothMagScan_Noi_InSpace = ¡El carbón no emite un campo magnético, ignorante!

		#LOC_KS_SciDef_rpwsScan_Noi_InSpace = El viento solar de Sunorc es extremadamente escaso a esta distancia, y Noi no parece tener ninguna influencia sobre él más allá de separar el flujo como una pequeña piedra en una corriente suave.

		#LOC_KS_SciDef_scopeScan_Noi_InSpaceLow = ¡¿A dónde fueron las estrellas?! Oh, es solo Noi. Falsa alarma...
		#LOC_KS_SciDef_scopeScan_Noi_InSpaceHigh = Vale, me rindo. ¿Qué se supone que debo estar mirando?

		#LOC_KS_SciDef_dmImagingPlatform_Noi_InSpaceLow = Se detectan roca rica en carbono y algunos materiales silíceos más rocosos en escaneos detallados de la superficie de Noi.
		#LOC_KS_SciDef_dmImagingPlatform_Noi_InSpaceHigh = La imagen térmica revela la verdadera frialdad de Noi. Es carbonáceo según los escaneos, pero podría haber sido fácilmente helado a esta distancia de Sunorc.

		#LOC_KS_SciDef_dmSIGINT_Noi_InSpaceLow = Do-dodo-do-doooo... Eh, nada. No hay actividad de radio aquí.

		#LOC_KS_SciDef_dmNAlbedoScan_Noi_SrfLanded = En un entorno tan tranquilo en gran parte desprovisto de neutrones ambientales, se puede tomar una lectura de alta precisión. Para su distancia de Sunorc, Noi carece mucho de hielo.

		#LOC_KS_SciDef_dmlaserblastscan_Noi_SrfLanded = Los escaneos de superficie indican una superficie extremadamente rica en carbono dispersa con otros minerales, mayormente silicatos.

		#LOC_KS_SciDef_dmSolarParticles_Noi_InSpace = Nada ha cambiado realmente en las cercanías de Noi en comparación con el espacio interplanetario.

		#LOC_KS_SciDef_dmSoilMoisture_Noi_InSpaceLow = Solo emisiones de microondas muy débiles indican que Noi es sorprendentemente seco para un asteroide tan lejos de Sunorc. Es posible que se formara más adentro y fuera expulsado al sistema exterior, terminando eventualmente aquí.

		#LOC_KS_SciDef_dmRadiometerScan_Noi_InSpaceHigh = Ese sí que es un asteroide oscuro. Noi absorbe fuertemente la luz en casi todos los espectros, incluso con mucha absorción UV para un asteroide tipo C. El resultado es un objeto que apenas es visible, especialmente dado que está tan lejos de su estrella.

		#LOC_KS_SciDef_dmseismicHammer_Noi_SrfLanded = El asteroide de baja densidad absorbe las ondas sísmicas bastante bien, haciendo que los datos sean bastante difíciles de recoger. Pero no es difícil adivinar cómo es el interior, de todos modos.

		// SimeSystem
		#LOC_KS_SciDef_rpwsScan_SimeSystem_InSpaceHigh = Esta parte del espacio recibe muy poco viento solar, así que casi toda la actividad de radio aquí es generada por los dos campos magnéticos masivos interactuando entre sí y con las atmósferas de las otras lunas.

		#LOC_KS_SciDef_scopeScan_SimeSystem_InSpaceHigh = La intrincada danza que realizan los dos cuerpos es sencillamente impresionante, y un timelapse de fotos lo demuestra. Son como pareja en una especie de tango celestial gigante y asombroso.

		#LOC_KS_SciDef_dmImagingPlatform_SimeSystem_InSpaceHigh = El análisis espectral de ambos cuerpos muestra evidencia de mucho metano en ambas atmósferas. Las explicaciones para las bandas verdes y azules de Simetra siguen siendo esquivas...

		#LOC_KS_SciDef_dmSolarParticles_SimeSystem_InSpaceHigh = Las partículas del viento solar son bastante escasas aquí fuera, y el colector solo capta trazas de nitrógeno, dióxido de carbono y dióxido de cloro.

		#LOC_KS_SciDef_dmRadiometerScan_SimeSystem_InSpaceHigh = En conjunto, ambos cuerpos tienen un albedo combinado bastante alto. Simeht en particular es bastante brillante.

		// Simetra/Simeht Shared
		#LOC_KS_SciDef_rpwsScan_SimeBoth_InSpaceHigh = Se encuentra aquí un entorno electrostático increíblemente complejo entre los dos planetas, mientras sus magnetosferas y atmósferas interactúan.
		#LOC_KS_SciDef_dmSIGINT_SimBoth_InSpaceLow = Los campos magnéticos de ambos planetas gigantes están produciendo potentes ondas de radio por sus interacciones, resultando en una cacofonía de ruido de radio.
		#LOC_KS_SciDef_dmSolarParticles_SimeBoth_InSpace = Los colectores captan trazas de hidrógeno, helio y metano mientras Simetra y Simeht bailan entre sí.

		// Simetra
		#LOC_KS_SciDef_rpwsScan_Simetra_InSpaceLow = Potentes ondas de radio emiten desde la atmósfera de Simetra, aunque el ligeramente menos masivo Simeht es un muy cercano segundo.

		#LOC_KS_SciDef_scopeScan_Simetra_InSpace = Las coloridas bandas de Simetra te hacen preguntar qué compuestos están dando a las longitudes ecuatoriales esos llamativos tonos verdes y amarillos.

		#LOC_KS_SciDef_dmImagingPlatform_Simetra_InSpace = Su atmósfera superior parece consistir mayormente de metano, mientras que las capas inferiores son en gran parte hidrógeno, helio y metano, con trazas de azufre y dióxido de cloro. Este dióxido de cloro puede explicar sus bandas verdes, en combinación con el metano.

		#LOC_KS_SciDef_dmSoilMoisture_Simetra_InSpaceLow = Las emisiones de microondas de Simetra indican un interior lleno de hielo de agua.

		#LOC_KS_SciDef_dmRadiometerScan_Simetra_InSpaceHigh = En el espectro IR, Simetra emite bastante más que Simeht, indicando temperaturas más altas y un proceso de calentamiento interno más energético.

		// Simeht
		#LOC_KS_SciDef_rpwsScan_Simeht_InSpaceLow = La atmósfera marginalmente menos masiva de Simeht parece generar emisiones de ondas de radio que son más débiles en un margen similar.

		#LOC_KS_SciDef_scopeScan_Simeht_InSpace = Simeht parece casi sin características en imágenes telescópicas distantes; sin embargo, esta mirada de cerca revela sus bandas ecuatoriales más claras, los tenues hipercanes en remolino en los bordes, e incluso las sutiles diferencias entre las bandas más polares.

		#LOC_KS_SciDef_dmImagingPlatform_Simeht_InSpace = La atmósfera de hidrógeno-helio de Simeht también contiene mucho metano, lo que ayuda a explicar su color cian claro.

		#LOC_KS_SciDef_dmSoilMoisture_Simeht_InSpaceLow = Potentes emisiones de microondas señalan la presencia de grandes cantidades de hielo de agua en las profundidades de Simeht.

		#LOC_KS_SciDef_dmRadiometerScan_Simeht_InSpaceHigh = Simeht refleja mucha luz en el espectro visible, dándole un alto albedo.

		// Noira
		#LOC_KS_SciDef_dmMagScan_Noira_SrfLanded = En la superficie se pueden detectar pequeños campos magnéticos localizados, pero la luna parece carecer de un campo magnético más grande propio. Eso, o es imperceptible comparado con los planetas gemelos, y los datos necesitarán estudiarse con mayor precisión.
		#LOC_KS_SciDef_bothMagScan_Noira_InSpace = Los campos magnéticos de Simetra y Simeht sobrecargan los sensores, y no se puede detectar nada proveniente de Noira.

		#LOC_KS_SciDef_rpwsScan_Noira_InSpace = Solo se detecta actividad de plasma de radio generada por Simetra y Simeht. Todo lo que Noira hace es separar el flujo.

		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowGeneric = La superficie llena de cráteres de Noira es una vista bienvenida en un sistema lleno de rarezas.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowGrandCrater = «La capacidad de destruir un planeta es insignificante comparada con el poder del Kraken.»
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowCraters = Los cráteres están distribuidos uniformemente a lo largo de toda la superficie de la luna, indicando que no está bloqueada por marea. Probablemente porque Simetra y Simeht simplemente se mueven demasiado.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowRiftValleys = Está bastante claro que las fuerzas de marea deben estar estirando a la pobre Noira hasta el punto de ruptura, creando estos enormes valles de rift.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowBasins = Estas amplias y oscuras cuencas recuerdan tiempos más simples, cuando el programa espacial aún luchaba por poner botas en el Mun.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceHigh = La pequeña bola gris recuerda al Mun, tanto en color como en los cráteres que marcan su superficie. Un cráter proporcionalmente enorme puede verse en un extremo de la luna, invitando comparaciones con cierta estación de batalla destructora de planetas.

		#LOC_KS_SciDef_dmImagingPlatform_Noira_InSpaceLow = El regolito en Noira tiene una composición similar al Mun, con altas concentraciones de silicatos y aluminio.
		#LOC_KS_SciDef_dmImagingPlatform_Noira_InSpaceHigh = El análisis de Noira desde órbita alta muestra una superficie caótica, marcada por cráteres y cubierta de depresiones.

		#LOC_KS_SciDef_dmSIGINT_Noira_InSpaceLow = La vigilancia de radio de Noira no revela nada interesante, solo señales reflejadas desde los planetas gemelos.

		#LOC_KS_SciDef_dmNAlbedoScan_Noira_SrfLanded = Se detecta hidrógeno subsuperficial por todo Noira; probable evidencia de depósitos de agua.

		#LOC_KS_SciDef_dmlaserblastscan_Noira_SrfLanded = Los escaneos de superficie dan una lectura familiar; una superficie rica en silicatos con abundante aluminio. Menos familiar es la notable concentración de hielo de agua.

		#LOC_KS_SciDef_dmSolarParticles_Noira_InSpace = Las partículas traza cerca de Noira parecen ser muy similares a las de otros lugares en el sistema Simetra-Simeht.

		#LOC_KS_SciDef_dmSoilMoisture_Noira_InSpaceLow = Las lecturas indican que grandes cantidades de hielo de agua están enterradas bajo la superficie de la pequeña luna, ¡lo que podría significar potencialmente que Noira tiene océanos de agua subsuperficiales!

		#LOC_KS_SciDef_dmRadiometerScan_Noira_InSpaceHigh = El albedo general de Noira es bastante similar al del Mun, pero su gran distancia de Sunorc significa que su irradiancia absoluta es muy baja.

		#LOC_KS_SciDef_dmseismicHammer_Noira_SrfLanded = ¡Las reflexiones sísmicas muestran claramente evidencia de grandes cavernas subterráneas, posiblemente llenas de agua líquida!

		// Norihc
		#LOC_KS_SciDef_dmMagScan_Norihc_SrfLanded = Se puede medir un campo magnético débil desde la superficie de Norihc, pero no es nada especialmente impresionante.
		#LOC_KS_SciDef_bothMagScan_Norihc_InSpaceLow = La actividad geológica de Norihc no parece producir un campo magnético fuerte. Como la actividad geológica probablemente se genera mayormente por fuerzas de marea, Norihc probablemente carece de un núcleo metálico fundido, lo que lo explicaría.
		#LOC_KS_SciDef_bothMagScan_Norihc_InSpaceHigh = Los únicos campos magnéticos detectados hasta ahora pertenecen a Simetra y Simeht.

		#LOC_KS_SciDef_rpwsScan_Norihc_InSpace = Se generan débiles perturbaciones cuando las magnetosferas de Simetra y Simeht son distorsionadas por Norihc.

		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowGeneric = La superficie fisurada de Norihc parece bastante reminiscente de Eeloo, con sus profundas trincheras y tierras bajas más oscuras.
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowCratersAll = Norihc está marcado por cráteres grandes y pequeños, cuestionando cuán antigua es la superficie. Si está siendo estirado por los dos planetas, ¿por qué parece que su superficie no ha cambiado en tanto tiempo?
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowCracks = Estas grietas se adentran profundamente en los gruesos casquetes de hielo globales de Norihc. ¡Probablemente serían buenas pistas de carreras!
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceHigh = La pobre Norihc parece haber sido golpeada y magullada por las fuerzas de marea de sus planetas padres.

		#LOC_KS_SciDef_dmImagingPlatform_Norihc_InSpaceLow = La espectroscopía de la superficie confirma que está compuesta en gran parte de hielo de agua, con compuestos de tolina parcialmente escarchados en las tierras bajas.
		#LOC_KS_SciDef_dmImagingPlatform_Norihc_InSpaceHigh = La atmósfera de Norihc está compuesta principalmente de nitrógeno, con trazas de monóxido de carbono y otros gases.

		#LOC_KS_SciDef_dmSIGINT_Norihc_InSpaceLow = La actividad de radio en órbita de Norihc está tranquila, salvo por el ruido generado por Simetra y Simeht.

		#LOC_KS_SciDef_dmNAlbedoScan_Norihc_SrfLanded = Las señales de hidrógeno en esta región parecen confirmar gruesos casquetes de hielo de agua, con el potencial de un océano de agua líquida muy abajo.

		#LOC_KS_SciDef_dmlaserblastscan_Norihc_SrfLanded = El haz provoca una ráfaga de vapor al abrir un agujero en la superficie, confirmando que es hielo de agua.
		#LOC_KS_SciDef_dmlaserblastscan_Norihc_SrfLandedLowlands = Además de vapor, el escaneo también indica la existencia de compuestos de tolina en la superficie aquí.

		#LOC_KS_SciDef_dmSolarParticles_Norihc_InSpace = Se pueden encontrar trazas de nitrógeno en órbita de Norihc, pero por lo demás el espacio está incluso más vacío de lo habitual.

		#LOC_KS_SciDef_dmSoilMoisture_Norihc_InSpaceLow = El agua es bastante común en todo Norihc, incluso en las tierras bajas donde la lectura es más débil. Si hay océanos líquidos bajo la superficie, este instrumento no puede distinguirlos.

		#LOC_KS_SciDef_dmRadiometerScan_Norihc_InSpaceHigh = La delgada atmósfera de Norihc no absorbe mucho, permitiendo que la superficie brillante refleje mucha luz en la mayoría de longitudes de onda excepto UV.

		#LOC_KS_SciDef_dmseismicHammer_Norihc_SrfLanded = Las lecturas sísmicas tomadas muestran claras señales de un océano líquido bajo la superficie de Norihc. Dada la presencia de compuestos orgánicos, la vida es una posibilidad distinta.

		#LOC_KS_SciDef_dmbiodrillscan_Norihc_SrfLanded = Esta muestra de núcleo es mayormente hielo, con algunos compuestos de tolina que parecen haber quedado atrapados dentro tras su formación. Si hay un océano subsuperficial en Norihc, el taladro no puede alcanzarlo.

		// Noyreg
		#LOC_KS_SciDef_dmMagScan_Noyreg_SrfLanded = El campo magnético de Noyreg no parece cambiar mucho en la superficie.
		#LOC_KS_SciDef_bothMagScan_Noyreg_InSpaceLow = Para un objeto tan grande con tanta gravedad, el campo magnético de Noyreg es bastante débil. Esto puede deberse a una combinación de un núcleo rico en hierro mayormente enfriado y una falta de minerales magnéticos en la superficie.
		#LOC_KS_SciDef_bothMagScan_Noyreg_InSpaceHigh = Se detecta un campo magnético débil desde lo alto sobre Noyreg; y es más débil de lo anticipado. Un estudio más profundo podría arrojar luz sobre este misterio.

		#LOC_KS_SciDef_rpwsScan_Noyreg_InSpace = La radiación solar libera partículas cargadas de la densa atmósfera de Noyreg, produciendo ondas de plasma al interactuar con los campos magnéticos danzantes de los gigantes gemelos.

		#LOC_KS_SciDef_scopeScan_Noyreg_InSpaceLow = No hay mucho que ver con todas las densas nubes cubriendo la superficie. Solo un poco de la superficie es visible, pero todo lo que se puede distinguir son algunas altas montañas asomando entre las nubes más bajas.
		#LOC_KS_SciDef_scopeScan_Noyreg_InSpaceHigh = ¡Qué color fascinante! Seguro que esto no reavivará los antiguos debates sobre el color de Jool...

		#LOC_KS_SciDef_dmImagingPlatform_Noyreg_InSpaceLow = Mirar a través de la densa capa de nubes muestra signos de una superficie increíblemente rica en carbono. ¡Es posible que Noyreg esté hecho mayormente de carbono, pero eso lo haría un hallazgo excepcionalmente raro!
		#LOC_KS_SciDef_dmImagingPlatform_Noyreg_InSpaceHigh = El análisis espectroscópico muestra una atmósfera hecha mayormente de dióxido de carbono, con el resto siendo nitrógeno, dióxido de cloro y gases traza. Con este análisis inicial, la fuente de su color verde no está clara. Podría ser el dióxido de cloro, o un tipo de efecto de dispersión sin precedentes. Se requiere más estudio.

		#LOC_KS_SciDef_dmSIGINT_Noyreg_InSpaceLow = La densa atmósfera de Noyreg crea señales de radio rítmicas al ser energizada por las magnetosferas de Simetra y Simeht.

		#LOC_KS_SciDef_dmNAlbedoScan_Noyreg_SrfLanded = La superficie de Noyreg parece ser rica en hidrógeno. Pero a estas temperaturas y presiones, lo más probable es que sean hidrocarburos de cadena larga en lugar de agua.

		#LOC_KS_SciDef_dmlaserblastscan_Noyreg_SrfLanded = La llamarada producida identifica la sustancia como extremadamente rica en carbono; la mayoría de la composición es en realidad carbono. Esto es muy inusual, y parecería sugerir que Noyreg es un tipo de objeto muy raro: una carbonia, o mundo de carbono.
		#LOC_KS_SciDef_dmlaserblastscan_Noyreg_SrfLandedIceCaps = El análisis láser confirma la presencia de varios hidrocarburos de cadena larga congelados aquí, y no hay signos de hielo de agua.

		#LOC_KS_SciDef_dmSolarParticles_Noyreg_InSpace = El espacio cerca de Noyreg contiene trazas de dióxido de carbono, probablemente originadas de la densa atmósfera de la luna.

		#LOC_KS_SciDef_dmSoilMoisture_Noyreg_InSpaceLow = Se detectan pocas emisiones de microondas desde Noyreg, lo que parece significar que tiene poco o nada de agua.

		#LOC_KS_SciDef_dmRadiometerScan_Noyreg_InSpaceHigh = La densa atmósfera de Noyreg absorbe mucha luz UV e IR, y también absorbe mucho del espectro visible. Esto podría ser por qué se ve verde.

		#LOC_KS_SciDef_dmseismicHammer_Noyreg_SrfLanded = La composición interior de Noyreg revela que gran parte comparte una densidad similar al diamante, y si las lecturas son correctas solo tiene un pequeño núcleo metálico mayormente inerte. Eso lo confirma: Noyreg está hecho mayormente de carbono.

		#LOC_KS_SciDef_dmbiodrillscan_Noyreg_SrfLanded = ¡La muestra de núcleo está absolutamente llena de carbono! Es decir... solo montones y montones de carbono y compuestos de hidrocarburos, ninguno de los cuales parece haber sido formado por actividad biológica.

		// Aralc-A
		#LOC_KS_SciDef_rpwsScan_AralcA_InSpaceLow = El instrumento ha saltado la fusión y está empezando a sublimar.
		#LOC_KS_SciDef_rpwsScan_AralcA_InSpaceHigh = El viento solar procedente de Aralc-A es extremadamente poderoso, incluso a esta distancia.

		#LOC_KS_SciDef_scopeScan_AralcA_InSpace = ¡¡¡MIS OJOS!!!

		#LOC_KS_SciDef_dmImagingPlatform_AralcA_InSpace = La plataforma de imagen se niega rotundamente a exponer sus delicados instrumentos. Vas a necesitar una herramienta más especializada para este tipo de trabajo.

		#LOC_KS_SciDef_dmSIGINT_AralcA_InSpaceLow = Aralc-A emite cantidades extremas de radiación en la mayoría de espectros, especialmente en los que este instrumento no puede detectar. Pero sabemos cómo son las estrellas azules, ¿verdad? No -realmente- necesitábamos traer esta cosa pesada hasta aquí, ¿o sí?

		#LOC_KS_SciDef_dmSolarParticles_AralcA_InSpaceLow = Bueno, una cosa es segura. La garantía definitivamente está anulada ahora.
		#LOC_KS_SciDef_dmSolarParticles_AralcA_InSpaceHigh = El viento solar de Aralc-A es mucho más potente de lo que este instrumento fue realmente construido para soportar, pero se mantiene admirablemente.

		#LOC_KS_SciDef_dmSoilMoisture_AralcA_InSpaceLow = Las antenas han empezado a parecerse al agua mucho más que esta estrella.

		#LOC_KS_SciDef_dmRadiometerScan_AralcA_InSpaceHigh = Aralc-A emite mucha más luz UV que la mayoría de estrellas más pequeñas y frías. Cualquier cosa viva en este sistema estelar tendría que estar bastante bien protegida, y no tendría demasiado tiempo para evolucionar tampoco. Pero, como dicen... «Efil», eh, encuentra un camino.

		// Anneheg
		#LOC_KS_SciDef_dmMagScan_Anneheg_SrfLanded = La enorme cantidad de radiación aquí ha dejado el pobre brazo no funcional, aunque al menos se mantiene... -mayormente- recto.

		#LOC_KS_SciDef_rpwsScan_Anneheg_InSpace = Quiero que adivines cuánto plasma solar está fluyendo por aquí. Luego, toma esa suposición y multiplícala por cien. Ahí está tu respuesta.

		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceLow = Las características vítreas y turbulentas de Anneheg muestran cuán gravemente dañada está la superficie del planeta. Es poco probable que se formara a esta distancia de Aralc-A, o habría sido obliterado hace eones.
		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceLowLava = Los océanos de lava de Anneheg atraviesan el planeta como heridas abiertas. Aralc-A está destrozando este mundo.
		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceHigh = Anneheg es difícil de distinguir en el mar de luz cegadora, especialmente con lo oscura que es su superficie ígnea.

		#LOC_KS_SciDef_dmImagingPlatform_Anneheg_InSpaceLow = Los escaneos de la superficie de Anneheg indican vidrio volcánico con un contenido metálico extremadamente alto; es probable que este planeta sea solo una corteza fina cubriendo el núcleo de un planeta una vez mucho más grande.
		#LOC_KS_SciDef_dmImagingPlatform_Anneheg_InSpaceHigh = A pesar del albedo extremadamente bajo del planeta, la irradiancia absoluta de Anneheg sigue siendo alta debido al verdadero rayo de muerte que impacta su superficie.

		#LOC_KS_SciDef_dmSIGINT_Anneheg_InSpaceLow = Solo la intensa actividad de radio de Aralc-A puede detectarse aquí.

		#LOC_KS_SciDef_dmNAlbedoScan_Anneheg_SrfLanded = Las lecturas de hidrógeno superficial son seguramente solo el resultado del absurdo viento solar depositándolo en la superficie.

		#LOC_KS_SciDef_dmlaserblastscan_Anneheg_SrfLanded = La superficie de Anneheg es tan resistente al calor que el láser ni siquiera le hace nada. Bueno, eso es un fracaso.

		#LOC_KS_SciDef_dmSolarParticles_Anneheg_InSpaceLow = Anneheg parece estar perdiendo masa, a juzgar por la roca y el metal que recoge el colector; especialmente al cruzar la línea del crepúsculo.
		#LOC_KS_SciDef_dmSolarParticles_Anneheg_InSpaceHigh = A esta altitud, solo se recoge el viento solar extremo de Aralc-A.

		#LOC_KS_SciDef_dmSoilMoisture_Anneheg_InSpaceLow = Las antenas apenas pueden funcionar tan cerca de Aralc-A, pero de todos modos no detectan nada proveniente del planeta.

		#LOC_KS_SciDef_dmRadiometerScan_Anneheg_InSpaceHigh = La irradiancia absoluta de Anneheg es muy alta a pesar de la superficie extremadamente oscura, debido a su proximidad a Aralc-A.

		#LOC_KS_SciDef_dmseismicHammer_Anneheg_SrfLanded = El impacto confirma que la composición de Anneheg es altamente metálica; al menos el 80% del objeto es metal.

		#LOC_KS_SciDef_dmbathymetryscan_Anneheg_SrfSplashedShallow = Eh. Eso es extraño. Parece que aún no nos hemos fundido.
		#LOC_KS_SciDef_dmbathymetryscan_Anneheg_SrfSplashedDeep = Una Poción de Resistencia al Fuego nos ayudaría a ver mucho más claramente aquí abajo.

		// Aralc-B
		#LOC_KS_SciDef_rpwsScan_AralcB_InSpaceLow = Intenso viento solar está siendo expulsado de ambas estrellas, dando a las antenas bastante que procesar.
		#LOC_KS_SciDef_rpwsScan_AralcB_InSpaceHigh = Realmente no estás tan lejos de Aralc-B, así que el plasma solar ya es bastante denso aquí sin siquiera contar las contribuciones de Aralc-A.

		#LOC_KS_SciDef_scopeScan_AralcB_InSpace = Puede ser una enana roja, pero sigue siendo una estrella. Apuntar un telescopio planetario sensible hacia ella es una mala decisión.

		#LOC_KS_SciDef_dmImagingPlatform_AralcB_InSpace = La plataforma de imagen se apaga al detectar la luz de Aralc-B. Incluso una enana roja es demasiado brillante para que pueda estudiarla.

		#LOC_KS_SciDef_dmSIGINT_AralcB_InSpaceLow = Las ondas de radio emitidas por ambas estrellas son muy intensas, y empiezas a dudar de la integridad estructural del enorme plato.

		#LOC_KS_SciDef_dmSolarParticles_AralcB_InSpaceLow = Las obleas sensibles han empezado a deteriorarse rápidamente bajo el intenso calor.
		#LOC_KS_SciDef_dmSolarParticles_AralcB_InSpaceHigh = El viento solar procedente de Aralc-B es bastante igual al viento de Aralc-A a esta distancia.

		#LOC_KS_SciDef_dmSoilMoisture_AralcB_InSpaceLow = El dispositivo no puede tolerar el calor, y los polímeros avanzados que constituyen su composición química han empezado a descomponerse. En otras palabras, el aparatito buscador de agua espacial se ha roto.

		#LOC_KS_SciDef_dmRadiometerScan_AralcB_InSpaceHigh = Como enana roja, Aralc-B emite mucha luz infrarroja y es bastante tenue en los espectros visible y UV.

		// Arorua
		#LOC_KS_SciDef_dmMagScan_Arorua_SrfLanded = Desde la superficie, parece que Arorua tiene un campo magnético propio bastante fuerte, que podría estar frenando un poco la marea de partículas cargadas y prolongando la vida de su atmósfera.

		#LOC_KS_SciDef_rpwsScan_Arorua_InSpace = Las partículas cargadas inundan el espacio alrededor de Arorua, una explicación fácil y obvia para su atmósfera en ablación.

		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowGeneric = La superficie de Arorua es mayormente montañosa y oscura, pero bajo la luz solar extrema brilla como vidrio. ¡Quizás parte de ella -es- vidrio!
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowSubstellarPoint = El punto que enfrenta a Aralc-B está mayormente sin rasgos, pero saber que este es el punto donde se concentra toda la luz solar hace que uno se pregunte cuánto calor debe hacer allí.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowMountainsAll = Las montañas de Arorua brillan a través de la atmósfera inferior, resaltadas contra las tierras bajas más oscuras.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowCliffsAll = Estos acantilados son bastante pronunciados. Podrían ser un buen destino turístico.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceHigh = Las auroras de Arorua brillan espléndidamente abajo, y te preguntas por qué no está cubierto de nubes más opacas. Quizás lo estuvo en algún momento, pero la intensa luz solar las dispersó también.

		#LOC_KS_SciDef_dmImagingPlatform_Arorua_InSpaceLow = Los escaneos IR de la superficie de Arorua proporcionan un mapa intrincado de cómo el planeta es calentado por sus dos soles.
		#LOC_KS_SciDef_dmImagingPlatform_Arorua_InSpaceHigh = El análisis espectral de la atmósfera de Arorua revela que está compuesta mayormente de dióxido de carbono, y no mucho más.

		#LOC_KS_SciDef_dmSIGINT_Arorua_InSpaceLow = A medida que la atmósfera de Arorua se ablaciona, genera un diluvio de intensa actividad de radio.

		#LOC_KS_SciDef_dmNAlbedoScan_Arorua_SrfLanded = Los niveles de neutrones de fondo son bastante altos, gracias a Aralc-B. Esto es a pesar de la densa atmósfera, y hace difícil tomar una lectura precisa.

		#LOC_KS_SciDef_dmlaserblastscan_Arorua_SrfLanded = Los escaneos de explosión láser revelan una composición bastante típica para la superficie de un planeta rocoso, con minerales silíceos formando la mayor parte de la superficie.

		#LOC_KS_SciDef_dmSolarParticles_Arorua_InSpaceLow = En órbita baja de Arorua se capta una concentración relativamente alta de moléculas de dióxido de carbono, probablemente de su atmósfera en ablación.
		#LOC_KS_SciDef_dmSolarParticles_Arorua_InSpaceHigh = ¡El viento solar llena el espacio cerca de Arorua, amenazando con empezar a empujar la nave espacial también!

		#LOC_KS_SciDef_dmSoilMoisture_Arorua_InSpaceLow = Las únicas lecturas de microondas detectables proceden de Aralc-B y Aralc-A.

		#LOC_KS_SciDef_dmRadiometerScan_Arorua_InSpaceHigh = A pesar de la densa atmósfera de dióxido de carbono de Arorua, la irradiancia absoluta es bastante alta debido a su proximidad a dos estrellas. Las enormes y brillantes auroras probablemente también ayudan.

		#LOC_KS_SciDef_dmseismicHammer_Arorua_SrfLanded = El análisis sofisticado del martillo sugiere que Arorua tiene una composición bastante típica para un mundo terrestre, con una corteza rocosa y un núcleo metálico parcialmente fundido.

		#LOC_KS_SciDef_dmbiodrillscan_Arorua_SrfLanded = Puede ser improbable, descabellado o incluso una locura, pero coges una muestra de núcleo sin vida de todos modos, solo para estar absolutamente seguro.
		#LOC_KS_SciDef_dmbiodrillscan_Arorua_SrfLandedSubstellarPoint = Mira, nunca se sabe, ¿vale? NUNCA SE SABE.

		// Ahtpan
		#LOC_KS_SciDef_dmMagScan_Ahtpan_SrfLanded = Tras un análisis exhaustivo, deduces que aunque el campo magnético de Ahtpan es relativamente débil, es lo suficientemente fuerte para mantener a raya los vientos solares.

		#LOC_KS_SciDef_rpwsScan_Ahtpan_InSpaceLow = El campo magnético procedente de Ahtpan es sustancialmente más fuerte aquí, suficiente para convertir la figurada tempestad de partículas cargadas en solo una ventolera manejable.
		#LOC_KS_SciDef_rpwsScan_Ahtpan_InSpaceHigh = Los patrones de ondas de radio indican una clara distorsión en el entorno magnético aquí; esto es probablemente obra de un campo que rodea a Ahtpan.

		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowGeneric = Ahtpan parece un mundo desértico sacado de una película de ciencia ficción. ¡Pero ningún autor de ciencia ficción hasta ahora ha estado tan inspirado como para imaginar océanos de petróleo! La verdad es más extraña que la ficción, parece, y quizás más impresionante también. Menos combates espaciales, eso sí...
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowMountains = Las montañas de Ahtpan destacan con tonos más rojizos, proporcionando un buen contraste con el resto de la superficie beige.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowNaphthaOceansCoast = Estas fotos seguramente nos asegurarán mucha financiación de la industria petrolera.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowIslands = ¡Todo puede comprarse y venderse por el precio adecuado de PEEEETRÓLEO!
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowCraters = Ahtpan tiene una atmósfera decentemente gruesa, así que los pocos impactadores que logran atravesarla tienen que ser grandes. El tamaño de estos cráteres es prueba de ello.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceHigh = La perspectiva de un planeta entero cubierto de océanos de oro negro era demasiado tentadora para dejarla pasar. Así que apuntas el telescopio a Ahtpan y empiezas a tomar fotos.

		#LOC_KS_SciDef_dmImagingPlatform_Ahtpan_InSpaceLow = El análisis espectral es inconfundible: esos son océanos de nafta. ¡Enteros mares de precioso «explodium» esperan explotación, ya sea para ISRU o para beneficio!
		#LOC_KS_SciDef_dmImagingPlatform_Ahtpan_InSpaceHigh = La atmósfera de Ahtpan está hecha mayormente de dióxido de carbono, pero también hay concentraciones muy grandes de vapores de hidrocarburos en muchas regiones.

		#LOC_KS_SciDef_dmSIGINT_Ahtpan_InSpaceLow = La vigilancia de radio no encuentra más que estática durante los escaneos de Ahtpan. ¡Eso es perfecto! Sin operaciones de minería de petróleo alienígenas significa que tenemos el planeta solo para nosotros. ¡El que llega primero se lo lleva, eh, ET!

		#LOC_KS_SciDef_dmNAlbedoScan_Ahtpan_SrfLanded = Incluso en tierra, el sensor capta muchos depósitos de hidrógeno. ¡Incluso el suelo está lleno de eso!
		#LOC_KS_SciDef_dmNAlbedoScan_Ahtpan_SrfSplashed = Una firma de hidrógeno muy fuerte confirma nuestras más locas esperanzas: que la superficie de Ahtpan está cubierta de océanos de nafta.

		#LOC_KS_SciDef_dmlaserblastscan_Ahtpan_SrfLanded = El análisis químico de la superficie arenosa revela una composición mayormente silícea, con muchos hidrocarburos esparcidos por todo.
		#LOC_KS_SciDef_dmlaserblastscan_Ahtpan_SrfSplashed = ¡La sustancia reacciona violentamente al láser y se combustiona! Sí, eso es petróleo sin duda.

		#LOC_KS_SciDef_dmSolarParticles_Ahtpan_InSpaceLow = El viento solar es un poco más escaso aquí, y el instrumento capta trazas de dióxido de carbono e hidrocarburos.
		#LOC_KS_SciDef_dmSolarParticles_Ahtpan_InSpaceHigh = Ahtpan está siendo bombardeado bastante por Aralc-A, pero el viento solar es un poco menos intenso aquí que en el espacio interplanetario, implicando la existencia de un campo magnético moderadamente fuerte.

		#LOC_KS_SciDef_dmSoilMoisture_Ahtpan_InSpaceLow = Las emisiones de microondas de Ahtpan son muy débiles, indicando que la sustancia en su superficie no es agua.

		#LOC_KS_SciDef_dmRadiometerScan_Ahtpan_InSpaceHigh = La atmósfera de Ahtpan absorbe muchas frecuencias UV e IR de onda corta, indicando que la mayoría probablemente es dióxido de carbono. La superficie tiene un albedo bastante alto, lo que ayuda a compensar un poco el efecto invernadero.

		#LOC_KS_SciDef_dmseismicHammer_Ahtpan_SrfLanded = Las ondas sísmicas muestran que el interior de Ahtpan sigue siendo algo activo, y su núcleo probablemente sigue fundido.

		#LOC_KS_SciDef_dmbathymetryscan_Ahtpan_SrfSplashedShallow = La cámara no puede ver realmente nada en el espeso petróleo, pero el análisis químico confirma que es un tipo de nafta.
		#LOC_KS_SciDef_dmbathymetryscan_Ahtpan_SrfSplashedDeep = ¡No puedo ver nada, Capitán!

		#LOC_KS_SciDef_dmbiodrillscan_Ahtpan_SrfLanded = La muestra de núcleo revela muchísima nafta, pero no mucho más. No hay signos de actividad biológica en curso.

		// Anehta
		#LOC_KS_SciDef_bothMagScan_Anehta_InSpaceLow = Las lecturas del magnetómetro confirman la presencia de múltiples cinturones de radiación Van Kerman en órbita baja de Anehta.
		#LOC_KS_SciDef_bothMagScan_Anehta_InSpaceHigh = El campo magnético de Anehta es bastante típico para un gigante gaseoso, aunque debido a su masa extrema es uno de los campos magnéticos planetarios más potentes jamás observados.

		#LOC_KS_SciDef_rpwsScan_Anehta_InSpaceLow = Se detectan emisiones de ondas de radio «Lightning whistler» potentes y frecuentes desde Anehta, sugiriendo una atmósfera caótica con mucha actividad geomagnética.
		#LOC_KS_SciDef_rpwsScan_Anehta_InSpaceHigh = El potente campo magnético de Anehta captura y acelera partículas cargadas de sus dos estrellas. Este proceso causa pulsos de ondas de radio repetitivos que coinciden con su período de rotación.

		#LOC_KS_SciDef_scopeScan_Anehta_InSpaceLow = Los cielos azules de abajo forman una imagen bastante bonita, y capturas sus masivas torres de vapor de agua con espectacular detalle. Estás seguro de que Kerbin entero cabría dentro de algunas de estas tormentas.
		#LOC_KS_SciDef_scopeScan_Anehta_InSpaceHigh = Los anillos azul-blancos de Anehta coinciden bastante con el gigante gaseoso en color, pero ¿cómo puede ser? No puede ser hielo; Anehta está bien dentro de la línea de escarcha de sus estrellas. ¿Quizás los anillos están hechos de lo mismo que Eulb?

		#LOC_KS_SciDef_dmImagingPlatform_Anehta_InSpaceLow = Los escaneos exhaustivos de las nubes superiores de Anehta muestran una composición de mayormente hidrógeno, helio y vapor de agua.
		#LOC_KS_SciDef_dmImagingPlatform_Anehta_InSpaceHigh = Los escaneos de Anehta indican que es un gigante gaseoso de Clase II según el sistema de clasificación Sudarskerb. Sus brillantes cubiertas nubosas superiores azul-blancas reflejan mucha luz visible, y la fuerte absorción UV indica que están hechas de vapor de agua.

		#LOC_KS_SciDef_dmSIGINT_Anehta_InSpaceLow = Anehta libera una sinfonía de señales de radio mientras su atmósfera inferior se remolina y tormentea, y el viento solar que atravesó su magnetosfera bombardea inútilmente su profunda atmósfera.

		#LOC_KS_SciDef_dmSolarParticles_Anehta_InSpaceLow = Protegidos del viento solar por Anehta, los colectores captan mayormente hidrógeno, helio y moléculas de agua.
		#LOC_KS_SciDef_dmSolarParticles_Anehta_InSpaceHigh = El viento solar cerca de Anehta es similar en fuerza al de Kerbin, pero disminuye rápidamente cuando la nave penetra más en la poderosa magnetosfera del gigante.

		#LOC_KS_SciDef_dmSoilMoisture_Anehta_InSpaceLow = Se recibe una fuerte señal de microondas; indicación de que la atmósfera de Anehta contiene abundante vapor de agua.

		#LOC_KS_SciDef_dmRadiometerScan_Anehta_InSpaceHigh = Anehta tiene un albedo bastante alto, debido a su agradable coloración azul-blanca. Fuertes emisiones térmicas, incluso en el lado oscuro, indican mucho calentamiento interno.

		// Enots
		#LOC_KS_SciDef_dmMagScan_Enots_SrfLanded = Enots no parece generar un campo magnético. Qué sorpresa...
		#LOC_KS_SciDef_bothMagScan_Enots_InSpace = La única magnetosfera que el instrumento puede detectar se origina en Anehta.

		#LOC_KS_SciDef_rpwsScan_Enots_InSpace = Enots causa solo distorsiones menores en la magnetosfera de Anehta, como la proverbial piedra en el río que divide su flujo.

		#LOC_KS_SciDef_scopeScan_Enots_InSpaceLow = La pequeña lunita parece que alguien cogió un gran trozo de esquisto y lo lanzó a órbita.
		#LOC_KS_SciDef_scopeScan_Enots_InSpaceHigh = ¡Espera un minuto! ¿Alguien ha llamado seriamente a esta cosa «Enots»? ¿Qué tipo de nombre es ese? 

		#LOC_KS_SciDef_dmImagingPlatform_Enots_InSpace = El análisis multiespectral muestra que Enots está compuesto principalmente de minerales silíceos oscuros.

		#LOC_KS_SciDef_dmSIGINT_Enots_InSpaceLow = Las únicas señales de radio aquí proceden de Anehta.

		#LOC_KS_SciDef_dmNAlbedoScan_Enots_SrfLanded = Las débiles señales de hidrógeno podrían explicarse como bocanadas de la exosfera de Anehta que fueron captadas por esta pequeña luna.

		#LOC_KS_SciDef_dmlaserblastscan_Enots_SrfLanded = El láser destruye una pequeña cresta, revelando una composición mayormente de roca silícea, específicamente calcedonia. Hay trazas de óxidos de aluminio que podrían ser corindón, lo que explica el ligero tinte azul de las regiones ecuatoriales.

		#LOC_KS_SciDef_dmSolarParticles_Enots_InSpace = Los colectores captan gran cantidad de partículas de los anillos de Anehta, revelando una composición mayormente de minerales silíceos y óxidos de aluminio, que podrían ser corindón azul.

		#LOC_KS_SciDef_dmSoilMoisture_Enots_InSpaceLow = Enots no parece estar generando ninguna emisión de microondas, descartando la presencia de hielo de agua en o bajo su superficie.

		#LOC_KS_SciDef_dmRadiometerScan_Enots_InSpaceHigh = Enots tiene un albedo muy bajo, pero el análisis espectral no indica la presencia de carbono. Esto sugiere otro origen para su color negro.

		#LOC_KS_SciDef_dmseismicHammer_Enots_SrfLanded = Las ondas sísmicas se reflejan bien a través de la pequeña luna, una indicación de que es bastante densa y está bien unida por fuerzas estructurales.

		// Efil
		#LOC_KS_SciDef_dmMagScan_Efil_SrfLanded = El magnetómetro captó el fuerte campo magnético de Efil desde la superficie, mostrando cómo las líneas del campo se alinean con el eje de rotación de la luna, como dos bailarines en perfecta sincronía.

		#LOC_KS_SciDef_rpwsScan_Efil_InSpace = La ionosfera de Efil interactúa con el potente campo magnético de Anehta, pintando un cuadro colorido de la relación entre las atmósferas y magnetosferas de estos dos mundos: Anehta el protector, y Efil el niño siempre desafiante ansioso por demostrar que... puede... desviar el viento solar, eh, ¿por sí solo? Mira, me estoy quedando sin material aquí.

		#LOC_KS_SciDef_scopeScan_Efil_InSpaceHigh = Como una canica azul perfecta, Efil brilla en tonos azul-verde en el telescopio. La imagen no puede capturar verdaderamente la belleza de Efil, pero al menos puede preservar una fracción de ella.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowWater = Los océanos de Efil brillan bajo la luz de dos soles, iluminados en cian brillante como una ilustración sacada de la portada de una novela clásica de ciencia ficción.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowRainforests = Densas selvas tropicales de árboles alienígenas con hojas azul-verdes cubren gran parte de la superficie del planeta, evocando imágenes de un antiguo Kerbin romanticizado, uno donde bestias colosales aún vagaban por el mundo; sin embargo, mientras esa versión de Kerbin hace tiempo que se fue, Efil flota aquí, decididamente tangible.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowGrassland = Colinas verdes ondulantes abarcan Efil en las regiones bajas, salpicadas de parterres de flores y enmarcadas por selvas tropicales como si las hubiera pintado un maestro artista.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowTropicalDesert = Los desiertos tropicales de Efil pueden ser menos acogedores que la mayor parte del planeta, pero no son menos hermosos. Dunas de arena ondulan como las colinas herbosas en otros lugares, sin duda recorridas por manadas de animales endurecidos del desierto, como evidencian los largos rastros dejados en la arena.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowNeedleleafForests = Los bosques árticos de Efil son tan frondosos y llenos de vida como los climas más cálidos, cubiertos por vastas extensiones de naturaleza salvaje y glaseados con nieve.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowTundraColdDesert = Las gélidas y áridas regiones de Efil son algunos de los únicos lugares desprovistos de la belleza que abarca el resto del planeta. En su lugar, son áridas y mayormente sin vida; algunos de los únicos parches restantes de desolación en el bullicioso mundo de Efil.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowMountainsSnowMountains = Los picos de Efil asoman por encima de las nubes, como para obtener una mejor vista del espléndido paisaje que los rodea. Sin duda no vive mucho ahí arriba, pero hay una especie de paz en eso, ¿verdad? De pie en la cima de tal pico, uno sentiría seguramente solo tranquilidad.

		#LOC_KS_SciDef_dmImagingPlatform_Efil_InSpaceHigh = El amplio tapiz de color de Efil se extiende bien hacia los espectros no visibles, llenando un verdadero lienzo de datos para que nuestros científicos estudien. Lo que es seguro es que, al igual que Kerbin, su atmósfera contiene mayormente nitrógeno y oxígeno; claras señales de vida cuando se combinan con las imágenes de Efil pintadas en luz visible.

		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmImagingPlatform_Efil_InSpaceLow = La geología y biología muy variadas de Efil forman una imagen compleja, contando la rica historia de una luna envuelta en el abrazo de la vida. Desde montañas imponentes hasta llanuras onduladas, densas junglas hasta profundas fosas oceánicas, Efil tiene mucho que ofrecer. ¡A los turistas les va a encantar este lugar! Lo pondré en el folleto de viajes.
		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmSIGINT_Efil_InSpaceLow = La actividad de radio de la atmósfera de Efil habla de sus interacciones con la magnetosfera de Anehta, pero no hay nadie cantando esta canción. Es decir, no hay evidencia de vida inteligente.

		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmImagingPlatform_EfilHome_InSpaceLow = La geología y biología muy variadas de Efil forman una imagen compleja, contando la rica historia de una luna envuelta en el abrazo de la vida. Desde montañas imponentes hasta llanuras onduladas, densas junglas hasta profundas fosas oceánicas, Efil tiene mucho que ofrecer.
		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmSIGINT_EfilHome_InSpaceLow = La atmósfera de Efil canta una canción de magnetismo y... espera, corta la prosa púrpura. ¡Puedo oír el último partido de headball que viene, quiero escuchar!

		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedRainforestsGrassland = El suelo húmedo y fértil de Efil es rico en los átomos de hidrógeno de las moléculas de agua, insuflando vida en sus grandes bosques y extensas praderas.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedTropicalDesert = Aunque la arena aquí está seca, las trazas de agua continúan proporcionando a los habitantes del desierto el tan necesario refresco.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedArcticBiomes = Congelado en hielo y nieve, el suelo ártico proporciona voluntariamente agua dulce a quienes están dispuestos a tomarla.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedMountains = Las montañas de Efil son comparativamente secas, mayormente desprovistas de vida ya que tales altitudes hacen que incluso Efil no pueda proveer a sus habitantes.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedSnowMountains = Los picos nevados proporcionan grandes vistas, pero hacen un suelo pobre para que la vida se establezca. A pesar de la abundancia de agua, no hay nada que beber.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedBeach = La arena húmeda aquí se pegaría a tus dedos, si estuvieras allí en persona para disfrutarla. El contenido de hidrógeno te dice lo que ya es obvio por la transmisión de la cámara; esta playa es tocada regularmente por aguas cristalinas que dan vida.

		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfSplashedWater = Bombardear las ondas ondulantes confirma que es efectivamente preciosa y refrescante agua líquida, aunque con una salinidad desagradable.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedRainforestsGrassland = Los escaneos de superficie muestran abundancia de hidrógeno, no solo en agua sino también en compuestos orgánicos; un testimonio del ecosistema en auge de Efil.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedTropicalDesert = El láser penetra profundamente en la arena seca, revelando muy poco hidrógeno. Para una región tan árida, tiene sentido.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedMountains = Las altas altitudes de las montañas de Efil son deficientes tanto en agua como en vida.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedArcticBiomes = Incluso las regiones más gélidas de Efil están repletas de vida; una fina capa de nieve en la superficie oculta un lecho de actividad debajo.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedSnowMountains = Aunque se puede encontrar mucho hielo de agua en estos picos nevados, poco más se encuentra, ya que estas áreas son demasiado remotas para que sobreviva mucho.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedBeach = Parece un desperdicio confirmar lo que ya es obvio con este instrumento caro... ¿Quizás simplemente no puedes creer que cualquier luna pueda tener mares tan claros y limpios?

		#LOC_KS_SciDef_dmSolarParticles_Efil_InSpaceLow = Rozando la capa más externa de la atmósfera de Efil, el instrumento recolecta moléculas de agua además del viento solar; una clara señal de que Efil es tanto un refugio tropical como parece.
		#LOC_KS_SciDef_dmSolarParticles_Efil_InSpaceHigh = Elementos más pesados se depositan en las obleas, evidencia de que Efil tiene una especie de cinturón Van Kerman propio; casi como si quisiera encarcelar la vida que vive sobre él. ¿Quizás Efil no es un anfitrión tan amable como se pensaba?

		//Non-Homeswitch Efil Only
		#LOC_KS_SciDef_dmSoilMoisture_Efil_InSpaceLow = Las emisiones de microondas hacen aún más claro que la superficie de Efil está prácticamente empapada de agua. Aunque parece un esfuerzo inútil, nunca hay que olvidar el gélido falso paraíso que resultó ser Laythe; por tanto, es sabio comprobarlo.
		//Efil Homeswitch Only
		#LOC_KS_SciDef_dmSoilMoisture_EfilHome_InSpaceLow = Las emisiones de microondas hacen aún más claro que la superficie de Efil está prácticamente empapada de agua. Esto ya se sabía; sin embargo, sirve como una calibración útil del instrumento si nada más, y nos recuerda el falso paraíso que resultó ser Laythe en tiempos pasados.

		#LOC_KS_SciDef_dmRadiometerScan_Efil_InSpaceHigh = La brillante superficie de Efil está fuertemente teñida de un hermoso tono cian por su densa atmósfera, que absorbe la mayoría de la luz UV y del IR cercano.

		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedSandy = La superficie polvorienta debajo hace un gran trabajo absorbiendo las ondas sísmicas, resistiendo tus intentos de descubrir sus secretos.
		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedSoily = El suelo debajo amortigua la mayoría de ondas que pasan, pero susurra indicios de cavernas que se extienden profundamente bajo la superficie.
		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedRocky = Las ondas sísmicas viajan bien aquí, mostrándote una imagen más clara del interior de Efil, aunque con todas las cuevas y capas, no es nada demasiado sorprendente.

		#LOC_KS_SciDef_dmbathymetryscan_Efil_SrfSplashedWaterShallow = Un tesoro de fauna bioluminiscente nada en las cálidas aguas tropicales de Efil, revelado con gran detalle por las aguas cristalinas.
		#LOC_KS_SciDef_dmbathymetryscan_Efil_SrfSplashedWaterDeep = Las oscuras profundidades de Efil apenas son oscuras, ya que la vida marina luminiscente pinta el paisaje hasta el horizonte, apareciendo como estrellas nadando por un océano alienígena.

		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedBeach = En la zona intermareal, un pequeño animal parecido a un mamífero hace su hogar dentro de una concha, una encantadora inversión de un concepto familiar de Kerbin y un excelente ejemplo de evolución convergente. Usa las conchas desechadas de otras criaturas marinas como refugio, pero puede moverse sorprendentemente rápido si se ve obligado a abandonarlo.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedRainforests = Una criatura viscosa de cuatro extremidades se balancea de rama en rama en el dosel denso, pareciendo casi una especie de Kraken vertebrado. O al menos lo parecería si no fuera de un llamativo color azul. La criatura mira tu nave con particular interés mientras tomas una muestra de suelo, y desciende del árbol para darle un inofensivo empujón antes de retirarse rápidamente.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedGrassland = Manadas de bestias robustas de seis patas y piel arrugada recorren las llanuras abiertas, sus números tan grandes que pocos depredadores pueden desafiarlas. Afortunadamente, esta manada no interrumpe el proceso de toma de muestras, pero en el futuro puede ser prudente escanear el área con las cámaras de la nave con más regularidad.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTropicalDesert = Pequeños animales peludos excavan en la arena para establecer colonias colosales, creando vastas redes subterráneas de túneles. Una especie de organismo similar a hongo bioluminiscente crece entre los túneles, que han aprendido a cultivar y comer. Sobre el suelo, grandes manadas de herbívoros altos de patas largas ramonean de los árboles más altos, y se comunican silenciosamente con rayas que pueden brillar con luz intensa.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedNeedleleafForests = Invertebrados del tamaño de un Kerbal se funden con la nieve, sus exoesqueletos tan pálidos y blancos como su entorno. Uno salta hacia la nave cuando el taladro de muestras se extiende, pero se detiene antes de tocarla, aparentemente sintiendo poco calor de su exterior rígido y decidiendo que sería un mal almuerzo.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTundra = La tundra de Efil es árida, pero lejos de estar sin vida. Aquí se pueden ver algunos enormes herbívoros migratorios, cubiertos de grueso pelaje a pesar de su naturaleza invertebrada. Con sus largas y flexibles patas, pueden erguirse hasta casi triplicar su altura y alcanzar todos excepto los árboles más altos.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedColdDesert = Los desiertos árticos tienen muy pocos animales grandes, pero el suelo debajo está repleto de actividad. Criaturas peludas asombrosamente diminutas, del tamaño de insectos, corretean por la nieve, excavando túneles y encontrando plantas resistentes con raíces nutritivas que cosechar.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedMountains = Lamentablemente, no hay mucho que ver a esta altitud. El suelo está mayormente sin vida en los picos más altos de Efil; sin embargo, aún se pueden ver grandes criaturas de pico lanceolado con enormes alas posándose en los acantilados. Durante la noche planetaria, cuando Efil pasa por la sombra de Anehta, estos animales se lanzan al cielo para cazar criaturas marinas y traerlas hasta aquí para alimentar a sus hambrientas crías.

		// Eulb
		#LOC_KS_SciDef_dmMagScan_Eulb_SrfLanded = El campo magnético de Eulb es bastante débil, pero no es difícil detectarlo con el instrumento desde la superficie. Además, hay varios campos localizados más pequeños y fuertes cerca.

		#LOC_KS_SciDef_rpwsScan_Eulb_InSpace = El débil campo magnético de Eulb genera fascinantes distorsiones en el campo magnético de Anehta mientras orbita el planeta gigante.

		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowGeneric = Ahora, ¿por qué es azul? ¿Lo hemos abordado? ¿Alguien está trabajando en eso? Que... que alguien trabaje en eso.
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersSmall = Esto me da «déjà blue»... ¿Lo pillas?
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersBig = Los cráteres más grandes de Eulb a veces son difíciles de distinguir de los mares. Casi parecen haber sido erosionados, pero la única fuerza que podría hacer eso serían los impactos de micrometeoritos. ¿Qué tan viejo ES Eulb?
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowDoubleCrater = Oh, ahora hay una característica interesante. Esto parece ser dos cráteres de impacto anidados: uno más grande y uno más pequeño. El cráter más interno parece ser el más joven de los dos.
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceHigh = Una luna azul... Bueno. Jeb, es hora de sacar el traje de pollo.

		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceLow = Los escaneos espectroscópicos realizados de la superficie de Eulb muestran fuerte absorción IR en casi toda la superficie de la luna. Esto implica al corindón azul, comúnmente conocido como zafiro, como el culpable de su llamativo color azul.
		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceHigh = Una atmósfera extremadamente tenue se adhiere a la superficie de Eulb. Es demasiado delgada para ser detectada con un barómetro.

		#LOC_KS_SciDef_dmSIGINT_Eulb_InSpaceLow = Múltiples pasadas de vigilancia de radio no encuentran nada de interés en Eulb.

		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLanded = El escaneo no revela cantidades significativas de hidrógeno subsuperficial en Eulb.
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPoles = Los bajos niveles de hidrógeno aquí pueden explicarse por depósitos dispersos de hielo de agua.
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPolarCrater = Se detecta aquí una señal de hidrógeno bastante fuerte, probablemente porque gran parte del área del cráter polar descansa en sombra permanente.

		#LOC_KS_SciDef_dmlaserblastscan_Eulb_SrfLanded = El análisis químico de la superficie de Eulb muestra que es comparativamente pobre en silicatos, y extremadamente rica en aluminio y oxígeno. Esto apunta al corindón azul como la razón de su coloración azul, un material comúnmente conocido como zafiro.

		#LOC_KS_SciDef_dmSolarParticles_Eulb_InSpace = El débil campo magnético de Eulb hace poco para desviar el viento solar, pero Anehta está haciendo mucho del trabajo por él de todos modos.

		#LOC_KS_SciDef_dmSoilMoisture_Eulb_InSpaceLow = Se detecta una señal de microondas débil, pero solo cuando las antenas apuntan a los polos.

		#LOC_KS_SciDef_dmRadiometerScan_Eulb_InSpaceHigh = Eulb tiene un albedo bastante alto. Su superficie brillante refleja mucha luz en todas las longitudes de onda registradas excepto rojo e infrarrojo.

		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLanded = Los escaneos sísmicos son absorbidos bastante bien por el regolito azul polvoriento. Podrías obtener mejores resultados en una ubicación más sólida, como un gran cráter.
		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLandedCratersBig = El análisis del interior de Eulb revela una composición densa, probablemente tan rica en óxidos de aluminio como el corindón como la superficie.

		// Elad
		#LOC_KS_SciDef_dmMagScan_Elad_SrfLanded = Las líneas del campo magnético corren en direcciones extrañas, pareciendo apuntar a un par de polos magnéticos que están inclinados unos 40 grados respecto al eje de rotación.
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceLow = Elad tiene un potente campo magnético, comparable en fuerza a Kerbin.
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceHigh = La interferencia magnética de Anehta es algo más tranquila a esta distancia, y Elad parece estar generando un considerable campo magnético propio.

		#LOC_KS_SciDef_rpwsScan_Elad_InSpace = Elad distorsiona fuertemente el campo magnético de Anehta con un potente campo propio, la pareja demostrando ser bastante efectiva desviando el viento solar juntos.

		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGeneric = Los páramos de Elad son un contraste marcado con las exuberantes colinas y mares cristalinos de Efil, y un sombrío recordatorio de la fragilidad de la vida en el universo.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraters = La naturaleza dispersa de estos cráteres comparada con otros objetos, como el cercano Eulb, da mucho peso a la noción de que Elad tenía una atmósfera densa hace relativamente poco.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterLarge = Elad tiene varios cráteres grandes como este dispersos, todos los cuales parecen ser características bastante jóvenes.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterGiant = Este enorme cráter es lo bastante grande como para haber sido responsable de la pérdida de la atmósfera de Elad, pero es imposible estar seguro.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCanyon = Este cañón es tan empinado y profundo que debe haber sido en su día una fosa oceánica.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowValleys = Elad está cubierto de profundos cañones y valles de rift que constituyen clara evidencia de tectónica de placas activa en su pasado.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCliff = Vaya. ESO sí que es un acantilado. La intensa tectónica de placas debe ser responsable de una cresta tan enorme.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceHigh = I+D dice que estas extrañas características superficiales solo pueden explicarse realmente por Elad habiendo perdido recientemente una atmósfera densa y posiblemente océanos también. Se ve tan desolado... ¿Podría ser realmente cierto?

		#LOC_KS_SciDef_dmImagingPlatform_Elad_InSpaceLow = El análisis espectral muestra que la superficie tiene una composición similar a Kerbin; rica en silicatos y metales.
		#LOC_KS_SciDef_dmImagingPlatform_Elad_InSpaceHigh = Las emisiones térmicas revelan signos de calentamiento interno en Elad, indicando actividad geológica actual.

		#LOC_KS_SciDef_dmSIGINT_Elad_InSpaceLow = Si algo, o alguien, alguna vez vivió en Elad, ahora han quedado en silencio de radio.

		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLanded = Hay una señal de hidrógeno tenue aquí, pero es difícil determinar si es tenue debido a la distancia o a pequeñas concentraciones.
		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLandedLowlands = Se detectan altos niveles de hidrógeno, pero la señal es débil después de atravesar mucha roca. ¡Esto puede indicar la presencia de océanos líquidos en las profundidades subterráneas!

		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedMidlandsHighlands = La desolada superficie de Elad parece estar compuesta químicamente mayormente de silicatos, oxígeno y aluminio. Como Kerbin, gran parte de su superficie está hecha de granito.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedLowlands = El suelo aquí contiene una gran concentración de sal, implicando fuertemente que fue en su día el fondo de un mar u océano de agua líquida.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCanyon = La superficie densamente compactada en este cañón es extremadamente salada, dando mucho peso a la hipótesis de que fue en su día una fosa oceánica profunda.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCliff = Este acantilado masivo parece contener varios tipos de cuarzo.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedValleys = Los «valles» de Elad presentan terreno salado densamente compactado, implicando que muchos, si no todos, fueron alguna vez fosas oceánicas profundas. Es posible que Elad fuera antes un mundo oceánico como Laythe.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCratersCraterLarge = Las altas concentraciones de metales foráneos y compuestos de carbono por lo demás poco comunes en Elad proporcionan información sobre la composición del impactador que produjo este cráter.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCraterGiant = Este cráter masivo es rico en metales pesados y otros compuestos que no se encuentran normalmente en la superficie de Elad, evidencia que sugiere que el impactador era muy denso y probablemente muy pesado.

		#LOC_KS_SciDef_dmSolarParticles_Elad_InSpaceLow = Los sensores en órbita baja de Elad detectan ligeras trazas de nitrógeno; quizás los últimos vestigios de su otrora densa atmósfera.
		#LOC_KS_SciDef_dmSolarParticles_Elad_InSpaceHigh = Elad está haciendo un trabajo excelente desviando el viento solar incluso a esta altitud, pero se recolectan varias partículas cargadas de tal manera que implica la existencia de un cinturón de radiación Van Kerman.

		#LOC_KS_SciDef_dmSoilMoisture_Elad_InSpaceLow = Orbitar sobre las regiones más bajas de Elad revela una señal de microondas consistentemente fuerte, implicando fuertemente la existencia de océanos subsuperficiales de agua líquida. ¡Si Elad alguna vez tuvo vida, es totalmente posible que aún viva ahí abajo!

		#LOC_KS_SciDef_dmRadiometerScan_Elad_InSpaceHigh = La brillante superficie de Elad tiene un albedo bastante alto en general, ayudado por la misteriosa falta de atmósfera de la luna.

		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLanded = Las reflexiones sísmicas desde las profundidades de Elad confirman que su núcleo sigue completamente fundido y su manto es muy activo.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedLowlands = La composición aparente de esta región coincide estrechamente con los fondos marinos de Kerbin, y como resultado no transmite las ondas sísmicas muy bien.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedGrandCanyonValleys = Esto parece ser una antigua fosa oceánica, a juzgar por la composición y los signos de compresión bajo tremenda presión presentes en el suelo aquí.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedCraterGiant = Los escaneos sísmicos de este masivo cráter muestran claramente grandes depósitos de metales pesados densos, indicando que el asteroide que produjo este cráter probablemente era metálico y habría sido lo suficientemente masivo como para atravesar incluso una atmósfera densa.

		// Wormhole(s)
		#LOC_KS_SciDef_rpwsScan_Wormholes_InSpace = El plasma del viento solar en ambos extremos del agujero de gusano parece estar interactuando aquí, formando un complejo entorno de viento solar como nada que hayas visto antes.

		#LOC_KS_SciDef_scopeScan_WH3141A_InSpace = Casi puedes ver otro planeta al otro lado. Ves anillos, una estrella naranja brillante, y... ¡SANTOS KRAKEN! ¿Es ese un gran ojo negro mirándote fijamente?
		#LOC_KS_SciDef_scopeScan_WH3141B_InSpace = La amigable forma verde de Jool está difuminada por el espacio, casi como una pintura al óleo o algo así. También puedes ver indicios de Laythe, Vall y Tylo.

		#LOC_KS_SciDef_dmImagingPlatform_Wormholes_InSpace = El análisis multiespectral demuestra... digámoslo «inconcluso». La luz del agujero de gusano está tan distorsionada que hace difícil verificar que cualquier lectura que tomes sea precisa.

		#LOC_KS_SciDef_dmSIGINT_WH3141A_InSpaceLow = Extrañas transmisiones de radio parecen originarse del objeto. Mientras monitoreas la transmisión, habrías jurado haber oído a alguien decir «¡Hola!» y «Vuelen seguro». Gracias, misteriosa voz espacial. ¡-Sí- volaremos seguro!
		#LOC_KS_SciDef_dmSIGINT_WH3141B_InSpaceLow = Monitoreando la actividad de radio que emana del agujero de gusano, captas los ecos distorsionados de transmisiones desde Kerbin.

		#LOC_KS_SciDef_dmSolarParticles_WH3141A_InSpace = Los colectores captan una sorprendente cantidad de viento solar en esta ubicación; probablemente procede del otro lado del agujero de gusano.
		#LOC_KS_SciDef_dmSolarParticles_WH3141B_InSpace = El viento solar aquí es una combinación de los vientos de Kerbol y Sunorc; aunque las lecturas de Sunorc son mucho más estables.

		#LOC_KS_SciDef_dmSoilMoisture_Wormholes_InSpaceLow = La radiación de microondas emana del agujero de gusano a un ritmo constante pero bajo. ¿Es el propio agujero de gusano responsable, o algo al otro lado lo está generando?

		#LOC_KS_SciDef_dmRadiometerScan_Wormholes_InSpaceHigh = Es difícil usar este instrumento cuando el más mínimo movimiento sacará de foco cualquier objeto que puedas ver a través del agujero de gusano. ¿Quizás deberías simplemente armarte de valor y atravesarlo?

	}
