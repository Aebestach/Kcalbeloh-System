		#LOC_KS_SciDef_evaReport_Sera_SrfLanded = Поверхность Серы представляет собой бесплодный скалистый ландшафт с разбросанными по нему валунами. Поразительная система колец Серы изгибается над головой, отбрасывая длинные тени на скалистую местность внизу. Озера хорошо видны с поверхности. Отсутствие какой-либо растительной и животной жизни на поверхности усиливает впечатление пустынного, негостеприимного мира.
