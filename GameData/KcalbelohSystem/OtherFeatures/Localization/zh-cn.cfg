		#LOC_KS_SciDef_barometerScan_Sedah_FlyingLow1 = Sedah的蓬松大气层似乎非常密集而紧凑。随着高温和行星发光的增加，Sedah的高温气氛变得更加明显。
		#LOC_KS_SciDef_barometerScan_Sedah_FlyingLow2 = 气压计的玻璃已经破碎，但你不确定是高温还是极端压力破坏了它，甚至可能两者兼而有之。
		#LOC_KS_SciDef_barometerScan_Sedah_FlyingHigh = 气压计读数显示随着海拔的增加，大气压力逐渐降低。Sedah的蓬松大气层在较高海拔处逐渐稀薄。

		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceLow1 = 重力扫描的读数显示出Sedah的明亮侧和暗侧之间明显的差异，可能是由温度变化引起的密度差异所导致。
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceLow2 = 传感器数据证实，尽管Sedah体积巨大，但其质量相对来说并不算太大。
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceHigh1 = 读数显示Sedah的重力显著较弱，与Jool等较大的气态巨星相比。Sedah的较低质量导致其重力拉力较弱，这可能对其整体结构和组成产生影响。
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceHigh2 = 传感器显示了一个异常低的读数，与这个尺寸的行星相比是异常的。进一步调查可能是值得的。

		#LOC_KS_SciDef_magnetometer_Sedah_InSpaceLow = Sedah在较低的太空中表现出相对强大且复杂的磁场。数据显示出磁暴和磁场波动的存在，表明这个炽热气态巨星周围存在着动态而活跃的磁环境。这些发现揭示了Sedah"蓬松"大气层独特的磁特性以及其对行星整体大气动力学和太空天气的潜在影响。
		#LOC_KS_SciDef_magnetometer_Sedah_InSpaceHigh = 磁力计的读数显示Sedah相对于其较大的对应物Jool具有相对较弱的磁场，这可能是由于其较低的质量所导致。然而，仍然可以检测到磁场的波动，表明Sedah的大气中存在一些磁活动。

		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingLow1 = 对Sedah下层大气的大气分析显示其主要由氢和氦组成，具有高温和动态的云层模式。由于其质量相对于体积较低，Sedah的大气层较稀薄且较为延展，使其呈现出扩散的外观，大气层之间的边界不太明显。
		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingLow2 = 仪器在Sedah下层大气的极端压力下被压碎。
		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingHigh = 对Sedah上层大气的大气分析显示出极高的温度和发光的特征，表明这个气态巨星具有强烈的热量。分析还确认了由于其较低的质量与体积比，Sedah的大气层相对于Jool来说较为稀薄和扩散，导致呈现出"蓬松"的外观，大气层之间的边界不太明显。


		// Suluco
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Day = 从Suluco的昼半球，即永恒的白昼地区，乘员们记录了持续不断的日照，不会有夜晚，并且地貌主要由灼热而贫瘠的环境为主。乘员注意到没有任何生命或植被的迹象，气温极高，条件恶劣。
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Twilight = 在Suluco的暮光带，乘员报告揭示了一个独特而引人入胜的环境。在昼半球和夜半球之间的狭窄的环状地带处于永恒的黄昏，是这个星球上唯一一个植物和其他生命形式能够生存的地区。此外，乘员还观察到该地区持续强风，可能是由于两个半球之间的极端温差引起的。报告还强调了暮光带的奇特照明条件，其中永恒的黄昏营造出神秘而超凡的氛围。
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Night = 在Suluco的夜半球，乘组记录了一个荒凉而寒冷的环境，被永恒的黑暗所笼罩。在这个星球的这一侧没有阳光照射，温度极低，地貌看起来贫瘠且不宜居住，没有任何生命的迹象。
		#LOC_KS_SciDef_crewReport_Suluco_SrfSplashed = 在Suluco的暮光带，即星球的昼半球和夜半球相交的地带，乘组的报告揭示了一个多变且动荡的环境。乘组观察到了由于两个半球之间的鲜明温差引起的持续强风，为探索创造了具有挑战性的条件。尽管如此，乘员注意到黄昏区存在着独特的外星生命形式和植物物种，使其成为科学研究的一个卓越地区。
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Day = 在Suluco的昼半球 (即一个半球持续处于白昼的一侧)的低层大气中，乘员观察到灼热的温度和强烈的辐射，行星表面被持续的阳光照射。
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Twilight = 从Suluco的暮光带(即星球的白昼半球和黑夜半球相交的地带)的低层大气中，乘员的报告揭示了由于两个半球之间的鲜明温差引起的持续强风而造成的恶劣条件。尽管天气动荡多变，乘员在这个独特的区域观察到了迷人的外星植物物种和其他奇特的生命形式，这是星球上唯一一个支持这种生命的地区。
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Night = 从Suluco的夜半球 (即星球的一个半球永远处于黑暗中)的低层大气中，乘员的报告揭示了与白昼半球相比完全不同的环境。乘员观察到严寒的温度和接近完全黑暗的环境，只有微弱的星光照亮着地貌。乘员还观察到了表面上的冰盖和冰形成物，表明在夜半球的低层大气中存在冻结水的存在。
		#LOC_KS_SciDef_crewReport_Suluco_FlyingHigh = 我们的航天器在Suluco的上层大气中观察到了鲜明的温度对比、强风和独特的大气组成。Suluco是一个潮汐锁定的行星，其白昼半球和黑夜半球之间存在明显差异。白昼半球展示了灼热的温度和电离气体，而黑夜半球则永远黑暗而寒冷，气体浓度较低。需要进一步研究来了解这个独特行星上复杂的大气动力学。
		#LOC_KS_SciDef_crewReport_Suluco_InSpaceLow = 我们的航天器进入了Suluco的低空间轨道，这是一个潮汐锁定的行星，昼半球和夜半球之间存在极端对比。昼半球非常炎热，有强烈的太阳辐射，而夜半球则沉入了永恒的黑暗和极端寒冷中。我们观察到一个狭窄的环带处于永恒的黄昏之中，被称为暮光带，这里可能是外星生命能够生存的地方。
		#LOC_KS_SciDef_crewReport_Suluco_InSpaceHigh = Suluco从远处的太空看起来像一只眼球。我们非常确定这个行星是被Sunorc潮汐锁定的，因为我们可以很容易地观察到昼半球和夜半球之间的差异。

		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Day = 温度扫描报告：我们在Suluco的昼半球的着陆点记录了灼热的温度，由于该行星持续暴露在阳光下，表面温度达到极高点。温度读数超过90摄氏度，使其对大多数生命形式来说是不宜居的。
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Twilight = 我们在Suluco的暮光带的着陆点记录了一个独特而动态的温度剖面。由于昼半球和夜半球之间的鲜明对比，该地区经历着显著的温度波动。读数显示-25至45摄氏度的范围，短时间内快速变化。这个动态环境为研究Suluco的暮光带的冷热相互作用提供了独特的挑战和机会。
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Night = 我们在Suluco的夜半球的着陆点测量到了极冷的温度，平均为零下65摄氏度，远低于冰点。在这个永恒的夜晚地区缺乏阳光导致极寒的环境，对我们所知的生命形式构成挑战。
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfSplashed = 我们在Suluco的暮光带的海洋中发现了一种独特的温度模式。昼半球和夜半球之间的暮光带表现出适中的温度，可能受到炎热与寒冷之间持续变化的影响。这个区域作为外星生命形式的潜在栖息地，植物和其他生物活动的存在证明了这一点。
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Day = 在Suluco昼半球的低层大气中进行温度扫描显示出显著的温度梯度，温度超过90摄氏度。面向恒星的一侧由于持续暴露在阳光下而经历极高温度。缺乏昼夜交替导致大气被持续加热，产生灼热的温度。这些极端条件可能对在Suluco的白昼半球进行探索或居住构成挑战。
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Twilight = 在Suluco暮光带的低层大气中进行温度扫描显示出与昼和夜半球不同的独特温度模式。昼半球和夜半球之间的过渡区域，也被称为暮光带，有着-15至45摄氏度的"宜人的"温度范围。这是由于持续受到昼半球和夜半球温度的影响，相对于昼半球和夜半球的极端温度条件而言，环境相对温和。
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Night = 在Suluco夜半球的低层大气中进行温度扫描显示出极端的温度条件。夜半球的永恒黑暗导致温度显著低于昼半球和暮光带。夜半球低层大气的平均温度为零下65摄氏度，温度低于冰点。
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingHigh = 在Suluco的高层大气中进行温度扫描显示出有趣的温度模式。由于Suluco与Sunorc处于潮汐锁定状态，一侧为永恒白昼，另一侧为永恒黑夜，高层大气显示出昼半球和夜半球之间的明显温度差异。

		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Day = 当我踏出飞船，踏上Suluco昼半球的地表时，我被强烈而持久的阳光所迎接。阳光几乎令人眩目，炎热异常。白昼半球的地形崎岖多石，有着巨大的岩石形成和陡峭的悬崖。岩石颜色各异，从深色的火山岩到更为风化的浅色岩石。地面干燥多尘，几乎没有液态水的迹象。
		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Twilight = 当我踏上Suluco昼半球和夜半球之间的暮光带时，我被这个独特而超凡脱俗的环境所震撼。光线如梦境般，永恒的黄昏状态投下一种神秘的光芒。这里的植物和动物与我以往见过的任何事物都不同，它们适应了这个黄昏区独特的条件。这是一个迷人而神秘的地方，充满了在光与暗的罕见交汇之处进化的生命。
		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Night = 踏上Suluco夜半球黑暗而冰冷的地表是一种怪异的体验。缺乏阳光和永恒黑暗创造了一个寒冷、荒凉且似乎缺乏生命的环境。温度远低于冰点，唯一的光照来自遥远的星光，与明亮的昼半球形成鲜明对比。
		#LOC_KS_SciDef_evaReport_Suluco_SrfSplashed = 当我在Suluco暮光带的海面上出舱活动时，我被一个超现实的景象所迎接。我下方的水域充满生机，生物发出的生物发光植物和生物以奇特的光芒照亮下方的黑暗。这里温度适中，空气中弥漫着一种宁静的感觉。与这个潮汐锁定行星的极寒与极热的区域相比，这里是一个独特的生命绿洲。
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Day = 当我翱翔在Suluco昼半球的低空大气中，我面对着无尽的耀眼阳光。温度极高，空气中弥漫着炽热和辐射。下方的地表荒凉而不适宜生命，没有任何生命的迹象。昼半球的恶劣条件提醒着我这个世界的极端本质。
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Twilight = 当我进入Suluco的暮光带时，我被一个异世界的壮观景象所震撼。狭窄的暮光带作为昼半球和夜半球之间的分界，生机勃勃。持续强风摆动我的飞行器，表明昼半球和夜半球之间的温度差异极大。我观察到奇怪而外星的植物，与我以前见过的任何植物都不同，展示出在这个黄昏环境中为生存而适应的卓越特征。
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Night = 温度急剧下降，风声凄厉，这是昼半球和夜半球温差巨大的结果。黑暗的环境使我很难看清周围，但是我的服装内置照明帮助我勉强辨认出怪异的外星景观。
		#LOC_KS_SciDef_evaReport_Suluco_FlyingHigh = 昼半球和夜半球之间的对比令人叹为观止，我对这个潮汐锁定行星上存在的独特条件感到惊叹。恶劣的条件使得进行实验具有挑战性，但我收集到的数据将有助于我们理解Suluco的大气动力学和天气模式。
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Day = 当我在昼半球上方的太空中时，我被刺眼的亮度所迎接。强烈的光照将昼半球照耀得灿烂夺目，在这个行星的这一侧太阳永不落山。温度极高，地形主要由广袤的沙漠和岩石平原组成。我观察到被不停吹拂的风形成的巨大沙丘，在沙漠中形成了错综复杂的纹理。
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Twilight = 明亮的白昼逐渐褪去，变成了永恒的黄昏，给下方的地面带来了一种超凡脱俗的光芒。与白昼半球相比，黄昏区的温度相对较为温和，这要归功于来自白昼和黑夜半球的气流不断混合。这里的风势强劲而持久，形成了旋转的云团和动荡的天气模式。这个狭窄的暮光带是Suluco上唯一可能存在植物和其他外星生命的地区。
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Night = 当我在夜半球上方的太空中时，黑暗将我笼罩。Suluco的这一侧永恒的黑夜让人毛骨悚然，只有遥远的星星提供微弱的照明。夜半球是一个极端寒冷和黑暗的领域，恶劣的条件使得生命很难存在。我隐约观察到冻结的湖泊和河流，下方的景色是荒凉而严酷的。
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceHigh = 从高轨道上，我观察到Suluco的昼半球被永恒的阳光所笼罩，而夜半球则被黑暗所覆盖。这些独特的半球为我们理解这个潮汐锁定行星上的光、温度和大气相互作用提供了宝贵的见解。

		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Day = 从Suluco的昼半球收集的地表样本证实了一个贫瘠而多岩的景观，温度高且辐射强烈。土壤干燥，没有任何有机物或植物生命的迹象。样本显示出极端风化的证据，这是由于持续暴露在阳光下导致的，岩石形成显示出侵蚀和退化的迹象。
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Twilight = 从Suluco的暮光带收集的地表样本揭示了一个充满奇异的生命形式的独特而多样的生态系统。土壤是岩石碎屑和有机物的混合物，表明这个地区存在植物生命。样本还显示出极端风化的证据，可能是由于昼半球和夜半球之间的温度差所带来的持续强风引起的。
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Night = 从Suluco的夜半球收集的地表样本揭示了一个荒凉而寒冷的环境，很少有生命的迹象。土壤由冻结的微粒和冰碎屑组成，表明极低的温度对大多数生命形式来说是无法生存的。样本中缺乏任何植物生命或有机物，这表明行星的这一侧的永恒黑暗条件是严酷的。
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfSplashed = 从Suluco的暮光带的海洋中收集的海洋样本揭示了一个独特的水生生态系统，具有引人入胜的特征。由于靠近夜半球，水比较冷，其中含有各种外星微生物和奇特的植物生命。水似乎是咸水，盐度较高。水比较湍急，可能受持续强风的影响。

