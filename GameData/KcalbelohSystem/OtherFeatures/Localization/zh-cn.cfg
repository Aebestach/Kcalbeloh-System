		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNightCraters = 这个撞击坑地表的矿物化合物和金属明显多于周围永久冰川，几乎肯定来自形成该坑的撞击体。
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfSplashedWater = 汽化液体确认是水，但想必你不需要这种专业仪器来确定吧。

		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceLow = 除了略有减弱的恒星风外，来自Suluco大气的氮和氧粒子也嵌入晶圆。
		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceHigh = Suluco的弱磁场几乎无法阻止恒星风冲击晶圆；这里的环境与行星际空间差别不大。

		#LOC_KS_SciDef_dmSoilMoisture_Suluco_InSpaceLow = L波段微波发射在Suluco大部分地表相当恒定，但当天线经过昼半球时，读数逐渐降至亚恒星点上方基本为零。

		#LOC_KS_SciDef_dmRadiometerScan_Suluco_InSpaceHigh = 反照率根据传感器看到更多昼半球还是晨昏带而剧烈变化；比大多数天体变化大得多。

		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedTwilight = 松软土壤吸收部分波，但仍能了解Suluco昼夜两侧之间地质的差异。
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedDay = Suluco沙质昼侧吸收地震波的能力极强，所以真的学不到多少。也许在山上运气会更好？
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedNight = 这里的雪压得很实，无法从数据中获得任何有用信息。山地冰川可能提供更多线索。
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsDayTwilight = 坚硬地表传导地震波良好，让你有充足机会研究Suluco内部。Suluco似乎仍有相当活跃的地质活动，但火山活动非常稀少。
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsNight = 岩石般的冰川在整个Suluco地壳清晰反射，显示存在可能含有液态水的巨大地下洞穴，以及可能孤立的生态系统！
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedWater = 松散土壤不利于地震波反射，所以没获得多少有用数据。

		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterShallow = Suluco浅层晨昏水域有各种微观和宏观生命；但没有比"群"落植物更迷人的了。它们以巨大垫状物漂浮在海洋表面，带有捕捉风和阳光的巨大帆。
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterDeep = 在深处，各种色彩斑斓的动物在海底航行。在许多方面它们像Kerbin上的生命，但在其他方面又大不相同。例如，没有昼夜循环，就没有日间垂直迁徙。
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanShallow = Suluco近暗侧海洋的严寒条件让人联想到北极海洋，但由于离温暖水域很近，温度变化快得多，有些动物几小时内就能在两者之间移动。
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanDeep = Suluco各处深海生物大同小异。无论位置如何都与阳光隔离，这里的生命难以与温暖经度的区分。

		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTwilight = 岩心样本充满生命；考虑到这里地面的绿色并不意外。小生物在泥土中挖隧道，设立小巢穴安全抚育幼崽。
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDesert = 尽管条件更恶劣，这里的生命像Kerbin沙漠一样繁盛。沙子很热，但也为机灵的动物提供躲避烈日的好去处，并以未开发资源的形式提供机遇，只要有什么够勇敢面对炎热。
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTundra = Suluco的晨昏苔原一直有种诡异的光芒；考虑到它们冷得像坟墓一样，很贴切。尽管如此，生命仍在这里生存。昼侧的昆虫可能挖洞躲避阳光，这里它们挖洞是为了留住热量保持温暖。许多动物在此筑巢，因为恶劣条件也能躲避捕食者。
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDay = 虽然你不指望找到什么，但可能惊讶地发现即使在这里，除了耐寒微生物外还有小动物生存。动物普遍很小，几乎终生在地下度过以躲避阳光，但它们已适应了阴影区的炎热。由于太阳从不移动，这些阴影点是永久的。
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNight = Suluco夜侧荒凉而严酷，但如果生命能在Kerbin极地生存，这里也可以。与昼侧小动物形成对比，这些通常体型巨大，以产生尽可能多的体温——储存在厚厚的脂肪层中。甚至有少数物种会穿过夜侧的短距离迁徙以躲避捕食者。
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDayPole = 尽管Suluco上生命顽强存在，昼侧的微弱存在逐渐消退直至你到达亚恒星点——一个如此炎热、如此荒凉和不适宜居住的地方，除了极端微生物外什么都无法生存。尽管如此，尽管一切，还是有东西生活在这里。是不是很疯狂？
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNightPole = 夜极是Suluco绝对最冷的部分。Kerbin上没有哪里这么冷。然而……有一个物种坚持了下来。巨大的野兽成群翱翔，通过径直穿越夜侧从晨昏带一端导航到另一端。它们几天就能跨越这段距离，靠厚厚的隔热层和在高密度冰冻空气中滑翔生存。
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedWater = 似乎有些海洋生物在这里的海岸产卵；这是Suluco各处海滩的常见景象。大型无脊椎动物会在这里产卵，埋在沙里，以保护它们免受水生捕食者伤害。

