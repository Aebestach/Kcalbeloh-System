		// Iomena

		#LOC_KS_SciDef_crewReport_Iomena_SrfLanded = Il rapporto equipaggio dalla superficie di Iomena annota l'ambiente ostile del pianeta e le condizioni meteorologiche estreme. Tuttavia, viene anche notata la bellezza del paesaggio, con i suoi crateri, oceani, montagne, canyon e fiumi, nonché la vista mozzafiato del buco nero.
		#LOC_KS_SciDef_crewReport_Iomena_SrfSplashed = Nonostante le condizioni ostili, l'equipaggio ha goduto di una vista spettacolare di Kcalbeloh dal pianeta.
		#LOC_KS_SciDef_crewReport_Iomena_FlyingLow = Mentre sorvolavamo i canyon e i fiumi di Iomena, abbiamo osservato il terreno accidentato del pianeta nell'atmosfera sottile.
		#LOC_KS_SciDef_crewReport_Iomena_FlyingHigh = Mentre planavamo nell'alta atmosfera di Iomena, la vista era davvero mozzafiato. Potevamo vedere i crateri e le montagne del pianeta da una prospettiva completamente nuova. L'atmosfera sottile significava che potevamo vedere lontano, e il disco di accrescimento che brillava sulla superficie del pianeta creava un bellissimo gioco di luce e ombre.
		#LOC_KS_SciDef_crewReport_Iomena_InSpaceLow = Iomena sembra essere un pianeta freddo e ostile, ma è ancora una destinazione affascinante per l'esplorazione scientifica.
		#LOC_KS_SciDef_crewReport_Iomena_InSpaceHigh = Dall'alto sopra Iomena, il terreno accidentato e i vasti oceani del pianeta sono visibili. I crateri e i canyon creano un paesaggio drammatico, e le montagne ghiacciate brillano alla luce.

		#LOC_KS_SciDef_temperatureScan_Iomena_SrfLanded = La scansione della temperatura sulla superficie di Iomena rivela un ambiente freddo con una temperatura media di -40°C. Tuttavia, la temperatura varia notevolmente a seconda della posizione, con alcune aree molto più fredde di altre.
		#LOC_KS_SciDef_temperatureScan_Iomena_SrfSplashed = La scansione della temperatura effettuata dopo l'ammaraggio sulla superficie oceanica di Iomena ha rivelato che la temperatura dell'oceano è -40°C, coerente con l'ambiente estremamente freddo del pianeta.
		#LOC_KS_SciDef_temperatureScan_Iomena_FlyingLow = La scansione della temperatura effettuata volando nella bassa atmosfera di Iomena ha rivelato una diminuzione graduale della temperatura con l'aumentare dell'altitudine.
		#LOC_KS_SciDef_temperatureScan_Iomena_FlyingHigh = Mentre il veicolo planava nell'alta atmosfera di Iomena, le letture della temperatura indicavano le condizioni gelide delle regioni ad alta quota del pianeta.

		#LOC_KS_SciDef_evaReport_Iomena_SrfLanded = Durante l'EVA sulla superficie di Iomena, l'equipaggio ha osservato i grandi crateri e il terreno accidentato, nonché la presenza di ammoniaca nelle rocce e nel suolo. Hanno anche notato le temperature estremamente fredde e l'atmosfera sottile, che renderebbero difficile la sopravvivenza dei kerbal senza equipaggiamento protettivo.
		#LOC_KS_SciDef_evaReport_Iomena_SrfSplashed = Sebbene fosse difficile muoversi a causa della resistenza del liquido, la squadra EVA è riuscito a raccogliere campioni dall'oceano e osservare le aree circostanti. L'alta concentrazione di ammoniaca nell'acqua era immediatamente evidente.
		#LOC_KS_SciDef_evaReport_Iomena_FlyingLow = Il rapporto EVA nella bassa atmosfera su Iomena rivela un ambiente ostile con temperature molto basse. L'equipaggio osserva anche il terreno accidentato con canyon, montagne e fiumi.
		#LOC_KS_SciDef_evaReport_Iomena_FlyingHigh = Il rapporto EVA durante il volo nell'alta atmosfera di Iomena indicava che l'aria era sottile e la temperatura era estremamente bassa. La superficie del pianeta era visibile sotto, con grandi crateri e catene montuose.
		#LOC_KS_SciDef_evaReport_Iomena_InSpaceLow = Mentre il membro dell'equipaggio si avventurava fuori dal veicolo spaziale, è stato in grado di osservare il pianeta Iomena dall'oscurità dello spazio. L'atmosfera sottile dava al pianeta un aspetto unico. È stata un'esperienza mozzafiato e indimenticabile.
		#LOC_KS_SciDef_evaReport_Iomena_InSpaceHigh = La vista dall'orbita alta sopra Iomena è spettacolare, con il suo terreno accidentato e i vasti oceani. L'atmosfera sottile del pianeta è visibile in una tonalità blu-grigia.

		#LOC_KS_SciDef_surfaceSample_Iomena_SrfLanded = Durante la raccolta di un campione di superficie da Iomena, è stato osservato che il suolo è composto principalmente da minerali silicati e contiene alti livelli di ammoniaca. Il campione conteneva anche tracce di composti organici, che potrebbero suggerire la possibilità di vita nel passato o nel presente.
		#LOC_KS_SciDef_surfaceSample_Iomena_SrfSplashed = Durante la raccolta del campione liquido dall'oceano di Iomena, abbiamo osservato un'alta concentrazione di ammoniaca, coerente con gli studi atmosferici precedenti. Sono necessarie ulteriori analisi per determinare altri componenti chimici o biologici notevoli nel campione.

		#LOC_KS_SciDef_mobileMaterialsLab_Iomena_SrfLanded = L'esperimento della sonda materiali sulla superficie di Iomena ha rivelato la presenza di vari minerali, tra cui ferro, alluminio e silicio. Inoltre, i campioni di superficie raccolti indicano la possibilità di attività vulcanica nel passato. L'atmosfera sottile contiene anche alti livelli di ammoniaca, che potrebbero aver contribuito alla formazione di alcuni di questi minerali.
		#LOC_KS_SciDef_mobileMaterialsLab_Iomena_SrfSplashed = L'esperimento della sonda materiali fornisce risultati interessanti sulla composizione chimica degli oceani del pianeta, data l'alta concentrazione di ammoniaca presente.

		#LOC_KS_SciDef_barometerScan_Iomena_SrfLanded = Possiamo osservare che la pressione atmosferica è inferiore a quella di Kerbin, il che è previsto dato che il pianeta ha un'atmosfera più sottile.
		#LOC_KS_SciDef_barometerScan_Iomena_SrfSplashed = La pressione alla superficie dell'oceano è risultata nell'intervallo atteso in base ai dati precedenti: la pressione atmosferica era significativamente inferiore a quella di Kerbin.

		#LOC_KS_SciDef_seismicScan_Iomena_SrfLanded = L'esperimento di scansione sismica condotto su Iomena mentre era atterrato sulla sua superficie ha fornito informazioni preziose sulla struttura interna del pianeta. La scansione ha rivelato una rete complessa di faglie e fratture sotto la superficie del pianeta, indicando attività tettonica nel passato del pianeta. I dati hanno anche indicato la presenza di un mantello roccioso solido e un nucleo metallico.

		#LOC_KS_SciDef_gravityScan_Iomena_SrfLanded = Le letture di gravità su Iomena fluttuano notevolmente a seconda del punto in cui vengono effettuate le misurazioni. Questo è probabilmente dovuto al terreno irregolare del pianeta e all'impatto dei suoi numerosi crateri e canyon sulla geologia interna.
		#LOC_KS_SciDef_gravityScan_Iomena_InSpaceLow = Le letture di gravità effettuate in orbita bassa attorno a Iomena mostrano valori relativamente stabili rispetto a quelle effettuate sulla superficie del pianeta. Durante la scansione gravimetrica condotta in orbita bassa attorno a Iomena, è stato osservato che il pianeta ha un'attrazione gravitazionale relativamente debole rispetto a Kerbin. 
		#LOC_KS_SciDef_gravityScan_Iomena_InSpaceHigh = Le letture di gravità fluttuano leggermente a seconda dell'altitudine del veicolo spaziale e dell'attrazione gravitazionale di Kcalbeloh.

		#LOC_KS_SciDef_magnetometer_Iomena_InSpaceLow = Il debole campo magnetico di Iomena è ancora rilevabile anche in orbita bassa, indicando una possibile fonte di materiale magnetico sulla o sotto la superficie del pianeta. Le variazioni nell'intensità del campo magnetico suggeriscono anche la presenza di depositi minerali localizzati o altre caratteristiche geologiche che potrebbero essere investigate ulteriormente.
		#LOC_KS_SciDef_magnetometer_Iomena_InSpaceHigh = Le letture del magnetometro dall'orbita alta di Iomena mostrano che il pianeta ha un campo magnetico debole, probabilmente a causa della sua atmosfera sottile e della mancanza di un nucleo ricco di ferro sostanziale. Tuttavia, ci sono piccole variazioni locali nel campo magnetico, suggerendo la presenza di depositi minerali o altre caratteristiche geologiche che potrebbero essere studiate ulteriormente.

		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_SrfLanded = Sulla base dell'analisi atmosferica condotta mentre era atterrato su Iomena, sembra che l'atmosfera del pianeta sia composta principalmente da ammoniaca con tracce di metano e anidride carbonica. L'atmosfera contiene anche piccole quantità di vari idrocarburi, probabilmente a causa dell'attività geologica.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_SrfSplashed = Sulla base dell'analisi atmosferica condotta mentre era ammarato sulla superficie liquida di Iomena, sembra che l'atmosfera del pianeta sia composta principalmente da ammoniaca con tracce di metano e anidride carbonica. L'atmosfera contiene anche piccole quantità di vari idrocarburi, probabilmente a causa dell'attività geologica.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_FlyingLow = Sulla base dell'analisi atmosferica condotta volando a quote più basse su Iomena, l'atmosfera del pianeta è composta principalmente da ammoniaca con tracce di metano e anidride carbonica. La presenza di idrocarburi suggerisce una potenziale attività geologica.
		#LOC_KS_SciDef_atmosphereAnalysis_Iomena_FlyingHigh = Dall'alta atmosfera di Iomena, la nostra analisi indica che la concentrazione di ammoniaca è significativamente più alta rispetto a quella nella bassa atmosfera. Questo suggerisce che potrebbero esserci processi geologici o atmosferici che causano la concentrazione dell'ammoniaca a quote più elevate. 

		// Uleg
		#LOC_KS_SciDef_crewReport_Uleg_SrfLanded = All'atterraggio su Uleg, l'equipaggio ha segnalato temperature estremamente basse e venti gelidi costanti. Hanno anche notato la presenza di grandi formazioni di ghiaccio e tracce di criovulcanismo attivo. L'equipaggio ha concluso che Uleg sarebbe un ambiente impegnativo per qualsiasi futura missione di esplorazione.
		#LOC_KS_SciDef_crewReport_Uleg_FlyingLow = Abbiamo potuto osservare il terreno ghiacciato del pianeta in modo più dettagliato durante il sorvolo della bassa atmosfera di Uleg. La superficie era relativamente piatta con alcune piccole crepe e creste visibili. La temperatura gelida e la bassa pressione atmosferica rendono il pianeta inospitale per la vita come la conosciamo.
		#LOC_KS_SciDef_crewReport_Uleg_FlyingHigh = Abbiamo attraversato l'alta atmosfera di Uleg e incontrato venti forti e freddo intenso. Lo spesso strato di ghiaccio del pianeta e la bassa pressione atmosferica hanno reso difficile mantenere l'altitudine, e i nostri strumenti hanno mostrato che l'aria era molto secca. La vista dall'alto era mozzafiato, con nuvole turbinanti di cristalli di ghiaccio e montagne innevate visibili in lontananza.
		#LOC_KS_SciDef_crewReport_Uleg_InSpaceLow = Mentre volavamo nello spazio vicino a Uleg, potevamo vedere la superficie ghiacciata del pianeta scintillare in lontananza. Nonostante la distanza da Kcalbeloh, la gravità del pianeta era ancora fortemente avvertita dalla nostra nave, ricordandoci le potenti forze in gioco nell'universo. L'oscurità dello spazio era solo accentuata dalla bellezza ghiacciata di Uleg, offrendo uno spettacolo davvero impressionante.
		#LOC_KS_SciDef_crewReport_Uleg_InSpaceHigh = L'equipaggio riferisce che dall'orbita alta, Uleg appare come un mondo desolato e sterile con una superficie quasi interamente coperta di ghiaccio. L'orbita fortemente inclinata ed eccentrica del pianeta significa che passa la maggior parte del tempo lontano da Kcalbeloh, risultando in un ambiente buio e freddo. Nonostante le sue condizioni ostili, l'equipaggio nota che le caratteristiche uniche del pianeta lo rendono un soggetto intrigante per ulteriori studi.

		#LOC_KS_SciDef_temperatureScan_Uleg_SrfLanded = La temperatura sulla superficie di Uleg è estremamente fredda, con letture costantemente sotto lo zero. Il ghiaccio che copre la superficie è probabilmente il risultato delle temperature gelide del pianeta, e non è chiaro se esistano aree sul pianeta non coperte di ghiaccio.
		#LOC_KS_SciDef_temperatureScan_Uleg_FlyingLow = La temperatura su Uleg diminuisce significativamente con la diminuzione dell'altitudine, con una differenza fino a 50 gradi Celsius tra l'alta e la bassa atmosfera. Questo è probabilmente dovuto all'atmosfera sottile del pianeta e alla mancanza di gas serra.
		#LOC_KS_SciDef_temperatureScan_Uleg_FlyingHigh = La temperatura nell'alta atmosfera di Uleg è estremamente bassa, probabilmente a causa della distanza del pianeta da Kcalbeloh, nonché della mancanza di un'atmosfera sostanziale per trattenere il calore. La scansione della temperatura mostra anche piccole variazioni di temperatura nell'alta atmosfera, probabilmente dovute alle differenze nella topografia superficiale e nella copertura di ghiaccio.

		#LOC_KS_SciDef_evaReport_Uleg_SrfLanded = Mentre l'equipaggio metteva piede sulla superficie ghiacciata di Uleg, è stato colpito dal freddo intenso e dall'immensa distesa di terreno gelato davanti a loro. Il paesaggio ghiacciato era punteggiato di affioramenti rocciosi. L'equipaggio ha anche segnalato un senso di meraviglia di fronte alla bellezza austera del paesaggio gelato di Uleg, sottolineando il potenziale di scoperta scientifica anche negli ambienti più estremi.
		#LOC_KS_SciDef_evaReport_Uleg_FlyingLow = A causa delle temperature estremamente basse e del terreno ghiacciato, condurre un'EVA nella bassa atmosfera di Uleg sarebbe molto impegnativo e pericoloso. Non è consigliato tentare un'EVA in tali condizioni.
		#LOC_KS_SciDef_evaReport_Uleg_FlyingHigh = A causa del freddo estremo e della mancanza di atmosfera, non è consigliato agli astronauti eseguire un'EVA nell'alta atmosfera di Uleg. Le condizioni sarebbero troppo ostili e porrebbero un rischio significativo per la sicurezza dell'equipaggio.
		#LOC_KS_SciDef_evaReport_Uleg_InSpaceLow = Mentre il membro dell'equipaggio si avventurava fuori dal veicolo spaziale, è stato in grado di osservare il pianeta gelido Uleg dall'oscurità dello spazio. La superficie del pianeta era per lo più coperta da uno spesso strato di ghiaccio, dandole un aspetto austero e desolato. Nonostante le condizioni fredde e ostili, il membro dell'equipaggio si è meravigliato della bellezza del pianeta sullo sfondo del cosmo infinito.
		#LOC_KS_SciDef_evaReport_Uleg_InSpaceHigh = Durante l'EVA nell'orbita alta sopra Uleg, il membro dell'equipaggio ha osservato la superficie ghiacciata del pianeta gelido e la sua orbita fortemente inclinata ed eccentrica. La vista mozzafiato e indimenticabile ha messo in evidenza le caratteristiche uniche del pianeta, catturata sullo sfondo dell'oscurità dello spazio.

		#LOC_KS_SciDef_surfaceSample_Uleg_SrfLanded = Mentre l'equipaggio raccoglieva campioni di superficie da Uleg, ha notato che il ghiaccio era estremamente duro e mostrava tracce di esposizione a temperature estreme. La composizione dei campioni suggerisce che il ghiaccio è composto da un mix di acqua, metano e anidride carbonica, che potrebbe fornire preziose informazioni sulla storia e la formazione del pianeta.

		#LOC_KS_SciDef_mobileMaterialsLab_Uleg_SrfLanded = Durante l'esperimento di studio dei materiali condotto sulla superficie di Uleg, campioni di ghiaccio sono stati analizzati per la loro composizione chimica e proprietà fisiche. L'analisi ha rivelato che il ghiaccio su Uleg è composto principalmente da acqua, con piccole quantità di altri elementi e composti presenti. Le proprietà fisiche del ghiaccio indicano che è molto duro e fragile, probabilmente a causa delle temperature estremamente fredde sul pianeta.

		#LOC_KS_SciDef_barometerScan_Uleg_SrfLanded = La scansione barometrica sulla superficie di Uleg ha indicato una bassa pressione atmosferica, coerente con le temperature gelide del pianeta e la mancanza di un'atmosfera significativa.
		#LOC_KS_SciDef_barometerScan_Uleg_FlyingLow = La scansione barometrica effettuata nella bassa atmosfera di Uleg ha rivelato una pressione dell'aria significativamente più bassa. Le letture indicano che l'atmosfera del pianeta è estremamente sottile e inadatta alla respirazione.
		#LOC_KS_SciDef_barometerScan_Uleg_FlyingHigh = La pressione sarebbe troppo bassa per consentire allo strumento di rilevare dati significativi. L'atmosfera sottile non permetterebbe al barometro di funzionare correttamente.

		#LOC_KS_SciDef_seismicScan_Uleg_SrfLanded = Durante la scansione sismica sulla superficie di Uleg, l'attrezzatura ha registrato diversi piccoli tremori, indicando che il pianeta potrebbe essere ancora geologicamente attivo, anche se la sua superficie è per lo più gelata. Sarà necessaria un'ulteriore analisi dei dati per determinare la fonte di questi tremori e le loro potenziali implicazioni per la geologia del pianeta.

		#LOC_KS_SciDef_gravityScan_Uleg_SrfLanded = L'equipaggio ha effettuato una scansione gravimetrica sulla superficie di Uleg. I risultati hanno mostrato variazioni nel campo gravitazionale del pianeta, indicando la presenza di regioni relativamente cave sotto la superficie ghiacciata. Sono necessarie ulteriori analisi per determinare la natura e la composizione di queste regioni.
		#LOC_KS_SciDef_gravityScan_Uleg_InSpaceLow = Durante l'esperimento di scansione gravimetrica in orbita bassa sopra Uleg, il veicolo spaziale è stato in grado di misurare il campo gravitazionale del pianeta. Le letture hanno mostrato una forza gravitazionale più debole del previsto, indicando che Uleg ha una bassa densità e potrebbe avere un interno parzialmente cavo.
		#LOC_KS_SciDef_gravityScan_Uleg_InSpaceHigh = È stata effettuata una scansione gravimetrica sul pianeta Uleg da un veicolo spaziale in orbita alta. La scansione ha rivelato variazioni significative nel campo gravitazionale del pianeta, indicando la presenza di materiali sotterranei meno densi.

		#LOC_KS_SciDef_magnetometer_Uleg_InSpace = I dati raccolti hanno mostrato un debole campo magnetico, probabilmente dovuto alla mancanza di un nucleo di ferro sostanziale sul pianeta. I risultati saranno utili per comprendere la geologia e la formazione di Uleg.

		#LOC_KS_SciDef_atmosphereAnalysis_Uleg_SrfLanded = Abbiamo raccolto campioni di gas e misurato la pressione e la composizione atmosferica. I risultati preliminari suggeriscono che l'atmosfera è composta principalmente da azoto e metano, con tracce di altri gas.
		#LOC_KS_SciDef_atmosphereAnalysis_UlegFlyingLow = Mentre il veicolo spaziale scendeva nella bassa atmosfera di Uleg, l'atmosfera si è rivelata sottile e composta principalmente da azoto. Metano e anidride carbonica sono stati rilevati in tracce. L'analisi ha anche mostrato che la pressione atmosferica aumentava con la diminuzione dell'altitudine.
		#LOC_KS_SciDef_atmosphereAnalysis_UlegFlyingHigh = L'analisi atmosferica nell'alta atmosfera del pianeta Uleg ha rivelato un'alta concentrazione di azoto, metano e anidride carbonica, suggerendo che il pianeta potrebbe essere soggetto a una qualche forma di attività geologica. Inoltre, la pressione atmosferica è risultata estremamente bassa, indicando che l'alta atmosfera di Uleg è molto sottile.


		// Maelg
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceLow1 = Il corpo appena fuori dall'oblò della nave non sembra abbagliare come farebbe una vera stella, ma sembra principalmente bagnare dolcemente lo scafo e i corpi circostanti con una luce soffusa.
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceLow2 = Da questa distanza ravvicinata, le bande della nana bruna sono chiaramente visibili, suggerendo ulteriormente il suo stato di "quasi-fusione".
		#LOC_KS_SciDef_temperatureScan_Maelg_InSpaceLow = Sebbene il termometro ti informi gentilmente che Maelg è davvero piuttosto caldo, rivela anche che è solo circa un terzo della temperatura di Kerbol alla sua "superficie".
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceLow1 = A questa distanza ravvicinata dalla nana bruna, con solo la tua tuta apparentemente fragile a proteggerti dalle sue temperature ancora roventi, metti in discussione gli scienziati Kerbal che hanno descritto la stella fallita a te e al tuo equipaggio come "piccola e debole" durante il briefing della missione.
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceLow2 = La luce che emana da Maelg non è dura come ti saresti aspettato, ed è in realtà piuttosto piacevole.
		#LOC_KS_SciDef_mysteryGoo_Maelg_InSpaceLow = Il Goo non protetto inizia comunque rapidamente a cuocere e sublimare al contatto ravvicinato con Maelg, nonostante la temperatura tecnicamente bassa della nana bruna (in termini stellari).
		#LOC_KS_SciDef_mobileMaterialsLab_Maelg_InSpaceLow = I campioni di piombo e gli altri metalli più morbidi iniziano a bollire e galleggiare fuori dalla sonda materiali nel bagliore simile a una lampada termica di Maelg, mentre i campioni più resistenti iniziano semplicemente a brillare di calore interno, non dissimilmente dal corpo stellare appena sotto.
		#LOC_KS_SciDef_gravityScan_Maelg_InSpaceLow = La gravità indicata alla superficie di Maelg potrebbe essere paragonata a una versione sostanzialmente più estrema del già potente pozzo gravitazionale di Jool, poiché nonostante le sue (relativamente parlando) piccole dimensioni, la stella fallita riesce a trattenere Mehtna e Meiuqer abbastanza saldamente, nonostante l'interferenza degli altri sistemi vicini e di Kcalbeloh stesso.
		#LOC_KS_SciDef_magnetometer_Maelg_InSpaceLow = Il magnetometro rivela la furia che ribolle nell'altrimenti spenta e debole Maelg, poiché rileva il suo violentemente forte campo magnetico e le relative fasce di radiazione. Il KSC ti informa di pensarlo come i campi magnetici di Jool su steroidi... per 50.

		#LOC_KS_SciDef_crewReport_Maelg_InSpaceHigh1 = Da questa distanza, Maelg ti fa quasi credere di essere una stella. Quasi è la parola chiave qui.
		#LOC_KS_SciDef_crewReport_Maelg_InSpaceHigh2 = Fin qui, Maelg sembra essere solo una fioca luce notturna rispetto ai fari alogeni delle stelle a cui sei abituato. Non è certo paragonabile all'ira empia di Kcalbeloh, o persino di Kerbol.
		#LOC_KS_SciDef_temperatureScan_Maelg_InSpaceHigh = Da questa distanza, Maelg non è fortemente rilevato dall'unità di temperatura.
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceHigh1 = Da qui, Maelg ti ricorda un filamento di lampadina, che brilla dolcemente da solo nell'oscurità infinita. Rispetto all'orrore cosmico evocato da Kcalbeloh, Maelg è piuttosto rassicurante.
		#LOC_KS_SciDef_evaReport_Maelg_InSpaceHigh2 = Anche se il vuoto dello spazio ti impedisce di farlo fisicamente, non puoi fare a meno di sentirti riscaldato dalla luce gentile di Maelg. È facilmente il momento più confortevole che hai avuto in questo viaggio finora.
		#LOC_KS_SciDef_mysteryGoo_Maelg_InSpaceHigh = Il Goo sembra assumere una tonalità ambrata simile a tutto il resto nel sistema Maelg. O è solo un effetto della luce fioca che avvolge tutto a portata di vista?
		#LOC_KS_SciDef_mobileMaterialsLab_Maelg_InSpaceHigh = La maggior parte dei campioni rimane inerte a questa distanza dalla nana bruna, con la notevole eccezione di sembrare assumere la tonalità seppia della stella fallita sotto. Tuttavia, la sezione di test magnetici nel laboratorio materiali indica che Maelg ha un campo magnetico molto strano e potente ed è probabilmente piuttosto volatile, nonostante il suo aspetto gentile.
		#LOC_KS_SciDef_gravityScan_Maelg_InSpaceHigh = A questa distanza, il pozzo gravitazionale di Maelg è un po' debole rispetto alle vere stelle come Kerbol, ma è ancora palpabile e supera di gran lunga anche i pianeti più massicci.
		#LOC_KS_SciDef_magnetometer_Maelg_InSpaceHigh = Da quassù, il campo magnetico rilevato è ancora piuttosto docile, come il resto di Maelg. Tuttavia, più ti avvicini, più la violenza all'interno della nana bruna diventerà forte rispetto a te e alla tua minuscola nave.

		//Mehtna
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded1 = Non puoi fare a meno di essere ricordato di fotografie vintage mentre guardi la superficie apparentemente seppia di Mehtna dalle finestre del lander.
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded2 = Rispetto ad alcune delle destinazioni più estreme in mostra nel vicinato di Kcalbeloh, tutto questo è un gradito cambio di ritmo.
		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded3 = Non puoi fare a meno di sentirti confortato e persino un po' assonnato su questo piccolo mondo seppia simile a Duna.
		#LOC_KS_SciDef_temperatureScan_Mehtna_SrfLanded_TempLow = Da questo lato del pianeta, l'atmosfera si condensa parzialmente e cade al suolo in una sorta di fanghiglia a causa del freddo estremo, non dissimile dai poli di Duna, sebbene in modo molto ridotto rispetto a quel mondo.
		#LOC_KS_SciDef_temperatureScan_Mehtna_SrfLanded_TempHigh = Da questo lato di Mehtna, la sottile atmosfera è riscaldata sostanzialmente dal fioco Maelg, e dimostra che nessuna parte di questo mondo sterile e ambrato è in grado di sostenere la vita, lato caldo o freddo a parte.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded1 = Senti che tutto intorno a te assomiglia a una fotografia vintage sbiadita. La tua stessa pelle sembra assumere una tonalità ambrata inusuale.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded2 = Hai la strana sensazione, stando su Mehtna, che questo mondo sia davvero morto, simile a una batteria scarica.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded3 = È dubbio che i pannelli solari ti sarebbero di grande utilità in questo ambiente fioco.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_SrfLanded1 = Il Goo sembra sia indurirsi e assumere una tonalità seppia, sia sublimare leggermente nell'atmosfera tenue.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_SrfLanded2 = Il Goo non emana più calore internamente, e sembra diventare senza vita come Mehtna stesso.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded1 = I campioni che raccogli non sembrano essere totalmente solidi strutturalmente una volta spostati, come se fossero fragili per essere stati statici per così tanto tempo.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded2 = Questi campioni si riveleranno senza dubbio utili, poiché sono piuttosto antichi a giudicare dall'ambiente apparentemente invariato che è la superficie mehtniana.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded3 = I campioni stessi sembrano essere un sano mix di substrato e antichi pezzi di ghiaccio.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_SrfLanded1 = A seconda dell'orientamento della sonda stessa, i campioni volatili nella sonda materiali alternano tra sublimazione e congelamento solido.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_SrfLanded2 = I campioni (con la notevole eccezione del campione d'acqua, che bolle rapidamente) rimangono principalmente invariati, oltre a sembrare reagire leggermente con l'atmosfera sottile circostante.
		#LOC_KS_SciDef_barometerScan_Mehtna_SrfLanded = Il barometro conferma la natura tenue dell'atmosfera di Mehtna, sebbene indichi anche che è un po' più spessa dell'atmosfera di Duna. Tuttavia, rispetto a pianeti come Rouqea o persino lune come Efil, questa atmosfera è di poca importanza.
		#LOC_KS_SciDef_seismicScan_Mehtna_SrfLanded = Le scansioni sismiche indicano che l'unica attività rilevabile su questo pianeta solitario è causata dagli impatti occasionali.
		#LOC_KS_SciDef_gravityScan_Mehtna_SrfLanded = La gravità su questo mondo è piuttosto sostanziale rispetto ad altre destinazioni nel sistema solare e oltre, attestandosi a poco più della metà della gravità di Kerbin. La trovi un giusto mezzo per esplorare efficacemente questa tomba di mondo senza impantanarti o volare via troppo lontano con ogni passo.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_SrfLanded = L'analizzatore atmosferico indica che la sottile atmosfera di questo pianeta consiste principalmente di anidride carbonica e vapore acqueo, con una buona quantità di gas traccia. Mehtna sarebbe un candidato ideale per il raccolto di risorse atmosferiche!

		#LOC_KS_SciDef_crewReport_Mehtna_FlyingLow = Guardi lo strano pianeta sotto, notando che la geografia sembra essere totalmente aliena. Questo è probabilmente causato dalla… situazione solare unica che Mehtna affronta.
		#LOC_KS_SciDef_temperatureScan_Mehtna_FlyingLow = La temperatura dell'atmosfera fluttua costantemente a seconda di dove si trova il veicolo sopra la superficie.
		#LOC_KS_SciDef_evaReport_Mehtna_FlyingLow = Questo deve essere contro le linee guida di sicurezza del programma. Fortunatamente, il KSC è a [CENSURATO] anni luce di distanza, quindi non devono saperlo.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_FlyingLow = Il Goo esposto sventola nel vento, ma solo leggermente. Si sublima così facendo, lasciando una piccola scia di vapore mentre il veicolo scende.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_FlyingLow = Più scendi nell'atmosfera di Mehtna, meno i campioni volatili sublimano; tuttavia, non smettono mai completamente.
		#LOC_KS_SciDef_barometerScan_Mehtna_FlyingLow = La pressione, anche a questa bassa altitudine letteralmente, è notevolmente inferiore in cima al veicolo che in fondo.
		#LOC_KS_SciDef_gravityScan_Mehtna_FlyingLow = Le scansioni gravimetriche precise non sono ancora possibili a questa altitudine perché l'atmosfera sottile è appena sufficiente a destabilizzare il veicolo e causare oscillazioni, falsando lo strumento. Tuttavia, questo ti dà in cambio alcune stime delle velocità del vento (e alcune statistiche approssimative di gravità, come previsto)!
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_FlyingLow = L'analizzatore atmosferico indica che la sottile atmosfera di questo pianeta consiste principalmente di anidride carbonica e vapore acqueo, con una buona quantità di gas traccia. Mehtna sarebbe un candidato ideale per il raccolto di risorse atmosferiche!

		#LOC_KS_SciDef_crewReport_Mehtna_FlyingHigh = Guardi lo strano pianeta lontano sotto, notando che la geografia sembra essere totalmente aliena. Questo è probabilmente causato- Devi smettere di guardare però, poiché la forza dell'ingresso atmosferico ti fa quasi battere la testa sull'interno del casco se continui a girarti per guardare dalla finestra.
		#LOC_KS_SciDef_temperatureScan_Mehtna_FlyingHigh = La temperatura media del pianeta può essere solo grossolanamente stimata a questa altitudine, a causa di quanto sia sottile l'atmosfera. Tuttavia, quassù fa freddo. Shock, lo sappiamo.
		#LOC_KS_SciDef_evaReport_Mehtna_FlyingHigh = Stai CERCANDO di farti strappare dalla scala della nave dal wind shear e lanciato verso Kraken-sa-cosa a Mach 2?
		#LOC_KS_SciDef_mysteryGoo_Mehtna_FlyingHigh = Il Goo trema violentemente con il resto del veicolo, mentre sembra anche sbiadire di colore verso la stessa tonalità brunastra di tutto intorno.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_FlyingHigh = Molti campioni vengono scossi e si staccano per la forza dell'ingresso atmosferico, ma altrimenti non reagiscono ancora significativamente all'ambiente. Noti però che l'esperimento di energia solare nella sonda non riesce a raccogliere altro che un rivolo dalla fioca luce di Maelg… prima di essere scosso e lanciato nella sezione dei metalli pesanti della sonda, danneggiandola gravemente.
		#LOC_KS_SciDef_barometerScan_Mehtna_FlyingHigh = A questa altitudine, l'atmosfera è troppo tenue per fare altro che scuotere il tuo veicolo mentre scendi verso lo strano mondo color beige sotto.
		#LOC_KS_SciDef_gravityScan_Mehtna_FlyingHigh = Nonostante le perturbazioni causate dall'ingresso del veicolo nell'atmosfera mehtniana, la gravità in superficie è stimata essere approssimativamente equivalente a circa 0,5 G.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_FlyingHigh = L'analizzatore atmosferico indica che la sottile atmosfera di questo pianeta consiste principalmente di anidride carbonica e vapore acqueo, con una buona quantità di gas traccia. Mehtna sarebbe un candidato ideale per il raccolto di risorse atmosferiche!

		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceLow1 = Il mondo sotto di te ti ricorda uno stagno fangoso, o forse una palla di legno lucidata.
		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceLow2 = Non puoi fare a meno di trovare Mehtna un po' come un brutto anatroccolo rispetto a Suluco o Arorua, ma ha una sorta di fascino rassicurante.
		#LOC_KS_SciDef_temperatureScan_Mehtna_InSpaceLow = Sebbene il mondo sembri desolato e statico da questa altitudine, gli strumenti termometrici implicano che almeno termicamente parlando, Mehtna è piuttosto vario.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceLow1 = Il pianeta marrone ti bagna nella sua luce, e all'improvviso ti ritrovi a desiderare cioccolato.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceLow2 = Vedendo Mehtna da vicino, hai l'improvviso desiderio di lanciare una palla di fango a uno dei tuoi compagni di equipaggio al ritorno su Kerbin.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_InSpaceLow = Il Goo si decompone e assume l'aspetto e la consistenza della crema calda, forse in risposta all'ambiente di radiazione unico prodotto da Maelg.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_InSpaceLow = I campioni sembrano essere indifferenti all'ambiente, con mancanza di attività nella sonda (tranne i campioni d'acqua che sfrigolano silenziosamente, ma nessuno ha chiesto di voi, Campioni d'acqua).
		#LOC_KS_SciDef_gravityScan_Mehtna_InSpaceLow = La gravità sotto è stimata essere circa la metà della gravità di Kerbin, forse un pochino in più.
		#LOC_KS_SciDef_magnetometer_Mehtna_InSpaceLow = Il campo magnetico rilevato potrebbe essere equiparato a essere in qualche modo simile a quello di Duna, solo amplificato. Questo è probabilmente dovuto al fatto che i due pianeti condividono diverse qualità, con Mehtna che è sostanzialmente più grande.

		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceHigh1 = Tenti di pulire la piccola macchia marrone dalla finestra della nave… Oh. Aspetta un secondo.
		#LOC_KS_SciDef_crewReport_Mehtna_InSpaceHigh2 = Se questo piccolo sistema solare (o tecnicamente, nana bruna?) fosse un vino, lo descriveresti come: "Marrone, con sfumature di beige e un tocco di seppia, forse solo un leggero accenno di scorza d'arancia."
		#LOC_KS_SciDef_temperatureScan_Mehtna_InSpaceHigh = Le letture del termometro enfatizzano la relativa debolezza del riscaldamento di Maelg rispetto a una stella.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceHigh1 = Pensi che ci sia un piccolo insetto marrone nel tuo casco e inizi a farti prendere dal panico, finché il tuo equipaggio ti ricorda gentilmente dove sei.
		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceHigh2 = La fioca luce di Maelg si rifrange attraverso l'atmosfera fangosa di Mehtna in modo strano, facendo sembrare detta atmosfera sia spessa che sottile allo stesso tempo.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_InSpaceHigh = Il Goo sembra andare alla deriva verso il pianeta e Maelg il più possibile data la sua natura confinata, apparentemente nel tentativo di sentire calore.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_InSpaceHigh = La maggior parte dei campioni sembra essere normale, ma alcuni degli esperimenti più fragili sembrano essere congelati nell'ambiente a basso calore così lontano da Maelg. Puoi solo immaginare quanto freddo debba essere Meiuqer.
		#LOC_KS_SciDef_gravityScan_Mehtna_InSpaceHigh = La gravità sotto è stimata essere circa la metà della gravità di Kerbin, forse un pochino in più.
		#LOC_KS_SciDef_magnetometer_Mehtna_InSpaceHigh = Il magnetometro riferisce che, sebbene un po' debole, Mehtna possiede davvero un campo magnetico palpabile! Il campo non è tuttavia abbastanza forte per proteggere qualsiasi cosa in superficie dalle radiazioni solari/interstellari di Maelg e di tutti gli altri sistemi solari vicini.

		//Meiuqer
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded1 = Questa piccola patata spaziale polverosa e fredda rimane indubbiamente affascinante per te e il tuo equipaggio.
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded2 = Da questa distanza, la già fioca luce di Maelg si affievolisce fino a una quasi insignificanza.
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded3 = La superficie di Meiuqer appare come se fosse stata scongelata e congelata ripetutamente per un po', simile al gelato lasciato sciogliere e poi ricongelato.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_SrfLanded1 = Sebbene la temperatura su questo piccolo mondo strano fluttui abbastanza spesso nella sua orbita, non è mai "calda" per nessun concetto dell'immaginazione.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_SrfLanded2 = Il termometro ti dice l'ovvio in questa situazione particolare: F R E D D O!
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded1 = Mentre stai sulla superficie di Meiuqer, stai attento a non starnutire e raggiungere la velocità di fuga.
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded2 = Maneggi un potere cosmico infinito. Hai lanciato leggermente una roccia vicina, e ha iniziato a orbitare attorno a Meiuqer. Bisogna amare la bassa gravità.
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded3 = Cavolo, pensavi che Gilly fosse difficile da navigare. Almeno Gilly non è apparentemente buia tutto il tempo o colorata come un film vintage.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_SrfLanded1 = Il Goo si congela solidamente e sbatte contro il suo contenitore, allentandolo e facendolo galleggiare via in una massa solida alla velocità di fuga di Meiuqer.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_SrfLanded2 = Il Goo galleggia quasi nella sua capsula come se fosse ancora in microgravità, specialmente una volta che inizia sia a sublimare che a congelare nell'ambiente di vuoto duro di Meiuqer.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded1 = Devi stare attento mentre raccogli i campioni a non galleggiare via da Meiuqer.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded2 = I campioni che raccogli sono piuttosto notevoli. Mentre Mehtna è indubbiamente antico, Meiuqer è letteralmente intatto dalla sua formazione, meno gli effetti causati dai suoi regolari drastici cambiamenti di temperatura mentre oscilla vicino e lontano da Maelg sulla sua orbita altamente eccentrica.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded3 = Ora che sono stati ottenuti campioni da questo strano piccolo mondo, è chiaro che Meiuqer è un asteroide di tipo "mucchio di detriti", a causa del suo raggio sostanziale nonostante abbia un campo gravitazionale più debole del molto più piccolo Gilly.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_SrfLanded1 = I campioni non reagiscono molto all'esposizione a Meiuqer, oltre ai campioni volatili che si vaporizzano rapidamente e/o si congelano solidamente.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_SrfLanded2 = Oltre alla sublimazione, l'unica cosa osservata nel laboratorio materiali è l'esperimento elettrico che diventa instabile e va in cortocircuito a causa della polvere che circonda Meiuqer e la ricopre in pochi minuti di esposizione. La polvere è apparentemente caricata elettricamente da Maelg, o è almeno conduttiva all'elettricità in una certa misura.
		#LOC_KS_SciDef_seismicScan_Meiuqer_SrfLanded = Le scansioni sismiche di Meiuqer rivelano senza sorpresa che il piccolo mondo è interamente morto e potrebbe benissimo essere una patata gigante che galleggia nel vuoto dello spazio.
		#LOC_KS_SciDef_gravityScan_Meiuqer_SrfLanded = Tenti di misurare la gravità su Meiuqer. Lo schermo del sensore scende a malapena così in basso, ma ottieni la tua lettura.

		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceLow1 = La superficie è in qualche modo oscurata dall'esosfera polverosa di Meiuqer, ma non è affatto paragonabile a una vera atmosfera.
		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceLow2 = Osservi una piccola roccia che impatta Meiuqer a velocità moderata, inviando un masso delle dimensioni di un'auto a galleggiare via dalla superficie.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_InSpaceLow = Il termometro fa del suo meglio con l'impressione "Pietra Fredda" dopo aver tentato di prendere letture sul planetoide sottostante.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceLow1 = Potresti atterrare abbastanza facilmente su Meiuqer con solo il tuo pack EVA da qui, con carburante di riserva.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceLow2 = È peculiare pensare che puoi teoricamente saltare in orbita dalla superficie.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_InSpaceLow = Il Goo diventa rapidamente granuloso e ricoperto dalla polvere che circonda Meiuqer.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_InSpaceLow = L'elettronica va in cortocircuito e i campioni sono contaminati molto rapidamente dalle abbondanti quantità di polvere presenti attorno a Meiuqer a questa bassa altitudine.
		#LOC_KS_SciDef_gravityScan_Meiuqer_InSpaceLow = Lo scanner di gravità ride maleducatamente e riporta una cifra trascurabile.
		#LOC_KS_SciDef_magnetometer_Meiuqer_InSpaceLow = Il magnetometro conferma ancora che l'interezza di questa patata spaziale è, in effetti, morta come un chiodo.

		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceHigh1 = Mentre il veicolo si muove lentamente nella sua orbita sopra il planetoide a una velocità incredibilmente lenta, hai tutto il tempo di guardare il batuffolo di polvere celeste che stai attualmente "orbitando".
		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceHigh2 = Sembra che qualcuno abbia accidentalmente lasciato cadere una razione di patate dalla botola dei rifiuti, puoi vederla galleggiare a buona distanza dalla nave- Oh.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_InSpaceHigh = Il termometro fatica a stimare la temperatura del corpo lontano sotto, a causa di… sai, il vuoto.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceHigh1 = Potresti ANCORA atterrare da qui con il tuo pack EVA! Potrebbero volerci alcune ore però, mettiti comodo.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceHigh2 = Ti assicuri di non fare movimenti bruschi fuori dalla nave, per paura di cadere dall'orbita.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_InSpaceHigh = Il Goo sembra essere completamente inerte, finché non ti rendi conto che si è congelato solidamente. Colpisce poi una delle sue pareti interne e si frantuma in piccoli pezzi.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_InSpaceHigh = Oltre a essere estremamente freddo, non succede molto ai campioni nella sonda di scienza dei materiali, poiché sei fuori portata dell'esosfera polverosa di Meiuqer.
		#LOC_KS_SciDef_gravityScan_Meiuqer_InSpaceHigh = Lo scanner di gravità si chiede perché ti sei dato la pena mentre restituisce le sue misere letture sul campo gravitazionale del planetoide.
		#LOC_KS_SciDef_magnetometer_Meiuqer_InSpaceHigh = Anche se sai che è una perdita di tempo verificare se il minuscolo Meiuqer ha un campo magnetico, preferisci non avere di nuovo problemi con lo scienziato del tuo equipaggio per "non massimizzare il ritorno scientifico" o altre assurdità.

		// Sunorc
		#LOC_KS_SciDef_crewReport_Sunorc_FlyingLow = In qualche modo il veicolo non si è ancora sciolto. *ANCORA.*
		#LOC_KS_SciDef_crewReport_Sunorc_FlyingHigh = Sei molto preoccupato di quanto bene il veicolo possa resistere alle temperature estreme.
		#LOC_KS_SciDef_crewReport_Sunorc_InSpaceLow = Sta facendo caldo qui dentro. Potresti cucinare qualcosa sul pannello di controllo.

		#LOC_KS_SciDef_temperatureScan_Sunorc_FlyingLow = [NESSUN DATO]
		#LOC_KS_SciDef_temperatureScan_Sunorc_FlyingHigh = Il termometro raggiunge istantaneamente il massimo, poi il minimo mentre le particelle cariche interferiscono con la connessione allo strumento.
		#LOC_KS_SciDef_temperatureScan_Sunorc_InSpaceLow = Il termometro inizia a salire mentre ti avvicini alla stella.

		#LOC_KS_SciDef_evaReport_Sunorc_FlyingLow = COME FAI A NON ESSERE MORTO??????
		#LOC_KS_SciDef_evaReport_Sunorc_FlyingHigh = Questa non è un'idea molto intelligente e lo sai.
		#LOC_KS_SciDef_evaReport_Sunorc_InSpaceLow = Sei accecato dalla luce intensa.

		#LOC_KS_SciDef_mysteryGoo_Sunorc_FlyingLow = Il contenitore si è sciolto e ha rilasciato il Goo vaporizzato.
		#LOC_KS_SciDef_mysteryGoo_Sunorc_FlyingHigh = Il Goo inizia a vaporizzare nel suo contenitore.
		#LOC_KS_SciDef_mysteryGoo_Sunorc_InSpaceLow = Il Goo sta iniziando a bollire.

		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_FlyingLow = L'intera unità si è sciolta.
		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_FlyingHigh = I campioni si stanno sciogliendo, come il resto dell'unità.
		#LOC_KS_SciDef_mobileMaterialsLab_Sunorc_InSpaceLow = I campioni stanno iniziando a brillare per il calore.

		#LOC_KS_SciDef_barometerScan_Sunorc_FlyingLow = Il barometro emette ogni sorta di assurdità prima che la connessione allo strumento vada persa.
		#LOC_KS_SciDef_barometerScan_Sunorc_FlyingHigh = Il barometro rileva un'atmosfera molto tenue, prima che le temperature estreme facciano impazzire lo strumento.

		#LOC_KS_SciDef_magnetometer_Sunorc_InSpace = Il braccio raccoglie dati sui venti stellari e i campi magnetici di Sunorc.

		#LOC_KS_SciDef_gravityScan_Sunorc_InSpace = I dati dal sensore di gravità ci danno informazioni sulle dimensioni e la composizione di Sunorc.

		#LOC_KS_SciDef_atmosphereAnalysis_Sunorc_FlyingLow = Non siamo in grado di ottenere dati dall'analizzatore atmosferico, quindi è probabile che lo strumento sia andato.
		#LOC_KS_SciDef_atmosphereAnalysis_Sunorc_FlyingHigh = Le particelle cariche friggono i sensori all'interno dell'analizzatore atmosferico.



		// Sedah
		#LOC_KS_SciDef_crewReport_Sedah_FlyingLow = Inizi a mettere in discussione la tua esistenza mentre il tuo veicolo scende nelle profondità del gigante gassoso caldo e soffice.
		#LOC_KS_SciDef_crewReport_Sedah_InSpaceLow = L'atmosfera del pianeta sembra essere turbolenta e costantemente in movimento. Il calore e la pressione intensi alla superficie del pianeta creano bande turbinanti di gas, che sembrano costantemente spostarsi e agitarsi. L'equipaggio ha anche notato che il leggero bagliore del pianeta era più evidente durante l'avvicinamento, creando un effetto inquietante e ultraterreno. Nonostante le condizioni inospitali del pianeta, l'equipaggio ha espresso stupore per la bellezza e la grandezza del gigante gassoso.
		#LOC_KS_SciDef_crewReport_Sedah_InSpaceHigh = L'equipaggio riferisce che Sedah appare come un orbe luminoso e brillante nello spazio a causa delle sue alte temperature atmosferiche. Da lontano, sembra di dimensioni simili a Jool. La sua atmosfera meno densa le conferisce un aspetto "soffice". L'equipaggio nota che sarebbe interessante studiare la composizione atmosferica di Sedah per comprendere meglio le proprietà dei giganti gassosi caldi.

		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingLow1 = Mentre il veicolo scendeva attraverso la bassa atmosfera di Sedah, le letture di temperatura indicavano un aumento significativo. Il calore e la pressione intensi a questa altitudine hanno reso difficile il funzionamento degli strumenti del veicolo, e l'equipaggio ha dovuto prendere precauzioni speciali per evitare danni alle attrezzature.
		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingLow2 = Le pressioni estreme schiacciano il termometro prima che abbia anche la possibilità di raggiungere il massimo.
		#LOC_KS_SciDef_temperatureScan_Sedah_FlyingHigh = Le letture di temperatura hanno mostrato un aumento significativo rispetto all'ambiente spaziale. Il calore emanato dall'atmosfera del pianeta ha creato un bagliore brillante attorno al veicolo spaziale.

		#LOC_KS_SciDef_evaReport_SedahFlyingLow = Ti chiedi perché hai pensato che fare un EVA nelle profondità di un gigante gassoso fosse una buona idea.
		#LOC_KS_SciDef_evaReport_Sedah_InSpaceLow = Quando il Kerbal è uscito dal veicolo spaziale, è stato immediatamente colpito dalle nuvole turbinanti del gigante gassoso. L'atmosfera era spessa e nebbiosa, con una gamma di colori che sembravano cambiare e spostarsi mentre si muovevano. Il Kerbal poteva sentire il calore emanato dal pianeta, nonostante fosse così lontano dalla sua superficie. Mentre galleggiavano nel vuoto, non potevano fare a meno di sentirsi sia piccoli che stupiti dall'immensa dimensione e potenza del gigante gassoso.
		#LOC_KS_SciDef_evaReport_Sedah_InSpaceHigh = Sedah si profilava in lontananza, un gigante gassoso massiccio con un debole bagliore etereo. La luce brillante della stella proiettava lunghe ombre sulla tuta del Kerbal, che si sentiva in assenza di peso mentre galleggiava nel vuoto. È stata un'esperienza surreale e impressionante assistere alla maestà di Sedah da un tale punto di vista.

		#LOC_KS_SciDef_mysteryGoo_Sedah_FlyingLow = Il Goo viene completamente arrostito dalle alte temperature nella bassa atmosfera di Sedah.

		#LOC_KS_SciDef_mobileMaterialsLab_Sedah_FlyingLow = Non sai se i campioni sono stati cotti dalle alte temperature o schiacciati dalla pressione estrema, ma importa davvero? Sono rovinati in entrambi i casi.

		#LOC_KS_SciDef_barometerScan_Sedah_FlyingLow1 = L'atmosfera soffice di Sedah sembrava essere super densa e compatta. Le alte temperature atmosferiche e l'aspetto luminoso di Sedah sono diventati più pronunciati.
		#LOC_KS_SciDef_barometerScan_Sedah_FlyingLow2 = Il vetro del barometro si è frantumato, ma non sei sicuro se è stato a causa dell'alta temperatura o della pressione estrema, o entrambi.
		#LOC_KS_SciDef_barometerScan_Sedah_FlyingHigh = Le letture del barometro mostrano una diminuzione della pressione atmosferica con l'altitudine. L'atmosfera soffice di Sedah sembrava assottigliarsi gradualmente con le altitudini più elevate.

		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceLow1 = Le letture della scansione gravimetrica hanno mostrato una differenza notevole tra il lato luminoso e quello scuro di Sedah, probabilmente a causa della differenza di densità causata dalla variazione di temperatura.
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceLow2 = I dati del sensore confermano che nonostante le sue dimensioni, Sedah in realtà non è così massiccia, relativamente alle sue dimensioni.
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceHigh1 = Le letture hanno mostrato che la gravità di Sedah era significativamente più debole rispetto a giganti gassosi più grandi come Jool. La massa inferiore di Sedah ha causato un'attrazione gravitazionale meno intensa, che potrebbe avere implicazioni per la sua struttura e composizione complessiva.
		#LOC_KS_SciDef_gravityScan_Sedah_InSpaceHigh2 = Il sensore mostra una lettura anormalmente bassa per un pianeta di queste dimensioni. Potrebbe valere la pena indagare ulteriormente.

		#LOC_KS_SciDef_magnetometer_Sedah_InSpaceLow = Sedah ha mostrato un campo magnetico relativamente forte e complesso nel suo spazio basso. I dati indicavano la presenza di tempeste e fluttuazioni magnetiche, suggerendo un ambiente magnetico dinamico e attivo attorno a questo gigante gassoso caldo. Queste scoperte gettano luce sulle caratteristiche magnetiche uniche dell'atmosfera "soffice" di Sedah e sul suo potenziale impatto sulla dinamica atmosferica complessiva e sul meteo spaziale.
		#LOC_KS_SciDef_magnetometer_Sedah_InSpaceHigh = Le letture del magnetometro hanno mostrato che Sedah aveva un campo magnetico relativamente debole rispetto alla sua controparte più grande, Jool, probabilmente a causa della sua massa inferiore. Tuttavia, c'erano ancora fluttuazioni magnetiche rilevabili, indicando la presenza di attività magnetica nell'atmosfera di Sedah.

		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingLow1 = L'analisi dell'atmosfera della bassa atmosfera di Sedah ha rivelato che è composta principalmente da idrogeno ed elio, con alte temperature e schemi nuvolosi dinamici. A causa della sua bassa massa rispetto alle dimensioni, l'atmosfera di Sedah è meno densa e più estesa, creando un aspetto diffuso con confini meno distinti tra gli strati atmosferici.
		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingLow2 = Lo strumento è stato schiacciato dalle pressioni estreme nella bassa atmosfera di Sedah.
		#LOC_KS_SciDef_atmosphereAnalysis_Sedah_FlyingHigh = L'analisi dell'atmosfera della alta atmosfera di Sedah ha rivelato temperature estremamente elevate e un aspetto luminoso, indicando il calore intenso di questo gigante gassoso. L'analisi ha anche confermato che l'atmosfera di Sedah è meno densa e più diffusa rispetto a Jool, a causa del suo rapporto massa-dimensioni inferiore, risultando in un aspetto "soffice" con confini meno distinti tra gli strati atmosferici.


		// Suluco
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Day = Il rapporto dell'equipaggio dall'emisfero diurno di Suluco ha rivelato un giorno perenne con esposizione costante alla luce solare intensa di Sunorc, senza notte, e il paesaggio è dominato da un ambiente rovente e sterile. L'equipaggio ha notato l'assenza di segni di vita o vegetazione, con temperature estreme e condizioni difficili.
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Twilight = Il rapporto dell'equipaggio dalla zona crepuscolare di Suluco ha rivelato un ambiente unico e intrigante. L'anello stretto di eternità crepuscolare tra gli emisferi diurno e notturno è l'unica regione del pianeta dove piante e altre forme di vita possono prosperare. Inoltre, l'equipaggio ha osservato i venti forti persistenti nell'area, probabilmente causati dal contrasto di temperatura estremo tra i due emisferi. Il rapporto ha anche evidenziato le particolari condizioni di illuminazione nella zona crepuscolare, dove prevale un crepuscolo perenne, creando un'atmosfera misteriosa e ultraterrena.
		#LOC_KS_SciDef_crewReport_Suluco_SrfLanded_Night = Il rapporto dell'equipaggio dall'emisfero notturno di Suluco ha rivelato un ambiente desolato e gelido, avvolto nell'oscurità perenne. Senza luce solare che raggiunga questo lato del pianeta, le temperature erano estremamente fredde e il paesaggio appariva sterile e inospitale, senza segni di vita.
		#LOC_KS_SciDef_crewReport_Suluco_SrfSplashed = Il rapporto dell'equipaggio dalla zona crepuscolare di Suluco, dove gli emisferi diurno e notturno del pianeta si incontrano, ha rivelato un ambiente dinamico e turbolento. Sono stati osservati i venti forti persistenti causati dalla marcata differenza di temperatura tra i due emisferi, creando condizioni difficili per l'esplorazione. Nonostante ciò, l'equipaggio ha notato la presenza di forme di vita aliena uniche e specie vegetali nella zona crepuscolare, rendendola una regione notevole per lo studio scientifico.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Day = Il rapporto dell'equipaggio dalla bassa atmosfera dell'emisfero diurno di Suluco, dove un lato del pianeta è in pieno giorno perenne, ha rivelato condizioni estreme a causa dell'esposizione implacabile alla stella Sunorc. L'equipaggio ha osservato temperature roventi e radiazioni intense, con la superficie del pianeta bagnata dalla luce solare costante.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Twilight = Il rapporto dell'equipaggio dalla bassa atmosfera della zona crepuscolare di Suluco, dove gli emisferi diurno e notturno del pianeta si incontrano, ha rivelato condizioni difficili a causa dei venti forti persistenti causati dalla marcata differenza di temperatura tra i due emisferi. Nonostante la turbolenza, l'equipaggio ha osservato affascinanti specie vegetali aliene e altre forme di vita esotiche in questa regione unica, che è l'unica area del pianeta a supportare tale vita.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingLow_Night = Il rapporto dell'equipaggio dalla bassa atmosfera dell'emisfero notturno di Suluco, dove un lato del pianeta è in oscurità perenne, ha rivelato un ambiente molto diverso rispetto all'emisfero diurno. L'equipaggio ha osservato temperature gelide e quasi totale oscurità, con solo una debole luce stellare che illumina il paesaggio. L'equipaggio ha anche osservato la presenza di calotte glaciali e formazioni ghiacciate sulla superficie, indicando la presenza di acqua ghiacciata nella bassa atmosfera dell'emisfero notturno.
		#LOC_KS_SciDef_crewReport_Suluco_FlyingHigh = Il nostro veicolo spaziale ha osservato marcati contrasti di temperatura, venti forti e composizioni atmosferiche uniche nell'alta atmosfera di Suluco, un pianeta in rotazione sincrona con marcate differenze tra i suoi emisferi diurno e notturno. L'emisfero diurno mostrava temperature roventi e gas ionizzati, mentre l'emisfero notturno era perennemente buio e freddo, con concentrazioni di gas più basse. Sono necessarie ulteriori ricerche per comprendere la dinamica atmosferica complessa su questo pianeta unico.
		#LOC_KS_SciDef_crewReport_Suluco_InSpaceLow = Il nostro veicolo spaziale è entrato nell'orbita spaziale bassa di Suluco, un pianeta in rotazione sincrona con contrasti estremi tra i suoi emisferi diurno e notturno. L'emisfero diurno è rovente con intense radiazioni solari, mentre l'emisfero notturno è immerso nell'oscurità perenne e nel freddo estremo. Abbiamo osservato un anello stretto di eternità crepuscolare, noto come zona crepuscolare, dove la vita aliena esotica potrebbe prosperare.
		#LOC_KS_SciDef_crewReport_Suluco_InSpaceHigh = Suluco sembra un occhio visto dallo spazio lontano. Siamo abbastanza sicuri che questo pianeta sia in rotazione sincrona con Sunorc, poiché possiamo facilmente osservare la differenza tra l'emisfero diurno e quello notturno.

		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Day = Rapporto scansione temperatura: Il nostro sito di atterraggio sull'emisfero diurno di Suluco rivela temperature roventi, con la superficie che raggiunge estremi elevati a causa dell'esposizione perenne al sole. Le letture indicano più di 90 °C, rendendo il luogo inospitale per la maggior parte delle forme di vita.
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Twilight = Il nostro sito di atterraggio nella zona crepuscolare di Suluco rivela un profilo di temperatura unico e dinamico. La regione subisce fluttuazioni significative a causa del marcato contrasto tra gli emisferi diurno e notturno. Le letture indicano un intervallo da -25 a 45 °C, con cambiamenti rapidi. Questo ambiente dinamico presenta sfide e opportunità uniche per studiare l'interazione tra luce e oscurità nella zona crepuscolare di Suluco.
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfLanded_Night = Il nostro sito di atterraggio sull'emisfero notturno di Suluco rivela temperature estremamente fredde con una media di -65 °C, ben sotto il punto di congelamento. La mancanza di luce solare in questa regione di notte perenne crea un ambiente estremamente freddo, ponendo sfide per la vita come la conosciamo.
		#LOC_KS_SciDef_temperatureScan_Suluco_SrfSplashed = Il nostro ammaraggio nella zona crepuscolare di Suluco rivela un profilo di temperatura unico. L'anello stretto di eternità crepuscolare tra gli emisferi diurno e notturno presenta temperature moderate, probabilmente influenzate dall'interazione costante tra i due emisferi. Questa regione funge da potenziale habitat per forme di vita aliena esotiche, come dimostrato dalla presenza di vegetazione e altra attività biologica.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Day = Eseguire una scansione di temperatura nella bassa atmosfera dell'emisfero diurno di Suluco rivela un gradiente termico significativo, con temperature oltre 90 °C. Il lato del pianeta rivolto alla stella subisce temperature estremamente elevate a causa dell'esposizione costante alla luce solare. La mancanza di un ciclo notturno causa un riscaldamento sostenuto dell'atmosfera, portando a temperature roventi. Queste condizioni estreme possono porre sfide per l'esplorazione o l'abitazione nell'emisfero diurno di Suluco.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Twilight = Eseguire una scansione di temperatura nella bassa atmosfera della zona crepuscolare di Suluco rivela profili di temperatura unici rispetto agli emisferi diurno e notturno. Il confine tra gli emisferi diurno e notturno, noto come zona crepuscolare, presenta un intervallo moderato da -15 a 45 °C, dovuto all'interazione costante tra i due emisferi, risultando in un ambiente relativamente temperato.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingLow_Night = Eseguire una scansione di temperatura nella bassa atmosfera dell'emisfero notturno di Suluco rivela condizioni di temperatura estreme. L'oscurità perenne nell'emisfero notturno risulta in temperature significativamente più fredde rispetto all'emisfero diurno e alla zona crepuscolare. La temperatura media nella bassa atmosfera dell'emisfero notturno è di -65 °C, con temperature che scendono ben sotto lo zero.
		#LOC_KS_SciDef_temperatureScan_Suluco_FlyingHigh = Eseguire una scansione di temperatura nell'alta atmosfera di Suluco rivela profili interessanti. Poiché Suluco è in rotazione sincrona con Sunorc, con un lato in giorno perenne e l'altro in notte perenne, l'alta atmosfera mostra differenze di temperatura distinte tra gli emisferi diurno e notturno.

		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Day = Uscendo dal veicolo spaziale sulla superficie dell'emisfero diurno di Suluco, sono accolto da una luce solare intensa e implacabile. La luce è quasi accecante e il calore è intenso. Il terreno è accidentato e roccioso, con grandi formazioni rocciose e ripide scogliere. Le rocce hanno colori vari, dalle rocce vulcaniche scure a quelle più chiare ed erose. Il terreno è secco e polveroso, con pochi segni di acqua liquida.
		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Twilight = Metto piede sull'anello stretto di eternità crepuscolare che segna il confine tra gli emisferi diurno e notturno di Suluco, sono colpito dall'ambiente unico e ultraterreno. L'illuminazione è surreale, con uno stato di crepuscolo perenne che proietta un bagliore etereo. La flora e la fauna qui sono esotiche e diverse da tutto ciò che ho visto prima, adattate alle condizioni uniche di questa zona crepuscolare. È un luogo affascinante e misterioso, brulicante di vita che si è evoluta nel raro incontro tra luce e oscurità.
		#LOC_KS_SciDef_evaReport_Suluco_SrfLanded_Night = Mettere piede sul terreno scuro e gelato dell'emisfero notturno di Suluco è un'esperienza inquietante. La mancanza di luce solare e l'oscurità perenne creano un ambiente freddo, desolato e apparentemente privo di vita. Le temperature sono ben sotto lo zero e l'unica luce proviene da stelle lontane e dal debole bagliore della zona crepuscolare all'orizzonte. È un contrasto marcato con l'emisfero diurno luminoso e vivace.
		#LOC_KS_SciDef_evaReport_Suluco_SrfSplashed = Mentre ammaro nella stretta fascia di eternità crepuscolare che segna il confine tra gli emisferi diurno e notturno di Suluco, sono accolto da una vista surreale. Le acque sotto di me pullulano di vita, con piante e creature bioluminescenti che illuminano l'oscurità con il loro bagliore ultraterreno. La temperatura è moderata e l'aria è piena di un senso di tranquillità. È un'oasi unica di vita in mezzo al marcato contrasto tra il giorno e la notte eterni su questo pianeta in rotazione sincrona.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Day = Volando attraverso la bassa atmosfera dell'emisfero diurno di Suluco, sono accolto da un'estensione infinita di luce solare accecante. La temperatura è rovente e l'aria è densa di calore e radiazioni. Il paesaggio sottostante è sterile e inospitale, senza segni di vita. Il contrasto tra il giorno e la notte eterni su questo pianeta in rotazione sincrona è marcato, e le condizioni difficili dell'emisfero diurno ricordano la natura estrema di questo mondo.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Twilight = Avventurandomi nella zona crepuscolare di Suluco, sono accolto da uno spettacolo ultraterreno. L'anello stretto di eternità crepuscolare serve da confine tra gli emisferi di giorno e notte eterni, e brulica di vita. I venti forti persistenti scuotono il mio veicolo, indicando l'estrema differenza di temperatura tra gli emisferi. Osservo piante strane ed esotiche, diverse da qualsiasi altra vista prima, che mostrano adattamenti notevoli per sopravvivere in questo ambiente crepuscolare.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingLow_Night = La temperatura scende drammaticamente e i venti ululano senza sosta, risultato dell'estrema differenza di temperatura tra gli emisferi. La mancanza di luce solare rende difficile la navigazione, ma l'illuminazione integrata della mia tuta mi aiuta a distinguere il paesaggio alieno inquietante.
		#LOC_KS_SciDef_evaReport_Suluco_FlyingHigh = Il contrasto tra l'emisfero diurno luminoso e quello notturno scuro è mozzafiato, e mi meraviglio delle condizioni uniche che esistono su questo pianeta in rotazione sincrona. Le condizioni difficili rendono impegnativi gli esperimenti, ma i dati che raccolgo contribuiranno alla nostra comprensione della dinamica atmosferica e dei modelli meteorologici di Suluco.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Day = Discendendo verso l'emisfero diurno, sono accolto da una luminosità accecante. Il giorno perenne bagna il paesaggio in un bagliore brillante, con il sole che non tramonta mai su questo lato del pianeta. La temperatura è rovente e il paesaggio è dominato da vasti deserti e pianure rocciose. Osservo immense dune di sabbia modellate dai venti implacabili che soffiano sulla superficie, formando motivi intricati nella sabbia.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Twilight = La luce del giorno si dissolve in un crepuscolo perenne, proiettando un bagliore ultraterreno sul paesaggio. La temperatura nella zona crepuscolare è relativamente moderata rispetto all'emisfero diurno, grazie al costante mescolamento d'aria dei due emisferi. I venti qui sono forti e persistenti, creando formazioni nuvolose turbinanti e modelli meteorologici turbolenti. Questo anello stretto di eternità crepuscolare è l'unica regione su Suluco potenzialmente abitata da piante e altra vita aliena esotica.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceLow_Night = Quando sono nello spazio sopra l'emisfero notturno, l'oscurità mi avvolge. La notte perenne su questo lato di Suluco è inquietante, con solo stelle lontane che forniscono una debole illuminazione. L'emisfero notturno è un regno di freddo e oscurità estremi, con condizioni difficili che rendono difficile l'esistenza della vita. Osservo laghi e fiumi ghiacciati, e il paesaggio è austero e sterile.
		#LOC_KS_SciDef_evaReport_Suluco_InSpaceHigh = Da un'orbita alta, osservo il marcato contrasto tra l'emisfero diurno di Suluco, bagnato dalla luce perenne, e il suo emisfero notturno, avvolto nell'oscurità. Questi emisferi unici offrono preziosi spunti sull'interazione tra luce, temperatura e atmosfera su questo pianeta in rotazione sincrona.

		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Day = Il campione di superficie dall'emisfero diurno di Suluco rivela un paesaggio sterile e roccioso con alte temperature e intense radiazioni. Il suolo è secco e privo di segni di materia organica o vita vegetale. Il campione mostra prove di alterazione estrema dovuta all'esposizione costante alla luce solare, con formazioni rocciose che mostrano segni di erosione e degrado.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Twilight = Il campione di superficie raccolto dalla zona crepuscolare di Suluco rivela un ecosistema unico e diversificato brulicante di forme di vita aliene. Il suolo è un misto di detriti rocciosi e materia organica, indicando la presenza di vita vegetale in questa regione. Il campione mostra anche prove di alterazione estrema, probabilmente dovuta ai venti forti persistenti risultanti dalla differenza di temperatura tra gli emisferi.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfLanded_Night = Il campione di superficie raccolto dall'emisfero notturno di Suluco rivela un ambiente desolato e freddo con segni minimi di vita. Il suolo è composto da regolite congelata e detriti ghiacciati, indicando temperature estremamente basse inospitali per la maggior parte delle forme di vita. L'assenza di vita vegetale o materia organica nel campione suggerisce le condizioni difficili dell'oscurità perenne su questo lato del pianeta.
		#LOC_KS_SciDef_surfaceSample_Suluco_SrfSplashed = Il campione d'acqua raccolto dall'oceano nella zona crepuscolare di Suluco rivela un ecosistema acquatico unico con caratteristiche intriganti. L'acqua è relativamente più fredda per la vicinanza all'emisfero notturno e contiene una varietà di microrganismi alieni e vita vegetale esotica. L'acqua appare salmastra, con livelli di salinità più elevati. L'acqua è relativamente agitata, con forti correnti, probabilmente influenzate dai venti forti persistenti.

		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded = Il Goo sembra piuttosto contento qui.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_DayPole = L'unità di contenimento contiene quello che può essere descritto solo come "goo essiccato". No, non è uno spuntino.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_NightPole = Il coperchio dell'unità di contenimento del Goo si è congelato chiuso. Non sarebbe irragionevole presumere che il Goo all'interno sia anch'esso congelato. 
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Water = Il Goo sembra impaziente di fare una nuotata.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_ColdOcean = Il Goo sembra impaziente di fare una nuotata, ignorando quanto sia fredda l'acqua.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Day = Il calore e l'aria secca hanno fatto seccare il Goo.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Tundra = L'interno dell'unità di contenimento è pieno di condensa.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfLanded_Night = Il Goo si è congelato solidamente. Non provare a mangiarlo. Non è gelato.
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfSplashed = Il Goo si riversa nell'acqua!
		#LOC_KS_SciDef_mysteryGoo_Suluco_SrfSplashed_ColdOcean = Il Goo si riversa nell'acqua... e poi torna prontamente nell'unità di contenimento perché non vuole congelarsi.
		#LOC_KS_SciDef_mysteryGoo_Suluco_FlyingLow = Il Goo si agita mentre il veicolo vibra.

		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Day = Lo studio dei materiali condotto sull'emisfero diurno di Suluco, la regione perennemente bagnata dalla luce solare, ha dato risultati intriganti. I materiali di superficie analizzati mostrano segni di ampia alterazione e erosione, probabilmente causati dalle dure radiazioni solari e dall'esposizione costante. Le alte temperature su questo lato del pianeta hanno causato la formazione di composizioni minerali e strutture uniche, suggerendo la presenza di processi geologici nuovi.
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Twilight = La zona crepuscolare di Suluco presenta composti organici complessi e un mix unico di processi geologici e chimici. I materiali di superficie suggeriscono la presenza di vita aliena esotica e forniscono informazioni sulla biologia e astrobiologia del pianeta. I venti dinamici e il crepuscolo perenne hanno plasmato la geologia e la chimica di questa regione.
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfLanded_Night = L'emisfero notturno di Suluco, il lato perennemente buio del pianeta, presenta sfide uniche per lo studio dei materiali a causa delle condizioni ambientali estreme, tra cui temperature glaciali e mancanza di luce solare. L'analisi iniziale dei materiali di superficie rivela la presenza di acqua ghiacciata e composti volatili.
		#LOC_KS_SciDef_mobileMaterialsLab_Suluco_SrfSplashed = Condurre uno studio dei materiali negli oceani di Suluco ha dato risultati intriganti. L'analisi dei campioni d'acqua rivela proprietà chimiche uniche, tra cui alte concentrazioni di minerali rari e composti organici non presenti in altre parti del pianeta. I venti forti persistenti nella zona crepuscolare si ritiene giochino un ruolo nella composizione dell'oceano.

		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Day = La scansione barometrica nell'emisfero diurno di Suluco conferma la presenza di una zona di bassa pressione in superficie, dove l'aria riscaldata dalla stella sale e diminuisce in densità. Questa aria in risalita si muove verso l'emisfero notturno ad alte quote.
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Twilight = Una scansione barometrica nella zona crepuscolare di Suluco rivela un modello di pressione atmosferica unico influenzato dalla marcata differenza di temperatura tra gli emisferi. La scansione indica che la zona crepuscolare subisce venti forti persistenti verso l'emisfero diurno. L'anello stretto di eternità crepuscolare crea una regione atmosferica dinamica e turbolenta.
		#LOC_KS_SciDef_barometerScan_Suluco_SrfLanded_Night = Le misurazioni barometriche rivelano una pressione atmosferica più alta in superficie sull'emisfero notturno, poiché l'aria dall'emisfero diurno si raffredda e scende arrivando all'emisfero notturno, diventando più densa e creando un'area di alta pressione. L'aria scesa viaggia poi lungo la superficie verso l'emisfero diurno, chiudendo il ciclo della circolazione atmosferica.
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingLow = La scansione barometrica nella bassa atmosfera di Suluco rivela un modello di distribuzione della pressione complesso. Nell'emisfero diurno, dove l'aria è riscaldata dalla stella, la scansione indica una zona di bassa pressione. Al contrario, l'emisfero notturno presenta un'area di alta pressione nella bassa atmosfera.
		#LOC_KS_SciDef_barometerScan_Suluco_FlyingHigh = La scansione barometrica nell'alta atmosfera di Suluco, tenendo conto delle condizioni atmosferiche globali, fornisce preziosi spunti sui modelli di distribuzione della pressione influenzati dalla configurazione in rotazione sincrona e dal contrasto di temperatura tra gli emisferi.

		#LOC_KS_SciDef_seismicScan_Suluco_SrfLanded = La scansione sismica indica che Suluco è geologicamente relativamente stabile. Tuttavia, i venti forti persistenti possono creare attrito e stress sulla superficie, potenzialmente portando a tremori. Inoltre, la zona crepuscolare di Suluco subisce livelli più alti di tremori, probabilmente causati dalle forze di attrito dei venti persistenti e dal riscaldamento/raffreddamento differenziale della superficie.

		#LOC_KS_SciDef_gravityScan_Suluco = La scansione gravimetrica globale di Suluco rivela un campo gravitazionale relativamente coerente sulla superficie senza variazioni o anomalie significative. La gravità è simile sia negli emisferi diurno e notturno che nella regione tra loro nota come zona crepuscolare.

		#LOC_KS_SciDef_magnetometer_SulucoInSpace = Le misurazioni del magnetometro indicano che Suluco ha un campo magnetico debole e relativamente uniforme nella regione di orbita bassa. Non ci sono variazioni o anomalie significative nella forza del campo magnetico. La mancanza di variazioni suggerisce che il campo magnetico di Suluco è probabilmente generato dal suo geodinamo interno, come altri pianeti terrestri.

		#LOC_KS_SciDef_atmosphereAnalysis_Suluco = L'atmosfera di Suluco è composta principalmente da azoto (N2) e ossigeno (O2), con tracce di anidride carbonica (CO2), metano (CH4), ammoniaca (NH3) e altri gas minori. La pressione atmosferica media di Suluco è inferiore a quella di Kerbin, quindi attenzione a non fare sport intensi.

		// Tot
		#LOC_KS_SciDef_crewReport_Tot_SrfLanded = Quasi sembra che potremmo disorbitare questa cosa semplicemente spingendoci abbastanza forte con il nostro veicolo spaziale.
		#LOC_KS_SciDef_crewReport_Tot_InSpace = Dai, possiamo facilmente costruire veicoli spaziali più grandi di questa roccia!

		#LOC_KS_SciDef_evaReport_Tot_SrfLanded = Non saltare. Potresti davvero sfuggire alla gravità di questa roccia saltandoci sopra.
		#LOC_KS_SciDef_evaReport_Tot_InSpace = Abbiamo davvero bisogno di atterrare su questa minuscola roccia? Potremmo facilmente mandare qualcuno giù e su usando solo il jetpack EVA.

		#LOC_KS_SciDef_mysteryGoo_Tot_SrfLanded = Il Goo sembra a casa su Tot.
		#LOC_KS_SciDef_mysteryGoo_Tot_InSpaceLow = Il Goo continua a ridere. Minacci allora di saldare la sua unità di contenimento, a quel punto finalmente si conforma alla tua richiesta di smettere di ridere.
		#LOC_KS_SciDef_mysteryGoo_Tot_InSpaceHigh = Il Goo sembra ridere mentre percepisce la presenza di Tot. Sbatte la sua unità di contenimento in un futile tentativo di farlo tacere.

		#LOC_KS_SciDef_surfaceSample_Tot_SrfLanded = L'analisi della superficie di Tot suggerisce che potrebbe essere semplicemente un asteroide catturato. Non puoi essere certo di questo, però.

		#LOC_KS_SciDef_seismicScan_Tot_SrfLanded = Lo scanner sismico legge...... nulla.

		#LOC_KS_SciDef_gravityScan_Tot_SrfLanded = Finalmente, il sensore di gravità si concentra su Tot ora che è letteralmente accanto a questa minuscola roccia.
		#LOC_KS_SciDef_gravityScan_Tot_InSpaceLow = Il sensore di gravità punta ancora verso Suluco. Per frustrazione, fai un reset completo del sensore di gravità, solo per farlo tornare ad occuparsi di Suluco.
		#LOC_KS_SciDef_gravityScan_Tot_InSpaceHigh = Il sensore di gravità sembra molto più interessato a Suluco che a questa minuscola cosa. Cercare di farlo concentrare su Tot sarebbe un esercizio di futilità.

		#LOC_KS_SciDef_magnetometer_Tot_InSpaceLow = Il braccio non è in grado di rilevare alcun campo magnetico proveniente da Tot
		#LOC_KS_SciDef_magnetometer_Tot_InSpaceHigh = Misuri un campo magnetico moderatamente forte, ma sembra provenire da Suluco e non da...... qualunque cosa sia questa cosa.


		// Sera
		#LOC_KS_SciDef_crewReport_Sera_SrfLanded = I Kerbal avvisano il KSC che sono atterrati su Sera e stanno preparando i loro barattoli per i campioni.
		#LOC_KS_SciDef_crewReport_Sera_SrfSplashed = I Kerbal avvisano il KSC che sono ammarati su Sera e stanno preparando le loro bottiglie d'acqua.
		#LOC_KS_SciDef_crewReport_Sera_FlyingLow = L'equipaggio concorda che Sera è uno spettacolo straordinario da ammirare con il suo sistema di anelli.
		#LOC_KS_SciDef_crewReport_Sera_FlyingHigh = I tuoi Kerbal sono affascinati dalla vista degli anelli di Sera.

		#LOC_KS_SciDef_temperatureScan_Sera_SrfLanded = Potresti probabilmente fare sci, se ci fosse neve...
		#LOC_KS_SciDef_temperatureScan_Sera_SrfSplashed = Probabilmente non dovresti nuotare in quest'acqua.
		#LOC_KS_SciDef_temperatureScan_Sera_FlyingLow = Una raffica di vento freddo quasi ti fa cadere dalla nave. Per un pelo!
		#LOC_KS_SciDef_temperatureScan_Sera_FlyingHigh = Fa abbastanza freddo quassù, non è vero?
		#LOC_KS_SciDef_temperatureScan_Sera_InSpace = Fa freddo. Voglio dire, cosa ti aspettavi?

		#LOC_KS_SciDef_evaReport_Sera_SrfLanded = La superficie di Sera è un paesaggio sterile e roccioso con massi sparsi che punteggiano il territorio. L'impressionante sistema di anelli di Sera si inarca sopra, proiettando lunghe ombre sul terreno roccioso sottostante. I laghi sono chiaramente visibili dalla superficie. L'assenza di vita vegetale o animale sulla superficie rafforza l'impressione di un mondo desolato e inospitale.
		#LOC_KS_SciDef_evaReport_Sera_SrfSplashed = La superficie dei laghi di Sera è un paesaggio surreale e inquietante. Le tonalità marroni dei laghi si riflettono sulla visiera del Kerbal, proiettando un bagliore ultraterreno su tutto. Il terreno circostante è sterile e roccioso, senza vegetazione o segni di vita. La natura tossica del lago rende impossibile la sopravvivenza di qualsiasi forma di vita conosciuta.
		#LOC_KS_SciDef_evaReport_Sera_FlyingLow = Scendere attraverso la bassa atmosfera di Sera è un'esperienza straziante. I venti ululano e scuotono il Kerbal mentre precipita verso la superficie rocciosa del pianeta, rendendo difficile mantenere il controllo. Nonostante le condizioni difficili, la vista è mozzafiato. Il terreno accidentato del pianeta si estende sotto, cosparso di rocce giganti e catene montuose. L'atmosfera è spessa e nebbiosa, con una tinta rossastra causata dall'alta concentrazione di particelle di ossido di ferro nell'aria. Nonostante la bellezza del pianeta, le condizioni qui sono incredibilmente difficili.
		#LOC_KS_SciDef_evaReport_Sera_FlyingHigh = La superficie rocciosa del pianeta si allontana nella distanza, sostituita da un vortice turbinante di nuvole e gas. L'atmosfera qui è sottile e vaporosa, con una tonalità rosso-gialla. Nonostante la bellezza del pianeta da questa altezza, le condizioni qui sono incredibilmente difficili. Questa è un'area pericolosa ma essenziale da esplorare per coloro che cercano di svelare i misteri di questo mondo sterile e roccioso.
		#LOC_KS_SciDef_evaReport_Sera_InSpaceLow = È un mondo austero e senza vita, con nulla che rompa la monotonia della sua superficie infinita tranne l'impressionante sistema di anelli che lo circonda. Eseguire un EVA nello spazio basso sopra Sera offre una prospettiva unica su questo pianeta desolato, permettendo ai ricercatori di osservarlo da lontano e studiarne le caratteristiche con dettagli incredibili. Le condizioni qui sono difficili, con temperature estreme e alti livelli di radiazioni.
		#LOC_KS_SciDef_evaReport_Sera_InSpaceHigh = Sera è uno spettacolo impressionante dall'alto, con il suo bellissimo sistema di anelli e la superficie sterile e rocciosa che si estende sotto. Mentre galleggiavi in assenza di peso sopra il pianeta, sei stato colpito dalla desolazione del paesaggio e dai laghi tossici e senza vita che punteggiano la sua superficie.

		#LOC_KS_SciDef_mysteryGoo_Sera_SrfLanded = Il Goo è freddo e ha una piccola quantità di polvere arancione sopra.
		#LOC_KS_SciDef_mysteryGoo_Sera_SrfSplashed = Il Goo si è bagnato durante l'ammaraggio.
		#LOC_KS_SciDef_mysteryGoo_Sera_FlyingLow = Il Goo sta iniziando a congelare.
		#LOC_KS_SciDef_mysteryGoo_Sera_FlyingHigh = Il Goo vacilla nel suo contenitore durante il rientro.

		#LOC_KS_SciDef_surfaceSample_Sera_SrfLanded = Il campione di superficie raccolto da Sera è composto da un regolite a grana fine rossastro-marrone che sembra essere stato eroso da frequenti tempeste di polvere e vento. L'analisi chimica del campione rivela un'alta concentrazione di metalli pesanti, tra cui ferro, alluminio e titanio, oltre a quantità minori di altri elementi come silicio e calcio. Sebbene la presenza di metalli pesanti suggerisca una composizione minerale potenzialmente ricca, la mancanza di segni rilevabili di composti organici o altri indicatori di vita suggerisce che Sera non è adatta a sostenere la vita come la conosciamo.
		#LOC_KS_SciDef_surfaceSample_Sera_SrfSplashed = Il campione raccolto da uno dei laghi di Sera è composto da acqua. L'analisi chimica del campione rivela un'alta concentrazione di metalli pesanti e altri composti tossici. Tuttavia, la mancanza di segni rilevabili di vita suggerisce che Sera non è adatta a sostenere la vita come la conosciamo.

		#LOC_KS_SciDef_mobileMaterialsLab_Sera_SrfLanded = La polvere sollevata durante l'atterraggio ricopre i materiali con una fine polvere arancione.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_SrfSplashed = L'acqua si infiltra nell'unità, corrodendo i materiali.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_FlyingLow = Uno strato sottile di ghiaccio ricopre i materiali.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_FlyingHigh = Uno strato sottile di ghiaccio ricopre i materiali.
		#LOC_KS_SciDef_mobileMaterialsLab_Sera_InSpace = I materiali si congelano quando sono esposti allo spazio esterno.

		#LOC_KS_SciDef_barometerScan_Sera_InSpaceLow = Che sorpresa! Il dispositivo legge 0, come se fosse nel vuoto nello spazio sopra Sera!
		#LOC_KS_SciDef_barometerScan_Sera_InSpaceHigh = Il dispositivo legge 0, come se fosse nel vuoto nello spazio sopra Sera!

		#LOC_KS_SciDef_seismicScan_Sera_SrfLanded = La scansione sismica condotta sulla crosta e sul mantello di Sera rivela un pianeta altamente attivo tettonicamente, con frequente attività sismica. La crosta del pianeta è fratturata, con estese reti di faglie e fessure, probabilmente causate dalle sollecitazioni indotte dal sistema di anelli del pianeta. Tuttavia, la mancanza di segni rilevabili di composti organici o altri indicatori di vita suggerisce che Sera non è adatta a sostenere la vita come la conosciamo.

		#LOC_KS_SciDef_gravityScan_Sera_Srf = La gravità è solo un pochino più alta di quella di Kerbin a 1,08 g.

		#LOC_KS_SciDef_magnetometer_Sera_InSpace = Sera sembra avere un campo magnetico relativamente forte, che protegge il pianeta dai venti solari di Sunorc.

		#LOC_KS_SciDef_atmosphereAnalysis_Sera_SrfLanded = L'analisi atmosferica condotta sulla superficie di Sera rivela un ambiente sterile e senza vita, senza segni rilevabili di composti organici o altri indicatori di vita. L'atmosfera è spessa e composta principalmente da anidride carbonica e azoto, con tracce di altri gas come argon e metano.
		#LOC_KS_SciDef_atmosphereAnalysis_Sera_FlyingLow = L'analisi atmosferica condotta sulla bassa atmosfera di Sera rivela un ambiente spesso e nebbioso, con una composizione principalmente di anidride carbonica e azoto, e tracce di altri gas come argon e metano. Inoltre, la bassa atmosfera di Sera presenta una quantità significativa di polvere e particolato, che suggerisce la presenza di frequenti tempeste di polvere o perturbazioni atmosferiche. Tuttavia, la mancanza di segni rilevabili di composti organici nell'atmosfera di Sera suggerisce che il pianeta non è adatto a sostenere la vita come la conosciamo.
		#LOC_KS_SciDef_atmosphereAnalysis_Sera_FlyingHigh = L'analisi atmosferica condotta sull'alta atmosfera di Sera rivela un ambiente sottile e tenue, con tracce di diversi gas come anidride carbonica, azoto e argon. Tuttavia, l'alta atmosfera di Sera presenta una concentrazione sorprendentemente alta di particelle cariche, che suggerisce la presenza di un forte campo magnetico attorno al pianeta. Tuttavia, la mancanza di segni rilevabili di composti organici nell'atmosfera di Sera suggerisce che il pianeta non è adatto a sostenere la vita come la conosciamo.

		// Dipuc
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Lowlands = Come si possono differenziare le regioni basate sull'altitudine? Sì, confrontandole con le zone circostanti più elevate, ma quanto "basse" sono le basse terre rispetto al... "livello del mare"? A proposito, cosa conta come "livello del mare" medio su un corpo celeste secco e vuoto come Dipuc, il punto più basso non vulcanico della crosta, o una profondità arbitraria stabilita da... quale comitato o individuo? Con la mancanza di standardizzazione presente, tanto vale aprire il portello per aria fresca per la frustrazione.\n\n\n...aspetta- 
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Midlands = Le terre medie, un posto molto... "medio". Forse sei atterrato qui per le maggiori concentrazioni di materiali utilizzabili per l'uso in-situ delle risorse? Altrimenti, ti consiglio di spostarti nelle basse terre per zone più sicure e miti adatte alla costruzione di colonie, o nelle alte terre e montagne per sfide letteralmente più elevate, non c'è molto altro qui, a meno che non abbia un rover con te o sia in un rover encapsulato e voglia cavalcare delle onde... onde statiche, preciserei.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Highlands = Le alte terre, più alte della maggior parte dei posti su Dipuc e una meraviglia da cui ammirare i dintorni. Le montagne superano però quest'area in splendore prospettico. I cercatori di risorse possono iniziare a scavare a piacimento, esplorando il paesaggio sempre più ripido, o fingere di non avere incubi sulle maree titaniche di Rouqea.\n\n\nSì, qui ci sono montagne VERE che non si muovono rapidamente in breve tempo, quindi idealmente non c'è da preoccuparsi della possibilità di mortalità su una luna solitaria come questa.\n\n...A meno che tu non sia un cretino bavoso o Danny o Dennis e desideri sacrificare alcuni Kerbal al Kraken.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Mountains = "Quelle non sono onde, sono montagne," dice Gene Kerman a un veterano di Rouqea in preda al panico. Afferma che le montagne sono "immobili, statiche e dal colore cremoso," non "mobili, dinamiche e tinte d'oltremare." Inoltre, la spettrometria di massa e le scansioni gravimetriche rivelano alte concentrazioni di silicati, solfati, carbonati e ossidi più pesanti incorporati in diversi strati montuosi, materiali e strutture sotterranee ovviamente assenti dalle onde alte chilometri composte interamente da un miscuglio liquido impuro di miriadi di minerali e organici in monossido di diidrogeno ossigenato diatomo disciolto. "Ora percorri il resto della superficie di Dipuc, estrai il suolo - preferibilmente non con un piccone dato che qualsiasi ejecta minerario potrebbe rivelarsi pericoloso per il Kerbal o l'attrezzatura - o inizia l'insediamento della colonia qui, affinché le tonnellate di delta-v consumate non siano state vane!"\n\n-Gene
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Poles = Ah, le regioni polari, dove la neve abbonda e le temperature gelide sono la norma.\n\nAspetta, no, quello è su un mondo simile a Kerbin. Nessun ghiaccio è presente qui. Almeno l'atterraggio qui non dovrebbe essere arduo, giusto?\n\nPerché l'attività vulcanica è inesistente in questa regione particolare ma abbondante alle basse latitudini? L'agitazione tidale di Sera sull'interno di Dipuc, che esercita i suoi effetti più forti nelle regioni più vicine al genitore di Dipuc - le basse latitudini vicine all'equatore - potrebbe spiegarlo, ma considerando la rotazione sincrona di Dipuc con Sera, l'attività vulcanica non dovrebbe frequentare il suo lato "vicino"? In ogni caso, dato che il paesaggio non è un meraviglioso ambiente invernale, pensa di attraversare più a sud o nord da qui.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterSouth = Il Cratere Meridionale appare... quanto a sud dall'equatore di Dipuc? A meno che i cieli vuoti sopra la località attuale non mostrino Sera, i sistemi di riferimento per la posizione latitudinale del Cratere Meridionale sono meramente periodici, sia con la presenza gravitazionale lontana di Kcalbeloh che con Sunorc illuminante per almeno metà del periodo rotazionale e orbitale di Dipuc.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterEast = Il Cratere Orientale... quanto a est è dal meridiano principale? E cosa definisce una longitudine specifica come meridiano principale? Quale caratteristica distintiva, naturale o meno, giustifica la selezione di un meridiano specifico di Dipuc come principale?\n\n\nNo, Gene, questo è nell'universo del gioco, usare la linea verticale più centrale sulla mappa colori di Dipuc non costituisce una ragione valida nell'universo del gioco. E questo è stato prima o dopo che hai tentato di consolare un Kerbal toccato da Rouqea nelle montagne, considerando l'ipocrisia del secondo scenario?
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_CraterWest = Spero che ti goda il tuo soggiorno al Cratere Occidentale, specialmente se ti manca il propellente necessario per trasformare questo viaggio di sola andata in un viaggio di andata e ritorno. In ogni caso, cosa ha reso il Cratere Occidentale abbastanza allettante da giustificare una visita? Dopotutto, grandi crateri come questi sono segni glorificati sulla superficie di mondi vuoti dove tali strutture d'impatto costellano la superficie a ritmo regolare. D'altra parte, Dipuc sembra essere un'eccezione - escludendo il Complesso dei crateri Occidentale, Orientale, Meridionale e Doppio, i crateri d'impatto sono raramente trovati qui. Forse le attività interne e il vulcanismo attivo sono associati alla disparità superficiale di Dipuc rispetto ad altri piccoli mondi vuoti simili.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_DoubleCrater = Benvenuto al Complesso del Doppio Cratere, dove non stai assolutamente vivendo una visione doppia. Ci siamo dentro, dopotutto - nessun artefatto visivo interno o fantasma mentale durerebbe così a lungo senza che un altro Kerbal si rivolga al tuo stato mentale alterato.\n\nSei solo nel vuoto di Dipuc, vero? Se no, cessa le tue illusioni sull'esistenza dei Doppi Crateri affinché il resto dell'equipaggio non ti disprezzi come molti Kerbal informati a casa fanno con i Flat Kerbiners o i Nonexistent-Dressings.
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Volcano = Per quanto riguarda la sicurezza, i coni vulcanici a pendio ripido sono discretamente pericolosi per la loro inclinazione ripida, che può portare a diversi incidenti che possono rivelarsi dannosi per la progressione della missione. Almeno il calore che ti aspetteresti dalla superficie di un cono vulcanico attivo è assente qui, giusto?\n\nE no, c'è poco da preoccuparsi delle eruzioni vulcaniche qui dato che l'ambiente vuoto raffredderebbe immediatamente la lava in eruzione e eventuali flussi piroclastici al punto di diventare flussi di lahar lenti e facilmente evitabili.\nSolo... per l'amore del Kraken, non avventurarti mai in prossimità del condotto vulcanico attivo.\n\n\nSei già vicino, vero?
		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_VolcanoVent = Cortocircuiti e archi elettrici? Atmosfera ad alta pressione di ossigeno puro? Odore acre? Prevalenza di materiali altamente infiammabili in atmosfere ricche di ossigeno? Se il tuo veicolo ha un compartimento che soddisfa tutte queste condizioni, congratulazioni, una simulazione in situ dell'incendio di Acapello 1 è imminente! E se la temperatura in questo condotto vulcanico è abbastanza calda da accendere diversi materiali altamente infiammabili attualmente presenti nel veicolo, che il Kraken ti benedica mentre l'interno del tuo veicolo inizia a diventare un forno per pizza chiuso e infuocato.\n\nSpero che al Kraken piacciano i Kerbal cotti e leggermente bruciati in quel caso...

		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow1 = La macchia pastosa di Dipuc come luna appare appropriatamente grumosa, sebbene ci siano diverse protuberanze alle basse latitudini indicative di vulcanismo attivo. La ragione e il modus operandi di queste strutture vulcaniche sono attualmente sconosciuti, sebbene l'agitazione tidale interna sia una possibilità probabile. 
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow2 = Scendere ulteriormente verso la superficie? Se sì, spero che tu abbia preparato abbastanza risorse per tornare in orbita bassa di Dipuc o verso qualsiasi veicolo in orbita nelle vicinanze. Allontanarsi ulteriormente da Dipuc? Spero che ti sia piaciuto il tuo soggiorno nella sua vicinanza, supponendo che tale visita fosse intenzionale e non il risultato di... circostanze gravitazionali anomale. Se intendi restare qui, presumo che sia intenzionale; altrimenti, è meglio che tu abbia alcune capsule criogeniche e riserve di Glykerol, o le tue risorse di supporto vitale si esauriranno gradualmente, anche con eventuali moduli di riciclaggio disponibili.\n\n\n...Non hai alcun mod di supporto vitale o DeepFreeze installato, vero?
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow3 = Questa luna induce noia a un ritmo maggiore di [repainted Mun], possiamo tornare a [Ares]? Non mi piace orbitare attorno a una palla di pasta oversize, una che NON È NEMMENO COMMESTIBILE.\n\n\nAvviso: si prega di non consumare pasticceria cruda o pasta del pane che contenga ingredienti o uova facilmente deperibili, possono contenere materiali o patogeni potenzialmente pericolosi, specialmente quando uno o entrambi i costituenti interni dell'uovo sono ingredienti nella pasta. -Mortimer
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceLow4 = Quelle regioni montuose non possono raggiungerci... Eccellente, scendiamo per campionare la superficie e determinarne la composizione e il sapore! Oh, la superficie non è commestibile? Perché siamo qui allora? Per costringere i Kerbal traumatizzati su Rouqea a rivivere esperienze traumatiche in una terapia di esposizione in stile umor nero?

		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh1 = Palla di pasta. La chiamo così. Se Minmus è la luna del gelato alla menta, Dipuc è la luna palla di pasta. Sorprendentemente, l'Unione Astronomica Internazionale ha quasi unanimemente acconsentito a tale nozione. Sembra che tutti a casa abbiano fame di umorismo.\n\nE sì, l'UAI esiste qui, sebbene principalmente per attestare l'esistenza di quel noioso pianeta nano meglio noto come Dres, o umoristicamente come "il pianeta nano inesistente" o "il Mun ricolorato."
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh2 = Credo che non dovremmo essere qui. I calcoli orbitali indicavano tutti che la sfera d'influenza di Dipuc è troppo minuscola per influenzare ragionevolmente l'orbita sulla scala temporale della missione. Il vicino ponte Einstein-Rosen è coinvolto in questa anomalia gravitazionale? Dopotutto, è così che siamo arrivati qui nonostante l'enorme distanza da Kerbin.\n\n\n<color=#000000>[Siete arrivati qui tramite i ponti Einstein-Rosen, corretto?]</color>
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh3 = Invertendo il nome di questa luna, devo chiedere: cosa rende questa luna apprezzabile in alcun senso del termine?
		#LOC_KS_SciDef_crewReport_Dipuc_InSpaceHigh4 = Benvenuto su Dipuc, una luna vuota del mondo desertico principalmente gelido Sera con una tonalità beige notevole. Interessante, pochi crateri segnano la superficie, ad eccezione di diversi grandi complessi di crateri, incluso una struttura di doppio cratere sovrapposta. Sembrano esserci diversi tumuli concentrati alle basse latitudini che assomigliano fortemente ai coni stratovulcanici. Volcanismo attivo o recentemente attivo? In ogni caso, se la tua visita alle regioni esterne di Dipuc è prevista, pensa di scendere ulteriormente per informarti sulla sua attività superficiale?


		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Lowlands = Le basse terre sono, prevedibilmente, a bassa elevazione, almeno rispetto al terreno circostante, con pendii dolci e colline simili a dune che abbracciano l'intera zona. La composizione superficiale locale assomiglia a quella delle terre medie e alte terre, sebbene appaia come un miscuglio sciolto simile al regolite di particelle più fini di entrambi i biomi. Mi chiedo, da dove prendono le misurazioni per l'altitudine superficiale media del "livello del mare", considerando che non ci sono oceani globali da usare come base?
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Midlands = Un terreno accidentato e irregolare caratterizza le terre medie, sembra. L'elevazione relativa al "livello del mare" qui è significativamente più alta dell'elevazione media delle basse terre. La composizione locale appare identica a basse terre e alte terre - presumibilmente materiale silicato con ossidi, metalli, lantanidi e l'occasionale attinide. Le dimensioni delle particelle sono maggiori qui, e pietre più grandi sembrano occasionalmente conglomerarsi con le pietre vicine.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Highlands = Le alte terre sono prevedibilmente ad alta elevazione rispetto al resto della superficie di Cupid-*ahem*-Dipuc, e hanno una composizione simile a terre medie e basse terre. Il terreno locale è irregolare e ripido in misura maggiore delle terre medie. Consiglio vivamente di restare cauti quando si esplora vicino ai pendii ripidi e alle strutture simili a dune qui. Le dimensioni delle particelle, no, le PIETRE qui sono particolarmente significative e costituiscono un impedimento per i veicoli rover più piccoli.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Mountains = Elevazioni significative relative al livello del mare definiscono catene montuose e cordigliere, indipendentemente dall'atmosfera del mondo o dalla sua mancanza, come in questo caso. Le tonalità superficiali intrinseche assomigliano a quelle di basse terre, terre medie e alte terre, sebbene la texture e l'aspetto si discostino dalle convenzioni dei tre biomi menzionati. Qui, le rocce superficiali sembrano aver subito una metamorfosi parziale. Inoltre, le concentrazioni di attinidi e lantanidi abbondanti nei nuclei dei corpi celesti differenziati sono elevate rispetto ai biomi circostanti. Le rocce non metamorfosate qui pongono rischi significativi per i veicoli rover piccoli e medi, sebbene quelli più grandi possano cavarsela.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Poles = Le regioni polari di Dipuc presentano livelli simili di terreno che induce noia alla maggior parte della superficie altrove - tonalità simile, composizione simile, temperatura simile, et cetera. I livelli di temperatura suscitano una certa curiosità considerando la maggiore distribuzione della radiazione di Sunorc alle latitudini più alte, sebbene l'attività in volo ed extraveicolare dovrebbe incontrare impedimenti ambientali minimi qui come ovunque altrove, ad eccezione dei condotti vulcanici. 
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterSouth = Le regioni appiattite del Cratere Gigante Meridionale manifestano elevazioni più basse della maggior parte del terreno che lo circonda. Le rocce superficiali indicano attività metamorfica precedente, probabilmente dall'evento d'impatto che ha inizialmente generato il Cratere Gigante Meridionale. Anche le tonalità delle rocce nella località appaiono leggermente più scure del terreno circostante, forse anch'esse dall'evento d'impatto? Considerando i condotti vulcanici attivi di Dipuc, si potrebbe supporre che una combinazione di rocce metamorfiche e ignee componga il fondo del cratere, sebbene l'aspetto superficiale attuale sembri contrario a tali ipotesi.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterEast = Il Cratere Gigante Orientale appare come un vasto canyon che attraversa il terreno altrimenti normale di Dipuc, mentre le alte terre e le montagne e le loro alte elevazioni circondano il Cratere in modo omnidirezionale. Come gli altri crateri, la colorazione superficiale qui è notevolmente più scura del resto, ed è particolarmente notevole nel confronto delle tonalità superficiali locali con quelle delle terre medie e alte terre circostanti. Le rocce qui sembrano metamorfosate in misura marcata, e la superficie è più liscia e rigida del terreno più accidentato, roccioso e polveroso caratteristico dei biomi tipici qui.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_CraterWest = Le elevazioni medie nel Cratere Gigante Occidentale assomigliano a quelle degli altri crateri, con valori notevolmente più bassi del terreno circostante. Le rocce qui appaiono un po' polverizzate e polverose con una somiglianza al regolite sempre pericoloso della Mun, ma sembrano saldamente fissate al suolo, come se un processo geomorfico fosse avvenuto qui che ha compresso le rocce minuscole al terreno. Inoltre, la tonalità complessiva del Cratere è più scura del terreno circostante. Forse è dovuto all'impatto, o è un regolite specifico della regione a causa delle condizioni durante e immediatamente dopo l'impatto? In nota secondaria, la vista del terreno che circonda il Cratere Gigante Occidentale appare simile a un canyon.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_DoubleCrater = L'elevazione media nella regione dei Doppi Crateri è notevolmente più bassa di quella delle basse terre. La colorazione superficiale è più scura del terreno circostante e ha una texture rocciosa diversa. Le rocce appaiono un po' metamorfiche - un aspetto atteso, dato che significativi cambiamenti ambientali fulminanti sono avvenuti in questa regione a causa dei doppi impatti.
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_Volcano = L'elevazione relativa nella regione del Vulcano è più alta del resto... per ovvie ragioni. Il vulcano è o uno stratovulcano o un vulcano a cono di scorie, a giudicare dalla sua forma conica ripida e dalle altrettanto ripide pendenze. Le temperature medie del suolo sono probabilmente più alte qui, sebbene con tutte le nostre tute in posizione, sarebbe rilevabile solo tramite letture del termometro da terra. È prevista anche attività di microterremoti qui - è meglio informarsi ulteriormente con un sismometro reale, però. 
		#LOC_KS_SciDef_evaReport_Dipuc_SrfLanded_VolcanoVent = Sei in una situazione molto, molto precaria. Le temperature sono abbastanza alte da permeare attraverso la tua tuta, e il condotto è attivo, quindi potrei suggerirti di librarti sopra il condotto invece di calpestarlo per non finire dematerializzato in un sbuffo di fumo. A parte questo, le rocce ignee sembrano prevalenti nelle pareti del condotto, sebbene le pareti inferiori appaiano un po' fuse ma metamorfosate dal calore. Sera ha qualcosa a che fare con questo, o l'attività vulcanica di Dipuc è indipendente da qualsiasi meccanismo del suo pianeta genitore?\n\n\nSe non desideri finire come l'equipaggio di Acapello 1, ABBANDONA LA LOCALITÀ IMMEDIATAMENTE.

		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Lowlands = Le basse terre di Dipuc appaiono... relativamente piatte da qui, con le occasionali "dune" a forma di increspature che punteggiano le pianure accanto al vulcano attivo occasionale. Supponendo che tu sia attualmente sul lato illuminato della luna, la tonalità superficiale assomiglia fortemente alla pasta del pane.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Midlands = Come le basse terre, le terre medie assomigliano alla pasta fresca del pane per tonalità, sebbene con un aspetto più grumoso dovuto al rilievo accidentato della regione.\n\nSe la tonalità di Dipuc assomiglia alla pasta del pane e Minmus al gelato alla menta, esiste un mondo che assomiglia agli spaghetti o alla pizza?\n\n\n\nE no, Io non conta - la speculazione attuale riguarda i corpi celesti dell'universo del gioco.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Highlands = Più irregolari in apparenza, gli altopiani, a causa delle elevazioni generalmente più alte, appaiono più vicini al veicolo - a meno che detto veicolo non orbiti a quote pericolosamente basse, nel qual caso la percezione di prossimità dovrebbe contare poco rispetto al rischio significativo di potenziale collisione.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Mountains = La prossimità delle montagne al veicolo è... abbagliantemente intimidatoria. La linearità di diverse catene montuose appare come onde. Se non fosse per la mancanza di atmosfera e le tonalità crema-marrone delle montagne, si potrebbero scambiare per le maree titaniche che circumnavigano regolarmente Rouqea.\n\nDato il parametro gravitazionale di Dipuc, atterrare nelle regioni montuose e tornare a un veicolo in orbita bassa solo con il propellente EVA è una possibilità, come su Minmus. 
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Poles = Nessun ghiaccio di alcun tipo - acqua, anidride carbonica, metano, ammoniaca, et cetera - è presente ai poli, né dovrebbe essere atteso dato lo status di Dipuc come mondo vuoto minuscolo di dimensioni e massa comparabili a Minmus. I poli stessi appaiono molto simili al resto della superficie alle latitudini più basse, sebbene nessuna attività vulcanica sia presente qui.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterSouth = Ah, il Cratere Gigante Meridionale! Un vasto... bacino... di piattezza assoluta. Piuttosto intuitivo, dato il suo status di cratere che definisce le caratteristiche di una luna discretamente ricca di caratteristiche. Ci si aspetterebbe che un picco centrale appaia qui, ma le scansioni ottiche e gravimetriche non rivelano anomalie indicative di un picco centrale anche eroso.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterEast = Il Cratere Gigante Orientale, un baratro deludentemente piatto con viste superficiali presumibilmente impressionanti che emanano l'impressione di stare in un grande canyon particolarmente xerico... o una collezione concentrica di frane di fango torreggianti pronte a inondarti completamente nei fluidi carichi di rocce. Le scansioni visive rivelano poco di notevole a parte la leggera differenza di colore tra esso e le regioni circostanti ad alta elevazione e montuose.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_CraterWest = Non molto di nota iniziale qui sopra il Cratere Gigante Occidentale. Una tonalità superficiale leggermente più scura dalle regioni ad alta e media elevazione che avvolgono il cratere, la mancanza di un picco centrale e una vista decente sulla superficie che può assomigliare a fissare le pareti di un ampio canyon vicino al fondo, e non molto altro.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_DoubleCrater = Il bacino d'impatto dei Doppi Crateri comprende principalmente due crateri d'impatto, un cratere più vecchio e grande e un cratere più giovane e piccolo come evidenziato dal bordo del cratere del cratere minuscolo che si intromette nel suo vicino espansivo. Un Kerbal dall'occhio acuto può vedere la leggera differenza di colore tra le regioni centrali di entrambi i crateri e quelle delle aree a bassa e media elevazione che circondano il complesso. Data la tendenza delle rocce ignee solidificate a manifestarsi in tonalità più scure, le regioni centrali sono possibili candidati per una precedente attività magmatica diffusa, fornendo una spiegazione potenziale per la mancanza di picchi centrali sia qui che negli altri grandi crateri di Dipuc. 
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_Volcano = L'attività vulcanica su un mondo piccolo come Dipuc suona strana. I vulcani qui, deducendo dal loro aspetto, sono di struttura stratovulcanica - il cono vulcanico consiste di diversi strati ripetuti di multiple rocce ignee ed ejecta vulcanici da eruzioni ripetute considerate recenti sulla scala temporale di Dipuc. L'atterraggio qui appare non praticabile a causa del terreno ripido e in pendio. 
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceLow_VolcanoVent = Il condotto vulcanico appare attivo, dato l'aspetto incandescente e fuso del lumen del condotto. Le letture termiche non mostrano cambiamento di temperatura. Sei al sicuro qui, per ora. Tutto ciò che deve essere fatto per assicurare la tua continuità come membro vivente, respirante e attivo della missione è <color=#FF6A00>NON SCENDERE ULTERIORMENTE SOPRA IL CONDOTTO VULCANICO ATTIVO.</color> Supponendo che il tuo veicolo contenga un abitacolo, assicurati anche che l'atmosfera NON sia puramente ossigeno - qualsiasi materiale altamente infiammabile in un'atmosfera di ossigeno puro probabilmente si accenderà spontaneamente sotto temperature che superano la sua temperatura massima di funzionamento.

		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh1 = L'unica luna di un mondo desertico freddo <color=#000000>[i ponti Einstein-Rosen non contano, se non era già ovvio]</color> attorno a un analogo di Kerbol è un posto piuttosto insignificante per un osservatore lontano, sebbene un'ispezione più ravvicinata possa rivelare di più. A meno che l'incontro che ti ha portato alla sua sfera d'influenza non sia stato involontario o sia avvenuto a causa di dati anomali <color=#000000>[leggi: errore SOI]</color>, pensa di avvicinarti per esaminare ulteriormente Dipuc?
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh2 = L'aspetto lontano di Dipuc assomiglia a pasta grumosa, una nocciolina... o un nocciolo di ciliegia pallido. Forse il Kraken potrebbe fare con uno spuntino per un momentaneo appagamento, o un veleno per eliminarlo a beneficio di tutti. Il suo genitore, Sera, probabilmente presterà poca attenzione comunque. Se sperimentare con, su e intorno alla luna in miniatura sia scientificamente praticabile dipende dalla tua discrezione, intrepido Kerbal.\n\n\nCosa, pensi che una sonda possa raggiungere così lontano senza garantire la perdita totale del contatto?
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh3 = Sebbene già a una discreta distanza da Kcalbeloh, il suo distintivo disco di accrescimento e orizzonte degli eventi sono molto visibili anche con occhi piuttosto miopi. Probabilmente sarebbe meglio esplorare quell'area che qui... a meno che tu non sia arrivato qui per primo dal wormhole vicino e non voglia spendere diverse migliaia o milioni di tonnellate di carburante in delta-v.
		#LOC_KS_SciDef_evaReport_Dipuc_InSpaceHigh4 = Un posto meravigliosamente costellato di crateri, Dipuc. Sebbene sembri avere strutture alle basse latitudini che assomigliano a brufoli della pelle con l'area elevata e un picco centrale rossastro.\n\nOh, quelli sono coni vulcanici? Considerando il loro aspetto rosso più profondo, la lava contenuta in essi appare... fredda. Forse Dipuc era una volta più geologicamente attiva e violenta? Noto aree più scure che assomigliano ai maria della Mun, alcune di esse anche in quei crateri più grandi. Immagino che questo mondo possa essere stato più eccitante nel passato rispetto a oggi, chissà?

		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Lowlands = Posso chiedere esattamente PERCHÉ hai eseguito una scansione barometrica in un mondo VUOTO di tutti i posti? Se non è entrato in uno stato irreparabile e inoperabile fino alla successiva riparazione già a causa del suo ingresso in un ambiente vuoto, il tuo tentativo di raccogliere dati da esso lo farà sicuramente da un punto di vista logico.\n\n\n<color=#000000>[Mi chiedo se un mod come Kerbalism potrebbe implementare un meccanismo simile...]</color>
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Midlands = O sei uno stupido per un Kerbal - uno standard già basso - o stai eseguendo l'esperimento su un veicolo di atterraggio single-stage-to-everywhere o multiuso. Se è il secondo caso, continua e raccogli i frutti dei tuoi sforzi, che sono ammettiamolo pochi supponendo che tu sia arrivato nel sistema Kcalbeloh tramite wormhole gravitazionalmente anomali.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Highlands = Se stai eseguendo questo specificamente per guadagnare punti scienza aggiuntivi, vai pure, ma nota per favore la farsa logica di eseguire un esperimento scientifico dipendente dall'atmosfera in un ambiente vuoto.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Mountains = Perché devi eseguire una scansione barometrica, che richiede di risiedere in un'atmosfera per ottenere qualsiasi risultato, in un ambiente vuoto? È stato Gene a spingerti, o è di tua iniziativa? In ogni caso, a meno che tu non stia eseguendo questo come parte di un gruppo di azioni su un lander multiuso o un single-stage-to-anywhere, ti consiglio di non eseguire di nuovo questo esperimento in questo tipo specifico di ambiente.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Poles = Ti aspettavi pressioni più basse qui data la sua natura polare? Le troveresti solo in condizioni atmosferiche, di cui Dipuc È TOTALMENTE PRIVO. Per l'amore del Kraken, esegui questo in ambienti appropriati. Anche i mondi con atmosfera sottile se la cavano meglio con questo esperimento nella loro sottile involucro gassoso che qui.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterSouth = Scusa il tuo giro piuttosto pedante di acquisizione di esperimenti scientifici, ma hai considerato di cessare le tue attività attuali per ponderare esattamente PERCHÉ ESEGUIRESTI UNA SCANSIONE BAROMETRICA IN UN VUOTO? Se hai membri dell'equipaggio a bordo del tuo veicolo, spero che tu sia preparato al dileggio per questo.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterEast = "Perché esattamente stai eseguendo una scansione barometrica su Dipuc, un satellite naturale minuscolo che non possiede alcuna traccia di atmosfera? Mortimer, contatta il Centro Kerbonauti, avremo bisogno di uno psicoanalista per quando l'equipaggio della missione di escursione superficiale di Dipuc attuale tornerà, abbiamo un altro caso di sperimentazione scientifica insensata." -Gene
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_CraterWest = "Sono diventato Ignoramus, devastatore dell'intelletto. Tutti i geni tremano davanti a me e si prosternano ai miei piedi!" disse il Kerbal strano mentre tentava invano di eseguire un barometro su Dipuc. Gene, da parte sua, desiderava interrompere intermittentemente i collegamenti di comunicazione radio con l'equipaggio della missione a causa del suo fastidio. Tuttavia, non poteva, a causa del fatto che la consapevolezza costante e la trasmissione dei dati erano fondamentali per assicurare il compimento degli obiettivi della missione e la sicurezza dell'equipaggio in caso di missioni con equipaggio come quella che stava attualmente presiedendo.\n\nGene, tuttavia, non ricevette alcun conforto da tale conoscenza, sapendo che il Kerbal che tentò la barometria nel vuoto si diede una ragione per anticipare di soccombere alla selezione naturale.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_DoubleCrater = "Tentando di eseguire un esperimento barometrico in-situ in un ambiente contrario alle condizioni attese in cui le barometrie sono spesso eseguite, ti sei certificato come cretino professionista e sarai ora in libertà vigilata fino alla conclusione della missione. Non resistere alla tua sentenza - aggraverà solo la severità e prolungherà la durata della tua libertà vigilata. Ulteriore non conformità comporterà la cessazione immediata tramite esposizione diretta al vuoto." -Mortimer\n\nIl Complesso Kerbonauti del Kerbal Space Center non si dispiacerà per la tua perdita; dopotutto, i Kerbonauti devono essere il pinnacolo di Kerbalkind per attraversare con successo il cosmo infestato dal Kraken.\n\nNemmeno il Controllo Missione si dispiacerebbe per la tua perdita se sei l'unico membro dell'equipaggio nella tua missione attuale.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_Volcano = La termometria non è un esperimento più appropriato da eseguire in prossimità di un vulcano, tanto più in un ambiente atmosferico? Anche con il degassaggio vulcanico, la pressione dei gas rilasciati indicherebbe un ambiente praticamente vuoto, come il resto di questo mondo altrimenti staticamente interno e privo di atmosfera.
		#LOC_KS_SciDef_barometerScan_Dipuc_SrfLanded_VolcanoVent = Il tuo valore di fronte a una morte potenzialmente imminente in mezzo a una situazione precaria come questa è ammirevole, quasi audace e incauto. Se i dati di questa barometria eseguita direttamente nei condotti vulcanici di Dipuc vengono recuperati dal Controllo Missione tramite le trasmissioni della Rete Internazionale per lo Spazio Profondo, sia noto che [Lorem Ipsum] Kerman fu un coraggioso Kerbonauta fino alla sua fine fusa.

		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = "Ahh, sì, una scansione barometrica. In un vuoto. Che sagacia da parte tua. Aspetta, questa missione è senza equipaggio? Chi tra gli ingegneri del VAB ha supposto che aggiungere un barometro alla sonda fosse un'idea praticabile?" -Gene
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = ...\n\n...\n\n...Perché?
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = Non hai già eseguito questo esperimento diverse volte in un ambiente vuoto prima di vagare fino a qui? Prima in orbita alta di Sera, poi in orbita alta di Dipuc, e ora in orbita bassa di Dipuc. Dove prevedi di eseguire un'altra scansione barometrica dopo, sulla superficie senza atmosfera di Dipuc?\n\n...Per favore non dire "già fatto."
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceLow = I risultati della tua scansione barometrica indicano una lettura della pressione atmosferica di [0] kilopascal (kPa), [null] millimetri di mercurio e [void] bar. Quindi, possiamo concludere con alta probabilità che questo barometro sia utilizzato in un ambiente vuoto. Per ricompensare il tuo ingegnoso cretinismo, puoi reclamare i frammenti di mercurio congelato la cui espulsione ad alta velocità dal recipiente di contenimento attuale in frammenti simili a shrapnel è imminente. Resta consapevole dei tuoi dintorni, e se conduci la barometria in un'attività extraveicolare, ispeziona anche immediatamente e accuratamente la tua tuta per anomalie. Grazie per il tuo tempo, e ricorda:\n\nSic itur ad astra!

		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = La tua flagrante stupidità per aver eseguito una scansione barometrica in un luogo vuoto merita lode e ricompense sotto forma di un invito (obbligatorio) a Bop alla conclusione della missione per un'intervista esclusiva con il Kraken! Aspettiamo con impazienza il tuo ritorno su Kerbin in sufficiente benessere!\n\n\n<color=#000000>[Qualsiasi tentativo di resistere all'intervista Kraken su Bop provocherà un attacco feroce del Kraken nel mezzo della tua prossima missione partecipante.]</color>
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = Una scansione barometrica è del tutto superflua in questo ambiente. A meno che la località attuale del barometro non sia un veicolo multiuso destinato ad avventurarsi verso più corpi celesti oltre a Dipuc, ti consiglio di non utilizzare nuovamente il barometro.\n\nA meno che tu non stia eseguendo questo per punti scienza aggiuntivi, nel qual caso, vai pure e approfitta delle sottigliezze tecniche.
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = "Spero davvero che tu stia eseguendo questo per i punti scienza e nient'altro. Altrimenti il Kraken potrebbe tentare di localizzarti e consumarti a nome dei tuoi compagni Kerbal a casa." -estratto da Mortimer
		#LOC_KS_SciDef_barometerScan_Dipuc_InSpaceHigh = Il compagno palla di pasta minuscolo di Sera non lieviterà in questo ambiente, specialmente data la mancanza di prove per forme di vita fermentanti e più importante, UN'ATMOSFERA. Quindi è meglio cessare la barometria esterna in cerca di condizioni adeguate di lievitazione della pasta e invece condurre una barometria interna per monitorare le fluttuazioni minori nell'atmosfera interna... supponendo che il barometro si trovi su un veicolo con equipaggio con uno o più compartimenti interni.

		#LOC_KS_SciDef_mysteryGoo_Dipuc_SrfLanded = Il Goo sembra sentirsi minacciato dal lontano rombo della luna vulcanica e trema nel suo contenitore. Che fifone.
		#LOC_KS_SciDef_mysteryGoo_Dipuc_InSpaceLow = Un vulcano erutta lontano sotto alla vista del Goo, che si ritrae per paura.
		#LOC_KS_SciDef_mysteryGoo_Dipuc_InSpaceHigh = Il Goo sembra cercare di segnalare al Controllo Missione che vuole tornare a casa.

		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLanded = Questo campione di roccia sembra essere costituito da roccia vulcanica ricca di metalli pesanti.
		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLandedLowlands = Trovi un pezzo di vetro vulcanico molto lucido per terra, lo raccogli e ti meravigli della sua superficie liscia e riflettente. Sfortunatamente, dovrai darlo agli scienziati quando torni a casa, quindi è meglio goderselo finché puoi.
		#LOC_KS_SciDef_surfaceSample_Dipuc_SrfLandedVolcanoVent = WOW! PATATA BOLLENTE! PATATA BOLLENTE!!!

		#LOC_KS_SciDef_mobileMaterialsLab_Dipuc_SrfLanded = I materiali reagiscono alla situazione in modo deludentemente atteso.
		#LOC_KS_SciDef_mobileMaterialsLab_Dipuc_InSpace = I materiali non reagiscono allo spazio vicino a Dipuc diversamente da come reagirebbero allo spazio altrove. Lo spazio è lo spazio.

		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLanded = A questa distanza da Sunorc, Dipuc è in realtà piuttosto freddo.
		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLandedVolcano = I pendii di questo vulcano non sembrano essere più caldi del resto di Dipuc.
		#LOC_KS_SciDef_temperatureScan_Dipuc_SrfLandedVolcanoVent = Ahi. Pizzica leggermente.
		#LOC_KS_SciDef_temperatureScan_Dipuc_InSpace = Nonostante la natura vulcanica della palla di pasta sotto, il termometro non sembra essere consapevole di quanto caldo possa fare lì sotto.

		#LOC_KS_SciDef_seismicScan_Dipuc_SrfLanded = Un rombo a bassa frequenza coerente con l'attività vulcanica vicina rimane costante ovunque su Dipuc, un chiaro segno di quanto sia attiva la luna.
		#LOC_KS_SciDef_seismicScan_Dipuc_SrfLandedVolcano = Il terreno trema abbastanza da essere avvertito da un Kerbal. Forse dovresti andartene da qui...

		#LOC_KS_SciDef_gravityScan_Dipuc_SrfLanded = La gravità è simile a quella della Mun, a 0,15 g.
		#LOC_KS_SciDef_gravityScan_Dipuc_InSpaceLow = Mentre passi sopra la superficie di Dipuc, la lettura di gravità fluttua secondo schemi che potrebbero indicare un flusso di magma sotterraneo.
		#LOC_KS_SciDef_gravityScan_Dipuc_InSpaceHigh = La debole gravità di Dipuc è abbastanza uniforme a questa distanza, ma ci sono ancora piccoli picchi nei dati.

		// Sistema Simetra-Simeht
		#LOC_KS_SciDef_crewReport_SimeSystem_InSpaceHigh = Ti interroghi sull'origine di questo sistema. Come hanno fatto esattamente due giganti gassosi ad avvicinarsi così tanto?
		#LOC_KS_SciDef_evaReport_SimeSystem_InSpaceHigh = Ti chiedi come questi due pianeti massicci non si siano ancora scontrati tra loro.
		#LOC_KS_SciDef_magnetometer_SimeSystem_InSpaceHigh = Lo strumento rileva potenti campi magnetici, ma non riesce a identificare se provengano da Simetra o Simeht, o da entrambi.
		#LOC_KS_SciDef_gravityScan_SimeSystem_InSpaceHigh = Nonostante i due corpi massicci al centro di questo sistema, il sensore mostra un valore quasi costante.

		// Simetra
		#LOC_KS_SciDef_crewReport_Simetra_FlyingLow = Inizi a mettere in dubbio la tua esistenza mentre il tuo veicolo viene lentamente compresso dalle pressioni estremamente elevate.
		#LOC_KS_SciDef_crewReport_Simetra_InSpace = La tua attenzione è attratta dalla gigante gassosa massiccia fuori dai finestrini. 

		#LOC_KS_SciDef_temperatureScan_Simetra_FlyingLow = L'atmosfera estremamente spessa schiaccia il termometro.
		#LOC_KS_SciDef_temperatureScan_Simetra_FlyingHigh = Le temperature nell'alta atmosfera sono molto basse. 

		#LOC_KS_SciDef_evaReport_Simetra_FlyingLow = Il fatto che tu sia riuscito a sopravvivere abbastanza a lungo per fare un rapporto quaggiù significa che devi essere un super-kerbal.
		#LOC_KS_SciDef_evaReport_Simetra_FlyingHigh = Questa è certamente una situazione precaria.
		#LOC_KS_SciDef_evaReport_Simetra_InSpace = Osservi con meraviglia le diverse bande di colori che si formano a diverse latitudini dell'atmosfera di Simetra.

		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingLow1 = Le pressioni estreme fanno entrare il Goo in uno stato supercritico.
		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingLow2 = La pressione estrema compatta il Goo in una sfera delle dimensioni di una pallina da golf all'apertura dell'unità di contenimento.
		#LOC_KS_SciDef_mysteryGoo_Simetra_FlyingHigh = Il Goo reagisce con i vari composti nell'atmosfera.

		#LOC_KS_SciDef_mobileMaterialsLab_Simetra_FlyingLow = All'apertura delle porte della sonda materiali, tutti i campioni vengono istantaneamente schiacciati dalla pressione estrema.
		#LOC_KS_SciDef_mobileMaterialsLab_Simetra_FlyingHigh = Diversi campioni sono combusti spontaneamente dopo essere entrati in contatto con l'atmosfera.

		#LOC_KS_SciDef_barometerScan_Simetra_FlyingLow = Il barometro va fuori scala proprio quando il suo vetro si frantuma.
		#LOC_KS_SciDef_barometerScan_Simetra_FlyingHigh = Le letture del barometro impennano quasi istantaneamente mentre scendi nell'atmosfera del gigante di ghiaccio.

		#LOC_KS_SciDef_gravityScan_Simetra_InSpaceLow = Più vicino a Simetra, puoi ottenere una lettura molto più precisa delle sue forze gravitazionali.
		#LOC_KS_SciDef_gravityScan_Simetra_InSpaceHigh = Il sensore di gravità viene falsato dalla vicinanza di un altro gigante di ghiaccio di dimensioni simili e punta verso il baricentro del sistema.

		#LOC_KS_SciDef_magnetometer_Simetra_InSpaceLow = Ora che sei più vicino a Simetra, puoi ottenere una lettura molto più precisa del suo campo magnetico molto forte.
		#LOC_KS_SciDef_magnetometer_Simetra_InSpaceHigh = L'asta del magnetometro percepisce un forte campo magnetico, ma la vicinanza di Simeht rende difficile capire se provenga solo da Simetra o da entrambi i giganti di ghiaccio.

		#LOC_KS_SciDef_atmosphereAnalysis_Simetra_FlyingLow = Le pressioni estreme appiattiscono l'analizzatore atmosferico.
		#LOC_KS_SciDef_atmosphereAnalysis_Simetra_FlyingHigh = L'atmosfera sembra essere composta in gran parte di metano, oltre a diversi altri composti che non riusciamo a identificare.

		// Simeht
		#LOC_KS_SciDef_crewReport_Simeht_FlyingLow = Inizi a mettere in discussione la tua esistenza mentre il tuo veicolo viene lentamente compresso dalle pressioni estremamente alte.
		#LOC_KS_SciDef_crewReport_Simeht_InSpace = La tua attenzione è attratta dal massiccio gigante gassoso fuori dai finestrini.

		#LOC_KS_SciDef_temperatureScan_Simeht_FlyingLow = L'atmosfera estremamente spessa schiaccia il termometro.
		#LOC_KS_SciDef_temperatureScan_Simeht_FlyingHigh = Le temperature nell'alta atmosfera sono molto basse.

		#LOC_KS_SciDef_evaReport_Simeht_FlyingLow = Il fatto che tu sia riuscito a sopravvivere abbastanza a lungo per fare un rapporto quaggiù significa che devi essere un super-kerbal.
		#LOC_KS_SciDef_evaReport_Simeht_FlyingHigh = Questa è certamente una situazione precaria.
		#LOC_KS_SciDef_evaReport_Simeht_InSpace = Non puoi fare a meno di guardare con meraviglia il gigante gassoso ciano-blu.

		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingLow1 = Le pressioni estreme fanno entrare il Goo in uno stato supercritico.
		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingLow2 = La pressione estrema compatta il Goo in una sfera delle dimensioni di una pallina da golf all'apertura dell'unità di contenimento.
		#LOC_KS_SciDef_mysteryGoo_Simeht_FlyingHigh = Il Goo reagisce con i composti nell'alta atmosfera in modi precedentemente ritenuti impossibili.

		#LOC_KS_SciDef_mobileMaterialsLab_Simeht_FlyingLow = All'apertura delle porte della sonda materiali, tutti i campioni vengono istantaneamente schiacciati dalla pressione estrema.
		#LOC_KS_SciDef_mobileMaterialsLab_Simeht_FlyingHigh = I campioni reagiscono con i composti sconosciuti nell'atmosfera.

		#LOC_KS_SciDef_barometerScan_Simeht_FlyingLow = Il barometro sopravvive a malapena all'atmosfera schiacciante. La pressione qui è così alta che qualsiasi acqua che potrebbe esistere qui dovrebbe esistere in uno stato supercritico.
		#LOC_KS_SciDef_barometerScan_Simeht_FlyingHigh = Le letture del barometro impennano quasi istantaneamente mentre scendi nell'atmosfera del gigante di ghiaccio.

		#LOC_KS_SciDef_gravityScan_Simeht_InSpaceLow = Più vicino a Simeht, puoi ottenere una lettura molto più precisa delle sue forze gravitazionali.
		#LOC_KS_SciDef_gravityScan_Simeht_InSpaceHigh = Il sensore di gravità viene falsato dalla vicinanza di un altro gigante di ghiaccio di dimensioni simili e punta verso il baricentro del sistema.

		#LOC_KS_SciDef_magnetometer_Simeht_InSpaceLow = Ora che sei più vicino a Simeht, puoi ottenere una lettura molto più precisa del suo campo magnetico molto forte.
		#LOC_KS_SciDef_magnetometer_Simeht_InSpaceHigh = L'asta percepisce un forte campo magnetico, ma la vicinanza di Simetra rende difficile capire se provenga solo da Simeht o da entrambi i giganti di ghiaccio.

		#LOC_KS_SciDef_atmosphereAnalysis_Simeht_FlyingLow = Le pressioni estreme hanno schiacciato l'analizzatore atmosferico, ma non prima che rilevasse la presenza di fluidi supercritici.
		#LOC_KS_SciDef_atmosphereAnalysis_Simeht_FlyingHigh = L'alta atmosfera di Simeht contiene composti non riconosciuti dall'analizzatore atmosferico.

		// Noira
		#LOC_KS_SciDef_crewReport_Noira_SrfLanded = Il paesaggio fuori ti ricorda molto i filmati dei primi atterraggi sulla Mun. Naturalmente, ci sono due differenze molto, molto grandi nel cielo.
		#LOC_KS_SciDef_crewReport_Noira_InSpaceLow = Sembra roba vecchia a questo punto, ad essere onesti. Andiamo laggiù!
		#LOC_KS_SciDef_crewReport_Noira_InSpaceHigh = Sembra che anche qui, in questo bizzarro sistema, esistano ancora luoghi familiari. Noira potrebbe quasi essere scambiata per la Mun!

		#LOC_KS_SciDef_evaReport_Noira_SrfLanded = È un piccolo passo... Cosa? Troppo trito?
		#LOC_KS_SciDef_evaReport_Noira_InSpaceLow = La superficie craterizzata che passa sotto di te ti fa sentire nostalgico.
		#LOC_KS_SciDef_evaReport_Noira_InSpaceHigh = Eh? Cosa ci fa la Mun qui? ...Oh, giusto. È fisicamente impossibile.

		#LOC_KS_SciDef_mysteryGoo_Noira_SrfLanded = Il Mystery Goo, avendo apparentemente deciso di piantare i talloni, è convinto che abbiamo atterrato su una scena cinematografica sulla Mun.
		#LOC_KS_SciDef_mysteryGoo_Noira_InSpaceLow = Il Goo non è sicuro di dove si trovi in questo momento.
		#LOC_KS_SciDef_mysteryGoo_Noira_InSpaceHigh = Il Goo sembra pensare che gli stiano facendo uno scherzo.

		#LOC_KS_SciDef_surfaceSample_Noira_SrfLanded = Rocce basaltiche e breccia, eh? Che retrò da parte tua, Noira.

		#LOC_KS_SciDef_mobileMaterialsLab_Noira_SrfLanded = La sonda campioni sembra essersi ricoperta di un sottile strato di polvere dalla superficie di Noira. È familiare.
		#LOC_KS_SciDef_mobileMaterialsLab_Noira_InSpace = Come sempre, lo spazio vicino a Noira non sembra influenzare i materiali diversamente dallo spazio ovunque altrove.

		#LOC_KS_SciDef_temperatureScan_Noira_SrfLanded = La temperatura superficiale di Noira è piuttosto gelida rispetto alla Mun, il che ha senso. Qui fuori, deve ricevere meno dell'8% della luce che riceve Kerbin!
		#LOC_KS_SciDef_temperatureScan_Noira_InSpace = Dice "Lol". O forse è "101"...?

		#LOC_KS_SciDef_barometerScan_Noira_SrfLanded = Forse è inutile, ma per essere sicuro controlli il barometro. È un vuoto spinto, va bene.
		#LOC_KS_SciDef_barometerScan_Noira_InSpace = Venti per otto, farebbe... sei, circa... sette.

		#LOC_KS_SciDef_seismicScan_Noira_SrfLanded = I frequenti tremori indicano che Noira è una luna tormentata dalle forze di marea mentre i due pianeti vicini danzano intorno.

		#LOC_KS_SciDef_gravityScan_Noira_SrfLanded = Le letture di gravità di Noira si riducono periodicamente quando i due mondi gemelli spiralano sopra.
		#LOC_KS_SciDef_gravityScan_Noira_InSpaceLow = La gravità di Noira è piuttosto bassa, quindi Simetra e Simeht costituiscono ancora una grande parte della lettura.
		#LOC_KS_SciDef_gravityScan_Noira_InSpaceHigh = A questa altitudine, l'attrazione di Noira è difficile da distinguere da Simetra e Simeht.
		// Norihc
		#LOC_KS_SciDef_crewReport_Norihc_SrfLanded = Sembra abbastanza freddo là fuori per congelare un snowkerb sul posto.
		#LOC_KS_SciDef_crewReport_Norihc_Flying = Non c'è davvero molta atmosfera qui. È meno volare, e più cadere... con stile!
		#LOC_KS_SciDef_crewReport_Norihc_InSpaceLow = Norihc è piuttosto... FREDDO! Eh? Eh? Nessuno?
		#LOC_KS_SciDef_crewReport_Norihc_InSpaceHigh = Sembra quasi una grande palla di neve. O forse... un cono di neve? Mmmm... Sapore di azoto...

		#LOC_KS_SciDef_evaReport_Norihc_SrfLanded = La superficie ghiacciata riflette la debole luce solare come se fosse fatta di cristallo. Il che, beh, il ghiaccio -è- una sorta di cristallo, quindi...
		#LOC_KS_SciDef_evaReport_Norihc_Flying = Normalmente sarebbe un'idea orribile, ma la sottile atmosfera di Norihc l'ha ridotta a una semplicemente terribile.
		#LOC_KS_SciDef_evaReport_Norihc_InSpaceLow = Ti ricorda un po' una versione più lucida di Eeloo. Le crepe che si incrociano sulla superficie di Norihc sono piuttosto belle.
		#LOC_KS_SciDef_evaReport_Norihc_InSpaceHigh = "Allora ehm, Controllo Missione, ricordami ancora... -come- si pronuncia quel nome? Ehm, ricevuto..."

		#LOC_KS_SciDef_mysteryGoo_Norihc_SrfLanded = Il Goo sta tremando. Non sembra molto amante del freddo.
		#LOC_KS_SciDef_mysteryGoo_Norihc_Flying = Il Goo forza di nuovo la chiusura della sua capsula, emettendo glorpi arrabbiati di protesta.
		#LOC_KS_SciDef_mysteryGoo_Norihc_InSpaceLow = Il Goo sta iniziando a pentirsi di essersi iscritto al programma spaziale.
		#LOC_KS_SciDef_mysteryGoo_Norihc_InSpaceHigh = Sondi il Goo per una risposta, ma è troppo preoccupato a guardare Simetra e Simeht orbitare l'uno attorno all'altro.

		#LOC_KS_SciDef_surfaceSample_Norihc_SrfLanded = Questo campione è per lo più ghiaccio d'acqua, con tracce di composti di tholin più scuri e rossi.
		#LOC_KS_SciDef_surfaceSample_Norihc_SrfLandedLowlands = Trovi un bel campione grigio-rossastro e lo porti per l'analisi. Apparentemente è composto per lo più di composti tholin incrostati di ghiaccio d'acqua, materia organica formatasi esponendo semplici composti di carbonio alle radiazioni solari. Interessante.

		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_SrfLanded = I materiali reagiscono come previsto alle pressioni più basse, ma poche reazioni chimiche sostanziali hanno luogo oltre a quelle.
		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_Flying = Il vento a bassa pressione fa poco per far volare i campioni più sciolti, ma alcuni volano ancora grazie alla depressurizzazione.
		#LOC_KS_SciDef_mobileMaterialsLab_Norihc_InSpace = Di nuovo questo. Si fermerà mai?

		#LOC_KS_SciDef_temperatureScan_Norihc_SrfLanded = Norihc in realtà non è così freddo come ci si potrebbe aspettare da un mondo di ghiaccio. Sembra che il sistema Simetra-Simeht riceva più luce solare di Jool, quindi una luna di ghiaccio sarà un po' più calda.
		#LOC_KS_SciDef_temperatureScan_Norihc_Flying = Accidenti, fa freddo. Forse non freddo come i mondi di ghiaccio più gelidi, ma piuttosto freddo.
		#LOC_KS_SciDef_temperatureScan_Norihc_InSpace = Due cose sono infinite: l'universo e la stupidità Kerbal; e non sono sicuro dell'universo.

		#LOC_KS_SciDef_barometerScan_Norihc_SrfLanded = Sulla superficie, la pressione è molto più alta. È circa un terzo della pressione di Duna, quindi è ancora piuttosto bassa.
		#LOC_KS_SciDef_barometerScan_Norihc_Flying = Lo strumento impiega un po' a registrare un valore, grazie alla pressione estremamente bassa. Pensava che stessi cercando di usarlo di nuovo nello spazio.
		#LOC_KS_SciDef_barometerScan_Norihc_InSpace = Il barometro sta facendo sciopero a causa delle cattive condizioni di lavoro.

		#LOC_KS_SciDef_seismicScan_Norihc_SrfLanded = Il sismometro registra un numero di piccoli terremoti, con l'attività che raggiunge un picco ogni volta che un pianeta passa direttamente sopra.

		#LOC_KS_SciDef_gravityScan_Norihc_SrfLanded = Le letture di gravità si riducono un po' quando Simetra o Simeht passano sopra, suggerendo l'effetto delle forze di marea sulla geologia di Norihc.
		#LOC_KS_SciDef_gravityScan_Norihc_InSpace = La presenza di numerosi corpi massicci nelle vicinanze crea un ambiente gravioli piuttosto complesso per il rivelatore da studiare.

		#LOC_KS_SciDef_atmosphereAnalysis_Norihc = La sottile atmosfera di Norihc consiste principalmente di azoto, con tracce di monossido di carbonio e altri gas.

		// Noyreg
		#LOC_KS_SciDef_crewReport_Noyreg_SrfLanded = I kerbonauti all'interno sono così ansiosi di lasciare il veicolo spaziale ed esplorare il nuovo mondo verde davanti a loro, che il Controllo Missione deve ricordare loro l'atmosfera orribilmente tossica e la pressione estrema. Con riluttanza, si mettono i caschi.
		#LOC_KS_SciDef_crewReport_Noyreg_FlyingLow = Il veicolo è investito da venti estremi, che minacciano di deviarlo dalla rotta e farlo schiantare su qualche scogliera vicina.
		#LOC_KS_SciDef_crewReport_Noyreg_FlyingHigh = Una misteriosa sostanza giallastra si condensa sui finestrini, ricordando all'equipaggio quanto sia inospitale Noyreg, nonostante il suo colore amichevole.
		#LOC_KS_SciDef_crewReport_Noyreg_InSpaceLow = "Possiamo atterrare qui?" Il kerbonauta sembra beatamente ignorare la natura tossica della luna sotto, spingendo il Controllo Missione a ricordarglielo gentilmente.
		#LOC_KS_SciDef_crewReport_Noyreg_InSpaceHigh = Un pianeta verde con una superficie vera? Abbiamo finalmente trovato la nostra nuova casa? Oh, 4,5 atmosfere di pressione eh? Sì... Forse no.

		#LOC_KS_SciDef_temperatureScan_Noyreg_SrfLanded = Le temperature variano drammaticamente sulla luna, da abbastanza freddo per congelare l'acqua ad abbastanza caldo per farla bollire, a seconda delle condizioni meteorologiche.
		#LOC_KS_SciDef_temperatureScan_Noyreg_SrfLandedIceCaps = Le calotte glaciali sono risparmiate dalla maggior parte del tumulto di Noyreg, sperimentando temperature costantemente gelide e velocità del vento relativamente calme.
		#LOC_KS_SciDef_temperatureScan_Noyreg_FlyingLow = L'atmosfera turbulenta inferiore di Noyreg contiene fronti in conflitto di atmosfera calda e fredda, che si scontrano ad alta velocità e provocano venti estremi nonostante la composizione molto densa.
		#LOC_KS_SciDef_temperatureScan_Noyreg_FlyingHigh = A quote così alte, le temperature altamente contrastanti si uniformano e Noyreg diventa quasi pacifico.
		#LOC_KS_SciDef_temperatureScan_Noyreg_InSpace = Conosci la definizione di follia?

		#LOC_KS_SciDef_evaReport_Noyreg_SrfLanded = Oh, è molto più... arancione di quanto ti aspettassi. Quale composizione interessante potrebbe essere responsabile di questo? Ossido di ferro, forse? O qualcosa di più esotico?
		#LOC_KS_SciDef_evaReport_Noyreg_FlyingLow = Oh oh. Non finirà bene.
		#LOC_KS_SciDef_evaReport_Noyreg_FlyingHigh = QUESTO È IL PIANO MIGLIORE.
		#LOC_KS_SciDef_evaReport_Noyreg_InSpaceLow = Sicuramente non può essere -così- male laggiù, vero? Voglio dire, è verde!
		#LOC_KS_SciDef_evaReport_Noyreg_InSpaceHigh = Ti ricorda Jool, ma molto più piccolo e probabilmente - si spera - meno assassino.

		#LOC_KS_SciDef_mysteryGoo_Noyreg_SrfLanded = Il Mystery Goo non sembra infastidito dall'atmosfera tossica o dalle temperature estreme. Sembra preoccuparsi solo del vento.
		#LOC_KS_SciDef_mysteryGoo_Noyreg_Flying = Il Goo è piuttosto affezionato al colore di Noyreg, ma preferirebbe davvero non essere esposto al maltempo.
		#LOC_KS_SciDef_mysteryGoo_Noyreg_InSpace = Il Goo "guarda" fuori dal suo contenitore la luna sotto con interesse.

		#LOC_KS_SciDef_surfaceSample_Noyreg_SrfLanded = La superficie arancione friabile di Noyreg sembra essere estremamente ricca di composti organici. Tipo... DAVVERO ricca. Manca sia di silicati che di metalli, il che suggerisce che Noyreg potrebbe essere composta per lo più di carbonio! Wow, è strano!
		#LOC_KS_SciDef_surfaceSample_Noyreg_SrfLandedIceCaps = Questa sostanza sembra essere idrocarburi a catena lunga congelati, piuttosto che ghiaccio d'acqua.

		#LOC_KS_SciDef_mobileMaterialsLab_SrfLanded = Un campione d'acqua inizia a formare clorite, indicando la presenza di molto biossido di cloro nell'atmosfera. 
		#LOC_KS_SciDef_mobileMaterialsLab_Flying = I venti forti spostano i campioni, schizzandone alcuni contro le pareti del contenitore.
		#LOC_KS_SciDef_mobileMaterialsLab_InSpace = Sospiro... Quando imparerai?

		#LOC_KS_SciDef_barometerScan_Noyreg_SrfLanded = La pressione indica circa 4,5 atmosfere. È parecchio, ma la grande distanza di Noyreg da Sunorc impedisce che diventi troppo caldo anche così.
		#LOC_KS_SciDef_barometerScan_Noyreg_FlyingLow = La lettura della pressione impenna improvvisamente quando una potente raffica soffia contro il sensore.
		#LOC_KS_SciDef_barometerScan_Noyreg_FlyingHigh = La pressione è un po' più alta nell'alta atmosfera a causa delle temperature più basse.
		#LOC_KS_SciDef_barometerScan_Noyreg_InSpace = Ancora una volta. Questo strumento. Non è. Abbastanza preciso. Per rilevare. Le esosfere! Per l'amore del Kraken, ragazzi!

		#LOC_KS_SciDef_seismicScan_Noyreg_SrfLanded = Le forze di marea dei due mondi massicci che orbitano nelle vicinanze hanno un effetto notevole sulla crosta di Noyreg, causando attività sismica che corrisponde agli avvicinamenti di entrambi i pianeti.

		#LOC_KS_SciDef_gravityScan_Noyreg_SrfLanded = La lettura aumenta leggermente ogni volta che Simetra o Simeht passano sopra, mostrando che Noyreg subisce molte forze di marea.
		#LOC_KS_SciDef_gravityScan_Noyreg_InSpace = Le letture di gravità fluttuano secondo le caratteristiche superficiali sotto; che purtroppo sono oscurate dalla spessa copertura nuvolosa.

		#LOC_KS_SciDef_magnetometer_Noyreg_InSpace = Le letture del magnetometro hanno rivelato schemi e fluttuazioni intricati, suggerendo la presenza di anomalie magnetiche e fenomeni geologici sottostanti. Noyreg, con la sua atmosfera insidiosa e i suoi misteri affascinanti, si ergeva come testimonianza delle meraviglie mozzafiato del cosmo.

		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_SrfLanded = L'atmosfera di Noyreg è composta principalmente di anidride carbonica, con quantità minori di azoto, biossido di cloro e tracce di altri gas (spesso orribilmente tossici). Non è ancora chiaro se il biossido di cloro sia responsabile del colore verde dell'atmosfera, o se sia coinvolto un effetto di rifrazione unico. Forse un po' della colonna A, un po' della colonna B?
		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_FlyingLow = L'analisi mostra che l'atmosfera di anidride carbonica di Noyreg si ispessisce considerevolmente a queste altitudini, ed è dove si trovano gas più pesanti come il biossido di cloro.
		#LOC_KS_SciDef_atmosphereAnalysis_Noyreg_FlyingHigh = Azoto e tracce di altri gas si trovano ad alte quote sopra Noyreg, ma la stragrande maggioranza è anidride carbonica.

		// Noi
		#LOC_KS_SciDef_crewReport_Noi_SrfLanded = Aspetta, fermati. Siamo atterrati? È ancora tutto nero fuori!
		#LOC_KS_SciDef_crewReport_Noi_InSpaceLow = Nnnnno. Non lo vedo.
		#LOC_KS_SciDef_crewReport_Noi_InSpaceHigh = L'equipaggio scopre che, strizzando gli occhi, si riesce appena a distinguere un asteroide che fluttua nelle vicinanze.

		#LOC_KS_SciDef_evaReport_Noi_SrfLanded = Per qualche motivo, nutri un'intensa avversione per le rocce furtive.
		#LOC_KS_SciDef_evaReport_Noi_InSpaceLow = È una buona cosa che questa roccia furtiva non sia da nessuna parte vicino a casa nostra. Se fosse in rotta di collisione, non la vedremmo mai arrivare!
		#LOC_KS_SciDef_evaReport_Noi_InSpaceHigh = Mentre guardi Noi, ti meravigli della bellezza semplice della sua superficie craterizzata. Il Controllo Missione ti informa gentilmente che in realtà non stai guardando Noi, e ti senti improvvisamente molto imbarazzato.

		#LOC_KS_SciDef_mysteryGoo_Noi_SrfLanded = Il Goo è sorpreso di scoprire che siamo effettivamente sulla superficie di qualcosa, e deve sbirciare fuori dal contenitore per diversi secondi per esserne sicuro.
		#LOC_KS_SciDef_mysteryGoo_Noi_InSpaceLow = Il Goo è brevemente terrorizzato all'idea che siamo stati improvvisamente teletrasportati proprio accanto a Kcalbeloh, poiché vede un enorme vuoto nero che copre il cielo. Ci vuole un po' per calmarlo e rassicurarlo che è solo Noi.
		#LOC_KS_SciDef_mysteryGoo_Noi_InSpaceHigh = Il Goo misterioso non riesce a vedere l'asteroide vicino. Potrebbe aver bisogno di aiuto per individuarlo.

		#LOC_KS_SciDef_surfaceSample_Noi_SrfLanded = Raccogli un pezzo di roccia particolarmente annerito e decidi che sarebbe un ottimo regalo di Khristmas per il membro della famiglia che ami di meno.

		#LOC_KS_SciDef_mobileMaterialsLab_Noi_SrfLanded = Sta diventando sempre più ovvio che questi campioni reagiscono allo stesso modo nel vuoto, indipendentemente dal fatto che siano sulla superficie di qualcosa o meno.
		#LOC_KS_SciDef_mobileMaterialsLab_Noi_InSpace = I materiali reagiscono più o meno allo stesso modo che nello spazio interplanetario.

		#LOC_KS_SciDef_temperatureScan_Noi_SrfLanded = Le scansioni della superficie di Noi rivelano che fa maledettamente freddo.
		#LOC_KS_SciDef_temperatureScan_Noi_InSpace = Forse un giorno controllerai la temperatura nello spazio e ti darà effettivamente dei dati. Fino ad allora, continuerai a battere la testa contro questo muro.

		#LOC_KS_SciDef_barometerScan_Noi_SrfLanded = Il barometro è per lo più confuso sul perché ti scomoderesti persino a controllarlo.
		#LOC_KS_SciDef_barometerScan_Noi_InSpace = Sì. Nessuna pressione... Sei sorpreso? Qualcuno lo è?

		#LOC_KS_SciDef_seismicScan_Noi_SrfLanded = Silenzio totale. Sembra che Noi sia troppo piccolo per ricevere persino impatti regolari.

		#LOC_KS_SciDef_gravityScan_Noi_SrfLanded = La gravità di Noi è marginalmente più forte sulla superficie che in orbita, ma è ancora praticamente nulla. Saltare in EVA qui sarebbe un'idea terribile.
		#LOC_KS_SciDef_gravityScan_Noi_InSpace = Il sensore di gravità è addormentato e deve essere svegliato per effettuare una lettura. La velocità orbitale qui è davvero bassa e la gravità fluttua selvaggiamente da quasi nulla a praticamente nulla a seconda di quale parte di Noi sia sotto.

		// Sistema Aralc
		#LOC_KS_SciDef_crewReport_AralcSystem_InSpaceHigh = Ti chiedi l'origine di questo sistema. Come hanno fatto esattamente due stelle ad avvicinarsi così tanto?
		#LOC_KS_SciDef_magnetometer_AralcSystem_InSpaceHigh = Lo strumento rileva potenti campi magnetici stellari, ma è probabile che questa lettura sia dominata dal molto più grande Aralc-A.
		#LOC_KS_SciDef_gravityScan_AralcSystem_InSpaceHigh = Nonostante i due corpi massicci al centro di questo sistema, il sensore mostra un valore quasi costante.

		// Aralc-A
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceLow = La luminosità pura di Aralc-A ti fa rimpiangere di non aver portato coperture per i finestrini. Non che farebbero qualcosa per il calore, comunque.
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceHigh1 = Questa è certamente una stella grande e luminosa.
		#LOC_KS_SciDef_crewReport_AralcA_InSpaceHigh2 = L'interno della capsula sarebbe un forno se non fosse per i radiatori... aspetta, ti sei ricordato di portare i pannelli radianti, vero?

		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceLow1 = Il termometro si è parzialmente fuso.
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceLow2 = Avevi davvero bisogno di un termometro per vedere quanto faceva caldo quaggiù?
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpaceHigh1 = Il termometro raggiunge il massimo a causa della vicinanza a questa stella massiccia.
		#LOC_KS_SciDef_temperatureScan_AralcA_InSpacehigh2 = Il termometro si è parzialmente fuso.

		#LOC_KS_SciDef_evaReport_AralcA_InSpaceLow = Perché pensavi che fare un'EVA così vicino a una stella così massiccia fosse una buona idea? Perché?
		#LOC_KS_SciDef_evaReport_AralcA_InSpaceHigh = Sei quasi accecato dalla luce intensa della stella massiccia.

		#LOC_KS_SciDef_mysteryGoo_AralcA_InSpaceLow = L'unità di contenimento del Goo brilla di calore e la dilatazione termica ha fatto bloccare il coperchio. Non sarebbe irragionevole supporre che il Goo sia stato ben arrostito.

		#LOC_KS_SciDef_mobileMaterialsLab_AralcA_InSpaceLow = L'interno del Laboratorio Mobile Materiali si è parzialmente fuso.
		#LOC_KS_SciDef_mobileMaterialsLab_AralcA_InSpaceHigh = I campioni stanno iniziando a brillare a causa del calore immenso, e alcuni mostrano segni di degradazione.

		#LOC_KS_SciDef_barometerScan_AralcA_InSpaceLow = Le temperature estreme fanno crepare il vetro del barometro.

		#LOC_KS_SciDef_gravityScan_AralcA_InSpaceLow = La massa pura della stella e la tua vicinanza ad essa quasi sopraffanno lo strumento.
		#LOC_KS_SciDef_gravityScan_AralcA_InSpaceHigh = Lo strumento rileva un'attrazione gravitazionale molto forte.

		#LOC_KS_SciDef_magnetometer_AralcA_InSpaceLow = Non sappiamo esattamente quanto siano potenti i campi magnetici di Aralc-A, ma sappiamo che erano abbastanza potenti da friggere lo strumento.
		#LOC_KS_SciDef_magnetometer_AralcA_InSpaceHigh = Lo strumento rileva forti campi magnetici, ma le letture non sono affidabili.

		//Anneheg
		#LOC_KS_SciDef_crewReport_Anneheg_SrfLanded = L'interno della capsula sta diventando molto molto caldo. Potresti cucinare uno spuntino sul pannello di controllo.
		#LOC_KS_SciDef_crewReport_Anneheg_SrfSplashed1 = È un miracolo che il veicolo non sia diventato uno con la lava. Ancora.
		#LOC_KS_SciDef_crewReport_Anneheg_SrfSplashed2 = Per l'amor del Kraken, perché pensavi che ammarare nella lava fosse una buona idea?
		#LOC_KS_SciDef_crewReport_Anneheg_InSpaceLow = Sta diventando sempre più caldo qui dentro. Ti sei ricordato di portare abbastanza radiatori?
		#LOC_KS_SciDef_crewReport_Anneheg_InSpaceHigh = Sta iniziando a fare caldo qui dentro.

		#LOC_KS_SciDef_temperatureScan_Anneheg_SrfLanded = Le letture del termometro sono fuori scala. Anche la colorazione del termometro è sbiadita significativamente.
		#LOC_KS_SciDef_temperatureScan_Anneheg_SrfSplashed1 = Il termometro raggiunge istantaneamente il massimo prima di fondersi e diventare uno con la lava.
		#LOC_KS_SciDef_temperatureScan_Anneheg_SrfSplashed2 = Questo è un crimine contro i termometri e lo sai. Purtroppo è troppo tardi per rimediare alle tue azioni, poiché il termometro è diventato uno con la lava.
		#LOC_KS_SciDef_temperatureScan_Anneheg_SrfSplashed3 = Mentre lo strumento si fonde, ti rendi conto molto rapidamente che portare il termometro era inutile.
		#LOC_KS_SciDef_temperatureScan_Anneheg_InSpaceLow = Il termometro si sta avvicinando al valore massimo che può misurare.
		#LOC_KS_SciDef_temperatureScan_Anneheg_InSpaceHigh = Il termometro inizia a salire.

		#LOC_KS_SciDef_evaReport_Anneheg_SrfLanded1 = Mentre il sistema di raffreddamento della tuta fatica a tenere il passo con il calore, noti gli strani pilastri e torri che punteggiano la superficie.
		#LOC_KS_SciDef_evaReport_Anneheg_SrfLanded2 = Potresti facilmente friggere uno spuntino sulla superficie di questo pianeta. Non dico che dovresti. Dico solo che potresti.
		#LOC_KS_SciDef_evaReport_Anneheg_SrfLanded_Lava = Non mi metterò nemmeno a discutere sul perché pensi che sia una buona idea.
		#LOC_KS_SciDef_evaReport_Anneheg_SrfSplashed1 = ESCI! DALLA! LAVA!
		#LOC_KS_SciDef_evaReport_Anneheg_SrfSplashed2 = Quale Kraken ti ha posseduto per farti pensare che fare una nuotata nella lava fosse una buona idea?
		#LOC_KS_SciDef_evaReport_Anneheg_InSpaceLow = Fa MOLTO caldo qui fuori. Meglio tornare dentro.
		#LOC_KS_SciDef_evaReport_Anneheg_InSpaceHigh = Sei quasi accecato dalla luce intensa proveniente da Aralc-A.

		#LOC_KS_SciDef_mysteryGoo_Anneheg_SrfLanded = Il Goo è stato ben arrostito. Anche l'interno dell'unità di contenimento brilla di rosso.
		#LOC_KS_SciDef_mysteryGoo_Anneheg_SrfSplashed1 = Il Goo si vaporizza istantaneamente a causa del calore immenso.
		#LOC_KS_SciDef_mysteryGoo_Anneheg_SrfSplashed2 = Il Goo accetta il suo destino di diventare uno con la lava.
		#LOC_KS_SciDef_mysteryGoo_Anneheg_InSpaceLow = Il Goo mostra segni di estesi danni da calore.
		#LOC_KS_SciDef_mysteryGoo_Anneheg_InSpaceHigh = Il Goo mostra segni di danni da calore.

		#LOC_KS_SciDef_Anneheg_surfaceSample_SrfLanded = La superficie di Anneheg sembra essere un miscuglio di vetro vulcanico e metalli pesanti resistenti al calore.
		#LOC_KS_SciDef_surfaceSample_Anneheg_SrfLanded_Lava = Il guanto inizia a fondersi mentre tenti di prelevare un campione di lava.
		#LOC_KS_SciDef_surfaceSample_Anneheg_SrfSplashed = Mentre la tuta inizia a fondersi, ti rendi conto molto rapidamente che prelevare un campione di lava letterale probabilmente non è la migliore idea.

		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_SrfLanded = L'interno della sonda materiali ha subito una parziale fusione.
		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_SrfSplashed1 = La sonda materiali si è fusa e si è trasformata in un disastro irriconoscibile. Il KSC non sarà contento di quello che hai fatto a questa cosa.
		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_SrfSplashed2 = Perché stai persino guardando qui dentro? NON. C'È. PIÙ. NULLA. DA. STUDIARE.
		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_InSpaceLow = Diversi campioni si sono degradati a causa del calore intenso. Anche l'unità stessa mostra segni di danni legati al calore.
		#LOC_KS_SciDef_mobileMaterialsLab_Anneheg_InSpaceHigh = I campioni brillano di calore.

		#LOC_KS_SciDef_barometerScan_Anneheg_SrfLanded = Nonostante il pianeta non abbia atmosfera, le letture del barometro sono andate fuori scala a causa del calore immenso.
		#LOC_KS_SciDef_barometerScan_Anneheg_SrfSplashed1 = Nonostante non sia stato esposto all'aria, la garanzia di questo dispositivo è stata annullata a causa della tua imprudenza.
		#LOC_KS_SciDef_barometerScan_Anneheg_SrfSplashed2 = Il vetro del barometro si è frantumato a causa del calore immenso.

		#LOC_KS_SciDef_seismicScan_Anneheg_SrfLanded = L'accelerometro si è cortocircuitato a causa del calore e non è più funzionale.

		#LOC_KS_SciDef_gravityScan_Anneheg_SrfLanded = Mentre il sensore di gravità si riscalda, si cortocircuita e le sue letture vanno fuori scala.
		#LOC_KS_SciDef_gravityScan_Anneheg_InSpaceLow = Puoi ottenere una lettura più precisa delle forze gravitazionali avvicinandoti al pianeta, anche se il calore intenso rende le letture inaffidabili.
		#LOC_KS_SciDef_gravityScan_Anneheg_InSpaceHigh = Le forze di marea della vicina Aralc-A falsano le letture del sensore di gravità.

		#LOC_KS_SciDef_magnetometer_Anneheg_InSpaceLow = Poco prima che l'asta si frigga, sei riuscito a effettuare una breve misurazione del debole campo magnetico di Anneheg, anche se se questa lettura sia solo rumore da Aralc-A è una congettura.
		#LOC_KS_SciDef_magnetometer_Anneheg_InSpaceHigh = L'intensa radiazione da Aralc-A ha fritto l'asta del magnetometro.


		// Aralc-B
		#LOC_KS_SciDef_crewReport_AralcB_InSpaceLow = La luce proveniente da Aralc-B non è nemmeno lontanamente accecante come quella del suo compagno molto più grande, ma sarebbe comunque imprudente guardarla direttamente.
		#LOC_KS_SciDef_crewReport_AralcB_InSpaceHigh = Sta facendo caldo qui dentro, ma non è così male come avevamo previsto.

		#LOC_KS_SciDef_temperatureScan_AralcB_InSpaceLow = Il termometro ha raggiunto il massimo. Avvicinarsi così tanto persino a una stella relativamente piccola è imprudente.

		#LOC_KS_SciDef_evaReport_AralcB_InSpaceLow = Sei quasi accecato dalla luce intensa dell'essere così vicino a una stella.

		#LOC_KS_SciDef_mysteryGoo_AralcB_InSpaceLow = L'unità di contenimento del Goo è calda al tatto. Uno sguardo all'interno rivela che il Goo sta arrostendo.

		#LOC_KS_SciDef_mobileMaterialsLab_AralcB_InSpaceLow = I campioni stanno iniziando a brillare a causa del calore immenso, e alcuni mostrano segni di degradazione.
		#LOC_KS_SciDef_mobileMaterialsLab_AralcB_InSpaceHigh = I campioni sono caldi al tatto. Sono comunque ancora intatti.

		#LOC_KS_SciDef_magnetometer_AralcB_InSpaceLow = Essere vicino ad Aralc-B ti permette di ottenere una lettura molto più precisa dei suoi campi magnetici. Sono piuttosto forti, ma è quello che ci si aspetta da una stella di sequenza principale.
		#LOC_KS_SciDef_magnetometer_AralcB_InSpaceHigh = Lo strumento rileva un campo magnetico molto forte, ma questo potrebbe essere dovuto all'influenza della vicina Aralc-A.

		// Arorua
		#LOC_KS_SciDef_crewReport_Arorua_SrfLanded = Wow, fa caldo quaggiù. Potresti cucinare uno spuntino sul pannello di controllo!
		#LOC_KS_SciDef_crewReport_Arorua_Flying = Ammiri la bellezza accidentata della superficie di Arorua, ignorando gli stridenti avvisi di temperatura nel tuo veicolo.
		#LOC_KS_SciDef_crewReport_Arorua_InSpaceLow = I tuoi occhi sono attratti dalla bella aurora che avvolge quasi l'intero pianeta.
		#LOC_KS_SciDef_crewReport_Arorua_InSpaceHigh = Sei quasi accecato dalla luce delle due stelle Aralc, ma riesci a distinguere il grande masso sferico che è Arorua.

		#LOC_KS_SciDef_temperatureScan_Arorua_SrfLanded = Le temperature superficiali oscillano tra rovente e *morte* in base alla posizione di Aralc-A nel cielo.
		#LOC_KS_SciDef_temperatureScan_Arorua_SrfLanded_Substellar = Il termometro ti lancia un'occhiata mortale e si spegne.
		#LOC_KS_SciDef_temperatureScan_Arorua_FlyingLow = Le letture della temperatura nella bassa atmosfera ti fanno cadere la mascella. Fa C A L D O quaggiù!
		#LOC_KS_SciDef_temperatureScan_Arorua_FlyingHigh = Anche solo sfiorare l'alta atmosfera fa impennare il termometro.
		#LOC_KS_SciDef_temperatureScan_Arorua_InSpace = Il semplice esistere così vicino al centro del Sistema Aralc fa iniziare a salire le letture della temperatura.

		#LOC_KS_SciDef_evaReport_Arorua_SrfLanded = Fa C A L D O qui fuori! Perché abbiamo scelto di atterrare qui?
		#LOC_KS_SciDef_evaReport_Arorua_SrfLanded_Substellar = CALDO! CALDO! FA COSÌ CALDO QUI FUORI! LASCIATEMI RIENTRARE!
		#LOC_KS_SciDef_evaReport_Arorua_Flying = Sei davvero pazzo a pensare che uscire adesso sia una buona idea!
		#LOC_KS_SciDef_evaReport_Arorua_InSpaceLow = È così bello. Se solo non fosse così vicino a una stella.
		#LOC_KS_SciDef_evaReport_Arorua_InSpaceHigh = La tua attenzione è attratta dalla lunga coda che si stacca da Arorua.

		#LOC_KS_SciDef_mysteryGoo_Arorua_SrfLanded = Riesci a forzare l'apertura del coperchio del contenitore del Goo. Il contenitore è pieno di fuliggine e cenere, con il Goo introvabile.
		#LOC_KS_SciDef_mysteryGoo_Arorua_FlyingLow = La dilatazione termica ha fatto bloccare il coperchio del contenitore del Goo in posizione chiusa. In ogni caso, il Goo sta arrostendo.
		#LOC_KS_SciDef_mysteryGoo_Arorua_FlyingHigh = Il Goo rimbalza nel suo contenitore in una frenesia panica.
		#LOC_KS_SciDef_mysteryGoo_Arorua_InSpace = Il contenitore del Goo si sta riscaldando. Il Goo non sembra molto a suo agio lì dentro.

		#LOC_KS_SciDef_surfaceSample_Arorua_SrfLanded = Raccogli un campione della superficie di Arorua. Puoi sentire il calore del campione anche attraverso il guanto pesantemente isolato.

		#LOC_KS_SciDef_mobileMaterialsLab_Arorua_SrfLanded = Esporre i campioni all'atmosfera di Arorua è stato un errore. Almeno uno dei campioni sembra aver *detonato* nella sonda materiali, trasformando l'interno dell'unità in un disastro di metallo e fili carbonizzati.
		#LOC_KS_SciDef_mobileMaterialsLab_Arorua_Flying = I campioni hanno iniziato a combustione spontanea dopo aver reagito con qualunque cosa ci sia nell'atmosfera di Arorua.
		#LOC_KS_SciDef_mobileMaterialsLab_Arorua_InSpace = I campioni mostrano segni di degradazione a causa del calore da Aralc-B.

		#LOC_KS_SciDef_barometerScan_Arorua_SrfLanded = Il vetro del barometro si è crepato a causa del calore, rendendo il dispositivo inoperativo e annullando la garanzia.
		#LOC_KS_SciDef_barometerScan_Arorua_FlyingLow = Il barometro in qualche modo legge una pressione *negativa* a causa del surriscaldamento.
		#LOC_KS_SciDef_barometerScan_Arorua_FlyingHigh = Anche a questa altezza, le letture del barometro iniziano a impennarsi, anche se le letture inaccurate precedenti ci portano a mettere in dubbio l'accuratezza di quei picchi.
		#LOC_KS_SciDef_barometerScan_Arorua_InSpace = Il barometro inizia a dare letture inaccurate a causa del calore da Aralc-B

		#LOC_KS_SciDef_seismicScan_Arorua_SrfLanded = Il sensore sismico si spegne automaticamente a causa del calore. Meglio portare quella cosa dentro.

		#LOC_KS_SciDef_gravityScan_Arorua_SrfLanded = Le letture del sensore di gravità diventano inaccurate a causa del calore.
		#LOC_KS_SciDef_gravityScan_Arorua_InSpace = Il sensore di gravità rileva piccole variazioni nella gravità locale di Arorua mentre gira intorno al pianeta e mentre Arorua si muove intorno ad Aralc-B.

		#LOC_KS_SciDef_magnetometer_Arorua_InSpace = Il magnetometro rileva grandi quantità di particelle cariche provenienti da Aralc-B, che erodono l'atmosfera di Arorua.

		#LOC_KS_SciDef_atmosphereAnalysis_Arorua_SrfLanded = L'analizzatore atmosferico si surriscalda e si spegne.
		#LOC_KS_SciDef_atmosphereAnalysis_Arorua_FlyingLow = L'analizzatore atmosferico può effettuare letture più precise nella bassa atmosfera. L'atmosfera è densa e composta da composti esotici, probabilmente un prodotto dell'essere costantemente cotta da due soli.
		#LOC_KS_SciDef_atmosphereAnalysis_Arorua_FlyingHigh = L'analizzatore atmosferico emette letture selvagge a causa del flusso costante di particelle cariche da Aralc-B.

		// Ahtpan
		#LOC_KS_SciDef_crewReport_Ahtpan_SrfLanded1 = L'interno del veicolo puzza di naftalina. Chi ha lasciato il portello aperto troppo a lungo?
		#LOC_KS_SciDef_crewReport_Ahtpan_SrfLanded2 = Vedi tempeste di polvere all'orizzonte. Almeno siamo al sicuro dentro questo veicolo.
		#LOC_KS_SciDef_crewReport_Ahtpan_SrfSplashed = La nave è ora coperta di quello che è fondamentalmente cherosene. Sarebbe molto più preoccupante se ci fosse ossigeno nell'atmosfera.
		#LOC_KS_SciDef_crewReport_Ahtpan_FlyingLow = Sembra decisamente abbastanza polveroso quaggiù.
		#LOC_KS_SciDef_crewReport_Ahtpan_FlyingLow_NaphthanOceans = Ti consoli al pensiero che se finisci il carburante, almeno puoi atterrare in un vero oceano di carburante.
		#LOC_KS_SciDef_crewReport_Ahtpan_InSpace = Il pianeta sotto sembra molto desertico.

		#LOC_KS_SciDef_temperatureScan_Ahtpan_SrfLanded = Fa caldo qui, ma non è nulla che non si possa gestire.
		#LOC_KS_SciDef_temperatureScan_Ahtpan_SrfLanded_Islands = Le temperature superficiali sono superiori al punto di infiammabilità del cherosene. A causa delle alte concentrazioni di idrocarburi nell'aria, controlla il tuo veicolo per assicurarti che non ci siano perdite di ossidante, poiché potrebbe rappresentare un enorme rischio di incendio. 
		#LOC_KS_SciDef_temperatureScan_Ahtpan_SrfLanded_Coast = Le temperature superficiali sono superiori al punto di infiammabilità del cherosene. A causa delle alte concentrazioni di idrocarburi nell'aria, controlla il tuo veicolo per assicurarti che non ci siano perdite di ossidante, poiché potrebbe rappresentare un enorme rischio di incendio. 
		#LOC_KS_SciDef_temperatureScan_Ahtpan_SrfSplashed = L'olio rende difficile leggere il termometro.
		#LOC_KS_SciDef_temperatureScan_Ahtpan_FlyingLow = Sta facendo abbastanza caldo là fuori.
		#LOC_KS_SciDef_temperatureScan_Ahtpan_FlyingHigh = Anche a questa altitudine, sta già facendo un po' caldo.
		#LOC_KS_SciDef_temperatureScan_Ahtpan_InSpace = La vicinanza del pianeta alle due stelle lo rende piuttosto caldo anche nello spazio.

		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded = Vedi una tempesta di polvere avvicinarsi. Sarebbe una buona idea tornare dentro.
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded_Islands = Sarebbe un ottimo posto per installare una piattaforma petroli- Scusa, cosa stavi dicendo?
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded_Coast = Sarebbe un ottimo posto per installare una piattaforma petroli- Scusa, cosa stavi dicendo?
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded_NaphthanOceans1 = Non raccomanderei di provare a nuotare lì dentro.
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfLanded_NaphthanOceans2 = Sei pieno di eccitazione al pensiero di un oceano di oro nero... e poi ti rendi conto che devi effettivamente portare questa roba a casa per trarne un qualche profitto.
		#LOC_KS_SciDef_evaReport_Ahtpan_SrfSplashed = Fai fatica a nuotare nell'olio denso che compone gli oceani di Ahtpan.
		#LOC_KS_SciDef_evaReport_Ahtpan_Flying = Ehi, credo di vedere una tempesta di polvere in lontananza!
		#LOC_KS_SciDef_evaReport_Ahtpan_InSpace = Ti prendi un momento per ammirare le viste sotto di te e le viste dei due soli in lontananza.
		#LOC_KS_SciDef_evaReport_Ahtpan_InSpaceLow_NaphthanOceans = Ehi, pensi che quello sia petrolio sotto di noi?

		#LOC_KS_SciDef_mysteryGoo_Ahtpan_SrfLanded = Il Goo sembra nutrirsi degli idrocarburi nell'aria.
		#LOC_KS_SciDef_mysteryGoo_Ahtpan_SrfSplashed = Il Goo è stato ricoperto di nero dall'oceano di petrolio.
		#LOC_KS_SciDef_mysteryGoo_Ahtpan_InSpaceLow = Sembra che il Goo voglia atterrare qui per visitare la famiglia.
		#LOC_KS_SciDef_mysteryGoo_Ahtpan_InSpaceHigh = Il Goo sembra provare una sorta di affinità con l'oceano organico.

		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfLanded = Il terreno è abbastanza sabbioso. Molto reminiscente dei deserti su Kerbin.
		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfLanded_Coast = Il campione di superficie contiene tracce di una sostanza simile al cherosene.
		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfLanded_NaphthanOceans1 = Il tuo guanto è ora coperto di una sostanza simile al cherosene. Sembra che potrebbe essere una buona fonte di carburante.
		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfLanded_NaphthanOceans2 = Sembrerebbe che gli oceani di Ahtpan siano fatti di oro ner- scusa, petrolio.
		#LOC_KS_SciDef_surfaceSample_Ahtpan_SrfSplashed = La tua tuta è ricoperta della sostanza simile al cherosene che compone gli oceani di Ahtpan. Ci vorrà un po' per pulirla.

		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_SrfLanded = I campioni reagiscono con i vapori di idrocarburi nell'aria.
		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_SrfLanded_Coast = Alcuni campioni sembrano aver preso fuoco spontaneamente dopo aver reagito con le alte concentrazioni di vapori di idrocarburi nell'atmosfera.
		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_SrfSplashed = L'interno della Scientifica Jr. è ora coperto di olio. Non raccomanderei di tentare di pulire l'unità bruciando l'olio.
		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_FlyingLow = I campioni reagiscono con i vapori di idrocarburi nell'aria.
		#LOC_KS_SciDef_mobileMaterialsLab_Ahtpan_InSpace = Nonostante l'evidente interesse di questo pianeta, i materiali non reagiscono alla situazione.

		#LOC_KS_SciDef_barometerScan_Ahtpan_SrfSplashed = L'olio ostruisce le porte del barometro, rendendolo inutile.
		#LOC_KS_SciDef_barometerScan_Ahtpan_SrfLanded = Il barometro registra una pressione atmosferica decisamente molto più alta di Duna, ma significativamente più bassa di Kerbin. Il volo a motore potrebbe essere difficile.
		#LOC_KS_SciDef_barometerScan_Ahtpan_Flying = Il barometro si sta lentamente intasando per gli idrocarburi nell'aria.
		#LOC_KS_SciDef_barometerScan_Ahtpan_InSpace = Lo strumento, in un atto di sfida, decide di insistere che la pressione è attualmente 999999999 kPa.

		#LOC_KS_SciDef_seismicScan_Ahtpan_SrfLanded = Profondi brontolii lontani vengono captati dal sismografo. Sembra che l'interno di Ahtpan sia ancora attivo!

		#LOC_KS_SciDef_gravityScan_Ahtpan_SrfLanded = La gravità su Ahtpan è sul lato basso; è circa la media per un pianeta terrestre.
		#LOC_KS_SciDef_gravityScan_Ahtpan_InSpaceLow = Le letture fluttuano un po' mentre il sensore passa su varie formazioni superficiali, ma è difficile concentrarsi su quello quando stai sognando ad occhi aperti di tutti i soldi che guadagnerai con questi oceani di petrolio!
		#LOC_KS_SciDef_gravityScan_Ahtpan_InSpaceLow_NaphthanOceans = Le letture del sensore sembrano cambiare leggermente mentre passiamo sopra gli oceani sotto di noi.
		#LOC_KS_SciDef_gravityScan_Ahtpan_InSpaceHigh = Le letture di gravità dal sensore di gravità suggeriscono un pianeta di medie dimensioni sotto.

		#LOC_KS_SciDef_magnetometer_Ahtpan_InSpaceLow = L'asta rileva un campo magnetico moderatamente forte, probabilmente abbastanza per usare una bussola con una certa affidabilità. È possibile che sia questo a permettere all'atmosfera di esistere senza essere erosa dai venti stellari delle due stelle.
		#LOC_KS_SciDef_magnetometer_Ahtpan_InSpaceHigh = L'asta rileva un campo magnetico, ma è difficile dire se provenga dal pianeta sotto o sia solo rumore delle due stelle.

		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_SrfLanded = L'analizzatore atmosferico rileva concentrazioni moderate di vapori di idrocarburi, che è probabilmente ciò che dà a questo posto l'odore distintivo di naftalina.
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_SrfLanded_Islands = L'analizzatore atmosferico rileva alte concentrazioni di vapori di idrocarburi nell'atmosfera, probabilmente perché c'è un vero oceano di idrocarburi proprio accanto a noi.
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_SrfLanded_Coast = L'analizzatore atmosferico rileva alte concentrazioni di vapori di idrocarburi nell'atmosfera, probabilmente perché c'è un vero oceano di idrocarburi proprio accanto a noi.
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_FlyingLow = L'analisi della bassa atmosfera rivela basse concentrazioni di vapori di idrocarburi.
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_FlyingLow_NaphthanOceans = Le letture dell'analizzatore atmosferico indicano alte concentrazioni di vapori di idrocarburi, forse perché c'è un vero oceano di petrolio sotto di noi.
		#LOC_KS_SciDef_atmosphereAnalysis_Ahtpan_FlyingHigh = L'analisi dell'alta atmosfera rivela basse concentrazioni di vapori di idrocarburi.


		// Anehta
		#LOC_KS_SciDef_crewReport_Anehta_FlyingLow = "Abbiamo imballato le eliche?" L'equipaggio ha dimenticato a causa dello stress.
		#LOC_KS_SciDef_crewReport_Anehta_FlyingHigh = L'equipaggio è calmo, fiducioso nella tua manovra di aerofrenata calcolata con precisione. L'HAI calcolata, vero?
		#LOC_KS_SciDef_crewReport_Anehta_InSpaceLow = Ok, ci stiamo avvicinando un po' troppo per comodità, Anehta...
		#LOC_KS_SciDef_crewReport_Anehta_InSpaceHigh = Il Controllo Missione nega la richiesta dell'equipaggio di volare attraverso gli anelli.

		#LOC_KS_SciDef_evaReport_Anehta_FlyingLow = Hai avuto idee migliori.
		#LOC_KS_SciDef_evaReport_Anehta_FlyingHigh = Chi ha autorizzato questo?!
		#LOC_KS_SciDef_evaReport_Anehta_InSpaceLow = Chiudi gli occhi e ti rendi conto che puoi ancora vedere le stelle. Forse dovresti tornare dentro.
		#LOC_KS_SciDef_evaReport_Anehta_InSpaceHigh = "Sai, canterei una canzone, ma 'Il pianeta Anehta è blu, e non c'è nulla che possa fare' non scorre davvero bene ritmicamente."

		#LOC_KS_SciDef_mysteryGoo_Anehta_FlyingLow = Il Goo è diventato blu, o è solo l'illuminazione?
		#LOC_KS_SciDef_mysteryGoo_Anehta_FlyingHigh = Il Mystery Goo è preoccupato di non tornare a casa.
		#LOC_KS_SciDef_mysteryGoo_Anehta_InSpaceLow = Il Goo si è formato in due masse separate; una grande sfera centrale e un insieme di anelli che la circondano.
		#LOC_KS_SciDef_mysteryGoo_Anehta_InSpaceHigh = Il Goo sembra essere interessato a Efil.

		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_FlyingLow = Il laboratorio materiali è già stato schiacciato dalla pressione e non può aprirsi correttamente.
		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_FlyingHigh = I venti potenti, la pressione crescente e le temperature che cambiano rapidamente fanno un disastro della sonda campioni.
		#LOC_KS_SciDef_mobileMaterialsLab_Anehta_InSpace = L'ambiente ad alta radiazione ha fatto brillare alcuni campioni. Sembrerebbe divertente dipingere il razzo con... Aspetta. Hai appena avuto un déjà vu?

		#LOC_KS_SciDef_temperatureScan_Anehta_FlyingLow = Non esiste davvero una cosa come un gigante gassoso freddo, vero?
		#LOC_KS_SciDef_temperatureScan_Anehta_FlyingHigh = L'alta atmosfera inizia fredda, poi diventa DAVVERO fredda. Probabilmente diventerà molto più calda abbastanza presto a meno che tu non smetta di cadere.
		#LOC_KS_SciDef_temperatureScan_Anehta_InSpace = Brillante. Quale piano geniale inventerai dopo?

		#LOC_KS_SciDef_barometerScan_Anehta_FlyingLow = Il barometro è miracolosamente sopravvissuto alla pressione estrema. Tuttavia, ora pensa di essere sommerso in un liquido e raccomanda di acquistare un PresMat Sensore di Pressione Sottomarina (tm).
		#LOC_KS_SciDef_barometerScan_Anehta_FlyingHigh = La pressione aumenta rapidamente con la diminuzione dell'altitudine. Questo sembrerebbe suggerire che Anehta sia una sorta di mondo gigantesco a base di gas - un "Colosso Atmosferico", se vuoi.
		#LOC_KS_SciDef_barometerScan_Anehta_InSpace = Forse un giorno presto funzionerà.

		#LOC_KS_SciDef_gravityScan_Anehta_InSpaceLow = Sono un sacco di gravioli, ma il buco nero vicino (relativamente parlando) sta fornendo ad Anehta una forte concorrenza. Ti chiedi se il pianeta si senta insicuro per questo.
		#LOC_KS_SciDef_gravityScan_Anehta_InSpaceHigh = Le numerose lune di Anehta generano le proprie letture di gravità, anche se nessuna eguaglia la pura potenza della forte attrazione di Anehta.

		#LOC_KS_SciDef_atmosphereAnalysis_Anehta_FlyingLow = Il vapore acqueo è diventato meno comune nei mazzi nuvolosi inferiori man mano che l'atmosfera si ispessisce.
		#LOC_KS_SciDef_atmosphereAnalysis_Anehta_FlyingHigh = Oltre all'idrogeno e all'elio attesi, il vapore acqueo è molto abbondante qui. Questo farebbe di Anehta un gigante gassoso di Classe II secondo il sistema Sudarskerb.

		#LOC_KS_SciDef_magnetometer_Anehta_InSpaceLow = Le letture del magnetometro dall'orbita bassa di Anehta nello spazio hanno rivelato schemi di campo magnetico complessi e dinamici. Il campo magnetico del pianeta mostrava variazioni significative di intensità e direzione, con le fasce e zone più scure della copertura nuvolosa perpetua che mostravano maggiore attività magnetica.
		#LOC_KS_SciDef_magnetometer_Anehta_InSpaceHigh = A differenza della natura turbolenta e fluttuante del campo magnetico osservato nell'orbita bassa, il campo magnetico nella regione di alta quota sembrava relativamente stabile, con intensità e direzione costanti. Anche il sistema di anelli planetari mostrava fluttuazioni magnetiche minime in questa regione, suggerendo un ambiente magnetico più coerente e organizzato.

		// Enots
		#LOC_KS_SciDef_crewReport_Enots_SrfLanded = Il terreno qui è molto roccioso. È possibile che questa roccia sia fatta di un nucleo esposto coperto da strati di detriti degli anelli.
		#LOC_KS_SciDef_crewReport_Enots_InSpaceLow = I detriti degli anelli non dovrebbero essere un problema qui. Ora viene il problema di atterrare sulla superficie rocciosa.
		#LOC_KS_SciDef_crewReport_Enots_InSpaceHigh = L'oggetto sembra molto piccolo rispetto ad Anehta. Dovremmo usare cautela e cercare di evitare di colpire i detriti degli anelli.

		#LOC_KS_SciDef_temperatureScan_Enots_SrfLanded = Enots è piuttosto caldo sul lato diurno. Anehta può essere un gigante gassoso, ma riceve circa tanto sole quanto Kerbin.
		#LOC_KS_SciDef_temperatureScan_Enots_InSpace = Pensi che sia divertente?

		#LOC_KS_SciDef_evaReport_Enots_SrfLanded = Alzi lo sguardo e vedi Anehta. Occupa un enorme pezzo di cielo sopra di te e mostra quanto sei minuscolo in questo universo.
		#LOC_KS_SciDef_evaReport_Enots_InSpaceLow = Capitano, sei sicuro che dovremmo essere qui fuori?
		#LOC_KS_SciDef_evaReport_Enots_InSpaceHigh = Questa è una situazione precaria e dovresti stare attento.

		#LOC_KS_SciDef_mysteryGoo_Enots_SrfLanded = Il Goo sembra abbastanza a suo agio sulla superficie di Enots.
		#LOC_KS_SciDef_mysteryGoo_Enots_InSpaceLow = Il Goo sembra insolitamente attratto dalla superficie di Enots. Si spera che questo non influenzi la nostra orbita.
		#LOC_KS_SciDef_mysteryGoo_Enots_InSpaceHigh = Il Goo mostra un comportamento erratico intorno a Enots. Dobbiamo indagare ulteriormente.

		#LOC_KS_SciDef_surfaceSample_Enots_SrfLanded = La superficie è abbastanza polverosa e rocciosa. Scavando più a fondo, tuttavia, colpisci un muro di ferro solido.

		#LOC_KS_SciDef_mobileMaterialsLab_Enots_SrfLanded = Essendo un piccolo sassolino senza aria, Enots non ha un effetto diverso sui materiali.
		#LOC_KS_SciDef_mobileMaterialsLab_Enots_InSpaceLow = Cosa pensi TU che stiano facendo i materiali? È probabilmente più interessante di qualunque cosa stia realmente succedendo lì dentro.
		#LOC_KS_SciDef_mobileMaterialsLab_Enots_InSpaceHigh = I materiali sembrano brillare di blu. Poi ti rendi conto che è solo luce riflessa da Anehta.

		#LOC_KS_SciDef_barometerScan_Enots_SrfLanded = Secondo i tuoi calcoli, questo era molto probabilmente uno spreco di Fondi.
		#LOC_KS_SciDef_barometerScan_Enots_InSpace = In un certo senso cosmico, sì.

		#LOC_KS_SciDef_gravityScan_Enots_SrfLanded = La gravità superficiale qui è molto bassa. Cerca di non cadere, o piuttosto, di saltare via.
		#LOC_KS_SciDef_gravityScan_Enots_InSpaceLow = Lo scanner di gravità è ora più concentrato su Enots. Tuttavia, le letture non spiegano ancora il Goo che impazzisce.
		#LOC_KS_SciDef_gravityScan_Enots_InSpaceHigh = Il sensore oscilla tra Enots e Anehta. Non è così male come nella spedizione Tot, però.

		#LOC_KS_SciDef_seismicScan_Enots_SrfLanded = Lo scanner sismico non rileva alcuna attività oltre a minuscoli impatti di micrometeoriti.


		// Efil
		#LOC_KS_SciDef_crewReport_Efil_SrfLanded = Appena siamo atterrati su Efil, siamo stati colpiti dalla bellezza del paesaggio di Efil. L'aria era densa e umida, e le ricche tonalità della flora e della fauna hanno creato un arazzo vibrante che si estendeva a perdita d'occhio. Le spiagge erano coperte di sabbia bianca scintillante e le acque oceaniche erano cristalline. Abbiamo anche osservato alcune affascinanti creature bioluminescenti che brillavano magnificamente nel buio.
		#LOC_KS_SciDef_crewReport_Efil_SrfSplashed = Il veicolo spaziale è ammarato in una laguna cristallina e l'equipaggio ha avuto l'opportunità di esplorare il mondo sottomarino. La vita marina era diversa e colorata, e l'equipaggio ha condotto vari esperimenti per saperne di più sull'ecosistema del pianeta.
		#LOC_KS_SciDef_crewReport_Efil_FlyingLow = Mentre scendevamo ulteriormente nella bassa atmosfera di Efil, siamo stati affascinati dai panorami mozzafiato che si dispiegavano davanti ai nostri occhi. L'atmosfera era piena di colori vivaci e l'aria pullulava di vita. Ci siamo meravigliati delle splendide spiagge con le loro acque scintillanti e delle foreste dense con il loro fogliame verde lussureggiante.
		#LOC_KS_SciDef_crewReport_Efil_FlyingHigh = L'alta atmosfera di Efil sembra sottile e limpida. Scendendo nell'alta atmosfera di Efil, siamo stati accolti dai colori mozzafiato e dalla bellezza naturale del pianeta. Le foreste lussureggianti e gli oceani cristallini erano davvero uno spettacolo da vedere.
		#LOC_KS_SciDef_crewReport_Efil_InSpaceLow = Il rapporto dell'equipaggio dall'osservazione di Efil in orbita bassa ha rivelato uno spettacolo mozzafiato simile a una preziosa gemma di zaffiro in orbita attorno ad Anehta. L'atmosfera di Efil emanava un fascino incantevole con colori vivaci e intriganti formazioni nuvolose. La superficie del pianeta mostrava spiagge incontaminate e foreste dense, invitando a un'ulteriore esplorazione.
		#LOC_KS_SciDef_crewReport_Efil_InSpaceHigh = Il rapporto dell'equipaggio dall'osservazione di Efil in orbita alta ha rivelato viste mozzafiato di un pianeta simile a una gemma di zaffiro in lontananza. L'atmosfera di Efil appariva incantevole con colori vividi, reminiscente di un ambiente paradisiaco. L'equipaggio ha notato la bellezza mozzafiato e le caratteristiche uniche di Efil, fornendo preziose intuizioni per un'ulteriore esplorazione e studio di questo mondo straordinario.

		#LOC_KS_SciDef_temperatureScan_Efil_SrfLanded = La temperatura variava notevolmente a seconda dell'ora del giorno e della posizione su Efil, con 25-35 gradi Celsius durante il giorno e 5 gradi Celsius di notte. Durante l'eclissi solare che avviene ogni giorno su questa luna, la luce era completamente bloccata da Anehta e la temperatura sulla superficie di Efil può crollare significativamente di circa 15-20 gradi Celsius.
		#LOC_KS_SciDef_temperatureScan_Efil_SrfSplashed = La superficie del pianeta, coperta da un vasto oceano, mostrava temperature relativamente stabili durante il giorno e la notte, variando da 28 a 32 gradi Celsius. L'acqua sembrava agire come regolatore naturale, mantenendo una temperatura costante su tutta la superficie del pianeta.
		#LOC_KS_SciDef_temperatureScan_Efil_FlyingLow = Mentre l'equipaggio si avventurava nella bassa atmosfera di Efil, ha incontrato uno strato dove la temperatura è aumentata inaspettatamente. Questo improvviso aumento di temperatura era inatteso e intrigante, poiché sfidava lo schema precedentemente osservato, che potrebbe essere attribuito a dinamiche atmosferiche uniche o pattern climatici locali.
		#LOC_KS_SciDef_temperatureScan_Efil_FlyingHigh = Nell'alta atmosfera, l'equipaggio ha osservato una diminuzione graduale della temperatura, coerente con la tendenza attesa di calo della temperatura con l'aumentare dell'altitudine.

		#LOC_KS_SciDef_evaReport_Efil_SrfLanded = Mentre mettevo piede sulla superficie di Efil, la bellezza avvincente di questo pianeta simile a uno zaffiro si è dispiegata davanti a me. L'atmosfera mi avvolgeva nel suo abbraccio gentile, offrendo un respiro rinfrescante ad ogni inspirazione. Le splendide spiagge, ornate di acque turchesi scintillanti, si estendevano come un capolavoro di pittore, mentre le foreste lussureggianti mi chiamavano con le loro tonalità vivaci e sussurri misteriosi.
		#LOC_KS_SciDef_evaReport_Efil_SrfSplashed = Le onde gentili portavano gli echi di un'armonia indomita, come se l'essenza stessa della natura danzasse in esse. Il mondo sottomarino rivelava un arazzo di vita, dove formazioni di corallo iridescente ondeggiavano graziosamente e creature esotiche, ornate di tonalità vivide, scivolavano attraverso le correnti.
		#LOC_KS_SciDef_evaReport_Efil_FlyingLow = Il mondo si dispiegava sotto di me come un sogno incantevole. La chioma color smeraldo del fogliame denso si estendeva a perdita d'occhio, intrecciata con nebbie eteree che sussurravano racconti di antichi segreti. La brezza gentile mi accarezzava il viso, portando con sé il dolce aroma di fiori esotici, mentre le melodie di creature invisibili riempivano l'aria con la loro sinfonia armoniosa.
		#LOC_KS_SciDef_evaReport_Efil_FlyingHigh = L'estensione azzurra si stendeva davanti a me, la sua vastità apparentemente infinita. La luce binaria del sole danzava sui fili di nuvole, proiettando tonalità eteree attraverso il cielo. Da questo punto di vista, potevo contemplare la vera magnificenza di Efil, con le sue foreste lussureggianti e le spiagge incontaminate che abbracciavano il paesaggio sottostante.
		#LOC_KS_SciDef_evaReport_Efil_InSpaceLow = Il gioiello di zaffiro, sospeso nella vastità del cosmo, emanava un bagliore etereo che catturava la mia immaginazione. L'assenza di gravità mi permetteva di scivolare senza sforzo attraverso l'estensione celeste, osservando la danza intricata di stelle e galassie lontane.
		#LOC_KS_SciDef_evaReport_Efil_InSpaceHigh = Il pianeta lontano, con la sua atmosfera pittoresca, scintillava come un arazzo ipnotico di colori. Fluttuando in assenza di peso, mi meravigliavo del balletto cosmico delle stelle, la loro luce radiosa che danzava sullo sfondo vellutato dell'universo.

		#LOC_KS_SciDef_mysteryGoo_Efil_SrfLanded = Il Goo sembra calmarsi nel suo contenitore. Poi si rende conto che non è su Kerbin e sembra avere una crisi esistenziale.
		#LOC_KS_SciDef_mysteryGoo_Efil_SrfSplashed = Il Goo si riversa nell'acqua! Poi ritorna prontamente alla sicurezza del suo contenitore poiché questa non è acqua che ha toccato prima.
		#LOC_KS_SciDef_mysteryGoo_Efil_FlyingLow = Il Goo si agita eccitatamente mentre il veicolo vola nell'aria.
		#LOC_KS_SciDef_mysteryGoo_Efil_FlyingHigh = Il Goo sembra pensare di essere nell'atmosfera di Kerbin. Se solo sapesse......

		#LOC_KS_SciDef_surfaceSample_Efil_SrfLanded = Ho raccolto con cura campioni del suolo, ammirandone la ricca texture e i colori vivaci, ogni granello una testimonianza dell'intricato arazzo di vita che prosperava in questo regno incantevole.
		#LOC_KS_SciDef_surfaceSample_Efil_SrfSplashed = Il regno sommerso dell'oceano di Efil ha svelato un arazzo incantevole di vita, mentre le acque incontaminate mi abbracciavano. Con cura meticolosa, ho procurato campioni dall'ecosistema marino prospero, dove coralli vibranti e delicata flora marina parlavano della ricca biodiversità del pianeta.

		#LOC_KS_SciDef_mobileMaterialsLab_Efil_SrfLanded = Nell'abbraccio del paesaggio idilliaco di Efil, la mia squadra ha intrapreso uno studio intricato della composizione geologica della luna. Strumenti delicati hanno analizzato meticolosamente la diversa gamma di rocce e minerali, svelando i segreti della sua formazione e offrendo scorci dell'intricata interazione delle forze elementari che hanno plasmato questo gioiello celeste. Le nostre scoperte promettono di approfondire la nostra comprensione della geologia unica di Efil e contribuire alla nostra più ampia comprensione dell'evoluzione planetaria.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_SrfSplashed = Immersi nell'abbraccio azzurro di Efil, il nostro studio dei materiali ha preso una svolta inaspettata mentre ci avventuravamo nelle profondità del suo oceano cristallino. Analizzando i campioni sommersi, abbiamo scoperto una notevole interazione di minerali esotici, rivelando i tesori nascosti della luna. La relazione intricata tra l'ambiente acquatico e la composizione geologica si è dipanata davanti ai nostri occhi, accendendo la nostra curiosità scientifica ed espandendo la nostra comprensione di questo mondo enigmatico.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_FlyingLow = Scendendo nelle regioni inferiori dell'atmosfera affascinante di Efil, il nostro studio dei materiali ha svelato la composizione intricata del suo terreno roccioso. Con analisi meticolose e strumentazione precisa, abbiamo esaminato i minerali e gli elementi unici presenti, dipingendo un ritratto vivido dell'arazzo geologico della luna.
		#LOC_KS_SciDef_mobileMaterialsLab_Efil_FlyingHigh = Immersi nelle regioni superiori dell'atmosfera incantevole di Efil, il nostro studio dei materiali si è avventurato in reami inesplorati. L'interazione dei composti atmosferici e delle intricate formazioni minerali suggeriva la profonda interconnessione tra questo mondo affascinante e l'arazzo del suo ambiente avvincente.

		#LOC_KS_SciDef_barometerScan_Efil_Srf = Mentre i nostri piedi toccavano saldamente il terreno vibrante di Efil, abbiamo dispiegato il barometro, misurando la pressione atmosferica con precisione. Le letture riflettevano la natura dinamica del pianeta, con fluttuazioni che suggerivano forze invisibili che modellavano il suo delicato equilibrio.
		#LOC_KS_SciDef_barometerScan_Efil_FlyingLow = Avventurandoci nelle regioni inferiori dell'atmosfera di Efil, il nostro barometro ha diligentemente registrato le sottili fluttuazioni della pressione dell'aria. I dati hanno catturato l'interazione dinamica delle correnti atmosferiche, suggerendo i meccanismi intricati che modellano questo mondo vibrante.
		#LOC_KS_SciDef_barometerScan_Efil_FlyingHigh = Salendo verso le regioni superiori dell'atmosfera di Efil, il barometro ha diligentemente catturato la diminuzione della pressione atmosferica, facendo eco alla transizione eterea verso le altezze celesti.

		#LOC_KS_SciDef_seismicScan_Efil_SrfLanded = Mettendo piede sulla superficie mozzafiato di Efil, i nostri strumenti di scansione sismica hanno iniziato la loro intricata danza con la geologia del pianeta. Vibrazioni ed echi viaggiavano attraverso il terreno, svelando i segreti nascosti sotto la bellezza azzurra, mappando la rete intricata di camere sotterranee e il battito gentile dell'antico nucleo di Efil. Ogni impulso sismico faceva eco alla storia del pianeta, dipingendo un quadro vivido del suo arazzo geologico, svelando un mondo tanto vibrante ed enigmatico quanto i paesaggi affascinanti che ornavano la sua superficie.

		#LOC_KS_SciDef_gravityScan_Efil_SrfLanded = Con i piedi saldamente piantati sulle rive ipnotiche di Efil, abbiamo intrapreso una scansione gravitazionale per svelare i misteri racchiusi nell'abbraccio gravitazionale del pianeta. Mentre i nostri strumenti misuravano meticolosamente le sottili fluttuazioni delle forze gravitazionali, abbiamo acquisito intuizioni sulla distribuzione della massa sotto la superficie, l'intricata interazione della dinamica planetaria e i tesori nascosti sotto il velo azzurro.
		#LOC_KS_SciDef_gravityScan_Efil_InSpaceLow = Nella vasta distesa dello spazio, il nostro veicolo spaziale ha intrapreso una scansione gravitazionale sopra Efil, catturando la coreografia celeste delle forze gravitazionali. Sospesi in assenza di peso, abbiamo osservato le dolci trazioni del campo gravitazionale di Efil, mappando i pattern intricati che modellano il tessuto del cosmo.
		#LOC_KS_SciDef_gravityScan_Efil_InSpaceHigh = In mezzo alle vaste distese dello spazio, il nostro veicolo spaziale si è avventurato a grandi altezze sopra il mondo incantevole di Efil, catturando la danza celeste delle forze gravitazionali. Da questo punto di vista elevato, abbiamo assistito all'intricata interazione tra Efil e i suoi compagni cosmici, tracciando le curve e le increspature nel tessuto dello spazio-tempo.

		#LOC_KS_SciDef_magnetometer_Efil_InSpace = Nella distesa dello spazio, il nostro magnetometro ha diligentemente sondato il campo magnetico che circonda il mondo etereo di Efil. Abbiamo rilevato le sottili fluttuazioni e ondulazioni del magnetismo planetario, dipingendo un ritratto vivido delle forze in gioco. La scansione del magnetometro ha svelato la danza intricata tra il campo magnetico di Efil e le forze celesti che modellano la sua esistenza.

		#LOC_KS_SciDef_atmosphereAnalysis_Efil_Srf = Sulla superficie di Efil, la nostra analisi atmosferica ha rivelato un mix armonioso di gas, dominato da un'abbondanza ricca di ossigeno e tracce di altri elementi essenziali. L'aria portava un sottile profumo di flora, suggerendo le foreste lussureggianti che adornano questo mondo affascinante. Inoltre, abbiamo rilevato la presenza di delicati aerosol sospesi nell'atmosfera, contribuendo agli spettacoli visivi mozzafiato che adornano l'orizzonte.
		#LOC_KS_SciDef_atmosphereAnalysis_Efil_FlyingLow = Immersi nella bassa atmosfera di Efil, la nostra analisi atmosferica ha svelato un'interazione dinamica di gas, con concentrazioni più elevate di ossigeno e un delicato equilibrio di azoto ed elementi in tracce. L'aria conteneva tracce di composti aromatici, evocando il profumo dei fiori vibranti che punteggiano il paesaggio.
		#LOC_KS_SciDef_atmosphereAnalysis_Efil_FlyingHigh = Salendo nell'alta atmosfera di Efil, abbiamo osservato un'atmosfera rarefatta, scarsamente popolata di gas e arricchita di particelle delicate che diffondono la luce, conferendo un bagliore mistico ai cieli. La presenza di particelle ionizzate suggeriva il balletto celeste delle particelle cariche, contribuendo alle aurore eteree che adornano le regioni più alte di questo pianeta impressionante.

		// Eulb
		#LOC_KS_SciDef_crewReport_Eulb_SrfLanded = Questa è certamente un'esperienza che capita una volta ogni luna blu!
		#LOC_KS_SciDef_crewReport_Eulb_InSpace = Il blu puro della luna sotto di te rende difficile concentrarsi sul compito da svolgere.

		#LOC_KS_SciDef_temperatureScan_Eulb_SrfLanded = Nonostante sia blu ghiaccio, Eulb è in realtà piuttosto caldo durante il giorno. Anche se, le cose blu non dovrebbero essere più calde?
		#LOC_KS_SciDef_temperatureScan_Eulb_InSpace = Quando funzionerà davvero un giorno, voi ragazzi sembrerete così stupidi.

		#LOC_KS_SciDef_evaReport_Eulb_SrfLanded = Camminare sulla superficie di Eulb ha macchiato la tua tuta spaziale di una tonalità chiara di blu. Smetti di ridere. Non è divertente.
		#LOC_KS_SciDef_evaReport_Eulb_InSpace = Guardando la luna blu sotto di te, ti chiedi come un corpo celeste possa essere così... blu.

		#LOC_KS_SciDef_mysteryGoo_Eulb_SrfLanded = Il Goo è "scoppiato" nel suo contenitore. Interpretalo come vuoi.
		#LOC_KS_SciDef_mysteryGoo_Eulb_InSpace = Il Goo non sembra fare molto.

		#LOC_KS_SciDef_surfaceSample_Eulb_SrfLanded = Il campione ha macchiato il tuo guanto di un colore blu molto distinto.
		#LOC_KS_SciDef_surfaceSample_Eulb_SrfLanded_Craters = Il campione di materiale che hai raccolto non sembra provenire da Eulb.

		#LOC_KS_SciDef_mobileMaterialsLab_Eulb_SrfLanded = La sonda campioni si è ricoperta della misteriosa polvere blu che ricopre la superficie di Eulb, ma rimane altrimenti inerte.
		#LOC_KS_SciDef_mobileMaterialsLab_Eulb_InSpace = I materiali sembrano essere blu. Consideri di tirarli su di morale, ma poi ti rendi conto che quell'espressione non è letterale.

		#LOC_KS_SciDef_barometerScan_Eulb_SrfLanded = Ok, ora, per essere giusti, Eulb non ha molto meno gravità di Duna. È teoricamente possibile che avrebbe potuto avere un'atmosfera, giusto?
		#LOC_KS_SciDef_barometerScan_Eulb_InSpace = Il barometro sembra sentirsi "giù" per essere usato impropriamente di nuovo e ha deciso di "sfogare" i suoi reclami.

		#LOC_KS_SciDef_seismicScan_Eulb_SrfLanded = Il sensore sismico rileva un'attività sismica molto debole sotto la superficie.

		#LOC_KS_SciDef_gravityScan_Eulb_SrfLanded = Il sensore conduce un rilevamento dettagliato della gravità locale dalla superficie, permettendoci di dedurre com'è la struttura interna.
		#LOC_KS_SciDef_gravityScan_Eulb_InSpace = Il sensore legge la gravità di Eulb, dando un indizio sulla struttura interna della luna blu.

		#LOC_KS_SciDef_magnetometer_Eulb_InSpaceLow = Essere più vicini a Eulb ci permette di ottenere una lettura più precisa del suo campo magnetico.
		#LOC_KS_SciDef_magnetometer_Eulb_InSpaceHigh = Lo strumento rileva un campo magnetico residuo proveniente dalla luna blu, ma la lettura è piena di rumore dal campo magnetico di Anehta.

		// Elad
		#LOC_KS_SciDef_crewReport_Elad_SrfLanded = L'equipaggio si chiede come fosse questo posto quando Elad aveva un'atmosfera.
		#LOC_KS_SciDef_crewReport_Elad_InSpaceLow = La somiglianza con Tylo c'è, ma c'è un'altra luna che potrebbe esistere o meno alla quale Elad assomiglia ancora di più...
		#LOC_KS_SciDef_crewReport_Elad_InSpaceHigh = Elad incombe nelle vicinanze, sembrando piuttosto pacifico nonostante il suo apparentemente tragico passato.

		#LOC_KS_SciDef_evaReport_Elad_SrfLanded = Sembra un po' come casa! Beh, lo sarebbe, se ci fosse aria.
		#LOC_KS_SciDef_evaReport_Elad_InSpaceLow = Chiunque continui a rubare le atmosfere delle grandi lune deve essere trovato e portato alla giustizia.
		#LOC_KS_SciDef_evaReport_Elad_InSpaceHigh = Anche Elad sembra avere una leggera sfumatura blu. Questo potrebbe essere dovuto al colore di Aralc-A, però.

		#LOC_KS_SciDef_mysteryGoo_Elad_SrfLanded = Il Goo sta piangendo (lacrime fatte di Goo) e usa un fazzoletto (anche fatto di Goo) per asciugare i suoi pseudopodi.
		#LOC_KS_SciDef_mysteryGoo_Elad_InSpaceLow = Il contenitore rimane chiuso. Sembra che il Goo sia diventato depresso.
		#LOC_KS_SciDef_mysteryGoo_Elad_InSpaceHigh = Il Goo si sente triste.

		#LOC_KS_SciDef_surfaceSample_Elad_SrfLanded = La superficie qui sembra essere stata erosa, ma non da micrometeoriti o radiazioni.
		#LOC_KS_SciDef_surfaceSample_Elad_SrfLandedLowlands = Raccogli una roccia particolarmente interessante e la metti in tasca. Sembra essere una sorta di minerale salino, densamente compatto come sotto una tremenda pressione.
		#LOC_KS_SciDef_surfaceSample_Elad_SrfLandedGrandCanyon = Il terreno qui è così strettamente compresso che deve essere stato una volta una fossa oceanica.

		#LOC_KS_SciDef_mobileMaterialsLab_Elad_SrfLanded = I materiali reagiscono vagamente alla situazione in modo frustrantemente indefinito, costringendoti a scrivere un rapporto completamente generico.
		#LOC_KS_SciDef_mobileMaterialsLab_Elad_InSpace = Forse alla fine troverai una parte di spazio che è semplicemente diversa, i campioni non brillano e non fanno una buona vernice per razzi.

		#LOC_KS_SciDef_seismicScan_Elad_SrfLanded = Le letture suggeriscono fortemente che Elad sia ancora sismicamente attivo.

		#LOC_KS_SciDef_temperatureScan_Elad_SrfLanded = Il termometro sta leggendo la temperatura della superficie di Elad; a seconda di dove ti trovi, sarà diversa. Non c'è nulla che trattenga questa temperatura, si raffredderà una volta che il giorno è finito.
		#LOC_KS_SciDef_temperatureScan_Elad_SrfLanded_GrandCanyons = Questo posto sembra essere più fres-co!
		#LOC_KS_SciDef_temperatureScan_Elad_InSpaceLow = Scendere mentre non si è in contatto con nulla non cambierà nulla.
		#LOC_KS_SciDef_temperatureScan_Elad_InSpaceHigh = Il termometro ha registrato la propria temperatura. Cosa pensi di fare mettendo un termometro da cucina nel vuoto dello spazio?

		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded = Il barometro rileva una concentrazione più alta di particelle. Particelle che potrebbero essere resti di un passato atmosferico denso. Questo non significa che puoi fare paracadutismo.
		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded_GrandCanyons = La pressione qui è leggermente più alta, non puoi ancora far volare un aeroplano di carta qui.
		#LOC_KS_SciDef_barometerScan_Elad_SrfLanded_RiftValleys = La pressione qui è leggermente più alta, non puoi ancora far volare un aeroplano di carta qui.
		#LOC_KS_SciDef_barometerScan_Elad_InSpaceLow = Il barometro rileva più di nulla. Sembra esserci un aumento significativo di particelle.
		#LOC_KS_SciDef_barometerScan_Elad_InSpaceHigh = Il barometro non rileva nulla.

		#LOC_KS_SciDef_gravityScan_Elad_SrfLanded = Questa piccola scatola attaccata a questo veicolo sembra essere attratta verso il suolo, questo potrebbe provare la presenza di un'attrazione gravitazionale prodotta da Elad. Questo effetto è causato dalla capacità della massa di curvare lo spazio-tempo intorno ad essa. Si chiama gravità, ma se sei riuscito a portare questo qui dovresti saperlo. Giusto?
		#LOC_KS_SciDef_gravityScan_Elad_InSpaceLow = Alcune irregolarità vengono percepite che causano irregolarità nella distribuzione della forza gravitazionale di Elad che è tutt'altro che irregolare.
		#LOC_KS_SciDef_gravityScan_Elad_InSpaceHigh = La gravità di Elad sembra essere abbastanza costante da questa distanza. Le sue irregolarità superficiali non sembrano spostare il suo centro di gravità.





		// Wormhole
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceLow1 = Vorresti che qualcuno fosse qui a spiegarti questa anomalia spaziale di una complessità sconcertante con nient'altro che una matita e della carta.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceLow2 = Mentre tenti di fissare la distorsione nello spaziotempo, pensi di vedere un'immagine distorta di... una sorta di enorme cosa luminosa, con tre... no, quattro puntini intorno? Nonostante la tua eccitazione e il desiderio di saperne di più, potrebbe essere stato un gioco di luce, e cerchi di calmare le tue selvagge speculazioni.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceHigh1 = Hai difficoltà a individuare il wormhole, ma una volta che lo vedi, è tutto ciò che puoi guardare.
		#LOC_KS_SciDef_crewReport_WH3141A_InSpaceHigh2 = Rabbbrividisci al pensiero che il KSC voglia mandare TE attraverso quella cosa verso Kraken-sa-cosa, forse migliaia o milioni di anni luce da casa.

		#LOC_KS_SciDef_temperatureScan_WH3141A_InSpaceLow = Il tuo termometro non sembra aver rilevato nulla di insolito, nonostante l'anomalia che spezza lo spaziotempo a portata di sputo dal veicolo.
		#LOC_KS_SciDef_temperatureScan_WH3141A_InSpaceHigh = Il tuo termometro non sembra aver rilevato nulla di insolito, nonostante l'anomalia che spezza lo spaziotempo a portata di sputo dal veicolo.

		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceLow1 = Hai un desiderio molto forte e piuttosto razionale di NON attraversare il wormhole con nient'altro che la tua tuta a proteggerti.
		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceLow2 = MOLTO troppo vicino per comodità.
		#LOC_KS_SciDef_evaReport_WH3141A_InSpaceHigh = Guardando nel wormhole (che potrebbe essere l'occhio del Kraken stesso), sei grato che le tute EVA richiedano di indossare un pannolino. Sai, per ogni evenienza in momenti come questo.

		#LOC_KS_SciDef_mysteryGoo_WH3141A_InSpaceLow = Il Goo sembra ritrarsi dal wormhole, come per paura di esso.
		#LOC_KS_SciDef_mysteryGoo_WH3141A_InSpaceHigh = Il Goo sembra ritrarsi dal wormhole, come per paura di esso.

		#LOC_KS_SciDef_mobileMaterialsLab_WH3141A_InSpaceLow = I campioni magnetici reagiscono violentemente all'essere così vicini all'anomalia, staccandosi dalla struttura della sonda materiali verso il wormhole.
		#LOC_KS_SciDef_mobileMaterialsLab_WH3141A_InSpaceHigh = I campioni magnetici reagiscono violentemente all'essere così vicini all'anomalia, staccandosi dalla struttura della sonda materiali verso il wormhole.

		#LOC_KS_SciDef_gravityScan_WH3141A_InSpaceLow = Le letture del sensore di gravità fluttuano selvaggiamente, poiché sembra incapace di quantificare o persino elaborare questo campo gravitazionale davvero bizzarro.
		#LOC_KS_SciDef_gravityScan_WH3141A_InSpaceHigh = Le letture del sensore di gravità fluttuano selvaggiamente, poiché sembra incapace di quantificare o persino elaborare questo campo gravitazionale davvero bizzarro.

		#LOC_KS_SciDef_magnetometer_WH3141A_InSpaceLow = Così vicino all'anomalia, il magnetometro ha l'equivalente numerico di un attacco di panico e cessa del tutto di funzionare con un codice di errore che tu e il tuo equipaggio non conoscete.
		#LOC_KS_SciDef_magnetometer_WH3141A_InSpaceHigh = Entrando nel piccolo pozzo gravitazionale del wormhole, il magnetometro inizia a dare letture instabili, come se fosse confuso... o come se rilevasse più "campi magnetici vicini" progettati contemporaneamente. Strano.



		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceLow1 = Tu e il tuo equipaggio non avete voglia di attraversare un'altra di queste cose da capo.
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceLow2 = Pensi di poter vedere il puntino che è Kerbol attraverso l'anomalia stessa, ma non puoi esserne sicuro.
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceHigh1 = Oh, fantastico. Non ANCORA QUESTO. Pensavi di morire in almeno 9 occasioni separate l'ultima volta che ne hai attraversato uno.
		#LOC_KS_SciDef_crewReport_WH3141B_InSpaceHigh2 = Pensare che quello sia il "portale" per tornare a casa... Metti certamente molta fede in qualcosa per riportarti da Mamma e Papà Kerman che né tu né nemmeno i migliori scienziati Kerbal possono nemmeno iniziare a comprendere nella sua interezza.

		#LOC_KS_SciDef_temperatureScan_WH3141B_InSpaceLow = Il tuo termometro non sembra aver rilevato nulla di insolito, nonostante l'anomalia che spezza lo spaziotempo a portata di sputo dal veicolo.
		#LOC_KS_SciDef_temperatureScan_WH3141B_InSpaceHigh = Il tuo termometro non sembra aver rilevato nulla di insolito, nonostante l'anomalia che spezza lo spaziotempo a portata di sputo dal veicolo.

		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceLow1 = Nonostante sappia che casa è solo "un salto" via, certamente non vuoi attraversare l'anomalia con solo la tua tuta a proteggerti.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceLow2 = A suo modo, fissare questa cosa da così vicino è altrettanto male, se non peggio che essere in EVA in orbita bassa intorno a Kcalbeloh.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceHigh1 = Anche se cosmicamente terrificante in modo simile a Kcalbeloh, il piccolo "buco" nello spaziotempo è innegabilmente peculiare e in qualche modo bello da questa prospettiva.
		#LOC_KS_SciDef_evaReport_WH3141B_InSpaceHigh2 = Guardando nel wormhole (che potrebbe essere l'occhio del Kraken stesso), sei grato che le tute EVA richiedano di indossare un pannolino. Sai, per ogni evenienza in momenti come questo.

		#LOC_KS_SciDef_mysteryGoo_WH3141B_InSpaceLow = Il Goo sembra ritrarsi dal wormhole, come per paura di esso.
		#LOC_KS_SciDef_mysteryGoo_WH3141B_InSpaceHigh = Il Goo sembra ritrarsi dal wormhole, come per paura di esso.

		#LOC_KS_SciDef_mobileMaterialsLab_WH3141B_InSpaceLow = I campioni magnetici reagiscono violentemente all'essere così vicini all'anomalia, staccandosi dalla struttura della sonda materiali verso il wormhole.
		#LOC_KS_SciDef_mobileMaterialsLab_WH3141B_InSpaceHigh = I campioni magnetici reagiscono violentemente all'essere così vicini all'anomalia, staccandosi dalla struttura della sonda materiali verso il wormhole.

		#LOC_KS_SciDef_gravityScan_WH3141B_InSpaceLow = Le letture del sensore di gravità fluttuano selvaggiamente, poiché sembra incapace di quantificare o persino elaborare questo campo gravitazionale davvero bizzarro.
		#LOC_KS_SciDef_gravityScan_WH3141B_InSpaceHigh = Le letture del sensore di gravità fluttuano selvaggiamente, poiché sembra incapace di quantificare o persino elaborare questo campo gravitazionale davvero bizzarro.

		#LOC_KS_SciDef_magnetometer_WH3141B_InSpaceLow = Così vicino all'anomalia, il magnetometro ha l'equivalente numerico di un attacco di panico e cessa del tutto di funzionare con un codice di errore che tu e il tuo equipaggio non conoscete.
		#LOC_KS_SciDef_magnetometer_WH3141B_InSpaceHigh = Entrando nel piccolo pozzo gravitazionale del wormhole, il magnetometro inizia a dare letture instabili, come se fosse confuso... o come se rilevasse più "campi magnetici vicini" progettati contemporaneamente. Strano.


		// Esclusivo cambio casa
		//-------------SulucoHome------------
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Day = Fa certamente caldo qui fuori. Fortunatamente questo veicolo ha l'aria condizionata.
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Twilight = È casa. Cos'altro c'è da dire?
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfLanded_Night = Fortuna che questo veicolo ha un riscaldamento.
		#LOC_KS_SciDef_crewReport_SulucoHome_SrfSplashed = Il veicolo si dondola dolcemente avanti e indietro nelle onde.
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingLow = Il veicolo vibra mentre vola attraverso l'atmosfera.
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingLow_Twilight = Ehi, credo di poter vedere casa mia da qui!
		#LOC_KS_SciDef_crewReport_SulucoHome_FlyingHigh = Venti improvvisi e forti minacciano di spingere il veicolo fuori rotta. Cosa sta succedendo quassù?
		#LOC_KS_SciDef_crewReport_SulucoHome_InSpaceLow = Siamo arrivati nello spazio!
		#LOC_KS_SciDef_crewReport_SulucoHome_InSpaceHigh = Da così in alto puoi vedere chiaramente le tre zone di Suluco: un deserto bruciato che vive un giorno eterno, una natura gelata che vive una notte eterna e la fascia crepuscolare tra le due che chiami casa.

		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Day = Avevi sentito parlare di quanto fosse caldo il lato diurno di Suluco, ma ora puoi sperimentarlo di persona. Senti un forte desiderio di andartene.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Twilight = Ah, zona crepuscolare, dolce zona crepuscolare!
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded_Night = So che alcune cose è meglio non dirle, ma sembra che dovrebbe fare molto più freddo da questo lato del pianeta.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfLanded = Non credo che avessimo davvero bisogno di una tuta spaziale per arrivare qui.
		#LOC_KS_SciDef_evaReport_SulucoHome_SrfSplashed = Suppongo che ora sia un momento buono quanto un altro per fare una nuotata.
		#LOC_KS_SciDef_evaReport_SulucoHome_FlyingLow = Questa è certamente una situazione molto precaria.
		#LOC_KS_SciDef_evaReport_SulucoHome_FlyingHigh = Uiiiiiiiiii!
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Day = Ammiri la vista del deserto perpetuo sotto di te.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Twilight = Wow, non avevo mai saputo quanto poco spazio ci sia per noi da abitare.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Night = Ammiri le viste delle terre gelate sotto di te.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceLow_Water = È in realtà piuttosto sconcertante sapere quanto poca acqua liquida ci sia sulla superficie del nostro pianeta natale.
		#LOC_KS_SciDef_evaReport_SulucoHome_InSpaceHigh = La nostra casa certamente assomiglia a un globo oculare, vero?

		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Day = Il terreno qui è grossolano e molto secco, probabilmente perché questo lato del pianeta riceve un bagno di sole perpetuo.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Twilight = Il terreno qui è piuttosto umido, probabilmente a causa dello scioglimento della neve dal lato notturno del pianeta.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded_Night = Il terreno qui è gelato, probabilmente perché non riceve molto calore. Capisco perché nessuno ha tentato di coltivare qui.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfLanded = Prendi un campione del terreno di Suluco per l'analisi.
		#LOC_KS_SciDef_surfaceSample_SulucoHome_SrfSplashed = È acqua. Cos'altro ti aspettavi?

		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Day = Molti campioni si sono degradati a causa del costante bagno di sole. C'è anche evidenza di un piccolo incendio dentro la sonda materiali.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Twilight = I campioni devono ancora mostrare cambiamenti significativi.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfLanded_Night = I campioni hanno cristalli di ghiaccio che crescono al loro interno.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_SrfSplashed = Molti campioni mostrano segni di corrosione a causa dell'esposizione all'acqua. Stranamente, uno dei campioni sembra anche carbonizzato.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_Flying = I campioni meno resilienti si sono depositati attraverso l'interno dell'unità. Non invidio chi dovrà pulire.
		#LOC_KS_SciDef_mobileMaterialsLab_SulucoHome_InSpace = Alcuni campioni sembrano essersi staccati e ora fluttuano dentro la sonda materiali.

		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Day = Fa molto caldo qui fuori. Dovresti essere pazzo per voler vivere qui!
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_DayPole = Questa è la parte più calda del pianeta e OH CAVOLO, fa caldo qui! Non c'è da meravigliarsi che non ci siamo stabiliti in quest'area del pianeta.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Twilight = La temperatura qui è perfetta. Ora capisco perché viviamo in questa parte del pianeta.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_Night = La temperatura su questa metà del pianeta è quasi insopportabilmente fredda.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfLanded_NightPole = Questa è la parte più fredda del pianeta e sembra che il termometro si sia congelato. Inutile dire che è ovvio perché nessuno vive qui.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfSplashed_Water = La temperatura dell'acqua è effettivamente piacevole qui. Sembra che si potrebbe ragionevolmente fare una nuotata.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_SrfSplashed_ColdOcean = Il termometro si rompe al contatto con le acque gelide. Fortunatamente abbiamo una garanzia, giusto? Cosa intendi con "è annullata"??
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow = Le correnti di convezione attraverso l'atmosfera creano fluttuazioni di temperatura significative mentre passi attraverso diverse altitudini.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow_Day = Le temperature sopra la zona diurna sono leggermente più fresche che in superficie, ma non di molto. Le correnti ascensionali calde rendono l'aria più calda di quanto potrebbe essere altrimenti.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingLow_Night = Le correnti discendenti fredde fanno sì che la temperatura atmosferica locale sia molto più bassa di quanto sarebbe altrimenti.
		#LOC_KS_SciDef_temperatureScan_SulucoHome_FlyingHigh = Le temperature nell'alta atmosfera sono più uniformi, ma c'è ancora evidenza di convezione attraverso l'atmosfera.

		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Day = La presenza di una zona di bassa pressione sul lato diurno ci porta a credere che l'aria venga riscaldata dalla luce solare qui, poi trasportata verso regioni più fredde tramite correnti atmosferiche superiori.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Twilight = C'è un vento molto persistente tra il lato diurno e notturno del pianeta. Occorre condurre ulteriori ricerche su come si formano questi venti.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfLanded_Night = La presenza di una zona di alta pressione sul lato notturno ci dà un quadro più completo delle correnti atmosferiche di Suluco. L'aria si riscalda sul lato diurno, poi fluisce verso il lato notturno tramite correnti di convezione, dove si raffredda e ritorna al lato diurno, creando i venti persistenti.
		#LOC_KS_SciDef_barometerScan_SulucoHome_SrfSplashed = L'acqua ha allagato il barometro, rendendolo inutilizzabile.
		#LOC_KS_SciDef_barometerScan_SulucoHome_FlyingLow = Le fluttuazioni della pressione atmosferica ci portano a speculare sull'esistenza di correnti di convezione nell'atmosfera, che probabilmente originerebbero dal gradiente di temperatura tra le due metà del pianeta.
		#LOC_KS_SciDef_barometerScan_SulucoHome_FlyingHigh = Ulteriori fluttuazioni della pressione atmosferica sembrano confermare l'esistenza di correnti di convezione atmosferica.
		#LOC_KS_SciDef_barometerScan_SulucoHome_InSpaceLow = Il barometro legge zero! Dobbiamo essere nello spazio!

		#LOC_KS_SciDef_seismicScan_SulucoHome_SrfLanded = Lo scanner sismico rileva pochissima attività sismica. La nostra casa è probabilmente geologicamente molto stabile.

		#LOC_KS_SciDef_gravityScan_SulucoHome_SrfLanded = Dopo aver calibrato correttamente il sensore di gravità, effettui una lettura della gravità locale sulla superficie di Suluco.
		#LOC_KS_SciDef_gravityScan_SulucoHome_SrfSplashed = Il sensore di gravità si frigge al contatto con l'acqua.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Day = Il lato desertico sembra avere una gravitazione molto stabile, suggerendo una variabilità molto bassa nella composizione geologica.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Twilight = Passando sopra la zona crepuscolare, il sensore di gravità registra una leggera diminuzione delle letture di gravità locale, suggerendo che questa parte del pianeta sia a un'elevazione relativamente bassa.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace_Night = Le letture del sensore di gravità fluttuano mentre passa sopra il lato notturno, in particolare sopra le cime montuose gelate.
		#LOC_KS_SciDef_gravityScan_SulucoHome_InSpace = Effettui una lettura della gravità locale sopra Suluco.

		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Day = L'analisi dell'atmosfera sul lato diurno di Suluco rivela un'umidità sorprendentemente alta, probabilmente perché l'aria calda può trattenere molta umidità.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Twilight = L'aria nella zona crepuscolare è moderatamente umida. Perfetta per vivere qui.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_SrfLanded_Night = L'analisi dell'atmosfera sul lato notturno di Suluco rivela un'umidità estremamente bassa, probabilmente perché la maggior parte dell'umidità nell'aria diventa neve.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow = A causa delle correnti atmosferiche, l'aria che l'analizzatore atmosferico rileva potrebbe aver avuto origine da una parte completamente diversa del pianeta.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow_Day = L'analizzatore atmosferico rileva piccole concentrazioni di particelle di terreno fine, che sono state probabilmente sollevate dal suolo da forti correnti ascensionali.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingLow_Night = Goccioline di acqua superraffreddata si congelano al contatto con l'analizzatore atmosferico, bloccandone le porte.
		#LOC_KS_SciDef_atmosphereAnalysis_SulucoHome_FlyingHigh = La composizione atmosferica ad alte quote è molto più uniforme.

		#LOC_KS_SciDef_magnetometer_SulucoHome_InSpace = L'asta del magnetometro rileva un campo magnetico debole e uniforme intorno a Suluco, che è probabilmente ciò che protegge l'atmosfera del nostro pianeta natale e ci permette di vivere qui. È probabile che questo campo magnetico sia creato da una geodinamo interna.


		//-------------EfilHome------------
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded = Non importa da quale finestra guardi, i tuoi occhi sono deliziati da bellissimi paesaggi che minacciano di distrarti dalla missione in corso.
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Beach = No, non farlo! Resisti all'impulso! Abbiamo una missione da completare!
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Mountains = Siamo su una pendenza incredibile. Sei sicuro che sia sicuro?
		#LOC_KS_SciDef_crewReport_EfilHome_SrfLanded_Forests = Il parabrezza sembra essere coperto di resti di insetti. Sarà una seccatura da pulire.
		#LOC_KS_SciDef_crewReport_EfilHome_SrfSplashed = Il veicolo si dondola dolcemente avanti e indietro nelle onde.Pensi di vedere alcuni pesci sotto la superficie. 
		#LOC_KS_SciDef_crewReport_EfilHome_FlyingLow = Guardando dalla finestra, puoi vedere i magnifici paesaggi sotto di te.
		#LOC_KS_SciDef_crewReport_EfilHome_FlyingHigh = Anche a questa altezza puoi ancora distinguere le foreste lussureggianti sulla superficie di Efil.
		#LOC_KS_SciDef_crewReport_EfilHome_InSpace = Sei affascinato dalle viste di Efil con Anehta sullo sfondo. Non può davvero andare molto meglio di così.

		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded = Prenditi un momento per apprezzare quanto sia magnifica la nostra casa. Assicuriamoci che rimanga così.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Beach = Sembra un ottimo momento per fare una nuotata!
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Mountains = Ammiri le viste mozzafiato del terreno intorno a te.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Forests = È così...... bello qui fuori! Cos'è? No, non sto piangendo. Sto solo sudando attraverso gli occhi.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfLanded_Water = Va bene, d'accordo. Puoi fare una nuotata. Solo non allontanarti troppo dal veicolo.
		#LOC_KS_SciDef_evaReport_EfilHome_SrfSplashed = È una bella giornata. Non posso biasimarti per fare una nuotata.
		#LOC_KS_SciDef_evaReport_EfilHome_FlyingLow = Questa è certamente una situazione molto precaria.
		#LOC_KS_SciDef_evaReport_EfilHome_FlyingHigh = Uiiiiiiiiii!
		#LOC_KS_SciDef_evaReport_EfilHome_InSpace = Non riesci a distogliere l'attenzione dal mondo assolutamente magnifico sotto di te. Sei molto grato di chiamare questo posto casa tua.

		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded = Prendi un campione del terreno su Efil.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Beach = Raccogli un campione della spiaggia e poi lo lasci cadere immediatamente rendendoti conto di avere un guanto pieno di granchi della sabbia!
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Grassland = Prendi un campione delle erbe che coprono la superficie. Sembrano essere molto sane.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Desert = Raccogli un campione della sabbia del deserto. È molto fine ma sorprendentemente non così secca.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Tundra = Raccogli un campione del terreno gelato sotto di te. Anche qui fuori c'è ancora una modesta quantità di flora che cresce.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Mountains = Raccogli una piccola roccia dalle montagne. È molto liscia, probabilmente a causa dell'erosione dallo scioglimento della neve.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfLanded_Forests = Prendi un campione del suolo forestale, raccogliendo una piccola quantità di flora nel processo. Ti ricordi di quanto sia lussureggiante e bella la tua casa.
		#LOC_KS_SciDef_surfaceSample_EfilHome_SrfSplashed = È acqua. Cos'altro ti aspettavi?

		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfLanded = Il Goo sembra annoiato.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfLanded_Beach = Il Goo rimbalza eccitatamente nel suo contenitore.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_SrfSplashed = Il Goo si riversa nell'acqua!
		#LOC_KS_SciDef_mysteryGoo_EfilHome_Flying = Il Goo si agita eccitatamente mentre il veicolo vola nell'aria.
		#LOC_KS_SciDef_mysteryGoo_EfilHome_InSpace = Il Goo si sente a casa qui.

		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded = R&S dice che i campioni in questa cosa sono noti per attirare sia flora che fauna, ma cosa ne sanno?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Grassland = Diversi campioni hanno erbacce che crescono da loro. Qualcuno ha lasciato cadere semi lì per caso?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Beach = Apri la sonda materiali per studiare i campioni, solo per scoprire una festa di granchi della sabbia in corso al suo interno. Sfortunatamente, sembra che i campioni siano diventati rinfreschi. *sospiro.*
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfLanded_Forests = L'interno della sonda materiali è diventato un bioma a sé stante. Ci sono fiori e giovani piante che crescono dai campioni!
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_SrfSplashed = Guardi con orrore mentre un gruppo di gamberi nuota nella sonda materiali e divora tutti i campioni. Quelle cose non erano economiche, stupidi crostacei!
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_Flying = Diversi campioni si sono staccati dai loro supporti e hanno trasformato l'interno della sonda materiali in un'opera d'arte moderna. Quanto pensi che potremmo venderla a un'asta?
		#LOC_KS_SciDef_mobileMaterialsLab_EfilHome_InSpace = La struttura cristallina dei campioni è cambiata dall'essere in un ambiente di microgravità. Mi chiedo come reagiranno a essere su altri mondi.

		#LOC_KS_SciDef_temperatureScan_EfilHome_SrfLanded = Sembra che non importa dove ti trovi, la temperatura sia vivibile. Un promemoria di quanto sia unico il tuo mondo natale.
		#LOC_KS_SciDef_temperatureScan_EfilHome_SrfSplashed = La temperatura dell'acqua è piacevole e fresca. Ehi, no! Questo non significa che puoi fare una nuotata!
		#LOC_KS_SciDef_temperatureScan_EfilHome_InSpace = Il termometro legge zero. Figurati, siamo nello spazio.

		#LOC_KS_SciDef_barometerScan_EfilHome_SrfLanded = La pressione atmosferica sul tuo mondo natale è più bassa di quella a cui sei normalmente abituato, ma comunque nell'intervallo confortevole.
		#LOC_KS_SciDef_barometerScan_EfilHome_SrfSplashed = L'acqua entra nelle porte del barometro, ostruendole e rendendo il dispositivo inutilizzabile.
		#LOC_KS_SciDef_barometerScan_EfilHome_InSpace = Il barometro legge zero! Dobbiamo essere nello spazio!

		#LOC_KS_SciDef_seismicScan_EfilHome_SrfLanded = Il sismometro registra informazioni sull'attività sismica di Efil, fornendo informazioni sulla struttura interna della nostra casa.

		#LOC_KS_SciDef_gravityScan_EfilHome_SrfLanded = Il sensore di gravità legge un valore molto più alto di quanto dovrebbe. Sembra che possa aver bisogno di essere ricalibrato.
		#LOC_KS_SciDef_gravityScan_EfilHome_SrfSplashed = Il sensore di gravità si cortocircuita quando l'acqua entra.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Water = Il sensore di gravità rileva brevi cambiamenti nella gravità locale sopra l'oceano, probabilmente a causa dell'influenza di Anehta e delle altre lune nel sistema.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Beach = La lettura del sensore di gravità si appiattisce mentre passa sopra la spiaggia.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Grassland = La lettura del sensore di gravità si appiattisce mentre passa sopra le ugualmente piatte praterie.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Desert = Il sensore di gravità si appiattisce mentre passa sopra il deserto.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Tundra = La tundra sotto di te fa impennare molto brevemente il sensore di gravità.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Mountains = Il sensore di gravità segue il terreno delle montagne sotto, risultando in piccoli ma molto evidenti cambiamenti nella lettura della gravità locale.
		#LOC_KS_SciDef_gravityScan_EfilHome_InSpace_Forests = Il sensore di gravità emette assurdità. Sembra incapace di gestire la pura quantità di vegetazione sotto di esso.

		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded = Lo strumento effettua la sua analisi dell'atmosfera di Efil.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Water = Lo strumento viene allagato dall'acqua e reso inutilizzabile.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_TropicalDesert = Nonostante sia un deserto, l'aria qui è insolitamente umida.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_ColdDesert = L'aria qui è fredda e molto secca.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Mountains = L'aria nelle montagne è fredda e secca a causa della sua elevazione. Sembra un posto divertente per fare un'escursione.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Forests = L'analizzatore atmosferico non sembra registrare nulla. Poi vedi un grosso insetto volare fuori da uno dei porti.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_SrfLanded_Beach = L'aria qui è molto umida, probabilmente perché siamo proprio accanto a una grande massa d'acqua.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_FlyingLow = La bassa atmosfera di Efil è ancora molto vivibile.
		#LOC_KS_SciDef_atmosphereAnalysis_EfilHome_FlyingHigh = C'è pochissima atmosfera a queste altitudini.

		#LOC_KS_SciDef_magnetometer_EfilHome_InSpace = L'asta del magnetometro rileva un forte campo magnetico che fluttua molto lievemente, probabilmente a causa dell'influenza della vicina Anehta.

		//-------------RouqeaHome------------
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded = Cosa stai facendo quaggiù?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_KSC = Chi vive in un centro spaziale sotto il mare?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_Runway = Seriamente, perché stai facendo questo? Non hai sofferto abbastanza?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfLanded_Launchpad = Perché stai facendo questo a te stesso?
		#LOC_KS_SciDef_crewReport_RouqeaHome_SrfSplashed = Non devi fare questo, lo sai.
		#LOC_KS_SciDef_crewReport_RouqeaHome_FlyingLow = Non è troppo tardi per tornare indietro.
		#LOC_KS_SciDef_crewReport_RouqeaHome_FlyingHigh = Ti sto persino facendo capire?
		#LOC_KS_SciDef_crewReport_RouqeaHome_InSpaceLow = Ok, sei arrivato nello spazio. Bravo, immagino?
		#LOC_KS_SciDef_crewReport_RouqeaHome_InSpaceHigh = Va bene, sei arrivato fin qui. Potresti anche andare fino in fondo e visitare qualche altro pianeta.

		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded = Per favore cerca aiuto.
		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded_Runway = Perché mi preoccupo persino di dirti che è una cattiva idea?
		#LOC_KS_SciDef_evaReport_RouqeaHome_SrfLanded_Launchpad = Per favore fatti controllare la testa. Questo non è un comportamento normale.
		#LOC_KS_SciDef_evaReport_RouqeaHome_FlyingLow = Per favore assicurati di aggrapparti per la vita.
		#LOC_KS_SciDef_evaReport_RouqeaHome_FlyingHigh = Il fatto che tu abbia pensato che fosse una buona idea significa che sei stupido, pazzo o entrambi.

		#LOC_KS_SciDef_mysteryGoo_RouqeaHome_SrfLanded_LaunchpadRunwayKSC = Sai di essere pazzo quando persino il MYSTERY GOO sembra sano di mente accanto a te.


		// ******************************** Definizioni scientifiche DMagic ********************************

		// Kcalbeloh
		#LOC_KS_SciDef_dmMagScan_Kcalbeloh_SrfLanded = L'asta è spaghetti. Sei spaghetti. Tutto è spaghetti! Cosa sta succedendo?!?! PERCHÉ C'È COSÌ TANTA PASTA?!?
		#LOC_KS_SciDef_dmMagScan_Kcalbeloh_InSpaceHigh = A una tale distanza da Kcalbeloh, c'è pochissima attività di cui parlare. È molto simile allo spazio interplanetario, o persino interstellare.

		#LOC_KS_SciDef_rpwsScan_Kcalbeloh_InSpaceLow = Le onde radio e le particelle ionizzate dal disco di accrescimento danneggiano i rivelatori, causando un guasto acuto in tutti i suoi sistemi. È probabilmente riparabile, però... probabilmente.
		#LOC_KS_SciDef_rpwsScan_Kcalbeloh_InSpaceHigh = Deboli emissioni radio possono essere rilevate provenienti dal lontano Kcalbeloh, ma oltre a Maelg, tutte le altre stelle producono molta più attività.

		#LOC_KS_SciDef_scopeScan_Kcalbeloh_InSpaceLow = L'interno che guarda il flusso del telescopio diventa brevemente piuttosto eccitato quando individua la cosiddetta "singolarità" - si scopre che le forze intense hanno crepato la lente e creato un punto luminoso al centro.
		#LOC_KS_SciDef_scopeScan_Kcalbeloh_InSpaceHigh = Il disco di accrescimento di Kcalbeloh viene catturato con dettagli straordinari dallo strumento, e un'analisi più ravvicinata rivela che i bordi del disco sono leggermente spostati verso il rosso e il blu.

		#LOC_KS_SciDef_dmImagingPlatform_Kcalbeloh_InSpaceLow = Anche se i sensori sarebbero teoricamente in grado di analizzare il disco di accrescimento da questa distanza senza che la luce causi danni, non possono farlo, a causa dell'essere disperatamente deformati dalle intense forze in gioco.
		#LOC_KS_SciDef_dmImagingPlatform_Kcalbeloh_InSpaceHigh = L'analisi multispettrale conferma che le due estremità del disco di accrescimento sono sottilmente spostate verso il rosso e il blu. La composizione del disco, nel frattempo, sembra essere per lo più idrogeno ed elio, confermando che è composto di massa da almeno una stella che Kcalbeloh ha divorato molti milioni di anni fa.

		#LOC_KS_SciDef_dmSIGINT_Kcalbeloh_InSpaceLowNorthernHemisphere = Mentre studi la telemetria, senti i suoni di... un banjo che suona? Poi un'armonica, una voce che fischietta, un tamburo, un flauto e un pianoforte. Sembra... sentimentale, persino nostalgico. Poi ti svegli, e la canzone è sparita. Era tutto un sogno?
		#LOC_KS_SciDef_dmSIGINT_Kcalbeloh_InSpaceLowSouthernHemisphere = Il disco di accrescimento di Kcalbeloh emette costantemente intense onde radio, sebbene questo strumento non sia da nessuna parte abbastanza sensibile da rilevare qualsiasi radiazione Kerman.

		#LOC_KS_SciDef_dmSolarParticles_Kcalbeloh_InSpaceLow = Le particelle ad alta energia friggono completamente il concentratore di ioni attivo e distruggono le piastrine sensibili dei collettori passivi. Ottimo lavoro, genio.
		#LOC_KS_SciDef_dmSolarParticles_Kcalbeloh_InSpaceHigh = Il "vento solare" del disco di accrescimento deposita particelle ionizzate nei collettori, ma ci sono anche tracce molto deboli da più altre direzioni, probabilmente provenienti dalle stelle più massicce del sistema Kcalbeloh.

		#LOC_KS_SciDef_dmSoilMoisture_Kcalbeloh_InSpaceLow = Ok. Chi è il comico che ha aggiunto un sensore per rilevare l'acqua tramite emissioni a microonde alla missione BUCO NERO? Voglio i nomi!

		#LOC_KS_SciDef_dmRadiometerScan_Kcalbeloh_InSpaceHigh = Anche se ovviamente l'orizzonte degli eventi stesso ha un albedo precisamente zero, il disco di accrescimento emette luce in tutte le lunghezze d'onda registrate, proprio come una stella. Tuttavia, è considerevolmente più debole della maggior parte delle stelle.

		// Onrefni
		#LOC_KS_SciDef_dmMagScan_Onrefni_SrfLanded = Il campo magnetico superficiale di Onrefni è abbastanza forte, soprattutto per un corpo così piccolo. Il suo nucleo è molto probabilmente proporzionalmente enorme e fortemente agitato - impastato, persino - dall'immensa attrazione gravitazionale di Kcalbeloh.
		#LOC_KS_SciDef_dmMagScan_Onrefni_SrfSplashed = Molti hanno speculato che se sapessimo perché il magnetometro ha inviato il messaggio "oh no, non di nuovo!" mentre si fondeva nella lava su una blanet in orbita ravvicinata attorno a un buco nero supermassiccio, sapremmo molto di più sulla natura dell'universo di quanto sappiamo ora.

		#LOC_KS_SciDef_rpwsScan_Onrefni_InSpaceLow = Anche con una potente magnetosfera, Onrefni può fare poco per fermare il cosiddetto "vento solare" dall'investire la sua superficie.
		#LOC_KS_SciDef_rpwsScan_Onrefni_InSpaceHigh = Il "vento solare" di Kcalbeloh soffia forte qui. Potresti quasi sentirlo ululare, tranne che lo spazio non funziona così, ovviamente. Ma il silenzio rende senza dubbio l'intera scena ancora più inquietante...

		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowLava = La roccia nera come la notte contrasta fortemente con le strisce rosso-arancio brillanti di lava ardente, che scorrono attraverso le fessure nella superficie di Onrefni. Ci si chiede quanto ancora possa durare.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowDay = Profonde fessure coprono la superficie di Onrefni, specialmente sul lato diurno. Sembra che un'entità colossale l'abbia colpito e abbia frantumato metà della superficie.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowNight = Fessure attraversano ancora il lato oscuro di Onrefni, messe in evidenza contro il disco di accrescimento brillantemente illuminato di Kcalbeloh.
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceLowCraters = I bordi dei crateri di Onrefni scintillano nella luce sinistra del disco di accrescimento. Ci si chiede cosa abbia creato queste caratteristiche - hanno trovato la loro strada vicino a Kcalbeloh, o Onrefni è stato scagliato qui in passato, portando già queste cicatrici?
		#LOC_KS_SciDef_scopeScan_Onrefni_InSpaceHigh = Quello che vedi davanti a te è l'immagine stessa della bellezza nella desolazione. Onrefni è un mondo sull'orlo della distruzione, eppure nonostante sia un piccolo masso senza aria con nient'altro che l'uragano cosmico vorticoso che lo circonda ad accompagnarlo, la superficie apocalittica della blanet è assolutamente affascinante.

		#LOC_KS_SciDef_dmImagingPlatform_Onrefni_dmImagingPlatform_Onrefni_InSpaceLow = L'analisi multispettrale non indica tracce di atmosfera e una superficie dominata da silicati ricchi di metalli. Molto probabilmente, quella superficie è un sottile strato sopra una blanet che non è quasi altro che un denso nucleo metallico.
		#LOC_KS_SciDef_dmImagingPlatform_Onrefni_dmImagingPlatform_Onrefni_InSpaceHigh = L'acquisizione termica indica che, nonostante il blocco tidale, Onrefni è rovente su entrambi i lati. Il lato diurno probabilmente non viene riscaldato molto dalla luce comunque; è la gravità di Kcalbeloh che fa questo.

		#LOC_KS_SciDef_dmSIGINT_Onrefni_InSpaceLow = Onrefni non sembra aver cambiato affatto l'ambiente radio; l'attività costante dal disco di accrescimento rimane invariata qui.

		#LOC_KS_SciDef_dmNAlbedoScan_Onrefni_SrfLanded = È difficile ottenere una lettura accurata con tutti i neutroni che volano in ogni direzione, ma la superficie di Onrefni è ricoperta di atomi di idrogeno. Questa non è certamente acqua, ma piuttosto depositi dall'intenso "vento solare" e dal contatto diretto con il disco di accrescimento.

		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfLanded = La superficie di Onrefni si dimostra estremamente resistente ai tuoi tentativi di vaporizzarla con un laser. Il poco che effettivamente si vaporizza conferma solo che la composizione è principalmente roccia ignea, e roccia altamente resistente al calore. Ha senso.
		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfLandedLava = Quindi il tuo piano è fondere la lava con un laser? Va bene, scommettiamo.
		#LOC_KS_SciDef_dmlaserblastscan_Onrefni_SrfSplashed = Va bene così. Sono d'accordo con gli eventi che si stanno svolgendo attualmente.

		#LOC_KS_SciDef_dmSolarParticles_Onrefni_InSpace = Le particelle ad alta energia si dimostrano altrettanto pericolose per il collettore come quando non eravamo vicini a Onrefni.

		#LOC_KS_SciDef_dmSoilMoisture_Onrefni_InSpaceLow = Ehm... Sì. Sì, questa blanet ha decisamente depositi d'acqua sotterranei. Certo...

		#LOC_KS_SciDef_dmRadiometerScan_Onrefni_InSpaceHigh = A causa della sua superficie scura, Onrefni ha un albedo molto basso che riflette pochissima luce in tutte le lunghezze d'onda.

		#LOC_KS_SciDef_dmseismicHammer_Onrefni_SrfLanded = Onrefni risuona molto facilmente, quasi confermando la presenza del suo nucleo metallico massicciamente sproporzionato.

		#LOC_KS_SciDef_dmbathymetryscan_Onrefni_SrfSplashed = Disattiva "Ignora temperatura massima", vigliacco!

		// Rouqea
		#LOC_KS_SciDef_dmMagScan_Rouqea_SrfLanded = L'asta evidentemente non era progettata per questo tipo di pressione e parti di essa sembrano essersi accartocciate.
		#LOC_KS_SciDef_dmMagScan_Rouqea_SrfSplashed = Il campo magnetico dalla superficie di Rouqea è un po' più forte che in orbita, ma è ancora debole. Data la sua vicinanza a Kcalbeloh, le forze di marea dovrebbero agitare il nucleo. Forse non ha affatto un nucleo metallico?

		#LOC_KS_SciDef_rpwsScan_Rouqea_InSpaceHigh = Il vento del buco nero dal disco di accrescimento di Kcalbeloh sta producendo alcune interessanti interazioni con l'atmosfera densa di Rouqea, ma non sono davvero così speciali rispetto a quello che abbiamo visto prima.
		#LOC_KS_SciDef_rpwsScan_Rouqea_InSpaceLow = L'atmosfera densa e la superficie umida di Rouqea producono molta affascinante attività di onde radio. Questo è davvero un mondo alieno!

		#LOC_KS_SciDef_scopeScan_Rouqea_InSpaceHigh = Blue, blue.
		#LOC_KS_SciDef_scopeScan_Rouqea_InSpaceLow = Uhhh. Acqua. E... c'è dell'acqua laggiù, e... Oh, guarda! È acqua.

		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceHigh = L'analisi multispettrale dell'atmosfera di Rouqea conferma che la maggioranza è azoto, ma c'è anche parecchio ossigeno. È interessante, potrebbe esserci vita su Rouqea?
		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceLow = Esaminando la superficie di Rouqea nella maggior parte degli spettri non si rivela molto sotto la superficie. Sembra che l'acqua sia piuttosto profonda.
		#LOC_KS_SciDef_dmImagingPlatform_Rouqea_InSpaceLowHighlands = Analizzando questa regione degli oceani di Rouqea si rivela qualcosa di sorprendente; in alcune parti l'acqua sembra essere profonda solo 100 m!

		//Solo Rouqea (non Hellswitch)
		#LOC_KS_SciDef_dmSIGINT_Rouqea_InSpaceLow = Anche se l'atmosfera e gli oceani turbolenti di Rouqea producono molta attività radio interessante, non c'è nulla che suggerisca una presenza intelligente laggiù.

		//Solo Rouqea Hellswitch
		#LOC_KS_SciDef_dmSIGINT_RouqeaHome_InSpaceLow = Sfortunatamente, a questa altitudine l'ultima partita di palla a testa è troppo disturbata per godersela, con la trasmissione che deve attraversare così tanta acqua e atmosfera per raggiungere lo spazio.

		#LOC_KS_SciDef_dmNAlbedoScan_Rouqea_SrfSplashed = ...Sì, è acqua.
		#LOC_KS_SciDef_dmNAlbedoScan_Rouqea_SrfLanded = Sfortunatamente, lo strumento sembra essersi accartocciato sotto la pressione dell'acqua assurda. Potremmo non sapere mai se Rouqea ospita acqua.

		#LOC_KS_SciDef_dmlaserblastscan_Rouqea_SrfSplashed = L'analisi laser conferma che il liquido è acqua. Sembra abbastanza ovvio, ma è sempre bene verificare.
		#LOC_KS_SciDef_dmlaserblastscan_Rouqea_SrfLanded = L'analisi laser conferma che il solido è... acqua? Aspetta, è ghiaccio d'acqua? Ma è così caldo... È ghiaccio esotico? È il mio tipo di ghiaccio preferito! Fantastico.

		#LOC_KS_SciDef_dmSolarParticles_Rouqea_InSpaceHigh = Il "vento holare" da Kcalbeloh sembra essere tutto ciò che c'è a questa altitudine. Nessuna prova di fasce di radiazioni Van Kerman viene rilevata.
		#LOC_KS_SciDef_dmSolarParticles_Rouqea_InSpaceLow = Vicino a Rouqea, il collettore capta vapore acqueo oltre ad azoto e ossigeno - ma il vento del buco nero di Kcalbeloh è ancora forte.

		#LOC_KS_SciDef_dmSoilMoisture_Rouqea_InSpaceLow = Acqua? Sì!

		#LOC_KS_SciDef_dmRadiometerScan_Rouqea_InSpaceHigh = Anche se bella nello spettro visibile, la superficie oceanica di Rouqea ha un albedo piuttosto basso e la sua densa atmosfera assorbe la maggior parte delle lunghezze d'onda non visibili della luce.

		#LOC_KS_SciDef_dmseismicHammer_Rouqea_SrfSplashed = Ehm... Splash? Non sei sicuro di cosa ti aspettassi.
		#LOC_KS_SciDef_dmseismicHammer_Rouqea_SrfLanded = Purtroppo, anche a questa profondità non c'è molto da raccogliere, poiché i sensori sono miseramente fuori dal loro elemento e probabilmente galleggiano comunque sulle onde enormi sopra. I sensori locali ti dicono almeno che i dintorni immediati sembrano risuonare come ci si aspetta dal ghiaccio esotico.

		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedGenericShallow = Nient'altro che acqua per chilometri in ogni direzione, incluso verso il basso. Le scansioni dell'acqua stessa non rivelano composti organici.
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedGenericDeep = Anche ben sotto la superficie, tutto ciò che puoi vedere è acqua. Nonostante la presenza di ossigeno nell'atmosfera sopra, non ci sono segni di vita, nemmeno a livello microscopico.
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedHighlandsShallow = Lo scanner rileva effettivamente segni di una superficie solida sotto! Tuffiamoci più in profondità!
		#LOC_KS_SciDef_dmbathymetryscan_Rouqea_SrfSplashedHighlandsDeep = Puoi effettivamente vedere una superficie solida a questa profondità! Nonostante ciò, tutti i segni indicano che Rouqea è totalmente priva di vita.

		#LOC_KS_SciDef_dmbiodrillscan_Rouqea_SrfLanded = Il trapano trova principalmente acqua e tracce di altri elementi, ma nessun segno di attività biologica. È probabile che la fonte dell'ossigeno di Rouqea sia di natura geologica.

		// Iomena
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLanded = Iomena ha un campo magnetico superficiale apprezzabile che si distorce fortemente a seconda della posizione, ma anche nelle parti più tranquille rimane un flusso costante di attività. Questo è probabilmente un vero campo magnetico prodotto da un effetto geodinamo.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedHighlands = L'attività magnetica in questa posizione è in realtà un po' più debole qui, forse a causa del terreno rialzato che riduce la densità dei minerali magnetici nella crosta.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedMountainsAll = Il campo magnetico si rafforza qui, forse a causa di materiale magnetizzato portato in superficie dalla profondità di Iomena.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedCraters = Regioni isolate di intensa attività magnetica suggerirebbero che l'impattatore ha disperso minerali magnetici all'atterraggio.
		#LOC_KS_SciDef_dmMagScan_Iomena_SrfLandedCanyonsAll = Alcune linee di campo magnetico corrono lungo le pareti del canyon, confermando la presenza di materiali magneticamente attivi.

		#LOC_KS_SciDef_rpwsScan_Iomena_InSpaceLow = A questa distanza da Kcalbeloh, il "vento solare" è notevolmente più debole, nonostante si sia ancora abbastanza vicini al disco di accrescimento.
		#LOC_KS_SciDef_rpwsScan_Iomena_InSpaceHigh = Il flusso del vento del buco nero dal disco di accrescimento di Kcalbeloh è a volte interrotto da tracce di particelle cariche soffiate via dalla sottile atmosfera di Iomena.

		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowGeneric = Campi desolati di rocce blu-grigie hanno una bellezza sorprendente. La vista in superficie è probabilmente piuttosto spettacolare, specialmente con Kcalbeloh sullo sfondo.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowMountainsAll = I picchi di Iomena spiccano, poiché la maggior parte è ricoperta di una sorta di sostanza luminosa. Probabilmente non è ghiaccio d'acqua, però...
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowCanyonsAll = Questi canyon sembrano davvero spettacolari. Ma l'atmosfera è abbastanza spessa per volarci attraverso? Dobbiamo scoprirlo, subito!
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowCraters = Le rive gelide dei crateri allagati di Iomena devono essere mozzafiato. Anche dallo spazio, c'è una certa bellezza solitaria.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceLowOceans = Qualunque cosa sia questa roba, probabilmente non è acqua. Le condizioni dovrebbero essere giuste per l'ammoniaca liquida in superficie, quindi se atterriamo lì, RICORDATI di non berne.
		#LOC_KS_SciDef_scopeScan_Iomena_InSpaceHigh = Da lontano, le caratteristiche grigie e opache di Iomena mostrano chiari segni di flusso liquido passato e presente in superficie; anche se a questa distanza da Kcalbeloh, è molto probabilmente troppo freddo per l'acqua liquida.

		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowGeneric = A giudicare dall'analisi multispettrale, la superficie blu-grigia di Iomena sembra essere un mix abbastanza standard di vari minerali silicati e ammoniaca.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowWater = Questo liquido è alla temperatura giusta per essere ammoniaca, secondo le letture IR.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceLowMountainsAll = La firma IR indica che la sostanza luminosa che copre le montagne di Iomena è probabilmente ghiaccio di ammoniaca.
		#LOC_KS_SciDef_dmImagingPlatform_Iomena_InSpaceHigh = La sottile atmosfera di Iomena contiene principalmente ammoniaca, sebbene le letture suggeriscano tracce di metano e anidride carbonica. Queste tracce potrebbero essere una biosignatura: merita ulteriori studi!

		#LOC_KS_SciDef_dmSIGINT_Iomena_InSpaceLow = L'unica attività radio qui oltre al "vento solare" di Kcalbeloh è prodotta dalle interazioni tra esso e la sottile atmosfera di Iomena.

		#LOC_KS_SciDef_dmNAlbedoScan_Iomena_SrfLanded = La superficie di Iomena è universalmente satura di idrogeno; tuttavia, la stragrande maggioranza probabilmente non è acqua. È più probabile che sia ammoniaca, e potenzialmente alcuni composti organici.

		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedGeneric = Le scansioni del pennacchio creato vaporizzando la superficie indicano diversi silicati ricchi di ferro, tutti pesantemente saturi di ammoniaca.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedOceans = Questo terreno umido è stato impregnato di ammoniaca liquida, secondo la nostra analisi. Ci sono anche alcuni idrocarburi semplici incorporati nel terreno.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfSplashed = Vaporizzare il liquido conferma la quasi totale mancanza di acqua; invece, vengono rilevati solo ammoniaca e idrocarburi a catena corta.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedMountainsAll = La sostanza bianca luminosa che copre questa vetta montuosa sembra essere ghiaccio di ammoniaca.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedCanyonsAll = Rocce ricche di ferro si trovano qui, probabilmente cadute dalle pareti del canyon.
		#LOC_KS_SciDef_dmlaserblastscan_Iomena_SrfLandedLowlands = Le regioni basse di Iomena probabilmente raccolgono nel tempo le rocce più dense e ricche di ferro. Questo aiuterebbe a spiegare l'altissimo contenuto di ferro nel terreno qui.

		#LOC_KS_SciDef_dmSolarParticles_Iomena_InSpaceLow = Tracce di ammoniaca si incastonano nei collettori, ma oltre a quello non c'è molto altro qui. Anche il "vento solare" è scomparso.
		#LOC_KS_SciDef_dmSolarParticles_Iomena_InSpaceHigh = Il "vento solare" di Kcalbeloh è già un po' più debole a questa distanza, poiché anche con le sue dimensioni immense non emette quanto la maggior parte delle stelle.

		#LOC_KS_SciDef_dmSoilMoisture_Iomena_InSpaceLow = Le basse emissioni a microonde aiutano a corroborare l'ipotesi che la superficie di Iomena sia dominata dall'ammoniaca, non dall'acqua.

		#LOC_KS_SciDef_dmRadiometerScan_Iomena_InSpaceHigh = La superficie per lo più grigia di Iomena produce un albedo complessivamente basso, e la sua atmosfera assorbe la maggior parte delle lunghezze d'onda visibili in un modello che indica grandi quantità di gas ammoniaca.

		#LOC_KS_SciDef_dmseismicHammer_Iomena_SrfLandedRocky = La roccia qui risuona bene, dando ai sensori un quadro chiaro della struttura interna di Iomena. Ci sono alcune grandi caverne sotterranee, probabilmente erose dai flussi di ammoniaca liquida, e la maggior parte della crosta sembra essere di composizione rocciosa. C'è sorprendentemente poco ghiaccio d'acqua.
		#LOC_KS_SciDef_dmseismicHammer_Iomena_SrfLandedWet = Il terreno umido (di ammoniaca liquida) e morbido qui non è particolarmente adatto a trasmettere le onde sismiche. Quindi... Cosa, hai preso questo martello e hai subito cercato il terreno più morbido che potessi trovare? Vai semplicemente altrove, Iomena è piuttosto rocciosa.

		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedOceansShallow = Il liquido è sicuramente ammoniaca, ma c'è anche una discreta concentrazione di alcune molecole organiche complesse. Queste potrebbero avere diverse origini potenziali, ma una di queste è effettivamente di natura biologica. Dovremmo andare più in profondità!
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedOceansDeep = La telecamera mostra una sorgente idrotermale... o... come si chiamerebbero nell'ammoniaca. Comunque, sta pompando fumo nero, indicando un certo livello di attività vulcanica presente su Iomena. La vera scoperta è nel campione di ammoniaca: nuovi idrocarburi continuano a formarsi e un microscopio rivela minuscoli organismi che metabolizzano il contenuto del pennacchio di fumo!
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedCraterLakesShallow = Molecole organiche complesse galleggiano sul lago di ammoniaca e suggeriscono la potenziale esistenza di vita su Iomena, nonostante il freddo e l'ambiente tossico. Se qualcosa vive qui, troverebbe probabilmente la nostra casa troppo calda.
		#LOC_KS_SciDef_dmbathymetryscan_Iomena_SrfSplashedCraterLakesDeep = La parte più profonda di questo lago rivela la formazione continua di idrocarburi nella regione più profonda e calda del pianeta. Anche composti di zolfo e fosforo fluttuano nell'acqua, implicando un'attività vulcanica limitata altrove. Uno sguardo più ravvicinato con un microscopio conferma i nostri sospetti: i microrganismi stanno effettivamente utilizzando i volatili e li convertono in idrocarburi!

		#LOC_KS_SciDef_dmbiodrillscan_Iomena_SrfLandedRocky = La roccia qui contiene tracce di materia organica, ma non ci sono altri segni di attività biologica.
		#LOC_KS_SciDef_dmbiodrillscan_Iomena_SrfLandedWet = Una concentrazione sostanziale di molecole organiche ed elementi volatili, principalmente zolfo e fosforo, viene rilevata in questo campione di carota.

		// Uleg
		#LOC_KS_SciDef_dmMagScan_Uleg_SrfLanded = Anche sulla sua superficie, il campo magnetico di Uleg è debolissimo.
		#LOC_KS_SciDef_dmMagScan_Uleg_InSpaceHigh = Nessun campo magnetico viene rilevato a questa altitudine. È probabile che Uleg manchi di un nucleo ferro-nichel, poiché la sua orbita estrema dovrebbe fargli subire forze di marea significative.

		#LOC_KS_SciDef_rpwsScan_Uleg_InSpace = L'ambiente al plasma radio varia drammaticamente a seconda della posizione di Uleg nella sua orbita. Vicino all'apobeloh è molto tranquillo. Ma al peribeloh, il "vento solare" da Kcalbeloh può essere avvertito; anche se appena.

		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowGeneric = La superficie craterizzata di Uleg ricorda un po' troppo il gelato biscotti e crema. Quando il pubblico vedrà queste foto, saliveranno.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowCrater = Questo è un cratere davvero notevole. È così eroso però, che ci è voluto un po' per identificarlo come tale.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowRiftValleys = Questo canyon massiccio si estende sulla superficie di Uleg, formando un circuito gigante fino al polo nord. Sarebbe un fantastico percorso per corse aeree, se non fosse per l'atmosfera estremamente sottile. Maledetta sorte! Beh... Forse per i VERI temerari funzionerebbe ancora. C'è anche la possibilità di corse a terra!
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowBasins = L'ampio bacino aperto sembra avere un terreno molto piatto. Potrebbe essere un buon posto per costruire una base, se ti fa piacere. Ma con l'orbita assurda di Uleg, ci sono probabilmente posti migliori.
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceLowMountains = Piccole montagne punteggiano la superficie di Uleg come briciole di biscotto al cioccolato in un vasto oceano di gelato alla vaniglia. Accidenti, ora hai di nuovo fame!
		#LOC_KS_SciDef_scopeScan_Uleg_InSpaceHigh = Questa blanet opaca sembra scintillare nell'oscurità come una pallina di dessert irresistibile. Praticamente ti supplica di avvicinarti...

		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceLow = L'analisi superficiale indica che la superficie di Uleg è composta principalmente di ghiaccio d'acqua.
		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceLowMountains = I dati delle immagini delle montagne più scure di Uleg mostrano che la superficie è ancora ghiaccio d'acqua. È probabile che una diversa struttura cristallina spieghi il suo colore più scuro.
		#LOC_KS_SciDef_dmImagingPlatform_Uleg_InSpaceHigh = La sottile atmosfera di Uleg sembra essere composta principalmente di azoto secondo l'analisi a largo spettro, con quantità significative di metano e anidride carbonica.

		#LOC_KS_SciDef_dmSIGINT_Uleg_InSpaceLow = La sottile e calma atmosfera di Uleg e la distanza da Kcalbeloh risultano in un ambiente radio piuttosto poco interessante.

		#LOC_KS_SciDef_dmNAlbedoScan_Uleg_SrfLanded = Il segnale neutronico chiaro e a bassa energia conferma che la maggior parte della superficie di Uleg è fatta di ghiaccio d'acqua. Gelido!

		#LOC_KS_SciDef_dmlaserblastscan_Uleg_SrfLandedGeneric = L'analisi chimica della superficie ghiacciata di Uleg mostra che la maggior parte della blanet è ricoperta da un sottile strato di ghiaccio d'acqua duro e fragile, con ghiaccio molto più solido e scuro sotto. Ci sono anche tracce di ghiaccio di metano e anidride carbonica in questo rivestimento superficiale. Potrebbe essere stato depositato qui dai venti gelidi.
		#LOC_KS_SciDef_dmlaserblastscan_Uleg_SrfLandedMountainsCliffs = Questa regione di Uleg ha una colorazione più scura del resto, ma l'analisi mostra che la composizione chimica è ancora per lo più ghiaccio d'acqua, probabilmente di una struttura cristallina diversa dallo strato sottile che copre il resto della superficie.

		#LOC_KS_SciDef_dmSolarParticles_Uleg_InSpace = Così lontano da Kcalbeloh, il "vento solare" è molto rado, e lo è ancora di più quando Uleg è alto nella sua orbita. Questo significa che non c'è molto per il collettore da processare oltre a tracce di particelle di azoto, probabilmente dall'atmosfera di Uleg.

		#LOC_KS_SciDef_dmSoilMoisture_Uleg_InSpaceLow = Uleg è composto principalmente di acqua secondo le emissioni a microonde, che sono molto forti indipendentemente da quale regione di Uleg sia attualmente sotto.

		#LOC_KS_SciDef_dmRadiometerScan_Uleg_InSpaceHigh = La superficie di Uleg ha un albedo piuttosto alto ovunque negli spettri visibile e IR, tuttavia sembra assorbire fortemente la luce UV. Questo indica grandi quantità di ghiaccio d'acqua in superficie.

		#LOC_KS_SciDef_dmseismicHammer_Uleg_SrfLanded = La superficie fragile e ghiacciata si crepa facilmente quando il martello la colpisce, ma le onde si propagano ancora abbastanza bene. Le letture indicano criovulcanismo attivo in tutto Uleg.

		#LOC_KS_SciDef_dmbiodrillscan_Uleg_SrfLanded = Il campione di carota è pieno di ghiaccio, metano e un po' di anidride carbonica, ma non molto altro. È improbabile che il metano sia di origine biologica.

		// Maelg
		#LOC_KS_SciDef_rpwsScan_Maelg_InSpaceLow = Nonostante il fatto che Maelg stia fondendo deuterio e litio, non sembra che stia sfuggendo dall'oggetto - o almeno, non in quantità significative.
		#LOC_KS_SciDef_rpwsScan_Maelg_InSpaceHigh = Essendo una nana bruna, Maelg non fa davvero vento solare. Tuttavia, l'attività magnetica produce alcune letture interessanti.

		#LOC_KS_SciDef_scopeScan_Maelg_InSpaceLow = Per non essere una stella (tecnicamente), Maelg è piuttosto luminosa da questa distanza. Fortunatamente, il telescopio è dotato di filtri. Cattura immagini ad alta risoluzione delle tempeste arancioni infuriate di Maelg; come una sorta di versione folle di Jool fatta di fuoco!
		#LOC_KS_SciDef_scopeScan_Maelg_InSpaceHigh = Il telescopio riesce facilmente a mettere a fuoco Maelg senza danni grazie alla sua luminosità molto bassa, permettendogli di catturare immagini molto dettagliate dell'oggetto substellare.

		#LOC_KS_SciDef_dmImagingPlatform_Maelg_InSpace = L'analisi spettrale di Maelg corrobora la classificazione precedente come oggetto di tipo L e mostra chiare prove di deuterio e litio fusi rispettivamente in elio-3 ed elio-4.

		#LOC_KS_SciDef_dmSIGINT_Maelg_InSpaceLow = Una vera esplosione di emissioni radio emana da Maelg in ogni momento, mentre il suo interno si agita e scorre violentemente.

		#LOC_KS_SciDef_dmSolarParticles_Maelg_InSpaceLow = Diversi isotopi di elio si depositano nei collettori, ma niente a che vedere con quanto si riceverebbe da una vera stella.
		#LOC_KS_SciDef_dmSolarParticles_Maelg_InSpaceHigh = Come nana bruna di tipo L, la fusione di deuterio e litio di Maelg non produce vento solare rilevabile e i collettori restano vuoti.

		#LOC_KS_SciDef_dmSoilMoisture_Maelg_InSpaceLow = Sono rilevate potenti emissioni a microonde, ma è impossibile che provengano da depositi d'acqua, poiché Maelg è una NANA BRUNA. Nel caso te lo fossi dimenticato. Non un pianeta, né una stella.

		#LOC_KS_SciDef_dmRadiometerScan_Maelg_InSpaceHigh = Maelg emette relativamente poca luce negli spettri visibili, ma è molto più visibile nella gamma IR. In ogni caso, a questa distanza non è difficile da vedere.

		// Mehtna
		#LOC_KS_SciDef_dmMagScan_Mehtna_SrfLanded = Il campo magnetico di Mehtna rimane debole, sebbene facilmente rilevabile, dalla superficie.

		#LOC_KS_SciDef_rpwsScan_Mehtna_InSpace = Poiché l'atmosfera di Mehtna è abbastanza calma, il pianeta manca di un forte campo magnetico e Maelg non emette vento solare significativo, c'è a malapena attività da rilevare qui.

		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowDay = Diverse caratteristiche interessanti sono presenti nell'"iride" marrone scuro di Mehtna, formando motivi unici.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowIce = Fessure meravigliosamente intricate attraversano la superficie di Mehtna nelle regioni illuminate, producendo foto ipnotizzanti.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowNight = Hmm... Sì, è decisamente buio, va bene.
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceLowGrandCrater = La superficie di Mehtna quasi senza crateri rende questo enorme cratere una caratteristica piuttosto impressionante!
		#LOC_KS_SciDef_scopeScan_Mehtna_InSpaceHigh = Il "polo caldo" di Mehtna lo fa sembrare davvero un bulbo oculare, che fissa sempre direttamente Maelg. È un po' inquietante, in realtà.

		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowDayGrandCrater = Le scansioni multispettrali della superficie più scura di Mehtna indicano una superficie per lo più standard di silicati.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowIce = La sostanza bianca sembra essere ghiaccio d'acqua, come previsto dalla nostra analisi precedente della temperatura e dell'atmosfera del pianeta. Nessun liquido è presente perché la sua bassa pressione fa sublimare l'acqua direttamente in gas.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceLowNight = Le scansioni IR mostrano una superficie desolata al "polo freddo" di Mehtna, coperta di crateri e per lo più priva delle fessure viste sul lato visibile.
		#LOC_KS_SciDef_dmImagingPlatform_Mehtna_InSpaceHigh = L'analisi spettrale rivela che l'atmosfera di Mehtna è per lo più anidride carbonica e vapore acqueo; quest'ultimo è probabilmente prodotto dal ghiaccio sublimato sul lato diurno.

		#LOC_KS_SciDef_dmSIGINT_Mehtna_InSpaceLow = Hmm... Purtroppo nient'altro che silenzio radio da Mehtna.

		#LOC_KS_SciDef_dmNAlbedoScan_Mehtna_SrfLandedRock = Le aree più scure di Mehtna sono, forse piuttosto inaspettatamente, per lo più prive di depositi d'acqua. Questo è probabilmente perché a queste temperature e pressioni l'acqua sublima direttamente in gas invece di diventare liquida.
		#LOC_KS_SciDef_dmNAlbedoScan_Mehtna_SrfLandedIce = La superficie congelata qui produce un forte segnale neutronico a bassa energia, confermandola come ghiaccio d'acqua.

		#LOC_KS_SciDef_dmlaserblastscan_Mehtna_SrfLandedRock = L'analisi laser dice più silicati. Evviva! Non è per niente noioso! Per niente...
		#LOC_KS_SciDef_dmlaserblastscan_Mehtna_SrfLandedIce = Tutto sulle proprietà di Mehtna, dalla sua temperatura alla sua atmosfera, dice che potrebbe essere solo ghiaccio d'acqua. Ti lascio indovinare cosa mostra l'analisi chimica.

		#LOC_KS_SciDef_dmSolarParticles_Mehtna_InSpace = Lo spazio vicino a Mehtna è molto vuoto, come in orbita di Maelg. Ma vicino al pianeta ci sono alcune tracce di anidride carbonica.

		#LOC_KS_SciDef_dmSoilMoisture_Mehtna_InSpaceLow = Le emissioni a microonde rendono ovvio che gran parte di Mehtna è coperta da ghiaccio d'acqua, sebbene anche sulle aree più secche rivolte verso il sole (verso la nana?) rimanga un fondo costante. Questo si spiegherebbe bene con il vapore acqueo nell'atmosfera.

		#LOC_KS_SciDef_dmRadiometerScan_Mehtna_InSpaceHigh = La grande macchia scura di Mehtna e la firma di assorbimento UV confermano che è coperta di ghiaccio d'acqua, e gli spettri nella sua atmosfera suggeriscono una composizione maggioritaria di anidride carbonica e vapore acqueo.

		#LOC_KS_SciDef_dmseismicHammer_Mehtna_SrfLanded = Le riflessioni sotterranee mostrano poche prove di attività geologica su Mehtna.

		#LOC_KS_SciDef_dmbiodrillscan_Mehtna_SrfLanded = Il campione di carota rimane deludentemente, ma come previsto, inerte.

		// Meiuqer
		#LOC_KS_SciDef_dmMagScan_Meiuqer_SrfLanded = Controlli il magnetometro per principio. Niente, nemmeno campi magnetici localizzati generati da depositi metallici.

		#LOC_KS_SciDef_rpwsScan_Meiuqer_InSpace = In questo particolare angolino di spazio non c'è quasi precisamente nulla per lo strumento RPWS da rilevare. Quasi nessuna attività radio, nessun plasma solare, niente. Ma lo controlli comunque. Per ogni evenienza.

		#LOC_KS_SciDef_scopeScan_Meiuqer_InSpaceLow = Oh, questa è in realtà una piccola roccia piuttosto adorabile. Vorticoso e marrone, ricorda un buco di ciambella coperto di zucchero di canna.
		#LOC_KS_SciDef_scopeScan_Meiuqer_InSpaceHigh = Mmmm.... Patate spaziali...

		#LOC_KS_SciDef_dmImagingPlatform_Meiuqer_InSpace = È una roccia! So che è una roccia! Non pensi che riconosca una roccia quando la vedo? Passo molto tempo a fissare foto di rocce!

		#LOC_KS_SciDef_dmSIGINT_Meiuqer_InSpaceLow = Le rocce non emettono segnali radio, stupido.

		#LOC_KS_SciDef_dmNAlbedoScan_Meiuqer_SrfLanded = Sai, quando mi sono iscritto per supervisionare le missioni spaziali, mi aspettavo di vedere molte esplosioni. Non fissare una telerimetria noiosa tutto il giorno.

		#LOC_KS_SciDef_dmlaserblastscan_Meiuqer_SrfLanded = sno sulla tua roccia, lazrin le tue rocce.

		#LOC_KS_SciDef_dmSolarParticles_Meiuqer_InSpace = Per un momento, avresti potuto giurare che il collettore di particelle solari stesse russando.

		#LOC_KS_SciDef_dmSoilMoisture_Meiuqer_InSpaceLow = Nessuna lettura a microonde, tranne le letture dal forno a microonde al centro spaziale: l'interno che monitora il flusso sta riscaldando degli spaghetti piccanti.

		#LOC_KS_SciDef_dmRadiometerScan_Meiuqer_InSpaceHigh = Meiuqer ha un albedo molto basso a causa della sua superficie scura, un fatto peggiorato dall'estrema debolezza della luce proveniente da Maelg.

		#LOC_KS_SciDef_dmseismicHammer_Meiuqer_SrfLanded = Come asteroide "mucchio di macerie" a bassa densità, Meiuqer è tenuto insieme molto liberamente e alcuni dei detriti dell'impatto hanno senza dubbio raggiunto la velocità di fuga. Questo significa anche che non hai ottenuto dati utili.

		// Sunorc
		#LOC_KS_SciDef_dmMagScan_Sunorc_InSpaceLow = L'asta sembra avere difficoltà a mantenere l'integrità strutturale, poiché sta attualmente venendo convertita in liquido.

		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceLow = Numerose macchie solari vengono rilevate dallo strumento mentre analizza le onde radio emesse dalla superficie di Sunorc.
		#LOC_KS_SciDef_rpwsScan_Sunorc_InSpaceHigh = Questa stella di tipo K emette potenti venti solari, come la maggior parte delle stelle è solita fare. Le interazioni con la magnetosfera di Sedah sono notevoli, poiché le onde radio emesse dal pianeta sono più deboli del previsto per un oggetto delle sue dimensioni.

		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceLow = Beh, è stato uno spreco di soldi. Potresti aver appena rovinato il telescopio orbitale.
		#LOC_KS_SciDef_scopeScan_Sunorc_InSpaceHigh = Pazzo! Stai cercando di distruggere il telescopio? Questo dispositivo è progettato per la fotografia planetaria!

		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceLow = Hai annullato la garanzia.
		#LOC_KS_SciDef_dmImagingPlatform_Sunorc_InSpaceHigh = Beh, era una cattiva idea. Gli strumenti sensibili si sono spenti automaticamente nel momento in cui sono stati puntati su Sunorc, e potrebbero essere stati danneggiati.

		#LOC_KS_SciDef_dmSIGINT_Sunorc_InSpaceLow = Come la maggior parte delle stelle, Sunorc emette onde radio in uno spettro ampio. I picchi di attività radio sembrano correlarsi con la formazione e il movimento delle macchie solari.

		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceLow = La densità schiacciante del vento solare costringe il dispositivo a spegnersi, impedendo la raccolta di dati utili. Si spera che non sia danneggiato.
		#LOC_KS_SciDef_dmSolarParticles_Sunorc_InSpaceHigh = Il vento solare di Sunorc è tipico per una stella, sebbene sia un po' più debole di una stella di tipo G come Kerbol.

		#LOC_KS_SciDef_dmSoilMoisture_Sunorc_InSpaceLow = Forse sarebbe meglio non dispiegare attrezzature sensibili per rilevare le emissioni a microonde in orbita stellare bassa. Forse. Eventualmente.

		#LOC_KS_SciDef_dmRadiometerScan_Sunorc_InSpaceHigh = Sunorc emette molta luce nella maggior parte delle lunghezze d'onda registrate, tuttavia, come stella di tipo K (o nana arancione) emette considerevolmente meno luce blu e UV di una stella di tipo G (o nana gialla) come Kerbol. A causa della sua temperatura più bassa, questi tipi di stelle possono vivere miliardi di anni in più delle nane gialle.

		// Sedah
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceLow = Il vento solare investe duramente l'atmosfera gonfia di Sedah, producendo strani segnali dall'interno del pianeta. Questo suggerisce che una corrente elettrica attraversi il pianeta, che produrrebbe molto calore interno e aiuterebbe a spiegare le sue dimensioni. Tuttavia non deve essere potente come previsto, poiché questa corrente produce solo un campo magnetico che, sebbene potente, è un po' debole rispetto a Jool.
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceHigh = Il plasma energizzato investe Sedah, risultando in un affascinante pattern ripetuto di onde radio che dovrebbe dare ai ragazzi del laboratorio molti dati da studiare.

		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceLow = Le foto in primo piano rivelano nuvole vorticosi e turbolenti e enormi uragani, alcuni abbastanza grandi da inghiottire interi pianeti!
		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceHigh = Il pianeta brilla a causa del calore intenso della sua atmosfera, facendo brillare debolmente anche il lato oscuro.

		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceLow = La composizione atmosferica suggerisce che il pianeta avrebbe normalmente potuto avere una colorazione più cremosa, ma grazie al calore estremo brilla di un rosso opaco.
		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceHigh = Sedah irradia calore molto intensamente, facendola emettere molta più luce infrarossa di quanto un pianeta gassoso farebbe normalmente.

		#LOC_KS_SciDef_dmSIGINT_Sedah_InSpaceLow = Le emissioni radio da Sedah sono estremamente varie e immensamente potenti, probabilmente a causa delle complesse interazioni tra il vento solare e i suoi processi interni.

		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceLow = Sul lato notturno, vengono rilevate particelle traccia di idrogeno ed elio orbitando attraverso l'enorme esosfera di Sedah. Sul lato diurno, il collettore è bombardato da particelle cariche del vento solare.
		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceHigh = Non viene rilevato molto oltre al vento solare qui, sebbene ci siano lievi tracce di idrogeno ed elio ordinari che diventano più comuni orbitando dietro Sedah.

		#LOC_KS_SciDef_dmSoilMoisture_Sedah_InSpaceLow = Le forti emissioni a microonde rilevate in orbita di Sedah sono, senza dubbio, prodotte dai meccanismi interni del pianeta.

		#LOC_KS_SciDef_dmRadiometerScan_Sedah_InSpaceHigh = Una lettura termica intensa viene registrata dalle scansioni di Sedah, anche sul lato notturno. Questo è chiaramente causato dalla temperatura ridicolmente alta del pianeta gigante.

		// Suluco
		#LOC_KS_SciDef_dmMagScan_Suluco_SrfLanded = Suluco sembra avere un debole campo magnetico dalla superficie, il che significa che non offre tanta protezione dal vento solare quanto sarebbe ideale. Tuttavia, la vita sulla fascia crepuscolare persiste comunque, poiché l'esposizione al sole è limitata lì comunque.
		#LOC_KS_SciDef_dmMagScan_Suluco_InSpaceHigh = A questa distanza, il campo magnetico di Suluco è molto debole. Non sembra estendersi molto lontano sopra la superficie.

		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceHigh = La magnetosfera relativamente debole di Suluco non devia molto il vento solare di Sunorc, ma sembra fare abbastanza per proteggere la vita sulla superficie.
		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceLow = L'analisi delle onde al plasma indica un anello diffuso di particelle cariche intorno all'equatore di Suluco; segni di una debole fascia di Van Kerman.

		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceHigh = Anche se chiamato pianeta "occhio", Suluco non assomiglia davvero a un occhio. Il netto contrasto tra il suo cosiddetto "polo caldo" e la fascia crepuscolare è però impressionante.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDay = Il lato diurno di Suluco è quasi accecante di luminosità, e sembra secco come un osso. Infinite distese di dune di sabbia ondulate caratterizzano la regione.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDayPole = Il punto substellare è accecante; riflette molta luce e sembra così caldo che probabilmente potresti cuocere le uova sopra. Anche le nuvole sembrano essere state vaporizzate.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowNight = Non si vede nulla.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowTwilight = Le strette regioni temperate di Suluco hanno colline verdi ondulate e oceani aperti. Noti in diverse foto che le nuvole ruotano attorno ai poli diurno e notturno, piuttosto che all'asse di rotazione del pianeta.
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowWater = Gli oceani di Suluco sono confinati in una stretta striscia lungo il terminatore giorno-notte, proprio come la vita. Le correnti oceaniche in queste regioni sono diverse da tutto ciò che i Kerbal hanno mai visto prima.

		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceHigh = Una scansione completa dell'atmosfera di Suluco negli spettri UV e IR rivela che è composta principalmente di azoto e ossigeno, come previsto.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDay = Il lato diurno di Suluco riflette la luce direttamente verso Sunorc, riflettendo molta luce sia negli spettri UV che IR.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDayPole = Il punto substellare riflette di gran lunga la maggior parte della luce solare, causando un picco evidente nelle letture IR.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowNight = L'acquisizione infrarossa permette uno sguardo più chiaro al lato notturno di Suluco. La topografia è, stranamente, ampiamente simile al lato diurno, in quanto è largamente dominata da colline e montagne. Interessante però che il lato notturno di Suluco sia anche coperto di crateri.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowTwilight = I gas traccia rilevati durante l'analisi mostrano chiari segni di attività biologica in corso nella fascia crepuscolare, sebbene si esauriscano nel tempo più ci si addentra nel lato diurno o notturno.
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowWater = L'acquisizione termica rivela la topografia sottomarina degli oceani di Suluco. Data la sua geografia insolita, ci sarà molto da studiare qui.

		//Solo Suluco (non Homeswitch)
		#LOC_KS_SciDef_dmSIGINT_Suluco_InSpaceLow = Il vento solare produce un'attività di onde radio leggermente interessante, ma non c'è davvero nulla di straordinario.

		//Solo Suluco Homeswitch
		#LOC_KS_SciDef_dmSIGINT_SulucoHome_InSpaceLow = Le scansioni radio captano trasmissioni sparse da varie colonie e strutture in superficie. Alcuni piccoli avamposti sono persino situati abbastanza lontano in entrambi gli emisferi diurno e notturno. I Kerbal non sono qui da molto tempo, ma in quel periodo abbiamo già iniziato a far sentire Suluco come casa. Se sintonizzi bene, puoi persino captare l'ultima partita di palla a testa!

		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDay = Le tracce di idrogeno sotterraneo sono praticamente inesistenti qui. Solo minuscole tracce esistono in punti di ombra permanente.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDayPole = Al punto substellare, la superficie non è secca come un osso: almeno quelli hanno UN PO' d'acqua. L'unico idrogeno qui sembra consistere di tracce depositate dal costante vento solare.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedDesert = C'è un po' di idrogeno in questa regione, indicando acqua sepolta un po' sotto la superficie. È secco, ma sopravvivibile.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedNight = Secondo le scansioni di idrogeno... o, ehm, le scansioni visive, il ghiaccio d'acqua solido copre ogni superficie sul lato notturno. La neve gelida soffia e scorre come sabbia nelle lande senza luce.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedTwilight = Concentrazioni molto elevate di idrogeno si trovano nel terreno della fascia crepuscolare, per lo più acqua ovviamente. La maggior parte dell'acqua liquida del pianeta si trova qui.
		#LOC_KS_SciDef_dmNAlbedoScan_Suluco_SrfLandedWater = La superficie estremamente umida qui contiene naturalmente molto idrogeno e assorbe la maggior parte dei neutroni. Speri di non stare inquinando l'oceano o qualcosa del genere.

		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedTwilight = Composti di carbonio dal fogliame oltre a diversi tipi di roccia sono rilevati nelle emissioni.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDesert = Questo deserto arido mostra ancora chiari segni di vita, poiché vaporizzare lo strato superiore di roccia rivela minuscoli tunnel scavati da insetti alieni e le radici di un tipo di erba resistente.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedDay = La superficie sbiancata dal sole non ha componenti organici apprezzabili; è tutta sabbia e roccia.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNight = Nell'oscurità del lato notturno si trovano solo ghiaccio d'acqua e tracce di vari minerali. Anche le montagne sono coperte da spessi ghiacciai permanenti solidi come la roccia.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfLandedNightCraters = Questo cratere da impatto contiene significativamente più composti minerali e metalli in superficie rispetto ai perma-ghiacciai circostanti, quasi sicuramente originati dall'impattatore che ha formato il cratere.
		#LOC_KS_SciDef_dmlaserblastscan_Suluco_SrfSplashedWater = Vaporizzare il fluido conferma che è effettivamente acqua, ma sicuramente non hai bisogno di questo strumento specializzato per determinarlo.

		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceLow = Oltre al vento solare un po' indebolito, particelle di azoto e ossigeno dall'atmosfera di Suluco si incastonano anche nelle piastrine.
		#LOC_KS_SciDef_dmSolarParticles_Suluco_InSpaceHigh = Il debole campo magnetico di Suluco fa poco per fermare il vento solare dall'impattare le piastrine; l'ambiente qui non è molto diverso dallo spazio interplanetario.

		#LOC_KS_SciDef_dmSoilMoisture_Suluco_InSpaceLow = Le emissioni a microonde in banda L sono abbastanza costanti su gran parte della superficie di Suluco, tuttavia quando l'antenna passa sull'emisfero diurno, le letture scendono gradualmente a praticamente zero sopra il punto substellare.

		#LOC_KS_SciDef_dmRadiometerScan_Suluco_InSpaceHigh = L'albedo varia drasticamente a seconda che il sensore veda più dell'emisfero diurno o della fascia crepuscolare; molto più che per la maggior parte dei corpi celesti.

		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedTwilight = Il terreno morbido assorbe alcune delle onde, ma dà comunque un'idea di come la geologia vari tra i lati diurno e notturno di Suluco.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedDay = Il lato diurno sabbioso di Suluco è fantastico nell'assorbire le onde sismiche, quindi non puoi davvero imparare molto qui. Forse avresti più fortuna nelle montagne?
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedNight = La neve è densamente compattata qui, rendendo impossibile ricavare qualcosa di utile dai dati. I ghiacciai montani potrebbero offrire maggiori informazioni.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsDayTwilight = La superficie dura conduce bene le onde sismiche, dandoti ampia opportunità di studiare l'interno di Suluco. Sembra che Suluco sia ancora piuttosto geologicamente attivo, anche se l'attività vulcanica è molto scarsa.
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedMountainsNight = Il ghiacciaio simile alla roccia riflette chiaramente attraverso la crosta di Suluco, mostrandoti prove di massicce caverne sotterranee che potrebbero contenere acqua liquida ed ecosistemi potenzialmente isolati!
		#LOC_KS_SciDef_dmseismicHammer_Suluco_SrfLandedWater = Il terreno sciolto riflette male le onde sismiche, quindi non ottieni molti dati utili.

		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterShallow = Le acque crepuscolari poco profonde di Suluco ospitano un'intera varietà di vita microscopica e macroscopica; ma nessuna è più affascinante delle "colonie" di piante coloniali. Galleggiano in enormi tappeti sulla superficie dell'oceano, con vele massive che catturano sia vento che sole.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedWaterDeep = In profondità sotto la superficie, una vasta gamma di animali colorati navigano il fondale marino. In molti modi sono come la vita su Kerbin, ma molto diversi in altri. Per cominciare, senza ciclo giorno/notte, non c'è migrazione verticale diurna.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanShallow = Le condizioni gelide negli oceani del lato quasi oscuro di Suluco ricordano un oceano artico, ma poiché è così vicino alle acque più calde, la temperatura cambia molto più velocemente e alcuni animali si spostano tra entrambi in poche ore.
		#LOC_KS_SciDef_dmbathymetryscan_Suluco_SrfSplashedColdOceanDeep = La vita marina profonda è molto simile ovunque su Suluco. Essendo isolata dal sole ovunque, la vita qui è difficile da distinguere da quella nelle longitudini più calde.

		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTwilight = Il campione di carota pullula di vita; non una sorpresa considerando il colore verde del terreno qui. Piccoli organismi scavano tunnel nella terra e creano minuscole tane dove allevano i loro piccoli al sicuro.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDesert = Nonostante le condizioni più dure, la vita qui prospera come nei deserti di Kerbin. La sabbia è calda, ma offre anche un bel riparo dal sole cocente per animali astuti e rappresenta un'opportunità sotto forma di risorse inesplorate, se qualcosa fosse abbastanza coraggioso da affrontare il calore.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedTundra = Le tundre crepuscolari di Suluco hanno un bagliore inquietante in ogni momento; appropriato considerando che sembrano fredde come la tomba. Eppure la vita sopravvive qui. Mentre sul lato diurno un insetto potrebbe scavare per sfuggire al sole, qui scavano per intrappolare il calore e restare al caldo. Molti animali nidificano qui perché le condizioni dure offrono anche protezione dai predatori.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDay = Anche se non ti aspetti di trovare nulla, potresti essere sorpreso di vedere che anche qui fuori sopravvivono minuscoli animali, oltre a microrganismi resistenti. Gli animali sono universalmente piccoli e devono passare quasi tutta la vita sottoterra per evitare la luce solare, ma si sono adattati a gestire il calore nelle zone ombreggiate. Poiché il sole non si muove mai, questi punti ombreggiati sono permanenti.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNight = Il lato notturno di Suluco è desolato e implacabile, ma se la vita potesse sopravvivere sui poli di Kerbin, può farlo anche qui. In contrasto con i minuscoli animali del lato diurno, questi sono di solito enormi, per generare quanto più calore corporeo possibile, che immagazzinano in spessi strati di grasso. Alcune specie sono persino note per migrare attraverso brevi tratti del lato notturno per evitare i predatori.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedDayPole = Nonostante la persistenza della vita su Suluco, la scarsa presenza sul lato diurno si esaurisce gradualmente fino a raggiungere il punto substellare, un luogo così caldo, desolato e inospitale che nulla oltre ai microrganismi estremofili può sopravvivere qui. Eppure, nonostante tutto, QUALCOSA vive qui. Non è incredibile?
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedNightPole = Il polo notturno è la parte assolutamente più fredda di Suluco. Da nessuna parte su Kerbin fa così freddo. Eppure... Una specie persiste. Bestie titaniche volano in stormi enormi, navigando da un capo all'altro della fascia crepuscolare attraversando direttamente il lato notturno. Coprono la distanza in pochi giorni, sopravvivendo grazie al loro spesso isolamento e planando nell'aria densa e gelida.
		#LOC_KS_SciDef_dmbiodrillscan_Suluco_SrfLandedWater = Alcuni organismi marini sembrano aver deposto le uova sulla riva qui; una vista comune su tutte le spiagge di Suluco. Grandi invertebrati depongono le uova qui, seppellendole nella sabbia, per proteggerle dai predatori acquatici.

		// Tot
		#LOC_KS_SciDef_dmMagScan_Tot_SrfLanded = Ancora nessuna attività magnetica di cui parlare, oltre a Suluco.

		#LOC_KS_SciDef_rpwsScan_Tot_InSpace = Il vento solare da Sunorc è forte qui, si placa davvero solo quando passi attraverso la coda magnetica di Suluco o l'ombra di Tot.

		#LOC_KS_SciDef_scopeScan_Tot_InSpaceLow = Il telescopio cattura molte minuscole rocce e crateri sulla superficie di Tot con grande dettaglio, ma sembra un po' eccessivo per questo lavoro.
		#LOC_KS_SciDef_scopeScan_Tot_InSpaceHigh = Per essere del tutto giusti con Tot, è una patatina piuttosto carina.

		#LOC_KS_SciDef_dmImagingPlatform_Tot_InSpace = Tot sembra essere un asteroide principalmente roccioso secondo l'analisi multispettrale. Ok, abbiamo finito qui?

		#LOC_KS_SciDef_dmSIGINT_Tot_InSpaceLow = Scusa, niente di interessante qui.

		#LOC_KS_SciDef_dmNAlbedoScan_Tot_SrfLanded = Niente di notevole viene rilevato nelle scansioni della superficie qui.

		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLanded = L'asteroide sembra principalmente roccioso, ma in realtà c'è un po' più metallo qui del previsto. Ulteriori studi, in particolare nelle regioni inferiori, potrebbero rivelarsi illuminanti.
		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLandedLowlands = Le regioni basse di Tot hanno una concentrazione di metallo molto più alta del previsto. Sembra che la composizione di Tot sia un misto di roccioso e metallico. Questo potrebbe spiegare la sua densità insolitamente alta.
		#LOC_KS_SciDef_dmlaserblastscan_Tot_SrfLandedCraters = I crateri da impatto su Tot rivelano parti più profonde dell'asteroide che sono per lo più metalliche. Se l'interno è tutto così, potrebbe essere il motivo per cui ha più del doppio della gravità di Gilly nonostante sia poco meno di un terzo delle sue dimensioni.

		#LOC_KS_SciDef_dmSolarParticles_Tot_InSpace = Il contenuto del vento solare qui non è diverso da quello in orbita di Suluco.

		#LOC_KS_SciDef_dmSoilMoisture_Tot_InSpaceLow = I risultati dell'esperimento... sono troppo noiosi da descrivere, purtroppo.

		#LOC_KS_SciDef_dmRadiometerScan_Tot_InSpaceHigh = La maggior parte della superficie di Tot è scura e assorbe sia la luce visibile che IR, tuttavia le regioni più basse sono marginalmente più riflettenti. Curioso...

		#LOC_KS_SciDef_dmseismicHammer_Tot_SrfLanded = Attento! Lo romperai! No, non il martello, stupido - l'asteroide!
		#LOC_KS_SciDef_dmseismicHammer_Tot_SrfLandedLowlandsCraters = L'impatto risuona più del previsto, dando un quadro chiaro dell'intero interno di Tot. L'asteroide sembra essere stato una volta due: un asteroide metallico e un impattatore roccioso. Questa è la spiegazione più semplice per la composizione molto varia, che va da pietra sciolta e poco risonante a sezioni solide ricche di ferro e nichel che diventano più comuni più in profondità si va. Questo deve essere il motivo per cui Tot è così denso.

		// Sera
		#LOC_KS_SciDef_dmMagScan_Sera_SrfLanded = Le linee di campo magnetico si estendono in ogni direzione sulla superficie di Sera, indicando la chiara presenza di molti potenti campi magnetici locali nelle vicinanze.
		#LOC_KS_SciDef_dmMagScan_Sera_InSpaceHigh = Forte letture magnetiche, anche a questa altitudine, indicano che una potente magnetosfera circonda Sera. È possibile che le forze di marea da Dipuc abbiano aiutato a mantenere attivo il nucleo di Sera, ma è davvero abbastanza vicino per quello?

		#LOC_KS_SciDef_rpwsScan_Sera_InSpaceLow = Un anello di particelle cariche sembra circondare Sera in orbita bassa; inconfondibilmente una pericolosa fascia di Van Kerman.
		#LOC_KS_SciDef_rpwsScan_Sera_InSpaceHigh = Mentre passi attraverso la coda magnetica di Sera, il vento solare già debole si placa significativamente. Altre letture suggeriscono che il campo magnetico di Sera sia piuttosto forte.

		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowLakes = Questi laghi sembrano avere una sorta di colore marrone pesca, come l'atmosfera. A prima vista, non c'è modo di dire se sono acqua o meno semplicemente guardando.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowIslands = Piccole isole sbucano dai laghi massicci - o sarebbero mari interni? Ci si chiede come sia la vista da quelle rive aliene.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowRiftValley = Sembra essere una sorta di rift valley, un tipo di valle formatasi quando la litosfera viene separata a causa della tettonica estensionale. Questa è una prova abbastanza chiara di tettonica attiva su Sera, almeno di qualche centinaio di milioni di anni fa.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowGeneric = Le colline e pianure color pesca di Sera sembrano decisamente appetitose. Ha iniziato a ricordarti fin troppo un frutto.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceLowMountains = Colossali catene montuose si estendono su gran parte della superficie di Sera. Uno sguardo più ravvicinato rivela valli striate e simili a vene che si estendono tra i picchi, formando bellissimi modelli non troppo dissimili da un frattale.
		#LOC_KS_SciDef_scopeScan_Sera_InSpaceHigh = Dall'alto sopra Sera, i suoi anelli sono rivelati in dettaglio nitido. Il colore e la luminosità degli anelli suggerirebbero che siano di composizione rocciosa, forse con un po' di ghiaccio, e probabilmente erano una volta una piccola luna che è stata lacerata. Con il tempo e alcune simulazioni, potremmo riuscire a capire come sarebbe potuta apparire quella luna.

		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceLow = Le scansioni spettrali mostrano che la superficie di Sera contiene elevate quantità di metalli pesanti; in particolare, ferro, alluminio e titanio sono piuttosto prevalenti. Questo aiuta a spiegare il suo colore rosa-marrone.
		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceLowLakes = Lo spettro di assorbimento di questo liquido rende abbastanza chiaro che si tratta di acqua, non di qualche altro fluido.
		#LOC_KS_SciDef_dmImagingPlatform_Sera_InSpaceHigh = L'analisi spettroscopica degli anelli di Sera punta verso una composizione silicea, piuttosto che metallica come il suo pianeta madre. Una possibile spiegazione della discrepanza è che qualunque corpo abbia formato questi anelli fosse un asteroide catturato.

		#LOC_KS_SciDef_dmSIGINT_Sera_InSpaceLow = Pattern radio intricati ma tipici sono generati dalle interazioni tra il vento solare di Sunorc e l'atmosfera di Sera.

		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedLakes = I neutroni ad alta energia producono una risposta chiara che indica che, date la temperatura e la pressione, il liquido deve essere acqua.
		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedLowlandsIslands = Il terreno qui è umido e quindi produce un segnale costante che indica depositi d'acqua sotterranei.
		#LOC_KS_SciDef_dmNAlbedoScan_Sera_SrfLandedRock = La roccia qui è abbastanza asciutta e lo strumento rileva solo tracce di idrogeno sotto la superficie.

		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedLowlands = Le aree più basse e rosa di Sera sembrano essere composte di roccia ricca di ferro, con una buona dose di alluminio e titanio, che diluiscono il colore e gli danno quell'aspetto rosa-marrone.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedMidlandsHighlands = Le aree più scure e elevate di Sera sono povere di alluminio e titanio rispetto alle pianure, il che spiega il loro colore.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedMountains = Le montagne di Sera sembrano essere molto ricche di magnetite naturale, un tipo di minerale di ferro altamente magnetico.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedPeaks = L'analisi mostra che questa sostanza è ghiaccio d'acqua, il che ha senso data l'altitudine.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedPoles = I poli di Sera sembrano mancare di calotte glaciali, ma l'analisi mostra che qui esiste un leggero rivestimento di ghiaccio d'acqua.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfLandedLakesIslands = Il terreno umido qui è ancora ricco di metalli come la maggior parte della superficie, tuttavia c'è anche un'alta concentrazione di acqua.
		#LOC_KS_SciDef_dmlaserblastscan_Sera_SrfSplashed = Le scansioni del liquido confermano che si tratta di acqua, come previsto. Tuttavia, c'è un'alta concentrazione di metalli pesanti e altre tossine; rendendo la presenza di vita estremamente improbabile.

		#LOC_KS_SciDef_dmSolarParticles_Sera_InSpaceLow = Grandi quantità di particelle cariche e tracce di anidride carbonica, azoto e persino alcuni metalli pesanti si incastonano nei collettori. Questa è una prova abbastanza chiara di una fascia Van Kerman, ma le altre particelle devono provenire dall'atmosfera di Sera.
		#LOC_KS_SciDef_dmSolarParticles_Sera_InSpaceHigh = Il vento solare a questa distanza è diventato piuttosto debole, ma è ancora facile raccogliere un buon numero di particelle solari con il concentratore di ioni e le piastrine.

		#LOC_KS_SciDef_dmSoilMoisture_Sera_InSpaceLow = Le forti emissioni a microonde sopra i laghi sono prove abbastanza chiare di acqua in relativa abbondanza su Sera.

		#LOC_KS_SciDef_dmRadiometerScan_Sera_InSpaceHigh = La superficie e i laghi di Sera sembrano assorbire molta luce UV e persino IR a onde corte, suggerendo una superficie ricca di metalli e un'atmosfera piena di anidride carbonica.

		#LOC_KS_SciDef_dmseismicHammer_Sera_Rocky = Le onde sismiche generate dall'impatto rivelano un pianeta geologicamente molto attivo. Le placche continuano a muoversi gradualmente sulla superficie, e una serie intricata di caratteristiche minori può essere formata dalle leggere forze di marea del suo sistema di anelli e di Dipuc.
		#LOC_KS_SciDef_dmseismicHammer_Sera_Wet = Il terreno umido non si dimostra molto favorevole alle riflessioni sismiche e non ottieni molti dati utili. Un punto di osservazione più alto e roccioso potrebbe essere una scelta migliore.

		#LOC_KS_SciDef_dmbathymetryscan_Sera_SrfSplashedShallow = L'analisi chimica non dipinge un quadro roseo. Sebbene il liquido sia acqua, è inondato di metalli pesanti tossici che rendono molto improbabile il sostentamento della vita.
		#LOC_KS_SciDef_dmbathymetryscan_Sera_SrfSplashedDeep = In profondità sotto la superficie dell'acqua, i laghi di Sera non diventano meno tossici. La vita che esiste qui è altamente improbabile.

		#LOC_KS_SciDef_dmbiodrillscan_Sera_SrfLanded = Il campione di carota è assolutamente pieno di metalli pesanti altamente tossici e nulla che potrebbe essere potenzialmente interpretato come una biosignatura. Pazienza.

		// Dipuc
		#LOC_KS_SciDef_dmMagScan_Dipuc_SrfLanded = Le linee di campo magnetico sembrano seguire caratteristiche non visibili sulla sua superficie. Questo potrebbe essere perché roccia magnetizzata fusa sta fluendo in profondità sotto.
		#LOC_KS_SciDef_bothMagScan_Dipuc_InSpaceLow = Dipuc ha un campo magnetico abbastanza sostanziale, anche se non è potente come ci si potrebbe aspettare. Questo potrebbe significare che la sua attività vulcanica è dovuta a una combinazione di un nucleo ancora fuso e forze di marea da Sera.
		#LOC_KS_SciDef_bothMagScan_Dipuc_InSpaceHigh = A questa altitudine, viene rilevata una debole lettura magnetica da Dipuc. Avvicinarsi renderebbe più facile verificare la sua forza esatta.

		#LOC_KS_SciDef_rpwsScan_Dipuc_InSpaceLow = Nello spazio vicino a Dipuc, il vento solare viene notevolmente deviato dal suo rispettabile campo magnetico.
		#LOC_KS_SciDef_rpwsScan_Dipuc_InSpaceHigh = In alto sopra la luna vulcanica, le particelle cariche sono altrettanto comuni che in orbita attorno a Sera.

		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowGeneric = La superficie di Dipuc, segnata da calamità e crateri, deve offrire splendide viste a terra. Non è spesso che si veda una luna senza aria così interessante. Perché, è almeno unica quanto Sera!
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowCraterSouthCraterEast = Gli ejecta da impatto si irradiano da questo cratere come raggi di sole. E WOW, quelle linee si estendono lontano! Qualunque cosa abbia creato questo cratere aveva molta energia.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowCraterWest = Questo cratere considerevole è un po' meno drammatico dei due più grandi, e la mancanza di ejecta da impatto lo dimostra.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowDoubleCrater = Geologicamente parlando, questa non è affatto una formazione improbabile. Ma è comunque interessante vedere come i bordi di questi due crateri si sovrappongono.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowVolcano = I vulcani di Dipuc sono tutti costantemente attivi, e eruzioni minori avvengono abbastanza regolarmente. Il telescopio cattura un pennacchio di gas e polvere a forma di ombrello mentre viene sparato fuori da Dipuc e probabilmente verso l'orbita di Sera.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceLowMountains = Queste pronunciate creste montuose sono chiare come il giorno nel telescopio, e cattura immagini impressionanti delle ombre che proiettano sulla superficie sottostante.
		#LOC_KS_SciDef_scopeScan_Dipuc_InSpaceHigh = Questa luna ricorda un po' una palla di pasta ben impastata. A giudicare dall'attività vulcanica, sembra fare un buon lavoro a cuocersi.

		#LOC_KS_SciDef_dmImagingPlatform_Dipuc_InSpaceLow = Le scansioni UV mostrano un'atmosfera eccezionalmente sottile ricca di zolfo che si libra bassa sulla superficie della luna, probabilmente prodotta attivamente dai suoi vulcani.
		#LOC_KS_SciDef_dmImagingPlatform_Dipuc_InSpaceHigh = L'acquisizione termica mostra che le temperature variano selvaggiamente su Dipuc, fortemente correlate con l'attività vulcanica.

		#LOC_KS_SciDef_dmSIGINT_Dipuc_InSpaceLow = Sorprendentemente, Dipuc sembra emettere deboli onde radio. Sarà probabilmente necessario uno studio a lungo termine per determinare la causa.

		#LOC_KS_SciDef_dmNAlbedoScan_Dipuc_SrfLanded = La superficie di Dipuc sembra essere piuttosto povera di idrogeno secondo le scansioni neutroniche.
		#LOC_KS_SciDef_dmNAlbedoScan_Dipuc_SrfLandedPoles = Tracce di idrogeno sono indicate qui, probabilmente originate da piccole quantità di ghiaccio d'acqua sotterraneo.

		#LOC_KS_SciDef_dmlaserblastscan_Dipuc_SrfLanded = La superficie qui è composta di roccia silicatica ricca di metalli pesanti, suggerendo una composizione simile a Sera e un'origine comune. Si trova sotto forma di roccia vulcanica, naturalmente.

		#LOC_KS_SciDef_dmSolarParticles_Dipuc_InSpaceLow = Il collettore di particelle solari raccoglie tracce di zolfo e vari metalli pesanti, probabilmente sollevati nello spazio dalle innumerevoli eruzioni e messi in orbita dalla gravità di Sera.
		#LOC_KS_SciDef_dmSolarParticles_Dipuc_InSpaceHigh = In alto sopra Dipuc, il vento solare è tutto ciò che il collettore può raccogliere.

		#LOC_KS_SciDef_dmSoilMoisture_Dipuc_InSpaceLow = Deboli emissioni a microonde vengono rilevate dai poli, ma da nessun'altra parte. Dipuc, piuttosto prevedibilmente, è piuttosto asciutto.

		#LOC_KS_SciDef_dmRadiometerScan_Dipuc_InSpaceHigh = La superficie vulcanica piuttosto scura di Dipuc ha un albedo sorprendentemente alto negli spettri non visibili, escludendo le lunghezze d'onda IR.

		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLanded = Dipuc ha una struttura interna complessa. Le scansioni iniziali sembrano suggerire che Dipuc sia modellato sia da un nucleo ancora fuso che dalle forze di marea di Sera.
		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLandedVolcano = È impossibile ottenere una lettura chiara della struttura interna di Dipuc qui a causa del costante brontolio. Questo fornisce comunque dati affascinanti a modo suo.
		#LOC_KS_SciDef_dmseismicHammer_Dipuc_SrfLandedVolcanoVent = E allora. Non finire nella lava.

		// Noi
		#LOC_KS_SciDef_dmMagScan_Noi_SrfLanded = Hmm. No, ancora nessun campo magnetico.
		#LOC_KS_SciDef_bothMagScan_Noi_InSpace = Il carbone non emette un campo magnetico, ignorante!

		#LOC_KS_SciDef_rpwsScan_Noi_InSpace = Il vento solare da Sunorc è estremamente rado a questa distanza, e Noi non sembra avere alcuna influenza su di esso oltre a dividere il flusso come un piccolo sasso in un ruscello gentile.

		#LOC_KS_SciDef_scopeScan_Noi_InSpaceLow = Dove sono finite le stelle?! Oh, è solo Noi. Falso allarme...
		#LOC_KS_SciDef_scopeScan_Noi_InSpaceHigh = Ok, mi arrendo. Cosa dovrei guardare?

		#LOC_KS_SciDef_dmImagingPlatform_Noi_InSpaceLow = Roccia ricca di carbonio e materiali più rocciosi a base di silicati sono rilevati nelle scansioni dettagliate della superficie di Noi.
		#LOC_KS_SciDef_dmImagingPlatform_Noi_InSpaceHigh = L'acquisizione termica rivela quanto sia freddo Noi. È carbonaceo secondo le scansioni, ma avrebbe potuto facilmente essere ghiacciato a questa distanza da Sunorc.

		#LOC_KS_SciDef_dmSIGINT_Noi_InSpaceLow = Do-dodo-do-doooo... Uh, niente. Nessuna attività radio qui.

		#LOC_KS_SciDef_dmNAlbedoScan_Noi_SrfLanded = In un ambiente così calmo largamente privo di neutroni ambientali, si può effettuare una lettura ad alta precisione. Per la sua distanza da Sunorc, Noi è molto carente di ghiaccio.

		#LOC_KS_SciDef_dmlaserblastscan_Noi_SrfLanded = Le scansioni superficiali indicano una superficie estremamente ricca di carbonio sparsa di altri minerali, per lo più silicati.

		#LOC_KS_SciDef_dmSolarParticles_Noi_InSpace = Non è cambiato nulla nelle vicinanze di Noi rispetto allo spazio interplanetario.

		#LOC_KS_SciDef_dmSoilMoisture_Noi_InSpaceLow = Solo emissioni a microonde molto deboli indicano che Noi è sorprendentemente secco per un asteroide così lontano da Sunorc. È possibile che si sia formato più all'interno e sia stato espulso verso il sistema esterno, finendo qui.

		#LOC_KS_SciDef_dmRadiometerScan_Noi_InSpaceHigh = Questo è un asteroide davvero scuro. Noi assorbe fortemente la luce in quasi ogni spettro, avendo persino molto assorbimento UV per un asteroide di tipo C. Il risultato è un oggetto che è appena visibile, specialmente dato che è così lontano dalla sua stella.

		#LOC_KS_SciDef_dmseismicHammer_Noi_SrfLanded = L'asteroide a bassa densità assorbe abbastanza bene le onde sismiche, rendendo i dati piuttosto difficili da raccogliere. Ma non è difficile indovinare come sia l'interno, comunque.

		// Sistema Sime
		#LOC_KS_SciDef_rpwsScan_SimeSystem_InSpaceHigh = Questa parte dello spazio riceve pochissimo vento solare, quindi quasi tutta l'attività radio qui è generata dai due massicci campi magnetici che interagiscono tra loro e con le atmosfere delle altre lune.

		#LOC_KS_SciDef_scopeScan_SimeSystem_InSpaceHigh = La danza intricata che i due corpi eseguono è semplicemente mozzafiato, e un timelapse di foto lo dimostra. Sono come partner in una sorta di gigantesco, fantastico tango celeste.

		#LOC_KS_SciDef_dmImagingPlatform_SimeSystem_InSpaceHigh = L'analisi spettrale di entrambi i corpi mostra prove di molto metano in entrambe le atmosfere. Le spiegazioni per le bande verdi e blu di Simetra sono ancora elusive...

		#LOC_KS_SciDef_dmSolarParticles_SimeSystem_InSpaceHigh = Le particelle del vento solare sono piuttosto rare qui, e il collettore raccoglie solo tracce di azoto, anidride carbonica e biossido di cloro.

		#LOC_KS_SciDef_dmRadiometerScan_SimeSystem_InSpaceHigh = Presi insieme, entrambi i corpi hanno un albedo combinato piuttosto alto. Simeht in particolare è piuttosto brillante.

		// Simetra/Simeht condiviso
		#LOC_KS_SciDef_rpwsScan_SimeBoth_InSpaceHigh = Un ambiente elettrostatico incredibilmente complesso si trova qui tra i due pianeti, mentre le loro magnetosfere e atmosfere interagiscono.
		#LOC_KS_SciDef_dmSIGINT_SimBoth_InSpaceLow = I campi magnetici dei due pianeti giganti producono potenti onde radio dalle loro interazioni, risultando in una cacofonia di rumore radio.
		#LOC_KS_SciDef_dmSolarParticles_SimeBoth_InSpace = I collettori raccolgono tracce di idrogeno, elio e metano mentre Simetra e Simeht danzano l'uno attorno all'altro.

		// Simetra
		#LOC_KS_SciDef_rpwsScan_Simetra_InSpaceLow = Potenti onde radio emettono dall'atmosfera di Simetra, sebbene il leggermente meno massiccio Simeht sia un secondo molto vicino.

		#LOC_KS_SciDef_scopeScan_Simetra_InSpace = Le fasce colorate di Simetra ti fanno chiedere quali composti danno alle longitudini equatoriali quelle striature verdi e gialle.

		#LOC_KS_SciDef_dmImagingPlatform_Simetra_InSpace = La sua atmosfera superiore sembra essere composta principalmente di metano, mentre gli strati inferiori sono in gran parte idrogeno, elio e metano, con tracce di zolfo e biossido di cloro. Questo biossido di cloro potrebbe spiegare le sue fasce verdi, in combinazione con il metano.

		#LOC_KS_SciDef_dmSoilMoisture_Simetra_InSpaceLow = Le emissioni a microonde da Simetra indicano un interno pieno di ghiaccio d'acqua.

		#LOC_KS_SciDef_dmRadiometerScan_Simetra_InSpaceHigh = Nello spettro IR, Simetra emette un po' più di Simeht, indicando temperature più alte e un processo di riscaldamento interno più energetico.

		// Simeht
		#LOC_KS_SciDef_rpwsScan_Simeht_InSpaceLow = L'atmosfera marginalmente meno massiccia di Simeht sembra generare emissioni di onde radio che sono più deboli di un margine simile.

		#LOC_KS_SciDef_scopeScan_Simeht_InSpace = Simeht appare quasi senza caratteristiche nelle immagini telescopiche distanti, tuttavia questa vista ravvicinata rivela le sue fasce equatoriali più chiare, i deboli iperuragani vorticosi sui bordi, e persino le sottili differenze tra le fasce più polari.

		#LOC_KS_SciDef_dmImagingPlatform_Simeht_InSpace = L'atmosfera idrogeno-elio di Simeht contiene anche molto metano, il che aiuta a spiegare il suo colore ciano chiaro.

		#LOC_KS_SciDef_dmSoilMoisture_Simeht_InSpaceLow = Potenti emissioni a microonde segnalano la presenza di grandi quantità di ghiaccio d'acqua in profondità dentro Simeht.

		#LOC_KS_SciDef_dmRadiometerScan_Simeht_InSpaceHigh = Simeht riflette molta luce nello spettro visibile, dandogli un alto albedo.

		// Noira
		#LOC_KS_SciDef_dmMagScan_Noira_SrfLanded = Sulla superficie si possono rilevare piccoli campi magnetici localizzati, ma la luna sembra mancare di un campo magnetico più grande proprio. O quello, o è impercettibile rispetto ai pianeti gemelli, e i dati dovranno essere studiati con maggiore precisione.
		#LOC_KS_SciDef_bothMagScan_Noira_InSpace = I campi magnetici di Simetra e Simeht sovrastano i sensori, e nulla può essere rilevato proveniente da Noira.

		#LOC_KS_SciDef_rpwsScan_Noira_InSpace = Viene rilevata solo l'attività al plasma radio generata da Simetra e Simeht. Tutto ciò che fa Noira è dividere il flusso.

		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowGeneric = La superficie costellata di crateri di Noira è una vista gradita in un sistema pieno di stranezze.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowGrandCrater = "La capacità di distruggere un pianeta è insignificante rispetto al potere del Kraken."
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowCraters = I crateri sono distribuiti uniformemente su tutta la superficie della luna, indicando che non è in rotazione sincrona. Probabilmente è perché Simetra e Simeht si muovono semplicemente troppo.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowRiftValleys = È abbastanza chiaro che le forze di marea devono stare stirando la povera Noira fino al punto di rottura, creando queste enormi valli tettoniche.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceLowBasins = Questi ampi bacini scuri ricordano tempi più semplici, quando il programma spaziale lottava ancora per mettere piede sul Mun.
		#LOC_KS_SciDef_scopeScan_Noira_InSpaceHigh = La piccola palla grigia ricorda la Mun, sia nel colore che nei crateri che segnano la sua superficie. Un cratere proporzionalmente enorme può essere visto su un'estremità della luna, invitando confronti con una certa stazione da battaglia che distrugge pianeti.

		#LOC_KS_SciDef_dmImagingPlatform_Noira_InSpaceLow = Il regolite su Noira ha una composizione simile alla Mun, con alte concentrazioni di silicati e alluminio.
		#LOC_KS_SciDef_dmImagingPlatform_Noira_InSpaceHigh = L'analisi di Noira dall'orbita alta mostra una superficie caotica, costellata di crateri e coperta di depressioni.

		#LOC_KS_SciDef_dmSIGINT_Noira_InSpaceLow = La sorveglianza radio di Noira non rivela nulla di interessante, solo segnali riflessi dai pianeti gemelli.

		#LOC_KS_SciDef_dmNAlbedoScan_Noira_SrfLanded = Idrogeno subsuperficiale è rilevato ovunque su Noira; probabile evidenza di depositi d'acqua.

		#LOC_KS_SciDef_dmlaserblastscan_Noira_SrfLanded = Le scansioni superficiali danno una lettura familiare; una superficie ricca di silicati con abbondante alluminio. Meno familiare è la notevole concentrazione di ghiaccio d'acqua.

		#LOC_KS_SciDef_dmSolarParticles_Noira_InSpace = Le particelle traccia vicino a Noira sembrano essere pressoché le stesse che altrove nel sistema Simetra-Simeht.

		#LOC_KS_SciDef_dmSoilMoisture_Noira_InSpaceLow = Le letture indicano che grandi quantità di ghiaccio d'acqua sono sepolte sotto la superficie della piccola luna, il che potrebbe significare che Noira ha oceani d'acqua sotterranei!

		#LOC_KS_SciDef_dmRadiometerScan_Noira_InSpaceHigh = L'albedo complessivo di Noira è abbastanza simile a quello della Mun, ma la sua pura distanza da Sunorc significa che la sua irradianza assoluta è molto bassa.

		#LOC_KS_SciDef_dmseismicHammer_Noira_SrfLanded = Le riflessioni sismiche mostrano chiaramente evidenza di grandi caverne sotterranee, forse piene di acqua liquida!

		// Norihc
		#LOC_KS_SciDef_dmMagScan_Norihc_SrfLanded = Un debole campo magnetico può essere misurato dalla superficie di Norihc, ma non è nulla di particolarmente impressionante.
		#LOC_KS_SciDef_bothMagScan_Norihc_InSpaceLow = L'attività geologica di Norihc non sembra produrre un forte campo magnetico. Poiché l'attività geologica è probabilmente generata per lo più dalle forze di marea, Norihc probabilmente manca di un nucleo metallico fuso, il che lo spiegherebbe.
		#LOC_KS_SciDef_bothMagScan_Norihc_InSpaceHigh = Gli unici campi magnetici rilevati finora appartengono a Simetra e Simeht.

		#LOC_KS_SciDef_rpwsScan_Norihc_InSpace = Deboli perturbazioni vengono generate mentre le magnetosfere di Simetra e Simeht vengono distorte da Norihc.

		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowGeneric = La superficie fratturata di Norihc appare piuttosto reminiscente di Eeloo, con le sue profonde trincee e pianure più scure.
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowCratersAll = Norihc è segnata da crateri grandi e piccoli, mettendo in discussione quanto sia antica la superficie. Se viene stirata dai due pianeti, perché sembra che la sua superficie non sia cambiata da così tanto tempo?
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceLowCracks = Queste fessure si estendono in profondità nelle spesse calotte glaciali globali di Norihc. Farebbero probabilmente eccellenti circuiti di gara!
		#LOC_KS_SciDef_scopeScan_Norihc_InSpaceHigh = La povera Norihc sembra essere stata maltrattata dalle forze di marea dei suoi pianeti genitori.

		#LOC_KS_SciDef_dmImagingPlatform_Norihc_InSpaceLow = La spettroscopia della superficie conferma che è composta per lo più di ghiaccio d'acqua, con composti tholin parzialmente ghiacciati nelle pianure.
		#LOC_KS_SciDef_dmImagingPlatform_Norihc_InSpaceHigh = L'atmosfera di Norihc è composta principalmente di azoto, con tracce di monossido di carbonio e altri gas.

		#LOC_KS_SciDef_dmSIGINT_Norihc_InSpaceLow = L'attività radio in orbita attorno a Norihc è tranquilla, tranne per il rumore generato da Simetra e Simeht.

		#LOC_KS_SciDef_dmNAlbedoScan_Norihc_SrfLanded = I segnali di idrogeno in questa regione sembrano confermare spesse calotte di ghiaccio d'acqua, con il potenziale di un oceano di acqua liquida molto più in basso.

		#LOC_KS_SciDef_dmlaserblastscan_Norihc_SrfLanded = Il raggio provoca un getto di vapore mentre perfora un buco nella superficie, confermandola come ghiaccio d'acqua.
		#LOC_KS_SciDef_dmlaserblastscan_Norihc_SrfLandedLowlands = Oltre al vapore, la scansione indica anche l'esistenza di composti tholin sulla superficie qui.

		#LOC_KS_SciDef_dmSolarParticles_Norihc_InSpace = Tracce di azoto possono essere trovate in orbita attorno a Norihc, ma altrimenti lo spazio è ancora più vuoto del solito.

		#LOC_KS_SciDef_dmSoilMoisture_Norihc_InSpaceLow = L'acqua è abbastanza comune su tutta Norihc, anche nelle pianure dove la lettura è più debole. Se ci sono oceani liquidi sotto la superficie, questo strumento non è in grado di distinguerli.

		#LOC_KS_SciDef_dmRadiometerScan_Norihc_InSpaceHigh = La sottile atmosfera di Norihc non assorbe molto, permettendo alla superficie brillante di riflettere molta luce nella maggior parte delle lunghezze d'onda tranne l'UV.

		#LOC_KS_SciDef_dmseismicHammer_Norihc_SrfLanded = Le letture sismiche mostrano chiari segni di un oceano liquido sotto la superficie di Norihc. Data la presenza di composti organici, la vita è una possibilità distinta.

		#LOC_KS_SciDef_dmbiodrillscan_Norihc_SrfLanded = Questo campione di carota è per lo più solo ghiaccio, con alcuni composti di tholin che sembrano essere rimasti intrappolati dentro dopo la formazione. Se c'è un oceano sotterraneo su Norihc, il trapano non può raggiungerlo.

		// Noyreg
		#LOC_KS_SciDef_dmMagScan_Noyreg_SrfLanded = Il campo magnetico di Noyreg non sembra cambiare molto sulla superficie.
		#LOC_KS_SciDef_bothMagScan_Noyreg_InSpaceLow = Per un oggetto così grande con tanta gravità, il campo magnetico di Noyreg è piuttosto debole. Questo potrebbe essere dovuto a una combinazione di un nucleo ricco di ferro per lo più raffreddato e una mancanza di minerali magnetici in superficie.
		#LOC_KS_SciDef_bothMagScan_Noyreg_InSpaceHigh = Un debole campo magnetico viene rilevato dall'alto sopra Noyreg; ed è più debole del previsto. Ulteriori studi potrebbero far luce su questo mistero.

		#LOC_KS_SciDef_rpwsScan_Noyreg_InSpace = La radiazione solare rilascia particelle cariche dalla densa atmosfera di Noyreg, producendo onde al plasma mentre interagiscono con i campi magnetici danzanti dei giganti gemelli.

		#LOC_KS_SciDef_scopeScan_Noyreg_InSpaceLow = Non c'è molto da vedere con tutte le dense nuvole che coprono la superficie. Solo un po' della superficie è visibile, ma tutto ciò che si può distinguere sono alcune alte montagne che sbucano attraverso le nuvole più basse.
		#LOC_KS_SciDef_scopeScan_Noyreg_InSpaceHigh = Che colore affascinante! Sicuramente questo non riaccenderà i vecchi dibattiti sul colore di Jool...

		#LOC_KS_SciDef_dmImagingPlatform_Noyreg_InSpaceLow = Guardando attraverso la fitta copertura nuvolosa si vedono segni di una superficie incredibilmente ricca di carbonio. È possibile che Noyreg sia fatto per lo più di carbonio, ma sarebbe una scoperta eccezionalmente rara!
		#LOC_KS_SciDef_dmImagingPlatform_Noyreg_InSpaceHigh = L'analisi spettroscopica mostra un'atmosfera composta per lo più di anidride carbonica, con il resto azoto, biossido di cloro e gas traccia. Da questa analisi iniziale, la fonte del suo colore verde non è chiara. Potrebbe essere il biossido di cloro, o un tipo senza precedenti di effetto di diffusione. Sono necessari ulteriori studi.

		#LOC_KS_SciDef_dmSIGINT_Noyreg_InSpaceLow = La densa atmosfera di Noyreg crea segnali radio ritmici mentre viene energizzata dalle magnetosfere di Simetra e Simeht.

		#LOC_KS_SciDef_dmNAlbedoScan_Noyreg_SrfLanded = La superficie di Noyreg sembra essere ricca di idrogeno. Ma a queste temperature e pressioni, sono molto probabilmente idrocarburi a catena lunga piuttosto che acqua.

		#LOC_KS_SciDef_dmlaserblastscan_Noyreg_SrfLanded = Il flare prodotto identifica la sostanza come estremamente ricca di carbonio; la maggior parte della composizione è effettivamente carbonio. Questo è molto insolito e sembrerebbe suggerire che Noyreg sia un tipo di oggetto molto raro: una carbonia, o mondo di carbonio.
		#LOC_KS_SciDef_dmlaserblastscan_Noyreg_SrfLandedIceCaps = L'analisi laser conferma la presenza di diversi idrocarburi a catena lunga congelati qui, e non c'è segno di ghiaccio d'acqua.

		#LOC_KS_SciDef_dmSolarParticles_Noyreg_InSpace = Lo spazio vicino a Noyreg contiene tracce di anidride carbonica, probabilmente originate dalla densa atmosfera della luna.

		#LOC_KS_SciDef_dmSoilMoisture_Noyreg_InSpaceLow = Poche emissioni a microonde vengono rilevate da Noyreg, il che sembra significare che ha poca o nessuna acqua.

		#LOC_KS_SciDef_dmRadiometerScan_Noyreg_InSpaceHigh = La densa atmosfera di Noyreg assorbe molta luce UV e IR, e assorbe anche molto dello spettro visibile. Questo potrebbe essere il motivo per cui sembra verde.

		#LOC_KS_SciDef_dmseismicHammer_Noyreg_SrfLanded = La composizione interna di Noyreg rivela che gran parte di essa ha una densità simile al diamante, e se le letture sono corrette ha solo un piccolo nucleo metallico per lo più morto. Questo lo conferma, Noyreg è per lo più fatto di carbonio.

		#LOC_KS_SciDef_dmbiodrillscan_Noyreg_SrfLanded = Il campione di carota è assolutamente pieno di carbonio! Cioè... solo tantissimo carbonio e composti di idrocarburi, nessuno dei quali sembra essere stato formato da attività biologica.

		// Aralc-A
		#LOC_KS_SciDef_rpwsScan_AralcA_InSpaceLow = Lo strumento ha saltato la fusione e sta iniziando a sublimare.
		#LOC_KS_SciDef_rpwsScan_AralcA_InSpaceHigh = Il vento solare proveniente da Aralc-A è estremamente potente, anche a questa distanza.

		#LOC_KS_SciDef_scopeScan_AralcA_InSpace = MY EYES!!!

		#LOC_KS_SciDef_dmImagingPlatform_AralcA_InSpace = La piattaforma di acquisizione si rifiuta categoricamente di esporre i suoi strumenti delicati. Avrai bisogno di uno strumento più specializzato per questo tipo di lavoro.

		#LOC_KS_SciDef_dmSIGINT_AralcA_InSpaceLow = Aralc-A emette quantità estreme di radiazioni nella maggior parte degli spettri, specialmente quelli che questo strumento non può rilevare. Ma sappiamo come sono le stelle blu, giusto? Non avevamo -davvero- bisogno di portare questa cosa pesante fin qui, vero?

		#LOC_KS_SciDef_dmSolarParticles_AralcA_InSpaceLow = Beh, una cosa è certa. La garanzia è decisamente annullata ora.
		#LOC_KS_SciDef_dmSolarParticles_AralcA_InSpaceHigh = Il vento solare di Aralc-A è molto più potente di quanto questo strumento fosse stato progettato, ma tiene botta ammirevolmente.

		#LOC_KS_SciDef_dmSoilMoisture_AralcA_InSpaceLow = Le antenne hanno iniziato ad assomigliare all'acqua molto più da vicino di quanto faccia questa stella.

		#LOC_KS_SciDef_dmRadiometerScan_AralcA_InSpaceHigh = Aralc-A emette molta più luce UV della maggior parte delle stelle più piccole e fredde. Qualsiasi cosa viva in questo sistema stellare dovrebbe essere ben protetta, e non avrebbe troppo tempo per evolversi. Ma, come si dice... "Efil" trova sempre un modo.

		// Anneheg
		#LOC_KS_SciDef_dmMagScan_Anneheg_SrfLanded = La pura quantità di radiazioni qui ha reso la povera asta non funzionale, anche se almeno sta... -per lo più- dritta.

		#LOC_KS_SciDef_rpwsScan_Anneheg_InSpace = Voglio che faccia una stima di quanto plasma solare stia fluendo qui. Poi, prendi quella stima e moltiplicala per cento. Ecco la tua risposta.

		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceLow = Le caratteristiche vorticoshe e vetrose di Anneheg mostrano quanto sia gravemente danneggiata la superficie del pianeta. È improbabile che si sia formato a questa distanza da Aralc-A, altrimenti sarebbe stato obliterato eoni fa.
		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceLowLava = Gli oceani di lava di Anneheg attraversano il pianeta come ferite aperte. Aralc-A sta spazzando via questo mondo.
		#LOC_KS_SciDef_scopeScan_Anneheg_InSpaceHigh = Anneheg è difficile da distinguere nel mare di luce accecante, specialmente con quanto è scura la sua superficie ignea.

		#LOC_KS_SciDef_dmImagingPlatform_Anneheg_InSpaceLow = Le scansioni della superficie di Anneheg indicano vetro vulcanico con un contenuto estremamente alto di metalli; è probabile che questo pianeta sia solo una sottile crosta che copre il nucleo di un pianeta un tempo molto più grande.
		#LOC_KS_SciDef_dmImagingPlatform_Anneheg_InSpaceHigh = Nonostante l'albedo estremamente basso del pianeta, l'irradianza assoluta di Anneheg è ancora alta a causa del vero raggio della morte che viene sparato sulla sua superficie.

		#LOC_KS_SciDef_dmSIGINT_Anneheg_InSpaceLow = Solo l'intensa attività radio da Aralc-A può essere rilevata qui.

		#LOC_KS_SciDef_dmNAlbedoScan_Anneheg_SrfLanded = Le letture di idrogeno superficiale sono sicuramente solo il risultato del vento solare assurdo che lo deposita sulla superficie.

		#LOC_KS_SciDef_dmlaserblastscan_Anneheg_SrfLanded = La superficie di Anneheg è così resistente al calore che il laser non fa nemmeno nulla. Beh, è un fallimento.

		#LOC_KS_SciDef_dmSolarParticles_Anneheg_InSpaceLow = Anneheg sembra perdere massa, a giudicare dalla roccia e dal metallo raccolti dal collettore; soprattutto quando si attraversa la linea crepuscolare.
		#LOC_KS_SciDef_dmSolarParticles_Anneheg_InSpaceHigh = A questa altitudine, viene raccolto solo il vento solare estremo di Aralc-A.

		#LOC_KS_SciDef_dmSoilMoisture_Anneheg_InSpaceLow = Le antenne riescono a malapena a funzionare così vicine ad Aralc-A, ma comunque non rilevano nulla proveniente dal pianeta.

		#LOC_KS_SciDef_dmRadiometerScan_Anneheg_InSpaceHigh = L'irradianza assoluta di Anneheg è molto alta nonostante la superficie estremamente scura, grazie alla sua vicinanza ad Aralc-A.

		#LOC_KS_SciDef_dmseismicHammer_Anneheg_SrfLanded = L'impatto conferma che la composizione di Anneheg è altamente metallica; almeno l'80% dell'oggetto è metallo.

		#LOC_KS_SciDef_dmbathymetryscan_Anneheg_SrfSplashedShallow = Hmm. È strano. Sembra che non ci siamo ancora sciolti.
		#LOC_KS_SciDef_dmbathymetryscan_Anneheg_SrfSplashedDeep = Una Pozione di Resistenza al Fuoco ci aiuterebbe a vedere molto più chiaramente quaggiù.

		// Aralc-B
		#LOC_KS_SciDef_rpwsScan_AralcB_InSpaceLow = Intenso vento solare viene sparato da entrambe le stelle, dando alle antenne parecchio da elaborare.
		#LOC_KS_SciDef_rpwsScan_AralcB_InSpaceHigh = Non sei davvero così lontano da Aralc-B, quindi il plasma solare è già abbastanza denso qui senza nemmeno considerare i contributi di Aralc-A.

		#LOC_KS_SciDef_scopeScan_AralcB_InSpace = Potrebbe essere una nana rossa, ma è comunque una stella. Puntare un telescopio planetario sensibile su di essa è una decisione sbagliata.

		#LOC_KS_SciDef_dmImagingPlatform_AralcB_InSpace = La piattaforma di acquisizione si spegne al rilevamento della luce da Aralc-B. Anche una nana rossa è troppo luminosa per studiarla.

		#LOC_KS_SciDef_dmSIGINT_AralcB_InSpaceLow = Le onde radio emesse da entrambe le stelle sono molto intense, e inizi a dubitare dell'integrità strutturale dell'antenna massiccia.

		#LOC_KS_SciDef_dmSolarParticles_AralcB_InSpaceLow = Le piastrine sensibili hanno iniziato a deteriorarsi rapidamente sotto il calore intenso.
		#LOC_KS_SciDef_dmSolarParticles_AralcB_InSpaceHigh = Il vento solare proveniente da Aralc-B è pressoché uguale a quello di Aralc-A a questa distanza.

		#LOC_KS_SciDef_dmSoilMoisture_AralcB_InSpaceLow = Il dispositivo non tollera il calore e i polimeri avanzati che costituiscono la sua composizione chimica hanno iniziato a decomporsi. In altre parole, la cosa per trovare l'acqua nello spazio si è rotta.

		#LOC_KS_SciDef_dmRadiometerScan_AralcB_InSpaceHigh = Come nana rossa, Aralc-B emette molta luce infrarossa ed è piuttosto opaca negli spettri visibile e UV.

		// Arorua
		#LOC_KS_SciDef_dmMagScan_Arorua_SrfLanded = Dalla superficie, sembra che Arorua abbia un campo magnetico piuttosto forte proprio, che potrebbe arginare un po' la marea di particelle cariche e prolungare la vita della sua atmosfera.

		#LOC_KS_SciDef_rpwsScan_Arorua_InSpace = Le particelle cariche inondano lo spazio intorno ad Arorua, una spiegazione facile e ovvia per la sua atmosfera in ablazione.

		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowGeneric = La superficie di Arorua è per lo più collinare e scura, ma alla luce solare estrema brilla come vetro. Forse parte di essa -è- vetro!
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowSubstellarPoint = Il punto rivolto verso Aralc-B è per lo più senza caratteristiche, ma sapendo che questo è il punto dove tutta la luce solare è concentrata fa meravigliare quanto debba essere caldo lì.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowMountainsAll = Le montagne di Arorua brillano attraverso la bassa atmosfera, messe in risalto contro le pianure più scure.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceLowCliffsAll = Queste scogliere sono piuttosto ripide. Potrebbero essere una buona destinazione turistica.
		#LOC_KS_SciDef_scopeScan_Arorua_InSpaceHigh = Le aurore di Arorua brillano splendidamente sotto, e ti chiedi perché non sia coperta da nuvole più opache. Forse lo era in un momento, ma la luce solare intensa le ha soffiate via.

		#LOC_KS_SciDef_dmImagingPlatform_Arorua_InSpaceLow = Le scansioni IR della superficie di Arorua forniscono una mappa intricata del modo in cui il pianeta viene riscaldato dai suoi due soli.
		#LOC_KS_SciDef_dmImagingPlatform_Arorua_InSpaceHigh = L'analisi spettrale dell'atmosfera di Arorua rivela che è composta principalmente di anidride carbonica, e non molto altro.

		#LOC_KS_SciDef_dmSIGINT_Arorua_InSpaceLow = Mentre l'atmosfera di Arorua si ablate via, genera un diluvio di intensa attività radio.

		#LOC_KS_SciDef_dmNAlbedoScan_Arorua_SrfLanded = I livelli di neutroni di fondo sono piuttosto alti, grazie ad Aralc-B. Questo nonostante l'atmosfera spessa, e rende difficile effettuare una lettura accurata.

		#LOC_KS_SciDef_dmlaserblastscan_Arorua_SrfLanded = Le scansioni laser rivelano una composizione abbastanza tipica per la superficie di un pianeta roccioso, con minerali silicei che costituiscono la maggior parte della superficie.

		#LOC_KS_SciDef_dmSolarParticles_Arorua_InSpaceLow = In orbita bassa attorno ad Arorua, viene raccolta una concentrazione relativamente alta di molecole di anidride carbonica, probabilmente dalla sua atmosfera in ablazione.
		#LOC_KS_SciDef_dmSolarParticles_Arorua_InSpaceHigh = Il vento solare riempie lo spazio vicino ad Arorua, minacciando di iniziare a soffiare via anche il veicolo spaziale!

		#LOC_KS_SciDef_dmSoilMoisture_Arorua_InSpaceLow = Le uniche letture a microonde rilevabili provengono da Aralc-B e Aralc-A.

		#LOC_KS_SciDef_dmRadiometerScan_Arorua_InSpaceHigh = Nonostante la spessa atmosfera di anidride carbonica di Arorua, l'irradianza assoluta è piuttosto alta a causa della sua vicinanza a due stelle. Le enormi aurore scintillanti probabilmente aiutano anche.

		#LOC_KS_SciDef_dmseismicHammer_Arorua_SrfLanded = L'analisi sofisticata del martello suggerisce che Arorua abbia una composizione abbastanza tipica per un mondo terrestre, con una crosta rocciosa e un nucleo metallico parzialmente fuso.

		#LOC_KS_SciDef_dmbiodrillscan_Arorua_SrfLanded = Potrebbe essere improbabile, inverosimile o persino folle, ma prendi comunque un campione di carota senza vita, solo per essere assolutamente sicuro.
		#LOC_KS_SciDef_dmbiodrillscan_Arorua_SrfLandedSubstellarPoint = Senti, non si sa mai, ok? NON SI SA MAI.

		// Ahtpan
		#LOC_KS_SciDef_dmMagScan_Ahtpan_SrfLanded = Dopo un'analisi completa, supponi che mentre il campo magnetico di Ahtpan è relativamente debole, è appena abbastanza forte per tenere a bada i venti solari.

		#LOC_KS_SciDef_rpwsScan_Ahtpan_InSpaceLow = Il campo magnetico proveniente da Ahtpan è sostanzialmente più forte qui, abbastanza per trasformare la tempesta figurativa di particelle cariche in solo una burrasca gestibile.
		#LOC_KS_SciDef_rpwsScan_Ahtpan_InSpaceHigh = I pattern delle onde radio indicano una chiara distorsione nell'ambiente magnetico qui; questo è probabilmente il lavoro di un campo che circonda Ahtpan.

		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowGeneric = Ahtpan sembra un mondo desertico uscito da un film di fantascienza. Ma nessun autore di fantascienza finora è stato così ispirato da immaginare oceani di petrolio! La verità è più strana della finzione, sembra - e forse anche più impressionante. Meno combattimenti spaziali, però...
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowMountains = Le montagne di Ahtpan si distinguono con tonalità più rossastre, fornendo un bel contrasto con il resto della superficie beige.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowNaphthaOceansCoast = Queste foto ci assicureranno sicuramente molti finanziamenti dall'industria petrolifera.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowIslands = Tutto può essere comprato e venduto per il giusto OOOIIIILLLLL!
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceLowCraters = Ahtpan ha un'atmosfera decentemente spessa, quindi i pochi impattatori che riescono a passare devono essere grandi. La dimensione di questi crateri ne è la prova.
		#LOC_KS_SciDef_scopeScan_Ahtpan_InSpaceHigh = La prospettiva di un intero pianeta coperto da oceani di oro nero era troppo allettante da lasciarsi sfuggire. Quindi punti il telescopio su Ahtpan e inizi a scattare foto.

		#LOC_KS_SciDef_dmImagingPlatform_Ahtpan_InSpaceLow = L'analisi spettrale è inconfondibile: quelli sono oceani di nafta. Interi mari di prezioso "explodium" attendono lo sfruttamento, sia per ISRU che per profitto!
		#LOC_KS_SciDef_dmImagingPlatform_Ahtpan_InSpaceHigh = L'atmosfera di Ahtpan è composta principalmente di anidride carbonica, ma ci sono anche concentrazioni molto elevate di vapori di idrocarburi in molte regioni.

		#LOC_KS_SciDef_dmSIGINT_Ahtpan_InSpaceLow = La sorveglianza radio non rileva altro che statica durante le scansioni di Ahtpan. È perfetto: nessuna operazione estrattiva aliena significa che abbiamo il pianeta tutto per noi! Prima arrivato, prima servito, eh, ET?

		#LOC_KS_SciDef_dmNAlbedoScan_Ahtpan_SrfLanded = Anche sulla terraferma, il sensore rileva molti depositi di idrogeno. Anche il terreno è ricco di questa roba!
		#LOC_KS_SciDef_dmNAlbedoScan_Ahtpan_SrfSplashed = Una firma di idrogeno molto forte conferma le nostre speranze più selvagge: che la superficie di Ahtpan sia coperta da oceani di nafta.

		#LOC_KS_SciDef_dmlaserblastscan_Ahtpan_SrfLanded = L'analisi chimica della superficie sabbiosa rivela una composizione per lo più silicea, con molti idrocarburi sparsi ovunque.
		#LOC_KS_SciDef_dmlaserblastscan_Ahtpan_SrfSplashed = La sostanza reagisce violentemente al laser e combuste! Sì, è petrolio.

		#LOC_KS_SciDef_dmSolarParticles_Ahtpan_InSpaceLow = Il vento solare è un po' più rado qui, e lo strumento raccoglie tracce di anidride carbonica e idrocarburi.
		#LOC_KS_SciDef_dmSolarParticles_Ahtpan_InSpaceHigh = Ahtpan viene bombardato abbastanza duramente da Aralc-A, ma il vento solare è un po' meno intenso qui rispetto allo spazio interplanetario, implicando l'esistenza di un campo magnetico moderatamente forte.

		#LOC_KS_SciDef_dmSoilMoisture_Ahtpan_InSpaceLow = Le emissioni a microonde da Ahtpan sono molto deboli, indicando che la sostanza sulla sua superficie non è acqua.

		#LOC_KS_SciDef_dmRadiometerScan_Ahtpan_InSpaceHigh = L'atmosfera di Ahtpan assorbe molte frequenze UV e IR a onde corte, indicando che la maggior parte è probabilmente anidride carbonica. La superficie ha un albedo piuttosto alto, che aiuta a compensare un po' l'effetto serra.

		#LOC_KS_SciDef_dmseismicHammer_Ahtpan_SrfLanded = Le onde sismiche mostrano che l'interno di Ahtpan è ancora piuttosto attivo, e il suo nucleo è molto probabilmente ancora fuso.

		#LOC_KS_SciDef_dmbathymetryscan_Ahtpan_SrfSplashedShallow = La telecamera non può davvero vedere nulla nell'olio denso, ma l'analisi chimica conferma che si tratta di un tipo di nafta.
		#LOC_KS_SciDef_dmbathymetryscan_Ahtpan_SrfSplashedDeep = Non si vede un bel niente, Capitano!

		#LOC_KS_SciDef_dmbiodrillscan_Ahtpan_SrfLanded = Il campione di carota rivela un sacco di nafta, ma non molto altro. Non ci sono segni di attività biologica in corso.

		// Anehta
		#LOC_KS_SciDef_bothMagScan_Anehta_InSpaceLow = Le letture del magnetometro confermano la presenza di multiple fasce di radiazioni Van Kerman in orbita bassa attorno ad Anehta.
		#LOC_KS_SciDef_bothMagScan_Anehta_InSpaceHigh = Il campo magnetico di Anehta è abbastanza tipico per un gigante gassoso, sebbene a causa della sua massa estrema sia uno dei campi magnetici planetari più potenti mai osservati.

		#LOC_KS_SciDef_rpwsScan_Anehta_InSpaceLow = Vengono rilevate potenti e frequenti emissioni di onde radio "whistler da fulmine" da Anehta, suggerendo un'atmosfera caotica con molta attività geomagnetica.
		#LOC_KS_SciDef_rpwsScan_Anehta_InSpaceHigh = Il potente campo magnetico di Anehta cattura e accelera particelle cariche dalle sue due stelle. Questo processo causa impulsi di onde radio ripetuti che corrispondono al suo periodo di rotazione.

		#LOC_KS_SciDef_scopeScan_Anehta_InSpaceLow = I cieli blu sotto creano un quadro piuttosto bello e catturi le sue massicce torri di vapore acqueo in dettaglio spettacolare. Sei certo che Kerbin nella sua interezza potrebbe entrare in alcune di queste tempeste.
		#LOC_KS_SciDef_scopeScan_Anehta_InSpaceHigh = Gli anelli blu-bianchi di Anehta corrispondono abbastanza da vicino al gigante gassoso nel colore, ma come è possibile? Non può essere ghiaccio; Anehta è ben dentro la linea del gelo delle sue stelle. Forse gli anelli sono fatti della stessa materia di Eulb?

		#LOC_KS_SciDef_dmImagingPlatform_Anehta_InSpaceLow = Le scansioni complete delle nubi superiori di Anehta mostrano una composizione principalmente di idrogeno, elio e vapore acqueo.
		#LOC_KS_SciDef_dmImagingPlatform_Anehta_InSpaceHigh = Le scansioni di Anehta indicano che è un gigante gassoso di Classe II secondo il sistema di classificazione Sudarskerb. I suoi brillanti deck nuvolosi superiori blu-bianchi riflettono molta luce visibile, e un forte assorbimento UV indica che sono fatti di vapore acqueo.

		#LOC_KS_SciDef_dmSIGINT_Anehta_InSpaceLow = Anehta emette una sinfonia di segnali radio mentre la sua bassa atmosfera vortica e tempesta, e il vento solare che è riuscito a passare attraverso la sua magnetosfera bombarda inutilmente la sua atmosfera profonda.

		#LOC_KS_SciDef_dmSolarParticles_Anehta_InSpaceLow = Protetti dal vento solare da Anehta, i collettori raccolgono principalmente idrogeno, elio e molecole d'acqua.
		#LOC_KS_SciDef_dmSolarParticles_Anehta_InSpaceHigh = Il vento solare vicino ad Anehta è simile in forza a Kerbin, ma si attenua rapidamente quando il veicolo passa più in profondità nella potente magnetosfera del gigante.

		#LOC_KS_SciDef_dmSoilMoisture_Anehta_InSpaceLow = Viene ricevuto un forte segnale a microonde; un'indicazione che l'atmosfera di Anehta contiene abbondante vapore acqueo.

		#LOC_KS_SciDef_dmRadiometerScan_Anehta_InSpaceHigh = Anehta ha un albedo abbastanza alto, grazie alla sua piacevole colorazione blu-bianca. Forti emissioni termiche, anche sul lato oscuro, indicano molto riscaldamento interno.

		// Enots
		#LOC_KS_SciDef_dmMagScan_Enots_SrfLanded = Enots non sembra generare un campo magnetico. Che sorpresa...
		#LOC_KS_SciDef_bothMagScan_Enots_InSpace = L'unica magnetosfera che lo strumento può rilevare proviene da Anehta.

		#LOC_KS_SciDef_rpwsScan_Enots_InSpace = Enots causa solo lievi distorsioni nella magnetosfera di Anehta come la proverbiale pietra nel fiume divide il suo flusso.

		#LOC_KS_SciDef_scopeScan_Enots_InSpaceLow = La minuscola lunetta sembra che qualcuno abbia preso un grosso pezzo di scisto e l'abbia lanciato in orbita.
		#LOC_KS_SciDef_scopeScan_Enots_InSpaceHigh = Aspetta un minuto! Qualcuno ha seriamente chiamato questa cosa "Enots"? Che tipo di nome è questo? 

		#LOC_KS_SciDef_dmImagingPlatform_Enots_InSpace = L'analisi multispettrale mostra che Enots è composto principalmente di minerali silicati scuri.

		#LOC_KS_SciDef_dmSIGINT_Enots_InSpaceLow = Gli unici segnali radio qui provengono da Anehta.

		#LOC_KS_SciDef_dmNAlbedoScan_Enots_SrfLanded = I deboli segnali di idrogeno potrebbero essere spiegati come filamenti dell'esosfera di Anehta raccolti da questa piccola luna.

		#LOC_KS_SciDef_dmlaserblastscan_Enots_SrfLanded = Il laser spazza via una piccola cresta, rivelando una composizione per lo più di roccia silicatica, specificamente calcedonio. Ci sono tracce di ossidi di alluminio che potrebbero essere corindone, il che spiega la leggera sfumatura blu che hanno le regioni equatoriali.

		#LOC_KS_SciDef_dmSolarParticles_Enots_InSpace = I collettori raccolgono moltissime particelle dagli anelli di Anehta, rivelando una composizione per lo più di minerali silicatici e ossidi di alluminio, che potrebbero essere corindone blu.

		#LOC_KS_SciDef_dmSoilMoisture_Enots_InSpaceLow = Enots non sembra generare alcuna emissione a microonde, escludendo la presenza di ghiaccio d'acqua sulla o sotto la sua superficie.

		#LOC_KS_SciDef_dmRadiometerScan_Enots_InSpaceHigh = Enots ha un albedo molto basso, ma l'analisi spettrale non indica la presenza di carbonio. Questo suggerisce un'altra origine per il suo colore nero.

		#LOC_KS_SciDef_dmseismicHammer_Enots_SrfLanded = Le onde sismiche si riflettono bene attraverso la piccola luna, un'indicazione che è piuttosto densa e tenuta insieme bene dalle forze strutturali.

		// Efil
		#LOC_KS_SciDef_dmMagScan_Efil_SrfLanded = Il magnetometro ha catturato il forte campo magnetico di Efil dalla superficie, mostrando come le linee di campo si allineano perfettamente con l'asse di rotazione della luna, come due ballerini in perfetta sincronia tra loro.

		#LOC_KS_SciDef_rpwsScan_Efil_InSpace = L'ionosfera di Efil interagisce con il potente campo magnetico di Anehta, dipingendo un quadro colorato della relazione tra le atmosfere e magnetosfere di questi due mondi - Anehta il protettore, e Efil il bambino sempre ribelle desideroso di dimostrare che... può... deviare il vento solare, uh, da sola? Senti, sto finendo il materiale qui. 

		#LOC_KS_SciDef_scopeScan_Efil_InSpaceHigh = Come una perfetta biglia blu, Efil brilla in sfumature di blu-verde nel telescopio. L'immagine non può davvero catturare la bellezza di Efil, ma può almeno preservarne una frazione.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowWater = Gli oceani di Efil brillano alla luce dei due soli, illuminati in ciano brillante come un'illustrazione uscita dalla copertina di un classico romanzo di fantascienza.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowRainforests = Dense foreste pluviali di alberi alieni con foglie blu-verdi coprono gran parte della superficie del pianeta, evocando immagini di un antico Kerbin romanzato, dove bestie colossali vagavano ancora per il mondo - eppure mentre quella versione di Kerbin è da tempo scomparsa, Efil galleggia qui, decisamente tangibile.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowGrassland = Colline verdi ondulate si estendono su Efil nelle regioni basse, punteggiate di aiuole e incorniciate da foreste pluviali come dipinte da un maestro artista.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowTropicalDesert = I deserti tropicali di Efil possono essere meno ospitali della maggior parte del pianeta, ma non sono meno belli. Dune di sabbia si estendono come le colline erbose altrove, senza dubbio percorse da branchi di animali resistenti che abitano il deserto, come testimoniano le lunghe tracce lasciate nella sabbia.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowNeedleleafForests = Le foreste artiche di Efil sono lussureggianti e piene di vita come i climi più caldi, coperte da vaste distese di natura selvaggia e ricoperte di neve.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowTundraColdDesert = Le regioni fredde e sterili di Efil sono alcuni degli unici luoghi privi della bellezza che avvolge il resto del pianeta. Invece, sono sterili e per lo più senza vita; alcune delle ultime zone di desolazione sul mondo brulicante di Efil.
		#LOC_KS_SciDef_scopeScan_Efil_InSpaceLowMountainsSnowMountains = Le vette di Efil si affacciano sopra le nuvole, come per avere una vista migliore del magnifico paesaggio che le circonda. Senza dubbio non vive molto lassù, ma c'è una sorta di pace in questo, no? In piedi in cima a una tale vetta, si sentirebbe sicuramente solo tranquillità.

		#LOC_KS_SciDef_dmImagingPlatform_Efil_InSpaceHigh = La vasta tappezzeria di colori di Efil si estende ben negli spettri non visibili, riempiendo una vera e propria tela di dati per i nostri scienziati da studiare. Quel che è certo è che, come Kerbin, la sua atmosfera contiene principalmente azoto e ossigeno; chiari segni di vita quando combinati con le immagini di Efil dipinte in luce visibile.

		//Solo Efil (non Homeswitch)
		#LOC_KS_SciDef_dmImagingPlatform_Efil_InSpaceLow = La geologia e biologia altamente varie di Efil formano un quadro complesso, raccontando la ricca storia di una luna avvolta nell'abbraccio della vita. Da montagne imponenti a pianure ondulate, giungle dense a profonde fosse oceaniche, Efil ha molto da offrire. I turisti adoreranno questo posto! Lo metto nella brochure turistica.
		//Solo Efil (non Homeswitch)
		#LOC_KS_SciDef_dmSIGINT_Efil_InSpaceLow = L'attività radio dall'atmosfera di Efil racconta le sue interazioni con la magnetosfera di Anehta, ma non c'è nessuno che canta questa canzone. Cioè - non c'è prova di vita intelligente.

		//Solo Efil Homeswitch
		#LOC_KS_SciDef_dmImagingPlatform_EfilHome_InSpaceLow = La geologia e biologia altamente varie di Efil formano un quadro complesso, raccontando la ricca storia di una luna avvolta nell'abbraccio della vita. Da montagne imponenti a pianure ondulate, giungle dense a profonde fosse oceaniche, Efil ha molto da offrire.
		//Solo Efil Homeswitch
		#LOC_KS_SciDef_dmSIGINT_EfilHome_InSpaceLow = L'atmosfera di Efil canta una canzone di magnetismo e - aspetta, taglia le fioriture. Sento l'ultima partita di palla a testa che sta per iniziare, voglio ascoltare!

		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedRainforestsGrassland = Il terreno umido e fertile di Efil è ricco degli atomi di idrogeno delle molecole d'acqua, infondendo vita alle sue grandi foreste e praterie estese.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedTropicalDesert = Anche se la sabbia qui è asciutta, tracce d'acqua continuano a fornire agli abitanti del deserto un ristoro tanto necessario.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedArcticBiomes = Congelato nel ghiaccio e nella neve, il terreno artico fornisce volentieri acqua fresca a chi è disposto a prenderla.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedMountains = Le montagne di Efil sono relativamente asciutte, per lo più prive di vita poiché tali altezze rendono persino Efil incapace di provvedere ai suoi abitanti.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedSnowMountains = Le vette innevate offrono splendide viste, ma costituiscono un terreno povero per la vita. Nonostante l'abbondanza d'acqua, non c'è nulla da bere.
		#LOC_KS_SciDef_dmNAlbedoScan_Efil_SrfLandedBeach = La sabbia umida qui si attaccherebbe alle dita dei piedi, se fossi lì di persona per godertela. Il contenuto di idrogeno ti dice ciò che è già ovvio dal flusso della telecamera; questa spiaggia è regolarmente toccata da acque cristalline che danno la vita.

		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfSplashedWater = Vaporizzare le onde ondulanti conferma che si tratta effettivamente di preziosa acqua liquida rinfrescante, sebbene con una salinità poco appetibile.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedRainforestsGrassland = Le scansioni superficiali mostrano un'abbondanza di idrogeno, non solo nell'acqua ma anche nei composti organici; una testimonianza dell'ecosistema in crescita di Efil.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedTropicalDesert = Il laser penetra in profondità nella sabbia asciutta, rivelando pochissimo idrogeno. Per una regione così arida, ha senso.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedMountains = Le alte altitudini delle montagne di Efil sono carenti sia di acqua che di vita.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedArcticBiomes = Anche le regioni più gelide di Efil pullulano di vita; un sottile strato di neve in superficie nasconde un letto di attività sotto.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedSnowMountains = Anche se si può trovare molta acqua ghiacciata su queste vette innevate, si trova poco altro, poiché queste aree sono troppo remote per far sopravvivere molto.
		#LOC_KS_SciDef_dmlaserblastscan_Efil_SrfLandedBeach = Sembra uno spreco confermare ciò che è già ovvio usando questo strumento costoso... Forse sei semplicemente incredulo che qualsiasi luna possa avere mari così chiari e puliti?

		#LOC_KS_SciDef_dmSolarParticles_Efil_InSpaceLow = Sfiorando lo strato più esterno dell'atmosfera di Efil, lo strumento raccoglie molecole d'acqua oltre al vento solare, un chiaro segno che Efil è tanto un ritiro tropicale quanto sembra.
		#LOC_KS_SciDef_dmSolarParticles_Efil_InSpaceHigh = Elementi più pesanti si depositano nelle piastrine, prova che Efil ha una sorta di fascia Van Kerman propria - quasi come se volesse imprigionare la vita che vive su di essa. Forse Efil non è un ospite così grazioso come si pensava?

		//Solo Efil (non Homeswitch)
		#LOC_KS_SciDef_dmSoilMoisture_Efil_InSpaceLow = Le emissioni a microonde rendono ancora più chiaro che la superficie di Efil è praticamente impregnata d'acqua. Sebbene sembri un'impresa inutile, non bisogna mai dimenticare il falso paradiso gelido che Laythe si è rivelata essere, quindi è saggio verificare.
		//Solo Efil Homeswitch
		#LOC_KS_SciDef_dmSoilMoisture_EfilHome_InSpaceLow = Le emissioni a microonde rendono ancora più chiaro che la superficie di Efil è praticamente impregnata d'acqua. Era già noto, tuttavia, serve come utile calibrazione dello strumento se non altro - e ci ricorda quale falso paradiso Laythe si è rivelata essere, in epoche passate.

		#LOC_KS_SciDef_dmRadiometerScan_Efil_InSpaceHigh = La superficie brillante di Efil è fortemente tinta di una splendida sfumatura ciano dalla sua spessa atmosfera, che assorbe la maggior parte della luce UV e IR vicina.

		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedSandy = La superficie polverosa sotto assorbe molto bene le onde sismiche, resistendo ai tuoi tentativi di scoprire i suoi segreti.
		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedSoily = Il terreno sotto attenua la maggior parte delle onde che lo attraversano, ma sussurra indizi di caverne che si estendono in profondità sotto la superficie.
		#LOC_KS_SciDef_dmseismicHammer_Efil_SrfLandedRocky = Le onde sismiche si propagano bene qui, mostrandoti un quadro più chiaro dell'interno di Efil, anche se con tutte le caverne e gli strati non è nulla di troppo sorprendente.

		#LOC_KS_SciDef_dmbathymetryscan_Efil_SrfSplashedWaterShallow = Un tesoro di fauna bioluminescente nuota nelle calde acque tropicali di Efil, rivelato in grande dettaglio dalle acque cristalline.
		#LOC_KS_SciDef_dmbathymetryscan_Efil_SrfSplashedWaterDeep = Le profondità oscure di Efil non sono affatto oscure, poiché la vita marina luminosa punteggia il paesaggio fino all'orizzonte, apparendo come stelle che nuotano attraverso un oceano alieno.

		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedBeach = Nella zona intertidale, un piccolo animale simile a un mammifero fa la sua casa dentro una conchiglia, un incantevole rovesciamento di un concetto familiare da Kerbin e un primo esempio di evoluzione convergente. Usa le conchiglie scartate di altre creature marine come riparo, ma può muoversi sorprendentemente veloce se costretto ad abbandonarla.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedRainforests = Una creatura viscida a quattro arti si dondola da ramo a ramo degli alberi nella fitta chioma, sembrando quasi una sorta di Kraken vertebrato. O almeno, lo sarebbe se non fosse di un colore blu sorprendente. La creatura osserva il tuo veicolo con particolare interesse mentre prendi un campione di terreno e scende dall'albero per dargli un colpetto innocuo prima di ritirarsi rapidamente.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedGrassland = Branchi di bestie tozze con sei zampe e pelle rugosa percorrono le pianure aperte, i loro numeri così grandi che pochi predatori possono sfidarli. Fortunatamente, questo branco non interrompe il processo di campionamento, ma in futuro potrebbe essere prudente scansionare l'area con le telecamere del veicolo più regolarmente.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTropicalDesert = Piccoli animali pelosi scavano nella sabbia per stabilire colonie colossali, creando vaste reti sotterranee di tunnel. Una sorta di organismo bioluminescente simile a un fungo cresce tra i tunnel, che hanno imparato a coltivare e mangiare. Sulla superficie, grandi branchi di erbivori alti dalle lunghe zampe brucano dalle cime degli alberi più alti, e comunicano silenziosamente con strisce che possono lampeggiare con luce brillante.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedNeedleleafForests = Invertebrati delle dimensioni di un Kerbal si confondono nella neve, i loro esoscheletri pallidi e bianchi come l'ambiente circostante. Uno salta fuori verso il veicolo mentre il trapano si estende, ma si ferma prima di toccarlo, sembrando percepire poco calore dal suo esterno rigido e decidendo che non sarebbe un buon pranzo.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedTundra = La tundra di Efil è sterile, ma lontana dall'essere senza vita. Alcuni enormi erbivori migratori possono essere visti qui, ricoperti di folta pelliccia nonostante la loro natura invertebrata. Con le loro lunghe zampe flessibili, possono stare in piedi per quasi triplicare la loro altezza e raggiungere tutti tranne gli alberi più alti.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedColdDesert = I deserti artici hanno pochissimi animali più grandi, ma il terreno sotto pullula di attività. Creature pelose sorprendentemente minuscole, delle dimensioni di insetti, corrono nella neve, scavando tunnel e trovando piante resistenti con radici nutrienti da raccogliere.
		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedMountains = Purtroppo non c'è molto da vedere a questa altitudine. Il terreno è per lo più senza vita alle vette più alte di Efil, tuttavia grandi creature dal becco a lancia con enormi ali possono ancora essere viste appollaiate sulle scogliere. Durante la notte planetaria, quando Efil passa attraverso l'ombra di Anehta, questi animali prendono il volo per catturare creature marine e portarle fin qui per nutrire i loro piccoli affamati.

		// Eulb
		#LOC_KS_SciDef_dmMagScan_Eulb_SrfLanded = Il campo magnetico di Eulb è piuttosto debole, ma non è difficile da rilevare con lo strumento dalla superficie. Inoltre, ci sono diversi campi localizzati più piccoli e più forti nelle vicinanze.

		#LOC_KS_SciDef_rpwsScan_Eulb_InSpace = Il debole campo magnetico di Eulb genera affascinanti distorsioni nel campo magnetico di Anehta mentre orbita il pianeta gigante.

		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowGeneric = Ora, perché è blu? L'abbiamo affrontato? Qualcuno ci sta lavorando? Fai - Fai lavorare qualcuno su questo.
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersSmall = Questo mi dà un "deja blue"... Capito?
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowCratersBig = I crateri più grandi di Eulb sono a volte difficili da distinguere dai mari. Sembrano quasi essere stati erosi, ma l'unica forza che potrebbe fare ciò sarebbero gli impatti di micrometeoriti. Quanto è vecchio Eulb?
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceLowDoubleCrater = Oh, ecco una caratteristica interessante. Sembrano essere due crateri da impatto annidati - uno più grande e uno più piccolo. Il cratere più interno sembra essere il più giovane dei due.
		#LOC_KS_SciDef_scopeScan_Eulb_InSpaceHigh = Una luna blu... Bene. Jeb, è ora di tirare fuori il costume da pollo.

		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceLow = Le scansioni spettroscopiche della superficie di Eulb mostrano un forte assorbimento IR quasi ovunque sulla superficie della luna. Questo implica il corindone blu, comunemente noto come zaffiro, come responsabile del suo colore blu sorprendente.
		#LOC_KS_SciDef_dmImagingPlatform_Eulb_InSpaceHigh = Un'atmosfera estremamente tenue si attacca alla superficie di Eulb. È troppo sottile per essere rilevata con un barometro.

		#LOC_KS_SciDef_dmSIGINT_Eulb_InSpaceLow = Multiple passate di sorveglianza radio non rivelano nulla di interessante su Eulb.

		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLanded = La scansione non rivela quantità significative di idrogeno sotterraneo su Eulb.
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPoles = I bassi livelli di idrogeno qui possono essere spiegati da depositi di ghiaccio d'acqua sparsi.
		#LOC_KS_SciDef_dmNAlbedoScan_Eulb_SrfLandedPolarCrater = Un segnale di idrogeno abbastanza forte viene rilevato qui, probabilmente perché gran parte dell'area del cratere polare si trova in ombra permanente.

		#LOC_KS_SciDef_dmlaserblastscan_Eulb_SrfLanded = L'analisi chimica della superficie di Eulb mostra che è relativamente povera di silicati, ed estremamente ricca di alluminio e ossigeno. Questo punta al corindone blu come ragione della sua colorazione blu, un materiale comunemente noto come zaffiro.

		#LOC_KS_SciDef_dmSolarParticles_Eulb_InSpace = Il debole campo magnetico di Eulb fa poco per deviare il vento solare, ma Anehta sta facendo comunque molto del lavoro per esso.

		#LOC_KS_SciDef_dmSoilMoisture_Eulb_InSpaceLow = Viene rilevato un debole segnale a microonde, ma solo quando le antenne sono puntate verso i poli.

		#LOC_KS_SciDef_dmRadiometerScan_Eulb_InSpaceHigh = Eulb ha un albedo abbastanza alto. La sua superficie luminosa riflette molta luce in tutte le lunghezze d'onda registrate tranne rosso e infrarosso.

		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLanded = Le scansioni sismiche sono assorbite abbastanza bene dal regolite blu polveroso. Potresti ottenere risultati migliori in una posizione più solida, come un grande cratere.
		#LOC_KS_SciDef_dmseismicHammer_Eulb_SrfLandedCratersBig = L'analisi dell'interno di Eulb rivela una composizione densa, probabilmente altrettanto ricca di ossidi di alluminio come il corindone quanto la superficie. 

		// Elad
		#LOC_KS_SciDef_dmMagScan_Elad_SrfLanded = Le linee di campo magnetico corrono in direzioni strane, sembrando puntare verso una coppia di poli magnetici inclinati di circa 40 gradi rispetto all'asse di rotazione.
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceLow = Elad ha un potente campo magnetico, paragonabile in forza a Kerbin.
		#LOC_KS_SciDef_bothMagScan_Elad_InSpaceHigh = L'interferenza magnetica da Anehta è un po' più debole a questa distanza, e Elad sembra generare un considerevole campo magnetico proprio.

		#LOC_KS_SciDef_rpwsScan_Elad_InSpace = Elad deforma fortemente il campo magnetico di Anehta con il suo potente campo proprio, la coppia dimostrandosi piuttosto efficace nel deviare insieme il vento solare.

		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGeneric = Le terre desolate di Elad sono un netto contrasto con le colline lussureggianti e i mari cristallini di Efil, e un cupo promemoria della fragilità della vita nell'universo.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraters = La natura sparsa di questi crateri rispetto ad altri oggetti, come la vicina Eulb, dà molto peso all'idea che Elad avesse un'atmosfera spessa piuttosto di recente.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterLarge = Elad ha diversi grandi crateri come questo sparsi, tutti sembrano essere caratteristiche abbastanza giovani.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowCraterGiant = Questo enorme cratere è abbastanza grande da poter essere stato responsabile della perdita dell'atmosfera di Elad, ma è impossibile esserne sicuri.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCanyon = Questo canyon è così ripido e così profondo che deve essere stato una volta una fossa oceanica.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowValleys = Elad è coperta da canyon profondi e valli tettoniche che costituiscono una chiara prova di tettonica a zolle attiva nel suo passato.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceLowGrandCliff = Whoa. Ecco una vera scogliera. L'intensa tettonica a zolle deve essere responsabile di una cresta così enorme.
		#LOC_KS_SciDef_scopeScan_Elad_InSpaceHigh = RnD dice che queste strane caratteristiche superficiali possono essere spiegate solo dal fatto che Elad ha recentemente perso un'atmosfera spessa e forse anche oceani. Sembra così desolata... Potrebbe essere davvero vero?

		#LOC_KS_SciDef_dmImagingPlatform_Elad_InSpaceLow = L'analisi spettrale mostra che la superficie ha una composizione simile a Kerbin; ricca di silicati e metalli.
		#LOC_KS_SciDef_dmImagingPlatform_Elad_InSpaceHigh = Le emissioni termiche rivelano segni di riscaldamento interno su Elad, indicando attività geologica attuale.

		#LOC_KS_SciDef_dmSIGINT_Elad_InSpaceLow = Se qualcosa, o qualcuno, ha vissuto una volta su Elad, sono ora in silenzio radio.

		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLanded = C'è un debole segnale di idrogeno qui, ma è difficile determinare se è debole a causa della distanza o di piccole concentrazioni.
		#LOC_KS_SciDef_dmNAlbedoScan_Elad_SrfLandedLowlands = Vengono rilevati alti livelli di idrogeno, ma il segnale è debole dopo aver attraversato molta roccia. Questo potrebbe indicare la presenza di oceani liquidi in profondità sotto terra!

		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedMidlandsHighlands = La superficie desolata di Elad sembra essere chimicamente composta principalmente di silicati, ossigeno e alluminio. Come Kerbin, gran parte della sua superficie è fatta di granito.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedLowlands = Il terreno qui contiene una grande concentrazione di sale, implicando fortemente che fosse una volta il fondo di un mare o oceano di acqua liquida.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCanyon = La superficie densamente compattata in questo canyon è estremamente salata, dando molto peso all'ipotesi che fosse una volta una fossa oceanica profonda.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedGrandCliff = Questa massiccia scogliera sembra contenere diversi tipi di quarzo.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedValleys = Le "valli" di Elad presentano un terreno salato densamente compattato, implicando che molte, se non tutte, fossero un tempo fosse oceaniche profonde. È possibile che Elad fosse un mondo oceanico come Laythe.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCratersCraterLarge = Alte concentrazioni di metalli estranei e composti di carbonio altrimenti rari su Elad forniscono informazioni sulla composizione dell'impattatore che ha prodotto questo cratere.
		#LOC_KS_SciDef_dmlaserblastscan_SrfLandedCraterGiant = Questo massiccio cratere è ricco di metalli pesanti e altri composti normalmente non trovati sulla superficie di Elad, prove che suggeriscono che l'impattatore era molto denso e probabilmente molto pesante.

		#LOC_KS_SciDef_dmSolarParticles_Elad_InSpaceLow = Leggere tracce di azoto vengono rilevate dai sensori in orbita bassa attorno a Elad - forse gli ultimi resti della sua un tempo spessa atmosfera.
		#LOC_KS_SciDef_dmSolarParticles_Elad_InSpaceHigh = Elad sta facendo un lavoro terrificante nel deflettere il vento solare anche a questa altitudine, ma un certo numero di particelle cariche viene raccolto in modo tale da implicare l'esistenza di una cintura di radiazioni Van Kerman.

		#LOC_KS_SciDef_dmSoilMoisture_Elad_InSpaceLow = Orbitare sopra le regioni più basse di Elad rivela un segnale a microonde costantemente forte, con forte implicazione dell'esistenza di oceani sotterranei di acqua liquida. Se Elad ha avuto una volta vita, è del tutto possibile che viva ancora lì sotto!

		#LOC_KS_SciDef_dmRadiometerScan_Elad_InSpaceHigh = La superficie brillante di Elad ha un albedo complessivamente piuttosto alto, favorito dalla misteriosa mancanza di atmosfera della luna.

		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLanded = Le riflessioni sismiche dalle profondità di Elad confermano che il suo nucleo è ancora completamente fuso e il suo mantello è molto attivo.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedLowlands = La composizione apparente di questa regione corrisponde da vicino ai fondali marini di Kerbin, e di conseguenza non trasmette molto bene le onde sismiche.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedGrandCanyonValleys = Questo sembra essere un'antica fossa oceanica, a giudicare dalla composizione e dai segni di compressione sotto tremenda pressione presenti nel terreno qui.
		#LOC_KS_SciDef_dmseismicHammer_Elad_SrfLandedCraterGiant = Le scansioni sismiche di questo massiccio cratere mostrano chiaramente grandi depositi di metalli pesanti densi, indicando che l'asteroide che ha prodotto questo cratere era probabilmente metallico e sarebbe stato abbastanza massiccio da attraversare persino un'atmosfera spessa.

		// Wormhole
		#LOC_KS_SciDef_rpwsScan_Wormholes_InSpace = Il plasma del vento solare alle due estremità del wormhole sembra interagire qui, formando un ambiente di vento solare complesso diverso da qualsiasi cosa tu abbia mai visto prima.

		#LOC_KS_SciDef_scopeScan_WH3141A_InSpace = Puoi quasi vedere un altro pianeta dall'altra parte. Vedi anelli, una stella arancione brillante e... SANTO KRAKEN! È un grande occhio nero che ti fissa?
		#LOC_KS_SciDef_scopeScan_WH3141B_InSpace = La forma verde amichevole di Jool è spalmata attraverso lo spazio, quasi come un dipinto a olio o qualcosa del genere. Puoi vedere anche accenni di Laythe, Vall e Tylo.

		#LOC_KS_SciDef_dmImagingPlatform_Wormholes_InSpace = L'analisi multispettrale prova... chiamiamola "inconclusiva". La luce dal wormhole è così fortemente distorta che rende difficile verificare che le letture che prendi siano accurate.

		#LOC_KS_SciDef_dmSIGINT_WH3141A_InSpaceLow = Strane trasmissioni radio sembrano provenire dall'oggetto. Mentre monitori il flusso, avresti giurato di aver sentito qualcuno dire "Ciao!" e "Volate sicuri". Grazie, misteriosa voce spaziale. Voleremo -sicuramente- in sicurezza!
		#LOC_KS_SciDef_dmSIGINT_WH3141B_InSpaceLow = Monitorando l'attività radio emessa dal wormhole, capti gli echi distorti delle trasmissioni da Kerbin.

		#LOC_KS_SciDef_dmSolarParticles_WH3141A_InSpace = I collettori raccolgono una quantità sorprendente di vento solare in questa posizione; questo probabilmente proviene dall'altra parte del wormhole.
		#LOC_KS_SciDef_dmSolarParticles_WH3141B_InSpace = Il vento solare qui è una combinazione dei venti di Kerbol e Sunorc; anche se le letture da Sunorc sono molto più stabili.

		#LOC_KS_SciDef_dmSoilMoisture_Wormholes_InSpaceLow = Le radiazioni a microonde emanano dal wormhole a un ritmo costante ma basso. È il wormhole stesso responsabile, o qualcosa dall'altra parte le sta generando?

		#LOC_KS_SciDef_dmRadiometerScan_Wormholes_InSpaceHigh = È difficile usare questo strumento quando il minimo movimento farà perdere la messa a fuoco a qualsiasi oggetto che puoi vedere attraverso il wormhole. Forse dovresti solo stringere i denti e passare attraverso?

	}
}
