		#LOC_KS_SciDef_crewReport_Mehtna_SrfLanded3 = В этом маленьком, похожем на Дюну, сепийном мире невозможно не почувствовать утешение и даже некоторую сонливость.
		#LOC_KS_SciDef_temperatureScan_Mehtna_SrfLanded_TempLow = На этой стороне планеты атмосфера частично конденсируется и падает на землю в виде слякоти из-за сильного холода, что мало чем отличается от полюсов Duna, хотя и в гораздо меньшей степени по сравнению с тем миром.
		#LOC_KS_SciDef_temperatureScan_Mehtna_SrfLanded_TempHigh = По эту сторону Mehtna разреженная атмосфера существенно нагревается тусклым Maelgом и доказывает, что ни одна часть этого бесплодного янтарного мира вообще не способна поддерживать жизнь, независимо от горячей или холодной стороны.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded1 = Вы чувствуете, что все вокруг напоминает выцветшую старинную фотографию. Кажется, ваша собственная кожа приобретает нехарактерный янтарный оттенок.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded2 = Стоя на Мехтне, у вас возникает странное ощущение, что этот мир действительно мертв, словно разряженная батарея.
		#LOC_KS_SciDef_evaReport_Mehtna_SrfLanded3 = Сомнительно, что солнечные батареи принесут вам пользу в такой тусклой обстановке.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_SrfLanded1 = Кажется, что слизь одновременно затвердевает и приобретает оттенок сепии, а также слегка сублимируется в разреженной атмосфере.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_SrfLanded2 = Гу больше не излучает внутреннего тепла и кажется таким же безжизненным, как и сама Mehtna.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded1 = Образцы, которые вы собираете, кажутся не совсем структурно прочными после перемещения, как будто они хрупкие из-за столь долгого пребывания в статичном состоянии.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded2 = Эти образцы, несомненно, окажутся полезными, так как они достаточно древние, судя по казалось бы неизменной среде, которой является метнитская поверхность.
		#LOC_KS_SciDef_surfaceSample_Mehtna_SrfLanded3 = Сами образцы представляют собой здоровую смесь субстрата и древних кусков льда.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_SrfLanded1 = В зависимости от ориентации самого отсека летучие образцы в отсеке для материалов циклически переходят от сублимации к замерзанию.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_SrfLanded2 = Образцы (за заметным исключением образца воды, которая быстро выкипает) остаются в основном неизменными, кроме того, кажется, что они лишь незначительно реагируют с окружающей разреженной атмосферой.
		#LOC_KS_SciDef_barometerScan_Mehtna_SrfLanded = Барометр подтверждает разреженность атмосферы Mehtna, хотя также указывает на то, что она немного толще атмосферы Duna. Однако по сравнению с такими планетами, как Rouqea, или даже спутниками, такими как Efil, эта атмосфера не имеет большого значения.
		#LOC_KS_SciDef_seismicScan_Mehtna_SrfLanded = Сейсмическое сканирование показывает, что единственная обнаруживаемая активность на этой одинокой планете вызвана случайными ударами.
		#LOC_KS_SciDef_gravityScan_Mehtna_SrfLanded = Гравитация в этом мире весьма значительна по сравнению с некоторыми другими местами в Солнечной системе и за ее пределами: она составляет чуть более половины гравитации Kerbin. Вы обнаружите, что это золотая середина, позволяющая эффективно исследовать эту могилу мира, не увязая и не улетая слишком далеко на каждом шагу.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_SrfLanded = Атмосферный анализатор показывает, что тонкая атмосфера этой планеты состоит в основном из углекислого газа и водяного пара с изрядным количеством газовых примесей. Mehtna станет главным кандидатом на добычу атмосферных ресурсов!

		#LOC_KS_SciDef_crewReport_Mehtna_FlyingLow = Вы смотрите на странную планету внизу и замечаете, что ее география кажется совершенно чуждой. Вероятно, это вызвано… уникальной солнечной ситуацией, с которой сталкивается Mehtna.
		#LOC_KS_SciDef_temperatureScan_Mehtna_FlyingLow = Температура атмосферы постоянно колеблется в зависимости от того, где корабль находится над поверхностью.
		#LOC_KS_SciDef_evaReport_Mehtna_FlyingLow = Это должно противоречить правилам безопасности программы. К счастью, KSC находится на расстоянии [УДАЛЕНО] в нескольких световых годах, так что им не обязательно об этом знать.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_FlyingLow = Обнаженная Гу колеблется на ветру, но лишь слегка. При этом он сублимируется, оставляя небольшой след пара по мере снижения корабля.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_FlyingLow = Чем дальше вы спускаетесь в атмосферу Мехтны, тем меньше сублимируются летучие образцы; однако они никогда не перестают делать это полностью.
		#LOC_KS_SciDef_barometerScan_Mehtna_FlyingLow = Давление, даже на такой небольшой высоте в буквальном смысле, вверху сосуда заметно меньше, чем внизу.
		#LOC_KS_SciDef_gravityScan_Mehtna_FlyingLow = Точное гравитационное сканирование на этой высоте пока невозможно из-за того, что разреженная атмосфера достаточно существенна, чтобы расшатать судно и вызвать колебания, в результате которых прибор сбрасывается. Однако это, в свою очередь, дает вам приблизительную скорость ветра (и приблизительную статистику гравитации, как и предполагалось)!
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_FlyingLow = Атмосферный анализатор показывает, что тонкая атмосфера этой планеты состоит в основном из углекислого газа и водяного пара с изрядным количеством газовых примесей. Mehtna станет главным кандидатом на добычу атмосферных ресурсов!

		#LOC_KS_SciDef_crewReport_Mehtna_FlyingHigh = Вы смотрите на странную планету далеко внизу и замечаете, что ее география кажется совершенно чужой. Вероятно, это вызвано тем, что вам придется перестать смотреть, так как сила проникновения атмосферы почти заставляет вас удариться головой о внутреннюю часть шлема, если вы продолжаете поворачиваться, чтобы посмотреть в окно.
		#LOC_KS_SciDef_temperatureScan_Mehtna_FlyingHigh = На этой высоте среднюю температуру планеты можно оценить лишь приблизительно из-за того, насколько тонка атмосфера. Однако здесь, наверху, холодно. Шокер, мы знаем.
		#LOC_KS_SciDef_evaReport_Mehtna_FlyingHigh = Вы ПЫТАЕТЕСЬ быть оторванным от трапа корабля сдвигом ветра и брошенным в Kraken-знает-что на скорости 2 Маха?
		#LOC_KS_SciDef_mysteryGoo_Mehtna_FlyingHigh = Слизь сильно содрогается вместе с остальной частью сосуда, при этом кажется, что ее цвет бледнеет до того же коричневатого оттенка, что и все вокруг.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_FlyingHigh = Многие образцы вырываются из-под воздействия атмосферы, но в остальном они еще не реагируют существенно на окружающую среду. Однако вы замечаете, что эксперимент с солнечной энергией в заливе не смог собрать ничего, кроме струйки слабого света Maelgа… прежде чем его вытряхнули и выбросили в секцию тяжелых металлов залива, серьезно повредив ее.
		#LOC_KS_SciDef_barometerScan_Mehtna_FlyingHigh = На этой высоте атмосфера слишком разрежена, чтобы что-то делать, кроме как трясти свое судно, пока вы спускаетесь дальше к странному миру бежевого цвета внизу.
		#LOC_KS_SciDef_gravityScan_Mehtna_FlyingHigh = Несмотря на возмущения, вызванные входом судна в метнианскую атмосферу, сила тяжести на поверхности, по оценкам, примерно равна 0,5 G или около того.
		#LOC_KS_SciDef_atmosphereAnalysis_Mehtna_FlyingHigh = Атмосферный анализатор показывает, что тонкая атмосфера этой планеты состоит в основном из углекислого газа и водяного пара с изрядным количеством газовых примесей. Mehtna станет главным кандидатом на добычу атмосферных ресурсов!

