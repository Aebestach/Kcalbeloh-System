		// ******************************** Descripciones de planetas ********************************
		#LOC_KS_Anehta_description = Anehta es un planeta gigante gaseoso que cuenta con un impresionante sistema de anillos planetarios. El planeta se caracteriza por su perpetua cubierta de nubes, dividida en zonas de tonos más claros y cinturones más oscuros. Debido a los patrones de circulación conflictivos de estas zonas y cinturones, el planeta experimenta violentas tormentas y turbulencias.
		#LOC_KS_Ahtpan_description = Ahtpan es un planeta rocoso desértico con océanos compuestos principalmente de nafta. Aunque pueda parecer una buena idea construir una planta petroquímica en la superficie del planeta, el Centro Espacial Kerbal (KSC) advierte a todos los kerbonautas que mantengan sus cascos puestos durante la exploración. ¡Esto se debe a que la atmósfera del planeta emite un fuerte olor a naftalina!
		#LOC_KS_Anneheg_description = Anneheg es un planeta de apariencia oscura similar al carbón que orbita muy cerca de Aralc-A. Debido a su proximidad a la estrella, el intenso calor y la luz han provocado que gran parte de su superficie se haya derretido, dando lugar a ríos y océanos de lava, así como frecuentes tormentas de metal vaporizado. Con sus condiciones inhóspitas, Anneheg está considerado como uno de los planetas más infernales jamás descubiertos.
		#LOC_KS_AralcA_description = Aralc-A es la primera estrella del sistema binario en el sistema Kcalbeloh y está considerada la estrella más brillante y masiva del sistema. Su alta temperatura y color blanco azulado sugieren que es una estrella de secuencia principal tipo A.
		#LOC_KS_AralcB_description = Aralc-B, la segunda estrella del sistema binario, es una estrella pequeña de baja masa clasificada como estrella de secuencia principal tipo M, también conocida como enana roja.
		#LOC_KS_AralcSystem_description = Este es el baricentro del sistema estelar binario.
		#LOC_KS_Arorua_description = Arorua es un gran planeta rocoso bloqueado por marea por Aralc-B. Como resultado de los fuertes vientos solares emanados de Aralc-B, se pueden observar auroras desde todo el hemisferio que enfrenta a Aralc-B. Al mismo tiempo, su atmósfera está siendo gradualmente arrastrada por el viento solar de la enana roja.
		#LOC_KS_Dipuc_description = Dipuc es la única luna de Sera y su superficie está marcada por grandes cráteres, indicando que ha absorbido muchos impactos severos de meteoritos que de otro modo habrían golpeado a Sera. La luna también es geológicamente activa, con un número significativo de volcanes activos en su superficie así como montañas masivas visibles incluso cerca de Sera.
		#LOC_KS_Efil_description = Efil aparece como un zafiro anidado cerca de Anehta cuando se ve desde la distancia. Su encantadora atmósfera y hermosas playas lo hacen parecer un lugar de vacaciones ideal. Quizás en el futuro, el Centro Espacial Kerbal (KSC) construya un resort allí. Sin embargo, la pregunta sigue siendo quién podría permitirse el billete para visitar este planeta distante.
		#LOC_KS_Elad_description = Elad es la luna más grande de Anehta y fue la primera de las lunas de Anehta en ser descubierta. Se cree que Elad tuvo una atmósfera en el pasado e incluso soportó agua líquida en su superficie, pero sigue siendo un misterio por qué la luna perdió estas características con el tiempo.
		#LOC_KS_Enots_description = Enots es una pequeña luna asteroidal incrustada dentro del sistema de anillos de Anehta, y está considerada la luna más pequeña conocida de Anehta.
		#LOC_KS_Eulb_description = Eulb es … una luna azul.
		#LOC_KS_Iomena_description = Iomena es un planeta rocoso con grandes cráteres y océanos. La investigación científica ha indicado que la probabilidad de que exista vida en este planeta es extremadamente baja debido a las altas concentraciones de amoníaco presentes tanto en la atmósfera como en los océanos. No obstante, los científicos no han abandonado la posibilidad de descubrir vida en ambientes tan extremos.
		#LOC_KS_Kcalbeloh_description = Kcalbeloh es un agujero negro supermasivo y es el centro del sistema Kcalbeloh. No tiene un jet ni un disco de acreción azul sobrecalentado, lo que indica que probablemente no ha devorado una estrella en millones de años.
		#LOC_KS_Maelg_description = Maelg es la estrella menos masiva y más fría dentro del sistema Kcalbeloh, y en consecuencia emite significativamente menos luz que otras estrellas. Está clasificada como una enana marrón tipo L.
		#LOC_KS_Mehtna_description = Mehtna es un planeta gélido bloqueado por marea a Maelg. La mayor parte de su superficie está cubierta por gruesos casquetes de hielo, excepto la región cerca del punto subestelar, que ha sido bautizada como el "Polo Cálido". Debido a la baja presión atmosférica del planeta, el agua hierve muy por debajo de la temperatura ambiente, resultando en que el agua exista principalmente en forma de hielo o vapor de agua.
		#LOC_KS_Meiuqer_description = Meiuqer es un pequeño planeta con una órbita excepcionalmente excéntrica. Su temperatura superficial experimenta fluctuaciones significativas dependiendo de su distancia a Maelg.
		#LOC_KS_Noi_description = Noi es un asteroide troyano que libra alrededor del punto de Lagrange L4 entre Sunorc y el Sistema Simetra-Simeht, que existe 60° por delante del baricentro de los planetas binarios en su órbita.
		#LOC_KS_Noira_description = Noira es la luna que orbita más cerca del baricentro del sistema planetario binario Simetra-Simeht, y es única en el sistema Kcalbeloh por tener una órbita retrógrada. Su superficie presenta un cráter gigante, sugiriendo que ha experimentado un impacto significativo de un cuerpo celeste relativamente grande en el pasado.
		#LOC_KS_Norihc_description = Norihc es una luna gélida que orbita el baricentro de los gigantes gaseosos binarios. A pesar de su exterior helado, es geológicamente activa y muestra numerosas fisuras profundas en sus gruesos casquetes de hielo.
		#LOC_KS_Noyreg_description = Noyreg es una luna rocosa con una atmósfera extremadamente densa que oculta su superficie bajo gruesas capas de nubes. Su atmósfera tiene un fascinante tono verde, pero aterrizar en esta luna se considera extremadamente peligroso debido a las altas concentraciones de componentes corrosivos y tóxicos en el aire.
		#LOC_KS_Onrefni_description = Onrefni, un planeta enano, orbita en extremada proximidad a Kcalbeloh, experimentando fuertes fuerzas de marea que han desgarrado su superficie.
		#LOC_KS_Rouqea_description = Rouqea es un fascinante mundo oceánico completamente cubierto de agua. A diferencia de Laythe, su océano es único y distintivo, con profundidades inmensas que podrían producir un manto de hielo exótico debido a la presión extrema. Sus misteriosas y seductoras profundidades continúan cautivando la atención de investigadores y científicos.
		#LOC_KS_Sedah_description = Sedah es un gigante gaseoso caliente que orbita muy cerca de Sunorc. Sus altas temperaturas atmosféricas le dan un ligero resplandor. A pesar de ser similar en tamaño a Jool, tiene solo aproximadamente una séptima parte de la masa de Jool, resultando en una atmósfera menos densa y más "esponjosa".
		#LOC_KS_Sera_description = Sera es un planeta rocoso y estéril con un llamativo sistema de anillos y varios lagos grandes. Desafortunadamente, los lagos son tóxicos y no hay evidencia conocida de vida en Sera.
		#LOC_KS_Simeht_description = Simeht, el planeta más pequeño del sistema de gigantes gaseosos binarios, también está clasificado como gigante de hielo. Sin embargo, a diferencia de Simetra, sus bandas de nubes y tormentas son difíciles de observar en luz visible.
		#LOC_KS_SimeSystem_description = Este es el baricentro del sistema de gigantes gaseosos binarios.
		#LOC_KS_Simetra_description = Simetra es el gigante de hielo más grande en el sistema de gigantes gaseosos binarios Simetra-Simeht. Su apariencia azul se atribuye a las trazas de metano encontradas en sus regiones más externas, mientras que otras regiones del planeta se cree que están coloreadas de verde y amarillo debido a compuestos desconocidos.
		#LOC_KS_Suluco_description = Suluco es un planeta similar a Kerbin que está bloqueado por marea a Sunorc, lo que significa que un lado del planeta siempre enfrenta la estrella mientras que el otro está en perpetua oscuridad. Es un mundo bifurcado, con un contraste marcado entre los dos hemisferios. Un lado experimenta un día sin fin mientras que el otro está envuelto en noche eterna. El límite entre las dos mitades es un estrecho anillo de eternidad crepuscular, que es la única región del planeta que podría potencialmente soportar vida.
		#LOC_KS_Sunorc_description = Sunorc es una estrella de secuencia principal tipo K, también conocida como enana naranja. Es más pequeña y fría que Kerbol, lo que la hace de particular interés en la búsqueda de vida extraterrestre. Sunorc tiene una vida útil más larga y emite menos radiación UV, lo que aumenta la probabilidad de planetas habitables en su sistema.
		#LOC_KS_Tot_description = Una luna asteroidal que orbita alrededor de Suluco.
		#LOC_KS_Uleg_description = Uleg es un planeta gélido con una órbita que lo lleva lejos de Kcalbeloh. Su superficie está predominantemente cubierta de hielo. Su órbita muy inclinada y excéntrica sugiere que probablemente fue capturado por Kcalbeloh.


