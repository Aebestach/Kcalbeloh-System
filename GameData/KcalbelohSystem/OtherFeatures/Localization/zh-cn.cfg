		#LOC_KS_SciDef_dmRadiometerScan_Sunorc_InSpaceHigh = Sunorc在大多数记录波长发射大量光，然而作为K型星（或橙矮星），其输出的蓝光和紫外光比Kerbol这样的G型星（或黄矮星）少很多。因其较低温度，这类恒星可比黄矮星多活数十亿年。

		// Sedah
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceLow = 恒星风猛烈冲击Sedah蓬松的大气，从行星内部产生奇怪信号。这表明有电流贯穿行星，会产生大量内部热量并有助于解释其庞大体积。但肯定没预期那么强，因为该电流产生的磁场虽然强大，与Jool相比却稍弱。
		#LOC_KS_SciDef_rpwsScan_Sedah_InSpaceHigh = 高能等离子体冲击Sedah，产生迷人的重复无线电波模式，实验室的人会有大量数据可研究。

		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceLow = 近距离照片揭示漩涡状的湍流云和巨大飓风，有的大到能吞下整颗行星！
		#LOC_KS_SciDef_scopeScan_Sedah_InSpaceHigh = 该行星因其大气的巨大热量而发光，甚至暗面也发出微光。

		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceLow = 大气成分表明该行星可能本来有更奶白色的外观，但由于极端高温而发出暗红色光。
		#LOC_KS_SciDef_dmImagingPlatform_Sedah_InSpaceHigh = Sedah辐射热量非常强烈，导致其输出的红外光比气态行星通常多很多。

		#LOC_KS_SciDef_dmSIGINT_Sedah_InSpaceLow = Sedah的无线电发射变化巨大且极其强烈，可能由恒星风与其自身内部过程的复杂相互作用所致。

		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceLow = 在夜侧，当穿过Sedah巨大的外逸层轨道时检测到痕量氢和氦粒子。在昼侧，收集器被恒星风的带电粒子冲击。
		#LOC_KS_SciDef_dmSolarParticles_Sedah_InSpaceHigh = 除了恒星风外这里检测到的不多，但有微量普通氢和氦，在Sedah背后轨道时更常见。

		#LOC_KS_SciDef_dmSoilMoisture_Sedah_InSpaceLow = Sedah轨道检测到的强微波发射毫无疑问由该行星的内部机制产生。

		#LOC_KS_SciDef_dmRadiometerScan_Sedah_InSpaceHigh = Sedah的扫描记录到强烈热读数，即使在夜侧。这显然由这颗巨行星的荒谬高温造成。

		// Suluco
		#LOC_KS_SciDef_dmMagScan_Suluco_SrfLanded = 从地表看Suluco似乎有弱磁场，意味着它对恒星风的防护不如理想。然而，晨昏带上的生命仍然存在，因为那里日照本来就有限。
		#LOC_KS_SciDef_dmMagScan_Suluco_InSpaceHigh = 在此距离，Suluco的磁场非常微弱。似乎没有延伸到地表以上太远。

		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceHigh = Suluco相对较弱的磁层无法偏转Sunorc的多少恒星风，但似乎足以保护地表生命。
		#LOC_KS_SciDef_rpwsScan_Suluco_InSpaceLow = 等离子体波分析显示Suluco赤道周围有一圈扩散的带电粒子；微弱范·克曼辐射带的迹象。

		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceHigh = 尽管被称为眼球行星，Suluco看起来并不太像眼睛。不过其所谓的"热极"与晨昏带之间的鲜明对比令人印象深刻。
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDay = Suluco的昼侧几乎亮得刺眼，看起来干得像骨头。绵延不绝的沙丘之海是这片区域的特色。
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowDayPole = 亚恒星点令人目眩；反射大量光线，看起来热得可能能在上面煎蛋。连云似乎都被蒸发了。
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowNight = 什么都看不见。
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowTwilight = Suluco狭窄的温带区域有起伏的绿色丘陵和开阔海洋。你在几张照片中注意到云层围绕昼夜极而非行星自转轴旋转。
		#LOC_KS_SciDef_scopeScan_Suluco_InSpaceLowWater = Suluco的海洋仅限于昼夜分界线沿线的狭窄地带，就像生命一样。这些区域的洋流与小绿人前所未见的任何事物都不同。

		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceHigh = 对Suluco大气在紫外和红外光谱的综合扫描显示其主要由氮和氧组成，如预期。
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDay = Suluco的昼侧将光线直接反射回Sunorc，在紫外和红外光谱都反射大量光。
		#LOC_KS_SciDef_dmImagingPlatform_Suluco_InSpaceLowDayPole = 亚恒星点反射的阳光远多于其他地方，导致红外读数明显尖峰。
