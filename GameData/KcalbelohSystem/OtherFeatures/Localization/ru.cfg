		#LOC_KS_SciDef_dmMagScan_Onrefni_SrfSplashed = Многие предполагают, что если бы мы знали, почему магнитометр отправил сообщение «о нет, только не снова!» когда он расплавился в лаве на поверхности, вращающейся вокруг сверхмассивной черной дыры, мы знали бы о природе Вселенной гораздо больше, чем сейчас.

