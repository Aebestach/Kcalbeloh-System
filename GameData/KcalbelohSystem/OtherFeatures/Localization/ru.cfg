		#LOC_KS_SciDef_crewReport_Dipuc_SrfLanded_Volcano = Что касается безопасности, вулканические конусы с крутыми склонами довольно опасны из-за своего крутого наклона, что может привести к нескольким авариям, которые могут оказаться вредными для продвижения миссии. По крайней мере, здесь отсутствует то тепло, которое вы ожидаете от поверхности активного вулканического конуса, не так ли?\n\nИ нет, здесь не стоит беспокоиться о извержениях вулканов, учитывая, что вакуумная среда немедленно охладит извергающуюся лаву и любые потенциальные пирокластические потоки до такой степени, что они станут медленно текущими потоками лахара, которых легко избежать.\nПросто... ради Krakenа, никогда не рискуйте приближаться к активному вулкану вентиляционное отверстие.\n\n\nВы уже рядом с ним, не так ли?
