		#LOC_KS_SciDef_rpwsScan_Kcalbeloh_InSpaceLow = Радиоволны и ионизированные частицы аккреционного диска повреждают детекторы, вызывая острый сбой во всех его системах. Хотя, наверное, это поправимо... наверное.
		#LOC_KS_SciDef_rpwsScan_Kcalbeloh_InSpaceHigh = Можно обнаружить слабое радиоизлучение, исходящее от далекой Kcalbeloh, но, кроме Maelgа, все остальные звезды производят гораздо большую активность.

		#LOC_KS_SciDef_scopeScan_Kcalbeloh_InSpaceLow = Стажер, кратко наблюдающий за трансляцией изображения в телескоп, действительно становится очень взволнованным, когда замечает так называемую «сингулярность» — оказывается, что мощные силы треснули линзу и создали яркое пятно в центре.
		#LOC_KS_SciDef_scopeScan_Kcalbeloh_InSpaceHigh = Аккреционный диск Kcalbelohх запечатлен с помощью инструмента с потрясающими деталями, а более тщательный анализ показывает, что края диска слегка смещены в красную и голубую сторону.

		#LOC_KS_SciDef_dmImagingPlatform_Kcalbeloh_InSpaceLow = Хотя датчики теоретически были бы способны анализировать аккреционный диск с такого расстояния, не причиняя вреда свету, они не могут этого сделать из-за безнадежной деформации под действием мощных действующих сил.
		#LOC_KS_SciDef_dmImagingPlatform_Kcalbeloh_InSpaceHigh = Мультиспектральный анализ подтверждает, что два конца аккреционного диска слегка смещены в красную и голубую сторону. Между тем, в состав диска, судя по всему, входят в основном водород и гелий, что подтверждает, что он состоит из массы по крайней мере одной звезды, которую Kcalbeloh поглотил много миллионов лет назад.

		#LOC_KS_SciDef_dmSIGINT_Kcalbeloh_InSpaceLowNorthernHemisphere = Изучая телеметрию, вы слышите звуки... игры на банджо? Затем гармоника, свистящий голос, барабан, флейта и фортепиано. Звучит... сентиментально, даже ностальгически. Потом ты просыпаешься, а песни нет. Был ли это все сон?
		#LOC_KS_SciDef_dmSIGINT_Kcalbeloh_InSpaceLowSouthernHemisphere = Аккреционный диск Kcalbeloh постоянно излучает интенсивные радиоволны, хотя этот инструмент далеко не достаточно чувствителен, чтобы обнаружить какое-либо кермановское излучение.

		#LOC_KS_SciDef_dmSolarParticles_Kcalbeloh_InSpaceLow = Частицы высокой энергии полностью поджигают активный концентратор ионов и разрушают чувствительные пластины пассивных коллекторов. Браво, гений.
		#LOC_KS_SciDef_dmSolarParticles_Kcalbeloh_InSpaceHigh = «Голярный ветер» аккреционного диска откладывает ионизированные частицы в коллекторах, но есть также очень слабые следы из множества других направлений, вероятно, исходящие от самых массивных звезд системы Kcalbeloh.

		#LOC_KS_SciDef_dmSoilMoisture_Kcalbeloh_InSpaceLow = Хорошо. Кто тот комик, который добавил в миссию «ЧЕРНАЯ ДЫРА» датчик для обнаружения воды с помощью микроволнового излучения? Я хочу имена!

		#LOC_KS_SciDef_dmRadiometerScan_Kcalbeloh_InSpaceHigh = Хотя альбедо самого горизонта событий, конечно, равно нулю, аккреционный диск излучает свет на всех зарегистрированных длинах волн, как это делает звезда. Однако она значительно тусклее большинства звезд.

