		#LOC_KS_SciDef_dmbiodrillscan_Efil_SrfLandedGrassland = 成群结队的六腿皱皮粗壮野兽在开阔平原上游荡，数量如此之多，几乎没有捕食者能挑战它们。幸运的是，这群没有打断取样过程，但将来可能更谨慎地用飞船相机更定期扫描该区域。
