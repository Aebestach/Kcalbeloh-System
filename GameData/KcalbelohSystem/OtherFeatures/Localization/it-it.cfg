		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingHigh_Midlands = Le tracce di idrogeno sono probabilmente dovute alla presenza di Kcalbeloh! Gli elementi più leggeri sfuggirebbero più facilmente, ovviamente, e quindi Rouqea è nel posto perfetto per raccoglierli!
		#LOC_KS_SciDef_atmosphereAnalysis_Rouqea_FlyingHigh_Highlands = In alto nell'atmosfera, rilevi lo strano segnale di una particella ad alta energia da Kcalbeloh, che ti ricorda che potrebbe decimare l'intero pianeta in un batter d'occhio se ne avesse voglia.
