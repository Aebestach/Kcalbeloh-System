		//Meiuqer
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded1 = Эта пыльная, холодная маленькая космическая картофелина по-прежнему, несомненно, очаровывает вас и вашу команду.
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded2 = С такого расстояния и без того слабый свет Maelgа меркнет до почти незначительного значения.
		#LOC_KS_SciDef_crewReport_Meiuqer_SrfLanded3 = Поверхность Meiuqerа выглядит так, как будто ее неоднократно оттаивали и замораживали в течение некоторого времени, это похоже на мороженое, которое оставили таять, а затем снова заморозили.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_SrfLanded1 = Хотя температура в этом маленьком, странном мире довольно часто колеблется на его орбите, он никогда не бывает «теплым» ни при каких обстоятельствах.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_SrfLanded2 = Термометр говорит вам очевидное в этой конкретной ситуации: ХОЛОДНО!
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded1 = Стоя на поверхности Meiuqerа, вы стараетесь не чихнуть и достичь скорости отрыва.
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded2 = Вы обладаете бесконечной космической силой. Вы слегка бросили ближайший камень, и он начал вращаться вокруг Meiuqerа. Должен любить низкую гравитацию.
		#LOC_KS_SciDef_evaReport_Meiuqer_SrfLanded3 = Чувак, ты думал, что в Джилли сложно ориентироваться. По крайней мере, Джилли не кажется все время темной и не тонированной, как старинная пленка.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_SrfLanded1 = Слизь замерзает и ударяется о контейнер, разрыхляя его и заставляя уплыть твердой массой со скоростью убегания Meiuqerа.
		#LOC_KS_SciDef_mysteryGoo_Meiuqer_SrfLanded2 = Гу почти плавает в своей капсуле, как будто все еще находится в условиях микрогравитации, особенно когда она начинает одновременно сублимироваться и замерзать в среде жесткого вакуума Meiuqerа.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded1 = Вы должны быть осторожны при сборе образцов, чтобы не уплыть от Meiuqerа.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded2 = Образцы, которые вы собираете, весьма примечательны. Хотя Mehtna, несомненно, древняя, Meiuqer буквально нетронут с момента своего образования, за исключением любых эффектов, вызванных регулярными резкими изменениями температуры, когда он движется близко и далеко от Maelgа на своей весьма эксцентричной орбитальной траектории.
		#LOC_KS_SciDef_surfaceSample_Meiuqer_SrfLanded3 = Теперь, когда образцы были получены из этого странного маленького мира, стало ясно, что Meiuqer является астероидом типа «куча обломков», поскольку его значительный радиус несмотря на то, что он имеет более слабое гравитационное поле, чем гораздо меньший по размеру Gilly.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_SrfLanded1 = Образцы не сильно реагируют на воздействие Meiuqerа, кроме того, летучие образцы быстро испаряются и/или замерзают.
		#LOC_KS_SciDef_mobileMaterialsLab_Meiuqer_SrfLanded2 = Помимо сублимации, единственное, что наблюдается в лаборатории материалов, — это то, что электрический эксперимент становится нестабильным и коротким из-за пыли, окружающей Meiuqerа, покрывающей его всего за несколько минут после воздействия. Пыль, по-видимому, электрически заряжается Maelgом или, по крайней мере, в некоторой степени проводит электричество.
		#LOC_KS_SciDef_seismicScan_Meiuqer_SrfLanded = Неудивительно, что сейсмическое сканирование Meiuqerа показывает, что этот маленький мир полностью мертв и с таким же успехом может быть гигантской картошкой, плавающей в космическом вакууме.
		#LOC_KS_SciDef_gravityScan_Meiuqer_SrfLanded = Вы пытаетесь измерить гравитацию Meiuqerа. Дисплей датчика почти не опускается настолько низко, но вы получаете показания.

		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceLow1 = Поверхность несколько скрыта пыльной экзосферой Meiuqerа, но ее совершенно нельзя сравнить с настоящей атмосферой.
		#LOC_KS_SciDef_crewReport_Meiuqer_InSpaceLow2 = Вы наблюдаете, как небольшой камень на умеренной скорости врезается в Meiuqerа, отбрасывая валун размером с автомобиль, отлетающий от поверхности.
		#LOC_KS_SciDef_temperatureScan_Meiuqer_InSpaceLow = Лучшее впечатление «каменного холода» термометр производит после попытки снять показания на планетоиде внизу.
		#LOC_KS_SciDef_evaReport_Meiuqer_InSpaceLow1 = Отсюда вы вполне можете легко приземлиться на Meiuqer, имея только свой рюкзак для выхода в открытый космос и запас топлива.
