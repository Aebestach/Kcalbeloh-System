		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Highlands = Ti chiedi se la temperatura dell'acqua delle montagne in lontananza sia la stessa, ma sembrano allontanarsi man mano che ti avvicini. Non preoccuparti, ce n'è una che si avvicina ora.
		#LOC_KS_SciDef_temperatureScan_Rouqea_SrfSplashed_Cracks = L'acqua è gelidamente fredda sotto il tuo veicolo, come se qualcosa stesse aspirando il calore da questo oceano planetario altrimenti tropicale.
