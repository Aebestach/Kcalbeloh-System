		// ******************************** Wormhole ********************************
		#LOC_KS_WH_description = Un wormhole è una peculiare distorsione dello spaziotempo che collega il sistema Kerbol e il sistema Kcalbeloh. Per attraversare il wormhole, bisogna diminuire il periapside del veicolo spaziale sotto i 30 km, evitando di avvicinarsi troppo al centro del wormhole.
