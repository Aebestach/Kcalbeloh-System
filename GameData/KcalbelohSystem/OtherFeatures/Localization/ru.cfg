		#LOC_KS_SciDef_evaReport_Mehtna_InSpaceHigh2 = Слабый свет Maelgа странным образом преломляется в мутной на вид атмосфере Mehtna, делая эту атмосферу одновременно плотной и тонкой.
		#LOC_KS_SciDef_mysteryGoo_Mehtna_InSpaceHigh = Гу, кажется, дрейфует к планете и Maelgу настолько, насколько это возможно, учитывая его замкнутую природу, по-видимому, пытаясь почувствовать тепло.
		#LOC_KS_SciDef_mobileMaterialsLab_Mehtna_InSpaceHigh = Большинство образцов кажутся нормальными, но некоторые из наиболее хрупких экспериментов, похоже, замерзли при низкой температуре так далеко от Maelgа. Вы можете только представить, насколько холодным должен быть Meiuqer.
